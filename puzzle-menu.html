<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Puzzle Menu | Atul Soral Physicism</title>

<style>
body{
  font-family: Arial;
  background:#0f172a;
  color:white;
  margin:0;
}

header{
  background:linear-gradient(135deg,#06b6d4,#2563eb);
  padding:40px;
  text-align:center;
}

.container{
  max-width:1000px;
  margin:auto;
  padding:20px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
}

.card{
  background:#1e293b;
  padding:20px;
  border-radius:12px;
  text-align:center;
}

.card h3{
  margin-bottom:10px;
}

button{
  padding:10px 15px;
  border:none;
  border-radius:6px;
  background:#22c55e;
  color:white;
  cursor:pointer;
  font-weight:bold;
}

button:hover{
  background:#16a34a;
}

.nav{
  text-align:center;
  margin-top:20px;
}

.nav button{
  background:#334155;
}
</style>
</head>

<body>

<header>
<h1>🧩 Puzzle Menu</h1>
<p>Select a puzzle type to begin</p>
</header>

<div class="container">

<div class="grid">

<div class="card">
<h3>🎯 Run Puzzle</h3>
<button onclick="start('Static electricity','formula',5)">Start</button>
</div>

<div class="card">
<h3>📐 Formula Puzzle</h3>
<button onclick="start('Static electricity','formula',5)">Start</button>
</div>

<div class="card">
<h3>🔄 Sequence Puzzle</h3>
<button onclick="start('Static electricity','sequence',5)">Start</button>
</div>

<div class="card">
<h3>✅ True / False</h3>
<button onclick="start('Static electricity','truefalse',5)">Start</button>
</div>

</div>

<div class="nav">
<button onclick="location.href='index.html'">🏠 Home</button>
</div>

</div>

<script>

// 🔥 FALLBACK DATA (VERY IMPORTANT)
const fallbackData = {
  "Static electricity": {
    formula:[
      {q:"Unit of charge?", choices:["Coulomb","Ampere","Volt"], answer:"Coulomb"},
      {q:"Symbol of charge?", choices:["Q","I","V"], answer:"Q"}
    ],
    truefalse:[
      {q:"Charge accumulates on insulators.", choices:["True","False"], answer:"True"}
    ],
    sequence:[
      {q:"Correct order?", choices:["Rub → Transfer → Accumulate","Accumulate → Rub → Transfer"], answer:"Rub → Transfer → Accumulate"}
    ]
  }
};

function start(topic,type,count){

// Save fallback in browser
localStorage.setItem("fallbackData", JSON.stringify(fallbackData));

// Redirect
const url = `run-puzzle.html?topic=${encodeURIComponent(topic)}&type=${type}&count=${count}`;
window.location.href = url;

}

</script>

</body>
</html>
