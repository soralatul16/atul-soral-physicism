<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Physics Pictionary | Atul Soral Physicism</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
<style>
  :root {
    --book-width: 800px;
    --book-height: 563px;
    --sidebar-width: 62px;
    --page-turn-duration: 0.55s;
    --bg: #f5f0e8;
    --bg-deep: #f0ebe2;
    --accent: #c0392b;
    --accent-glow: rgba(192,57,43,0.2);
    --text: #1a1a2e;
    --text-muted: #888;
    --shadow-color: rgba(0,0,0,0.12);
    --surface: rgba(255,255,255,0.75);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    font-family: 'DM Sans', sans-serif;
    color: var(--text);
    overflow: hidden;
    user-select: none;
    -webkit-user-select: none;
  }

  img {
    pointer-events: none;
    -webkit-user-drag: none;
    -webkit-touch-callout: none;
  }

  /* TOPBAR */
  .topbar {
    height: 54px;
    background: var(--surface);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-bottom: 1px solid rgba(0,0,0,0.06);
    display: flex;
    align-items: center;
    padding: 0 20px;
    flex-shrink: 0;
    z-index: 100;
  }
  .topbar-brand {
    font-family: 'Playfair Display', serif;
    font-size: 17px;
    color: var(--accent);
    margin-right: 16px;
    text-decoration: none;
  }
  .topbar-title {
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
    margin-right: auto;
  }
  .top-btn {
    padding: 6px 16px;
    border-radius: 50px;
    border: 1.5px solid rgba(0,0,0,0.06);
    background: white;
    color: #555;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    transition: all .2s;
    text-decoration: none;
    font-family: 'DM Sans', sans-serif;
    margin-left: 8px;
  }
  .top-btn:hover {
    border-color: rgba(192,57,43,0.3);
    color: var(--accent);
  }

  /* MAIN LAYOUT */
  .main-layout {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }
  .main-layout::before {
    content: 'Atul Soral Physicism';
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%,-50%) rotate(-35deg);
    font-family: 'Playfair Display', serif;
    font-size: 60px;
    color: rgba(0,0,0,0.015);
    white-space: nowrap;
    pointer-events: none;
    z-index: 0;
  }

  .app {
    display: flex;
    align-items: center;
    gap: 0;
    position: relative;
    z-index: 10;
    max-height: calc(100vh - 54px);
  }

  /* LEFT SIDEBAR */
  .sidebar {
    width: var(--sidebar-width);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
    padding: 6px 0;
    margin-right: 18px;
    max-height: calc(100vh - 80px);
    overflow-y: auto;
    overflow-x: hidden;
    scrollbar-width: none;
    background: white;
    border-radius: 14px;
    border: 1.5px solid rgba(0,0,0,0.06);
    box-shadow: 0 2px 12px rgba(0,0,0,0.04);
  }
  .sidebar::-webkit-scrollbar { display: none; }

  .sidebar-brand {
    font-size: 7px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-muted);
    text-align: center;
    margin-bottom: 4px;
    line-height: 1.3;
    white-space: nowrap;
  }

  .idx-btn {
    width: 38px;
    height: 30px;
    border: 1px solid rgba(192,57,43,0.08);
    background: transparent;
    color: var(--text-muted);
    border-radius: 8px;
    cursor: pointer;
    font-family: 'Playfair Display', serif;
    font-size: 13px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.25s;
  }
  .idx-btn:hover {
    background: rgba(192,57,43,0.06);
    color: var(--accent);
    border-color: rgba(192,57,43,0.2);
  }
  .idx-btn.active {
    background: var(--accent);
    color: white;
    border-color: var(--accent);
    font-weight: bold;
    box-shadow: 0 4px 16px var(--accent-glow);
  }
  .idx-btn.cover-btn {
    font-size: 9px;
    letter-spacing: 1px;
    height: 26px;
    margin-bottom: 2px;
    font-family: 'DM Sans', sans-serif;
  }

  /* CENTER */
  .center-col {
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .title-bar {
    text-align: center;
    margin-bottom: 12px;
  }
  .brand-name {
    font-size: 10px;
    letter-spacing: 5px;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 4px;
  }
  .title-bar h1 {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    letter-spacing: 2px;
    color: var(--accent);
    font-weight: 700;
  }
  .title-bar .subtitle {
    font-size: 10px;
    letter-spacing: 4px;
    color: var(--text-muted);
    margin-top: 3px;
    text-transform: uppercase;
  }

  /* BOOK */
  .book-scene { perspective: 1800px; }

  .book {
    width: var(--book-width);
    height: var(--book-height);
    position: relative;
    transform-style: preserve-3d;
  }

  /* SPIRAL BINDING CSS */
  .book::after {
    content: '';
    position: absolute;
    left: -6px;
    top: 2%;
    bottom: 2%;
    width: 14px;
    z-index: 50;
    pointer-events: none;
    background: repeating-linear-gradient(
      180deg,
      transparent 0px,
      transparent 8px,
      rgba(192,57,43,0.15) 8px,
      rgba(192,57,43,0.15) 10px,
      transparent 10px,
      transparent 18px
    );
    border-left: 2px solid rgba(192,57,43,0.2);
  }
  .book::before {
    content: '';
    position: absolute;
    left: -8px;
    top: 2%;
    bottom: 2%;
    width: 18px;
    z-index: 49;
    pointer-events: none;
    background: repeating-linear-gradient(
      180deg,
      transparent 0px,
      transparent 6px,
      rgba(0,0,0,0.04) 6px,
      rgba(0,0,0,0.04) 12px,
      transparent 12px,
      transparent 24px
    );
    border-radius: 4px 0 0 4px;
  }

  .leaf {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    transform-style: preserve-3d;
    transform-origin: left center;
    transition: transform var(--page-turn-duration) cubic-bezier(0.645, 0.045, 0.355, 1), opacity var(--page-turn-duration) ease;
    cursor: pointer;
    opacity: 0;
    pointer-events: none;
  }

  .leaf.active {
    opacity: 1;
    pointer-events: all;
    transform: rotateY(0deg);
  }

  .leaf.flipped {
    transform: rotateY(-180deg);
    opacity: 0;
    pointer-events: none;
  }

  .leaf.waiting {
    opacity: 0;
    pointer-events: none;
    transform: rotateY(0deg);
  }

  .page {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    backface-visibility: hidden;
    overflow: hidden;
    border-radius: 2px 8px 8px 2px;
    box-shadow: 2px 2px 16px var(--shadow-color);
  }
  .page-front { background: var(--bg-deep); }
  .page img {
    width: 100%; height: 100%;
    object-fit: contain;
    display: block;
    background: var(--bg-deep);
  }

  .page-placeholder {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    background: var(--bg-deep);
    padding: 40px;
  }
  .page-placeholder .big-letter {
    font-size: 160px;
    font-weight: 700;
    color: rgba(192,57,43,0.08);
    line-height: 1;
    font-family: 'Playfair Display', serif;
  }
  .page-placeholder .placeholder-text {
    font-size: 14px;
    color: var(--text-muted);
    text-align: center;
    margin-top: 12px;
    letter-spacing: 2px;
  }

  /* Cover page content */
  .cover-content {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    background: linear-gradient(145deg, #c0392b 0%, #922b21 40%, #7f1d1d 100%);
    padding: 40px;
    border-radius: 2px 8px 8px 2px;
  }
  .cover-content .cover-line {
    width: 80px;
    height: 1.5px;
    background: rgba(255,255,255,0.25);
    margin: 14px 0;
  }
  .cover-content h2 {
    font-family: 'Playfair Display', serif;
    font-size: 36px;
    color: white;
    text-align: center;
    line-height: 1.2;
  }
  .cover-content h3 {
    font-size: 16px;
    color: rgba(255,255,255,0.7);
    font-weight: 400;
    font-style: italic;
    font-family: 'Playfair Display', serif;
    margin-top: 4px;
  }
  .cover-content .cover-tag {
    font-size: 9px;
    color: rgba(255,255,255,0.35);
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-top: 20px;
  }

  /* CONTROLS */
  .controls {
    display: flex;
    align-items: center;
    gap: 24px;
    margin-top: 14px;
  }
  .nav-btn {
    width: 40px; height: 40px;
    border: 1.5px solid rgba(192,57,43,0.2);
    background: white;
    color: var(--accent);
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.25s;
    box-shadow: 0 2px 8px rgba(0,0,0,0.04);
  }
  .nav-btn:hover:not(:disabled) {
    background: var(--accent);
    color: white;
    border-color: var(--accent);
    transform: scale(1.08);
  }
  .nav-btn:disabled { opacity: 0.25; cursor: default; }
  .nav-btn svg {
    width: 18px; height: 18px;
    fill: none; stroke: currentColor;
    stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round;
  }
  .page-info {
    font-size: 12px;
    letter-spacing: 2px;
    color: var(--text-muted);
    min-width: 90px;
    text-align: center;
  }
  .instructions {
    font-size: 10px;
    color: var(--text-muted);
    letter-spacing: 1.5px;
    text-align: center;
    opacity: 0.5;
    margin-top: 10px;
  }

  @media (max-width: 700px) {
    .app { flex-direction: column; gap: 10px; }
    .sidebar {
      flex-direction: row;
      width: auto;
      max-height: none;
      max-width: 96vw;
      overflow-x: auto;
      overflow-y: hidden;
      margin-right: 0;
      gap: 3px;
      padding: 4px 8px;
      border-radius: 10px;
    }
    .sidebar-brand { display: none; }
    .idx-btn { width: 32px; height: 28px; font-size: 12px; flex-shrink: 0; }
    .idx-btn.cover-btn { width: 42px; height: 28px; }
    .title-bar h1 { font-size: 16px; }
    .title-bar { margin-bottom: 6px; }
    .controls { gap: 14px; margin-top: 8px; }
    .nav-btn { width: 36px; height: 36px; }
  }
</style>
</head>
<body>

<div class="topbar">
  <a class="topbar-brand" href="index.html">Physicism</a>
  <span class="topbar-title">Physics Pictionary</span>
  <a class="top-btn" href="myp-dashboard.html">MYP Dashboard</a>
  <a class="top-btn" href="index.html">Home</a>
</div>

<div class="main-layout">
<div class="app">

  <nav class="sidebar" id="sidebar">
    <div class="sidebar-brand">A–Z<br>Index</div>

  <div class="center-col">
    <div class="title-bar">
      <div class="brand-name">Atul Soral Physicism</div>
      <h1>My Physics Pictionary</h1>
      <div class="subtitle">A to Z of Key Physics Concepts</div>

</div>
</div>

<!-- FEEDBACK WIDGET -->
<button id="fb-trigger" title="Send feedback or report an error" style="position:fixed;bottom:28px;right:28px;z-index:9000;width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,#ef4444,#7f1d1d);border:none;cursor:pointer;box-shadow:0 4px 20px rgba(239,68,68,.5);display:flex;align-items:center;justify-content:center;font-size:1.3rem;transition:transform .2s,box-shadow .2s;color:white;" onclick="document.getElementById('fb-panel').classList.toggle('open');this.classList.toggle('spinning');">💬</button>
<div id="fb-panel" style="position:fixed;bottom:92px;right:28px;z-index:9000;width:310px;background:#f5f0e8;border:1.5px solid rgba(0,0,0,0.06);border-radius:20px;overflow:hidden;box-shadow:0 16px 48px rgba(0,0,0,0.1);transform:translateY(20px) scale(.96);opacity:0;pointer-events:none;transition:transform .28s cubic-bezier(.22,.68,0,1.2),opacity .2s;">
  <div style="background:linear-gradient(135deg,#ef4444,#7f1d1d);padding:13px 18px;font-family:'DM Sans',sans-serif;font-size:.75rem;letter-spacing:.1em;text-transform:uppercase;color:white;display:flex;align-items:center;gap:8px;">📬 Feedback / Correction</div>
  <div style="padding:16px;display:flex;flex-direction:column;gap:11px;">
    <div style="font-size:.7rem;color:#888;background:#f0ebe2;padding:5px 10px;border-radius:6px;word-break:break-all;" id="fb-page-url"></div>
    <input id="fb-email" type="email" placeholder="Your email (optional)" style="width:100%;background:white;border:1.5px solid rgba(0,0,0,0.06);border-radius:8px;color:#1a1a2e;font-family:'DM Sans',sans-serif;font-size:.86rem;padding:9px 12px;outline:none;">
    <textarea id="fb-message" placeholder="Found a mistake? Suggestion? Tell me here…" style="width:100%;background:white;border:1.5px solid rgba(0,0,0,0.06);border-radius:8px;color:#1a1a2e;font-family:'DM Sans',sans-serif;font-size:.86rem;padding:9px 12px;height:88px;resize:none;outline:none;"></textarea>
    <button id="fb-send-btn" style="background:linear-gradient(135deg,#ef4444,#991b1b);border:none;color:white;font-family:'DM Sans',sans-serif;font-size:.88rem;font-weight:600;padding:10px;border-radius:8px;cursor:pointer;">Send Feedback</button>
    <div id="fb-status" style="font-size:.78rem;text-align:center;min-height:16px;color:#888;"></div>
  </div>
</div>
<style>
#fb-panel.open{transform:translateY(0) scale(1);opacity:1;pointer-events:all;}
#fb-trigger.spinning{transform:rotate(90deg) scale(1.05);}
#fb-trigger:hover{transform:scale(1.12);box-shadow:0 6px 28px rgba(239,68,68,.7);}
</style>
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<script>
document.getElementById('fb-page-url').textContent = '📄 ' + window.location.pathname;
emailjs.init({publicKey: 'jhfWQKIKtye-3eVpn'});
document.getElementById('fb-send-btn').addEventListener('click', async function() {
  var msg = document.getElementById('fb-message').value.trim();
  var email = document.getElementById('fb-email').value.trim();
  var status = document.getElementById('fb-status');
  var btn = this;
  if (!msg) { status.textContent = 'Please write something first.'; status.style.color = '#c0392b'; return; }
  btn.disabled = true; btn.textContent = 'Sending…';
  try {
    await emailjs.send('service_ni72akl', 'template_xr522or', {
      page: window.location.href, message: msg,
      email: email || '(not provided)',
      sent_at: new Date().toLocaleString('en-IN', {timeZone: 'Asia/Kolkata'})
    });
    status.textContent = '✓ Sent! Thank you.'; status.style.color = '#2e7d32';
    document.getElementById('fb-message').value = '';
    setTimeout(function() {
      document.getElementById('fb-panel').classList.remove('open');
      document.getElementById('fb-trigger').classList.remove('spinning');
      btn.disabled = false; btn.textContent = 'Send Feedback';
      status.textContent = '';
    }, 2200);
  } catch(err) {
    status.textContent = '❌ Could not send.'; status.style.color = '#c0392b';
    btn.disabled = false; btn.textContent = 'Send Feedback';
  }
});
document.addEventListener('click', function(e) {
  if (!document.getElementById('fb-panel').contains(e.target) && e.target !== document.getElementById('fb-trigger')) {
    document.getElementById('fb-panel').classList.remove('open');
    document.getElementById('fb-trigger').classList.remove('spinning');
  }
});
</script>

<script>
(function() {
  var WORDS = {A:'Amazing',B:'Bewitching',C:'Captivating',D:'Divine',E:'Enchanting',F:'Fascinating',G:'Glorious',H:'Harmonious',I:'Incredible',J:'Joyful',K:'Kinetic',L:'Luminous',M:'Magnificent',N:'Noble',O:'Outstanding',P:'Powerful',Q:'Quantum',R:'Radiant',S:'Spectacular',T:'Thrilling',U:'Universal',V:'Vibrant',W:'Wonderful',X:'Xenial',Y:'Youthful',Z:'Zealous'};

  var pages = [
    { type: 'cover', label: 'Cover' },
    { type: 'image', src: 'Images/pictionary/A1-pictionary.png', label: 'A' },
    { type: 'image', src: 'Images/pictionary/B1-pictionary.png', label: 'B' },
    { type: 'image', src: 'Images/pictionary/C1-pictionary.png', label: 'C' },
    { type: 'image', src: 'Images/pictionary/D1-pictionary.png', label: 'D' },
    { type: 'image', src: 'Images/pictionary/E1-pictionary.png', label: 'E' },
    { type: 'image', src: 'Images/pictionary/F1-pictionary.png', label: 'F' },
    { type: 'image', src: 'Images/pictionary/G1-pictionary.png', label: 'G' },
    { type: 'image', src: 'Images/pictionary/H1-pictionary.png', label: 'H' },
    { type: 'image', src: 'Images/pictionary/I1-pictionary.png', label: 'I' },
    { type: 'image', src: 'Images/pictionary/J1-pictionary.png', label: 'J' },
    { type: 'image', src: 'Images/pictionary/K1-pictionary.png', label: 'K' },
    { type: 'image', src: 'Images/pictionary/L1-pictionary.png', label: 'L' },
    { type: 'image', src: 'Images/pictionary/M1-pictionary.png', label: 'M' },
    { type: 'image', src: 'Images/pictionary/N1-pictionary.png', label: 'N' },
    { type: 'image', src: 'Images/pictionary/O1-pictionary.png', label: 'O' },
    { type: 'image', src: 'Images/pictionary/P1-pictionary.png', label: 'P' },
    { type: 'image', src: 'Images/pictionary/Q1-pictionary.png', label: 'Q' },
    { type: 'image', src: 'Images/pictionary/R1-pictionary.png', label: 'R' },
    { type: 'image', src: 'Images/pictionary/S1-pictionary.png', label: 'S' },
    { type: 'image', src: 'Images/pictionary/T1-pictionary.png', label: 'T' },
    { type: 'image', src: 'Images/pictionary/U1-pictionary.png', label: 'U' },
    { type: 'image', src: 'Images/pictionary/V1-pictionary.png', label: 'V' },
    { type: 'image', src: 'Images/pictionary/W1-pictionary.png', label: 'W' },
    { type: 'image', src: 'Images/pictionary/X1-pictionary.png', label: 'X' },
    { type: 'image', src: 'Images/pictionary/Y1-pictionary.png', label: 'Y' },
    { type: 'image', src: 'Images/pictionary/Z1-pictionary.png', label: 'Z' }
  ];

  var ALPHABET = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
  var labelToPage = {};
  pages.forEach(function(p, i) { labelToPage[p.label] = i; });

  var book = document.getElementById('book');
  var leaves = [];

  pages.forEach(function(pageData, idx) {
    var leaf = document.createElement('div');
    leaf.className = 'leaf';
    leaf.style.zIndex = pages.length - idx;

    var inner = document.createElement('div');
    inner.className = 'page page-front';
    inner.appendChild(buildPageContent(pageData));

    leaf.appendChild(inner);
    book.appendChild(leaf);
    leaves.push(leaf);
  });

  function buildPageContent(pageData) {
    if (pageData.type === 'cover') {
      var div = document.createElement('div');
      div.className = 'cover-content';
      div.innerHTML = '<div class="cover-line"></div><h2>Physics<br>Pictionary</h2><h3>A to Z</h3><div class="cover-line"></div><div class="cover-tag">Atul Soral Physicism</div>';
      return div;
    } else if (pageData.type === 'image') {
      var img = document.createElement('img');
      img.src = pageData.src;
      img.alt = pageData.label + ' is for ' + (WORDS[pageData.label] || '') + ' Physics';
      img.draggable = false;
      img.setAttribute('oncontextmenu', 'return false');
      img.onerror = function() {
        var parent = this.parentNode;
        parent.innerHTML = '<div class="page-placeholder"><div class="big-letter">' + pageData.label + '</div><div class="placeholder-text">' + pageData.label + ' is for ' + (WORDS[pageData.label] || '') + ' Physics</div></div>';
      };
      return img;
    }
  }

  // SIDEBAR
  var sidebar = document.getElementById('sidebar');
  var idxButtons = [];

  var coverBtn = document.createElement('button');
  coverBtn.className = 'idx-btn cover-btn active';
  coverBtn.textContent = '\u2302';
  coverBtn.title = 'Cover';
  coverBtn.addEventListener('click', function() { goToPage(0); });
  sidebar.appendChild(coverBtn);
  idxButtons.push({ btn: coverBtn, label: 'Cover' });

  for (var i = 0; i < 26; i++) {
    (function(idx) {
      var letter = ALPHABET[idx];
      var btn = document.createElement('button');
      btn.className = 'idx-btn';
      btn.textContent = letter;
      btn.title = letter + ' is for ' + (WORDS[letter] || '');
      btn.addEventListener('click', function() {
        var pageIdx = labelToPage[letter];
        if (pageIdx !== undefined) goToPage(pageIdx);
      });
      sidebar.appendChild(btn);
      idxButtons.push({ btn: btn, label: letter });
    })(i);
  }

  // STATE
  var currentPage = 0;
  var isAnimating = false;

  function getVisibleLabel() {
    return pages[currentPage] ? pages[currentPage].label : 'Cover';
  }

  function updateState() {
    document.getElementById('prevBtn').disabled = currentPage === 0;
    document.getElementById('nextBtn').disabled = currentPage >= pages.length - 1;

    var lbl = getVisibleLabel();
    var info = document.getElementById('pageInfo');
    info.textContent = currentPage === 0 ? 'Cover' : lbl + '  \u00b7  ' + currentPage + ' / ' + (pages.length - 1);

    idxButtons.forEach(function(item) {
      item.btn.classList.toggle('active', item.label === lbl);
    });
  }

  function goToPage(targetPageIdx) {
    if (isAnimating) return;
    if (targetPageIdx === currentPage) return;

    isAnimating = true;

    // Flip pages in between
    if (targetPageIdx > currentPage) {
      for (var i = currentPage; i < targetPageIdx; i++) {
        leaves[i].className = 'leaf flipped';
      }
    } else {
      for (var i = currentPage - 1; i >= targetPageIdx; i--) {
        leaves[i].className = 'leaf active';
      }
    }

    currentPage = targetPageIdx;

    // Set all other pages correctly
    leaves.forEach(function(leaf, i) {
      if (i < currentPage) {
        leaf.className = 'leaf flipped';
        leaf.style.zIndex = i + 1;
      } else if (i === currentPage) {
        leaf.className = 'leaf active';
        leaf.style.zIndex = 10;
      } else {
        leaf.className = 'leaf waiting';
        leaf.style.zIndex = pages.length - i;
      }
    });

    setTimeout(function() {
      isAnimating = false;
      updateState();
    }, 550);

    updateState();
  }

  function flipForward() {
    if (currentPage >= pages.length - 1 || isAnimating) return;
    isAnimating = true;
    leaves[currentPage].className = 'leaf flipped';
    currentPage++;
    leaves[currentPage].className = 'leaf active';
    leaves[currentPage].style.zIndex = 10;

    setTimeout(function() {
      isAnimating = false;
      updateState();
    }, 550);

    updateState();
  }

  function flipBackward() {
    if (currentPage === 0 || isAnimating) return;
    isAnimating = true;
    leaves[currentPage].className = 'leaf waiting';
    currentPage--;
    leaves[currentPage].className = 'leaf active';
    leaves[currentPage].style.zIndex = 10;

    setTimeout(function() {
      isAnimating = false;
      updateState();
    }, 550);

    updateState();
  }

  leaves.forEach(function(leaf, idx) {
    leaf.addEventListener('click', function() {
      if (idx === currentPage) flipForward();
    });
  });

  document.getElementById('nextBtn').addEventListener('click', flipForward);
  document.getElementById('prevBtn').addEventListener('click', flipBackward);

  document.addEventListener('keydown', function(e) {
    if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); flipForward(); }
    if (e.key === 'ArrowLeft') { e.preventDefault(); flipBackward(); }
  });

  var touchStartX = 0;
  book.addEventListener('touchstart', function(e) { touchStartX = e.touches[0].clientX; }, { passive: true });
  book.addEventListener('touchend', function(e) {
    var dx = e.changedTouches[0].clientX - touchStartX;
    if (Math.abs(dx) > 40) { dx < 0 ? flipForward() : flipBackward(); }
  }, { passive: true });

  function autoSizeBook() {
    var sidebarW = window.innerWidth > 700 ? 80 : 0;
    var maxH = window.innerHeight - 160;
    var maxW = window.innerWidth - sidebarW - 100;
    var ratio = 1.42; // landscape ratio (width > height)
    var w = maxW;
    var h = w / ratio;
    if (h > maxH) { h = maxH; w = h * ratio; }
    document.documentElement.style.setProperty('--book-width', w + 'px');
    document.documentElement.style.setProperty('--book-height', h + 'px');
  }
  autoSizeBook();
  window.addEventListener('resize', autoSizeBook);

  document.addEventListener('contextmenu', function(e) { e.preventDefault(); });
  document.addEventListener('dragstart', function(e) { e.preventDefault(); });

  // Initialize first page
  leaves.forEach(function(leaf, i) {
    if (i === 0) {
      leaf.className = 'leaf active';
      leaf.style.zIndex = 10;
    } else {
      leaf.className = 'leaf waiting';
      leaf.style.zIndex = pages.length - i;
    }
  });

  updateState();
})();
</script>

</body>
</html>
