<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Exam Practice | Physicism</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

body{
  margin:0;
  font-family:Arial;
  background:#0f172a;
  color:white;
}

/* NAV */
.nav{
  display:flex;
  gap:10px;
  padding:15px;
}

.nav button{
  background:#1e293b;
  border:none;
  padding:10px 15px;
  border-radius:8px;
  color:white;
  cursor:pointer;
}

/* HERO */
.hero{
  text-align:center;
  padding:40px;
  background:linear-gradient(135deg,#06b6d4,#2563eb);
}

/* FILTERS */
.filters{
  display:flex;
  flex-wrap:wrap;
  gap:20px;
  padding:30px;
  justify-content:center;
}

select{
  padding:15px;
  border-radius:10px;
  border:none;
  font-size:16px;
  min-width:200px;
}

/* BUTTON */
.start-btn{
  padding:15px 25px;
  background:#22c55e;
  border:none;
  border-radius:10px;
  font-size:18px;
  cursor:pointer;
}

/* QUIZ */
.quiz{
  max-width:900px;
  margin:auto;
  padding:30px;
}

.question{
  background:#1e293b;
  padding:20px;
  margin-bottom:20px;
  border-radius:10px;
}

textarea{
  width:100%;
  padding:10px;
  margin-top:10px;
  border-radius:8px;
  border:none;
}

/* SUBMIT */
.submit-btn{
  width:100%;
  padding:15px;
  font-size:18px;
  background:#3b82f6;
  border:none;
  border-radius:10px;
  cursor:pointer;
}

</style>
</head>

<body>

<!-- NAV -->
<div class="nav">
  <button onclick="history.back()">⬅ Back</button>
  <button onclick="location.href='./index.html'">🏠 Home</button>
  <button onclick="location.href='./myp-dashboard.html'">📘 MYP</button>
</div>

<!-- HERO -->
<div class="hero">
  <h1>📝 Exam Practice</h1>
  <p>Select filters and generate your test</p>
</div>

<!-- FILTERS -->
<div class="filters">

<select id="chapter">
  <option value="">Select Chapter</option>
  <option value="waves">Waves</option>
  <option value="atomic">Atomic Physics</option>
  <option value="electromagnetism">Electromagnetism</option>
  <option value="forces">Forces</option>
</select>

<select id="criterion">
  <option value="">Criterion</option>
  <option value="A">A</option>
  <option value="B">B</option>
  <option value="C">C</option>
  <option value="D">D</option>
</select>

<select id="level">
  <option value="">Difficulty</option>
  <option value="easy">Easy</option>
  <option value="medium">Medium</option>
  <option value="hard">Hard</option>
</select>

<button class="start-btn" onclick="startExam()">Start</button>

</div>

<!-- QUIZ -->
<div class="quiz" id="quiz"></div>

<button class="submit-btn" onclick="submitExam()" id="submitBtn" style="display:none">
Submit & Download PDF
</button>

<script src="./quiz/question-bank.js"></script>

<script>

let examQuestions = [];
let startTime;

/* START */
function startExam(){

  const chapter = document.getElementById("chapter").value;
  const criterion = document.getElementById("criterion").value;
  const level = document.getElementById("level").value;

  let filtered = questionBank.filter(q => 
    (!chapter || q.topic === chapter) &&
    (!criterion || q.criterion === criterion) &&
    (!level || q.level === level)
  );

  if(filtered.length === 0){
    alert("🚧 Coming soon!");
    return;
  }

  examQuestions = filtered;
  startTime = new Date();

  renderQuestions();
}

/* RENDER */
function renderQuestions(){

  const container = document.getElementById("quiz");
  container.innerHTML = "";

  examQuestions.forEach((q,i)=>{
    container.innerHTML += `
      <div class="question">
        <b>Q${i+1}. ${q.question}</b>
        <textarea id="ans${i}" placeholder="Write your answer..."></textarea>
      </div>
    `;
  });

  document.getElementById("submitBtn").style.display="block";
}

/* SUBMIT */
function submitExam(){

  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();

  let y = 10;

  const endTime = new Date();
  const duration = Math.round((endTime - startTime)/1000);

  doc.text("IB MYP Physics - Exam Practice",10,y); y+=10;
  doc.text(`Time Taken: ${duration} sec`,10,y); y+=10;

  examQuestions.forEach((q,i)=>{
    const ans = document.getElementById(`ans${i}`).value;

    doc.text(`Q${i+1}: ${q.question}`,10,y); y+=8;
    doc.text(`Answer: ${ans}`,10,y); y+=10;

    if(y>270){ doc.addPage(); y=10; }
  });

  doc.save("Physics_Test.pdf");
}

</script>

</body>
</html>
