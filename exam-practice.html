<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Exam Practice</title>

<style>
body{margin:0;font-family:Arial;background:#0f172a;color:white}

header{
  padding:40px;
  text-align:center;
  background:linear-gradient(135deg,#06b6d4,#2563eb);
}

.container{padding:30px}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:20px;
}

.card{
  background:#1e293b;
  padding:20px;
  border-radius:10px;
  text-align:center;
  cursor:pointer;
}

select,button{
  margin:10px;
  padding:10px;
  border-radius:6px;
}
</style>
</head>

<body>

<header>
<h1>📘 Exam Practice</h1>
<p>Select chapter + criteria</p>
</header>

<div class="container">

<!-- FILTERS -->
<div>
<select id="topic">
  <option value="waves">Waves</option>
  <option value="atomic">Atomic Physics</option>
  <option value="electromagnetism">Electromagnetism</option>
</select>

<select id="criterion">
  <option value="A">Criterion A</option>
  <option value="B">Criterion B</option>
  <option value="C">Criterion C</option>
  <option value="D">Criterion D</option>
</select>

<select id="difficulty">
  <option value="easy">Easy</option>
  <option value="medium">Medium</option>
  <option value="hard">Hard</option>
</select>

<button onclick="startExam()">Start Exam</button>
</div>

</div>

<script>
function startExam(){
  const topic = document.getElementById("topic").value;
  const criterion = document.getElementById("criterion").value;
  const difficulty = document.getElementById("difficulty").value;

  window.location.href =
    `exam.html?topic=${topic}&criterion=${criterion}&difficulty=${difficulty}`;
}
</script>

</body>
</html>
