<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Atomic Physics</title>

<style>
body{
margin:0;
font-family:Segoe UI;
background:#0f172a;
color:white;
}

header{
background:linear-gradient(135deg,#06b6d4,#2563eb);
padding:60px;
text-align:center;
}

nav{
background:#111827;
padding:12px;
text-align:center;
}

nav a{
color:white;
margin:0 15px;
text-decoration:none;
font-weight:bold;
}

.container{
max-width:1200px;
margin:auto;
padding:20px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:18px;
}

.card{
background:#1e293b;
border-radius:12px;
padding:10px;
text-align:center;
cursor:pointer;
transition:0.3s;
}

.card:hover{
transform:scale(1.05);
}

.card img{
width:100%;
height:150px;
object-fit:contain;
background:#000;
border-radius:8px;
}

.title{
margin-top:8px;
font-size:14px;
color:#cbd5f5;
}

/* LIGHTBOX */
#viewer{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.95);
display:none;
flex-direction:column;
align-items:center;
justify-content:center;
}

#viewer img{
max-width:90%;
max-height:80%;
}

.controls{
margin-top:10px;
}

button{
margin:5px;
padding:8px 12px;
border:none;
border-radius:6px;
cursor:pointer;
}

.download{background:#22c55e;}
.close{background:#ef4444;}
</style>
</head>

<body>

<header>
<h1>Atomic Physics</h1>
<p>Visual Notes • Atul Soral Physicism</p>
</header>

<nav>
<a href="index.html">Home</a>
<a href="myp.html">MYP</a>
<a href="dp.html">DP</a>
</nav>

<div class="container">

<div class="grid">

const container = document.querySelector(".grid");

images.forEach(img=>{

`;

</div>
</div>

<!-- VIEWER -->
<div id="viewer">
<img id="fullImg">
<div class="controls">
<button class="download" onclick="downloadImg()">Download</button>
<button class="close" onclick="closeImg()">Close</button>
</div>
</div>

<script>
let currentImg="";

function openImg(src){
currentImg = src;
document.getElementById("viewer").style.display="flex";
document.getElementById("fullImg").src=src;
}

function closeImg(){
document.getElementById("viewer").style.display="none";
}

function downloadImg(){
let a=document.createElement("a");
a.href=currentImg;
a.download="";
a.click();
}
</script>

</body>
</html>
