<style>
body{
  margin:0;
  font-family: 'Segoe UI', sans-serif;
  background:#0f172a;
  color:white;
}

/* HEADER */
header{
  background:linear-gradient(135deg,#06b6d4,#2563eb);
  padding:60px 20px;
  text-align:center;
}

header h1{
  margin:0;
  font-size:42px;
}

header p{
  margin-top:10px;
  font-size:18px;
}

/* NAV */
nav{
  background:#111827;
  padding:12px;
  text-align:center;
}

nav a{
  color:white;
  text-decoration:none;
  margin:0 15px;
  font-weight:bold;
  transition:0.3s;
}

nav a:hover{
  color:#38bdf8;
}

/* CONTAINER */
.container{
  max-width:1100px;
  margin:auto;
  padding:30px 15px;
}

/* CARD */
.card{
  background:#1e293b;
  margin-bottom:30px;
  border-radius:18px;
  padding:20px;
  box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

.card h2{
  color:#38bdf8;
  margin-top:0;
}

/* IMAGE */
.img-box{
  overflow:hidden;
  border-radius:12px;
  margin-top:15px;
  cursor:pointer;
}

.img-box img{
  width:100%;
  transition:0.4s;
}

.img-box:hover img{
  transform:scale(1.05);
}

/* LIGHTBOX */
#lightbox{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.9);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:1000;
}

#lightbox img{
  max-width:90%;
  max-height:90%;
  border-radius:12px;
}

/* FOOTER */
footer{
  text-align:center;
  padding:25px;
  background:#111827;
  color:#94a3b8;
}
</style>
