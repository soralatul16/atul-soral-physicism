<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Atomic Physics | Atul Soral Physicism</title>

<style>
body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:#0f172a;
  color:white;
}

/* HEADER */
header{
  background:linear-gradient(135deg,#06b6d4,#2563eb);
  padding:60px 20px;
  text-align:center;
}

header h1{
  margin:0;
  font-size:40px;
}

/* NAV */
nav{
  background:#111827;
  padding:12px;
  text-align:center;
}

nav a{
  color:white;
  margin:0 15px;
  text-decoration:none;
  font-weight:bold;
}

/* CONTAINER */
.container{
  max-width:1200px;
  margin:auto;
  padding:25px;
}

/* CARD */
.card{
  background:#1e293b;
  margin-bottom:30px;
  padding:20px;
  border-radius:16px;
}

/* GRID */
.img-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:15px;
  margin-top:15px;
}

/* IMAGE BOX */
.img-box{
  background:#000;
  border-radius:10px;
  overflow:hidden;
  cursor:pointer;
  padding:8px;
}

.img-box img{
  width:100%;
  height:180px;
  object-fit:contain; /* ensures full image visible */
  transition:0.3s;
}

.img-box:hover img{
  transform:scale(1.05);
}

/* LIGHTBOX */
#lightbox{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.95);
  display:none;
  justify-content:center;
  align-items:center;
}

#lightbox img{
  max-width:90%;
  max-height:90%;
  border-radius:10px;
}

/* FOOTER */
footer{
  text-align:center;
  padding:20px;
  background:#111827;
  color:#aaa;
}
</style>

</head>
<body>

<header>
<h1>Atomic Physics</h1>
<p>Atul Soral Physicism</p>
</header>

<nav>
<a href="#">Home</a>
<a href="#">MYP</a>
<a href="#">DP</a>
</nav>

<div class="container">

<div class="img-box"><img src="Images/4-rutherford-atomic-model.png" onclick="openImg(this.src)"></div>

</div>
</div>

<!-- HALF LIFE -->

<!-- APPLICATION -->

</div>
</div>

</div>

<!-- LIGHTBOX -->
<div id="lightbox" onclick="closeImg()">
<img id="lightbox-img">
</div>

<footer>
© 2026 Atul Soral Physicism
</footer>

<script>
function openImg(src){
  document.getElementById("lightbox").style.display="flex";
  document.getElementById("lightbox-img").src=src;
}

function closeImg(){
  document.getElementById("lightbox").style.display="none";
}
</script>

</body>
</html>
