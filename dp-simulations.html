<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Physics Simulators | Atul Soral Physicism</title>
<meta name="description" content="Interactive physics simulators for IB DP students. Explore, adjust, and discover physics concepts through hands-on experiments.">
<style>
:root {
  --bg: #0b1120;
  --bg-deep: #060d1a;
  --surface: rgba(15, 23, 42, 0.85);
  --surface2: rgba(30, 41, 59, 0.6);
  --white: #f1f5f9;
  --text: #e2e8f0;
  --text2: #94a3b8;
  --text3: #64748b;
  --cyan: #06b6d4;
  --cyan-dim: #0891b2;
  --cyan-glow: rgba(6, 182, 212, 0.12);
  --cyan-border: rgba(6, 182, 212, 0.15);
  --cyan-hover: rgba(6, 182, 212, 0.25);
  --border: rgba(255, 255, 255, 0.04);
  --r: 16px;
  --r-lg: 22px;
  --font-brand: Georgia, 'Palatino Linotype', 'Book Antiqua', Palatino, serif;
  --font-body: -apple-system, 'Segoe UI', system-ui, sans-serif;
  --font-mono: 'SF Mono', 'Cascadia Code', 'Consolas', monospace;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: var(--font-body);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  overflow-x: hidden;
  font-size: 14px;
  line-height: 1.6;
}

/* ═══ AMBIENT GRID ═══ */
.grid-bg {
  position: fixed; inset: 0; z-index: 0; pointer-events: none; opacity: 0.03;
  background:
    linear-gradient(rgba(6,182,212,0.5) 1px, transparent 1px),
    linear-gradient(90deg, rgba(6,182,212,0.5) 1px, transparent 1px);
  background-size: 60px 60px;
  mask-image: radial-gradient(ellipse 60% 50% at 50% 30%, black 10%, transparent 80%);
}

/* ═══ SIDEBAR ═══ */
.sidebar {
  width: 260px;
  background: linear-gradient(180deg, #0e1a2e 0%, #0b1528 50%, #081020 100%);
  border-right: 1px solid var(--cyan-border);
  height: 100vh;
  overflow-y: auto;
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  position: sticky;
  top: 0;
  z-index: 10;
}
.sb-head {
  padding: 24px 20px 16px;
  border-bottom: 1px solid rgba(6,182,212,0.08);
}
.sb-icon { font-size: 28px; margin-bottom: 6px; display: block; }
.sb-title {
  font-family: var(--font-brand);
  font-size: 18px;
  font-weight: 700;
  color: var(--text);
  letter-spacing: -0.01em;
}
.sb-sub {
  font-size: 10px;
  color: var(--text3);
  letter-spacing: 1px;
  text-transform: uppercase;
  margin-top: 2px;
}
.sb-section {
  font-size: 9px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 2px;
  color: var(--text3);
  padding: 18px 20px 6px;
}
.sb-list { flex: 1; padding: 0 10px; }
.sb-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 12px;
  margin: 2px 0;
  border-radius: 10px;
  text-decoration: none;
  color: var(--text2);
  font-size: 12.5px;
  font-weight: 500;
  transition: all 0.2s;
  cursor: pointer;
}
.sb-item:hover {
  background: var(--cyan-glow);
  color: var(--text);
}
.sb-item-icon { font-size: 16px; flex-shrink: 0; }
.sb-item-info { flex: 1; min-width: 0; }
.sb-item-title { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.sb-item-tag {
  font-size: 9px;
  font-weight: 700;
  color: var(--cyan);
  background: rgba(6,182,212,0.1);
  padding: 1px 6px;
  border-radius: 50px;
  flex-shrink: 0;
}
.sb-back {
  display: block;
  padding: 16px 20px;
  text-decoration: none;
  font-size: 12px;
  color: var(--text3);
  border-top: 1px solid rgba(6,182,212,0.06);
  margin-top: auto;
  transition: color 0.2s;
}
.sb-back:hover { color: var(--cyan); }

/* ═══ MAIN ═══ */
.main {
  flex: 1;
  display: flex;
  flex-direction: column;
  min-width: 0;
  position: relative;
  z-index: 1;
}

/* ═══ TOPBAR ═══ */
.topbar {
  height: 56px;
  background: var(--surface);
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 28px;
  gap: 12px;
  position: sticky;
  top: 0;
  z-index: 50;
}
.topbar-brand {
  font-family: var(--font-brand);
  font-size: 15px;
  font-weight: 600;
  color: var(--text);
  text-decoration: none;
}
.topbar-brand span { color: var(--cyan); }
.topbar-dot {
  width: 7px; height: 7px;
  background: var(--cyan);
  border-radius: 50%;
  display: inline-block;
  margin-right: 6px;
  box-shadow: 0 0 10px var(--cyan), 0 0 20px rgba(6,182,212,0.3);
  animation: dotPulse 2s ease infinite;
}
@keyframes dotPulse {
  0%, 100% { opacity: 1; box-shadow: 0 0 10px var(--cyan); }
  50% { opacity: 0.6; box-shadow: 0 0 20px var(--cyan), 0 0 40px rgba(6,182,212,0.2); }
}
.nav-spacer { flex: 1; }
.nav-links { display: flex; gap: 6px; }
.nav-btn {
  padding: 6px 16px;
  border-radius: 50px;
  font-size: 11.5px;
  font-weight: 600;
  color: var(--cyan);
  text-decoration: none;
  background: rgba(6, 182, 212, 0.06);
  border: 1px solid var(--cyan-border);
  transition: all 0.2s;
}
.nav-btn:hover {
  background: var(--cyan-glow);
  border-color: rgba(6, 182, 212, 0.3);
  box-shadow: 0 0 12px rgba(6, 182, 212, 0.08);
  transform: translateY(-1px);
}

/* ═══ CONTENT ═══ */
.content-area {
  flex: 1;
  overflow-y: auto;
  padding: 0 0 80px;
}

/* ═══ HERO ═══ */
.hero {
  max-width: 900px;
  margin: 0 auto;
  padding: 48px 32px 32px;
  text-align: center;
}
.hero-badge {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  font-family: var(--font-mono);
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--cyan);
  background: rgba(6,182,212,0.08);
  border: 1px solid var(--cyan-border);
  padding: 5px 16px;
  border-radius: 50px;
  margin-bottom: 18px;
}
.hero-badge::before {
  content: '';
  width: 6px; height: 6px;
  background: var(--cyan);
  border-radius: 50%;
  box-shadow: 0 0 8px var(--cyan);
  animation: dotPulse 2s ease infinite;
}
.hero h1 {
  font-family: var(--font-brand);
  font-size: 36px;
  font-weight: 700;
  color: var(--text);
  line-height: 1.15;
  letter-spacing: -0.02em;
  margin-bottom: 10px;
}
.hero h1 em {
  font-style: normal;
  color: transparent;
  background: linear-gradient(135deg, #06b6d4, #22d3ee, #67e8f9);
  -webkit-background-clip: text;
  background-clip: text;
}
.hero-sub {
  font-size: 15px;
  color: var(--text2);
  line-height: 1.7;
  max-width: 520px;
  margin: 0 auto;
}

/* ═══ SIM GRID ═══ */
.sim-grid-wrap {
  max-width: 900px;
  margin: 0 auto;
  padding: 0 32px;
}
.sim-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 18px;
}

/* ═══ SIM CARD ═══ */
.sim-card {
  background: var(--surface);
  backdrop-filter: blur(12px);
  border: 1.5px solid var(--border);
  border-radius: var(--r-lg);
  padding: 26px;
  display: flex;
  flex-direction: column;
  gap: 12px;
  text-decoration: none;
  color: var(--text);
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  position: relative;
  overflow: hidden;
  cursor: pointer;
}
.sim-card::before {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(circle at 80% 20%, rgba(6,182,212,0.06) 0%, transparent 60%);
  opacity: 0;
  transition: opacity 0.3s;
}
.sim-card:hover::before { opacity: 1; }
.sim-card:hover {
  border-color: rgba(6,182,212,0.2);
  transform: translateY(-4px);
  box-shadow:
    0 8px 32px rgba(0, 0, 0, 0.3),
    0 0 0 1px rgba(6, 182, 212, 0.1),
    0 0 40px rgba(6, 182, 212, 0.04);
}
.sim-card:hover .sc-arrow { opacity: 1; transform: translateX(3px); }
.sim-card:hover .sc-icon { transform: scale(1.08); box-shadow: 0 0 20px rgba(6, 182, 212, 0.12); }

.sc-top { display: flex; align-items: flex-start; justify-content: space-between; position: relative; z-index: 1; }
.sc-icon {
  width: 50px; height: 50px;
  border-radius: 14px;
  background: linear-gradient(135deg, rgba(6,182,212,0.12), rgba(6,182,212,0.04));
  border: 1px solid rgba(6,182,212,0.15);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 24px;
  transition: all 0.3s;
}
.sc-arrow {
  width: 30px; height: 30px;
  border-radius: 50%;
  background: rgba(6,182,212,0.08);
  border: 1px solid rgba(6,182,212,0.12);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
  color: var(--cyan);
  opacity: 0.4;
  transition: all 0.3s;
}
.sc-title {
  font-family: var(--font-brand);
  font-size: 17px;
  font-weight: 700;
  color: var(--text);
  position: relative;
  z-index: 1;
}
.sc-desc {
  font-size: 13px;
  color: var(--text2);
  line-height: 1.65;
  position: relative;
  z-index: 1;
}
.sc-bottom { display: flex; align-items: center; gap: 8px; margin-top: auto; position: relative; z-index: 1; }
.sc-badge {
  font-size: 10px;
  font-weight: 700;
  font-family: var(--font-mono);
  color: var(--cyan);
  background: rgba(6,182,212,0.1);
  border: 1px solid rgba(6,182,212,0.15);
  padding: 3px 10px;
  border-radius: 50px;
}
.sc-topic-name {
  font-size: 11px;
  color: var(--text3);
}

/* ═══ EMPTY STATE ═══ */
.empty-state {
  text-align: center;
  padding: 60px 20px;
  color: var(--text3);
}
.empty-state p { font-size: 14px; margin-top: 8px; }

/* ═══ FLOATING BUTTONS ═══ */
.fl {
  position: fixed;
  width: 48px; height: 48px;
  border-radius: 50%;
  border: none;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  z-index: 100;
  transition: transform 0.2s;
}
.fl:hover { transform: scale(1.1); }
.fl-fb {
  bottom: 28px; right: 28px;
  background: linear-gradient(135deg, #ef4444, #dc2626);
  color: white;
  box-shadow: 0 4px 20px rgba(239,68,68,0.4);
}
.fl-ai {
  bottom: 84px; right: 28px;
  background: linear-gradient(135deg, #06b6d4, #0891b2);
  color: white;
  box-shadow: 0 4px 20px rgba(6,182,212,0.4);
}

/* ═══ RESPONSIVE ═══ */
@media (max-width: 768px) {
  .sidebar { display: none; }
  .hero { padding: 32px 20px 24px; }
  .hero h1 { font-size: 28px; }
  .sim-grid-wrap { padding: 0 16px; }
  .sim-grid { grid-template-columns: 1fr; }
  .topbar { padding: 0 16px; }
  .nav-links .nav-btn:not(:first-child) { display: none; }
}

/* ═══ PRINT ═══ */
@media print {
  .sidebar, .topbar, .fl { display: none; }
  body { background: white; color: black; }
  .sim-card { border: 1px solid #ddd; break-inside: avoid; }
}
</style>
</head>
<body>

<div class="grid-bg"></div>

<!-- SIDEBAR -->
<div class="sidebar">
  <div class="sb-head">
    <span class="sb-icon">⚡</span>
    <div class="sb-title">Simulators</div>
    <div class="sb-sub">Interactive Physics Lab</div>
  </div>
  <div class="sb-section">All Simulators</div>
  <div class="sb-list" id="sidebarList">
    <!-- auto-populated from dp-sims.js -->
  </div>
  <a class="sb-back" href="index.html">← Home</a>
</div>

<!-- MAIN -->
<div class="main">
  <div class="topbar">
    <a href="index.html" class="topbar-brand">
      <span class="topbar-dot"></span> Atul Soral <span>Physicism</span>
    </a>
    <div class="nav-spacer"></div>
    <div class="nav-links">
      <a href="dp-simulations.html" class="nav-btn">← Back</a>
      <a href="index.html" class="nav-btn">Home</a>
      <a href="myp-dashboard.html" class="nav-btn">MYP</a>
      <a href="dp-dashboard.html" class="nav-btn">DP</a>
    </div>
  </div>

  <div class="content-area">
    <!-- HERO -->
    <div class="hero">
      <div class="hero-badge">Interactive Physics Lab</div>
      <h1>Physics <em>Simulators</em></h1>
      <p class="hero-sub">Explore, adjust, and discover. Every simulator lets you interact with real physics — change variables, observe effects, build intuition.</p>
    </div>

    <!-- GRID -->
    <div class="sim-grid-wrap">
      <div class="sim-grid" id="simGrid">
        <!-- auto-populated from dp-sims.js -->
      </div>
    </div>
  </div>
</div>

<!-- FLOATING BUTTONS -->
<button class="fl fl-ai" title="AI Tutor">🧠</button>
<button class="fl fl-fb" title="Feedback">💬</button>

<script src="js/dp-sims.js"></script>
<script>
// Populate sidebar + grid from DP_SIMS
function renderSimulators() {
  const sidebar = document.getElementById('sidebarList');
  const grid = document.getElementById('simGrid');

  if (!DP_SIMS || DP_SIMS.length === 0) {
    grid.innerHTML = '<div class="empty-state"><p>No simulators available yet. Check back soon!</p></div>';
    return;
  }

  // Sidebar
  sidebar.innerHTML = DP_SIMS.map(sim => `
    <a class="sb-item" href="${sim.file}">
      <span class="sb-item-icon">${sim.icon}</span>
      <span class="sb-item-info">
        <span class="sb-item-title">${sim.title}</span>
      </span>
      <span class="sb-item-tag">${sim.topic}</span>
    </a>
  `).join('');

  // Grid
  grid.innerHTML = DP_SIMS.map(sim => `
    <a class="sim-card" href="${sim.file}">
      <div class="sc-top">
        <div class="sc-icon">${sim.icon}</div>
        <div class="sc-arrow">→</div>
      </div>
      <div class="sc-title">${sim.title}</div>
      <div class="sc-desc">${sim.description}</div>
      <div class="sc-bottom">
        <span class="sc-badge">${sim.topic}</span>
        <span class="sc-topic-name">${sim.topicName}</span>
      </div>
    </a>
  `).join('');
}

renderSimulators();
</script>
</body>
</html>
