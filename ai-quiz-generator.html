<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Quiz Generator</title>

<!-- GOOGLE ANALYTICS -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-H0FWC22D8S"></script>
<script>
window.dataLayer = window.dataLayer || [];

<style>
body{
  font-family:Arial;
  background:#0f172a;
  color:white;
  text-align:center;
}

.container{
  max-width:700px;
  margin:auto;
  padding:20px;
}

input,button{
  padding:10px;
  margin:10px;
  border-radius:6px;
  border:none;
}

button{
  background:#22c55e;
  color:white;
  cursor:pointer;
}
</style>
</head>

<body>

<h1>🤖 AI Quiz Generator</h1>

<div class="container">

<input id="apiKey" placeholder="Enter OpenAI API Key" size="40"><br>

<input id="topic" placeholder="Enter Topic (e.g. Waves)" size="30"><br>

<input id="count" type="number" value="10"><br>

<button onclick="generate()">Generate Questions</button>

<pre id="output"></pre>

</div>

<script>

async function generate(){

let key = document.getElementById("apiKey").value;
let topic = document.getElementById("topic").value;
let count = document.getElementById("count").value;

let prompt = `
Generate ${count} IB MYP Physics MCQs on ${topic}.

Rules:
- 4 options (A,B,C,D)
- Balanced answers (~25% each A,B,C,D)
- Conceptual + numerical mix
- Output STRICT JSON:

[
  ["Question?", ["A","B","C","D"], correct_index],
  ...
]
`;

let res = await fetch("https://api.openai.com/v1/chat/completions",{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":"Bearer "+key
},
body:JSON.stringify({
model:"gpt-4.1-mini",
messages:[{role:"user",content:prompt}]
})
});

let data = await res.json();

let text = data.choices[0].message.content;

document.getElementById("output").textContent = text;

}

</script>

</body>
</html>
