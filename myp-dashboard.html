<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MYP Dashboard | Atul Soral Physicism</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f172a;
  color:white;
}

/* NAVBAR */
.navbar{
  display:flex;
  justify-content:space-between;
  padding:15px 30px;
  background:#020617;
}

.nav-links a{
  margin-left:20px;
  color:white;
  text-decoration:none;
}

/* HERO */
.hero{
  background:linear-gradient(135deg,#06b6d4,#2563eb);
  padding:50px;
  text-align:center;
}

/* SECTION */
.section{
  padding:40px;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:20px;
}

/* CARD */
.card{
  background:#1e293b;
  padding:20px;
  border-radius:10px;
  text-align:center;
  cursor:pointer;
  transition:0.3s;
}

.card:hover{
  transform:scale(1.05);
}

/* READY CHAPTER */
.ready{
  text-decoration:underline;
  color:#38bdf8;
}

/* LOCKED */
.locked{
  opacity:0.6;
}
</style>
</head>

<body>

<div class="navbar">
  <div><b>MYP Physics</b></div>
  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="#">Flashcards</a>
    <a href="#">IA Generator</a>
    <a href="#">Formula Bank</a>
  </div>
</div>

<div class="hero">
  <h1>IB MYP Physics Dashboard</h1>
  <p>Everything you need to master MYP Physics</p>
</div>

<!-- 🧠 QUIZ SECTION -->
<div class="section">
<h2>🧠 Practice</h2>

<div class="grid">

<div class="card ready" onclick="location.href='myp-quiz.html'">
❓ Quiz Practice
</div>

<div class="card locked" onclick="alert('🚧 Flashcards coming soon!')">
🧠 Flashcards
</div>

<div class="card locked" onclick="alert('🚧 Formula bank coming soon!')">
📊 Formula Bank
</div>

</div>
</div>

<!-- 📚 TOPICS -->
<div class="section">

<h2>📚 MYP Topics</h2>

<div class="grid" id="topics"></div>

</div>

<script>

/* CHAPTER STATUS */
const chapters = [
  {name:"Exploring Matter", key:"matter", ready:false},
  {name:"Forces and Motion", key:"forces", ready:false},
  {name:"Work, Power & Gravity", key:"workpower", ready:false},
  {name:"Energy & Environment", key:"energy", ready:false},
  {name:"The Nature of Waves", key:"waves", ready:true},
  {name:"Atomic Physics", key:"atomic", ready:true},
  {name:"Electromagnetism", key:"electromagnetism", ready:true},
  {name:"Thermal Physics", key:"thermal", ready:false},
  {name:"Astrophysics", key:"astro", ready:false}
];

const container = document.getElementById("topics");

chapters.forEach(ch => {

  const div = document.createElement("div");
  div.className = "card";

  if(ch.ready){
    div.classList.add("ready");
    div.onclick = () => {
      window.location.href = `chapter.html?topic=${ch.key}`;
    };
  } else {
    div.classList.add("locked");
    div.onclick = () => {
      alert("🚧 This chapter is coming soon!");
    };
  }

  div.innerText = ch.name;
  container.appendChild(div);
});

</script>

</body>
</html>
