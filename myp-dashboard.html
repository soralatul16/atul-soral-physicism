<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MYP Dashboard</title>

<style>
body{
  margin:0;
  font-family:'Segoe UI', sans-serif;
  color:white;

  /* 🔥 BACKGROUND IMAGE */
  background:linear-gradient(rgba(20,8,8,0.9), rgba(20,8,8,0.95)),
  url("YOUR-IMAGE.jpg");
  background-size:cover;
  background-attachment:fixed;
}

/* NAVBAR */
.navbar{
  display:flex;
  justify-content:space-between;
  padding:15px 30px;
  background:#2b0d0d;
}

/* HERO */
.hero{
  background:linear-gradient(135deg,#ef4444,#7f1d1d);
  padding:60px;
  text-align:center;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:20px;
  padding:40px;
}

/* CARD */
.card{
  background:#2b0d0d;
  padding:20px;
  border-radius:12px;
  text-align:center;
  cursor:pointer;
}

/* TOPICS */
.topic{
  background:#2b0d0d;
  padding:15px;
  border-radius:10px;
  text-align:center;
  color:white;
  cursor:pointer;
}

.locked{opacity:0.4;}

</style>
</head>

<body>

<div class="navbar">
<b>🔴 MYP Physics</b>
<div>
<a href="index.html" style="color:white">Home</a>
</div>
</div>

<div class="hero">
<h1>IB MYP Physics Dashboard</h1>
<p>Practice • Performance • Progress</p>
</div>

<!-- PRACTICE -->
<div class="grid">

<div class="card" onclick="location.href='./exam-system/students.html'">
📝 Student Practice
</div>

<div class="card" onclick="location.href='./exam-system/dashboard.html'">
📊 Analytics
</div>

<!-- 🔐 TEACHER ACCESS -->
<div class="card" onclick="openTeacher()">
👨‍🏫 Teacher Panel
</div>

</div>

<!-- TOPICS (UNCHANGED) -->
<div class="grid" id="topics"></div>

<script>

/* TEACHER ACCESS */
function openTeacher(){
let p=prompt("Enter Teacher Password:");
if(p==="atul123"){
window.location.href="./exam-system/teacher.html";
}else{
alert("Wrong password");
}
}

/* TOPICS (UNCHANGED SYSTEM) */
const chapters=[
{name:"Exploring Matter",key:"matter",ready:false},
{name:"Forces and Motion",key:"forces",ready:true},
{name:"Work, Power & Gravity",key:"workpower",ready:false},
{name:"Energy & Environment",key:"energy",ready:false},
{name:"The Nature of Waves",key:"waves",ready:true},
{name:"Atomic Physics",key:"atomic",ready:true},
{name:"Electromagnetism",key:"electromagnetism",ready:true},
{name:"Thermal Physics",key:"thermal",ready:false},
{name:"Astrophysics",key:"astro",ready:false}
];

const container=document.getElementById("topics");

chapters.forEach(ch=>{
let div=document.createElement("div");
div.className="topic";
div.innerText=ch.name;

if(ch.ready){
div.onclick=()=>window.location.href=`./chapter.html?topic=${ch.key}`;
}else{
div.classList.add("locked");
}

container.appendChild(div);
});

</script>

</body>
</html>
