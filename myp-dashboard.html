<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MYP Dashboard | Physicism</title>

<style>

/* ===== BASE ===== */
body{
  margin:0;
  font-family:Arial;
  background:#140808;
  color:white;
}

/* ===== NAVBAR ===== */
.navbar{
  display:flex;
  justify-content:space-between;
  padding:15px 30px;
  background:#2b0d0d;
}

/* ===== HERO ===== */
.hero{
  background:linear-gradient(135deg,#ef4444,#b91c1c);
  padding:60px;
  text-align:center;
}

/* ===== SECTION ===== */
.section{ padding:40px; }

/* ===== GRID ===== */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:20px;
}

/* ===== CARD ===== */
.card{
  background:#2b0d0d;
  padding:20px;
  border-radius:12px;
  text-align:center;
  cursor:pointer;
  transition:0.3s;
}

.card:hover{
  transform:scale(1.05);
  background:#3b1111;
}

/* ===== ANALYTICS ===== */
.analytics{
  background:#020617;
  padding:20px;
  border-radius:12px;
  margin-top:20px;
}

/* ===== CANVAS ===== */
canvas{
  background:#020617;
  margin-top:20px;
  border-radius:10px;
}

</style>
</head>

<body>

<div class="navbar">
<b>🔴 MYP Physics</b>
<div>
<a href="index.html" style="color:white;margin-right:20px;">Home</a>
</div>
</div>

<div class="hero">
<h1>IB MYP Physics Dashboard</h1>
<p>Performance • Practice • Progress</p>
</div>

<div class="section">

<h2>🧠 Practice</h2>

<div class="grid">

<div class="card" onclick="openExam()">📝 Student Practice</div>
<div class="card" onclick="openTeacher()">👨‍🏫 Teacher Panel</div>
<div class="card" onclick="openDashboard()">📊 Analytics</div>

</div>

</div>

<div class="section">

<h2>📊 Performance Analytics</h2>

<div class="analytics">

<p id="summary"></p>

<canvas id="scoreChart" width="400" height="200"></canvas>
<canvas id="topicChart" width="400" height="200"></canvas>

<div id="weak"></div>
<div id="criteria"></div>

</div>

</div>

<script>

/* NAVIGATION */
function openExam(){
window.location.href="./exam-system/students.html";
}

function openTeacher(){
let p=prompt("Password:");
if(p==="atul123"){
window.location.href="./exam-system/teacher.html";
}
}

function openDashboard(){
window.location.href="./exam-system/dashboard.html";
}

/* LOAD DATA */
let attempts=JSON.parse(localStorage.getItem("attempts")||[]);

/* SUMMARY */
let total=attempts.length;
let avg=0;

attempts.forEach(a=>avg+=a.score);
avg=total?(avg/total).toFixed(1):0;

document.getElementById("summary").innerHTML=
`Total Attempts: ${total} | Avg Score: ${avg}`;

/* SCORE GRAPH */
let ctx=document.getElementById("scoreChart").getContext("2d");

ctx.strokeStyle="red";
ctx.beginPath();

attempts.forEach((a,i)=>{
ctx.lineTo(i*40,200-a.score*2);
});

ctx.stroke();

/* TOPIC ANALYSIS */
let topicMap={};

attempts.forEach(a=>{
let t=a.topic||"General";
topicMap[t]=(topicMap[t]||0)+a.score;
});

let ctx2=document.getElementById("topicChart").getContext("2d");

let i=0;
for(let t in topicMap){
ctx2.fillStyle="red";
ctx2.fillRect(i*60,200-topicMap[t],40,topicMap[t]);
ctx2.fillStyle="white";
ctx2.fillText(t,i*60,190);
i++;
}

/* WEAK AREA */
let weak="";

for(let t in topicMap){
if(topicMap[t]<50){
weak+=`<p>⚠ Weak: ${t}</p>`;
}
}

document.getElementById("weak").innerHTML=weak;

/* CRITERIA */
let crit={A:0,B:0,C:0,D:0};

attempts.forEach(a=>{
let sec=a.section||"A";
crit[sec]+=a.score;
});

let chtml="<h3>Criteria</h3>";

for(let c in crit){
chtml+=`<p>${c}: ${crit[c]}</p>`;
}

document.getElementById("criteria").innerHTML=chtml;

</script>

</body>
</html>
