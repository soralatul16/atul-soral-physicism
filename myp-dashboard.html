<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MYP Dashboard | Atul Soral Physicism</title>

<style>

/* ===== BASE ===== */
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#0f172a;
  color:white;
}

/* ===== NAVBAR ===== */
.navbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 30px;
  background:#020617;
}

.nav-links a{
  margin-left:20px;
  color:white;
  text-decoration:none;
  font-size:14px;
}

.nav-links a:hover{
  color:#38bdf8;
}

/* ===== HERO ===== */
.hero{
  background:linear-gradient(135deg,#06b6d4,#2563eb);
  padding:60px 20px;
  text-align:center;
}

.hero h1{
  margin:0;
  font-size:32px;
}

.hero p{
  margin-top:10px;
  opacity:0.9;
}

/* ===== SECTION ===== */
.section{
  padding:40px;
}

/* ===== GRID ===== */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:20px;
}

/* ===== CARD ===== */
.card{
  background:#1e293b;
  padding:20px;
  border-radius:12px;
  text-align:center;
  cursor:pointer;
  transition:0.3s;
  font-size:16px;
}

.card:hover{
  transform:scale(1.05);
  background:#334155;
}

/* ===== READY ===== */
.ready{
  text-decoration:underline;
  color:#38bdf8;
  font-weight:bold;
}

/* ===== LOCKED ===== */
.locked{
  opacity:0.5;
}

/* ===== TITLE ===== */
h2{
  margin-bottom:20px;
}

</style>
</head>

<body>

<!-- ===== NAVBAR ===== -->
<div class="navbar">
  <div><b>🔵 MYP Physics</b></div>

  <div class="nav-links">
    <a href="./index.html">Home</a>
    <a href="#">Flashcards</a>
    <a href="#">IA Generator</a>
    <a href="#">Formula Bank</a>
  </div>
</div>

<!-- ===== HERO ===== -->
<div class="hero">
  <h1>IB MYP Physics Dashboard</h1>
  <p>Everything you need to master MYP Physics</p>
</div>

<!-- ===== PRACTICE SECTION ===== -->
<div class="section">

<h2>🧠 Practice</h2>

<div class="grid">

  <!-- ✅ EXAM PRACTICE -->
  <div class="card ready" onclick="openExam()">
    📝 Exam Practice
  </div>

  <!-- LOCKED -->
  <div class="card locked" onclick="comingSoon()">
    🧠 Flashcards
  </div>

  <div class="card locked" onclick="comingSoon()">
    📊 Formula Bank
  </div>

</div>

</div>

<!-- ===== TOPICS ===== -->
<div class="section">

<h2>📚 MYP Topics</h2>

<div class="grid" id="topics"></div>

</div>

<script>

/* ===== SAFE NAVIGATION ===== */
function openExam(){
  window.location.href = "./quiz/exam-practice.html";
}

function comingSoon(){
  alert("🚧 Coming soon!");
}

/* ===== CHAPTER DATA ===== */
const chapters = [
  {name:"Exploring Matter", key:"matter", ready:false},
  {name:"Forces and Motion", key:"forces", ready:false},
  {name:"Work, Power & Gravity", key:"workpower", ready:false},
  {name:"Energy & Environment", key:"energy", ready:false},
  {name:"The Nature of Waves", key:"waves", ready:true},
  {name:"Atomic Physics", key:"atomic", ready:true},
  {name:"Electromagnetism", key:"electromagnetism", ready:true},
  {name:"Thermal Physics", key:"thermal", ready:false},
  {name:"Astrophysics", key:"astro", ready:false}
];

const container = document.getElementById("topics");

/* ===== RENDER CARDS ===== */
chapters.forEach(ch => {

  const div = document.createElement("div");
  div.className = "card";

  if(ch.ready){
    div.classList.add("ready");

    div.onclick = () => {
      window.location.href = `./chapter.html?topic=${ch.key}`;
    };

  } else {
    div.classList.add("locked");

    div.onclick = () => {
      alert("🚧 This chapter is coming soon!");
    };
  }

  div.innerText = ch.name;
  container.appendChild(div);

});

</script>

</body>
</html>
