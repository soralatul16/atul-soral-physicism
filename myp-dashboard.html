<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MYP Dashboard | Atul Soral Physicism</title>

<style>

/* ===== BASE ===== */
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#140808; /* 🔴 upgraded red tone */
  color:white;
}

/* ===== NAVBAR ===== */
.navbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 30px;
  background:#2b0d0d;
}

.nav-links a{
  margin-left:20px;
  color:white;
  text-decoration:none;
  font-size:14px;
}

/* ===== HERO ===== */
.hero{
  background:linear-gradient(135deg,#ef4444,#7f1d1d);
  padding:60px 20px;
  text-align:center;
}

.hero h1{
  margin:0;
  font-size:32px;
}

/* ===== SECTION ===== */
.section{
  padding:40px;
}

/* ===== GRID ===== */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:20px;
}

/* ===== CARD ===== */
.card{
  background:#2b0d0d;
  padding:20px;
  border-radius:12px;
  text-align:center;
  cursor:pointer;
  transition:0.3s;
}

.card:hover{
  transform:scale(1.05);
  background:#3b1111;
}

/* ===== READY ===== */
.ready{
  text-decoration:underline;
  color:#f87171;
  font-weight:bold;
}

/* ===== LOCKED ===== */
.locked{
  opacity:0.5;
}

/* ===== ANALYTICS ===== */
.analytics{
  background:#020617;
  padding:20px;
  border-radius:12px;
  margin-top:20px;
}

canvas{
  background:#020617;
  margin-top:20px;
  border-radius:10px;
}

</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
  <div><b>🔴 MYP Physics</b></div>

  <div class="nav-links">
    <a href="./index.html">Home</a>
    <a href="#">Flashcards</a>
    <a href="#">IA Generator</a>
    <a href="#">Formula Bank</a>
  </div>
</div>

<!-- HERO -->
<div class="hero">
  <h1>IB MYP Physics Dashboard</h1>
  <p>Everything you need to master MYP Physics</p>
</div>

<!-- PRACTICE -->
<div class="section">

<h2>🧠 Practice</h2>

<div class="grid">

<div class="card ready" onclick="openExam()">
📝 Exam Practice
</div>

<div class="card locked" onclick="comingSoon()">
🧠 Flashcards
</div>

<div class="card locked" onclick="comingSoon()">
📊 Formula Bank
</div>

</div>

</div>

<!-- TOPICS (UNCHANGED — YOUR ORIGINAL SYSTEM) -->
<div class="section">

<h2>📚 MYP Topics</h2>

<div class="grid" id="topics"></div>

</div>

<!-- NEW ANALYTICS (ADDED — SAFE) -->
<div class="section">

<h2>📊 Performance Analytics</h2>

<div class="analytics">

<p id="summary"></p>

<canvas id="scoreChart" width="400" height="200"></canvas>

<div id="weak"></div>

</div>

</div>

<script>

/* ===== NAVIGATION ===== */
function openExam(){
  window.location.href = "./exam-system/students.html"; // ✅ updated path
}

function comingSoon(){
  alert("🚧 Coming soon!");
}

/* ===== CHAPTER DATA (UNCHANGED) */
const chapters = [
  {name:"Exploring Matter", key:"matter", ready:false},
  {name:"Forces and Motion", key:"forces", ready:true},
  {name:"Work, Power & Gravity", key:"workpower", ready:false},
  {name:"Energy & Environment", key:"energy", ready:false},
  {name:"The Nature of Waves", key:"waves", ready:true},
  {name:"Atomic Physics", key:"atomic", ready:true},
  {name:"Electromagnetism", key:"electromagnetism", ready:true},
  {name:"Thermal Physics", key:"thermal", ready:false},
  {name:"Astrophysics", key:"astro", ready:false}
];

const container = document.getElementById("topics");

/* ===== RENDER TOPICS (FIXED BUG) */
chapters.forEach(ch => {

  const div = document.createElement("div");
  div.className = "card";

  if(ch.ready){
    div.classList.add("ready");

    div.onclick = () => {
      window.location.href = `./chapter.html?topic=${ch.key}`;
    };

  } else {
    div.classList.add("locked");

    div.onclick = () => {
      alert("🚧 This chapter is coming soon!");
    };
  }

  div.innerText = ch.name;
  container.appendChild(div);

});

/* ===== ANALYTICS ===== */
let attempts = JSON.parse(localStorage.getItem("attempts")||[]);

let total = attempts.length;
let avg = 0;

attempts.forEach(a=>avg+=a.score);
avg = total?(avg/total).toFixed(1):0;

document.getElementById("summary").innerHTML =
`Total Attempts: ${total} | Avg Score: ${avg}`;

let ctx = document.getElementById("scoreChart").getContext("2d");

ctx.strokeStyle="red";
ctx.beginPath();

attempts.forEach((a,i)=>{
  ctx.lineTo(i*40,200-a.score*2);
});

ctx.stroke();

/* WEAK AREAS */
let weakHTML="";
attempts.forEach(a=>{
  if(a.score < 50){
    weakHTML+=`<p>⚠ Weak attempt: ${a.score}</p>`;
  }
});

document.getElementById("weak").innerHTML = weakHTML;

</script>

</body>
</html>
