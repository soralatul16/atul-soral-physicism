<!DOCTYPE html>
<html>
<head>
<title>Exam Practice</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f172a;
  color:white;
}

.nav{
  padding:15px;
}
.nav button{
  margin-right:10px;
}

.container{
  text-align:center;
  padding:30px;
}

.filters{
  background:#1e293b;
  padding:20px;
  border-radius:12px;
  margin:20px auto;
  width:80%;
}

select{
  padding:12px;
  margin:10px;
  font-size:16px;
}

button{
  padding:12px 20px;
  margin:10px;
  cursor:pointer;
}

.question-box{
  margin:20px auto;
  width:80%;
  text-align:left;
  background:#020617;
  padding:20px;
  border-radius:10px;
}
</style>

</head>

<body>

<div class="nav">
  <button onclick="history.back()">Back</button>
  <button onclick="location.href='../index.html'">Home</button>
  <button onclick="location.href='../myp-dashboard.html'">MYP</button>
</div>

<div class="container">

<h1>📘 Exam Practice</h1>

<div class="filters">

<select id="topic">
<option value="">All Topics</option>
<option value="waves">Waves</option>
<option value="atomic">Atomic</option>
<option value="electromagnetism">Electromagnetism</option>
</select>

<select id="section">
<option value="">All Sections</option>
<option value="A">Part A</option>
<option value="B">Part B</option>
<option value="C">Part C</option>
<option value="D">Part D</option>
</select>

<select id="difficulty">
<option value="">All Levels</option>
<option value="easy">Easy</option>
<option value="medium">Medium</option>
<option value="hard">Hard</option>
</select>

<br>

<button onclick="startExam()">Start</button>
<button onclick="submitExam()">Submit</button>
<button onclick="downloadPDF()">Download PDF</button>

</div>

<div id="timer"></div>

<div id="quiz"></div>

</div>

<script src="./exam-data.js"></script>
<script src="./exam-engine.js"></script>

</body>
</html>
