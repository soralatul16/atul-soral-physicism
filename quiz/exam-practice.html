<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Exam Practice | Atul Soral Physicism</title>

<link rel="stylesheet" href="../style.css">

<style>
body{
  background: linear-gradient(135deg,#0f172a,#1e293b);
  color:#e2e8f0;
}

/* Top Nav */
.nav{
  display:flex;
  gap:10px;
  padding:15px;
}
.nav button{
  background:#334155;
  color:#fff;
  border:none;
  border-radius:6px;
  padding:8px 12px;
  cursor:pointer;
}

/* Header */
.header{
  text-align:center;
  padding:20px;
}
.header h1{
  color:#38bdf8;
}

/* Filters */
.filters{
  width:90%;
  max-width:900px;
  margin:20px auto;
  background:#020617;
  padding:20px;
  border-radius:14px;
  box-shadow:0 0 20px rgba(0,0,0,0.5);
}

select, input{
  padding:12px;
  margin:10px;
  border-radius:8px;
  border:none;
  width:200px;
}

.actions{
  margin-top:10px;
}

.actions button{
  background:#22c55e;
  border:none;
  color:white;
  padding:10px 18px;
  margin:8px;
  border-radius:8px;
  cursor:pointer;
}

/* Timer */
#timer{
  text-align:center;
  font-size:20px;
  color:#38bdf8;
}

/* Sections */
.section-title{
  margin:30px auto 10px;
  width:90%;
  max-width:900px;
  font-size:22px;
  color:#38bdf8;
  border-bottom:2px solid #38bdf8;
  padding-bottom:5px;
}

/* Question */
.question-box{
  width:90%;
  max-width:900px;
  margin:20px auto;
  background:#020617;
  padding:20px;
  border-radius:12px;
  box-shadow:0 0 15px rgba(0,0,0,0.5);
}

/* Options */
.option{
  display:block;
  padding:10px;
  margin:8px 0;
  background:#1e293b;
  border-radius:8px;
  cursor:pointer;
}
.option:hover{
  background:#334155;
}

/* Answer area */
textarea{
  width:100%;
  min-height:100px;
  padding:10px;
  border-radius:8px;
  border:none;
  margin-top:10px;
}

/* Image */
.q-image{
  width:100%;
  max-width:500px;
  display:block;
  margin:10px auto;
  border-radius:10px;
}

/* Video */
.q-video{
  width:100%;
  max-width:600px;
  height:300px;
  margin:10px auto;
  display:block;
  border-radius:10px;
}

/* Drag */
.drag-row{
  display:flex;
  justify-content:space-between;
  background:#1e293b;
  padding:10px;
  border-radius:8px;
  margin:10px 0;
}

/* Markscheme */
.markscheme{
  display:none;
  margin-top:10px;
  color:#22c55e;
}
</style>

</head>

<body>

<div class="nav">
  <button onclick="history.back()">Back</button>
  <button onclick="location.href='../index.html'">Home</button>
  <button onclick="location.href='../myp-dashboard.html'">MYP</button>
</div>

<div class="header">
<h1>📘 Exam Practice</h1>
</div>

<div class="filters">

<select id="topic">
<option value="">All Topics</option>

<option value="matter">Exploring Matter</option>
<option value="forces">Forces and Motion</option>
<option value="workpower">Work, Power & Gravity</option>
<option value="energy">Energy & Environment</option>
<option value="waves">The Nature of Waves</option>
<option value="atomic">Atomic Physics</option>
<option value="electromagnetism">Electromagnetism</option>
<option value="thermal">Thermal Physics</option>
<option value="astro">Astrophysics</option>

</select>

<select id="section">
<option value="">All Sections</option>
<option value="A">Part A</option>
<option value="B">Part B</option>
<option value="C">Part C</option>
<option value="D">Part D</option>
</select>

<select id="difficulty">
<option value="">All Levels</option>
<option value="easy">Easy</option>
<option value="medium">Medium</option>
<option value="hard">Hard</option>
</select>

<br>

<input id="studentName" placeholder="Enter your name">

<div class="actions">
<button onclick="startExam()">Start</button>
<button onclick="submitExam()">Submit</button>
<button onclick="toggleMarkscheme()">Markscheme</button>
<button onclick="downloadPDF()">Download PDF</button>
</div>

</div>

<div id="timer"></div>
<div id="quiz"></div>

<script src="./exam-data.js"></script>
<script src="./exam-engine.js"></script>

</body>
</html>
