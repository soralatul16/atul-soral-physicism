<!DOCTYPE html>
<html>
<head>

<title>Teacher Panel</title>

<style>
body{
  font-family:Arial;
  background:#0f172a;
  color:white;
  padding:20px;
}

/* Login */
#loginBox{
  max-width:400px;
  margin:100px auto;
  text-align:center;
}

input{
  padding:12px;
  width:100%;
  margin:10px 0;
  border-radius:8px;
  border:none;
}

button{
  padding:12px 20px;
  background:#22c55e;
  border:none;
  color:white;
  border-radius:8px;
  cursor:pointer;
}

/* Panel */
#teacherPanel{
  display:none;
}

.section{
  background:#1e293b;
  padding:20px;
  border-radius:12px;
  margin:20px 0;
}

textarea{
  width:100%;
  height:100px;
  margin:10px 0;
}
</style>

</head>

<body>

<!-- 🔐 LOGIN -->
<div id="loginBox">
  <h2>🔒 Teacher Login</h2>
  <input id="pass" type="password" placeholder="Enter password">
  <button onclick="login()">Enter</button>
</div>

<!-- 🧠 BUILDER -->
<div id="teacherPanel">

<h1>🧠 Paper Builder</h1>

<div class="section">

<select id="unit">
<option value="forces">Forces</option>
<option value="waves">Waves</option>
<option value="atomic">Atomic</option>
</select>

<input id="topic" placeholder="Topic name">
<input id="title" placeholder="Paper title">

<textarea id="scenario" placeholder="Scenario..."></textarea>

</div>

<div class="section">
<h3>Add Content</h3>

<button onclick="addImage()">Image</button>
<button onclick="addVideo()">Video</button>

<div id="contentArea"></div>
</div>

<div class="section">
<h3>Add Questions</h3>

<button onclick="addMCQ()">MCQ</button>
<button onclick="addText()">Long Answer</button>

<div id="questionArea"></div>
</div>

<button onclick="savePaper()">💾 Save Paper</button>

</div>

<script src="./database.js"></script>
<script src="./builder.js"></script>

<script>
function login(){
  const p = document.getElementById("pass").value;

  if(p === "atul123"){   // 🔐 CHANGE THIS PASSWORD
    document.getElementById("loginBox").style.display="none";
    document.getElementById("teacherPanel").style.display="block";
  }else{
    alert("Wrong password");
  }
}
</script>

</body>
</html>
