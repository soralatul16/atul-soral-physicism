<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Physics Quiz | Atul Soral Physicism</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(135deg,#0f172a,#1e293b);
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  color:white;
}

/* NAV */
.nav{
  position:absolute;
  top:15px;
  left:20px;
}

.nav button{
  margin-right:10px;
  padding:8px 12px;
  border:none;
  border-radius:6px;
  cursor:pointer;
  background:#334155;
  color:white;
}

/* QUIZ BOX */
.quiz-box{
  width:600px;
  max-width:90%;
  background:#020617;
  padding:30px;
  border-radius:12px;
  box-shadow:0 0 25px rgba(0,0,0,0.5);
}

/* TITLE */
h2{
  text-align:center;
  margin-bottom:20px;
}

/* QUESTION */
.question{
  font-size:18px;
  margin-bottom:20px;
}

/* OPTIONS */
.option{
  display:block;
  background:#1e293b;
  margin:10px 0;
  padding:12px;
  border-radius:8px;
  cursor:pointer;
}

.option:hover{
  background:#334155;
}

/* BUTTON */
.next-btn{
  margin-top:20px;
  width:100%;
  padding:12px;
  background:#22c55e;
  border:none;
  border-radius:8px;
  color:white;
  font-size:16px;
  cursor:pointer;
}

/* PROGRESS */
.progress{
  margin-top:10px;
  text-align:center;
  font-size:14px;
  color:#94a3b8;
}

/* SUMMARY */
.summary{
  text-align:left;
  max-height:400px;
  overflow-y:auto;
}
</style>
</head>

<body>

<div class="nav">
  <button onclick="history.back()">⬅ Back</button>
  <button onclick="location.href='../index.html'">🏠 Home</button>
  <button onclick="location.href='../myp-dashboard.html'">📘 MYP</button>
</div>

<div class="quiz-box">

<h2 id="title">🧠 Physics Quiz</h2>

<div id="quiz-area">
  <div class="question" id="question"></div>
  <div id="options"></div>
  <button class="next-btn" onclick="nextQuestion()">Next</button>
  <div class="progress" id="progress"></div>
</div>

<div id="summary-area" style="display:none;"></div>

</div>

<script src="question-bank.js"></script>
<script src="quiz-engine.js"></script>

</body>
</html>
