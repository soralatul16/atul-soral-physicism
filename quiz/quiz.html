<!DOCTYPE html>
<html lang="en">

 
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Physics Quiz | Atul Soral Physicism</title>

<style>

body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(135deg,#0f172a,#1e293b);
  color:#ffffff;
  overflow-y:auto;
  padding:40px 0;
}

/* NAV */
.nav{
  position:absolute;
  top:15px;
  left:20px;
}

.nav button{
  margin-right:10px;
  padding:8px 12px;
  border:none;
  border-radius:6px;
  cursor:pointer;
  background:#334155;
  color:white;
}

/* QUIZ BOX */
.quiz-box{
  width:600px;
  max-width:90%;
  margin:auto;
  background:#020617;
  padding:30px;
  border-radius:12px;
  box-shadow:0 0 25px rgba(0,0,0,0.5);
  color:#ffffff; /* 🔥 FORCE TEXT */
}

/* TITLE */
h2{
  text-align:center;
  margin-bottom:20px;
  color:#ffffff;
}

/* QUESTION */
.question{
  font-size:20px;
  margin-bottom:20px;
  color:#ffffff;
  font-weight:500;
}

/* OPTIONS */
.option{
  display:block;
  background:#334155;  /* 🔥 lighter than before */
  color:#ffffff;
  margin:10px 0;
  padding:14px;
  border-radius:8px;
  cursor:pointer;
  transition:0.2s;
  border:1px solid rgba(255,255,255,0.2);
}

/* HOVER */
.option:hover{
  background:#475569;
}

/* SELECTED */
.option.selected{
  background:#22c55e !important;
  color:white;
  font-weight:bold;
}

/* BUTTON */
.next-btn{
  margin-top:20px;
  width:100%;
  padding:14px;
  background:#22c55e;
  border:none;
  border-radius:8px;
  color:white;
  font-size:16px;
  cursor:pointer;
  font-weight:bold;
}

/* PROGRESS */
.progress{
  margin-top:10px;
  text-align:center;
  font-size:14px;
  color:#cbd5f5;
}

</style>
</head>

<body>

<div class="nav">
  <button onclick="history.back()">⬅ Back</button>
  <button onclick="location.href='../index.html'">🏠 Home</button>
  <button onclick="location.href='../myp-dashboard.html'">📘 MYP</button>
</div>

<div class="quiz-box">

<h2 id="title">🧠 Physics Quiz</h2>

<div id="quiz-area">
  <div class="question" id="question"></div>
  <div id="options"></div>
  <button class="next-btn" onclick="nextQuestion()">Next</button>
  <div class="progress" id="progress"></div>
</div>

<div id="summary-area" style="
  display:none;
  margin-top:20px;
"></div>
</div>

<script src="./question-bank.js"></script>
<script src="./quiz-engine.js"></script>

</body>
</html>
