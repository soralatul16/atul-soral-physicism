<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Physics Quiz | Atul Soral Physicism</title>
<style>
:root {
  /* Light theme (default) */
  --bg: #f5f0e8;
  --bg-deep: #f0ebe2;
  --surface: rgba(255,255,255,0.75);
  --surface2: rgba(255,255,255,0.55);
  --white: #ffffff;
  --text: #1a1a2e;
  --text2: #555;
  --text3: #888;
  --border: rgba(0,0,0,0.06);
  --accent: #c0392b;
  --cream: #f9f6f1;
}

[data-theme="dark"] {
  --bg: #0f1119;
  --bg-deep: #141620;
  --surface: rgba(30,32,45,0.85);
  --surface2: rgba(30,32,45,0.65);
  --white: #1e2030;
  --text: #e0ddd5;
  --text2: #a0a0b0;
  --text3: #6a6a7a;
  --border: rgba(255,255,255,0.06);
  --accent: #e05040;
  --cream: #1a1c28;
}

[data-theme="dark"] body {
  background: var(--bg);
  color: var(--text);
}
[data-theme="dark"] img {
  opacity: 0.92;
}
[data-theme="dark"] .topbar,
[data-theme="dark"] .navbar {
  background: var(--surface);
  border-bottom-color: var(--border);
}
[data-theme="dark"] input,
[data-theme="dark"] select,
[data-theme="dark"] textarea {
  background: var(--white);
  color: var(--text);
  border-color: var(--border);
}

body {
  margin: 0;
  font-family: Georgia, 'Palatino Linotype', serif;
  background: var(--bg);
  background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
  color: var(--text);
  overflow-y: auto;
  padding: 40px 0 80px;
}
.quiz-box {
  width: 640px;
  max-width: 92%;
  margin: auto;
  background: var(--surface);
  padding: 32px;
  border-radius: 20px;
  box-shadow: 0 4px 24px rgba(0,0,0,0.06);
  backdrop-filter: blur(12px);
  border: 1.5px solid var(--border);
  color: var(--text);
}
h2 { color: var(--text); text-align: center; margin-bottom: 20px; }
.question {
  font-size: 18px;
  color: var(--text);
  font-weight: 500;
  line-height: 1.7;
  margin-bottom: 20px;
}
.option {
  display: block;
  background: var(--cream);
  color: var(--text);
  margin: 10px 0;
  padding: 14px 18px;
  border-radius: 12px;
  cursor: pointer;
  transition: all 0.2s;
  border: 1.5px solid var(--border);
  font-size: 15px;
}
.option:hover {
  background: var(--bg-deep);
  border-color: var(--border);
  transform: translateX(4px);
}
.option.selected {
  background: #e8f5e9 !important;
  color: #2e7d32;
  font-weight: 600;
  border-color: rgba(46,125,50,0.3);
}
.next-btn {
  margin-top: 20px;
  width: 100%;
  padding: 14px;
  background: #c0392b;
  border: none;
  border-radius: 50px;
  color: white;
  font-size: 15px;
  cursor: pointer;
  font-weight: 600;
  transition: all 0.2s;
  font-family: -apple-system, system-ui, sans-serif;
}
.next-btn:hover { background: #a93226; transform: translateY(-1px); }
.progress {
  margin-top: 12px;
  text-align: center;
  font-size: 13px;
  color: var(--text3);
  font-family: -apple-system, system-ui, sans-serif;
}
.nav {
  position: absolute;
  top: 15px;
  left: 20px;
}
.nav button {
  margin-right: 10px;
  padding: 8px 12px;
  cursor: pointer;
  background: var(--surface);
  color: var(--text);
  border: 1.5px solid var(--border);
  border-radius: 50px;
  backdrop-filter: blur(8px);
  font-family: -apple-system, system-ui, sans-serif;
  font-size: 13px;
  transition: all 0.15s;
}
.nav button:hover { background: var(--white); }

/* ===== FEEDBACK WIDGET ===== */
#fb-trigger{
  position:fixed;bottom:28px;right:28px;z-index:9000;
  width:52px;height:52px;border-radius:50%;
  background:linear-gradient(135deg,#ef4444,#b91c1c);
  border:none;cursor:pointer;
  box-shadow:0 4px 20px rgba(239,68,68,.4);
  display:flex;align-items:center;justify-content:center;font-size:22px;
  transition:transform .2s,box-shadow .2s;color:white;
}
#fb-trigger:hover{transform:scale(1.1);box-shadow:0 6px 28px rgba(239,68,68,.5);}
#fb-trigger.spinning{transform:rotate(90deg) scale(1.05);}

#fb-panel{
  position:fixed;bottom:92px;right:28px;z-index:9000;width:320px;
  background:var(--bg-deep);border:1.5px solid var(--border);
  border-radius:24px;overflow:hidden;
  box-shadow:0 16px 48px rgba(26,26,46,0.1);
  transform:translateY(20px) scale(.96);opacity:0;pointer-events:none;
  transition:transform .28s cubic-bezier(.22,.68,0,1.2),opacity .2s;
}
#fb-panel.open{transform:translateY(0) scale(1);opacity:1;pointer-events:all;}
#fb-panel .fb-head{
  background:linear-gradient(135deg,#ef4444,#b91c1c);
  padding:14px 18px;font-family:Georgia,'Palatino Linotype',serif;
  font-size:14px;font-weight:600;color:white;display:flex;align-items:center;gap:8px;
}
#fb-panel .fb-body{padding:16px;display:flex;flex-direction:column;gap:11px;}
#fb-panel .fb-page{
  font-size:11px;color:var(--text3);font-family:monospace;
  background:rgba(26,26,46,0.03);padding:6px 10px;border-radius:8px;
  word-break:break-all;line-height:1.4;
}
#fb-panel input,#fb-panel textarea{
  width:100%;background:var(--white);
  border:1.5px solid var(--border);border-radius:10px;
  color:var(--text);font-family:-apple-system,system-ui,sans-serif;font-size:14px;
  padding:10px 14px;resize:none;outline:none;transition:border-color .2s;
  box-sizing:border-box;
}
#fb-panel input::placeholder,#fb-panel textarea::placeholder{color:var(--text3);}
#fb-panel input:focus,#fb-panel textarea:focus{border-color:#f7c5c0;}
#fb-panel textarea{height:88px;}
#fb-panel .fb-send{
  background:linear-gradient(135deg,#ef4444,#b91c1c);
  border:none;color:white;font-family:-apple-system,system-ui,sans-serif;
  font-size:14px;font-weight:600;padding:11px;border-radius:10px;
  cursor:pointer;transition:opacity .2s,transform .15s;
}
#fb-panel .fb-send:hover{opacity:.9;transform:translateY(-1px);}
#fb-panel .fb-send:disabled{opacity:.4;cursor:not-allowed;transform:none;}
#fb-panel .fb-status{font-size:12px;text-align:center;min-height:16px;color:var(--text3);}
#fb-panel .fb-status.ok{color:#2e7d32;}
#fb-panel .fb-status.err{color:#ef4444;}

/* MOBILE RESPONSIVENESS */
@media (max-width: 500px) {
  .quiz-box { padding: 20px 16px; border-radius: 16px; }
  .question { font-size: 16px; }
  .option { padding: 12px 14px; font-size: 14px; }
  .nav { position: relative; top: 0; left: 0; margin-bottom: 16px; display: flex; gap: 6px; justify-content: center; }
  .nav button { font-size: 12px; padding: 6px 10px; }
  h2 { font-size: 20px; }
}
</style>
</head>
<body>

<div class="nav">
  <button onclick="history.back()">⬅ Back</button>
  <button onclick="location.href='../index.html'">🏠 Home</button>
  <button onclick="location.href='../myp-dashboard.html'">📘 MYP</button>
  <button id="themeToggle" onclick="toggleTheme()" style="background:var(--surface);border:1.5px solid var(--border);padding:6px 12px;border-radius:50px;cursor:pointer;font-size:14px;transition:all .2s;color:var(--text2);" title="Toggle dark/light mode">🌙</button>
</div>

<div class="quiz-box">
  <h2 id="title">🧠 Physics Quiz</h2>
  <div id="quiz-area">
    <div id="timer-bar" style="height:4px;background:#f0ede6;border-radius:99px;margin-bottom:16px;overflow:hidden;">
      <div id="timer-fill" style="height:100%;background:#c0392b;width:100%;transition:width 0.1s linear;border-radius:99px;"></div>
    </div>
    <div id="timer-text" style="text-align:right;font-size:12px;color:#888;margin-bottom:8px;font-family:-apple-system,system-ui,sans-serif;">20s</div>
    <div class="question" id="question"></div>
    <div id="options"></div>
    <button class="next-btn" onclick="nextQuestion()">Next</button>
    <div class="progress" id="progress"></div>
  </div>
  <div id="summary-area" style="display:none;margin-top:20px;"></div>
</div>

<!-- AI TUTOR CHAT -->
<button id="ai-tutor-trigger" onclick="toggleAITutor()" style="position:fixed;bottom:92px;right:28px;z-index:8999;width:46px;height:46px;border-radius:50%;background:linear-gradient(135deg,#1a6fb5,#0d4f8b);border:none;cursor:pointer;box-shadow:0 4px 16px rgba(26,111,181,0.3);display:flex;align-items:center;justify-content:center;font-size:18px;transition:all .2s;color:white;" title="Ask Physicism AI">🧠</button>

<div id="ai-tutor-panel" style="position:fixed;bottom:148px;right:28px;z-index:8999;width:340px;max-height:450px;background:var(--white,white);border:1.5px solid var(--border,rgba(0,0,0,0.06));border-radius:20px;overflow:hidden;box-shadow:0 16px 48px rgba(0,0,0,0.1);transform:translateY(20px) scale(0.96);opacity:0;pointer-events:none;transition:transform .28s cubic-bezier(.22,.68,0,1.2),opacity .2s;display:flex;flex-direction:column;">
  
  <!-- Header -->
  <div style="background:linear-gradient(135deg,#1a6fb5,#0d4f8b);padding:14px 18px;color:white;font-size:13px;font-weight:600;display:flex;align-items:center;gap:8px;">
    🧠 Ask Physicism
    <span style="font-size:10px;opacity:0.7;margin-left:auto;">AI Tutor</span>
  </div>
  
  <!-- Messages -->
  <div id="ai-tutor-messages" style="flex:1;overflow-y:auto;padding:14px;max-height:280px;font-size:13px;line-height:1.6;">
    <div style="background:rgba(26,111,181,0.06);border-radius:12px;padding:10px 14px;margin-bottom:8px;color:var(--text2,#555);font-size:12px;">
      Hi! I'm your Physics AI tutor. Ask me anything about MYP Physics — formulas, concepts, practice problems. 🔬
    </div>
  </div>
  
  <!-- Input -->
  <div style="padding:10px;border-top:1px solid var(--border,rgba(0,0,0,0.06));display:flex;gap:8px;">
    <input type="text" id="ai-tutor-input" placeholder="Ask a physics question..." style="flex:1;padding:9px 14px;border:1.5px solid var(--border,rgba(0,0,0,0.06));border-radius:50px;font-size:13px;outline:none;background:var(--cream,#f9f6f1);color:var(--text,#1a1a2e);" onkeydown="if(event.key==='Enter')sendAITutor()">
    <button onclick="sendAITutor()" style="width:36px;height:36px;border-radius:50%;background:#1a6fb5;border:none;color:white;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;">→</button>
  </div>
</div>

<!-- FEEDBACK WIDGET -->
<button id="fb-trigger" title="Send feedback or report an error">💬</button>
<div id="fb-panel">
  <div class="fb-head">📬 &nbsp;Feedback / Correction</div>
  <div class="fb-body">
    <div class="fb-page" id="fb-page-url"></div>
    <input id="fb-email" type="email" placeholder="Your email (optional — so I can reply)" autocomplete="email">
    <textarea id="fb-message" placeholder="Found a mistake? Suggestion? Tell me here…"></textarea>
    <button class="fb-send" id="fb-send-btn">Send Feedback</button>
    <div class="fb-status" id="fb-status"></div>
  </div>
</div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-functions-compat.js"></script>
<script src="../exam-system/firebase-config.js?v=2"></script>

<script src="./question-bank.js"></script>
<script src="./quiz-engine.js"></script>

<!-- EmailJS SDK + Feedback Logic -->
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<script>
/* ===== FEEDBACK WIDGET ===== */
const FB = {
  publicKey:  "jhfWQKIKtye-3eVpn",
  serviceID:  "service_ni72akl",
  templateID: "template_xr522or",
};

// Init EmailJS
emailjs.init({ publicKey: FB.publicKey });

document.getElementById("fb-page-url").textContent =
  "📄 " + window.location.pathname + (window.location.search || "");

const fbTrigger = document.getElementById("fb-trigger");
const fbPanel   = document.getElementById("fb-panel");

fbTrigger.addEventListener("click", e => {
  e.stopPropagation();
  const isOpen = fbPanel.classList.toggle("open");
  fbTrigger.classList.toggle("spinning", isOpen);
  fbTrigger.textContent = isOpen ? "✕" : "💬";
  if(isOpen) setTimeout(()=>document.getElementById("fb-message").focus(), 250);
});

document.addEventListener("click", e => {
  if(!fbPanel.contains(e.target) && e.target !== fbTrigger){
    fbPanel.classList.remove("open");
    fbTrigger.classList.remove("spinning");
    fbTrigger.textContent = "💬";
  }
});

document.getElementById("fb-send-btn").addEventListener("click", async () => {
  const msg    = document.getElementById("fb-message").value.trim();
  const email  = document.getElementById("fb-email").value.trim();
  const status = document.getElementById("fb-status");
  const btn    = document.getElementById("fb-send-btn");

  if(!msg){
    status.textContent = "Please write something first.";
    status.className = "fb-status err";
    return;
  }

  btn.disabled = true;
  btn.textContent = "Sending…";
  status.className = "fb-status";
  status.textContent = "";

  const params = {
    page:    window.location.href,
    message: msg,
    email:   email || "(not provided)",
    sent_at: new Date().toLocaleString("en-IN", {timeZone:"Asia/Kolkata"}),
  };

  try {
    await emailjs.send(FB.serviceID, FB.templateID, params);
    status.textContent = "✓ Sent! Thank you.";
    status.className = "fb-status ok";
    document.getElementById("fb-message").value = "";
    document.getElementById("fb-email").value = "";
    setTimeout(()=>{
      fbPanel.classList.remove("open");
      fbTrigger.classList.remove("spinning");
      fbTrigger.textContent = "💬";
      btn.disabled = false;
      btn.textContent = "Send Feedback";
      status.textContent = "";
      status.className = "fb-status";
    }, 2200);
  } catch(err){
    console.error(err);
    status.textContent = "❌ Could not send — check your EmailJS config.";
    status.className = "fb-status err";
    btn.disabled = false;
    btn.textContent = "Send Feedback";
  }
});
</script>

<script>
function toggleTheme() {
  var current = document.documentElement.getAttribute('data-theme');
  var next = current === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('physicism-theme', next);
  var btn = document.getElementById('themeToggle');
  if (btn) btn.textContent = next === 'dark' ? '☀️' : '🌙';
}
// Load saved theme
(function() {
  var saved = localStorage.getItem('physicism-theme');
  if (saved === 'dark') {
    document.documentElement.setAttribute('data-theme', 'dark');
    var btn = document.getElementById('themeToggle');
    if (btn) btn.textContent = '☀️';
  }
})();
</script>

<script>
function toggleAITutor() {
  var panel = document.getElementById('ai-tutor-panel');
  var isOpen = panel.style.opacity === '1';
  panel.style.opacity = isOpen ? '0' : '1';
  panel.style.pointerEvents = isOpen ? 'none' : 'all';
  panel.style.transform = isOpen ? 'translateY(20px) scale(0.96)' : 'translateY(0) scale(1)';
  if (!isOpen) {
    setTimeout(function() { document.getElementById('ai-tutor-input').focus(); }, 300);
  }
}

function sendAITutor() {
  var input = document.getElementById('ai-tutor-input');
  var msg = input.value.trim();
  if (!msg) return;
  
  var messages = document.getElementById('ai-tutor-messages');
  
  // Add user message
  messages.innerHTML += '<div style="text-align:right;margin-bottom:8px;"><span style="background:#1a6fb5;color:white;padding:8px 14px;border-radius:12px 12px 2px 12px;display:inline-block;font-size:13px;max-width:80%;text-align:left;">' + escapeHtml(msg) + '</span></div>';
  
  input.value = '';
  messages.scrollTop = messages.scrollHeight;
  
  // Add loading indicator
  var loadingId = 'loading-' + Date.now();
  messages.innerHTML += '<div id="' + loadingId + '" style="margin-bottom:8px;"><span style="background:var(--cream,#f9f6f1);padding:8px 14px;border-radius:12px 12px 12px 2px;display:inline-block;font-size:12px;color:var(--text3,#888);">Thinking...</span></div>';
  messages.scrollTop = messages.scrollHeight;
  
  // Call Groq API
  // Call AI via Cloud Function (API key stays server-side)
  if(!firebase.auth().currentUser){
    document.getElementById(loadingId).innerHTML = '<span style="background:rgba(192,57,43,0.06);padding:8px 14px;border-radius:12px;display:inline-block;font-size:12px;color:#c0392b;">Please log in to use the AI tutor.</span>';
    return;
  }
  var aiChat=firebase.functions().httpsCallable('aiChat');
  aiChat({messages:[
    {role:'system',content:'You are a friendly IB MYP Physics tutor for Grade 6-10 students. Give clear, concise answers. Use simple language. Include formulas when relevant. Keep answers under 150 words. If asked about non-physics topics, politely redirect to physics. Always encourage the student.'},
    {role:'user',content:msg}
  ],temperature:0.7,maxTokens:300}).then(function(result){
    var reply = result.data.reply;
    if (reply) {
      document.getElementById(loadingId).innerHTML = '<span style="background:var(--cream,#f9f6f1);padding:10px 14px;border-radius:12px 12px 12px 2px;display:inline-block;font-size:13px;color:var(--text,#1a1a2e);max-width:85%;line-height:1.6;text-align:left;">' + reply.replace(/\n/g, '<br>') + '</span>';
    }
    messages.scrollTop = messages.scrollHeight;
  }).catch(function(err){
    document.getElementById(loadingId).innerHTML = '<span style="background:rgba(192,57,43,0.06);padding:8px 14px;border-radius:12px;display:inline-block;font-size:12px;color:#c0392b;">Error: ' + (err.message||'AI service unavailable') + '</span>';
  });
}

function escapeHtml(text) {
  var div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

// Close on outside click
document.addEventListener('click', function(e) {
  var panel = document.getElementById('ai-tutor-panel');
  var trigger = document.getElementById('ai-tutor-trigger');
  if (panel && trigger && !panel.contains(e.target) && e.target !== trigger) {
    panel.style.opacity = '0';
    panel.style.pointerEvents = 'none';
    panel.style.transform = 'translateY(20px) scale(0.96)';
  }
});
</script>

</body>
</html>
