<!DOCTYPE html>
<html>
<head>
<title>Exam Practice</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(135deg,#0f172a,#1e3a8a);
  color:white;
}

/* Header */
.header{
  text-align:center;
  padding:40px;
  font-size:28px;
  font-weight:bold;
}

/* Layout */
.container{
  display:flex;
}

/* Sidebar */
.sidebar{
  width:25%;
  background:#020617;
  padding:20px;
  min-height:100vh;
}

.sidebar div{
  padding:10px;
  margin:5px 0;
  cursor:pointer;
  border-radius:8px;
}

.sidebar div:hover{
  background:#1e293b;
}

/* Main */
.main{
  width:75%;
  padding:20px;
}

/* Paper */
.paper{
  background:#020617;
  padding:20px;
  border-radius:12px;
}

/* Image */
.paper img{
  width:100%;
  max-width:500px;
  border-radius:10px;
}

/* Video */
.paper iframe{
  width:100%;
  height:300px;
  border-radius:10px;
}

textarea{
  width:100%;
  height:120px;
  border-radius:8px;
  margin-top:10px;
}
</style>

</head>

<body>

<div class="header">📘 Exam Practice</div>

<div class="container">

<div class="sidebar" id="sidebar"></div>

<div class="main">
<div id="paperArea">
<h3>Select a topic</h3>
</div>
</div>

</div>

<script src="./database.js"></script>
<script src="./player.js"></script>

</body>
</html>
