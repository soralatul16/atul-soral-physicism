<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Waves | Atul Soral Physicism</title>

<style>
body{
  margin:0;
  font-family:Arial;
  display:flex;
  height:100vh;
  background:#0f172a;
  color:white;
}

/* ===== SIDEBAR ===== */
.sidebar{
  width:260px;
  background:#020617;
  overflow-y:auto;
  padding:10px;
}

.sidebar-item{
  padding:10px;
  margin:5px 0;
  cursor:pointer;
  border-radius:6px;
  background:#1e293b;
}

.sidebar-item:hover{
  background:#334155;
}

.active{
  background:#22c55e !important;
}

/* ===== MAIN ===== */
.main{
  flex:1;
  display:flex;
  flex-direction:column;
}

/* NAV */
.nav{
  padding:10px;
  background:#020617;
}

.nav button{
  margin-right:10px;
}

/* VIEWER */
.viewer{
  flex:1;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

.viewer img{
  max-width:900px;
  max-height:80vh;
  object-fit:contain;
  border-radius:10px;
}

/* BUTTONS */
.btn{
  margin:10px;
  padding:10px 20px;
  background:#22c55e;
  border:none;
  border-radius:6px;
  color:white;
  cursor:pointer;
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar"></div>

<!-- MAIN -->
<div class="main">

<div class="nav">
  <button onclick="location.href='index.html'">🏠 Home</button>
  <button onclick="location.href='myp-dashboard.html'">📘 MYP</button>
</div>

<div class="viewer">
  <img id="viewerImg">
  <div>
    <button class="btn" id="downloadBtn">⬇ Download</button>
    <button class="btn" onclick="startQuiz()">🧠 Start Quiz</button>
  </div>
</div>

</div>

<script>
const images = [
"2-waves-introduction.png",
"3-transverse-vs-longitudinal-wave.png",
"4-basic-properties-of-waves.png",
"5-wave-equation.png",
"6-reflection-of-waves.png",
"6-refraction-of-waves.png",
"7-diffraction-of-waves.png",
"8-total-internal-reflection.png",
"9-superposition-of-waves.png",
"10-standing-waves.png",
"11-sound-waves.png",
"12-speed-of-sound.png",
"13-musical-applications.png",
"14-electromagnetic-waves.png",
"15-radio-and-microwaves.png",
"16-infrared-visible-ultraviolet.png",
"17-x-ray-and-gamma-ray.png",
"18-reflection-and-refraction-of-light.png",
"19-light-and-communication.png",
"20-waves-and-culture.png",
"21-Design_investigation.png",
"22-data-processing.png",
"23-wave-technology.png",
"24-unit-project-showcase.png",
"25-explore-waves-at-home-lab.png",
"26-waves-connect-the-world.png"
];

let currentImage = "";

const sidebar = document.getElementById("sidebar");

images.forEach(img=>{
  const div = document.createElement("div");
  div.className = "sidebar-item";
  div.innerText = img.replace(".png","").replace(/-/g," ");
  div.onclick = ()=> loadImage(img, div);
  sidebar.appendChild(div);
});

/* LOAD IMAGE */
function loadImage(img, element){
  document.querySelectorAll(".sidebar-item").forEach(el=>el.classList.remove("active"));
  element.classList.add("active");

  document.getElementById("viewerImg").src = "Images/" + img;
  document.getElementById("downloadBtn").onclick = ()=>{
    const link = document.createElement("a");
    link.href = "Images/" + img;
    link.download = img;
    link.click();
  };

  currentImage = img.replace(".png","");
}

/* START QUIZ */
function startQuiz(){
  window.location.href = `quiz.html?topic=waves&image=${currentImage}`;
}

/* LOAD FIRST IMAGE BY DEFAULT */
loadImage(images[0], sidebar.children[0]);
</script>

</body>
</html>
