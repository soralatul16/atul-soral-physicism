<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Waves | Atul Soral Physicism</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f172a;
  color:white;
}

/* NAVBAR */
.navbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 30px;
  background:#020617;
}

.nav-links a{
  margin-left:20px;
  color:white;
  text-decoration:none;
  font-weight:bold;
}

.nav-links a:hover{
  color:#38bdf8;
}

/* HEADER */
header{
  background:linear-gradient(135deg,#06b6d4,#2563eb);
  padding:40px;
  text-align:center;
}

/* BACK BUTTON */
.back-btn{
  display:block;
  margin:20px auto;
  padding:10px 20px;
  background:#334155;
  border:none;
  color:white;
  border-radius:6px;
  cursor:pointer;
}

.back-btn:hover{
  background:#475569;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
  gap:20px;
  padding:30px;
}

.card{
  background:#1e293b;
  padding:10px;
  border-radius:12px;
  text-align:center;
  transition:0.3s;
}

.card:hover{
  transform:scale(1.03);
}

.card img{
  width:100%;
  height:180px;
  object-fit:cover;
  border-radius:8px;
  cursor:pointer;
}

.card p{
  font-size:13px;
  margin-top:8px;
}

/* VIEWER */
.viewer{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:black;
  display:none;
  align-items:center;
  justify-content:center;
  flex-direction:column;
}

.viewer img{
  max-width:90%;
  max-height:80%;
}

.close{
  position:absolute;
  top:20px;
  right:30px;
  font-size:30px;
  cursor:pointer;
}

/* DOWNLOAD BUTTON */
.download-btn{
  margin-top:20px;
  padding:10px 20px;
  background:#22c55e;
  border:none;
  color:white;
  border-radius:6px;
  cursor:pointer;
}

.download-btn:hover{
  background:#16a34a;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
  <div><strong>Atul Soral Physicism</strong></div>
  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="myp-dashboard.html">MYP</a>
    <a href="dp-dashboard.html">DP</a>
  </div>
</div>

<!-- HEADER -->
<header>
<h1>🌊 Waves - Visual Learning</h1>
<p>Click any image to enlarge and download</p>
</header>

<!-- BACK BUTTON -->
<button class="back-btn" onclick="history.back()">⬅ Back</button>

<!-- GRID -->
<div class="grid" id="grid"></div>

<script>
const images = [

"2-waves-introduction.png",
"3-transverse-vs-longitudinal-wave.png",
"4-basic-properties-of-waves.png",
"5-wave-equation.png",
"6-reflection-of-waves.png",
"6-refraction-of-waves.png",
"7-diffraction-of-waves.png",
"8-total-internal-reflection.png",
"9-superposition-of-waves.png",
"10-standing-waves.png",
"11-sound-waves.png",
"12-speed-of-sound.png",
"13-musical-applications.png",
"14-electromagnetic-waves.png",
"15-radio-and-microwaves.png",
"16-infrared-visible-ultraviolet.png",
"17-x-ray-and-gamma-ray.png",
"18-reflection-and-refraction-of-light.png",
"19-light-and-communication.png",
"20-waves-and-culture.png",
"21-Design_investigation.png",
"22-data-processing.png",
"23-wave-technology.png",
"24-unit-project-showcase.png",
"25-explore-waves-at-home-lab.png",
"26-waves-connect-the-world.png"

];

const grid = document.getElementById("grid");

images.forEach(img=>{
  grid.innerHTML += `
  <div class="card">
    <img src="Images/${img}" onclick="openViewer(this.src)">
    <p>${img.replace(/-/g," ").replace(".png","")}</p>
  </div>`;
});
</script>

<!-- VIEWER -->
<div class="viewer" id="viewer">
<span class="close" onclick="closeViewer()">✖</span>

<img id="viewerImg">

<a id="downloadLink" download>
  <button class="download-btn">⬇ Download</button>
</a>

</div>

<script>
function openViewer(src){
  document.getElementById("viewer").style.display="flex";
  document.getElementById("viewerImg").src = src;
  document.getElementById("downloadLink").href = src;
}

function closeViewer(){
  document.getElementById("viewer").style.display="none";
}
</script>

</body>
</html>
