<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Waves | Atul Soral Physicism</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f172a;
  color:white;
}

header{
  background:linear-gradient(135deg,#06b6d4,#2563eb);
  padding:50px;
  text-align:center;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
  gap:20px;
  padding:30px;
}

.card{
  background:#1e293b;
  padding:10px;
  border-radius:12px;
  text-align:center;
}

.card img{
  width:100%;
  height:180px;
  object-fit:cover;
  border-radius:8px;
  cursor:pointer;
}

.card p{
  font-size:14px;
  margin-top:8px;
}

/* FULL SCREEN VIEW */
.viewer{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:black;
  display:none;
  align-items:center;
  justify-content:center;
}

.viewer img{
  max-width:90%;
  max-height:90%;
}

.close{
  position:absolute;
  top:20px;
  right:30px;
  font-size:30px;
  cursor:pointer;
}
</style>
</head>

<body>

<header>
<h1>🌊 Waves - Visual Learning</h1>
<p>Click any image to enlarge</p>
</header>

<div class="grid">

<!-- ADD IMAGES HERE -->

<script>
const images = [

"2-waves-introduction.png",
"3-transverse-vs-longitudinal-wave.png",
"4-basic-properties-of-waves.png",
"5-wave-equation.png",
"6-reflection-of-waves.png",
"6-refraction-of-waves.png",
"7-diffraction-of-waves.png",
"8-total-internal-reflection.png",
"9-superposition-of-waves.png",
"10-standing-waves.png",
"11-sound-waves.png",
"12-speed-of-sound.png",
"13-musical-applications.png",
"14-electromagnetic-waves.png",
"15-radio-and-microwaves.png",
"16-infrared-visible-ultraviolet.png",
"17-x-ray-and-gamma-ray.png",
"18-reflection-and-refraction-of-light.png",
"19-light-and-communication.png",
"20-waves-and-culture.png",
"21-Design_investigation.png",
"22-data-processing.png",
"23-wave-technology.png",
"24-unit-project-showcase.png",
"25-explore-waves-at-home-lab.png",
"26-waves-connect-the-world.png"

];

const grid = document.querySelector(".grid");

images.forEach(img=>{
  grid.innerHTML += `
  <div class="card">
    <img src="Images/${img}" onclick="openViewer(this.src)">
    <p>${img.replace(/-/g," ").replace(".png","")}</p>
  </div>`;
});
</script>

</div>

<!-- FULL SCREEN -->
<div class="viewer" id="viewer">
<span class="close" onclick="closeViewer()">✖</span>
<img id="viewerImg">
</div>

<script>
function openViewer(src){
  document.getElementById("viewer").style.display="flex";
  document.getElementById("viewerImg").src=src;
}

function closeViewer(){
  document.getElementById("viewer").style.display="none";
}
</script>

</body>
</html>
