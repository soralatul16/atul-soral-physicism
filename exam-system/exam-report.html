<title>Student Report | Physicism MYP</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">

<style>
:root {
  --surface: rgba(18,4,4,0.88);
  --surface2: rgba(38,8,8,0.9);
  --border: rgba(200,60,60,0.3);
  --accent: #e03030;
  --accent2: #c0392b;
  --accent-glow: rgba(224,48,48,0.15);
  --text: #f0e6e6;
  --text2: #b08888;
  --green: #27ae60;
  --red: #e03030;
  --yellow: #d29922;
  --blue: #2980b9;
  --radius: 10px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'DM Sans', sans-serif;
  background: linear-gradient(rgba(0,0,0,0.58), rgba(18,0,0,0.78)),
    url('./assets/myp-background-image.png') no-repeat center center fixed;
  background-size: cover;
  color: var(--text);
  min-height: 100vh;
}

.topbar {
  height: 56px; background: rgba(12,2,2,0.95);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 20px; z-index: 100; backdrop-filter: blur(10px);
}
.topbar-brand { font-family: 'Playfair Display', serif; font-size: 18px; color: var(--accent); text-shadow: 0 0 14px rgba(224,48,48,0.6); }
.icon-btn {
  background: rgba(38,8,8,0.8); border: 1px solid var(--border);
  padding: 6px 13px; border-radius: 6px; color: var(--text);
  cursor: pointer; font-size: 13px; transition: all 0.15s; font-family: 'DM Sans', sans-serif;
}
.icon-btn:hover { background: var(--accent-glow); border-color: var(--accent); color: var(--accent); }

.report { max-width: 900px; margin: 0 auto; padding: 28px 24px 80px; }

/* Header banner */
.report-banner {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 14px; padding: 28px 32px; margin-bottom: 24px;
  backdrop-filter: blur(10px); text-align: center;
}
.report-banner .school { font-family: 'Playfair Display', serif; font-size: 24px; color: var(--accent); margin-bottom: 4px; text-shadow: 0 0 14px rgba(224,48,48,0.4); }
.report-banner .subtitle { font-size: 13px; color: var(--text2); margin-bottom: 16px; }
.report-banner .student-name { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
.report-banner .set-title { font-size: 14px; color: var(--text2); }
.report-banner .date-line { font-size: 12px; color: var(--text2); margin-top: 8px; }

/* Score ring */
.score-section {
  display: grid; grid-template-columns: 200px 1fr; gap: 24px;
  margin-bottom: 24px; align-items: center;
}
.score-ring-wrap { text-align: center; }
.score-ring-wrap canvas { max-width: 160px; }
.score-details { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.score-detail {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 10px; padding: 14px; text-align: center;
}
.score-detail .num { font-size: 22px; font-weight: 700; color: var(--accent); }
.score-detail .lbl { font-size: 10px; color: var(--text2); margin-top: 3px; }

/* Criterion breakdown */
.crit-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 24px; }
.crit-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 12px; padding: 18px 14px; text-align: center;
}
.crit-letter { font-size: 28px; font-weight: 700; color: var(--accent); }
.crit-name { font-size: 10px; color: var(--text2); margin: 4px 0 8px; }
.crit-score { font-size: 16px; font-weight: 600; }
.crit-bar { height: 4px; background: var(--surface2); border-radius: 2px; margin-top: 6px; overflow: hidden; }
.crit-bar-fill { height: 100%; border-radius: 2px; }

/* Charts */
.chart-panel {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 12px; padding: 20px; margin-bottom: 24px; backdrop-filter: blur(10px);
}
.chart-panel canvas { max-height: 260px; }

/* Teacher feedback */
.feedback-box {
  background: var(--surface); border: 1px solid rgba(224,48,48,0.25);
  border-radius: 12px; padding: 20px; margin-bottom: 24px;
}
.fb-label { font-size: 11px; color: var(--accent); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px; }
.fb-text { font-size: 14px; line-height: 1.7; }

/* Question review */
.section-title {
  font-size: 13px; font-weight: 600; margin-bottom: 14px;
  color: var(--text2); letter-spacing: 0.5px; text-transform: uppercase;
}
.q-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 12px; padding: 18px; margin-bottom: 14px;
  border-left: 3px solid var(--text2);
}
.q-card.correct { border-left-color: var(--green); }
.q-card.incorrect { border-left-color: var(--red); }
.q-card.graded { border-left-color: var(--green); }
.q-card.pending { border-left-color: var(--yellow); }
.q-top { display: flex; justify-content: space-between; margin-bottom: 10px; flex-wrap: wrap; gap: 6px; }
.q-top .label { font-size: 11px; color: var(--text2); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
.q-top .status { font-size: 12px; font-weight: 700; }
.q-text { font-size: 14px; line-height: 1.6; margin-bottom: 12px; }
.badge { font-size: 10px; padding: 2px 8px; border-radius: 10px; background: var(--surface2); border: 1px solid var(--border); color: var(--text2); }
.badge.green { background: rgba(39,174,96,0.12); border-color: rgba(39,174,96,0.4); color: #5edd8a; }
.badge.red { background: var(--accent-glow); border-color: rgba(224,48,48,0.4); color: #ff7070; }
.badge.blue { background: rgba(41,128,185,0.12); border-color: rgba(41,128,185,0.4); color: #76b4de; }
.badge.yellow { background: rgba(210,153,34,0.12); border-color: rgba(210,153,34,0.4); color: #f7c66e; }

.answer-box {
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 8px; padding: 12px; font-size: 13px; line-height: 1.6;
  color: var(--text); margin-top: 8px; white-space: pre-wrap;
}
.teacher-fb {
  margin-top: 12px; padding: 12px; background: rgba(224,48,48,0.07);
  border: 1px solid rgba(224,48,48,0.2); border-radius: 7px;
}
.teacher-fb .tf-label { font-size: 11px; color: #ff7070; font-weight: 600; margin-bottom: 4px; }
.teacher-fb .tf-text { font-size: 13px; color: var(--text2); line-height: 1.6; }
.ms-box {
  margin-top: 10px; padding: 12px; background: rgba(39,174,96,0.07);
  border: 1px solid rgba(39,174,96,0.2); border-radius: 7px;
}
.ms-box .ms-label { font-size: 11px; color: #5edd8a; font-weight: 600; margin-bottom: 4px; }
.ms-box .ms-text { font-size: 13px; color: var(--text2); line-height: 1.6; }

/* Progress chart section */
.progress-section { margin-bottom: 24px; }

/* Actions */
.actions { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 24px; padding-bottom: 40px; }
.btn {
  padding: 10px 22px; border-radius: 8px; border: none; cursor: pointer;
  font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 600; transition: all 0.15s;
}
.btn-primary { background: var(--accent); color: white; }
.btn-primary:hover { background: var(--accent2); box-shadow: 0 4px 16px rgba(224,48,48,0.4); }
.btn-secondary { background: var(--surface2); color: var(--text2); border: 1px solid var(--border); }
.btn-secondary:hover { color: var(--text); }

@media (max-width: 768px) {
  .score-section { grid-template-columns: 1fr; }
  .crit-grid { grid-template-columns: repeat(2, 1fr); }
  .score-details { grid-template-columns: 1fr 1fr; }
}

::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(224,48,48,0.3); border-radius: 3px; }
</style>
</head>

<div class="topbar">
  <span class="topbar-brand">MYP·Report</span>
  <div style="display:flex;gap:8px;">
    <button class="icon-btn" onclick="downloadPDF()">⬇ Download PDF</button>
    <button class="icon-btn" onclick="window.print()">🖨 Print</button>
    <button class="icon-btn" onclick="window.location.href='exam-student.html'">← Back</button>
    <button class="icon-btn" onclick="window.location.href='https://soralatul16.github.io/atul-soral-physicism/index.html'">🏠 Home</button>
  </div>
</div>

<div class="report" id="reportContent">
  <div id="reportBody"><p style="color:var(--text2);text-align:center;padding:60px;">Loading report…</p></div>
</div>

<!-- Firebase Compat SDKs -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="firebase-config.js?v=2"></script>
<script src="exam-storage.js"></script>
<script>
/* ═══════════════════════════════════════════════════
   STUDENT REPORT — Polished view with charts
   Opens via: exam-report.html?id=ATTEMPT_ID
   ═══════════════════════════════════════════════════ */

let currentAttempt = null;
let currentQuestionSet = null;

window.addEventListener("DOMContentLoaded", async () => {
  const params = new URLSearchParams(window.location.search);
  const attemptId = params.get("id");
  if (!attemptId) { document.getElementById("reportBody").innerHTML = '<p style="color:var(--text2);text-align:center;padding:60px;">No attempt ID provided.</p>'; return; }

  document.getElementById("reportBody").innerHTML = '<p style="color:var(--text2);text-align:center;padding:60px;">Loading report from cloud...</p>';

  let a = null;
  let set = null;

  try {
    if (window.db) {
      const doc = await db.collection("attempts").doc(attemptId).get();
      if (doc.exists) {
        a = doc.data();
        a.id = doc.id;
      }
    }
  } catch (err) {
    console.error("Firestore attempt load error:", err);
  }

  if (!a) {
    const attempts = getAttempts();
    a = attempts.find(x => x.id === attemptId);
  }

  if (!a) {
    document.getElementById("reportBody").innerHTML = '<p style="color:var(--text2);text-align:center;padding:60px;">Attempt not found.</p>';
    return;
  }

  try {
    if (window.db && a.setId) {
      const doc = await db.collection("questionSets").doc(a.setId).get();
      if (doc.exists) {
        const rawSet = doc.data();
        if (rawSet.dataJson) {
          try {
            set = JSON.parse(rawSet.dataJson);
            set._docId = doc.id;
          } catch (e) {
            console.error("Error parsing question set JSON:", e);
          }
        }
        if (!set) {
          if (rawSet.blocksJson) {
            try { rawSet.blocks = JSON.parse(rawSet.blocksJson); } catch(e) { rawSet.blocks = []; }
          }
          if (rawSet.sectionsJson) {
            try { rawSet.sections = JSON.parse(rawSet.sectionsJson); } catch(e) { rawSet.sections = []; }
          }
          set = rawSet;
        }
      }
    }
  } catch (err) {
    console.error("Firestore question set load error:", err);
  }

  if (!set) {
    const library = getLibrary();
    set = library.find(s => s.id === a.setId);
  }

  currentAttempt = a;
  currentQuestionSet = set;

  const qBlocks = set ? (set.blocks || []).filter(b => b.saved && b.mode === "question") : [];
  const savedSections = set?.sections || [{ id: 1, name: "Section 1" }];
  const isGraded = a.gradingStatus === "graded";

  // Compute criterion data
  const cm = { A: { scored: 0, total: 0 }, B: { scored: 0, total: 0 }, C: { scored: 0, total: 0 }, D: { scored: 0, total: 0 } };
  qBlocks.forEach((q, i) => {
    const k = (q.meta?.criterion || "").charAt(0);
    const marks = Number(q.meta?.marks || 0);
    let scored = 0;
    if (a.grades && a.grades[i] !== undefined) scored = Number(a.grades[i]);
    else {
      if (q.type === "True / False" && q.ui?.tfAnswer && a.answers?.[i] === q.ui.tfAnswer) scored = marks;
      else if (q.type === "MCQ" && q.data?.correct !== null && q.data?.correct !== undefined && a.answers?.[i] === q.data.correct) scored = marks;
    }
    if (cm[k]) { cm[k].scored += scored; cm[k].total += marks; }
  });

  // Recalculate total from teacher grades if available
  let displayEarned = a.earnedMarks || 0;
  let displayTotal = a.totalMarks || 0;
  let displayPct = a.percentScore || 0;
  if (isGraded) {
    displayEarned = Object.values(a.grades || {}).reduce((s, v) => s + Number(v), 0);
    displayTotal = qBlocks.reduce((s, q) => s + Number(q.meta?.marks || 0), 0);
    displayPct = displayTotal > 0 ? Math.round(displayEarned / displayTotal * 100) : 0;
  }

  let html = "";

  // ── HEADER BANNER ──
  html += `
  <div class="report-banner">
    <div class="school">Atul Soral · Physicism</div>
    <div class="subtitle">IB MYP Physics — Student Performance Report</div>
    <div class="student-name">${a.studentName || "Student"}</div>
    <div class="set-title">${a.setTitle || "Assessment"} ${isGraded ? '— ✓ Graded by Teacher' : ''}</div>
    <div class="date-line">
      ${new Date(a.endTime || a.startTime).toLocaleDateString('en-IN', { day: 'numeric', month: 'long', year: 'numeric' })}
      · Duration: ${Math.floor((a.duration || 0) / 60)}m ${(a.duration || 0) % 60}s
      ${set ? ' · ' + [set.chapter, set.topic].filter(Boolean).join(' → ') : ''}
    </div>
  </div>`;

  // ── SCORE SECTION ──
  html += `
  <div class="score-section">
    <div class="score-ring-wrap"><canvas id="scoreRing" width="160" height="160"></canvas></div>
    <div class="score-details">
      <div class="score-detail"><div class="num">${displayEarned} / ${displayTotal}</div><div class="lbl">Total Marks</div></div>
      <div class="score-detail"><div class="num" style="color:${displayPct >= 70 ? 'var(--green)' : displayPct >= 40 ? 'var(--yellow)' : 'var(--red)'};">${displayPct}%</div><div class="lbl">Percentage</div></div>
      <div class="score-detail"><div class="num">${qBlocks.length}</div><div class="lbl">Questions</div></div>
      <div class="score-detail"><div class="num">${Math.floor((a.duration || 0) / 60)}m</div><div class="lbl">Time Taken</div></div>
    </div>
  </div>`;

  // ── CRITERION BREAKDOWN ──
  const critNames = { A: "Knowing &\nUnderstanding", B: "Inquiring &\nDesigning", C: "Processing &\nEvaluating", D: "Reflecting on\nImpacts" };
  const critColors = { A: "#e03030", B: "#2980b9", C: "#27ae60", D: "#d29922" };
  html += `<div class="crit-grid">`;
  ["A", "B", "C", "D"].forEach(c => {
    const pct = cm[c].total > 0 ? Math.round(cm[c].scored / cm[c].total * 100) : 0;
    html += `
    <div class="crit-card">
      <div class="crit-letter" style="color:${critColors[c]};">${c}</div>
      <div class="crit-name">${critNames[c].replace('\n', '<br>')}</div>
      <div class="crit-score">${cm[c].total > 0 ? cm[c].scored + ' / ' + cm[c].total : '—'}</div>
      <div class="crit-bar"><div class="crit-bar-fill" style="width:${pct}%;background:${critColors[c]};"></div></div>
    </div>`;
  });
  html += `</div>`;

  // ── CRITERION RADAR CHART ──
  html += `<div class="chart-panel"><div class="section-title">Criterion Radar</div><canvas id="critRadar"></canvas></div>`;

  // ── OVERALL TEACHER FEEDBACK ──
  if (a.overallFeedback) {
    html += `<div class="feedback-box">
      <div class="fb-label">👨‍🏫 Overall Teacher Feedback</div>
      <div class="fb-text">${a.overallFeedback}</div>
    </div>`;
  }

  // ── PROGRESS CHART (all attempts for this set) ──
  const myAttempts = attempts
    .filter(x => x.studentEmail === a.studentEmail && x.setId === a.setId && x.status === "completed")
    .sort((x, y) => (x.endTime || x.startTime) - (y.endTime || y.startTime));
  if (myAttempts.length > 1) {
    html += `<div class="chart-panel progress-section"><div class="section-title">Progress Over Attempts</div><canvas id="progressChart"></canvas></div>`;
  }

  // ── QUESTION REVIEW ──
  html += `<div class="section-title">Question-by-Question Review</div>`;
  qBlocks.forEach((q, i) => {
    const ans = a.answers?.[i];
    const teacherGrade = a.grades?.[i];
    const teacherFb = a.teacherFeedback?.[i];
    const hasTeacherGrade = teacherGrade !== undefined && teacherGrade !== null && teacherGrade !== '';
    const marks = Number(q.meta?.marks || 0);
    const crit = q.meta?.criterion;
    const markScheme = q.meta?.markScheme;

    // Status
    let statusText = "Not answered", statusColor = "var(--text2)", cardClass = "";
    let isCorrect = null;

    if (q.type === "MCQ" || q.type === "Multiple Select MCQ") {
      if (ans === undefined || ans === "" || (Array.isArray(ans) && ans.length === 0)) {
        statusText = "Not answered";
      } else if (q.data?.correct !== undefined && q.data?.correct !== null) {
        const correct = Array.isArray(q.data.correct)
          ? JSON.stringify(Array.isArray(ans) ? [...ans].sort() : ans) === JSON.stringify([...q.data.correct].sort())
          : ans === q.data.correct;
        isCorrect = correct;
        statusText = correct ? "✅ Correct" : "❌ Incorrect";
        statusColor = correct ? "var(--green)" : "var(--red)";
        cardClass = correct ? "correct" : "incorrect";
      }
    } else if (q.type === "True / False") {
      if (!ans) { statusText = "Not answered"; }
      else {
        isCorrect = ans === q.ui?.tfAnswer;
        statusText = isCorrect ? "✅ Correct" : "❌ Incorrect";
        statusColor = isCorrect ? "var(--green)" : "var(--red)";
        cardClass = isCorrect ? "correct" : "incorrect";
      }
    } else {
      if (!ans) { statusText = "Not answered"; }
      else if (hasTeacherGrade) { statusText = `Graded: ${teacherGrade}/${marks}`; statusColor = "var(--green)"; cardClass = "graded"; }
      else { statusText = "Awaiting grading"; statusColor = "var(--yellow)"; cardClass = "pending"; }
    }

    // Question label
    const secId = q.sectionId || (savedSections[0]?.id || 1);
    const sec = savedSections.find(s => s.id === secId) || savedSections[0] || { name: "Section 1" };
    const secIdx = savedSections.indexOf(sec) + 1;
    const qInSec = qBlocks.slice(0, i + 1).filter(bk => bk.sectionId === secId).length;
    const letters = ["a", "b", "c", "d", "e", "f", "g", "h", "i", "j"];
    const qLabel = `${secIdx}(${letters[qInSec - 1] || qInSec})`;

    // Answer display
    let ansHTML = "";
    if (q.type === "MCQ" || q.type === "Multiple Select MCQ") {
      const opts = (q.ui?.mcqOptions || []).filter(o => o.trim());
      ansHTML = opts.map((o, oi) => {
        const isStudentPick = Array.isArray(ans) ? ans.includes(oi) : ans === oi;
        const isCorrectOpt = Array.isArray(q.data?.correct) ? q.data.correct.includes(oi) : q.data?.correct === oi;
        let bg = "var(--surface2)", border = "var(--border)", icon = "";
        if (isStudentPick && isCorrectOpt) { bg = "rgba(39,174,96,0.15)"; border = "rgba(39,174,96,0.5)"; icon = "✅"; }
        else if (isStudentPick && !isCorrectOpt) { bg = "rgba(224,48,48,0.12)"; border = "rgba(224,48,48,0.4)"; icon = "❌"; }
        else if (!isStudentPick && isCorrectOpt) { bg = "rgba(39,174,96,0.08)"; border = "rgba(39,174,96,0.3)"; icon = "✓"; }
        return `<div style="padding:8px 12px;background:${bg};border:1px solid ${border};border-radius:7px;font-size:13px;display:flex;gap:10px;align-items:center;margin-bottom:4px;">
          <strong style="min-width:18px;">${String.fromCharCode(65 + oi)}.</strong> ${o}
          ${icon ? `<span style="margin-left:auto;font-size:11px;">${icon}</span>` : ""}
        </div>`;
      }).join("");
    } else if (q.type === "True / False") {
      const correct = q.ui?.tfAnswer;
      ansHTML = `<div style="display:flex;gap:10px;">
        <div style="flex:1;padding:10px;border-radius:7px;text-align:center;border:1px solid ${ans === 'True' ? (isCorrect ? 'rgba(39,174,96,0.5)' : 'rgba(224,48,48,0.4)') : 'var(--border)'};background:${ans === 'True' ? (isCorrect ? 'rgba(39,174,96,0.12)' : 'rgba(224,48,48,0.1)') : 'var(--surface2)'};">
          ✓ True ${ans === 'True' ? (isCorrect ? '✅' : '❌') : ''} ${correct === 'True' && ans !== 'True' ? '<span style="font-size:10px;color:#5edd8a;">← correct</span>' : ''}
        </div>
        <div style="flex:1;padding:10px;border-radius:7px;text-align:center;border:1px solid ${ans === 'False' ? (isCorrect ? 'rgba(39,174,96,0.5)' : 'rgba(224,48,48,0.4)') : 'var(--border)'};background:${ans === 'False' ? (isCorrect ? 'rgba(39,174,96,0.12)' : 'rgba(224,48,48,0.1)') : 'var(--surface2)'};">
          ✗ False ${ans === 'False' ? (isCorrect ? '✅' : '❌') : ''} ${correct === 'False' && ans !== 'False' ? '<span style="font-size:10px;color:#5edd8a;">← correct</span>' : ''}
        </div>
      </div>`;
    } else {
      ansHTML = `<div class="answer-box">${ans || "(Not answered)"}</div>`;
    }

    html += `
    <div class="q-card ${cardClass}">
      <div class="q-top">
        <div>
          <span class="label">Q${qLabel} · ${q.type}</span>
          ${marks ? ` <span class="badge red">${marks} marks</span>` : ""}
          ${crit ? ` <span class="badge blue">Crit ${crit}</span>` : ""}
          ${hasTeacherGrade ? ` <span class="badge green">✓ ${teacherGrade}/${marks}</span>` : ""}
        </div>
        <span class="status" style="color:${statusColor};">${statusText}</span>
      </div>
      <div class="q-text">${q.data?.question || "(No question text)"}</div>
      <div style="font-size:10px;color:var(--text2);font-weight:600;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:4px;">Your Answer</div>
      ${ansHTML}
      ${teacherFb ? `<div class="teacher-fb"><div class="tf-label">👨‍🏫 Teacher Feedback</div><div class="tf-text">${teacherFb}</div></div>` : ""}
      ${markScheme ? `<div class="ms-box"><div class="ms-label">📗 Mark Scheme</div><div class="ms-text">${markScheme}</div></div>` : ""}
    </div>`;
  });

  // ── ACTIONS ──
  html += `
  <div class="actions">
    <button class="btn btn-primary" onclick="downloadPDF()">⬇ Download PDF</button>
    <button class="btn btn-secondary" onclick="window.print()">🖨 Print Report</button>
    <button class="btn btn-secondary" onclick="window.location.href='exam-student.html'">← Back to Dashboard</button>
  </div>`;

  document.getElementById("reportBody").innerHTML = html;

  // ── RENDER CHARTS ──
  setTimeout(() => {
    // Score donut
    const ringCtx = document.getElementById("scoreRing");
    if (ringCtx) {
      new Chart(ringCtx, {
        type: "doughnut",
        data: {
          labels: ["Earned", "Remaining"],
          datasets: [{ data: [displayEarned, Math.max(0, displayTotal - displayEarned)],
            backgroundColor: [displayPct >= 70 ? "#27ae60" : displayPct >= 40 ? "#d29922" : "#e03030", "rgba(255,255,255,0.06)"],
            borderWidth: 0 }]
        },
        options: {
          cutout: "72%", responsive: true, maintainAspectRatio: true,
          plugins: {
            legend: { display: false },
            tooltip: { enabled: false }
          }
        },
        plugins: [{
          id: "centerText",
          afterDraw(chart) {
            const { ctx, chartArea: { width, height, top, left } } = chart;
            ctx.save();
            ctx.textAlign = "center";
            ctx.fillStyle = "#f0e6e6";
            ctx.font = "bold 28px DM Sans"; ctx.fillText(displayPct + "%", left + width / 2, top + height / 2 + 4);
            ctx.font = "11px DM Sans"; ctx.fillStyle = "#b08888"; ctx.fillText("SCORE", left + width / 2, top + height / 2 + 22);
            ctx.restore();
          }
        }]
      });
    }

    // Criterion radar
    const radarCtx = document.getElementById("critRadar");
    if (radarCtx) {
      new Chart(radarCtx, {
        type: "radar",
        data: {
          labels: ["A · Knowing", "B · Inquiring", "C · Processing", "D · Reflecting"],
          datasets: [{
            label: "Score %",
            data: ["A", "B", "C", "D"].map(c => cm[c].total > 0 ? Math.round(cm[c].scored / cm[c].total * 100) : 0),
            backgroundColor: "rgba(224,48,48,0.15)",
            borderColor: "#e03030", borderWidth: 2, pointRadius: 4,
            pointBackgroundColor: "#e03030"
          }]
        },
        options: {
          responsive: true, maintainAspectRatio: true,
          scales: { r: { beginAtZero: true, max: 100, ticks: { stepSize: 25, color: "#b08888", backdropColor: "transparent", font: { size: 10 } }, grid: { color: "rgba(200,60,60,0.15)" }, pointLabels: { color: "#f0e6e6", font: { size: 11 } } } },
          plugins: { legend: { display: false } }
        }
      });
    }

    // Progress line chart
    const progCtx = document.getElementById("progressChart");
    if (progCtx && myAttempts.length > 1) {
      new Chart(progCtx, {
        type: "line",
        data: {
          labels: myAttempts.map((x, i) => "Attempt " + (i + 1)),
          datasets: [{
            label: "Score %", data: myAttempts.map(x => x.percentScore || 0),
            borderColor: "#e03030", backgroundColor: "rgba(224,48,48,0.1)",
            borderWidth: 2, fill: true, tension: 0.3, pointRadius: 5,
            pointBackgroundColor: "#e03030"
          }]
        },
        options: {
          responsive: true, maintainAspectRatio: true,
          scales: {
            y: { beginAtZero: true, max: 100, ticks: { color: "#b08888", font: { size: 10 } }, grid: { color: "rgba(200,60,60,0.1)" } },
            x: { ticks: { color: "#b08888", font: { size: 10 } }, grid: { display: false } }
          },
          plugins: { legend: { display: false } }
        }
      });
    }
  }, 100);
});

/* ── PDF Download ── */
function downloadPDF() {
  const a = currentAttempt;
  const set = currentQuestionSet;
  if (!a) { alert("Attempt not loaded yet. Please wait."); return; }

  const qBlocks = set ? (set.blocks || []).filter(b => b.saved && b.mode === "question") : [];

  try {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();
    let y = 18;

    doc.setFontSize(16); doc.setFont("helvetica", "bold");
    doc.text("Atul Soral Physicism — MYP Physics Report", 20, y); y += 8;
    doc.setFontSize(10); doc.setFont("helvetica", "normal");
    doc.text(`Student: ${a.studentName}   |   Set: ${a.setTitle || ""}`, 20, y); y += 6;
    doc.text(`Date: ${new Date(a.endTime || Date.now()).toLocaleString()}   |   Duration: ${Math.floor((a.duration || 0) / 60)}m ${(a.duration || 0) % 60}s`, 20, y); y += 6;
    doc.text(`Score: ${a.earnedMarks || 0} / ${a.totalMarks || 0} (${a.percentScore || 0}%)`, 20, y); y += 4;

    if (a.gradingStatus === 'graded') {
      doc.setTextColor(39, 174, 96);
      doc.text("✓ Graded by Teacher", 20, y + 4); y += 4;
      doc.setTextColor(0, 0, 0);
    }
    y += 4;
    doc.setDrawColor(224, 48, 48); doc.line(20, y, 190, y); y += 8;

    // Criterion summary
    doc.setFont("helvetica", "bold"); doc.setFontSize(12);
    doc.text("Criterion Breakdown", 20, y); y += 6;
    doc.setFont("helvetica", "normal"); doc.setFontSize(10);
    const cm2 = { A: { s: 0, t: 0 }, B: { s: 0, t: 0 }, C: { s: 0, t: 0 }, D: { s: 0, t: 0 } };
    qBlocks.forEach((q, i) => {
      const k = (q.meta?.criterion || "").charAt(0);
      const marks = Number(q.meta?.marks || 0);
      let scored = 0;
      if (a.grades && a.grades[i] !== undefined) scored = Number(a.grades[i]);
      else {
        if (q.type === "True / False" && q.ui?.tfAnswer && a.answers?.[i] === q.ui.tfAnswer) scored = marks;
        else if (q.type === "MCQ" && q.data?.correct !== null && q.data?.correct !== undefined && a.answers?.[i] === q.data.correct) scored = marks;
      }
      if (cm2[k]) { cm2[k].s += scored; cm2[k].t += marks; }
    });
    const critFull = { A: "Knowing & Understanding", B: "Inquiring & Designing", C: "Processing & Evaluating", D: "Reflecting on Impacts" };
    ["A", "B", "C", "D"].forEach(c => {
      doc.text(`Criterion ${c} (${critFull[c]}): ${cm2[c].t > 0 ? cm2[c].s + '/' + cm2[c].t + ' (' + Math.round(cm2[c].s / cm2[c].t * 100) + '%)' : 'N/A'}`, 24, y);
      y += 5;
    });
    y += 4;

    // Overall feedback
    if (a.overallFeedback) {
      doc.setFont("helvetica", "bold"); doc.setFontSize(11);
      doc.text("Teacher Feedback:", 20, y); y += 5;
      doc.setFont("helvetica", "normal"); doc.setFontSize(10);
      const fbLines = doc.splitTextToSize(a.overallFeedback, 165);
      doc.text(fbLines, 20, y); y += fbLines.length * 5 + 4;
      doc.line(20, y, 190, y); y += 6;
    }

    // Questions
    qBlocks.forEach((q, i) => {
      if (y > 250) { doc.addPage(); y = 20; }
      doc.setFont("helvetica", "bold"); doc.setFontSize(11);
      const gradeText = a.grades?.[i] !== undefined ? ` — Scored: ${a.grades[i]}/${q.meta?.marks || 0}` : '';
      doc.text(`Q${i + 1}. [${q.meta?.marks || 0} marks]${gradeText}`, 20, y); y += 5;
      doc.setFont("helvetica", "normal"); doc.setFontSize(10);
      const qText = (q.data?.question || "").replace(/<[^>]+>/g, '');
      const lines = doc.splitTextToSize(qText, 165);
      doc.text(lines, 20, y); y += lines.length * 5 + 2;
      const ans = a.answers?.[i];
      let disp = "(Not answered)";
      if (ans !== undefined && ans !== null && ans !== '') {
        if (typeof ans === 'string' && ans.startsWith('data:image')) {
          disp = '[Drawing]';
        } else if (Array.isArray(ans)) {
          disp = ans.map(n => typeof n === 'number' ? String.fromCharCode(65 + n) : String(n)).join(', ');
        } else if (typeof ans === 'number') {
          disp = String.fromCharCode(65 + ans);
        } else if (typeof ans === 'object') {
          let parts = [];
          Object.entries(ans).forEach(([k, v]) => {
            if (typeof v === 'object' && v !== null) {
              Object.values(v).forEach(x => { if (x) parts.push(String(x)); });
            } else if (v) {
              parts.push(String(v));
            }
          });
          disp = parts.join(', ') || '(Answered)';
        } else {
          disp = String(ans);
        }
      }
      doc.setFont("helvetica", "italic");
      doc.text("Answer: " + disp.substring(0, 120), 20, y); y += 5;
      if (a.teacherFeedback?.[i]) {
        doc.setFont("helvetica", "normal"); doc.setTextColor(39, 174, 96);
        const tfbLines = doc.splitTextToSize("Teacher: " + a.teacherFeedback[i], 165);
        doc.text(tfbLines, 20, y); y += tfbLines.length * 5;
        doc.setTextColor(0, 0, 0);
      }
      y += 4;
    });

    doc.save(`Physicism_Report_${(a.setTitle || "exam").replace(/\s/g, "_")}.pdf`);
  } catch (e) {
    alert("PDF download failed. Check console."); console.error(e);
  }
}
</script>
