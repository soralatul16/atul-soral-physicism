<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Report | Physicism MYP</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<link rel="stylesheet" href="../../feedback.css">
<style>
:root {
  --surface: rgba(18,4,4,0.88);
  --surface2: rgba(38,8,8,0.9);
  --border: rgba(200,60,60,0.3);
  --accent: #e03030;
  --accent2: #c0392b;
  --accent-glow: rgba(224,48,48,0.15);
  --text: #f0e6e6;
  --text2: #b08888;
  --green: #27ae60;
  --red: #e03030;
  --yellow: #d29922;
  --blue: #2980b9;
  --radius: 10px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'DM Sans', sans-serif;
  background: linear-gradient(rgba(0,0,0,0.58), rgba(18,0,0,0.78)),
    url('./assets/myp-background-image.png') no-repeat center center fixed;
  background-size: cover;
  color: var(--text);
  min-height: 100vh;
  padding: 0;
}

/* TOPBAR */
.topbar {
  height: 56px;
  background: rgba(12,2,2,0.95);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 20px; flex-shrink: 0; z-index: 100;
  backdrop-filter: blur(10px);
  position: sticky; top: 0;
}
.topbar-brand {
  font-family: 'Playfair Display', serif;
  font-size: 18px; color: var(--accent); margin-right: 16px;
  text-shadow: 0 0 14px rgba(224,48,48,0.6);
}
.icon-btn {
  background: rgba(38,8,8,0.8); border: 1px solid var(--border);
  padding: 6px 13px; border-radius: 6px; color: var(--text);
  cursor: pointer; font-size: 13px; transition: all 0.15s;
  font-family: 'DM Sans', sans-serif;
}
.icon-btn:hover { background: var(--accent-glow); border-color: var(--accent); color: var(--accent); }

/* REPORT CONTAINER */
.report-container {
  max-width: 900px;
  margin: 24px auto;
  padding: 0 20px 60px;
}

/* REPORT HEADER */
.report-header {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 32px;
  margin-bottom: 24px;
  backdrop-filter: blur(10px);
  text-align: center;
}
.report-header .brand-line {
  font-family: 'Playfair Display', serif;
  font-size: 24px;
  color: var(--accent);
  text-shadow: 0 0 14px rgba(224,48,48,0.4);
  margin-bottom: 4px;
}
.report-header .brand-sub {
  font-size: 12px;
  color: var(--text2);
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-bottom: 20px;
}
.report-header h1 {
  font-size: 22px;
  font-weight: 700;
  margin-bottom: 6px;
}
.report-header .meta-line {
  font-size: 13px;
  color: var(--text2);
  margin-bottom: 4px;
}
.report-header .score-display {
  margin-top: 20px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 16px;
}
.score-ring {
  width: 100px; height: 100px;
  position: relative;
}
.score-ring canvas { width: 100px; height: 100px; }
.score-ring .score-text {
  position: absolute; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  font-size: 24px; font-weight: 700;
}
.score-ring .score-sub { font-size: 11px; color: var(--text2); font-weight: 400; }
.score-details { text-align: left; }
.score-details div { font-size: 13px; margin-bottom: 3px; color: var(--text2); }
.score-details span { color: var(--text); font-weight: 600; }
.graded-badge {
  display: inline-block;
  margin-top: 14px;
  padding: 4px 14px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 600;
}
.graded-badge.yes { background: rgba(39,174,96,0.15); border: 1px solid rgba(39,174,96,0.4); color: #5edd8a; }
.graded-badge.no { background: rgba(210,153,34,0.12); border: 1px solid rgba(210,153,34,0.4); color: #f7c66e; }

/* CARDS */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 22px;
  margin-bottom: 20px;
  backdrop-filter: blur(8px);
}
.card-title {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--text2);
  font-weight: 600;
  margin-bottom: 14px;
}

/* CRITERION GRID */
.crit-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 12px;
  margin-bottom: 16px;
}
.crit-box {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 14px;
  text-align: center;
}
.crit-box .letter {
  font-size: 22px;
  font-weight: 700;
  color: var(--accent);
  font-family: 'Playfair Display', serif;
}
.crit-box .name { font-size: 10px; color: var(--text2); margin: 4px 0; }
.crit-box .score { font-size: 15px; font-weight: 600; }
.crit-box .bar-wrap {
  height: 4px; background: rgba(255,255,255,0.06);
  border-radius: 2px; margin-top: 8px; overflow: hidden;
}
.crit-box .bar-fill {
  height: 100%; background: var(--accent);
  border-radius: 2px; transition: width 0.6s;
}

/* CHART CARD */
.chart-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
  margin-bottom: 20px;
}
.chart-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 22px;
  backdrop-filter: blur(8px);
}
.chart-card canvas { max-height: 220px; }

/* TEACHER FEEDBACK */
.feedback-card {
  background: var(--surface);
  border: 1px solid rgba(224,48,48,0.25);
  border-radius: 12px;
  padding: 22px;
  margin-bottom: 20px;
}
.feedback-card .fb-label {
  font-size: 11px;
  color: var(--accent);
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 8px;
}
.feedback-card .fb-text {
  font-size: 14px;
  line-height: 1.7;
  color: var(--text);
}

/* QUESTION REVIEW */
.q-item {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 18px;
  margin-bottom: 14px;
  backdrop-filter: blur(8px);
  transition: border-color 0.15s;
}
.q-item:hover { border-color: rgba(224,48,48,0.5); }
.q-item-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: 10px;
  flex-wrap: wrap;
  gap: 8px;
}
.q-label-tags { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
.tag {
  font-size: 10px; padding: 2px 8px;
  border-radius: 10px; border: 1px solid var(--border);
  background: var(--surface2); color: var(--text2);
}
.tag.red { background: var(--accent-glow); border-color: rgba(224,48,48,0.4); color: #ff7070; }
.tag.green { background: rgba(39,174,96,0.12); border-color: rgba(39,174,96,0.4); color: #5edd8a; }
.tag.blue { background: rgba(41,128,185,0.12); border-color: rgba(41,128,185,0.4); color: #76b4de; }
.tag.yellow { background: rgba(210,153,34,0.12); border-color: rgba(210,153,34,0.4); color: #f7c66e; }
.q-status { font-size: 12px; font-weight: 700; }
.q-text { font-size: 14px; line-height: 1.7; margin-bottom: 10px; }
.answer-box {
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 8px; padding: 12px; font-size: 13px;
  color: var(--text2); line-height: 1.6; white-space: pre-wrap;
  margin-bottom: 10px;
}
.teacher-fb {
  margin-top: 10px; padding: 12px;
  background: rgba(224,48,48,0.07);
  border: 1px solid rgba(224,48,48,0.2);
  border-radius: 7px;
}
.teacher-fb .tfb-label { font-size: 11px; color: #ff7070; font-weight: 600; margin-bottom: 4px; }
.teacher-fb .tfb-text { font-size: 13px; color: var(--text2); line-height: 1.6; }
.ms-box {
  margin-top: 10px; padding: 12px;
  background: rgba(39,174,96,0.07);
  border: 1px solid rgba(39,174,96,0.2);
  border-radius: 7px;
}
.ms-box .ms-label { font-size: 11px; color: #5edd8a; font-weight: 600; margin-bottom: 4px; }
.ms-box .ms-text { font-size: 13px; color: var(--text2); line-height: 1.6; }

/* MCQ OPTIONS */
.opt-display {
  padding: 8px 12px; border-radius: 7px;
  border: 1px solid var(--border);
  background: var(--surface2);
  margin-bottom: 6px; font-size: 13px;
  display: flex; align-items: center; gap: 10px;
}
.opt-display.correct { border-color: rgba(39,174,96,0.5); background: rgba(39,174,96,0.1); }
.opt-display.wrong { border-color: rgba(224,48,48,0.4); background: rgba(224,48,48,0.08); }
.opt-letter {
  width: 22px; height: 22px; border-radius: 50%;
  border: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 700; flex-shrink: 0;
}

/* PROGRESS SECTION */
.progress-list { display: flex; flex-direction: column; gap: 8px; }
.progress-item {
  display: flex; justify-content: space-between; align-items: center;
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 8px; padding: 10px 14px;
}
.progress-item .pi-title { font-size: 13px; font-weight: 600; }
.progress-item .pi-meta { font-size: 11px; color: var(--text2); }
.progress-item .pi-score { font-size: 14px; font-weight: 700; }

/* ACTIONS */
.actions-bar {
  display: flex; gap: 10px; flex-wrap: wrap;
  margin-top: 24px;
}
.btn {
  padding: 10px 20px; border-radius: 9px; border: none;
  cursor: pointer; font-family: 'DM Sans', sans-serif;
  font-size: 13px; font-weight: 600; transition: all 0.18s;
}
.btn-primary { background: var(--accent); color: white; }
.btn-primary:hover { background: var(--accent2); box-shadow: 0 4px 16px rgba(224,48,48,0.4); }
.btn-secondary { background: var(--surface2); color: var(--text2); border: 1px solid var(--border); }
.btn-secondary:hover { color: var(--text); }

/* SCROLLBAR */
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(224,48,48,0.3); border-radius: 3px; }

/* PRINT */
@media print {
  body { background: white !important; color: #222 !important; }
  .topbar, .actions-bar, .icon-btn { display: none !important; }
  .report-container { max-width: 100%; padding: 0; margin: 0; }
  .card, .chart-card, .feedback-card, .q-item, .report-header {
    background: white !important; border-color: #ddd !important;
    break-inside: avoid;
  }
  .crit-box { background: #f8f8f8 !important; }
  * { color: #222 !important; }
}
</style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <div style="display:flex;align-items:center;gap:10px;">
    <span class="topbar-brand">Physicism</span>
    <span style="font-size:13px;color:var(--text2);">Student Report</span>
  </div>
  <div style="display:flex;gap:8px;">
    <button class="icon-btn" onclick="window.print()">🖨️ Print</button>
    <button class="icon-btn" onclick="downloadPDF()">⬇ PDF</button>
    <button class="icon-btn" onclick="window.location.href='exam-student.html'">← Back</button>
    <button class="icon-btn" onclick="window.location.href='https://soralatul16.github.io/atul-soral-physicism/index.html'">🏠 Home</button>
  </div>
</div>

<div class="report-container" id="reportContainer">
  <div id="reportContent"><p style="color:var(--text2);text-align:center;margin-top:100px;">Loading report…</p></div>
</div>

<script>
const LIBRARY_KEY  = "MYP_LIBRARY";
const ATTEMPTS_KEY = "PHYS_ATTEMPTS";

function getLibrary()  { return JSON.parse(localStorage.getItem(LIBRARY_KEY) || "[]"); }
function getAttempts() { return JSON.parse(localStorage.getItem(ATTEMPTS_KEY) || "[]"); }

const params = new URLSearchParams(window.location.search);
const attemptId = params.get('id');

window.addEventListener('DOMContentLoaded', () => {
  if (!attemptId) {
    document.getElementById('reportContent').innerHTML = '<p style="color:var(--text2);text-align:center;margin-top:100px;">No attempt ID provided.</p>';
    return;
  }
  buildReport();
});

function buildReport() {
  const attempts = getAttempts();
  const a = attempts.find(x => x.id === attemptId);
  if (!a) { document.getElementById('reportContent').innerHTML = '<p style="color:var(--text2);text-align:center;">Attempt not found.</p>'; return; }

  const lib = getLibrary();
  const set = lib.find(s => s.id === a.setId);
  const qBlocks = set ? (set.blocks || []).filter(b => b.saved && b.mode === 'question') : [];
  const savedSections = set?.sections || [{ id: 1, name: 'Section 1' }];
  const isGraded = a.gradingStatus === 'graded';
  const myAttempts = attempts.filter(x => x.studentEmail === a.studentEmail && x.status === 'completed');
  const sameSetAttempts = myAttempts.filter(x => x.setId === a.setId).sort((x, y) => x.endTime - y.endTime);

  // Criterion breakdown
  const cm = { A: { earned: 0, total: 0 }, B: { earned: 0, total: 0 }, C: { earned: 0, total: 0 }, D: { earned: 0, total: 0 } };
  qBlocks.forEach((q, i) => {
    const k = (q.meta?.criterion || '').charAt(0);
    const marks = Number(q.meta?.marks || 0);
    let scored = 0;
    if (a.grades && a.grades[i] !== undefined) {
      scored = Number(a.grades[i]);
    } else {
      if (q.type === 'True / False' && q.ui?.tfAnswer && a.answers?.[i] === q.ui.tfAnswer) scored = marks;
      else if (q.type === 'MCQ' && q.data?.correct !== null && q.data?.correct !== undefined && a.answers?.[i] === q.data.correct) scored = marks;
    }
    if (cm[k]) { cm[k].earned += scored; cm[k].total += marks; }
  });

  let html = '';

  // ─── HEADER ───
  html += `
  <div class="report-header">
    <div class="brand-line">Atul Soral · Physicism</div>
    <div class="brand-sub">IB MYP Sciences — Student Performance Report</div>
    <h1>${a.setTitle || 'Assessment Report'}</h1>
    <div class="meta-line">Student: <strong>${a.studentName || 'Unknown'}</strong></div>
    <div class="meta-line">${set?.chapter || ''} · ${set?.topic || ''} · ${new Date(a.endTime || a.startTime).toLocaleDateString('en-IN', { day: 'numeric', month: 'long', year: 'numeric' })}</div>
    <div class="meta-line">Duration: ${Math.floor((a.duration || 0) / 60)}m ${(a.duration || 0) % 60}s</div>
    <div class="score-display">
      <div class="score-ring">
        <canvas id="scoreRing" width="100" height="100"></canvas>
        <div class="score-text">
          <span>${a.percentScore || 0}%</span>
          <span class="score-sub">Score</span>
        </div>
      </div>
      <div class="score-details">
        <div>Marks: <span>${a.earnedMarks || 0} / ${a.totalMarks || 0}</span></div>
        <div>Questions: <span>${qBlocks.length}</span></div>
        <div>Attempt: <span>#${sameSetAttempts.indexOf(a) + 1} of ${sameSetAttempts.length}</span></div>
      </div>
    </div>
    <div class="graded-badge ${isGraded ? 'yes' : 'no'}">${isGraded ? '✓ Graded by Teacher' : '⏳ Awaiting Teacher Grading'}</div>
  </div>`;

  // ─── OVERALL TEACHER FEEDBACK ───
  if (a.overallFeedback) {
    html += `
    <div class="feedback-card">
      <div class="fb-label">👨‍🏫 Overall Teacher Feedback</div>
      <div class="fb-text">${a.overallFeedback}</div>
    </div>`;
  }

  // ─── CRITERION BREAKDOWN ───
  html += `
  <div class="card">
    <div class="card-title">📊 Criterion Breakdown</div>
    <div class="crit-grid">
      ${['A', 'B', 'C', 'D'].map(c => {
        const d = cm[c];
        const pct = d.total > 0 ? Math.round(d.earned / d.total * 100) : 0;
        const names = { A: 'Knowing & Understanding', B: 'Inquiring & Designing', C: 'Processing & Evaluating', D: 'Reflecting on Impacts' };
        return `<div class="crit-box">
          <div class="letter">${c}</div>
          <div class="name">${names[c]}</div>
          <div class="score">${d.total > 0 ? d.earned + ' / ' + d.total : '—'}</div>
          <div class="bar-wrap"><div class="bar-fill" style="width:${pct}%"></div></div>
        </div>`;
      }).join('')}
    </div>
  </div>`;

  // ─── CHARTS ───
  html += `
  <div class="chart-row">
    <div class="chart-card">
      <div class="card-title">📈 Criterion Radar</div>
      <canvas id="critRadar" height="220"></canvas>
    </div>
    <div class="chart-card">
      <div class="card-title">📉 Progress Over Attempts</div>
      <canvas id="progressLine" height="220"></canvas>
    </div>
  </div>`;

  // ─── QUESTION REVIEW ───
  html += `<div class="card"><div class="card-title">📝 Question-by-Question Review</div></div>`;

  qBlocks.forEach((q, i) => {
    const ans = a.answers?.[i];
    const teacherGrade = a.grades?.[i];
    const teacherFb = a.teacherFeedback?.[i];
    const hasTeacherGrade = teacherGrade !== undefined && teacherGrade !== null && teacherGrade !== '';
    const marks = Number(q.meta?.marks || 0);
    const crit = q.meta?.criterion;
    const markScheme = q.meta?.markScheme;

    // Status
    let statusColor = '#8a8898', statusText = 'Not answered';
    if (q.type === 'MCQ' || q.type === 'Multiple Select MCQ') {
      if (ans === undefined || ans === '' || (Array.isArray(ans) && ans.length === 0)) {
        statusText = 'Not answered';
      } else if (q.data?.correct !== undefined && q.data?.correct !== null) {
        const correct = Array.isArray(q.data.correct)
          ? JSON.stringify([...(Array.isArray(ans) ? ans : [])].sort()) === JSON.stringify([...q.data.correct].sort())
          : ans === q.data.correct;
        statusText = correct ? '✅ Correct' : '❌ Incorrect';
        statusColor = correct ? '#5edd8a' : '#ff7070';
      }
    } else if (q.type === 'True / False') {
      if (!ans) { statusText = 'Not answered'; }
      else {
        const correct = ans === q.ui?.tfAnswer;
        statusText = correct ? '✅ Correct' : '❌ Incorrect';
        statusColor = correct ? '#5edd8a' : '#ff7070';
      }
    } else {
      if (!ans) { statusText = 'Not answered'; }
      else if (hasTeacherGrade) { statusText = `Graded: ${teacherGrade}/${marks}`; statusColor = '#5edd8a'; }
      else { statusText = 'Awaiting marking'; statusColor = '#f7c66e'; }
    }

    // Question label
    const secId = q.sectionId || (savedSections[0]?.id || 1);
    const sec = savedSections.find(s => s.id === secId) || savedSections[0] || { name: 'Section 1' };
    const secIdx = savedSections.indexOf(sec) + 1;
    const qInSec = qBlocks.slice(0, i + 1).filter(bk => bk.sectionId === secId).length;
    const letters = ['a','b','c','d','e','f','g','h','i','j'];
    const qLabel = `${secIdx}(${letters[qInSec - 1] || qInSec})`;

    // Answer display
    let ansHTML = '';
    if (q.type === 'MCQ' || q.type === 'Multiple Select MCQ') {
      const opts = (q.ui?.mcqOptions || []).filter(o => o.trim());
      const multi = q.type === 'Multiple Select MCQ';
      ansHTML = opts.map((o, oi) => {
        const isStudentPick = multi ? (Array.isArray(ans) && ans.includes(oi)) : ans === oi;
        const isCorrect = multi ? (Array.isArray(q.data?.correct) && q.data.correct.includes(oi)) : q.data?.correct === oi;
        let cls = '';
        if (isStudentPick && isCorrect) cls = 'correct';
        else if (isStudentPick && !isCorrect) cls = 'wrong';
        else if (!isStudentPick && isCorrect) cls = 'correct';
        return `<div class="opt-display ${cls}">
          <div class="opt-letter">${String.fromCharCode(65 + oi)}</div>
          <span>${o}</span>
          ${isStudentPick ? '<span style="margin-left:auto;font-size:11px;">👈 Your answer</span>' : ''}
          ${isCorrect ? '<span style="margin-left:auto;font-size:11px;">✓ Correct</span>' : ''}
        </div>`;
      }).join('');
    } else if (q.type === 'True / False') {
      const correct = q.ui?.tfAnswer;
      ansHTML = `<div style="display:flex;gap:10px;">
        <div class="opt-display ${ans === 'True' ? (correct === 'True' ? 'correct' : 'wrong') : ''}" style="flex:1;justify-content:center;">
          ✓ True ${ans === 'True' ? '👈' : ''} ${correct === 'True' ? '✓' : ''}
        </div>
        <div class="opt-display ${ans === 'False' ? (correct === 'False' ? 'correct' : 'wrong') : ''}" style="flex:1;justify-content:center;">
          ✗ False ${ans === 'False' ? '👈' : ''} ${correct === 'False' ? '✓' : ''}
        </div>
      </div>`;
    } else {
      ansHTML = `<div class="answer-box">${ans || '(Not answered)'}</div>`;
    }

    html += `
    <div class="q-item" style="border-left:3px solid ${statusColor};">
      <div class="q-item-header">
        <div class="q-label-tags">
          <span style="font-size:11px;color:var(--text2);font-weight:600;text-transform:uppercase;letter-spacing:0.5px;">Q${qLabel} · ${q.type}</span>
          ${marks ? `<span class="tag red">${marks} marks</span>` : ''}
          ${crit ? `<span class="tag blue">Crit ${crit}</span>` : ''}
          ${hasTeacherGrade ? `<span class="tag green">✓ ${teacherGrade}/${marks}</span>` : ''}
        </div>
        <span class="q-status" style="color:${statusColor};">${statusText}</span>
      </div>
      <div class="q-text">${q.data?.question || '(No question text)'}</div>
      <div style="font-size:10px;color:var(--text2);font-weight:600;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px;">Your Answer</div>
      ${ansHTML}
      ${teacherFb ? `<div class="teacher-fb"><div class="tfb-label">👨‍🏫 Teacher Feedback</div><div class="tfb-text">${teacherFb}</div></div>` : ''}
      ${markScheme ? `<div class="ms-box"><div class="ms-label">📗 Mark Scheme</div><div class="ms-text">${markScheme}</div></div>` : ''}
    </div>`;
  });

  // ─── PROGRESS HISTORY ───
  if (sameSetAttempts.length > 1) {
    html += `
    <div class="card">
      <div class="card-title">📈 Attempt History for This Set</div>
      <div class="progress-list">
        ${sameSetAttempts.map((att, idx) => `
          <div class="progress-item" ${att.id === a.id ? 'style="border-color:var(--accent);"' : ''}>
            <div>
              <div class="pi-title">Attempt #${idx + 1} ${att.id === a.id ? '← This attempt' : ''}</div>
              <div class="pi-meta">${new Date(att.endTime || att.startTime).toLocaleDateString('en-IN')} · ${Math.floor((att.duration || 0) / 60)}m</div>
            </div>
            <div class="pi-score" style="color:${(att.percentScore || 0) >= 70 ? '#5edd8a' : (att.percentScore || 0) >= 40 ? '#f7c66e' : '#ff7070'};">${att.percentScore || 0}%</div>
          </div>`).join('')}
      </div>
    </div>`;
  }

  // ─── ACTIONS ───
  html += `
  <div class="actions-bar">
    <button class="btn btn-primary" onclick="downloadPDF()">⬇ Download PDF</button>
    <button class="btn btn-secondary" onclick="window.print()">🖨️ Print Report</button>
    <button class="btn btn-secondary" onclick="window.location.href='exam-student.html'">← Back to Dashboard</button>
  </div>`;

  document.getElementById('reportContent').innerHTML = html;

  // ─── RENDER CHARTS ───
  setTimeout(() => {
    renderScoreRing(a.percentScore || 0);
    renderCritRadar(cm);
    renderProgressLine(sameSetAttempts);
  }, 100);
}

// ─── Score Ring ───
function renderScoreRing(pct) {
  const canvas = document.getElementById('scoreRing');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const cx = 50, cy = 50, r = 38, lw = 6;
  ctx.clearRect(0, 0, 100, 100);
  // Background ring
  ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2);
  ctx.strokeStyle = 'rgba(255,255,255,0.06)'; ctx.lineWidth = lw; ctx.stroke();
  // Score arc
  const angle = (pct / 100) * Math.PI * 2;
  ctx.beginPath(); ctx.arc(cx, cy, r, -Math.PI / 2, -Math.PI / 2 + angle);
  ctx.strokeStyle = pct >= 70 ? '#27ae60' : pct >= 40 ? '#d29922' : '#e03030';
  ctx.lineWidth = lw; ctx.lineCap = 'round'; ctx.stroke();
}

// ─── Criterion Radar Chart ───
function renderCritRadar(cm) {
  const canvas = document.getElementById('critRadar');
  if (!canvas) return;
  const pcts = ['A', 'B', 'C', 'D'].map(c => cm[c].total > 0 ? Math.round(cm[c].earned / cm[c].total * 100) : 0);
  new Chart(canvas, {
    type: 'radar',
    data: {
      labels: ['Criterion A', 'Criterion B', 'Criterion C', 'Criterion D'],
      datasets: [{
        data: pcts,
        backgroundColor: 'rgba(224,48,48,0.15)',
        borderColor: 'rgba(224,48,48,0.7)',
        borderWidth: 2,
        pointBackgroundColor: '#e03030',
        pointRadius: 4
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      scales: {
        r: {
          beginAtZero: true, max: 100,
          ticks: { display: false },
          grid: { color: 'rgba(255,255,255,0.06)' },
          pointLabels: { color: '#b08888', font: { size: 11 } },
          angleLines: { color: 'rgba(255,255,255,0.06)' }
        }
      },
      plugins: { legend: { display: false } }
    }
  });
}

// ─── Progress Line Chart ───
function renderProgressLine(attempts) {
  const canvas = document.getElementById('progressLine');
  if (!canvas) return;
  if (attempts.length < 2) {
    canvas.parentElement.innerHTML += '<p style="font-size:12px;color:var(--text2);text-align:center;margin-top:10px;">Complete more attempts to see progress.</p>';
  }
  new Chart(canvas, {
    type: 'line',
    data: {
      labels: attempts.map((_, i) => 'Attempt ' + (i + 1)),
      datasets: [{
        data: attempts.map(a => a.percentScore || 0),
        borderColor: '#e03030',
        backgroundColor: 'rgba(224,48,48,0.1)',
        fill: true,
        tension: 0.3,
        borderWidth: 2,
        pointBackgroundColor: '#e03030',
        pointRadius: 4
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      scales: {
        y: { beginAtZero: true, max: 100, ticks: { color: '#b08888' }, grid: { color: 'rgba(255,255,255,0.06)' } },
        x: { ticks: { color: '#b08888' }, grid: { color: 'rgba(255,255,255,0.06)' } }
      },
      plugins: { legend: { display: false } }
    }
  });
}

// ─── PDF Download ───
function downloadPDF() {
  try {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();
    const attempts = getAttempts();
    const a = attempts.find(x => x.id === attemptId);
    if (!a) return;
    const lib = getLibrary();
    const set = lib.find(s => s.id === a.setId);
    const qBlocks = set ? (set.blocks || []).filter(b => b.saved && b.mode === 'question') : [];

    let y = 18;
    doc.setFontSize(18); doc.setFont('helvetica', 'bold');
    doc.setTextColor(224, 48, 48);
    doc.text('Atul Soral Physicism', 20, y); y += 7;
    doc.setFontSize(10); doc.setFont('helvetica', 'normal');
    doc.setTextColor(100, 100, 100);
    doc.text('IB MYP Sciences — Student Performance Report', 20, y); y += 10;

    doc.setTextColor(0, 0, 0);
    doc.setFontSize(14); doc.setFont('helvetica', 'bold');
    doc.text(a.setTitle || 'Assessment Report', 20, y); y += 7;
    doc.setFontSize(10); doc.setFont('helvetica', 'normal');
    doc.text(`Student: ${a.studentName}`, 20, y); y += 5;
    doc.text(`Date: ${new Date(a.endTime || Date.now()).toLocaleDateString('en-IN', { day: 'numeric', month: 'long', year: 'numeric' })}`, 20, y); y += 5;
    doc.text(`Score: ${a.earnedMarks || 0} / ${a.totalMarks || 0} (${a.percentScore || 0}%)   Duration: ${Math.floor((a.duration || 0) / 60)}m ${(a.duration || 0) % 60}s`, 20, y); y += 5;

    if (a.gradingStatus === 'graded') {
      doc.setTextColor(39, 174, 96);
      doc.text('✓ Graded by Teacher', 20, y); y += 5;
      doc.setTextColor(0, 0, 0);
    }
    y += 3;
    doc.setDrawColor(224, 48, 48); doc.line(20, y, 190, y); y += 8;

    // Criterion breakdown
    doc.setFont('helvetica', 'bold'); doc.setFontSize(11);
    doc.text('Criterion Breakdown', 20, y); y += 6;
    doc.setFont('helvetica', 'normal'); doc.setFontSize(10);
    const cm = { A: { e: 0, t: 0 }, B: { e: 0, t: 0 }, C: { e: 0, t: 0 }, D: { e: 0, t: 0 } };
    qBlocks.forEach((q, i) => {
      const k = (q.meta?.criterion || '').charAt(0);
      const marks = Number(q.meta?.marks || 0);
      let scored = 0;
      if (a.grades && a.grades[i] !== undefined) scored = Number(a.grades[i]);
      else {
        if (q.type === 'True / False' && q.ui?.tfAnswer && a.answers?.[i] === q.ui.tfAnswer) scored = marks;
        else if (q.type === 'MCQ' && q.data?.correct !== null && q.data?.correct !== undefined && a.answers?.[i] === q.data.correct) scored = marks;
      }
      if (cm[k]) { cm[k].e += scored; cm[k].t += marks; }
    });
    const critNames = { A: 'Knowing', B: 'Inquiring', C: 'Processing', D: 'Reflecting' };
    ['A', 'B', 'C', 'D'].forEach(c => {
      const d = cm[c];
      doc.text(`Criterion ${c} (${critNames[c]}): ${d.t > 0 ? d.e + ' / ' + d.t + ' (' + Math.round(d.e / d.t * 100) + '%)' : '—'}`, 24, y);
      y += 5;
    });
    y += 3; doc.line(20, y, 190, y); y += 8;

    // Overall feedback
    if (a.overallFeedback) {
      doc.setFont('helvetica', 'bold'); doc.setFontSize(11);
      doc.text('Teacher Feedback:', 20, y); y += 6;
      doc.setFont('helvetica', 'normal'); doc.setFontSize(10);
      const fbLines = doc.splitTextToSize(a.overallFeedback, 165);
      doc.text(fbLines, 20, y); y += fbLines.length * 5 + 4;
      doc.line(20, y, 190, y); y += 8;
    }

    // Questions
    qBlocks.forEach((q, i) => {
      if (y > 250) { doc.addPage(); y = 20; }
      doc.setFont('helvetica', 'bold'); doc.setFontSize(11);
      const gradeText = a.grades?.[i] !== undefined ? ` — Scored: ${a.grades[i]}/${q.meta?.marks || 0}` : '';
      doc.text(`Q${i + 1}. [${q.meta?.marks || 0} marks]${gradeText}`, 20, y); y += 5;
      doc.setFont('helvetica', 'normal'); doc.setFontSize(10);
      const qText = (q.data?.question || '').replace(/<[^>]+>/g, '');
      const lines = doc.splitTextToSize(qText, 165);
      doc.text(lines, 20, y); y += lines.length * 5 + 2;

      const ans = a.answers?.[i];
      const disp = Array.isArray(ans) ? ans.map(n => String.fromCharCode(65 + n)).join(', ') :
        typeof ans === 'number' ? String.fromCharCode(65 + ans) : (ans || '(Not answered)');
      doc.setFont('helvetica', 'italic');
      const ansLines = doc.splitTextToSize('Answer: ' + disp.substring(0, 500), 165);
      doc.text(ansLines, 20, y); y += ansLines.length * 5;

      if (a.teacherFeedback?.[i]) {
        doc.setFont('helvetica', 'normal'); doc.setTextColor(39, 174, 96);
        const tfbLines = doc.splitTextToSize('Teacher: ' + a.teacherFeedback[i], 165);
        doc.text(tfbLines, 20, y); y += tfbLines.length * 5;
        doc.setTextColor(0, 0, 0);
      }
      y += 5;
    });

    doc.save(`Physicism_Report_${(a.setTitle || 'exam').replace(/\s/g, '_')}.pdf`);
  } catch (e) { alert('PDF download failed.'); console.error(e); }
}
