<!DOCTYPE html>
<html>
<head>
<title>Analytics</title>
<link rel="stylesheet" href="exam-style.css">
</head>

<body>

<h2>📊 Analytics</h2>

<div id="data"></div>

<script src="exam-storage.js"></script>
<script>

let db = getDB();

let topicMap = {};

db.forEach(q=>{
topicMap[q.topic]=(topicMap[q.topic]||0)+1;
});

let html="";

for(let t in topicMap){
html+=`<div class="card">${t}: ${topicMap[t]} questions</div>`;
}

data.innerHTML=html;

</script>

</body>
</html>
