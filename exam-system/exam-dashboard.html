<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>
<style>
body{background:#0f172a;color:white;font-family:sans-serif;}
.card{background:#020617;padding:20px;margin:20px;}
</style>
</head>

<body>

<h2>📊 Dashboard</h2>
<div id="data"></div>

<script>

let attempts=JSON.parse(localStorage.getItem("attempts")||[]);

let total=attempts.length;
let avg=0;

attempts.forEach(a=>avg+=a.score);
avg=total?(avg/total).toFixed(1):0;

let html=`<div class="card">
Total Attempts: ${total}<br>
Average Score: ${avg}
</div>`;

attempts.forEach(a=>{
html+=`<div class="card">
${a.name} | ${a.score}/${a.total} | Level ${a.level}<br>${a.date}
</div>`;
});

data.innerHTML=html;

</script>

</body>
</html>
