<!DOCTYPE html>
<html>
<head>
<title>Analytics</title>
<style>
body{background:#0f172a;color:white;font-family:sans-serif;}
.card{background:#020617;padding:20px;margin:20px;}
</style>
</head>

<body>

<h2>📊 Analytics</h2>

<div id="data"></div>

<script>

let attempts=JSON.parse(localStorage.getItem("attempts")||[]);

let html="";

attempts.forEach(a=>{
html+=`<div class="card">
<b>${a.name}</b><br>
Score: ${a.score}/${a.total}<br>
Level: ${a.level}<br>
${a.date}
</div>`;
});

data.innerHTML=html;

</script>

</body>
</html>
