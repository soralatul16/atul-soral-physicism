<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Teacher Grading | Physicism MYP</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
<style>
:root {
  --surface: rgba(18,4,4,0.88);
  --surface2: rgba(38,8,8,0.9);
  --border: rgba(200,60,60,0.3);
  --accent: #e03030;
  --accent2: #c0392b;
  --accent-glow: rgba(224,48,48,0.15);
  --text: #f0e6e6;
  --text2: #b08888;
  --green: #27ae60;
  --red: #e03030;
  --yellow: #d29922;
  --blue: #2980b9;
  --radius: 10px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'DM Sans', sans-serif;
  background: linear-gradient(rgba(0,0,0,0.58), rgba(18,0,0,0.78)),
    url('./assets/myp-background-image.png') no-repeat center center fixed;
  background-size: cover;
  color: var(--text);
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* TOPBAR */
.topbar {
  height: 56px;
  background: rgba(12,2,2,0.95);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 20px; flex-shrink: 0; z-index: 100;
  backdrop-filter: blur(10px);
}
.topbar-left { display: flex; gap: 6px; align-items: center; }
.topbar-brand {
  font-family: 'Playfair Display', serif;
  font-size: 18px; color: var(--accent); margin-right: 16px;
  text-shadow: 0 0 14px rgba(224,48,48,0.6);
}
.nav-btn {
  background: none; border: 1px solid transparent;
  padding: 6px 14px; border-radius: 6px; color: var(--text2);
  cursor: pointer; font-size: 13px; font-weight: 500; transition: all 0.15s;
  font-family: 'DM Sans', sans-serif;
}
.nav-btn:hover { color: var(--text); background: var(--accent-glow); border-color: var(--border); }
.nav-btn.active { color: var(--accent); border-color: var(--accent); background: var(--accent-glow); }
.icon-btn {
  background: rgba(38,8,8,0.8); border: 1px solid var(--border);
  padding: 6px 13px; border-radius: 6px; color: var(--text);
  cursor: pointer; font-size: 13px; transition: all 0.15s;
  font-family: 'DM Sans', sans-serif;
}
.icon-btn:hover { background: var(--accent-glow); border-color: var(--accent); color: var(--accent); }

/* LAYOUT */
.app-body { display: flex; flex: 1; overflow: hidden; }

/* SIDEBAR */
.sidebar {
  width: 280px; background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column; overflow: hidden;
  flex-shrink: 0; backdrop-filter: blur(10px);
}
.sidebar-header {
  padding: 16px; border-bottom: 1px solid var(--border);
}
.sidebar-title {
  font-size: 11px; text-transform: uppercase; letter-spacing: 1px;
  color: var(--text2); font-weight: 600; margin-bottom: 10px;
}
.sidebar-search {
  width: 100%; background: var(--surface2); border: 1px solid var(--border);
  border-radius: 7px; padding: 8px 10px; color: var(--text);
  font-size: 13px; outline: none; font-family: 'DM Sans', sans-serif;
  transition: border-color 0.15s;
}
.sidebar-search:focus { border-color: var(--accent); }
.sidebar-list { flex: 1; overflow-y: auto; padding: 8px; }

/* ATTEMPT CARD in sidebar */
.attempt-card {
  padding: 10px 12px; border-radius: 8px; cursor: pointer;
  margin-bottom: 6px; transition: all 0.15s;
  border: 1px solid transparent; background: transparent;
}
.attempt-card:hover { background: var(--surface2); border-color: var(--border); }
.attempt-card.active { background: var(--accent-glow); border-color: var(--accent); }
.attempt-card .ac-name { font-size: 13px; font-weight: 600; margin-bottom: 2px; }
.attempt-card .ac-set { font-size: 11px; color: var(--text2); margin-bottom: 4px; }
.attempt-card .ac-meta { display: flex; gap: 6px; flex-wrap: wrap; }
.badge {
  font-size: 10px; padding: 2px 8px; border-radius: 10px;
  background: var(--surface2); border: 1px solid var(--border); color: var(--text2);
}
.badge.green { background: rgba(39,174,96,0.12); border-color: rgba(39,174,96,0.4); color: #5edd8a; }
.badge.yellow { background: rgba(210,153,34,0.12); border-color: rgba(210,153,34,0.4); color: #f7c66e; }
.badge.red { background: var(--accent-glow); border-color: rgba(224,48,48,0.4); color: #ff7070; }
.badge.blue { background: rgba(41,128,185,0.12); border-color: rgba(41,128,185,0.4); color: #76b4de; }

/* FILTER TABS */
.filter-tabs { display: flex; gap: 4px; margin-bottom: 12px; }
.filter-tab {
  flex: 1; padding: 6px; border-radius: 6px; border: 1px solid var(--border);
  background: transparent; color: var(--text2); cursor: pointer;
  font-size: 11px; font-family: 'DM Sans', sans-serif; text-align: center;
  transition: all 0.15s;
}
.filter-tab.active { background: var(--accent); color: white; border-color: var(--accent); }
.filter-tab:hover:not(.active) { background: var(--accent-glow); }

/* MAIN PANEL */
.main-panel { flex: 1; overflow-y: auto; padding: 24px; }

/* EMPTY STATE */
.empty-state {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  height: 100%; color: var(--text2); text-align: center; gap: 12px;
}
.empty-state .icon { font-size: 48px; opacity: 0.4; }
.empty-state h3 { font-size: 16px; color: var(--text); }
.empty-state p { font-size: 13px; max-width: 360px; line-height: 1.6; }

/* GRADING HEADER */
.grading-header {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 12px; padding: 20px; margin-bottom: 20px;
  backdrop-filter: blur(8px);
}
.gh-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 14px; }
.gh-title { font-size: 18px; font-weight: 600; }
.gh-subtitle { font-size: 12px; color: var(--text2); margin-top: 4px; }
.gh-stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
.gh-stat {
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 8px; padding: 10px; text-align: center;
}
.gh-stat-num { font-size: 20px; font-weight: 700; color: var(--accent); }
.gh-stat-label { font-size: 10px; color: var(--text2); margin-top: 2px; }

/* OVERALL FEEDBACK */
.overall-feedback {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 12px; padding: 18px; margin-bottom: 20px;
}
.of-label { font-size: 11px; color: var(--text2); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
.of-textarea {
  width: 100%; background: var(--surface2); border: 1px solid var(--border);
  border-radius: 7px; padding: 10px 12px; color: var(--text);
  font-family: 'DM Sans', sans-serif; font-size: 13px; resize: vertical;
  min-height: 70px; outline: none; transition: border-color 0.15s;
}
.of-textarea:focus { border-color: var(--accent); }

/* QUESTION GRADING CARD */
.q-grade-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 12px; margin-bottom: 16px; overflow: hidden;
  backdrop-filter: blur(8px); transition: border-color 0.15s;
}
.q-grade-card:hover { border-color: rgba(224,48,48,0.5); }
.q-grade-header {
  padding: 14px 18px; display: flex; justify-content: space-between;
  align-items: center; border-bottom: 1px solid var(--border);
  background: rgba(0,0,0,0.2);
}
.q-grade-header .q-label { font-size: 12px; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: 0.5px; }
.q-grade-header .q-marks-info { font-size: 12px; color: var(--text2); display: flex; gap: 8px; align-items: center; }
.q-grade-body { padding: 18px; }
.q-grade-body .q-text { font-size: 14px; line-height: 1.6; margin-bottom: 16px; padding-bottom: 14px; border-bottom: 1px solid var(--border); }

/* STUDENT RESPONSE */
.student-response { margin-bottom: 16px; }
.sr-label { font-size: 10px; color: var(--accent); font-weight: 600; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
.sr-content {
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 8px; padding: 14px; font-size: 13px; line-height: 1.6;
  color: var(--text); white-space: pre-wrap; min-height: 40px;
}
.sr-content.empty { color: var(--text2); font-style: italic; }

/* MCQ DISPLAY */
.sr-mcq-opt {
  padding: 8px 12px; border-radius: 7px; border: 1px solid var(--border);
  background: var(--surface2); margin-bottom: 6px; font-size: 13px;
  display: flex; align-items: center; gap: 10px;
}
.sr-mcq-opt.selected { border-color: rgba(41,128,185,0.5); background: rgba(41,128,185,0.1); }
.sr-mcq-opt.correct { border-color: rgba(39,174,96,0.5); background: rgba(39,174,96,0.1); }
.sr-mcq-opt.wrong { border-color: rgba(224,48,48,0.4); background: rgba(224,48,48,0.08); }
.opt-letter {
  width: 22px; height: 22px; border-radius: 50%; border: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 700; flex-shrink: 0;
}

/* GRADING ROW */
.grade-row {
  display: flex; gap: 12px; align-items: flex-start; flex-wrap: wrap;
  padding: 14px; background: rgba(0,0,0,0.2); border-radius: 8px;
  border: 1px solid var(--border); margin-top: 14px;
}
.grade-field { display: flex; flex-direction: column; gap: 4px; }
.grade-field label { font-size: 10px; color: var(--text2); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
.grade-input {
  width: 70px; background: var(--surface); border: 1px solid var(--border);
  border-radius: 6px; padding: 7px 10px; color: var(--text);
  font-size: 14px; font-weight: 600; text-align: center; outline: none;
  font-family: 'DM Sans', sans-serif; transition: border-color 0.15s;
}
.grade-input:focus { border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent-glow); }
.grade-max { font-size: 12px; color: var(--text2); align-self: flex-end; padding-bottom: 8px; }
.feedback-input {
  flex: 1; min-width: 200px; background: var(--surface); border: 1px solid var(--border);
  border-radius: 6px; padding: 7px 10px; color: var(--text);
  font-size: 13px; outline: none; font-family: 'DM Sans', sans-serif;
  transition: border-color 0.15s;
}
.feedback-input:focus { border-color: var(--accent); }

/* BUTTONS */
.btn-save {
  padding: 10px 24px; background: var(--accent); color: white; border: none;
  border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: 600;
  transition: all 0.15s; font-family: 'DM Sans', sans-serif;
}
.btn-save:hover { background: var(--accent2); box-shadow: 0 4px 16px rgba(224,48,48,0.4); }
.btn-save:disabled { opacity: 0.4; cursor: not-allowed; }
.btn-secondary {
  padding: 10px 20px; background: transparent; color: var(--text2);
  border: 1px solid var(--border); border-radius: 8px; cursor: pointer;
  font-size: 13px; font-family: 'DM Sans', sans-serif; transition: all 0.15s;
}
.btn-secondary:hover { background: var(--surface2); color: var(--text); }

.action-bar {
  display: flex; gap: 10px; justify-content: flex-end; align-items: center;
  margin-top: 20px; padding-top: 16px; border-top: 1px solid var(--border);
}
.action-bar .save-status { font-size: 12px; color: var(--green); margin-right: auto; }

/* MARK SCHEME TOGGLE */
.ms-toggle {
  font-size: 12px; color: var(--green); cursor: pointer; border: none;
  background: none; font-family: 'DM Sans', sans-serif; padding: 4px 0;
  transition: opacity 0.15s;
}
.ms-toggle:hover { opacity: 0.7; }
.ms-content {
  margin-top: 8px; padding: 10px 12px; background: rgba(39,174,96,0.08);
  border: 1px solid rgba(39,174,96,0.2); border-radius: 7px;
  font-size: 12px; color: var(--text); line-height: 1.6;
  display: none;
}
.ms-content.open { display: block; }

/* AUTO-SCORE INDICATOR */
.auto-scored {
  display: inline-flex; align-items: center; gap: 4px;
  font-size: 11px; padding: 3px 10px; border-radius: 10px;
}
.auto-scored.correct { background: rgba(39,174,96,0.15); color: #5edd8a; }
.auto-scored.incorrect { background: rgba(224,48,48,0.12); color: #ff7070; }

/* SCROLLBAR */
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(224,48,48,0.3); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--accent); }

/* TOAST */
.toast {
  position: fixed; top: 70px; left: 50%; transform: translateX(-50%);
  background: rgba(10,4,4,0.97); border: 1px solid var(--green);
  border-radius: 12px; padding: 14px 24px; z-index: 9999;
  box-shadow: 0 8px 40px rgba(0,0,0,0.6); font-size: 14px;
  color: var(--green); display: none;
  animation: toastIn 0.3s ease;
}
@keyframes toastIn {
  from { opacity:0; transform:translateX(-50%) translateY(-20px); }
  to   { opacity:1; transform:translateX(-50%) translateY(0); }
}
</style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <div class="topbar-left">
    <span class="topbar-brand">MYP·Grading</span>
    <button class="nav-btn active">📝 Grade</button>
  </div>
  <div class="topbar-right">
    <button class="icon-btn" onclick="window.location.href='exam-teacher.html'">✏️ Builder</button>
    <button class="icon-btn" onclick="window.location.href='https://soralatul16.github.io/atul-soral-physicism/index.html'">🏠 Home</button>
  </div>
</div>

<div class="app-body">

  <!-- SIDEBAR: SUBMISSION LIST -->
  <div class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-title">Student Submissions</div>
      <div class="filter-tabs">
        <button class="filter-tab active" onclick="filterAttempts('all',this)">All</button>
        <button class="filter-tab" onclick="filterAttempts('pending',this)">Pending</button>
        <button class="filter-tab" onclick="filterAttempts('graded',this)">Graded</button>
      </div>
      <input type="text" class="sidebar-search" id="searchInput" placeholder="Search student or set name…" oninput="renderSidebar()">
    </div>
    <div class="sidebar-list" id="attemptList"></div>
  </div>

  <!-- MAIN PANEL -->
  <div class="main-panel" id="mainPanel">
    <div class="empty-state" id="emptyState">
      <div class="icon">📝</div>
      <h3>Select a submission to grade</h3>
      <p>Student submissions appear in the sidebar. Click one to view the student's responses and assign marks with feedback.</p>
    </div>
    <div id="gradingArea" style="display:none;"></div>
  </div>

</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
/* ═══════════════════════════════════════════════════
   TEACHER GRADING PANEL
   Reads from PHYS_ATTEMPTS & MYP_LIBRARY in localStorage
   Writes grading data back into each attempt
═══════════════════════════════════════════════════ */

const LIBRARY_KEY  = "MYP_LIBRARY";
const ATTEMPTS_KEY = "PHYS_ATTEMPTS";

let allAttempts = [];
let currentFilter = 'all';
let activeAttemptId = null;

/* ── Data helpers ── */
function getLibrary()  { return JSON.parse(localStorage.getItem(LIBRARY_KEY) || "[]"); }
function getAttempts() { return JSON.parse(localStorage.getItem(ATTEMPTS_KEY) || "[]"); }
function saveAttempts(arr) { localStorage.setItem(ATTEMPTS_KEY, JSON.stringify(arr)); }

function getSetForAttempt(a) {
  return getLibrary().find(s => s.id === a.setId);
}

/* ── Init ── */
window.addEventListener("DOMContentLoaded", () => {
  loadAttempts();
  renderSidebar();
});

function loadAttempts() {
  allAttempts = getAttempts().filter(a => a.status === "completed").sort((a, b) => (b.endTime || b.startTime) - (a.endTime || a.startTime));
}

/* ── Sidebar ── */
function filterAttempts(filter, btn) {
  currentFilter = filter;
  document.querySelectorAll('.filter-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderSidebar();
}

function renderSidebar() {
  const search = (document.getElementById('searchInput')?.value || '').toLowerCase();
  const list = document.getElementById('attemptList');

  let filtered = allAttempts.filter(a => {
    if (currentFilter === 'pending' && a.gradingStatus === 'graded') return false;
    if (currentFilter === 'graded' && a.gradingStatus !== 'graded') return false;
    if (search) {
      const name = (a.studentName || '').toLowerCase();
      const title = (a.setTitle || '').toLowerCase();
      if (!name.includes(search) && !title.includes(search)) return false;
    }
    return true;
  });

  if (filtered.length === 0) {
    list.innerHTML = `<div style="padding:20px;text-align:center;color:var(--text2);font-size:13px;">
      ${allAttempts.length === 0 ? 'No completed submissions yet.<br><br>Students need to complete a test for submissions to appear here.' : 'No submissions match your filter.'}
    </div>`;
    return;
  }

  list.innerHTML = filtered.map(a => {
    const isGraded = a.gradingStatus === 'graded';
    const date = new Date(a.endTime || a.startTime).toLocaleDateString('en-IN', { day:'numeric', month:'short' });
    const duration = a.duration ? `${Math.floor(a.duration/60)}m` : '';
    return `
    <div class="attempt-card ${activeAttemptId === a.id ? 'active' : ''}" onclick="openAttempt('${a.id}')">
      <div class="ac-name">${a.studentName || 'Unknown Student'}</div>
      <div class="ac-set">${a.setTitle || 'Untitled Set'}</div>
      <div class="ac-meta">
        <span class="badge">${date}</span>
        ${duration ? `<span class="badge">${duration}</span>` : ''}
        <span class="badge ${a.percentScore >= 70 ? 'green' : a.percentScore >= 40 ? 'yellow' : 'red'}">${a.percentScore || 0}%</span>
        ${isGraded ? '<span class="badge green">✓ Graded</span>' : '<span class="badge yellow">Pending</span>'}
      </div>
    </div>`;
  }).join('');
}

/* ── Open attempt for grading ── */
function openAttempt(attemptId) {
  activeAttemptId = attemptId;
  renderSidebar();

  const attempts = getAttempts();
  const a = attempts.find(x => x.id === attemptId);
  if (!a) { alert('Attempt not found.'); return; }

  const set = getSetForAttempt(a);
  if (!set) { alert('Question set no longer exists.'); return; }

  const qBlocks = (set.blocks || []).filter(b => b.saved && b.mode === 'question');
  const savedSections = set.sections || [{ id: 1, name: 'Section 1' }];

  // Init grading data if not present
  if (!a.grades) a.grades = {};
  if (!a.teacherFeedback) a.teacherFeedback = {};
  if (!a.overallFeedback) a.overallFeedback = '';

  const totalQ = qBlocks.length;
  const answered = qBlocks.filter((q, i) => {
    const ans = a.answers?.[i];
    return ans !== undefined && ans !== '' && !(Array.isArray(ans) && ans.length === 0);
  }).length;
  const graded = Object.keys(a.grades).length;
  const totalMarks = qBlocks.reduce((s, q) => s + Number(q.meta?.marks || 0), 0);
  const earnedSoFar = Object.values(a.grades).reduce((s, g) => s + Number(g || 0), 0);

  let html = '';

  // HEADER
  html += `
  <div class="grading-header">
    <div class="gh-top">
      <div>
        <div class="gh-title">📝 ${a.studentName || 'Unknown Student'}</div>
        <div class="gh-subtitle">${a.setTitle || 'Untitled'} · ${set.chapter || ''} · ${set.topic || ''}</div>
        <div class="gh-subtitle">Submitted: ${new Date(a.endTime || a.startTime).toLocaleString('en-IN')} · Duration: ${Math.floor((a.duration||0)/60)}m ${(a.duration||0)%60}s</div>
      </div>
      <div style="display:flex;gap:8px;">
        ${a.gradingStatus === 'graded' ? '<span class="badge green" style="font-size:12px;padding:4px 12px;">✓ Graded</span>' : '<span class="badge yellow" style="font-size:12px;padding:4px 12px;">Pending</span>'}
      </div>
    </div>
    <div class="gh-stats">
      <div class="gh-stat"><div class="gh-stat-num">${totalQ}</div><div class="gh-stat-label">Questions</div></div>
      <div class="gh-stat"><div class="gh-stat-num">${answered}</div><div class="gh-stat-label">Answered</div></div>
      <div class="gh-stat"><div class="gh-stat-num">${graded}/${totalQ}</div><div class="gh-stat-label">Graded</div></div>
      <div class="gh-stat"><div class="gh-stat-num">${earnedSoFar}/${totalMarks}</div><div class="gh-stat-label">Marks</div></div>
    </div>
  </div>`;

  // OVERALL FEEDBACK
  html += `
  <div class="overall-feedback">
    <div class="of-label">📋 Overall Teacher Feedback</div>
    <textarea class="of-textarea" id="overallFeedback" placeholder="Write overall feedback for this student…">${a.overallFeedback || ''}</textarea>
  </div>`;

  // QUESTIONS
  qBlocks.forEach((q, i) => {
    const secId = q.sectionId || (savedSections[0]?.id || 1);
    const sec = savedSections.find(s => s.id === secId) || savedSections[0] || { name: 'Section 1' };
    const secIdx = savedSections.indexOf(sec) + 1;
    const qInSec = qBlocks.slice(0, i + 1).filter(bk => bk.sectionId === secId).length;
    const letters = ['a','b','c','d','e','f','g','h','i','j','k','l'];
    const qLabel = `${secIdx}(${letters[qInSec - 1] || qInSec})`;

    const maxMarks = Number(q.meta?.marks || 0);
    const crit = q.meta?.criterion || '';
    const strand = q.meta?.strand || '';
    const markScheme = q.meta?.markScheme || '';
    const studentAns = a.answers?.[i];
    const currentGrade = a.grades?.[i] ?? '';
    const currentFeedback = a.teacherFeedback?.[i] || '';

    // Auto-score check
    let autoScoreHTML = '';
    if (q.type === 'MCQ' && q.data?.correct !== null && q.data?.correct !== undefined) {
      const correct = studentAns === q.data.correct;
      autoScoreHTML = `<span class="auto-scored ${correct ? 'correct' : 'incorrect'}">${correct ? '✅ Auto: Correct' : '❌ Auto: Incorrect'}</span>`;
    } else if (q.type === 'True / False' && q.ui?.tfAnswer) {
      const correct = studentAns === q.ui.tfAnswer;
      autoScoreHTML = `<span class="auto-scored ${correct ? 'correct' : 'incorrect'}">${correct ? '✅ Auto: Correct' : '❌ Auto: Incorrect'}</span>`;
    }

    // Student response display
    let responseHTML = '';
    if (q.type === 'MCQ' || q.type === 'Multiple Select MCQ') {
      const opts = (q.ui?.mcqOptions || []).filter(o => o.trim());
      const correctIdx = q.data?.correct;
      const multi = q.type === 'Multiple Select MCQ';
      responseHTML = opts.map((o, oi) => {
        const isStudentPick = multi ? (Array.isArray(studentAns) && studentAns.includes(oi)) : studentAns === oi;
        const isCorrectOpt = multi ? (Array.isArray(correctIdx) && correctIdx.includes(oi)) : correctIdx === oi;
        let cls = '';
        if (isStudentPick && isCorrectOpt) cls = 'correct';
        else if (isStudentPick && !isCorrectOpt) cls = 'wrong';
        else if (!isStudentPick && isCorrectOpt) cls = 'correct';
        return `<div class="sr-mcq-opt ${isStudentPick ? 'selected' : ''} ${cls}">
          <div class="opt-letter">${String.fromCharCode(65 + oi)}</div>
          <span>${o}</span>
          ${isStudentPick ? '<span style="margin-left:auto;font-size:11px;">👈 Student</span>' : ''}
          ${isCorrectOpt ? '<span style="margin-left:auto;font-size:11px;">✓ Correct</span>' : ''}
        </div>`;
      }).join('');
    } else if (q.type === 'True / False') {
      const correct = q.ui?.tfAnswer;
      responseHTML = `<div style="display:flex;gap:10px;">
        <div class="sr-mcq-opt ${studentAns === 'True' ? 'selected' : ''} ${studentAns === 'True' && correct === 'True' ? 'correct' : studentAns === 'True' ? 'wrong' : ''}" style="flex:1;justify-content:center;">
          ✓ True ${studentAns === 'True' ? '👈' : ''} ${correct === 'True' ? '✓' : ''}
        </div>
        <div class="sr-mcq-opt ${studentAns === 'False' ? 'selected' : ''} ${studentAns === 'False' && correct === 'False' ? 'correct' : studentAns === 'False' ? 'wrong' : ''}" style="flex:1;justify-content:center;">
          ✗ False ${studentAns === 'False' ? '👈' : ''} ${correct === 'False' ? '✓' : ''}
        </div>
      </div>`;
    } else {
      const text = studentAns || '';
      responseHTML = `<div class="sr-content ${!text ? 'empty' : ''}">${text || '(Not answered)'}</div>`;
    }

    html += `
    <div class="q-grade-card" id="qcard-${i}">
      <div class="q-grade-header">
        <span class="q-label">Q${qLabel} · ${q.type} ${crit ? `· Crit ${crit}${strand ? '-' + strand : ''}` : ''}</span>
        <div class="q-marks-info">
          ${autoScoreHTML}
          <span>${maxMarks} marks</span>
        </div>
      </div>
      <div class="q-grade-body">
        <div class="q-text">${q.data?.question || q.data?.text || '(No question text)'}</div>

        <div class="student-response">
          <div class="sr-label">Student Response</div>
          ${responseHTML}
        </div>

        ${markScheme ? `
        <button class="ms-toggle" onclick="toggleMS(${i})">📗 Show Mark Scheme</button>
        <div class="ms-content" id="ms-${i}">${markScheme}</div>` : ''}

        <div class="grade-row">
          <div class="grade-field">
            <label>Marks</label>
            <input type="number" class="grade-input" id="grade-${i}" value="${currentGrade}" min="0" max="${maxMarks}" placeholder="0" oninput="onGradeChange()">
          </div>
          <span class="grade-max">/ ${maxMarks}</span>
          <div class="grade-field" style="flex:1;">
            <label>Teacher Feedback</label>
            <input type="text" class="feedback-input" id="feedback-${i}" value="${currentFeedback}" placeholder="Feedback for this question…">
          </div>
        </div>
      </div>
    </div>`;
  });

  // ACTION BAR
  html += `
  <div class="action-bar">
    <span class="save-status" id="saveStatus"></span>
    <button class="btn-secondary" onclick="autoScoreAll()">⚡ Auto-Score MCQ/T-F</button>
    <button class="btn-save" onclick="saveGrades()">💾 Save Grades</button>
  </div>`;

  document.getElementById('emptyState').style.display = 'none';
  document.getElementById('gradingArea').style.display = 'block';
  document.getElementById('gradingArea').innerHTML = html;
  document.getElementById('mainPanel').scrollTop = 0;
}

/* ── Toggle mark scheme ── */
function toggleMS(i) {
  document.getElementById('ms-' + i).classList.toggle('open');
}

/* ── Auto-score MCQ and T/F ── */
function autoScoreAll() {
  const attempts = getAttempts();
  const a = attempts.find(x => x.id === activeAttemptId);
  if (!a) return;
  const set = getSetForAttempt(a);
  if (!set) return;
  const qBlocks = (set.blocks || []).filter(b => b.saved && b.mode === 'question');

  qBlocks.forEach((q, i) => {
    const maxMarks = Number(q.meta?.marks || 0);
    const ans = a.answers?.[i];

    if (q.type === 'MCQ' && q.data?.correct !== null && q.data?.correct !== undefined) {
      const correct = ans === q.data.correct;
      const el = document.getElementById('grade-' + i);
      if (el) el.value = correct ? maxMarks : 0;
    } else if (q.type === 'True / False' && q.ui?.tfAnswer) {
      const correct = ans === q.ui.tfAnswer;
      const el = document.getElementById('grade-' + i);
      if (el) el.value = correct ? maxMarks : 0;
    }
  });

  onGradeChange();
  showToast('⚡ Auto-scored MCQ and True/False questions');
}

/* ── Live marks update ── */
function onGradeChange() {
  const attempts = getAttempts();
  const a = attempts.find(x => x.id === activeAttemptId);
  if (!a) return;
  const set = getSetForAttempt(a);
  if (!set) return;
  const qBlocks = (set.blocks || []).filter(b => b.saved && b.mode === 'question');
  const totalMarks = qBlocks.reduce((s, q) => s + Number(q.meta?.marks || 0), 0);

  let earned = 0;
  let graded = 0;
  qBlocks.forEach((q, i) => {
    const el = document.getElementById('grade-' + i);
    if (el && el.value !== '') {
      earned += Number(el.value);
      graded++;
    }
  });

  const stats = document.querySelectorAll('.gh-stat-num');
  if (stats[2]) stats[2].textContent = `${graded}/${qBlocks.length}`;
  if (stats[3]) stats[3].textContent = `${earned}/${totalMarks}`;
}

/* ── Save grades ── */
function saveGrades() {
  const attempts = getAttempts();
  const idx = attempts.findIndex(x => x.id === activeAttemptId);
  if (idx === -1) { alert('Attempt not found.'); return; }

  const a = attempts[idx];
  const set = getSetForAttempt(a);
  if (!set) return;
  const qBlocks = (set.blocks || []).filter(b => b.saved && b.mode === 'question');

  a.grades = {};
  a.teacherFeedback = {};
  let totalEarned = 0;
  let totalMax = 0;

  qBlocks.forEach((q, i) => {
    const gradeEl = document.getElementById('grade-' + i);
    const fbEl = document.getElementById('feedback-' + i);
    const maxMarks = Number(q.meta?.marks || 0);
    totalMax += maxMarks;

    if (gradeEl && gradeEl.value !== '') {
      const val = Math.max(0, Math.min(Number(gradeEl.value), maxMarks));
      a.grades[i] = val;
      totalEarned += val;
    }
    if (fbEl && fbEl.value.trim()) {
      a.teacherFeedback[i] = fbEl.value.trim();
    }
  });

  const ofEl = document.getElementById('overallFeedback');
  a.overallFeedback = ofEl ? ofEl.value.trim() : '';

  a.earnedMarks = totalEarned;
  a.totalMarks = totalMax;
  a.percentScore = totalMax > 0 ? Math.round(totalEarned / totalMax * 100) : 0;
  a.gradingStatus = 'graded';
  a.gradedAt = Date.now();

  attempts[idx] = a;
  saveAttempts(attempts);

  loadAttempts();
  renderSidebar();
  openAttempt(activeAttemptId);

  showToast(`✅ Grades saved! ${totalEarned}/${totalMax} (${a.percentScore}%)`);
}

/* ── Toast ── */
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.display = 'block';
  setTimeout(() => { t.style.display = 'none'; }, 3000);
}
</script>
