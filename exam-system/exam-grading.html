<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Teacher Grading | Physicism MYP</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
<style>
:root{--surface:rgba(255,255,255,0.55);--surface2:rgba(255,255,255,0.75);--border:rgba(26,26,46,0.08);--border-hover:rgba(26,26,46,0.15);--accent:#e03030;--accent2:#c0392b;--accent-glow:rgba(224,48,48,0.06);--text:#1a1a2e;--text2:#555570;--text3:#8888a0;--green:#2e7d32;--green-pale:#e8f5e9;--red:#e03030;--red-pale:#fde8e6;--yellow:#e6a817;--yellow-pale:#fff8e1;--blue:#1a6fb5;--blue-pale:#deeaf6;--white:#ffffff;--cream:#f7f3ed;--cream-deep:#f0ebe2;--glass:rgba(255,255,255,0.5);--glass-border:rgba(255,255,255,0.65);--shadow-sm:0 2px 12px rgba(26,26,46,0.06);--shadow-md:0 8px 28px rgba(26,26,46,0.08);--shadow-lg:0 16px 48px rgba(26,26,46,0.1);--radius:14px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--cream);background-image:url('./assets/myp-background-image.png');background-size:cover;background-position:center;background-attachment:fixed;color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden}
body::before{content:'';position:fixed;inset:0;background:rgba(247,243,237,0.88);z-index:-1}
.topbar{height:56px;background:var(--glass);backdrop-filter:blur(24px) saturate(1.5);-webkit-backdrop-filter:blur(24px) saturate(1.5);border-bottom:1px solid var(--glass-border);display:flex;align-items:center;justify-content:space-between;padding:0 20px;flex-shrink:0;z-index:100}
.topbar-left{display:flex;gap:6px;align-items:center}
.topbar-brand{font-family:'Playfair Display',serif;font-size:18px;color:var(--accent);margin-right:16px;text-shadow:none}
.nav-btn{background:none;border:1px solid transparent;padding:6px 16px;border-radius:50px;color:var(--text2);cursor:pointer;font-size:13px;font-weight:500;transition:all .15s;font-family:'DM Sans',sans-serif}
.nav-btn:hover{color:var(--text);background:var(--red-pale);border-color:transparent}
.nav-btn.active{color:var(--accent);border-color:var(--accent);background:var(--accent-glow)}
.icon-btn{background:var(--surface);border:1.5px solid var(--border);padding:6px 13px;border-radius:50px;color:var(--text2);cursor:pointer;font-size:13px;transition:all .15s;font-family:'DM Sans',sans-serif}
.icon-btn:hover{background:var(--accent-glow);border-color:rgba(224,48,48,0.3);color:var(--accent)}
.app-body{display:flex;flex:1;overflow:hidden}
.sidebar{width:280px;background:var(--surface);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;flex-shrink:0}
.sidebar-header{padding:16px;border-bottom:1px solid var(--border)}
.sidebar-title{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--text3);font-weight:600;margin-bottom:10px}
.sidebar-search{width:100%;background:var(--white);border:1.5px solid var(--border);border-radius:10px;padding:8px 10px;color:var(--text);font-size:13px;outline:none;font-family:'DM Sans',sans-serif;transition:border-color .15s}
.sidebar-search:focus{border-color:var(--accent)}
.sidebar-list{flex:1;overflow-y:auto;padding:8px}
.attempt-card{padding:10px 12px;border-radius:10px;cursor:pointer;margin-bottom:6px;transition:all .15s;border:1px solid transparent;background:transparent}
.attempt-card:hover{background:var(--cream-deep);border-color:var(--border)}
.attempt-card.active{background:var(--accent-glow);border-color:rgba(224,48,48,0.2)}
.attempt-card .ac-name{font-size:13px;font-weight:600;color:var(--text);margin-bottom:2px}
.attempt-card .ac-set{font-size:11px;color:var(--text3);margin-bottom:4px}
.attempt-card .ac-meta{display:flex;gap:6px;flex-wrap:wrap}
.badge{font-size:10px;padding:2px 8px;border-radius:10px;background:var(--cream-deep);border:1px solid var(--border);color:var(--text3)}
.badge.green{background:var(--green-pale);border-color:rgba(46,125,50,0.3);color:var(--green)}
.badge.yellow{background:var(--yellow-pale);border-color:rgba(230,168,23,0.3);color:var(--yellow)}
.badge.red{background:var(--red-pale);border-color:rgba(224,48,48,0.3);color:var(--accent)}
.badge.blue{background:var(--blue-pale);border-color:rgba(26,111,181,0.3);color:var(--blue)}
.filter-tabs{display:flex;gap:4px;margin-bottom:12px}
.filter-tab{flex:1;padding:6px;border-radius:50px;border:1.5px solid var(--border);background:var(--white);color:var(--text2);cursor:pointer;font-size:11px;font-family:'DM Sans',sans-serif;text-align:center;transition:all .15s}
.filter-tab.active{background:var(--accent);color:white;border-color:var(--accent)}
.filter-tab:hover:not(.active){background:var(--red-pale)}
.main-panel{flex:1;overflow-y:auto;padding:24px;background:var(--cream)}
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--text2);text-align:center;gap:12px}
.empty-state .icon{font-size:48px;opacity:0.3}
.empty-state h3{font-size:16px;color:var(--text)}
.empty-state p{font-size:13px;max-width:360px;line-height:1.6}
.grading-header{background:var(--white);border:1.5px solid var(--border);border-radius:20px;padding:20px;margin-bottom:20px;box-shadow:var(--shadow-sm)}
.gh-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px}
.gh-title{font-size:18px;font-weight:600;color:var(--text)}
.gh-subtitle{font-size:12px;color:var(--text3);margin-top:4px}
.gh-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.gh-stat{background:var(--cream-deep);border:1.5px solid var(--border);border-radius:12px;padding:10px;text-align:center}
.gh-stat-num{font-size:20px;font-weight:700;color:var(--accent)}
.gh-stat-label{font-size:10px;color:var(--text3);margin-top:2px}
.overall-feedback{background:var(--white);border:1.5px solid var(--border);border-radius:16px;padding:18px;margin-bottom:20px}
.of-label{font-size:11px;color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.of-textarea{width:100%;background:var(--cream-deep);border:1.5px solid var(--border);border-radius:10px;padding:10px 12px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:13px;resize:vertical;min-height:70px;outline:none;transition:border-color .15s}
.of-textarea:focus{border-color:var(--accent)}
.q-grade-card{background:var(--white);border:1.5px solid var(--border);border-radius:16px;margin-bottom:16px;overflow:hidden;box-shadow:var(--shadow-sm);transition:border-color .15s}
.q-grade-card:hover{border-color:rgba(224,48,48,0.15)}
.q-grade-header{padding:14px 18px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border);background:var(--cream-deep)}
.q-grade-header .q-label{font-size:12px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.5px}
.q-grade-header .q-marks-info{font-size:12px;color:var(--text3);display:flex;gap:8px;align-items:center}
.q-grade-body{padding:18px}
.q-grade-body .q-text{font-size:14px;line-height:1.6;color:var(--text);margin-bottom:16px;padding-bottom:14px;border-bottom:1px solid var(--border)}
.student-response{margin-bottom:16px}
.sr-label{font-size:10px;color:var(--accent);font-weight:600;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
.sr-content{background:var(--cream-deep);border:1.5px solid var(--border);border-radius:10px;padding:14px;font-size:13px;line-height:1.6;color:var(--text);white-space:pre-wrap;min-height:40px}
.sr-content.empty{color:var(--text3);font-style:italic}
.sr-mcq-opt{padding:8px 12px;border-radius:7px;border:1.5px solid var(--border);background:var(--cream-deep);margin-bottom:6px;font-size:13px;display:flex;align-items:center;gap:10px;color:var(--text)}
.sr-mcq-opt.selected{border-color:rgba(26,111,181,0.4);background:var(--blue-pale)}
.sr-mcq-opt.correct{border-color:rgba(46,125,50,0.4);background:var(--green-pale)}
.sr-mcq-opt.wrong{border-color:rgba(224,48,48,0.3);background:var(--red-pale)}
.opt-letter{width:22px;height:22px;border-radius:50%;border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0}
.grade-row{display:flex;gap:12px;align-items:flex-start;flex-wrap:wrap;padding:14px;background:var(--cream-deep);border-radius:12px;border:1.5px solid var(--border);margin-top:14px}
.grade-field{display:flex;flex-direction:column;gap:4px}
.grade-field label{font-size:10px;color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.grade-input{width:70px;background:var(--white);border:1.5px solid var(--border);border-radius:10px;padding:7px 10px;color:var(--text);font-size:14px;font-weight:600;text-align:center;outline:none;font-family:'DM Sans',sans-serif;transition:border-color .15s}
.grade-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow)}
.grade-max{font-size:12px;color:var(--text3);align-self:flex-end;padding-bottom:8px}
.feedback-input{flex:1;min-width:200px;background:var(--white);border:1.5px solid var(--border);border-radius:10px;padding:7px 10px;color:var(--text);font-size:13px;outline:none;font-family:'DM Sans',sans-serif;transition:border-color .15s}
.feedback-input:focus{border-color:var(--accent)}
.btn-save{padding:10px 24px;background:var(--accent);color:white;border:none;border-radius:50px;cursor:pointer;font-size:14px;font-weight:600;transition:all .15s;font-family:'DM Sans',sans-serif;box-shadow:0 4px 16px rgba(224,48,48,0.2)}
.btn-save:hover{background:var(--accent2);box-shadow:0 6px 24px rgba(224,48,48,0.3)}
.btn-save:disabled{opacity:0.4;cursor:not-allowed}
.btn-secondary{padding:10px 20px;background:var(--surface);color:var(--text2);border:1.5px solid var(--border);border-radius:50px;cursor:pointer;font-size:13px;font-family:'DM Sans',sans-serif;transition:all .15s}
.btn-secondary:hover{background:var(--cream-deep);color:var(--text)}
.action-bar{display:flex;gap:10px;justify-content:flex-end;align-items:center;margin-top:20px;padding-top:16px;border-top:1px solid var(--border)}
.action-bar .save-status{font-size:12px;color:var(--green);margin-right:auto}
.ms-toggle{font-size:12px;color:var(--green);cursor:pointer;border:none;background:none;font-family:'DM Sans',sans-serif;padding:4px 0;transition:opacity .15s}
.ms-toggle:hover{opacity:0.7}
.ms-content{margin-top:8px;padding:10px 12px;background:var(--green-pale);border:1px solid rgba(46,125,50,0.2);border-radius:10px;font-size:12px;color:var(--text);line-height:1.6;display:none}
.ms-content.open{display:block}
.auto-scored{display:inline-flex;align-items:center;gap:4px;font-size:11px;padding:3px 10px;border-radius:10px}
.auto-scored.correct{background:var(--green-pale);color:var(--green)}
.auto-scored.incorrect{background:var(--red-pale);color:var(--accent)}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(224,48,48,0.12);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:rgba(224,48,48,0.25)}
.toast{position:fixed;top:70px;left:50%;transform:translateX(-50%);background:var(--white);border:1.5px solid rgba(46,125,50,0.3);border-radius:50px;padding:14px 24px;z-index:9999;box-shadow:var(--shadow-lg);font-size:14px;color:var(--green);display:none;animation:toastIn .3s ease}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(-20px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
@media(max-width:768px){.sidebar{display:none}.topbar{padding:0 12px}.main-panel{padding:16px}.grading-header{padding:16px;border-radius:14px}.gh-stats{grid-template-columns:1fr 1fr}.grade-row{flex-direction:column}.feedback-input{min-width:auto}.action-bar{flex-wrap:wrap}}
</style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <div class="topbar-left">
    <span class="topbar-brand">MYP·Grading</span>
    <button class="nav-btn active">📝 Grade</button>
  </div>
  <div class="topbar-right">
    <button class="icon-btn" onclick="window.history.back()">← Back</button>
    <button class="icon-btn" onclick="window.location.href='exam-teacher.html'">✏️ Builder</button>
    <button class="icon-btn" onclick="window.location.href='https://soralatul16.github.io/atul-soral-physicism/index.html'">🏠 Home</button>
  </div>
</div>

<div class="app-body">

  <!-- SIDEBAR: SUBMISSION LIST -->
  <div class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-title">Student Submissions</div>
      <div class="filter-tabs">
        <button class="filter-tab active" onclick="filterAttempts('all',this)">All</button>
        <button class="filter-tab" onclick="filterAttempts('pending',this)">Pending</button>
        <button class="filter-tab" onclick="filterAttempts('graded',this)">Graded</button>
      </div>
      <input type="text" class="sidebar-search" id="searchInput" placeholder="Search student or set name…" oninput="renderSidebar()">
      <select class="sidebar-search" id="sortSelect" onchange="loadAttempts();renderSidebar();" style="margin-top:8px;">
        <option value="newest">Newest first</option>
        <option value="oldest">Oldest first</option>
        <option value="name">By student name</option>
        <option value="score-low">Score: low → high</option>
        <option value="score-high">Score: high → low</option>
      </select>
    </div>
    <div class="sidebar-list" id="attemptList"></div>
  </div>

  <!-- MAIN PANEL -->
  <div class="main-panel" id="mainPanel">
    <div class="empty-state" id="emptyState">
      <div class="icon">📝</div>
      <h3>Select a submission to grade</h3>
      <p>Student submissions appear in the sidebar. Click one to view the student's responses and assign marks with feedback.</p>
    </div>
    <div id="gradingArea" style="display:none;"></div>
  </div>

</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="firebase-config.js?v=2"></script>
<script src="firebase-auth.js?v=2"></script>
<script src="firebase-db.js?v=2"></script>

<script>
/* ═══════════════════════════════════════════════════
   TEACHER GRADING PANEL
   Reads from PHYS_ATTEMPTS & MYP_LIBRARY in localStorage
   Writes grading data back into each attempt
═══════════════════════════════════════════════════ */

const LIBRARY_KEY  = "MYP_LIBRARY";
const ATTEMPTS_KEY = "PHYS_ATTEMPTS";

let allAttempts = [];
let currentFilter = 'all';
let activeAttemptId = null;

/* ── Data helpers ── */
// Use window.getLibrary, window.getAttempts from firebase-db.js, else fallback to localStorage
function fetchLibrary()  { return typeof getLibrary === 'function' ? getLibrary() : JSON.parse(localStorage.getItem(LIBRARY_KEY) || "[]"); }
function fetchAttempts() { return typeof getAttempts === 'function' ? getAttempts() : JSON.parse(localStorage.getItem(ATTEMPTS_KEY) || "[]"); }
function storeAttempts(arr) {
  if (typeof saveAttempts === 'function') saveAttempts(arr);
  else localStorage.setItem(ATTEMPTS_KEY, JSON.stringify(arr));
}

function getSetForAttempt(a) {
  return fetchLibrary().find(s => s.id === a.setId);
}

// Submissions cache
let _submissionsCache = [];

function loadAttempts() {
  const sort = document.getElementById('sortSelect')?.value || 'newest';
  allAttempts = fetchAttempts().filter(a => a.status === "completed");
  
  // Merge submissions
  _submissionsCache.forEach(sub => {
    // Check if we already have this attempt based on attemptId
    if (!allAttempts.find(a => a.id === sub.attemptId || a.id === sub.id)) {
      // Map submission to attempt format
      allAttempts.push({
        ...sub,
        id: sub.id, // Use submission doc id
        status: "completed",
        submissionId: sub.id, // Explicitly store submission ID
        setTitle: sub.setTitle || sub.heading || '',
        chapter: sub.chapter || '',
        topic: sub.topic || '',
        endTime: sub.submittedAt?.toDate ? sub.submittedAt.toDate().getTime() : Date.now(),
        percentScore: sub.percentScore || (sub.aiGrading ? sub.aiGrading.percentage : 0),
        earnedMarks: sub.earnedMarks || (sub.aiGrading ? sub.aiGrading.totalMarksAwarded : 0),
        totalMarks: sub.totalMarks || (sub.aiGrading ? sub.aiGrading.totalMarksPossible : 0)
      });
    } else {
      // If found, update it with AI grading data and metadata
      let existing = allAttempts.find(a => a.id === sub.attemptId || a.id === sub.id);
      if (existing) {
        existing.aiGrading = sub.aiGrading;
        existing.gradingStatus = sub.gradingStatus;
        existing.submissionId = sub.id;
        if (!existing.setTitle && sub.setTitle) existing.setTitle = sub.setTitle;
        if (!existing.chapter && sub.chapter) existing.chapter = sub.chapter;
        if (!existing.topic && sub.topic) existing.topic = sub.topic;
        if (sub.grades) existing.grades = sub.grades;
        if (sub.teacherFeedback) existing.teacherFeedback = sub.teacherFeedback;
        if (sub.overallFeedback) existing.overallFeedback = sub.overallFeedback;
        if (sub.earnedMarks) existing.earnedMarks = sub.earnedMarks;
        if (sub.totalMarks) existing.totalMarks = sub.totalMarks;
        if (sub.percentScore) existing.percentScore = sub.percentScore;
      }
    }
  });
  
  if (sort === 'newest') allAttempts.sort((a, b) => (b.endTime || b.startTime) - (a.endTime || a.startTime));
  else if (sort === 'oldest') allAttempts.sort((a, b) => (a.endTime || a.startTime) - (b.endTime || b.startTime));
  else if (sort === 'name') allAttempts.sort((a, b) => (a.studentName || '').localeCompare(b.studentName || ''));
  else if (sort === 'score-low') allAttempts.sort((a, b) => (a.percentScore || 0) - (b.percentScore || 0));
  else if (sort === 'score-high') allAttempts.sort((a, b) => (b.percentScore || 0) - (a.percentScore || 0));
}

// Ensure we wait for Firebase if present
window.addEventListener("DOMContentLoaded", async () => {
  if (typeof auth !== 'undefined') {
    auth.onAuthStateChanged(async (user) => {
      if (user) {
        if (typeof initFirebaseDB === 'function') await initFirebaseDB();
        if (typeof loadAllAttempts === 'function') {
          const all = await loadAllAttempts();
          if (typeof _attemptsCache !== 'undefined') window._attemptsCache = all;
        }
        if (window.db) {
          db.collection('submissions').onSnapshot(snap => {
            _submissionsCache = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            loadAttempts();
            renderSidebar();
            if (activeAttemptId) {
               // Update active view if needed (optional)
            }
          });
        }
      }
      loadAttempts();
      renderSidebar();
    });
  } else {
    loadAttempts();
    renderSidebar();
  }
});

/* ── Sidebar ── */
function filterAttempts(filter, btn) {
  currentFilter = filter;
  document.querySelectorAll('.filter-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderSidebar();
}

function renderSidebar() {
  const search = (document.getElementById('searchInput')?.value || '').toLowerCase();
  const list = document.getElementById('attemptList');

  let filtered = allAttempts.filter(a => {
    if (currentFilter === 'pending' && a.gradingStatus === 'graded') return false;
    if (currentFilter === 'graded' && a.gradingStatus !== 'graded') return false;
    if (search) {
      const name = (a.studentName || '').toLowerCase();
      const title = (a.setTitle || '').toLowerCase();
      if (!name.includes(search) && !title.includes(search)) return false;
    }
    return true;
  });

  if (filtered.length === 0) {
    list.innerHTML = `<div style="padding:20px;text-align:center;color:var(--text2);font-size:13px;">
      ${allAttempts.length === 0 ? 'No completed submissions yet.<br><br>Students need to complete a test for submissions to appear here.' : 'No submissions match your filter.'}
    </div>`;
    return;
  }

  const countHTML = '<div style="padding:6px 12px;font-size:11px;color:var(--text3);font-weight:600;border-bottom:1px solid var(--border);margin-bottom:4px;">' + filtered.length + ' submission' + (filtered.length !== 1 ? 's' : '') + '</div>';
  list.innerHTML = countHTML + filtered.map(a => {
    const isGraded = a.gradingStatus === 'graded';
    const date = new Date(a.endTime || a.startTime).toLocaleDateString('en-IN', { day:'numeric', month:'short' });
    const duration = a.duration ? `${Math.floor(a.duration/60)}m` : '';
    let statusBadge = '';
    if (a.wantsGrading === false) {
      statusBadge = '<span class="badge red">Do Not Grade</span>';
    } else if (isGraded) {
      statusBadge = '<span class="badge green">✓ Graded</span>';
    } else {
      statusBadge = '<span class="badge yellow">Pending</span>';
    }
    
    return `
    <div class="attempt-card ${activeAttemptId === a.id ? 'active' : ''}" id="sub-${a.id}" onclick="openAttempt('${a.id}')">
      <div style="display:flex; justify-content:space-between; align-items:flex-start;">
        <div class="ac-name">${a.studentName || 'Unknown Student'}</div>
        <button onclick="deleteSubmission(event, '${a.id}')" title="Delete Submission" style="background:transparent; border:none; color:var(--text2); cursor:pointer; font-size:12px; padding:2px;">🗑️</button>
      </div>
      <div class="ac-set">${a.setTitle || 'Untitled Set'}</div>
      <div class="ac-meta">
        <span class="badge">${date}</span>
        ${duration ? `<span class="badge">${duration}</span>` : ''}
        <span class="badge ${a.percentScore >= 70 ? 'green' : a.percentScore >= 40 ? 'yellow' : 'red'}">${a.percentScore || 0}%</span>
        ${statusBadge}
      </div>
    </div>`;
  }).join('');
}

/* ── Delete attempt ── */
function deleteSubmission(e, attemptId) {
  if (e) e.stopPropagation();
  console.log('Deleting submission:', attemptId);
  if (!confirm('Delete this submission permanently?')) return;
  
  const attempt = allAttempts.find(x => x.id === attemptId);
  const realSubmissionId = attempt && attempt.submissionId ? attempt.submissionId : attemptId;
  
  if (window.db) {
    Promise.all([
      db.collection('submissions').doc(realSubmissionId).delete().catch(e => console.warn('Could not delete from submissions', e)),
      db.collection('attempts').doc(attemptId).delete().catch(e => console.warn('Could not delete from attempts', e))
    ]).then(function() {
      // Remove the card from the DOM
      var card = document.getElementById('sub-' + attemptId);
      if (card) card.remove();
      alert('Submission deleted.');
      
      if (activeAttemptId === attemptId) {
        activeAttemptId = null;
        var empty = document.getElementById('emptyState');
        var area = document.getElementById('gradingArea');
        if (empty) empty.style.display = 'flex';
        if (area) area.style.display = 'none';
      }
      
      // Also delete from local array if it's there
      const attempts = fetchAttempts();
      const idx = attempts.findIndex(x => x.id === attemptId);
      if (idx !== -1) {
        attempts.splice(idx, 1);
        if (typeof _attemptsCache !== 'undefined') window._attemptsCache = attempts;
        try { localStorage.setItem(ATTEMPTS_KEY, JSON.stringify(attempts)); } catch(err) {}
      }
      loadAttempts();
      renderSidebar();
    }).catch(function(err) {
      alert('Error deleting: ' + err.message);
      console.error('Delete error:', err);
    });
  } else {
    // Local fallback
    const attempts = fetchAttempts();
    const idx = attempts.findIndex(x => x.id === attemptId);
    if (idx !== -1) {
      attempts.splice(idx, 1);
      if (typeof _attemptsCache !== 'undefined') window._attemptsCache = attempts;
      try { localStorage.setItem(ATTEMPTS_KEY, JSON.stringify(attempts)); } catch(err) {}
    }
    
    var card = document.getElementById('sub-' + attemptId);
    if (card) card.remove();
    if (activeAttemptId === attemptId) {
      activeAttemptId = null;
      var empty = document.getElementById('emptyState');
      var area = document.getElementById('gradingArea');
      if (empty) empty.style.display = 'flex';
      if (area) area.style.display = 'none';
    }
    loadAttempts();
    renderSidebar();
  }
}

/* ── Open attempt for grading ── */
function openAttempt(attemptId) {

  renderSidebar();

  // Search allAttempts (includes Firestore submissions), fallback to fetchAttempts
  const a = allAttempts.find(x => x.id === attemptId) || fetchAttempts().find(x => x.id === attemptId);
  if (!a) { alert('Attempt not found.'); return; }

  const set = getSetForAttempt(a);
  if (!set) { alert('Question set no longer exists.'); return; }

  if (!a.grades) a.grades = {};

  html += `

      responseHTML = `<div style="overflow-x:auto;margin-top:8px;"><table style="width:100%;border-collapse:collapse;font-size:13px;">`;

          </div>

/* ── Toggle mark scheme ── */
function toggleMS(i) {
  document.getElementById('ms-' + i).classList.toggle('open');
}

/* ── Auto-score MCQ and T/F ── */
function autoScoreAll() {
  const a = allAttempts.find(x => x.id === activeAttemptId);
  if (!a) return;
  const set = getSetForAttempt(a);
  if (!set) return;
  const qBlocks = (set.blocks || []).filter(b => b.saved && b.mode === 'question');

  qBlocks.forEach((q, i) => {
    const maxMarks = Number(q.meta?.marks || 0);
    const ans = a.answers?.[i];

    if (q.type === 'MCQ' && q.data?.correct !== null && q.data?.correct !== undefined) {
      const correct = ans === q.data.correct;
      const el = document.getElementById('grade-' + i);
      if (el) el.value = correct ? maxMarks : 0;
      const fbEl = document.getElementById('feedback-' + i);
      if (fbEl) { if (correct) { fbEl.value = 'Correct.'; } else { const correctOpt = (q.ui?.mcqOptions || [])[q.data.correct]; fbEl.value = 'Incorrect. Correct answer: ' + String.fromCharCode(65 + q.data.correct) + (correctOpt ? '. ' + correctOpt : '') + '.'; } }
    } else if (q.type === 'True / False' && q.ui?.tfAnswer) {
      const correct = ans === q.ui.tfAnswer;
      const el = document.getElementById('grade-' + i);
      if (el) el.value = correct ? maxMarks : 0;
      const fbEl2 = document.getElementById('feedback-' + i);
      if (fbEl2) { fbEl2.value = correct ? 'Correct.' : 'Incorrect. The correct answer is ' + q.ui.tfAnswer + '.'; }
    } else if (q.type === 'Match the Following') {
      const pairs = q.ui?.matchPairs || [];
      if (pairs.length > 0) {
        let correctCount = 0;
        pairs.forEach((p, pi) => {
          if (ans && typeof ans === 'object' && ans[pi] === p.b) correctCount++;
        });
        const proportion = correctCount / pairs.length;
        const autoMarks = Math.round(proportion * maxMarks);
        const el = document.getElementById('grade-' + i);
        if (el) el.value = autoMarks;
        const fbEl3 = document.getElementById('feedback-' + i);
        if (fbEl3) { fbEl3.value = correctCount + '/' + pairs.length + ' pairs matched correctly.'; }
      }
    }
  });

  onGradeChange();
  showToast('⚡ Auto-scored MCQ and True/False questions');
}

/* ── AI Auto-Grade All ── */
async function generateAIGrades() {
  const a = allAttempts.find(x => x.id === activeAttemptId);
  if (!a) return;
  const set = getSetForAttempt(a);
  if (!set) return;
  const qBlocks = (set.blocks || []).filter(b => b.saved && b.mode === 'question');
  
  var key = localStorage.getItem('groq_api_key') || localStorage.getItem('gemini_api_key') || localStorage.getItem('ia_api_key');
  if (!key) {
    alert('Please set your AI API key in the Question Generator panel first.');
    return;
  }
  
  const btn = document.getElementById('btn-ai-grade');
  if (btn) {
    btn.disabled = true;
  }

  for (let qi = 0; qi < qBlocks.length; qi++) {
    const qBlock = qBlocks[qi];
    const studentAnswer = a.answers?.[qi] || '';
    const maxMarks = Number(qBlock.meta?.marks || 0);
    
    if (btn) btn.innerHTML = '🤖 Grading Q' + (qi + 1) + '...';
    
    // MCQ, True/False — grade automatically without AI
    if (qBlock.type === 'MCQ' || qBlock.type === 'True / False') {
      let correct = false;
      if (qBlock.type === 'MCQ') correct = studentAnswer === qBlock.data?.correct;
      else correct = studentAnswer === qBlock.ui?.tfAnswer;
      
      const marks = correct ? maxMarks : 0;
      const el = document.getElementById('grade-' + qi);
      if (el) { el.value = marks; }
      const fbEl = document.getElementById('feedback-' + qi);
      if (fbEl) fbEl.value = correct ? 'Correct.' : 'Incorrect. The correct answer is: ' + (qBlock.type === 'MCQ' ? (qBlock.ui?.mcqOptions?.[qBlock.data?.correct] || '') : qBlock.ui?.tfAnswer || '');
      onGradeChange();
      continue;
    }
    
    // Fill in the Blank
    if (qBlock.type === 'Fill in the Blank' || qBlock.type === 'Fill Text') {
      const expected = (qBlock.data?.labels || qBlock.data?.correct || '').toString().toLowerCase().trim();
      const given = (studentAnswer || '').toString().toLowerCase().trim();
      const correct = given === expected || expected.indexOf(given) !== -1 || given.indexOf(expected) !== -1;
      const marks = correct ? maxMarks : 0;
      
      const el = document.getElementById('grade-' + qi);
      if (el) { el.value = marks; }
      const fbEl = document.getElementById('feedback-' + qi);
      if (fbEl) fbEl.value = correct ? 'Correct.' : 'Expected answer: ' + expected;
      onGradeChange();
      continue;
    }
    
    let studentAnsStr = studentAnswer;
    if (typeof studentAnswer === 'string' && studentAnswer.startsWith('data:image')) {
      const fbEl = document.getElementById('feedback-' + qi);
      if (fbEl) fbEl.value = 'Drawing requires manual teacher review.';
      continue;
    } else if (typeof studentAnswer === 'object') {
      studentAnsStr = JSON.stringify(studentAnswer);
    } else if (!studentAnswer) {
      studentAnsStr = '[No answer provided]';
    }
    
    let gradingPrompt = 'You are a strict IB MYP Physics examiner. Grade this student answer.\\n\\n'
      + 'QUESTION: ' + (qBlock.data?.question || '') + '\\n'
      + 'MAXIMUM MARKS: ' + maxMarks + '\\n'
      + 'CRITERION: ' + (qBlock.meta?.criterion || 'A') + '\\n'
      + 'STRAND: ' + (qBlock.meta?.strand || 'i') + '\\n'
      + 'COMMAND TERM: ' + (qBlock.meta?.commandTerm || 'State') + '\\n'
      + 'MARK SCHEME: ' + (qBlock.meta?.markScheme || 'Award marks based on quality of response.') + '\\n';
    
    if (qBlock.meta?.gradingGrid) {
      gradingPrompt += 'HOLISTIC MARKING GRID:\\n' + JSON.stringify(qBlock.meta.gradingGrid, null, 2) + '\\n';
    }
    
    gradingPrompt += '\\nSTUDENT ANSWER: ' + studentAnsStr + '\\n\\n'
      + 'GRADE THIS ANSWER. Respond with ONLY valid JSON in this exact format:\\n'
      + '{"marksAwarded":N,"feedback":"One sentence summary of performance plus what they missed."}\\n\\n'
      + 'GRADING RULES:\\n'
      + '- Be STRICT. Follow the mark scheme exactly.\\n'
      + '- Award marks ONLY for points that match the mark scheme.\\n'
      + '- If the student wrote nothing, award 0 marks.\\n'
      + '- If the answer is partially correct, award partial marks.\\n'
      + '- Do NOT be generous. This is IB standard marking — hard but fair.\\n';
    
    let gradeText = '';
    let aiError = null;
    let modelToUse = 'llama-3.3-70b-versatile';
    let retryCount = 0;
    
    while (retryCount < 3) {
      try {
        let response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
          method: 'POST',
          headers: {'Content-Type': 'application/json', 'Authorization': 'Bearer ' + key},
          body: JSON.stringify({
            model: modelToUse,
            messages: [
              {role: 'system', content: 'You are a strict IB MYP Physics examiner. Respond with valid JSON only. No markdown.'},
              {role: 'user', content: gradingPrompt}
            ],
            temperature: 0.3,
            max_tokens: 500,
            response_format: {type: 'json_object'}
          })
        });
        
        if (response.ok) {
          let data = await response.json();
          gradeText = data.choices?.[0]?.message?.content || '{}';
          aiError = null;
          break;
        } else {
          if (response.status === 429) {
            modelToUse = 'llama-3.1-8b-instant';
            retryCount++;
            await new Promise(r => setTimeout(r, 2000 * retryCount));
          } else {
            aiError = 'API Error ' + response.status;
            break;
          }
        }
      } catch(err) {
        aiError = err.message;
        retryCount++;
        await new Promise(r => setTimeout(r, 1000));
      }
    }
    
    if (!aiError && gradeText) {
      try {
        gradeText = gradeText.replace(/\`\`\`json/g, '').replace(/\`\`\`/g, '').trim();
        let grade = JSON.parse(gradeText);
        let awarded = Math.min(Number(grade.marksAwarded || 0), maxMarks);
        
        const el = document.getElementById('grade-' + qi);
        if (el) { el.value = awarded; }
        const fbEl = document.getElementById('feedback-' + qi);
        if (fbEl) fbEl.value = grade.feedback || '';
        onGradeChange();
      } catch (parseErr) {
        aiError = 'JSON Parse Error';
      }
    }
    
    if (aiError) {
      const fbEl = document.getElementById('feedback-' + qi);
      if (fbEl) fbEl.value = 'Could not auto-grade (' + aiError + '). Please grade manually.';
    }
    
    await new Promise(r => setTimeout(r, 1500));
  }
  
  if (btn) {
    btn.innerHTML = '🤖 AI Auto-Grade All';
    btn.disabled = false;
  }
  alert('AI Auto-Grading complete! Please review the assigned grades and feedback, then click Save Grades.');
}

/* ── Live marks update ── */
function onGradeChange() {
  const a = allAttempts.find(x => x.id === activeAttemptId);
  if (!a) return;
  const set = getSetForAttempt(a);
  if (!set) return;
  const qBlocks = (set.blocks || []).filter(b => b.saved && b.mode === 'question');
  const totalMarks = qBlocks.reduce((s, q) => s + Number(q.meta?.marks || 0), 0);

  let earned = 0;
  let graded = 0;
  qBlocks.forEach((q, i) => {
    const el = document.getElementById('grade-' + i);
    if (el && el.value !== '') {
      earned += Number(el.value);
      graded++;
    }
  });

  const stats = document.querySelectorAll('.gh-stat-num');
  if (stats[2]) stats[2].textContent = `${graded}/${qBlocks.length}`;
  if (stats[3]) stats[3].textContent = `${earned}/${totalMarks}`;

  const progressBar = document.getElementById('gradeProgressBar');
  const progressLabel = document.getElementById('gradeProgressLabel');
  const progressPct = document.getElementById('gradeProgressPct');
  if (progressBar) progressBar.style.width = Math.round(graded/qBlocks.length*100) + '%';
  if (progressLabel) progressLabel.textContent = graded + '/' + qBlocks.length + ' graded';
  if (progressPct) progressPct.textContent = Math.round(graded/qBlocks.length*100) + '%';
}

/* ── Save grades ── */
function saveGrades() {
  const idx = allAttempts.findIndex(x => x.id === activeAttemptId);
  if (idx === -1) { alert('Attempt not found.'); return; }

  const a = allAttempts[idx];
  const set = getSetForAttempt(a);
  if (!set) return;
  const qBlocks = (set.blocks || []).filter(b => b.saved && b.mode === 'question');

  a.grades = {};
  a.teacherFeedback = {};
  let totalEarned = 0;
  let totalMax = 0;

  qBlocks.forEach((q, i) => {
    const gradeEl = document.getElementById('grade-' + i);
    const fbEl = document.getElementById('feedback-' + i);
    const maxMarks = Number(q.meta?.marks || 0);
    totalMax += maxMarks;

    if (gradeEl && gradeEl.value !== '') {
      const val = Math.max(0, Math.min(Number(gradeEl.value), maxMarks));
      a.grades[i] = val;
      totalEarned += val;
    } else {
      // Use AI suggested grade if teacher hasn't overridden
      const aiRes = a.aiGrading?.results?.find(r => r.questionIndex === i);
      if (aiRes && aiRes.marksAwarded >= 0) {
        a.grades[i] = aiRes.marksAwarded;
        totalEarned += aiRes.marksAwarded;
      }
    }
    if (fbEl && fbEl.value.trim()) {
      a.teacherFeedback[i] = fbEl.value.trim();
    }
  });

  const ofEl = document.getElementById('overallFeedback');
  a.overallFeedback = ofEl ? ofEl.value.trim() : '';

  a.earnedMarks = totalEarned;
  a.totalMarks = totalMax;
  a.percentScore = totalMax > 0 ? Math.round(totalEarned / totalMax * 100) : 0;
  a.gradingStatus = 'graded';
  a.teacherApproved = true;
  a.gradedAt = Date.now();

  allAttempts[idx] = a;
  // Also save to local attempts cache if present there
  const localAttempts = fetchAttempts();
  const localIdx = localAttempts.findIndex(x => x.id === activeAttemptId);
  if (localIdx !== -1) {
    localAttempts[localIdx] = a;
    storeAttempts(localAttempts);
  }
  
  if (a.submissionId && window.db) {
    db.collection('submissions').doc(a.submissionId).update({
      gradingStatus: 'graded',
      teacherApproved: true,
      earnedMarks: totalEarned,
      percentScore: a.percentScore,
      grades: a.grades,
      teacherFeedback: a.teacherFeedback,
      overallFeedback: a.overallFeedback,
      gradedAt: firebase.firestore.FieldValue.serverTimestamp()
    }).catch(err => console.error('Error updating submission:', err));
  }

  loadAttempts();
  renderSidebar();
  openAttempt(activeAttemptId);

  showToast(`✅ Grades saved! ${totalEarned}/${totalMax} (${a.percentScore}%)`);
}

/* ── Keyboard Navigation ── */
document.addEventListener('keydown', function(e) {
  const active = document.activeElement;
  if (!active) return;
  if (active.classList.contains('grade-input') && e.key === 'Enter') {
    e.preventDefault();
    const idx = parseInt(active.id.split('-')[1]);
    const nextIdx = e.shiftKey ? idx - 1 : idx + 1;
    const next = document.getElementById('grade-' + nextIdx);
    if (next) { next.focus(); next.select(); }
  }
});

/* ── Toast ── */
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.display = 'block';
  setTimeout(() => { t.style.display = 'none'; }, 3000);
}
</script>
