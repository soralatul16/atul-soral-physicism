<!DOCTYPE html>
<html>
<head>
<title>Exam</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{background:#0f172a;color:white;font-family:sans-serif;}
.card{background:#020617;padding:20px;margin:20px;border-radius:10px;}
</style>
</head>

<body>

<input id="name" placeholder="Name">

<select id="paper"></select>
<button onclick="start()">Start</button>

<div id="exam"></div>

<script>

let papers=JSON.parse(localStorage.getItem("papers")||[]);
let attempts=JSON.parse(localStorage.getItem("attempts")||"[]");

papers.forEach((p,i)=>{
paper.innerHTML+=`<option value="${i}">${p.title}</option>`;
});

let startTime;

function start(){

startTime=new Date();

let p=papers[paper.value];

let sec={A:[],B:[],C:[],D:[]};

p.questions.forEach((q,i)=>{
q.i=i;
sec[q.section].push(q);
});

let html=`<div class="card"><h2>${p.title}</h2><p>${p.scenario}</p>`;

for(let s in sec){

if(sec[s].length===0) continue;

html+=`<h3>Section ${s}</h3>`;

sec[s].forEach(q=>{

html+=`<p>Q${q.i+1} (${q.marks}) ${q.text}</p>`;

if(q.type==="mcq"){
q.options.forEach(o=>{
html+=`<br><input type="radio" name="q${q.i}" value="${o}">${o}`;
});
}

if(q.type==="text"){
html+=`<textarea id="q${q.i}"></textarea>`;
}

html+=`<p style="display:none" id="ms-${q.i}">
${q.markscheme||"No markscheme"}
</p>`;
});
}

html+=`<button onclick="submit()">Submit</button>`;

exam.innerHTML=html;
}

function submit(){

let score=0;
let total=0;
let p=papers[paper.value];

p.questions.forEach((q,i)=>{
total+=q.marks;

if(q.type==="mcq"){
let sel=document.querySelector(`input[name="q${i}"]:checked`);
if(sel && sel.value===q.answer){
score+=q.marks;
}
}
});

let percent=(score/total)*100;
let level=Math.ceil(percent/12.5);
if(level>8) level=8;

alert(`Score ${score}/${total}\nIB Level ${level}`);

saveAttempt(score,level,total);
sendToGoogle(score,level);
}

function saveAttempt(score,level,total){

attempts.push({
name:name.value,
score,
level,
total,
date:new Date().toLocaleString()
});

localStorage.setItem("attempts",JSON.stringify(attempts));
}

/* GOOGLE SHEETS */
function sendToGoogle(score,level){

fetch("YOUR_WEB_APP_URL",{
method:"POST",
body:JSON.stringify({
name:name.value,
score,
level,
date:new Date().toLocaleString()
})
});
}

</script>

</body>
</html>
