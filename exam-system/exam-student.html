<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IB Exam Practice</title>

<style>
body{
  margin:0;
  font-family:'Segoe UI', sans-serif;
  background:linear-gradient(135deg,#0f172a,#1e3a8a);
  color:white;
}

/* HEADER */
.header{
  text-align:center;
  padding:25px;
  font-size:28px;
  color:#38bdf8;
}

/* SELECT */
.select-box{
  text-align:center;
  margin:20px;
}

select, button{
  padding:10px;
  border-radius:8px;
  border:none;
  margin:5px;
}

/* PAPER */
.paper{
  width:90%;
  max-width:900px;
  margin:auto;
  background:#020617;
  padding:25px;
  border-radius:15px;
}

/* MEDIA */
.paper img{
  width:100%;
  max-width:500px;
  margin:15px 0;
  border-radius:10px;
}

.paper iframe{
  width:100%;
  height:300px;
  border-radius:10px;
  margin:15px 0;
}

/* SECTION */
.section{
  margin-top:30px;
}

.section-title{
  color:#38bdf8;
  font-size:22px;
  margin-bottom:10px;
}

/* QUESTION */
.question{
  margin-top:15px;
  padding:15px;
  background:#1e293b;
  border-radius:10px;
}

/* TEXTAREA */
textarea{
  width:100%;
  height:120px;
  border-radius:8px;
  border:none;
  padding:10px;
  margin-top:10px;
}

/* TIMER */
.timer{
  position:fixed;
  top:20px;
  right:20px;
  background:#020617;
  padding:10px;
  border-radius:10px;
}
</style>

</head>

<body>

<div class="header">🎓 IB Exam Practice</div>

<div class="select-box">
<select id="paperSelect"></select>
<button onclick="loadPaper()">Start</button>
</div>

<div id="timer" class="timer">⏱ 0s</div>

<div id="examArea"></div>

<script>

/* LOAD DATA */
let papers = JSON.parse(localStorage.getItem("examPapers")||[]);

const select = document.getElementById("paperSelect");

papers.forEach((p,i)=>{
  select.innerHTML += `<option value="${i}">${p.title}</option>`;
});

/* TIMER */
let startTime, timer;

function startTimer(){
  startTime = new Date();
  timer = setInterval(()=>{
    let t = Math.floor((new Date()-startTime)/1000);
    document.getElementById("timer").innerText = "⏱ "+t+"s";
  },1000);
}

/* COMMAND TERMS */
function highlight(text){
const words=["define","state","describe","explain","calculate","determine","suggest","evaluate"];
words.forEach(w=>{
text = text.replace(new RegExp(w,"gi"), `<span style="color:#f87171">${w.toUpperCase()}</span>`);
});
return text;
}

/* LOAD PAPER */
function loadPaper(){

clearInterval(timer);
startTimer();

const p = papers[select.value];

/* GROUP SECTIONS */
let sec = {A:[],B:[],C:[],D:[]};

p.questions.forEach((q,i)=>{
q.i = i;
sec[q.section||"A"].push(q);
});

let html = `<div class="paper">
<h2>${p.title}</h2>
<p><i>${p.scenario}</i></p>`;

/* CONTENT */
p.content.forEach(c=>{
if(c.includes("youtube")){
html+=`<iframe src="${c}"></iframe>`;
}else{
html+=`<img src="${c}">`;
}
});

/* SECTIONS */
for(let s in sec){

if(sec[s].length===0) continue;

html+=`<div class="section">
<div class="section-title">Section ${s}</div>`;

sec[s].forEach(q=>{

html+=`<div class="question">
<b>Q${q.i+1}</b> (${q.marks})<br>
${highlight(q.text)}
`;

/* MCQ */
if(q.type==="mcq"){
q.options.forEach(o=>{
html+=`<br><label><input type="radio" name="q${q.i}" value="${o}"> ${o}</label>`;
});
}

/* TEXT */
if(q.type==="text"){
html+=`<textarea id="q${q.i}"></textarea>`;
}

html+=`</div>`;
});

html+=`</div>`;
}

html+=`<br><button onclick="submitExam()">Submit</button></div>`;

document.getElementById("examArea").innerHTML = html;
}

/* SUBMIT */
function submitExam(){

clearInterval(timer);

let score=0;

let p = papers[select.value];

p.questions.forEach((q,i)=>{

if(q.type==="mcq"){
let sel=document.querySelector(`input[name="q${i}"]:checked`);
if(sel && sel.value===q.answer){
score += Number(q.marks);
}
}

});

alert("Score: "+score+"\n"+document.getElementById("timer").innerText);
}

</script>

</body>
</html>
