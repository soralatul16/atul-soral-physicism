<!DOCTYPE html>
<html>
<head>
<title>Student Practice</title>
<link rel="stylesheet" href="exam-style.css">
</head>

<body>

<h2>📝 Student Practice</h2>

<select id="topicFilter"></select>
<select id="gcFilter"></select>
<select id="atlFilter"></select>

<button onclick="load()">Apply Filter</button>

<div id="questions"></div>

<script src="exam-storage.js"></script>
<script>

let db = getDB();

/* UNIQUE VALUES */
function fillFilters(){

let topics=[...new Set(db.map(q=>q.topic))];
topics.forEach(t=>topicFilter.innerHTML+=`<option>${t}</option>`);

let gcs=[...new Set(db.map(q=>q.gc))];
gcs.forEach(g=>gcFilter.innerHTML+=`<option>${g}</option>`);

let atls=[...new Set(db.map(q=>q.atl))];
atls.forEach(a=>atlFilter.innerHTML+=`<option>${a}</option>`);

}

fillFilters();

/* LOAD QUESTIONS */
function load(){

let t=topicFilter.value;
let g=gcFilter.value;
let a=atlFilter.value;

let html="";

db.filter(q=>
(!t || q.topic===t) &&
(!g || q.gc===g) &&
(!a || q.atl===a)
).forEach(q=>{

html+=`
<div class="card">
<b>${q.question}</b><br>
GC: ${q.gc} | ATL: ${q.atl}<br>
Marks: ${q.marks}
</div>
`;

});

questions.innerHTML=html;

}

</script>

</body>
</html>
