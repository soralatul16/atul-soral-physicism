<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Exam Player</title>

<style>
body{
  margin:0;
  font-family:'Segoe UI', sans-serif;
  background:linear-gradient(135deg,#0f172a,#1e3a8a);
  color:white;
}

/* HEADER */
.header{
  text-align:center;
  padding:25px;
  font-size:28px;
  color:#38bdf8;
  text-shadow:0 0 10px #38bdf8;
}

/* SELECT */
.select-box{
  text-align:center;
  margin:20px;
}

select, button{
  padding:10px;
  border-radius:8px;
  border:none;
  margin:5px;
}

/* PAPER */
.paper{
  width:90%;
  max-width:900px;
  margin:auto;
  background:#020617;
  padding:25px;
  border-radius:15px;
  box-shadow:0 0 25px rgba(0,0,0,0.5);
}

/* MEDIA */
.paper img{
  width:100%;
  max-width:500px;
  margin:15px 0;
  border-radius:10px;
}

.paper iframe{
  width:100%;
  height:300px;
  border-radius:10px;
  margin:15px 0;
}

/* QUESTION */
.question{
  margin-top:20px;
  padding:15px;
  background:#1e293b;
  border-radius:10px;
}

textarea{
  width:100%;
  height:120px;
  border-radius:8px;
  border:none;
  padding:10px;
  margin-top:10px;
}

/* TIMER */
.timer{
  position:fixed;
  top:20px;
  right:20px;
  background:#020617;
  padding:10px;
  border-radius:10px;
}
</style>

</head>

<body>

<div class="header">🎓 Attempt Exam</div>

<div class="select-box">
<select id="paperSelect"></select>
<button onclick="loadPaper()">Load Paper</button>
</div>

<div id="timer" class="timer">⏱ 0s</div>

<div id="examArea"></div>

<script>

/* ===== LOAD PAPERS ===== */
let papers = JSON.parse(localStorage.getItem("examPapers")||[]);

const select = document.getElementById("paperSelect");

papers.forEach((p,i)=>{
  select.innerHTML += `<option value="${i}">${p.title}</option>`;
});

/* ===== TIMER ===== */
let startTime;
let timerInterval;

function startTimer(){
  startTime = new Date();
  timerInterval = setInterval(()=>{
    const sec = Math.floor((new Date()-startTime)/1000);
    document.getElementById("timer").innerText = `⏱ ${sec}s`;
  },1000);
}

/* ===== LOAD PAPER ===== */
function loadPaper(){

clearInterval(timerInterval);
startTimer();

const p = papers[select.value];

let html = `<div class="paper">
<h2>${p.title}</h2>
<p>${p.scenario}</p>`;

/* CONTENT */
p.content.forEach(c=>{
if(c.includes("youtube")){
html+=`<iframe src="${c}" allowfullscreen></iframe>`;
}else{
html+=`<img src="${c}">`;
}
});

/* QUESTIONS */
p.questions.forEach((q,i)=>{

html+=`<div class="question">
<b>Q${i+1}</b> ${q.text} (${q.marks} marks)`;

/* MCQ */
if(q.type==="mcq"){
q.options.forEach(opt=>{
html+=`
<label>
<input type="radio" name="q${i}" value="${opt}">
${opt}
</label><br>`;
});
}

/* TEXT */
if(q.type==="text"){
html+=`<textarea id="q${i}" placeholder="Write your answer..."></textarea>`;
}

html+=`</div>`;
});

html+=`
<button onclick="submitExam()">Submit</button>
</div>`;

document.getElementById("examArea").innerHTML = html;
}

/* ===== SUBMIT ===== */
function submitExam(){

clearInterval(timerInterval);

let score = 0;

papers[select.value].questions.forEach((q,i)=>{

if(q.type==="mcq"){
const sel = document.querySelector(`input[name="q${i}"]:checked`);
if(sel && sel.value === q.answer){
score += Number(q.marks);
}
}

});

const time = document.getElementById("timer").innerText;

alert(`Score: ${score}\n${time}`);
}

</script>

</body>
</html>
