<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Analytics | Physicism MYP</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
<style>
:root {
  --surface: rgba(18,4,4,0.88);
  --surface2: rgba(38,8,8,0.9);
  --border: rgba(200,60,60,0.3);
  --accent: #e03030;
  --accent2: #c0392b;
  --accent-glow: rgba(224,48,48,0.15);
  --text: #f0e6e6;
  --text2: #b08888;
  --green: #27ae60;
  --red: #e03030;
  --yellow: #d29922;
  --blue: #2980b9;
  --radius: 10px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'DM Sans', sans-serif;
  background: linear-gradient(rgba(0,0,0,0.58), rgba(18,0,0,0.78)),
    url('./assets/myp-background-image.png') no-repeat center center fixed;
  background-size: cover;
  color: var(--text);
  min-height: 100vh;
}

/* TOPBAR */
.topbar {
  height: 56px;
  background: rgba(12,2,2,0.95);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 20px; flex-shrink: 0; z-index: 100;
  backdrop-filter: blur(10px);
}
.topbar-left { display: flex; gap: 6px; align-items: center; }
.topbar-brand {
  font-family: 'Playfair Display', serif;
  font-size: 18px; color: var(--accent); margin-right: 16px;
  text-shadow: 0 0 14px rgba(224,48,48,0.6);
}
.nav-btn {
  background: none; border: 1px solid transparent;
  padding: 6px 14px; border-radius: 6px; color: var(--text2);
  cursor: pointer; font-size: 13px; font-weight: 500; transition: all 0.15s;
  font-family: 'DM Sans', sans-serif;
}
.nav-btn:hover { color: var(--text); background: var(--accent-glow); border-color: var(--border); }
.nav-btn.active { color: var(--accent); border-color: var(--accent); background: var(--accent-glow); }
.icon-btn {
  background: rgba(38,8,8,0.8); border: 1px solid var(--border);
  padding: 6px 13px; border-radius: 6px; color: var(--text);
  cursor: pointer; font-size: 13px; transition: all 0.15s;
  font-family: 'DM Sans', sans-serif;
}
.icon-btn:hover { background: var(--accent-glow); border-color: var(--accent); color: var(--accent); }

/* CONTENT */
.content { max-width: 1100px; margin: 0 auto; padding: 28px 24px 80px; }

.stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 28px; }
.stat-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 12px; padding: 20px; text-align: center;
  backdrop-filter: blur(10px);
}
.stat-num { font-size: 28px; font-weight: 700; color: var(--accent); }
.stat-label { font-size: 11px; color: var(--text2); margin-top: 4px; }

.section-title {
  font-size: 13px; font-weight: 600; margin-bottom: 14px;
  color: var(--text2); letter-spacing: 0.5px; text-transform: uppercase;
}

.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 28px; }

.panel {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 12px; padding: 20px; backdrop-filter: blur(10px);
}

.bar-row { margin-bottom: 14px; }
.bar-label {
  display: flex; justify-content: space-between; font-size: 12px;
  color: var(--text2); margin-bottom: 5px;
}
.bar-track {
  background: var(--surface2); border-radius: 4px; height: 8px; overflow: hidden;
}
.bar-fill {
  height: 100%; border-radius: 4px; transition: width 0.6s ease;
}

.attempt-row {
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 8px; padding: 12px 16px; display: flex;
  justify-content: space-between; align-items: center; margin-bottom: 8px;
}
.attempt-row .title { font-size: 13px; font-weight: 600; }
.attempt-row .meta { font-size: 11px; color: var(--text2); margin-top: 2px; }
.attempt-row .score { font-size: 16px; font-weight: 700; }

.chapter-card {
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 10px; padding: 14px 18px; margin-bottom: 10px;
  display: flex; justify-content: space-between; align-items: center;
}
.chapter-card .name { font-size: 13px; font-weight: 600; }
.chapter-card .count { font-size: 12px; color: var(--text2); }

.empty-msg { color: var(--text2); font-size: 13px; text-align: center; padding: 20px; }

/* SCROLLBAR */
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(224,48,48,0.3); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--accent); }

@media (max-width: 768px) {
  .stats-row { grid-template-columns: repeat(2, 1fr); }
  .grid-2 { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <div class="topbar-left">
    <span class="topbar-brand">MYP·Analytics</span>
    <button class="nav-btn active">📊 Analytics</button>
  </div>
  <div style="display:flex;gap:8px;">
    <button class="icon-btn" onclick="window.location.href='exam-teacher.html'">✏️ Builder</button>
    <button class="icon-btn" onclick="window.location.href='exam-grading.html'">📝 Grade</button>
    <button class="icon-btn" onclick="window.location.href='https://soralatul16.github.io/atul-soral-physicism/index.html'">🏠 Home</button>
  </div>
</div>

<div class="content">

  <!-- TOP STATS -->
  <div class="stats-row">
    <div class="stat-card"><div class="stat-num" id="sTotalSets">0</div><div class="stat-label">Question Sets</div></div>
    <div class="stat-card"><div class="stat-num" id="sTotalQ">0</div><div class="stat-label">Total Questions</div></div>
    <div class="stat-card"><div class="stat-num" id="sTotalAttempts">0</div><div class="stat-label">Student Attempts</div></div>
    <div class="stat-card"><div class="stat-num" id="sAvgScore">—</div><div class="stat-label">Avg Score %</div></div>
  </div>

  <!-- CRITERION + RECENT ATTEMPTS -->
  <div class="grid-2">
    <div class="panel">
      <div class="section-title">Criterion Performance (All Students)</div>
      <div id="critBars"></div>
    </div>
    <div class="panel">
      <div class="section-title">Recent Submissions</div>
      <div id="recentAttempts"></div>
    </div>
  </div>

  <!-- TOPIC + CHAPTER -->
  <div class="grid-2">
    <div class="panel">
      <div class="section-title">Topic Breakdown</div>
      <div id="topicBars"></div>
    </div>
    <div class="panel">
      <div class="section-title">Questions by Chapter</div>
      <div id="chapterList"></div>
    </div>
  </div>

  <!-- QUESTION TYPE DISTRIBUTION -->
  <div class="panel" style="margin-bottom:28px;">
    <div class="section-title">Question Type Distribution</div>
    <div id="typeBars"></div>
  </div>

</div>

<script src="exam-storage.js"></script>
<script>
/* ═══════════════════════════════════════════════════
   ANALYTICS — Reads from MYP_LIBRARY & PHYS_ATTEMPTS
═══════════════════════════════════════════════════ */

window.addEventListener("DOMContentLoaded", () => {
  const library = getLibrary();
  const attempts = getAttempts();
  const completed = attempts.filter(a => a.status === "completed");

  // All question blocks across all sets
  const allQBlocks = [];
  library.forEach(set => {
    (set.blocks || []).filter(b => b.saved && b.mode === "question").forEach(b => {
      allQBlocks.push({ ...b, chapter: set.chapter, topic: set.topic });
    });
  });

  /* ── Top stats ── */
  document.getElementById("sTotalSets").textContent = library.length;
  document.getElementById("sTotalQ").textContent = allQBlocks.length;
  document.getElementById("sTotalAttempts").textContent = completed.length;
  const avgScore = completed.length
    ? Math.round(completed.reduce((s, a) => s + (a.percentScore || 0), 0) / completed.length)
    : null;
  document.getElementById("sAvgScore").textContent = avgScore !== null ? avgScore + "%" : "—";

  /* ── Criterion bars ── */
  const cm = { A: [], B: [], C: [], D: [] };
  completed.forEach(a => {
    const set = library.find(s => s.id === a.setId);
    if (!set) return;
    const qBlocks = (set.blocks || []).filter(b => b.saved && b.mode === "question");
    qBlocks.forEach((q, i) => {
      const k = (q.meta?.criterion || "").charAt(0);
      const marks = Number(q.meta?.marks || 0);
      let scored = 0;
      if (a.grades && a.grades[i] !== undefined) {
        scored = Number(a.grades[i]);
      } else {
        if (q.type === "True / False" && q.ui?.tfAnswer && a.answers?.[i] === q.ui.tfAnswer) scored = marks;
        else if (q.type === "MCQ" && q.data?.correct !== null && q.data?.correct !== undefined && a.answers?.[i] === q.data.correct) scored = marks;
      }
      if (cm[k]) cm[k].push({ scored, total: marks });
    });
  });

  const critNames = { A: "Knowing & Understanding", B: "Inquiring & Designing", C: "Processing & Evaluating", D: "Reflecting on Impacts" };
  const critColors = { A: "var(--accent)", B: "var(--blue)", C: "var(--green)", D: "var(--yellow)" };
  document.getElementById("critBars").innerHTML = Object.entries(cm).map(([c, arr]) => {
    const scored = arr.reduce((s, x) => s + x.scored, 0);
    const total = arr.reduce((s, x) => s + x.total, 0);
    const pct = total > 0 ? Math.round(scored / total * 100) : 0;
    return `<div class="bar-row">
      <div class="bar-label"><span>Criterion ${c} — ${critNames[c]}</span><span>${total > 0 ? pct + "%" : "—"}</span></div>
      <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${critColors[c]};"></div></div>
    </div>`;
  }).join("") || '<div class="empty-msg">No data yet.</div>';

  /* ── Recent attempts ── */
  const recent = completed.sort((a, b) => (b.endTime || b.startTime) - (a.endTime || a.startTime)).slice(0, 8);
  document.getElementById("recentAttempts").innerHTML = recent.length ? recent.map(a => {
    const scoreColor = (a.percentScore || 0) >= 70 ? "var(--green)" : (a.percentScore || 0) >= 40 ? "var(--yellow)" : "var(--red)";
    const graded = a.gradingStatus === 'graded' ? ' · ✓ Graded' : '';
    return `<div class="attempt-row">
      <div>
        <div class="title">${a.studentName || "Unknown"}</div>
        <div class="meta">${a.setTitle || "Untitled"} · ${new Date(a.endTime || a.startTime).toLocaleDateString('en-IN', { day: 'numeric', month: 'short' })}${graded}</div>
      </div>
      <div class="score" style="color:${scoreColor};">${a.percentScore || 0}%</div>
    </div>`;
  }).join("") : '<div class="empty-msg">No completed attempts yet.</div>';

  /* ── Topic bars ── */
  const topicMap = {};
  allQBlocks.forEach(q => {
    const t = q.topic || "Unknown";
    if (!topicMap[t]) topicMap[t] = 0;
    topicMap[t]++;
  });
  const maxTopic = Math.max(...Object.values(topicMap), 1);
  document.getElementById("topicBars").innerHTML = Object.entries(topicMap).map(([t, count]) => {
    const pct = Math.round(count / maxTopic * 100);
    return `<div class="bar-row">
      <div class="bar-label"><span>${t}</span><span>${count} question${count !== 1 ? 's' : ''}</span></div>
      <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:var(--accent);"></div></div>
    </div>`;
  }).join("") || '<div class="empty-msg">No questions yet.</div>';

  /* ── Chapter list ── */
  const chapterMap = {};
  allQBlocks.forEach(q => {
    const c = q.chapter || "Unknown";
    if (!chapterMap[c]) chapterMap[c] = 0;
    chapterMap[c]++;
  });
  document.getElementById("chapterList").innerHTML = Object.entries(chapterMap).map(([c, count]) =>
    `<div class="chapter-card"><div class="name">${c}</div><div class="count">${count} Q</div></div>`
  ).join("") || '<div class="empty-msg">No questions yet.</div>';

  /* ── Question type distribution ── */
  const typeMap = {};
  allQBlocks.forEach(q => {
    const t = q.type || "Other";
    if (!typeMap[t]) typeMap[t] = 0;
    typeMap[t]++;
  });
  const maxType = Math.max(...Object.values(typeMap), 1);
  document.getElementById("typeBars").innerHTML = Object.entries(typeMap).map(([t, count]) => {
    const pct = Math.round(count / maxType * 100);
    return `<div class="bar-row">
      <div class="bar-label"><span>${t}</span><span>${count}</span></div>
      <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:var(--blue);"></div></div>
    </div>`;
  }).join("") || '<div class="empty-msg">No questions yet.</div>';
});
</script>



</body>
</html>
