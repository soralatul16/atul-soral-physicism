<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>IB Exam Builder</title>

<!-- Desmos -->
<script src="https://www.desmos.com/api/v1.6/calculator.js?apiKey=desmos"></script>

<!-- Sortable (Drag & Drop) -->
<script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>

<!-- jsPDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{
  margin:0;
  font-family:'Segoe UI';

  background:
    linear-gradient(rgba(0,0,0,0.7), rgba(20,0,0,0.8)),
    url('./exam-system/assets/myp-background-image.png');

  background-size:cover;
  color:white;
}

.container{ padding:20px; }

.block{
  background:rgba(255,255,255,0.08);
  padding:15px;
  margin:10px 0;
  border-radius:10px;
  cursor:grab;
}

input,select,textarea,button{
  width:100%;
  margin:5px 0;
  padding:8px;
  border-radius:6px;
  border:none;
}

button{ background:#ff4d4d; color:white; }

#studentView{ display:none; }

.graph{
  height:300px;
  background:white;
}
</style>
</head>

<body>

<div class="container">

<h2>📘 IB Teacher Panel</h2>

<input id="title" placeholder="Set Title">

<select id="chapter">
<option>Exploring Matter</option>
<option>Forces and Motion</option>
<option>Work, Power & Gravity</option>
<option>Energy & Environment</option>
<option>The Nature of Waves</option>
<option>Atomic Physics</option>
<option>Electromagnetism</option>
<option>Thermal Physics</option>
<option>Astrophysics</option>
</select>

<select id="gc">
<option>Identities and Relationships</option>
<option>Orientation in Space and Time</option>
<option>Personal and Cultural Expression</option>
<option>Scientific and Technical Innovation</option>
<option>Globalization and Sustainability</option>
<option>Fairness and Development</option>
</select>

<div id="builder"></div>

<button onclick="addBlock()">+ Add Block</button>
<button onclick="saveSet()">Save</button>
<button onclick="previewStudent()">👁 Student View</button>
<button onclick="exportPDF()">📄 Export PDF</button>

<hr>

<h2>📱 Student Exam Interface</h2>
<div id="studentView"></div>

</div>

<script>

/* ================= DATA ================= */
let blocks = [];
let DB = [];

/* ================= ADD BLOCK ================= */
function addBlock(){
  blocks.push({type:"question", data:{}});
  render();
}

/* ================= RENDER ================= */
function render(){
  let html="";

  blocks.forEach((b,i)=>{
    html+=`
    <div class="block">
      <b>Question ${i+1}</b>

      <textarea id="q-${i}" placeholder="Question"></textarea>

      ${metaHTML(i)}

      ${toolsHTML(i)}

      ${typeHTML(i)}

      <button onclick="generateAI(${i})">🧠 Generate Markscheme</button>
      <textarea id="ms-${i}" placeholder="Markscheme"></textarea>

      <div id="graph-${i}" class="graph"></div>
      <button onclick="initGraph(${i})">📊 Add Graph</button>
    </div>
    `;
  });

  document.getElementById("builder").innerHTML = html;

  /* Drag reorder */
  new Sortable(builder,{
    animation:150,
    onEnd:(evt)=>{
      let moved = blocks.splice(evt.oldIndex,1)[0];
      blocks.splice(evt.newIndex,0,moved);
      render();
    }
  });
}

/* ================= META ================= */
function metaHTML(i){
  return `
  <select id="diff-${i}">
    <option>Easy</option>
    <option>Medium</option>
    <option>Hard</option>
  </select>

  <input id="marks-${i}" placeholder="Marks">

  <select id="criterion-${i}">
    <option>A.i</option><option>A.ii</option><option>B.i</option>
  </select>

  <input id="cmd-${i}" placeholder="Command Term">
  `;
}

/* ================= TOOLS ================= */
function toolsHTML(i){
  return `
  <input id="img-${i}" placeholder="Image URL">
  <input id="latex-${i}" placeholder="LaTeX">
  <textarea id="hint-${i}" placeholder="Hint"></textarea>
  `;
}

/* ================= TYPES ================= */
function typeHTML(i){
  return `
  <select id="type-${i}">
    <option>Long Answer</option>
    <option>MCQ</option>
  </select>
  `;
}

/* ================= AI MARKSCHEME ================= */
function generateAI(i){
  let q = document.getElementById(`q-${i}`).value;

  let ms = "Auto-generated:\n";

  if(q.includes("explain")) ms += "- Clear explanation\n- Logical steps\n";
  if(q.includes("calculate")) ms += "- Correct formula\n- Correct answer\n";

  document.getElementById(`ms-${i}`).value = ms;
}

/* ================= GRAPH ================= */
function initGraph(i){
  let elt = document.getElementById(`graph-${i}`);
  let calc = Desmos.GraphingCalculator(elt);
  calc.setExpression({id:'1', latex:'y=x^2'});
}

/* ================= SAVE ================= */
function saveSet(){
  let set = [];

  blocks.forEach((b,i)=>{
    set.push({
      question: val(`q-${i}`),
      marks: val(`marks-${i}`),
      type: val(`type-${i}`),
      ms: val(`ms-${i}`)
    });
  });

  DB = set;
  alert("Saved");
}

/* ================= STUDENT VIEW ================= */
function previewStudent(){
  let html="";

  DB.forEach((q,i)=>{
    html+=`
    <div class="block">
      <b>Q${i+1}</b>
      <p>${q.question}</p>

      ${q.type==="MCQ" ? `
        <input placeholder="Your answer">
      ` : `
        <textarea placeholder="Write answer"></textarea>
      `}
    </div>
    `;
  });

  document.getElementById("studentView").style.display="block";
  document.getElementById("studentView").innerHTML = html;
}

/* ================= PDF ================= */
async function exportPDF(){
  const { jsPDF } = window.jspdf;
  let doc = new jsPDF();

  let y=10;

  DB.forEach((q,i)=>{
    doc.text(`Q${i+1}: ${q.question}`,10,y);
    y+=10;
  });

  doc.save("exam.pdf");
}

/* ================= UTILS ================= */
function val(id){
  return document.getElementById(id)?.value || "";
}

/* INIT */
addBlock();

</script>

</body>
</html>
