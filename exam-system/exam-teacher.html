<script>

/* ================= NAV ================= */
function goHome(){ location.href="../index.html"; }
function goBack(){ history.back(); }

/* ================= DATA ================= */
let blocks = [];
let DB = JSON.parse(localStorage.getItem("questionBank")||"[]");

/* ================= HELPERS ================= */
const COMMAND_TERMS = ["Define","Describe","Explain","Compare","Evaluate","Justify","Calculate","Analyse"];
const CRITERIA = ["A.i","A.ii","A.iii","B.i","B.ii","C.i","C.ii","D.i","D.ii"];

/* ================= ADD BLOCK ================= */
function addBlock(){
  blocks.push({ type:null, data:{}, meta:{} });
  render();
}

/* ================= RENDER ================= */
function render(){
  let html="";
  let structure="";

  blocks.forEach((b,i)=>{
    html+=`
    <div class="block">
      <div>
        <button onclick="setType(${i},'content')">Content</button>
        <button onclick="setType(${i},'question')">Question</button>
        <button class="secondary" onclick="deleteBlock(${i})">Delete</button>
      </div>

      <div id="block-${i}" style="margin-top:10px"></div>
    </div>
    `;

    if(b.type==="content") structure += `[Content] `;
    if(b.type==="question") structure += `[Q:${b.data?.qtype||''}] `;
  });

  document.getElementById("builder").innerHTML = html;
  document.getElementById("structure").innerHTML = "<b>Structure:</b> "+structure;
}

/* ================= TYPE SELECT ================= */
function setType(i,type){
  blocks[i].type = type;

  if(type==="content"){
    document.getElementById(`block-${i}`).innerHTML = renderContentEditor(i);
  }

  if(type==="question"){
    document.getElementById(`block-${i}`).innerHTML = renderQuestionShell(i);
  }
}

/* ================= CONTENT EDITOR ================= */
function renderContentEditor(i){
  return `
    <textarea id="ctext-${i}" placeholder="Rich text / scenario"></textarea>

    <input id="cimg-${i}" placeholder="Image URL (optional)">
    <input id="clatex-${i}" placeholder="LaTeX (optional)">
    
    <textarea id="ctable-${i}" placeholder="Table (CSV or simple rows, optional)"></textarea>

    <input id="chint-${i}" placeholder="Hint (optional)">

    <button onclick="saveContent(${i})">Save</button>
  `;
}

function saveContent(i){
  blocks[i].data = {
    text: val(`ctext-${i}`),
    image: val(`cimg-${i}`),
    latex: val(`clatex-${i}`),
    table: val(`ctable-${i}`),
    hint: val(`chint-${i}`)
  };
  alert("Content saved");
}

/* ================= QUESTION SHELL ================= */
function renderQuestionShell(i){
  return `
    <select id="qtype-${i}" onchange="loadQFields(${i})">
      <option value="">Select Type</option>
      <option>Long Answer</option>
      <option>MCQ</option>
      <option>Multi MCQ</option>
      <option>True/False</option>
      <option>Fill Text</option>
      <option>Match</option>
      <option>Sort</option>
      <option>Classify</option>
      <option>Table</option>
      <option>Graph</option>
    </select>

    <div id="meta-${i}"></div>
    <div id="qfields-${i}"></div>

    <button onclick="saveQuestion(${i})">Save Question</button>
  `;
}

/* ================= META (COMMON BACKBONE) ================= */
function renderMeta(i){
  return `
    <h4>Metadata</h4>

    <select id="diff-${i}">
      <option>Easy</option><option>Medium</option><option>Hard</option>
    </select>

    <input id="marks-${i}" placeholder="Marks">
    <input id="time-${i}" placeholder="Suggested time (min)">

    <select id="criterion-${i}">
      ${CRITERIA.map(c=>`<option>${c}</option>`).join("")}
    </select>

    <select id="cmd-${i}">
      ${COMMAND_TERMS.map(c=>`<option>${c}</option>`).join("")}
    </select>

    <input id="keywords-${i}" placeholder="Keywords (comma)">
    <textarea id="notes-${i}" placeholder="Internal notes (teacher only)"></textarea>
  `;
}

/* ================= LOAD FIELDS ================= */
function loadQFields(i){
  let type = val(`qtype-${i}`);
  document.getElementById(`meta-${i}`).innerHTML = renderMeta(i);

  let html = `
    <textarea id="q-${i}" placeholder="Question text"></textarea>
  `;

  if(type==="Long Answer"){
    html += `
      <input id="word-${i}" placeholder="Word limit (optional)">
      <select id="structure-${i}">
        <option>Paragraph</option>
        <option>Bullet</option>
        <option>Steps</option>
      </select>

      <textarea id="rubric-${i}" placeholder="Rubric"></textarea>
      <textarea id="expected-${i}" placeholder="Expected points checklist"></textarea>
      <textarea id="model-${i}" placeholder="Model answer"></textarea>
    `;
  }

  if(type==="MCQ"){
    html += `
      <input id="a-${i}" placeholder="Option A">
      <input id="b-${i}" placeholder="Option B">
      <input id="c-${i}" placeholder="Option C">
      <input id="d-${i}" placeholder="Option D">
      <input id="ans-${i}" placeholder="Correct answer">

      <label><input type="checkbox" id="rand-${i}"> Randomize</label>
      <label><input type="checkbox" id="neg-${i}"> Negative marking</label>
    `;
  }

  if(type==="Multi MCQ"){
    html += `
      <input id="opts-${i}" placeholder="Options (comma separated)">
      <input id="ansm-${i}" placeholder="Correct (comma)">
      <label><input type="checkbox" id="partial-${i}"> Partial marking</label>
    `;
  }

  if(type==="True/False"){
    html += `
      <select id="tf-${i}">
        <option>True</option><option>False</option>
      </select>
      <input id="exp-${i}" placeholder="Explanation">
      <label><input type="checkbox" id="justify-${i}"> Require justification</label>
    `;
  }

  if(type==="Fill Text"){
    html += `
      <input id="blank-${i}" placeholder="Correct answers (comma)">
      <label><input type="checkbox" id="case-${i}"> Case sensitive</label>
    `;
  }

  // placeholders for future types
  if(["Match","Sort","Classify","Table","Graph"].includes(type)){
    html += `<p>Advanced builder coming next phase</p>`;
  }

  html += `<textarea id="ms-${i}" placeholder="Markscheme"></textarea>`;

  document.getElementById(`qfields-${i}`).innerHTML = html;
}

/* ================= SAVE QUESTION ================= */
function saveQuestion(i){
  let type = val(`qtype-${i}`);

  blocks[i].data = {
    qtype: type,
    question: val(`q-${i}`),
    meta: {
      difficulty: val(`diff-${i}`),
      marks: val(`marks-${i}`),
      time: val(`time-${i}`),
      criterion: val(`criterion-${i}`),
      command: val(`cmd-${i}`),
      keywords: val(`keywords-${i}`),
      notes: val(`notes-${i}`)
    },
    extra: collectExtras(i,type),
    markscheme: val(`ms-${i}`)
  };

  alert("Question saved");
}

/* ================= COLLECT EXTRA ================= */
function collectExtras(i,type){
  if(type==="Long Answer"){
    return {
      word: val(`word-${i}`),
      structure: val(`structure-${i}`),
      rubric: val(`rubric-${i}`),
      expected: val(`expected-${i}`),
      model: val(`model-${i}`)
    };
  }

  if(type==="MCQ"){
    return {
      options: [val(`a-${i}`),val(`b-${i}`),val(`c-${i}`),val(`d-${i}`)],
      answer: val(`ans-${i}`),
      randomize: chk(`rand-${i}`),
      negative: chk(`neg-${i}`)
    };
  }

  if(type==="Multi MCQ"){
    return {
      options: val(`opts-${i}`),
      answers: val(`ansm-${i}`),
      partial: chk(`partial-${i}`)
    };
  }

  if(type==="True/False"){
    return {
      answer: val(`tf-${i}`),
      explanation: val(`exp-${i}`),
      justify: chk(`justify-${i}`)
    };
  }

  if(type==="Fill Text"){
    return {
      answers: val(`blank-${i}`),
      case: chk(`case-${i}`)
    };
  }

  return {};
}

/* ================= SAVE SET ================= */
function saveSet(){
  let set = {
    title: document.getElementById("title").value,
    topic: document.getElementById("topic").value,
    criterion: document.getElementById("criterion").value,
    blocks: blocks
  };

  DB.push(set);
  localStorage.setItem("questionBank", JSON.stringify(DB));

  alert("Set saved!");
}

/* ================= UTILS ================= */
function val(id){ return document.getElementById(id)?.value || ""; }
function chk(id){ return document.getElementById(id)?.checked || false; }

/* INIT */
addBlock();

</script>
