<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>MYP Teacher Panel</title>

<script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>

<style>

/* ===== GLOBAL ===== */
body{
  margin:0;
  font-family: Inter, sans-serif;
  background:#f6f8fb;
}

/* ===== TOP NAV ===== */
.topbar{
  height:60px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 20px;
  background:white;
  border-bottom:1px solid #eee;
}

.nav-left{
  display:flex;
  gap:15px;
}

.nav-btn{
  background:none;
  border:none;
  font-weight:500;
  cursor:pointer;
  color:#444;
}

.nav-btn.active{
  color:#2563eb;
}

/* ===== LAYOUT ===== */
.layout{
  display:flex;
  height:calc(100vh - 60px);
}

/* ===== SIDEBAR ===== */
.sidebar{
  width:250px;
  background:white;
  border-right:1px solid #eee;
  padding:20px;
}

.section{
  padding:10px;
  border-radius:8px;
  margin-bottom:10px;
  cursor:pointer;
}

.section:hover{
  background:#f1f5ff;
}

/* ===== MAIN ===== */
.main{
  flex:1;
  padding:20px;
  overflow:auto;
}

/* ===== BUILDER HEADER ===== */
.builder-header{
  display:flex;
  justify-content:space-between;
  margin-bottom:20px;
}

/* ===== BLOCK ===== */
.block{
  background:white;
  border-radius:14px;
  padding:20px;
  margin-bottom:20px;
  box-shadow:0 5px 15px rgba(0,0,0,0.05);
}

/* ===== MODE TABS ===== */
.mode-tabs{
  display:flex;
  gap:10px;
  margin-bottom:15px;
}

.tab{
  padding:6px 14px;
  border-radius:20px;
  background:#eee;
  cursor:pointer;
}

.tab.active{
  background:#2563eb;
  color:white;
}

/* ===== GRID ===== */
.grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:15px;
}

/* ===== CARD ===== */
.card{
  padding:20px;
  border-radius:12px;
  background:#f9fafc;
  text-align:center;
  cursor:pointer;
  transition:0.2s;
}

.card:hover{
  transform:translateY(-3px);
  background:#eef3ff;
}

/* ===== BUTTON ===== */
.primary-btn{
  padding:10px 16px;
  background:#2563eb;
  color:white;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

</style>
</head>

<body>

<!-- TOP BAR -->
<div class="topbar">
  <div class="nav-left">
    <button class="nav-btn active">Create</button>
    <button class="nav-btn">Deliver</button>
    <button class="nav-btn">Monitor</button>
    <button class="nav-btn">Grade</button>
  </div>

  <div>
    <button class="nav-btn" onclick="goHome()">Home</button>
  </div>
</div>

<div class="layout">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <h3>Sections</h3>
    <div class="section">Section 1</div>
    <button class="primary-btn" onclick="addBlock()">+ Add Section</button>
  </div>

  <!-- MAIN -->
  <div class="main">

    <div class="builder-header">
      <h2>Builder</h2>
      <button class="primary-btn" onclick="addBlock()">+ Add Block</button>
    </div>

    <div id="builder"></div>

  </div>

</div>

<script src="exam-builder.js"></script>

<script>
function goHome(){
  window.location.href="exam-home.html";
}
</script>

</body>
</html>
