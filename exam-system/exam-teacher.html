<!DOCTYPE html>
<html>
<head>
<title>Teacher Builder</title>
<link rel="stylesheet" href="exam-style.css">
</head>

<body>

<div class="header glow">👨‍🏫 Create IB Exam</div>

<div class="card">

<input id="paperTitle" placeholder="Paper Title">
<textarea id="scenario" placeholder="Scenario / Context"></textarea>

<h3>Add Content</h3>

<input type="file" id="fileInput">
<input id="urlInput" placeholder="Or paste image/video/PDF URL">

<button onclick="addContent()">Add Content</button>

<div id="contentArea"></div>

<h3>Add Question</h3>

<select id="qType">
<option value="mcq">MCQ</option>
<option value="text">Long Answer</option>
</select>

<textarea id="qText" placeholder="Question"></textarea>
<input id="marks" placeholder="Marks">

<button onclick="addQuestion()">Add Question</button>

<div id="questionArea"></div>

<button onclick="savePaper()">💾 Save Paper</button>

</div>

<script src="exam-storage.js"></script>
<script src="exam-builder.js"></script>

</body>
</html>
