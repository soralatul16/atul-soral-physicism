<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Exam Builder Pro</title>
<style>
body{
  margin:0;
  font-family:'Segoe UI', sans-serif;
  background:
    linear-gradient(rgba(0,0,0,0.65), rgba(20,0,0,0.8)),
    url('./exam-system/assets/myp-background-image.png') no-repeat center center;
  background-size: cover;
  background-attachment: fixed;
  color:white;
}
header{padding:15px;font-size:20px;background:#111}
.container{padding:20px}
.block{background:#1c1c1c;margin:10px 0;padding:15px;border-radius:10px}
button{margin:5px;padding:6px 10px}
textarea,input,select{width:100%;margin:5px 0;padding:6px}
.flex{display:flex;gap:10px;flex-wrap:wrap}
#structure{background:#111;padding:10px;margin-top:10px}
</style>
</head>
<body>
<header>Exam Builder Pro</header>
<div class="container">

<h3>Set Info</h3>
<input id="title" placeholder="Title">
<input id="topic" placeholder="Topic">

<div class="flex">
<button onclick="addBlock()">+ Block</button>
<button onclick="createGroup('case')">+ Case</button>
<button onclick="createGroup('passage')">+ Passage</button>
<button onclick="createGroup('experiment')">+ Experiment</button>
<button onclick="preview()">Preview</button>
<button onclick="saveSet()">Save</button>
<button onclick="exportJSON()">Export</button>
<input type="file" onchange="importJSON(event)">
</div>

<input id="search" placeholder="Search">
<button onclick="searchQuestions()">Search</button>

<div id="builder"></div>
<div id="structure"></div>

</div>

<script>
let blocks = JSON.parse(localStorage.getItem("draftBlocks")||"[]");
let DB = JSON.parse(localStorage.getItem("questionBank")||"[]");
let groups = [];

function addBlock(){
  blocks.push({
    id: Date.now(),
    type:null,
    data:{},
    versions:[],
    adaptive:{},
    analytics:{views:0}
  });
  render();
}

function render(){
  let html="";
  blocks.forEach((b,i)=>{
    html+=`<div class='block'>
    <button onclick="setType(${i},'content')">Content</button>
    <button onclick="setType(${i},'question')">Question</button>
    <button onclick="deleteBlock(${i})">Delete</button>
    <div id='block-${i}'></div>
    </div>`;
  });
  document.getElementById("builder").innerHTML = html;
  renderStructure();
}

function setType(i,type){
  blocks[i].type = type;

  if(type==='content'){
    document.getElementById(`block-${i}`).innerHTML = `
      <textarea id='ct-${i}' placeholder='Content'></textarea>
      <input id='img-${i}' placeholder='Image URL'>
      <button onclick='saveContent(${i})'>Save</button>`;
  }

  if(type==='question'){
    document.getElementById(`block-${i}`).innerHTML = `
      <select id='qt-${i}' onchange='loadQ(${i})'>
        <option>MCQ</option>
        <option>Long</option>
        <option>Experiment</option>
      </select>
      <div id='qf-${i}'></div>`;
  }
}

function saveContent(i){
  blocks[i].data={
    text:val(`ct-${i}`),
    image:val(`img-${i}`)
  };
}

function loadQ(i){
  let t = val(`qt-${i}`);
  let html = `<textarea id='q-${i}' placeholder='Question'></textarea>`;

  if(t==='MCQ'){
    html+=`<input id='a-${i}' placeholder='A'>
    <input id='b-${i}' placeholder='B'>
    <input id='c-${i}' placeholder='C'>
    <input id='d-${i}' placeholder='D'>
    <input id='ans-${i}' placeholder='Answer'>`;
  }

  if(t==='Experiment'){
    html+=`
    <input id='ind-${i}' placeholder='Independent'>
    <input id='dep-${i}' placeholder='Dependent'>
    <input id='ctrl-${i}' placeholder='Controlled'>
    <textarea id='table-${i}' placeholder='Col1,Col2'></textarea>
    <button onclick='genTable(${i})'>Generate Table</button>
    <div id='tp-${i}'></div>`;
  }

  html+=`<button onclick='saveQ(${i})'>Save</button>`;
  document.getElementById(`qf-${i}`).innerHTML = html;
}

function genTable(i){
  let cols = val(`table-${i}`).split(',');
  let h='<table border=1><tr>';
  cols.forEach(c=>h+=`<th>${c}</th>`);
  h+='</tr>';
  for(let r=0;r<4;r++){
    h+='<tr>';
    cols.forEach(()=>h+='<td></td>');
    h+='</tr>';
  }
  h+='</table>';
  document.getElementById(`tp-${i}`).innerHTML=h;
}

function saveQ(i){
  let snap = JSON.parse(JSON.stringify(blocks[i].data));
  blocks[i].versions.push({time:Date.now(),data:snap});

  blocks[i].data={
    q:val(`q-${i}`),
    type:val(`qt-${i}`)
  };
}

function createGroup(type){
  groups.push({id:Date.now(),type,blocks:[]});
}

function preview(){
  let w = window.open();
  let h='';
  blocks.forEach(b=>{
    if(b.type==='content') h+=`<p>${b.data.text}</p>`;
    if(b.type==='question') h+=`<p><b>${b.data.q}</b></p>`;
  });
  w.document.body.innerHTML=h;
}

function saveSet(){
  DB.push({title:val('title'),topic:val('topic'),blocks});
  localStorage.setItem('questionBank',JSON.stringify(DB));
}

function exportJSON(){
  let blob=new Blob([JSON.stringify(DB)],{type:'application/json'});
  let a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='data.json';
  a.click();
}

function importJSON(e){
  let f=e.target.files[0];
  let r=new FileReader();
  r.onload=()=>{
    DB=JSON.parse(r.result);
    localStorage.setItem('questionBank',JSON.stringify(DB));
  };
  r.readAsText(f);
}

function searchQuestions(){
  let k=val('search').toLowerCase();
  console.log(DB.filter(x=>JSON.stringify(x).toLowerCase().includes(k)));
}

function renderStructure(){
  let h='<h3>Structure</h3>';
  blocks.forEach(b=>{
    if(b.type==='content') h+='📘 Content<br>';
    if(b.type==='question') h+='❓ Question<br>';
  });
  document.getElementById('structure').innerHTML=h;
}

function val(id){return document.getElementById(id)?.value||''}

setInterval(()=>{
  localStorage.setItem('draftBlocks',JSON.stringify(blocks));
},2000);

render();
</script>
</body>
</html>
