<!DOCTYPE html>
<html>
<head>
<title>Teacher Panel</title>
<link rel="stylesheet" href="exam-style.css">
</head>

<body>

<h2>👨‍🏫 Teacher Panel</h2>

<div class="card">

<select id="topic">
<option>Exploring Matter</option>
<option>Forces and Motion</option>
<option>Work, Power & Gravity</option>
<option>Energy & Environment</option>
<option>The Nature of Waves</option>
<option>Atomic Physics</option>
<option>Electromagnetism</option>
<option>Thermal Physics</option>
<option>Astrophysics</option>
</select>

<select id="gc">
<option>Identities and Relationships</option>
<option>Orientation in Space and Time</option>
<option>Personal and Cultural Expression</option>
<option>Scientific and Technical Innovation</option>
<option>Globalization and Sustainability</option>
<option>Fairness and Development</option>
</select>

<select id="atl">
<option>Thinking</option>
<option>Communication</option>
<option>Research</option>
<option>Self Management</option>
</select>

<textarea id="question" placeholder="Enter Question"></textarea>
<input id="answer" placeholder="Answer">
<input id="marks" placeholder="Marks">

<button onclick="saveQ()">Save Question</button>

</div>

<script src="exam-storage.js"></script>
<script>

function saveQ(){

addQuestion({
topic:topic.value,
gc:gc.value,
atl:atl.value,
question:question.value,
answer:answer.value,
marks:marks.value
});

alert("Saved!");
}

</script>

</body>
</html>
