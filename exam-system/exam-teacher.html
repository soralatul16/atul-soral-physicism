<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Teacher Builder - Advanced</title>

<style>

/* ===== BASE ===== */
body{
  margin:0;
  font-family:'Segoe UI', sans-serif;

  background:
    linear-gradient(rgba(0,0,0,0.6), rgba(20,0,0,0.75)),
    url('./exam-system/assets/myp-background-image.png');

  background-size: cover;
  background-position: center;
  background-attachment: fixed;

  color:white;
}  
  
/* TOP */
.top{
  display:flex;
  justify-content:space-between;
  padding:15px;
  background:#111;
}

/* MAIN */
.container{
  padding:20px;
}

/* BUILDER */
.builder{
  background:#111827;
  padding:20px;
  border-radius:10px;
}

/* BLOCK */
.block{
  border:1px solid #333;
  padding:15px;
  margin:10px 0;
}

/* INPUT */
input, select, textarea{
  width:100%;
  margin:6px 0;
  padding:8px;
  border-radius:6px;
  border:none;
}

/* BUTTON */
button{
  background:#ef4444;
  border:none;
  padding:8px 12px;
  color:white;
  border-radius:6px;
  cursor:pointer;
  margin:5px;
}

.secondary{
  background:#374151;
}

/* STRUCTURE VIEW */
.structure{
  background:#020617;
  padding:10px;
  margin-top:20px;
}

</style>
</head>

<body>

<div class="top">
<div>
<button onclick="goHome()">Home</button>
<button onclick="goBack()">Back</button>
</div>
</div>

<div class="container">

<h2>Create Question Set</h2>

<!-- META -->
<input id="title" placeholder="Set Title">

<select id="chapter">
<option>Forces and Motion</option>
<option>Atomic Physics</option>
</select>

<select id="topic">
<option>Kinematics</option>
<option>Dynamics</option>
</select>

<select id="criterion">
<option>A</option>
<option>B</option>
<option>C</option>
<option>D</option>
</select>

<select id="difficulty">
<option>Easy</option>
<option>Medium</option>
<option>Hard</option>
</select>

<!-- BUILDER -->
<div class="builder" id="builder"></div>

<button onclick="addBlock()">➕ Add Block</button>
<button onclick="saveSet()">💾 Save Set</button>

<!-- STRUCTURE VIEW -->
<div class="structure" id="structure"></div>

</div>

<script>

/* NAV */
function goHome(){ location.href="../index.html"; }
function goBack(){ history.back(); }

/* DATA */
let blocks = [];
let DB = JSON.parse(localStorage.getItem("questionBank")||"[]");

/* ADD BLOCK */
function addBlock(){
blocks.push({type:null,data:{}});
render();
}

/* RENDER */
function render(){

let html="";
let structure="";

blocks.forEach((b,i)=>{

html+=`
<div class="block">

<button onclick="setType(${i},'content')">Content</button>
<button onclick="setType(${i},'question')">Question</button>

<div id="block-${i}"></div>

<button class="secondary" onclick="deleteBlock(${i})">Delete</button>

</div>
`;

if(b.type==="content") structure+=`[Content] `;
if(b.type==="question") structure+=`[Q] `;

});

document.getElementById("builder").innerHTML=html;
document.getElementById("structure").innerHTML=structure;

}

/* TYPE SELECT */
function setType(i,type){

blocks[i].type=type;

if(type==="content"){
document.getElementById(`block-${i}`).innerHTML=`
<textarea placeholder="Add text / insert link"></textarea>
<button onclick="saveContent(${i})">Save</button>
`;
}

if(type==="question"){
document.getElementById(`block-${i}`).innerHTML=`
<select id="qtype-${i}">
<option>Long Answer</option>
<option>MCQ</option>
<option>Multi MCQ</option>
<option>True/False</option>
</select>

<textarea id="q-${i}" placeholder="Question"></textarea>
<input id="marks-${i}" placeholder="Marks">

<div id="extra-${i}"></div>

<textarea id="ms-${i}" placeholder="Markscheme (optional)"></textarea>

<button onclick="loadExtra(${i})">Load Fields</button>
<button onclick="saveQuestion(${i})">Save</button>
`;
}

}

/* LOAD EXTRA BASED ON TYPE */
function loadExtra(i){

let type = document.getElementById(`qtype-${i}`).value;
let html="";

if(type==="MCQ"){
html=`
<input placeholder="Option A" id="a-${i}">
<input placeholder="Option B" id="b-${i}">
<input placeholder="Option C" id="c-${i}">
<input placeholder="Option D" id="d-${i}">
<input placeholder="Correct Answer" id="ans-${i}">
`;
}

if(type==="Multi MCQ"){
html=`
<input placeholder="Option A">
<input placeholder="Option B">
<input placeholder="Option C">
<input placeholder="Correct Answers (comma separated)">
`;
}

if(type==="True/False"){
html=`<select><option>True</option><option>False</option></select>`;
}

document.getElementById(`extra-${i}`).innerHTML=html;

}

/* SAVE CONTENT */
function saveContent(i){

blocks[i].data={
text:document.querySelector(`#block-${i} textarea`).value
};

alert("Content saved");

}

/* SAVE QUESTION */
function saveQuestion(i){

blocks[i].data={
type:document.getElementById(`qtype-${i}`).value,
question:document.getElementById(`q-${i}`).value,
marks:document.getElementById(`marks-${i}`).value,
markscheme:document.getElementById(`ms-${i}`).value
};

alert("Question saved");

}

/* DELETE */
function deleteBlock(i){
if(confirm("Delete block?")){
blocks.splice(i,1);
render();
}
}

/* SAVE SET */
function saveSet(){

let set={
title:document.getElementById("title").value,
topic:document.getElementById("topic").value,
criterion:document.getElementById("criterion").value,
difficulty:document.getElementById("difficulty").value,
blocks:blocks
};

DB.push(set);
localStorage.setItem("questionBank", JSON.stringify(DB));

alert("Saved successfully!");

}

</script>

</body>
</html>
