<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MYP Physics Quiz | Atul Soral Physicism</title>

<!-- Google Analytics -->

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
  background:#0f172a;
  color:white;
  font-family:Arial;
}

.container-box{
  max-width:700px;
  margin:auto;
  background:#1e293b;
  padding:25px;
  border-radius:12px;
  margin-top:30px;
}

.option{
  cursor:pointer;
  transition:0.2s;
}
.option:hover{
  background:#334155;
}

.correct{
  background:#16a34a !important;
}
.wrong{
  background:#dc2626 !important;
}
</style>
</head>

<body>

<div class="container text-center mt-4">
  <h1>🧪 MYP Physics Quiz</h1>
</div>

<div class="container-box">

  <!-- START SECTION -->
  <div id="startSection" class="text-center">

    <input type="email" id="studentEmail" 
    class="form-control mb-3" 
    placeholder="Enter your email"
    style="max-width:300px;margin:auto;">

    <select id="mainTopicSelect" class="form-select mb-3" style="max-width:300px;margin:auto;">
      <option value="">-- Select Topic --</option>
    </select>

    <button class="btn btn-success" onclick="startQuiz()">Start Quiz</button>

  </div>

  <!-- QUIZ SECTION -->
  <div id="quizSection" style="display:none;">

    <h5 id="questionText" class="mb-3"></h5>

    <ul class="list-group mb-3" id="choiceList"></ul>

    <div id="feedback" class="mb-2 fw-bold"></div>

    <div class="text-end">
      <span id="scoreBox"></span>
    </div>

  </div>

</div>

<!-- NAVIGATION -->
<div class="text-center mt-4">
  <button onclick="location.href='index.html'" class="btn btn-outline-light">🏠 Home</button>
  <button onclick="location.href='myp-dashboard.html'" class="btn btn-outline-light">📘 MYP</button>
  <button onclick="history.back()" class="btn btn-outline-light">🔙 Back</button>
</div>

<!-- JS FILES -->
<script src="js/myp-question-bank.js"></script>
<script src="js/myp-quiz-logic.js"></script>

</body>
</html>
