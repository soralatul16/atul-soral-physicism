<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MYP Quiz Practice</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f172a;
  color:white;
}

/* NAV */
.navbar{
  display:flex;
  justify-content:space-between;
  padding:15px 30px;
  background:#020617;
}

.navbar a{
  color:white;
  text-decoration:none;
  margin-left:20px;
}

/* HEADER */
header{
  text-align:center;
  padding:40px;
  background:linear-gradient(135deg,#06b6d4,#2563eb);
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:20px;
  padding:30px;
}

.card{
  background:#1e293b;
  padding:20px;
  border-radius:10px;
  text-align:center;
  cursor:pointer;
  transition:0.2s;
}

.card:hover{
  background:#334155;
  transform:scale(1.05);
}
</style>
</head>

<body>

<div class="navbar">
  <div><b>MYP Physics Quiz</b></div>
  <div>
    <a href="index.html">Home</a>
    <a href="myp-dashboard.html">MYP</a>
  </div>
</div>

<header>
<h1>🧠 Quiz Practice</h1>
<p>Select a topic to begin</p>
</header>

<div class="grid">

<div class="card" onclick="openQuiz('waves')">📡 Waves</div>
<div class="card" onclick="openQuiz('atomic')">⚛️ Atomic Physics</div>
<div class="card" onclick="openQuiz('electromagnetism')">⚡ Electromagnetism</div>

<div class="card" onclick="comingSoon()">🌡️ Thermal Physics</div>
<div class="card" onclick="comingSoon()">🌀 Forces</div>

</div>

<script>
function openQuiz(topic){
  window.location.href = `quiz/quiz.html?topic=${topic}`;
}

function comingSoon(){
  alert("🚧 This topic will be added soon");
}
</script>

</body>
</html>
