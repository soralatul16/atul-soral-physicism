<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DP Student Portal | Atul Soral Physicism</title>
<meta name="description" content="Student login portal for DP Physics assignments and tests by Atul Soral Physicism.">
<script async src="https://www.googletagmanager.com/gtag/js?id=G-9JDXQ282H8"></script>
<script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','G-9JDXQ282H8');</script>
<style>
:root{--bg:#F5F2EE;--card:#fff;--text:#1A1A2E;--text2:#6B7280;--text3:#9CA3AF;--accent:#0B7285;--accent-light:#E0F7FA;--border:#E5E1DC;--shadow:0 2px 12px rgba(0,0,0,.06);--radius:14px;--danger:#DC2626;--success:#059669}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column}

/* NAV */
nav{display:flex;align-items:center;justify-content:space-between;padding:10px 24px;background:linear-gradient(135deg,rgba(11,114,133,.95),rgba(6,86,102,.95));color:#fff;box-shadow:0 2px 16px rgba(6,86,102,.3)}
nav a{color:#fff;text-decoration:none;font-size:.78rem;padding:4px 10px;border-radius:6px;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2)}
.nav-title{font-family:Georgia,serif;font-size:1rem;font-weight:700}
.nav-sub{font-size:.78rem;opacity:.8}

/* MAIN */
.portal-wrap{flex:1;display:flex;align-items:center;justify-content:center;padding:40px 20px}
.portal-card{background:var(--card);border-radius:var(--radius);padding:36px 32px;box-shadow:0 8px 40px rgba(0,0,0,.08);max-width:420px;width:100%}
.portal-icon{text-align:center;font-size:2.5rem;margin-bottom:8px}
.portal-card h1{font-family:Georgia,serif;font-size:1.4rem;text-align:center;margin-bottom:4px;color:var(--text)}
.portal-card h1 span{color:var(--accent)}
.portal-subtitle{text-align:center;font-size:.82rem;color:var(--text2);margin-bottom:24px}

/* TOGGLE */
.auth-toggle{display:flex;background:var(--bg);border-radius:8px;padding:3px;margin-bottom:20px}
.auth-toggle button{flex:1;padding:8px;border:none;background:none;font-size:.82rem;font-weight:600;color:var(--text2);cursor:pointer;border-radius:6px;transition:.2s}
.auth-toggle button.active{background:var(--accent);color:#fff;box-shadow:0 2px 6px rgba(11,114,133,.3)}

/* FORMS */
.form-section{display:none}
.form-section.active{display:block}
.form-group{margin-bottom:14px}
.form-group label{display:block;font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--text3);margin-bottom:4px}
.form-group input,.form-group select{width:100%;padding:10px 14px;border:1.5px solid var(--border);border-radius:8px;font-size:.9rem;outline:none;background:var(--bg);transition:border-color .2s}
.form-group input:focus,.form-group select:focus{border-color:var(--accent)}
.form-group input::placeholder{color:var(--text3)}
.btn{width:100%;padding:12px;border:none;border-radius:8px;font-size:.9rem;font-weight:700;cursor:pointer;transition:.2s;display:flex;align-items:center;justify-content:center;gap:6px}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{opacity:.9}
.btn-primary:disabled{opacity:.5;cursor:not-allowed}

/* ERROR / SUCCESS */
.msg{padding:10px 14px;border-radius:8px;font-size:.8rem;font-weight:600;margin-bottom:14px;display:none}
.msg.error{display:block;background:#FEE2E2;color:var(--danger);border:1px solid #FECACA}
.msg.success{display:block;background:#DCFCE7;color:var(--success);border:1px solid #BBF7D0}

/* CREATED MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal{background:var(--card);border-radius:16px;padding:28px;max-width:400px;width:90%;box-shadow:0 20px 60px rgba(0,0,0,.15);transform:translateY(20px);transition:transform .2s}
.modal-overlay.open .modal{transform:translateY(0)}
.modal h3{font-family:Georgia,serif;font-size:1.1rem;margin-bottom:12px;color:var(--accent);text-align:center}
.modal-id{font-family:'SF Mono',SFMono-Regular,monospace;font-size:1.4rem;font-weight:700;color:var(--accent);background:var(--accent-light);padding:14px;border-radius:8px;text-align:center;margin:12px 0;letter-spacing:.08em}
.modal-pw{font-family:'SF Mono',SFMono-Regular,monospace;font-size:1rem;color:var(--text);background:var(--bg);padding:10px;border-radius:8px;text-align:center;margin:8px 0}
.copy-row{display:flex;gap:6px;justify-content:center;margin:6px 0}
.copy-btn{padding:6px 14px;background:var(--accent);color:#fff;border:none;border-radius:6px;font-size:.78rem;font-weight:600;cursor:pointer}
.copy-btn:hover{opacity:.85}
.modal-close{margin-top:16px;width:100%;padding:10px;background:var(--bg);border:1.5px solid var(--border);border-radius:8px;font-size:.85rem;font-weight:600;cursor:pointer;color:var(--text)}

/* FOOTER */
.footer{text-align:center;padding:20px;font-family:Georgia,serif;font-size:11px;color:rgba(0,0,0,.15);letter-spacing:2px;text-transform:uppercase}

/* SPINNER */
.spinner{width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;display:none}
@keyframes spin{to{transform:rotate(360deg)}}

@media(max-width:500px){.portal-card{padding:24px 18px}}
</style>
</head>
<body>

<nav>
  <div style="display:flex;align-items:center;gap:14px">
    <span class="nav-title">Atul Soral Physicism</span>
    <span class="nav-sub">DP Student Portal</span>
  </div>
  <div style="display:flex;gap:6px">
    <a href="index.html">Home</a>
    <a href="dp-dashboard.html">DP</a>
  </div>
</nav>

<div class="portal-wrap">
  <div class="portal-card">
    <div class="portal-icon">🎓</div>
    <h1><span>DP</span> Student Portal</h1>
    <p class="portal-subtitle">Access your physics assignments and tests</p>

    <div class="auth-toggle">
      <button class="active" onclick="showForm('login')">Login</button>
      <button onclick="showForm('register')">Register</button>
    </div>

    <!-- LOGIN FORM -->
    <div class="form-section active" id="loginForm">
      <div class="msg" id="loginMsg"></div>
      <div class="form-group">
        <label>Student ID</label>
        <input type="text" id="loginId" placeholder="STU-XXXXX" autocomplete="username">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="loginPw" placeholder="Enter your password" autocomplete="current-password">
      </div>
      <button class="btn btn-primary" onclick="doLogin()" id="loginBtn">
        <span>Login</span>
        <div class="spinner" id="loginSpinner"></div>
      </button>
    </div>

    <!-- REGISTER FORM -->
    <div class="form-section" id="registerForm">
      <div class="msg" id="registerMsg"></div>
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" id="regName" placeholder="Your full name">
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="regEmail" placeholder="your.email@school.com">
      </div>
      <div class="form-group">
        <label>Phone (optional)</label>
        <input type="tel" id="regPhone" placeholder="+91 98765 43210">
      </div>
      <div class="form-group">
        <label>Level</label>
        <select id="regLevel">
          <option value="DP-SL">DP SL</option>
          <option value="DP-HL">DP HL</option>
          <option value="MYP">MYP</option>
        </select>
      </div>
      <div class="form-group">
        <label>Create Password</label>
        <input type="password" id="regPw" placeholder="Choose a password (min 4 chars)" autocomplete="new-password">
      </div>
      <button class="btn btn-primary" onclick="doRegister()" id="regBtn">
        <span>Register</span>
        <div class="spinner" id="regSpinner"></div>
      </button>
    </div>
  </div>
</div>

<!-- REGISTRATION SUCCESS MODAL -->
<div class="modal-overlay" id="regModal">
  <div class="modal">
    <h3>✅ Registration Successful!</h3>
    <p style="font-size:.82rem;color:var(--text2);text-align:center;margin-bottom:12px">Save your Student ID — you'll need it to log in.</p>
    <div style="font-size:.7rem;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.05em">Your Student ID</div>
    <div class="modal-id" id="regModalId">STU-XXXXX</div>
    <div class="copy-row">
      <button class="copy-btn" onclick="copyEl('regModalId')">📋 Copy ID</button>
    </div>
    <div style="font-size:.7rem;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin-top:8px">Your Password</div>
    <div class="modal-pw" id="regModalPw">••••</div>
    <button class="modal-close" onclick="redirectToDashboard()">Continue to Dashboard →</button>
  </div>
</div>

<div class="footer">ATUL SORAL PHYSICISM</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<script>
firebase.initializeApp({
  apiKey:"AIzaSyC3B2VEkYQy8DBN_jFNGPUWpJBqRNOP7gM",
  authDomain:"soral-atul-physicism.firebaseapp.com",
  projectId:"soral-atul-physicism",
  storageBucket:"soral-atul-physicism.appspot.com"
});
var db = firebase.firestore();

// Check if already logged in
if(sessionStorage.getItem('dpStudentId')){
  window.location.href = 'dp-student-dashboard.html';
}

// ==================== FORM TOGGLE ====================
function showForm(type){
  document.querySelectorAll('.auth-toggle button').forEach(function(b){b.classList.remove('active')});
  document.querySelectorAll('.form-section').forEach(function(f){f.classList.remove('active')});
  if(type==='login'){
    document.querySelector('.auth-toggle button:first-child').classList.add('active');
    document.getElementById('loginForm').classList.add('active');
  } else {
    document.querySelector('.auth-toggle button:last-child').classList.add('active');
    document.getElementById('registerForm').classList.add('active');
  }
  // Clear messages
  document.getElementById('loginMsg').className='msg';
  document.getElementById('registerMsg').className='msg';
}

// ==================== LOGIN ====================
function doLogin(){
  var id = document.getElementById('loginId').value.trim().toUpperCase();
  var pw = document.getElementById('loginPw').value;
  var msgEl = document.getElementById('loginMsg');

  if(!id || !pw){
    msgEl.className='msg error'; msgEl.textContent='Please enter both Student ID and password.'; return;
  }

  document.getElementById('loginBtn').disabled = true;
  document.getElementById('loginSpinner').style.display = 'inline-block';

  db.collection('dpStudents').where('studentId','==',id).get().then(function(snap){
    document.getElementById('loginBtn').disabled = false;
    document.getElementById('loginSpinner').style.display = 'none';

    if(snap.empty){
      msgEl.className='msg error'; msgEl.textContent='Student ID not found. Check your ID or register below.'; return;
    }

    var doc = snap.docs[0];
    var student = doc.data();

    if(student.password !== pw){
      msgEl.className='msg error'; msgEl.textContent='Incorrect password. Please try again.'; return;
    }

    // Success — store session
    sessionStorage.setItem('dpStudentId', student.studentId);
    sessionStorage.setItem('dpStudentName', student.name);
    sessionStorage.setItem('dpStudentDocId', doc.id);
    sessionStorage.setItem('dpStudentLevel', student.level || '');
    sessionStorage.setItem('dpStudentTags', JSON.stringify(student.tags || []));

    msgEl.className='msg success'; msgEl.textContent='Login successful! Redirecting...';
    setTimeout(function(){ window.location.href = 'dp-student-dashboard.html'; }, 600);

  }).catch(function(err){
    document.getElementById('loginBtn').disabled = false;
    document.getElementById('loginSpinner').style.display = 'none';
    msgEl.className='msg error'; msgEl.textContent='Error: '+err.message;
  });
}

// ==================== REGISTER ====================
function generateStudentId(){
  var chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
  var id = 'STU-';
  for(var i=0;i<5;i++) id += chars.charAt(Math.floor(Math.random()*chars.length));
  return id;
}

function doRegister(){
  var name = document.getElementById('regName').value.trim();
  var email = document.getElementById('regEmail').value.trim();
  var phone = document.getElementById('regPhone').value.trim();
  var level = document.getElementById('regLevel').value;
  var pw = document.getElementById('regPw').value;
  var msgEl = document.getElementById('registerMsg');

  if(!name){msgEl.className='msg error';msgEl.textContent='Please enter your name.';return;}
  if(!email){msgEl.className='msg error';msgEl.textContent='Please enter your email.';return;}
  if(!pw || pw.length < 4){msgEl.className='msg error';msgEl.textContent='Password must be at least 4 characters.';return;}

  document.getElementById('regBtn').disabled = true;
  document.getElementById('regSpinner').style.display = 'inline-block';

  var studentId = generateStudentId();
  var tags = [level, 'self-registered'];

  var studentDoc = {
    studentId: studentId,
    name: name,
    email: email,
    phone: phone,
    password: pw,
    level: level,
    tags: tags,
    createdAt: firebase.firestore.FieldValue.serverTimestamp()
  };

  db.collection('dpStudents').add(studentDoc).then(function(docRef){
    document.getElementById('regBtn').disabled = false;
    document.getElementById('regSpinner').style.display = 'none';

    // Store session
    sessionStorage.setItem('dpStudentId', studentId);
    sessionStorage.setItem('dpStudentName', name);
    sessionStorage.setItem('dpStudentDocId', docRef.id);
    sessionStorage.setItem('dpStudentLevel', level);
    sessionStorage.setItem('dpStudentTags', JSON.stringify(tags));

    // Show modal
    document.getElementById('regModalId').textContent = studentId;
    document.getElementById('regModalPw').textContent = pw;
    document.getElementById('regModal').classList.add('open');

  }).catch(function(err){
    document.getElementById('regBtn').disabled = false;
    document.getElementById('regSpinner').style.display = 'none';
    msgEl.className='msg error'; msgEl.textContent='Error: '+err.message;
  });
}

// ==================== UTILS ====================
function copyEl(elId){
  var text = document.getElementById(elId).textContent;
  navigator.clipboard.writeText(text).then(function(){
    var btn = event.target;
    var orig = btn.textContent;
    btn.textContent = '✓ Copied!';
    setTimeout(function(){ btn.textContent = orig; }, 1500);
  });
}

function redirectToDashboard(){
  window.location.href = 'dp-student-dashboard.html';
}

// Enter key support
document.addEventListener('keydown', function(e){
  if(e.key==='Enter'){
    if(document.getElementById('loginForm').classList.contains('active')){
      doLogin();
    } else {
      doRegister();
    }
  }
});
</script>
</body>
</html>
