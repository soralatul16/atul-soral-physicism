<script>
document.getElementById('themeBtn').addEventListener('click',function(){var h=document.documentElement,n=h.getAttribute('data-theme')==='dark'?'light':'dark';h.setAttribute('data-theme',n);this.textContent=n==='dark'?'🌙':'☀️';});
var $=function(id){return document.getElementById(id)};
var SCENES=[
{n:'Field Explorer',g:'<b>Explore magnetic fields</b> around different sources. Switch views: field lines, compass needles, iron filings. Click to probe B at any point.'},
{n:'Motor Effect',g:'<b>F = BIL sinθ</b> — A current-carrying wire in a magnetic field. Watch the catapult field: lines compress on one side, spread on the other.'},

var S={I:5,fieldSrc:'wire',vizMode:'lines',probeX:-1,probeY:-1,fieldSrc2Dir:1,
  wires:[{x:0.5,y:0.4,dir:1},{x:0.5,y:0.6,dir:1}],wireView:'top',dragWire:-1,magStr:1.0,

  mI:3,mB:0.5,mL:0.5,mTh:90,
  magX:0.3,coilN:100,coilA:0.04,emfData:[],lastFlux:0,emfTime:0,

var MU0=4*Math.PI*1e-7;
function wireB(r){return MU0*Math.abs(S.I)/(2*Math.PI*Math.max(r,0.001));}
function solB(){return MU0*200*S.I;}
function fieldAt(x,y){
  var fx=0,fy=0;
  if(S.fieldSrc==='wire'){var dx=x-cW/2,dy=y-cH/2,r=Math.sqrt(dx*dx+dy*dy)/100;if(r<0.01)r=0.01;var B=wireB(r);var ux=-dy/(r*100),uy=dx/(r*100);if(S.I<0){ux=-ux;uy=-uy;}fx=ux*B;fy=uy*B;}
  else if(S.fieldSrc==='solenoid'){var sy=cH/2,sx1=cW*0.25,sx2=cW*0.75;if(x>sx1&&x<sx2&&Math.abs(y-sy)<40){fx=solB()*(S.I>0?1:-1);fy=0;}else{var cx2=(sx1+sx2)/2,r2=Math.sqrt((x-cx2)*(x-cx2)+(y-sy)*(y-sy));if(r2<10)r2=10;var ang=Math.atan2(y-sy,x-cx2);fx=solB()*0.3*Math.cos(ang)/(r2/100);fy=solB()*0.3*Math.sin(ang)/(r2/100);if(x<cx2){fx=-fx;fy=-fy;}}}
  else if(S.fieldSrc==='magnet'){var mx=cW/2,my=cH/2;[{px:mx-50,py:my,s:1},{px:mx+50,py:my,s:-1}].forEach(function(p){var ddx=x-p.px,ddy=y-p.py,r3=Math.sqrt(ddx*ddx+ddy*ddy);if(r3<8)r3=8;var B3=0.005*S.magStr*p.s/(r3*r3/10000);fx+=B3*ddx/r3;fy+=B3*ddy/r3;});}
  else if(S.fieldSrc==='parallel'){S.wires.forEach(function(w){var wy=w.y*cH,wx=w.x*cW;var dy2=y-wy,dx2=x-wx,r4=Math.sqrt(dx2*dx2+dy2*dy2)/100;if(r4<0.01)r4=0.01;var B4=wireB(r4)*w.dir;fx+=(-dy2/(r4*100))*B4;fy+=(dx2/(r4*100))*B4;});}
  return{x:fx,y:fy,mag:Math.sqrt(fx*fx+fy*fy)};
}

function draw(){
  cx.fillStyle=document.documentElement.getAttribute('data-theme')==='dark'?'#0F172A':'#F8F8F5';cx.fillRect(0,0,cW,cH);time+=0.016;
  if(scene===0)drawField();else if(scene===1)drawMotor();else if(scene===2)drawInduction();else if(scene===3)drawGenerator();else if(scene===4)drawTransformer();
}

// ===== FIELD EXPLORER =====
function drawField(){
  var midX=cW/2,midY=cH/2,absI=Math.abs(S.I),dk=document.documentElement.getAttribute('data-theme')==='dark';
  // Subtle grid
  cx.strokeStyle=dk?'rgba(255,255,255,.04)':'rgba(0,0,0,.04)';cx.lineWidth=1;
  for(var gx=40;gx<cW;gx+=40){cx.beginPath();cx.moveTo(gx,0);cx.lineTo(gx,cH);cx.stroke();}
  for(var gy=40;gy<cH;gy+=40){cx.beginPath();cx.moveTo(0,gy);cx.lineTo(cW,gy);cx.stroke();}

  var lineCol='rgba(29,78,216,';var arrowDir=S.I>0?1:-1;

  if(S.fieldSrc==='wire'){
    // === WIRE: Concentric circles — number and spacing scale with current ===
    if(S.vizMode==='lines'){
      var numCircles=Math.max(3,Math.min(12,Math.round(absI*1.2)));
      var baseSpacing=Math.max(15,180/numCircles);
      for(var ci2=0;ci2<numCircles;ci2++){
        var r=25+ci2*baseSpacing;
        var alpha=Math.max(0.08,(0.55-ci2*0.04))*Math.min(1,absI/3);
        var lw=Math.max(1,2.2-ci2*0.1);
        cx.strokeStyle=lineCol+alpha+')';cx.lineWidth=lw;cx.beginPath();cx.arc(midX,midY,r,0,Math.PI*2);cx.stroke();
        for(var ai=0;ai<4;ai++){var aa=ai*Math.PI/2+time*0.3*arrowDir;var ax=midX+Math.cos(aa)*r,ay=midY+Math.sin(aa)*r;
          var tangent=aa+(arrowDir>0?Math.PI/2:-Math.PI/2);
          cx.fillStyle=lineCol+Math.min(0.7,alpha+0.15)+')';cx.beginPath();cx.moveTo(ax+Math.cos(tangent)*6,ay+Math.sin(tangent)*6);cx.lineTo(ax+Math.cos(tangent+2.6)*4,ay+Math.sin(tangent+2.6)*4);cx.lineTo(ax+Math.cos(tangent-2.6)*4,ay+Math.sin(tangent-2.6)*4);cx.closePath();cx.fill();}
      }
    }
    // Wire source
    var grad=cx.createRadialGradient(midX-3,midY-3,2,midX,midY,16);grad.addColorStop(0,'#F59E0B');grad.addColorStop(1,'#92400E');
    cx.fillStyle=grad;cx.beginPath();cx.arc(midX,midY,16,0,Math.PI*2);cx.fill();cx.strokeStyle='#374151';cx.lineWidth=3;cx.stroke();
    // Pulsing glow
    cx.save();cx.globalAlpha=0.12+Math.sin(time*2)*0.05;var glow=cx.createRadialGradient(midX,midY,14,midX,midY,28);glow.addColorStop(0,'rgba(245,158,11,.3)');glow.addColorStop(1,'transparent');cx.fillStyle=glow;cx.beginPath();cx.arc(midX,midY,28,0,Math.PI*2);cx.fill();cx.restore();
    cx.fillStyle='#fff';cx.font='bold 16px sans-serif';cx.textAlign='center';cx.textBaseline='middle';cx.fillText(S.I>0?'⊙':'⊗',midX,midY);
    cx.fillStyle=dk?'#E2E8F0':'#1A1A2E';cx.font='bold 11px sans-serif';cx.fillText('I = '+S.I.toFixed(1)+' A',midX,midY+30);
  }
  else if(S.fieldSrc==='magnet'){
    // === BAR MAGNET: Bezier dipole field lines ===
    var nPoleX=midX-55,sPoleX=midX+55,mW2=55,mH2=20;
    // Magnet body first (so lines draw on top)
    var gN=cx.createLinearGradient(nPoleX-mW2,0,nPoleX,0);gN.addColorStop(0,'#EF4444');gN.addColorStop(1,'#DC2626');cx.fillStyle=gN;cx.fillRect(nPoleX-mW2,midY-mH2,mW2,mH2*2);
    var gS=cx.createLinearGradient(sPoleX,0,sPoleX+mW2,0);gS.addColorStop(0,'#3B82F6');gS.addColorStop(1,'#2563EB');cx.fillStyle=gS;cx.fillRect(sPoleX,midY-mH2,mW2,mH2*2);
    cx.strokeStyle='#111';cx.lineWidth=1;cx.strokeRect(nPoleX-mW2,midY-mH2,mW2*2+10,mH2*2);
    cx.beginPath();cx.moveTo(midX,midY-mH2);cx.lineTo(midX,midY+mH2);cx.strokeStyle='#333';cx.lineWidth=1;cx.stroke();
    cx.fillStyle='#fff';cx.font='bold 18px sans-serif';cx.textAlign='center';cx.textBaseline='middle';cx.fillText('N',nPoleX-mW2/2,midY+2);cx.fillText('S',sPoleX+mW2/2,midY+2);

    if(S.vizMode==='lines'){
      // External field lines: leave N face (right side), curve outward, enter S face (left side)
      var numMagLines=Math.max(3,Math.min(12,Math.round(S.magStr*6)));
      var lineOffsets=[];for(var mli=0;mli<numMagLines;mli++){lineOffsets.push(((mli+0.5)/numMagLines-0.5)*32);}
      lineOffsets.forEach(function(yOff,li){
        var spread=80+Math.abs(yOff)*15;
        var alpha2=0.5-Math.abs(yOff)/20*0.2;
        cx.strokeStyle=lineCol+alpha2+')';cx.lineWidth=1.8;
        // N face (right edge) → curve above/below → S face (left edge)
        var startX=nPoleX-mW2,endX=sPoleX+mW2;
        var startY=midY+yOff,endY=midY+yOff;
        var sign=yOff>=0?1:-1;if(yOff===0)sign=1;
        // Curve goes: from N-pole right edge, swings out to the right, around, and into S-pole left edge
        cx.beginPath();cx.moveTo(startX,startY);
        cx.bezierCurveTo(startX-spread*0.8,startY-sign*spread,endX+spread*0.8,endY-sign*spread,endX,endY);
        cx.stroke();
        // Arrow at top of curve
        var arrowX=midX,arrowY=midY+yOff-sign*spread*0.52;
        cx.fillStyle=lineCol+(alpha2+0.1)+')';cx.beginPath();
        // Arrow pointing left (N→external→S direction at top of curve)
        cx.moveTo(arrowX-6,arrowY);cx.lineTo(arrowX+2,arrowY-4);cx.lineTo(arrowX+2,arrowY+4);cx.closePath();cx.fill();
      });
      // Also draw the mirror curves (lines going the other way for symmetry)
      lineOffsets.forEach(function(yOff){
        if(Math.abs(yOff)<3)return;
        var spread=80+Math.abs(yOff)*15;var alpha2=0.4-Math.abs(yOff)/20*0.15;
        cx.strokeStyle=lineCol+alpha2+')';cx.lineWidth=1.5;
        var sign=yOff>=0?-1:1;
        cx.beginPath();cx.moveTo(nPoleX-mW2,midY+yOff);
        cx.bezierCurveTo(nPoleX-mW2-spread*0.8,midY+yOff-sign*spread,sPoleX+mW2+spread*0.8,midY+yOff-sign*spread,sPoleX+mW2,midY+yOff);
        cx.stroke();
      });

// ===== CHARGES IN B =====
function drawCharges(){
  // Visible field background
  cx.fillStyle='rgba(29,78,216,.08)';cx.fillRect(0,0,cW,cH);
  // B field crosses (into page) - bigger and darker

  for(var bx=0;bx<8;bx++)for(var by=0;by<6;by++){var bxx=50+bx*(cW-100)/7,byy=40+by*(cH-80)/5;cx.fillText('×',bxx,byy);}
  cx.fillStyle='#1D4ED8';cx.font='bold 12px sans-serif';cx.textAlign='right';cx.fillText('B = '+S.B.toFixed(2)+' T (into page)',cW-12,20);
  for(var bx=0;bx<10;bx++)for(var by=0;by<7;by++)cx.fillText('⊗',40+bx*(cW-80)/9,35+by*(cH-70)/6);
  cx.fillStyle='rgba(29,78,216,.3)';cx.font='bold 11px sans-serif';cx.textAlign='right';cx.fillText('B = '+S.B.toFixed(2)+' T (into page)',cW-10,18);
  cx.strokeStyle='rgba(29,78,216,.35)';cx.lineWidth=2.5;if(S.pTrail.length>1){cx.beginPath();cx.moveTo(S.pTrail[0].x,S.pTrail[0].y);for(var ti=1;ti<S.pTrail.length;ti++)cx.lineTo(S.pTrail[ti].x,S.pTrail[ti].y);cx.stroke();}
  if(S.particles.length){var p=S.particles[0];cx.fillStyle=S.q>0?'#DC2626':'#2563EB';cx.beginPath();cx.arc(p.x,p.y,9,0,Math.PI*2);cx.fill();cx.strokeStyle='#fff';cx.lineWidth=2;cx.stroke();cx.fillStyle='#fff';cx.font='bold 13px sans-serif';cx.textAlign='center';cx.textBaseline='middle';cx.fillText(S.q>0?'+':'−',p.x,p.y+1);
    var vMag=Math.sqrt(p.vx*p.vx+p.vy*p.vy);if(vMag>0){cx.strokeStyle='#059669';cx.lineWidth=2.5;cx.beginPath();cx.moveTo(p.x,p.y);cx.lineTo(p.x+p.vx/vMag*35,p.y+p.vy/vMag*35);cx.stroke();cx.fillStyle='#059669';cx.font='bold 11px sans-serif';cx.textAlign='left';cx.fillText('v',p.x+p.vx/vMag*38,p.y+p.vy/vMag*38);}
    var Fx=S.q>0?p.vy:-p.vy,Fy=S.q>0?-p.vx:p.vx;var fMag=Math.sqrt(Fx*Fx+Fy*Fy);if(fMag>0){cx.strokeStyle='#EF4444';cx.lineWidth=2.5;cx.beginPath();cx.moveTo(p.x,p.y);cx.lineTo(p.x+Fx/fMag*30,p.y+Fy/fMag*30);cx.stroke();cx.fillStyle='#EF4444';cx.font='bold 11px sans-serif';cx.fillText('F',p.x+Fx/fMag*33,p.y+Fy/fMag*33);}}

function updateCharges(){if(!S.particles.length)return;var p=S.particles[0];
  // Canvas-tuned Lorentz force: F perpendicular to v, strength proportional to qvB
  var speed=Math.sqrt(p.vx*p.vx+p.vy*p.vy);if(speed<0.1)return;
  var forceFactor=0.003*S.B*Math.abs(S.q);
  var dvx=S.q>0?p.vy*forceFactor:-p.vy*forceFactor;
  var dvy=S.q>0?-p.vx*forceFactor:p.vx*forceFactor;
  p.vx+=dvx;p.vy+=dvy;
  // Normalize speed to stay constant (magnetic force does no work)
  var newSpeed=Math.sqrt(p.vx*p.vx+p.vy*p.vy);if(newSpeed>0){p.vx*=speed/newSpeed;p.vy*=speed/newSpeed;}
  p.x+=p.vx*0.3;p.y+=p.vy*0.3;
  S.pTrail.push({x:p.x,y:p.y});if(S.pTrail.length>3000)S.pTrail.shift();
  if(p.x<-50||p.x>cW+50||p.y<-50||p.y>cH+50)S.particles=[];}
function fireParticle(){var ang=S.pAngle*Math.PI/180;var spd=Math.max(2,S.v/5e4);S.particles=[{x:60,y:cH/2,vx:spd*Math.cos(ang),vy:-spd*Math.sin(ang)}];S.pTrail=[];}

// ===== MOTOR EFFECT =====

  cx.fillStyle='#2563EB';cx.fillRect(cW-48,midY-cH*.26,40,cH*.52);cx.fillStyle='#fff';cx.fillText('S',cW-28,midY);

  // θ arc

  // Info
  cx.fillStyle='rgba(0,0,0,.65)';cx.beginPath();cx.roundRect(8,8,260,22,4);cx.fill();cx.fillStyle='#FFD54F';cx.font='bold 10px monospace';cx.textAlign='left';cx.fillText('F = BILsinθ = '+B+'×'+I+'×'+L+'×sin'+th+'° = '+Math.abs(F).toFixed(3)+' N',14,22);

// ===== INDUCTION =====

function updateInduction(){var coilCX=cW*0.6,dist=S.magX*cW-coilCX;

  cx.fillStyle='#D97706';cx.beginPath();cx.arc(midX-10,midY+52,6,0,Math.PI*2);cx.fill();cx.beginPath();cx.arc(midX+10,midY+52,6,0,Math.PI*2);cx.fill();
  // Lamp
  var emf=S.genN*S.genB*S.genA*S.genW*Math.sin(S.genAngle);var bright=Math.min(1,Math.abs(emf)/(S.genN*S.genB*S.genA*S.genW+0.01));

  if(bright>0.1){cx.save();cx.globalAlpha=bright*0.3;cx.beginPath();cx.arc(midX+90,midY+52,18,0,Math.PI*2);cx.fillStyle='#FBBF24';cx.fill();cx.restore();}

  cx.fillStyle='rgba(0,0,0,.03)';cx.fillRect(gX-5,gY-5,gW+10,gH+10);cx.strokeStyle='rgba(0,0,0,.15)';cx.lineWidth=1;cx.beginPath();cx.moveTo(gX,gY);cx.lineTo(gX,gY+gH);cx.lineTo(gX+gW,gY+gH);cx.stroke();cx.strokeStyle='rgba(0,0,0,.06)';cx.beginPath();cx.moveTo(gX,gY+gH/2);cx.lineTo(gX+gW,gY+gH/2);cx.stroke();
  if(S.genWave.length>1){cx.strokeStyle='#0284C7';cx.lineWidth=2;cx.beginPath();var tR2=Math.max(3,S.genWave[S.genWave.length-1].t-S.genWave[0].t);for(var wi=0;wi<S.genWave.length;wi++){var wd=S.genWave[wi],wx=gX+((wd.t-S.genWave[0].t)/tR2)*gW,wy=gY+gH/2-wd.v/(S.genN*S.genB*S.genA*S.genW+0.01)*gH*0.45;wi===0?cx.moveTo(wx,wy):cx.lineTo(wx,wy);}cx.stroke();}

}
function updateGenerator(){if(!S.genPlaying)return;S.genAngle+=S.genW*0.016;var emf=S.genN*S.genB*S.genA*S.genW*Math.sin(S.genAngle);var t=S.genAngle/S.genW;S.genWave.push({t:t,v:emf});if(S.genWave.length>500)S.genWave.shift();}

// ===== TRANSFORMER =====
function drawTransformer(){
  var midX=cW/2,midY=cH*0.38;
  // Iron core - solid with shading
  cx.fillStyle='#78716C';cx.fillRect(midX-85,midY-55,170,12);cx.fillRect(midX-85,midY+43,170,12);cx.fillRect(midX-85,midY-55,12,110);cx.fillRect(midX+73,midY-55,12,110);
  cx.fillStyle='rgba(0,0,0,.15)';cx.fillRect(midX-85,midY-55,170,4);cx.fillRect(midX-85,midY-55,4,110);
  cx.font='bold 8px sans-serif';cx.fillStyle='#A8A29E';cx.textAlign='center';cx.fillText('IRON CORE',midX,midY);

  // Primary coil - visible dense windings
  var n1Vis=Math.max(4,Math.min(18,Math.round(S.tN1/50)));
  cx.strokeStyle='#DC2626';cx.lineWidth=3;
  for(var i=0;i<n1Vis;i++){var yy=midY-40+i*(80/n1Vis);cx.beginPath();cx.ellipse(midX-58,yy,16,6,0,0,Math.PI*2);cx.stroke();}
  cx.fillStyle='#DC2626';cx.font='bold 11px sans-serif';cx.textAlign='center';cx.fillText('Primary',midX-58,midY+68);cx.font='bold 10px sans-serif';cx.fillText('N₁ = '+S.tN1,midX-58,midY+80);

  // Secondary coil - fewer visible windings
  var n2Vis=Math.max(2,Math.min(18,Math.round(S.tN2/50)));
  cx.strokeStyle='#2563EB';cx.lineWidth=3;
  for(var i2=0;i2<n2Vis;i2++){var yy2=midY-40+i2*(80/n2Vis);cx.beginPath();cx.ellipse(midX+58,yy2,16,6,0,0,Math.PI*2);cx.stroke();}
  cx.fillStyle='#2563EB';cx.font='bold 11px sans-serif';cx.textAlign='center';cx.fillText('Secondary',midX+58,midY+68);cx.font='bold 10px sans-serif';cx.fillText('N₂ = '+S.tN2,midX+58,midY+80);

  // Animated flux dots through core
  if(S.tAC){
    var fluxPhase=Math.sin(time*4);
    cx.fillStyle='rgba(124,58,237,'+(0.4+Math.abs(fluxPhase)*0.4)+')';
    for(var fd=0;fd<10;fd++){
      var t2=((fd/10+time*0.5)%1);var fpx,fpy;
      if(t2<0.25){fpx=midX-73+t2*4*146;fpy=midY-49;}
      else if(t2<0.5){fpx=midX+73;fpy=midY-49+(t2-0.25)*4*92;}
      else if(t2<0.75){fpx=midX+73-(t2-0.5)*4*146;fpy=midY+49;}
      else{fpx=midX-73;fpy=midY+49-(t2-0.75)*4*92;}
      cx.beginPath();cx.arc(fpx,fpy,4,0,Math.PI*2);cx.fill();
    }
    cx.font='bold 9px sans-serif';cx.fillStyle='#7C3AED';cx.fillText('Φ changing (AC)',midX,midY-62);
  }else{
    cx.font='bold 11px sans-serif';cx.fillStyle='#DC2626';cx.textAlign='center';cx.fillText('DC → constant Φ → ε₂ = 0',midX,midY-62);
  }

  // Lamp on secondary side
  var V2=S.tAC?S.tV1*S.tN2/S.tN1*S.tEff/100:0;
  var bright=S.tAC?Math.min(1,Math.abs(V2)/80):0;
  cx.beginPath();cx.arc(midX+110,midY,12,0,Math.PI*2);
  cx.fillStyle='rgba(251,191,36,'+bright*0.8+')';cx.fill();
  cx.strokeStyle='#D97706';cx.lineWidth=2;cx.stroke();
  if(bright>0.1){cx.save();cx.globalAlpha=bright*0.3;cx.beginPath();cx.arc(midX+110,midY,22,0,Math.PI*2);cx.fillStyle='#FBBF24';cx.fill();cx.restore();}
  cx.font='9px sans-serif';cx.fillStyle='#78716C';cx.fillText('lamp',midX+110,midY+22);

  // AC source symbol
  cx.strokeStyle='#DC2626';cx.lineWidth=2;cx.beginPath();cx.arc(midX-110,midY,12,0,Math.PI*2);cx.stroke();
  cx.beginPath();cx.moveTo(midX-120,midY);cx.quadraticCurveTo(midX-114,midY-8,midX-110,midY);cx.quadraticCurveTo(midX-106,midY+8,midX-100,midY);cx.stroke();
  cx.font='9px sans-serif';cx.fillStyle='#DC2626';cx.textAlign='center';cx.fillText(S.tAC?'AC':'DC',midX-110,midY+22);cx.fillText(S.tV1+'V',midX-110,midY+32);

  // Wires
  cx.strokeStyle='#78716C';cx.lineWidth=1.5;
  cx.beginPath();cx.moveTo(midX-98,midY-6);cx.lineTo(midX-74,midY-6);cx.lineTo(midX-74,midY-40);cx.stroke();
  cx.beginPath();cx.moveTo(midX-98,midY+6);cx.lineTo(midX-74,midY+6);cx.lineTo(midX-74,midY+40);cx.stroke();
  cx.beginPath();cx.moveTo(midX+74,midY-40);cx.lineTo(midX+98,midY-6);cx.lineTo(midX+98,midY);cx.stroke();
  cx.beginPath();cx.moveTo(midX+74,midY+40);cx.lineTo(midX+98,midY+6);cx.lineTo(midX+98,midY);cx.stroke();

  // Info panel
  var I1=2,I2=S.tAC?I1*S.tN1/S.tN2*S.tEff/100:0;
  cx.fillStyle='rgba(0,0,0,.7)';cx.beginPath();cx.roundRect(12,cH*0.6,cW-24,cH*0.36,8);cx.fill();
  cx.fillStyle='#fff';cx.font='bold 13px sans-serif';cx.textAlign='left';
  cx.fillText('V₂/V₁ = N₂/N₁    →    V₂ = '+V2.toFixed(1)+' V',22,cH*0.6+22);
  cx.fillStyle='#FFD54F';cx.font='bold 11px monospace';
  cx.fillText('V₁ = '+S.tV1+' V    V₂ = '+V2.toFixed(1)+' V    I₁ = '+I1.toFixed(1)+' A    I₂ = '+I2.toFixed(1)+' A',22,cH*0.6+42);
  cx.fillStyle='#4FC3F7';cx.font='11px sans-serif';
  cx.fillText((S.tN2>S.tN1?'STEP-UP':'STEP-DOWN')+'  |  Efficiency: '+S.tEff+'%'+(S.tEff<100?' (eddy, hysteresis, I²R)':''),22,cH*0.6+60);
  if(!S.tAC){cx.fillStyle='#EF4444';cx.font='bold 12px sans-serif';cx.fillText('DC: constant Φ → dΦ/dt = 0 → NO induced EMF!',22,cH*0.6+80);}
  // Power grid
  var P=1e6,IH=P/400000,IL=P/25000,lH=IH*IH*S.gridR,lL=IL*IL*S.gridR;
  cx.fillStyle='rgba(255,255,255,.35)';cx.font='10px sans-serif';
  cx.fillText('Grid (1MW, R='+S.gridR+'Ω): 400kV → loss '+(lH/1000).toFixed(1)+'kW  |  25kV → loss '+(lL/1000).toFixed(0)+'kW ('+(lL/lH).toFixed(0)+'× more)',22,cH*0.6+cH*0.36-12);
}

// Wire management
window.addWire=function(){if(S.wires.length<6){S.wires.push({x:0.3+Math.random()*0.4,y:0.2+Math.random()*0.6,dir:1});S._filings=null;buildControls();}};
window.rmWire=function(){if(S.wires.length>1){S.wires.pop();S._filings=null;buildControls();}};

var dragging=false;
cv.addEventListener('mousedown',function(e){var r=cv.getBoundingClientRect(),mx=e.clientX-r.left,my=e.clientY-r.top;
  if(scene===0){
    // Check if clicking on a parallel wire to drag
    if(S.fieldSrc==='parallel'){var hit=-1;S.wires.forEach(function(w,i){var wx=w.x*cW,wy=w.y*cH;if(Math.sqrt((mx-wx)*(mx-wx)+(my-wy)*(my-wy))<20)hit=i;});
      if(hit>=0){S.dragWire=hit;dragging=true;return;}}
    S.probeX=mx;S.probeY=my;
  }
  if(scene===2){dragging=true;S.magX=Math.max(0.05,Math.min(0.95,mx/cW));}
});

  if(scene===0&&S.dragWire>=0){S.wires[S.dragWire].x=Math.max(0.05,Math.min(0.95,mx/cW));S.wires[S.dragWire].y=Math.max(0.05,Math.min(0.95,my/cH));S._filings=null;}
  if(scene===2)S.magX=Math.max(0.05,Math.min(0.95,mx/cW));});

cv.addEventListener('touchstart',function(e){var r=cv.getBoundingClientRect(),mx=e.touches[0].clientX-r.left,my=e.touches[0].clientY-r.top;if(scene===0){S.probeX=mx;S.probeY=my;}if(scene===2){dragging=true;S.magX=Math.max(0.05,Math.min(0.95,mx/cW));}e.preventDefault();},{passive:false});

    h+='<div class="ctrl"><div class="sl-g"><label>N</label><input type="range" min="10" max="500" step="10" value="'+S.genN+'" oninput="S.genN=+this.value;uc(\'vgn\',S.genN)"><span class="sv" id="vgn">'+S.genN+'</span></div><div class="sl-g"><label>B</label><input type="range" min="0.1" max="2" step="0.05" value="'+S.genB+'" oninput="S.genB=+this.value;uc(\'vgb\',S.genB.toFixed(2))"><span class="sv" id="vgb">'+S.genB.toFixed(2)+'</span><span class="unit">T</span></div><div class="sl-g"><label>A</label><input type="range" min="0.01" max="0.2" step="0.005" value="'+S.genA+'" oninput="S.genA=+this.value;uc(\'vga\',S.genA.toFixed(3))"><span class="sv" id="vga">'+S.genA.toFixed(3)+'</span><span class="unit">m²</span></div></div>';}
  if(scene===4){h+='<div class="ctrl"><div class="sl-g"><label>N₁</label><input type="range" min="10" max="1000" step="10" value="'+S.tN1+'" oninput="S.tN1=+this.value;uc(\'vn1\',S.tN1)"><span class="sv" id="vn1">'+S.tN1+'</span></div><div class="sl-g"><label>N₂</label><input type="range" min="10" max="1000" step="10" value="'+S.tN2+'" oninput="S.tN2=+this.value;uc(\'vn2\',S.tN2)"><span class="sv" id="vn2">'+S.tN2+'</span></div></div>';
    h+='<div class="ctrl"><div class="sl-g"><label>V₁</label><input type="range" min="10" max="400" step="5" value="'+S.tV1+'" oninput="S.tV1=+this.value;uc(\'vv1\',S.tV1)"><span class="sv" id="vv1">'+S.tV1+'</span><span class="unit">V</span></div><div class="sl-g"><label>Eff</label><input type="range" min="50" max="100" step="1" value="'+S.tEff+'" oninput="S.tEff=+this.value;uc(\'vef\',S.tEff)"><span class="sv" id="vef">'+S.tEff+'</span><span class="unit">%</span></div><div class="sl-g"><label>R</label><input type="range" min="0.5" max="10" step="0.5" value="'+S.gridR+'" oninput="S.gridR=+this.value;uc(\'vgr\',S.gridR)"><span class="sv" id="vgr">'+S.gridR+'</span><span class="unit">Ω</span></div></div>';
    h+='<div class="ctrl"><button class="tb'+(S.tAC?' on':'')+'" onclick="S.tAC=true;buildControls()">AC</button><button class="tb'+(!S.tAC?' on':'')+'" onclick="S.tAC=false;buildControls()">DC</button></div>';}
  $('controls').innerHTML=h;}
window.uc=function(id,v){var el=$(id);if(el)el.textContent=v;};

function buildSidebar(){var h='';
  if(scene===0){h+='<div class="sc"><h4>Equations</h4><div class="eq-box"><strong>B = μ₀I/(2πr)</strong> — wire<br><strong>B = μ₀nI</strong> — solenoid<br><br>Right-hand grip rule:<br>Thumb → current<br>Fingers → field</div></div>';}
  if(scene===1){var F=S.mB*S.mI*S.mL*Math.sin(S.mTh*Math.PI/180);h+='<div class="sc"><h4>Motor Effect</h4><div class="stat-g"><div class="si"><div class="sl2">F</div><div class="sv3">'+Math.abs(F).toFixed(3)+' N</div></div><div class="si"><div class="sl2">Dir</div><div class="sv3">'+(Math.abs(F)<0.001?'None':F>0?'↑ Up':'↓ Down')+'</div></div></div></div>';h+='<div class="sc"><h4>Equations</h4><div class="eq-box"><strong>F = BIL sinθ</strong><br>θ=0°→ F=0 (wire ∥ B)<br>θ=90°→ F max (wire ⊥ B)<br><br>Fleming\'s LHR:<br>thuMb→Motion<br>Forefinger→Field<br>miDdle→Current</div></div>';}
  if(scene===2){h+='<div class="sc"><h4>Faraday\'s Law</h4><div class="eq-box"><strong>ε = −NdΦ/dt</strong><br><strong>Φ = BA cosθ</strong><br><br>Faster → larger ε<br>More turns → larger ε<br><br><b>Lenz:</b> Induced current opposes the change</div></div>';}
  if(scene===3){var e0=S.genN*S.genB*S.genA*S.genW;h+='<div class="sc"><h4>Generator</h4><div class="stat-g"><div class="si"><div class="sl2">ε₀</div><div class="sv3">'+e0.toFixed(1)+' V</div></div><div class="si"><div class="sl2">f</div><div class="sv3">'+(S.genW/(2*Math.PI)).toFixed(2)+' Hz</div></div></div></div>';h+='<div class="sc"><h4>Equations</h4><div class="eq-box"><strong>ε = NBAω sin(ωt)</strong><br><strong>ε₀ = NBAω</strong><br>f = ω/(2π)<br><br>ω affects BOTH f and ε₀<br>Slip rings → AC output<br>Commutator → DC output</div></div>';}
  if(scene===4){var V2=S.tAC?S.tV1*S.tN2/S.tN1*S.tEff/100:0;h+='<div class="sc"><h4>Transformer</h4><div class="stat-g"><div class="si"><div class="sl2">V₂</div><div class="sv3">'+V2.toFixed(1)+' V</div></div><div class="si"><div class="sl2">Type</div><div class="sv3">'+(S.tN2>S.tN1?'Step-up':'Step-dn')+'</div></div></div></div>';h+='<div class="sc"><h4>Equations</h4><div class="eq-box"><strong>V₂/V₁ = N₂/N₁</strong><br><strong>V₁I₁ = V₂I₂</strong><br><br>Losses: eddy currents,<br>hysteresis, I²R, flux leak<br><br><strong>P = I²R</strong> (grid losses)</div></div>';}
  $('sidebar').innerHTML=h;}

function setScene(i){scene=i;document.querySelectorAll('.mb').forEach(function(b,j){b.classList.toggle('on',j===i);});$('guideBar').innerHTML=SCENES[i].g;S.probeX=-1;buildControls();buildSidebar();buildExp();}
window.setScene=setScene;

var lastT=0;function animate(ts){requestAnimationFrame(animate);var dt=(ts-lastT)/1000;lastT=ts;if(dt>0.1)dt=0.016;time+=dt;if(scene===2)updateInduction();if(scene===3)updateGenerator();draw();}

window.bts=function(el,i){document.querySelectorAll('.bt').forEach(function(t){t.classList.remove('on');});document.querySelectorAll('.btc').forEach(function(t){t.classList.remove('on');});el.classList.add('on');$('b'+i).classList.add('on');};

// ===== EXPERIMENT =====
var SIM_VARS={0:{iv:[{id:'I',n:'Current (A)'},{id:'r',n:'Distance (m)'}],dv:[{id:'B',n:'B field (mT)'},{id:'dir',n:'Direction (°)'}],all:['Current','Distance','Source type','View mode','Temperature','Wire length','Permeability','Medium']},1:{iv:[{id:'I',n:'Current (A)'},{id:'B',n:'Field B (T)'},{id:'L',n:'Length (m)'},{id:'th',n:'Angle θ (°)'}],dv:[{id:'F',n:'Force (N)'},{id:'sin',n:'sinθ'}],all:['Current','Field','Length','Wire material','Temperature','Magnet type','Wire resistance','Angle']},2:{iv:[{id:'N',n:'Turns'},{id:'A',n:'Area (m²)'},{id:'v',n:'Speed'}],dv:[{id:'emf',n:'Peak EMF (V)'},{id:'flux',n:'Flux (Wb)'}],all:['Turns','Area','Magnet strength','Speed','Core material','Resistance','Temperature','Coil shape']},3:{iv:[{id:'w',n:'ω (rad/s)'},{id:'N',n:'Turns'},{id:'B',n:'Field (T)'},{id:'A',n:'Area (m²)'}],dv:[{id:'e0',n:'Peak EMF (V)'},{id:'f',n:'Frequency (Hz)'}],all:['Turns','Field','Area','Load','Wire resistance','Bearing friction','Core','Temperature']},4:{iv:[{id:'N1',n:'Primary N₁'},{id:'N2',n:'Secondary N₂'},{id:'V1',n:'Input V₁ (V)'}],dv:[{id:'V2',n:'Output V₂ (V)'},{id:'I2',n:'Current I₂ (A)'}],all:['Primary turns','Secondary turns','Input voltage','Frequency','Core material','Efficiency','Wire gauge','Load']}};
function getVars(){return SIM_VARS[scene]||SIM_VARS[0];}
var manD=[];
function fmtV(v){return typeof v==='number'?(Math.abs(v)<0.01&&v!==0?v.toExponential(3):parseFloat(v.toFixed(4)).toString()):v;}
function getSimIV(){var iv=$('expIV')?$('expIV').value:'';if(scene===0){return iv==='I'?S.I:(S.probeX>0?Math.sqrt(Math.pow(S.probeX-cW/2,2)+Math.pow(S.probeY-cH/2,2))/100:0);}if(scene===1){if(iv==='I')return S.mI;if(iv==='B')return S.mB;if(iv==='L')return S.mL;return S.mTh;}if(scene===2){if(iv==='N')return S.coilN;return S.coilA;}if(scene===3){if(iv==='w')return S.genW;if(iv==='N')return S.genN;if(iv==='B')return S.genB;return S.genA;}if(scene===4){if(iv==='N1')return S.tN1;if(iv==='N2')return S.tN2;return S.tV1;}return 0;}
function getSimDV(){var dv=$('expDV')?$('expDV').value:'';if(scene===0&&S.probeX>0){var pf=fieldAt(S.probeX,S.probeY);return dv==='B'?pf.mag*1000:Math.atan2(pf.y,pf.x)*180/Math.PI;}if(scene===1){var F=S.mB*S.mI*S.mL*Math.sin(S.mTh*Math.PI/180);return dv==='F'?Math.abs(F):Math.sin(S.mTh*Math.PI/180);}if(scene===2){return dv==='emf'?(S.emfData.length?S.emfData[S.emfData.length-1].v:0):S.lastFlux;}if(scene===3){return dv==='e0'?S.genN*S.genB*S.genA*S.genW:S.genW/(2*Math.PI);}if(scene===4){return dv==='V2'?(S.tAC?S.tV1*S.tN2/S.tN1*S.tEff/100:0):(S.tAC?2*S.tN1/S.tN2*S.tEff/100:0);}return 0;}
function buildExp(){var vs=getVars(),ivSel=$('expIV')?$('expIV').value:vs.iv[0].id,dvSel=$('expDV')?$('expDV').value:vs.dv[0].id;var ivN=vs.iv.find(function(v){return v.id===ivSel;})||vs.iv[0];var dvN=vs.dv.find(function(v){return v.id===dvSel;})||vs.dv[0];var cvItems=vs.all.filter(function(v){return v!==ivN.n&&v!==dvN.n;});
  var h='<div class="exp-panel"><div class="exp-title">Experiment Variables</div><div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:8px"><div class="exp-var"><label class="exp-label iv">IV</label><select class="exp-select" id="expIV" onchange="buildExp()">'+vs.iv.map(function(v){return '<option value="'+v.id+'"'+(v.id===ivSel?' selected':'')+'>'+v.n+'</option>';}).join('')+'</select></div><div class="exp-var"><label class="exp-label dv">DV</label><select class="exp-select" id="expDV" onchange="buildExp()">'+vs.dv.map(function(v){return '<option value="'+v.id+'"'+(v.id===dvSel?' selected':'')+'>'+v.n+'</option>';}).join('')+'</select></div></div>';
  h+='<div class="exp-var"><label class="exp-label cv">Controlled Variables</label><div class="exp-cv-list">';cvItems.forEach(function(v){h+='<label class="exp-cv-item"><input type="checkbox" checked> '+v+'</label>';});h+='</div></div>';
  h+='<div class="exp-var"><label class="exp-label hyp">Hypothesis</label><div class="exp-hypothesis">"If <strong class="iv-hl">'+ivN.n+'</strong> increases, <strong class="dv-hl">'+dvN.n+'</strong> will <select style="font-size:.7rem;border:1px solid var(--border);border-radius:3px;padding:1px 3px"><option>increase</option><option>decrease</option><option>stay constant</option></select>, keeping <strong class="cv-hl">'+cvItems.join(', ')+'</strong> constant."</div></div></div>';
  h+='<div style="display:flex;gap:3px;align-items:end;margin:4px 0"><div style="flex:1"><label style="font-size:.6rem;font-weight:700;color:#2563eb">IV</label><div style="display:flex;gap:2px"><input class="num-input" id="mIV" style="width:100%"><button class="btn btn-s" onclick="if($(\'mIV\'))$(\'mIV\').value=fmtV(getSimIV())" style="font-size:.55rem;padding:2px 4px">Read</button></div></div><div style="flex:1"><label style="font-size:.6rem;font-weight:700;color:#dc2626">DV</label><div style="display:flex;gap:2px"><input class="num-input" id="mDV" style="width:100%"><button class="btn btn-s" onclick="if($(\'mDV\'))$(\'mDV\').value=fmtV(getSimDV())" style="font-size:.55rem;padding:2px 4px">Read</button></div></div><button class="btn btn-p" onclick="addR()" style="font-size:.55rem;padding:3px 5px">+Add</button><button class="btn btn-ok" onclick="if($(\'mIV\'))$(\'mIV\').value=fmtV(getSimIV());if($(\'mDV\'))$(\'mDV\').value=fmtV(getSimDV());addR()" style="font-size:.55rem;padding:3px 5px">Auto</button></div>';
  h+='<div id="mT"></div><div style="display:flex;gap:3px;margin-top:3px"><button class="btn btn-s" onclick="manD=[];buildMT()">Clear</button><button class="btn btn-s" onclick="expCSV()">CSV</button></div>';
  $('expC').innerHTML=h;}
window.addR=function(){var iv=parseFloat($('mIV')?$('mIV').value:0),dv=parseFloat($('mDV')?$('mDV').value:0);if(isNaN(iv)||isNaN(dv))return;manD.push({iv:iv,dv:dv});if($('mIV'))$('mIV').value='';if($('mDV'))$('mDV').value='';buildMT();addN('Data','IV='+fmtV(iv)+', DV='+fmtV(dv),'#'+manD.length);};
function buildMT(){if(!manD.length){if($('mT'))$('mT').innerHTML='';return;}var vs=getVars(),ivN=(vs.iv.find(function(v){return $('expIV')&&v.id===$('expIV').value;})||vs.iv[0]).n,dvN=(vs.dv.find(function(v){return $('expDV')&&v.id===$('expDV').value;})||vs.dv[0]).n;var rows='';manD.forEach(function(d,i){rows+='<tr><td>'+fmtV(d.iv)+'</td><td>'+fmtV(d.dv)+'</td><td><span style="cursor:pointer;color:#EF4444;opacity:.5" onclick="manD.splice('+i+',1);buildMT()">×</span></td></tr>';});if($('mT'))$('mT').innerHTML='<table class="dt"><thead><tr><th>'+ivN+'</th><th>'+dvN+'</th><th></th></tr></thead><tbody>'+rows+'</tbody></table>';}
window.expCSV=function(){if(!manD.length)return;var vs=getVars(),ivN=(vs.iv.find(function(v){return $('expIV')&&v.id===$('expIV').value;})||vs.iv[0]).n,dvN=(vs.dv.find(function(v){return $('expDV')&&v.id===$('expDV').value;})||vs.dv[0]).n;var csv=ivN+','+dvN+'\n';manD.forEach(function(d){csv+=fmtV(d.iv)+','+fmtV(d.dv)+'\n';});var b=new Blob([csv],{type:'text/csv'});var a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='em_data.csv';a.click();};

// IB Questions
var IB=[{c:'State',q:'Define magnetic flux.',f:'<strong>Φ = BA cosθ</strong>. B = field strength, A = area, θ = angle between B and normal. Unit: weber (Wb).'},
{c:'Calculate',q:'A 0.5 m wire carries 3 A ⊥ to 0.2 T. Find F.',f:'F = BIL sin90° = 0.2×3×0.5×1 = <strong>0.30 N</strong>'},
{c:'Calculate',q:'200-turn coil, area 0.04 m², 0.5 T, 50 Hz. Peak EMF?',f:'ω = 2π×50 = 314 rad/s. ε₀ = NBAω = 200×0.5×0.04×314 = <strong>1257 V</strong>'},
{c:'Explain',q:'Why does a magnet slow in a copper tube?',f:'Changing flux → eddy currents (Faraday) → opposing field (Lenz) → retarding force. KE → thermal via I²R.'},
{c:'Calculate',q:'Transformer: 500 primary, 50 secondary, 230 V AC. Output?',f:'V₂ = 230 × 50/500 = <strong>23 V</strong> (step-down)'},
{c:'Explain',q:'Why do transformers only work with AC?',f:'AC → changing flux → dΦ/dt ≠ 0 → EMF induced. DC → constant flux → dΦ/dt = 0 → no EMF. Only transient spike at switch-on.'}];
$('ibL').innerHTML=IB.map(function(q,i){var cls=q.c==='Calculate'?'c':q.c==='Explain'?'e':'s';return '<div class="q-item"><div class="q-header" onclick="$(\'iF'+i+'\').classList.toggle(\'open\');this.querySelector(\'.q-toggle\').textContent=$(\'iF'+i+'\').classList.contains(\'open\')?\'Hide\':\'Show\'"><span class="q-cmd q-cmd-'+cls+'">'+q.c+'</span><span class="q-text">'+q.q+'</span><span class="q-marks">['+(q.c==='State'?1:q.c==='Calculate'?3:3)+']</span><span class="q-toggle">Show</span></div><div class="q-answer" id="iF'+i+'">'+q.f+'</div></div>';}).join('');

// Notebook
var nb=[];function addN(t,d,r){nb.push({t:t,d:d,r:r});$('nbO').innerHTML=nb.map(function(n,i){return '<div class="nb-c"><b>#'+(i+1)+' '+n.t+'</b><br>'+n.d+'<br><span class="nr">'+n.r+'</span></div>';}).join('');}
$('nbO').innerHTML='<p style="text-align:center;color:var(--text3);font-size:.56rem;padding:6px">Record data to log here.</p>';

$('guideBar').innerHTML=SCENES[0].g;buildControls();buildSidebar();buildExp();requestAnimationFrame(animate);
</script>
