<script>
var $=function(i){return document.getElementById(i)},dk=function(){return document.documentElement.dataset.theme==='dark'};
$('themeBtn').onclick=function(){var t=dk()?'light':'dark';document.documentElement.dataset.theme=t;$('themeBtn').textContent=t==='dark'?'🌙':'☀️';localStorage.setItem('phy-theme',t)};
(function(){var t=localStorage.getItem('phy-theme')||'light';document.documentElement.dataset.theme=t;$('themeBtn').textContent=t==='dark'?'🌙':'☀️'})();
var cvs=$('C'),cx=cvs.getContext('2d'),W=0,H=0;
function onR(){var d=window.devicePixelRatio||1,r=cvs.getBoundingClientRect();W=r.width;H=r.height;cvs.width=W*d;cvs.height=H*d;cx.setTransform(d,0,0,d,0,0)}
new ResizeObserver(onR).observe(cvs);

var G_CONST=6.674e-11,sc=0,running=false,speed=1,airOn=false;
var COLS=['#3b82f6','#ef4444','#f59e0b','#a855f7','#22c55e','#f472b6','#06b6d4','#64748b'];
var PLANETS=[{n:'Earth',M:5.972e24,R:6.371e6,g:9.81,col:'#3b82f6'},{n:'Moon',M:7.342e22,R:1.737e6,g:1.62,col:'#94a3b8'},{n:'Mars',M:6.39e23,R:3.389e6,g:3.72,col:'#ef4444'},{n:'Jupiter',M:1.898e27,R:6.991e7,g:24.8,col:'#f97316'}];
var planet=0,frc=0;

// === SCENE 0: Free Fall ===
var drops=[];
function addDrop(name,mass,h,rad,col){drops.push({n:name,m:mass,h:h,y:0,vy:0,landed:false,t:0,rad:rad||0.15,col:col||COLS[drops.length%COLS.length]})}
function resetDrops(){drops=[];addDrop('Ball A',2,100,0.05);addDrop('Ball B',20,100,0.05);running=false}

// === SCENE 1: Projectile ===
var fires=[],fireT=0;
function addFire(angle,v0,mass,col){var rad=angle*Math.PI/180;fires.push({angle:angle,v0:v0,m:mass,x:0,y:0,vx:v0*Math.cos(rad),vy:v0*Math.sin(rad),trail:[],done:false,t:0,col:col||COLS[fires.length%COLS.length]})}
function resetFires(){fires=[];fireT=0;running=false}

// === SCENE 2: Gravitational Force (was Inverse Square) ===
var gfBodies=[],gfRunning=false,gfTime=0,gfDrag={active:false,idx:-1};
var G_EFF=4000;
var SHAPES=['circle','square','triangle'];
function mkGF(x,y,m,col,shape){return{x:x,y:y,m:m,vx:0,vy:0,ax:0,ay:0,r:Math.max(12,Math.sqrt(m)*1.8),col:col||COLS[gfBodies.length%COLS.length],shape:shape||'circle',trail:[]}}
function resetGF(){gfBodies=[mkGF(W*.25||180,H*.45||140,40,'#3b82f6','circle'),mkGF(W*.7||450,H*.45||140,40,'#f59e0b','circle')];gfRunning=false;gfTime=0}

// === SCENE 3: Field ===
var fieldMasses=[],fldDrag={active:false,idx:-1};
function resetField(){fieldMasses=[{x:W/2||300,y:H/2||200,m:1e12,r:18,col:'#3b82f6'}]}

// === SCENE 4: Escape ===
var esc={v0:8000,y:0,vy:0,launched:false,trail:[],maxH:0,phase:'ready',t:0};
function resetEsc(){esc={v0:8000,y:0,vy:0,launched:false,trail:[],maxH:0,phase:'ready',t:0};running=false}

var SCENES=[{n:'🍎 Free Fall'},{n:'🎯 Projectile'},{n:'⚡ Grav. Force'},{n:'🧲 Field'},{n:'🚀 Escape'}];

// === ARROW UTILITY ===
function drawArrow(x1,y1,x2,y2,col,a,lw){
  cx.save();cx.globalAlpha=a||1;cx.strokeStyle=col;cx.fillStyle=col;cx.lineWidth=lw||1.5;
  cx.beginPath();cx.moveTo(x1,y1);cx.lineTo(x2,y2);cx.stroke();
  var ang=Math.atan2(y2-y1,x2-x1),hl=Math.max(4,Math.min(8,(lw||1.5)*3));
  cx.beginPath();cx.moveTo(x2,y2);cx.lineTo(x2-hl*Math.cos(ang-0.45),y2-hl*Math.sin(ang-0.45));cx.lineTo(x2-hl*Math.cos(ang+0.45),y2-hl*Math.sin(ang+0.45));cx.closePath();cx.fill();
  cx.restore()
}
function drawShape(x,y,r,shape,col){
  cx.fillStyle=col;cx.beginPath();
  if(shape==='square'){cx.rect(x-r,y-r,r*2,r*2)}
  else if(shape==='triangle'){cx.moveTo(x,y-r);cx.lineTo(x-r,y+r);cx.lineTo(x+r,y+r);cx.closePath()}
  else{cx.arc(x,y,r,0,Math.PI*2)}
  cx.fill()
}

// === CANVAS INTERACTION ===
function getXY(e){var r=cvs.getBoundingClientRect();var cx2=e.touches?e.touches[0].clientX:e.clientX,cy2=e.touches?e.touches[0].clientY:e.clientY;return{x:(cx2-r.left)*(W/r.width),y:(cy2-r.top)*(H/r.height)}}
function onDown(e){
  e.preventDefault();var p=getXY(e);
  if(sc===2){for(var i=gfBodies.length-1;i>=0;i--){var m=gfBodies[i];if(Math.hypot(p.x-m.x,p.y-m.y)<m.r+10){gfDrag={active:true,idx:i};return}}}
  if(sc===3){for(var i=fieldMasses.length-1;i>=0;i--){var m=fieldMasses[i];if(Math.hypot(p.x-m.x,p.y-m.y)<m.r+10){fldDrag={active:true,idx:i};return}}fieldMasses.push({x:p.x,y:p.y,m:5e11,r:14,col:COLS[fieldMasses.length%COLS.length]});buildUI()}
}
function onMove(e){
  if(!gfDrag.active&&!fldDrag.active)return;e.preventDefault();var p=getXY(e);
  if(sc===2&&gfDrag.active){gfBodies[gfDrag.idx].x=p.x;gfBodies[gfDrag.idx].y=p.y}
  if(sc===3&&fldDrag.active){fieldMasses[fldDrag.idx].x=p.x;fieldMasses[fldDrag.idx].y=p.y}
}
function onUp(){gfDrag.active=false;fldDrag.active=false}
cvs.addEventListener('mousedown',onDown);cvs.addEventListener('mousemove',onMove);cvs.addEventListener('mouseup',onUp);
cvs.addEventListener('touchstart',onDown,{passive:false});cvs.addEventListener('touchmove',onMove,{passive:false});cvs.addEventListener('touchend',onUp);

// === PAINT ===
function paint(){
  if(!W||!H)return;var d=dk();cx.clearRect(0,0,W,H);
  cx.fillStyle=d?'#0f172a':'#f0f4f8';cx.fillRect(0,0,W,H);
  var pl=PLANETS[planet],grav=pl.g;

  // ====== SCENE 0: FREE FALL ======
  if(sc===0){
    var groundY=H*.85,scaleLeft=36;
    // Sky + ground
    var sky=cx.createLinearGradient(0,0,0,groundY);sky.addColorStop(0,d?'#0a1628':'#87ceeb');sky.addColorStop(1,d?'#1a2744':'#b0d4f1');cx.fillStyle=sky;cx.fillRect(0,0,W,groundY);
    cx.fillStyle=d?'#1e3a1e':'#8fbc8f';cx.fillRect(0,groundY,W,H-groundY);

    var maxH=10;drops.forEach(function(o){if(o.h>maxH)maxH=o.h});
    var scale=(groundY-30)/maxH;

    // Height scale ruler on left
    cx.strokeStyle=d?'#94a3b8':'#475569';cx.lineWidth=1.5;
    cx.beginPath();cx.moveTo(scaleLeft,groundY);cx.lineTo(scaleLeft,groundY-maxH*scale);cx.stroke();
    var interval=maxH>300?100:maxH>100?50:maxH>30?10:5;
    cx.fillStyle=d?'#94a3b8':'#64748b';cx.font='bold 7px var(--mono)';cx.textAlign='right';
    for(var hh=0;hh<=maxH;hh+=interval){
      var ty=groundY-hh*scale;
      cx.beginPath();cx.moveTo(scaleLeft-4,ty);cx.lineTo(scaleLeft+4,ty);cx.stroke();
      cx.fillText(hh+'m',scaleLeft-6,ty+3);
    }

    // Physics
    if(running){var dt=0.016*speed;drops.forEach(function(o){
      if(o.landed)return;
      o.t+=dt;
      var dragAcc=0;
      if(airOn){var area=Math.PI*o.rad*o.rad,Cd=0.47,rho=1.225;var Fd=0.5*Cd*rho*area*o.vy*Math.abs(o.vy);dragAcc=Fd/o.m}
      o.vy+=(grav-dragAcc)*dt;
      o.y+=o.vy*dt;
      if(o.y>=o.h){o.y=o.h;o.vy=Math.sqrt(2*grav*o.h);o.landed=true}
    })}

    // Draw objects
    var spacing=Math.min(100,(W-scaleLeft-40)/Math.max(drops.length,1));
    drops.forEach(function(o,i){
      var bx=scaleLeft+50+i*spacing,by=groundY-(o.h-o.y)*scale;
      var ballR=Math.max(8,Math.min(18,o.m*0.4+6));

      // Timer above each object
      cx.fillStyle=o.col;cx.font='bold 10px var(--mono)';cx.textAlign='center';
      cx.fillText('t = '+o.t.toFixed(2)+'s',bx,Math.max(18,by-ballR-22));

      // Velocity arrow
      if(o.vy>0.5&&!o.landed){var arLen=Math.min(45,o.vy*2);drawArrow(bx,by+ballR+2,bx,by+ballR+2+arLen,'#ef4444',0.7,2)}

      // Ball
      cx.fillStyle=o.col;cx.beginPath();cx.arc(bx,by,ballR,0,Math.PI*2);cx.fill();
      cx.fillStyle='#fff';cx.font='bold 6px var(--mono)';cx.textAlign='center';cx.fillText(o.m+'kg',bx,by+2);

      // Name + height line
      cx.fillStyle=o.col;cx.font='bold 8px var(--body)';cx.fillText(o.n,bx,Math.max(14,by-ballR-10));

      // Drop height reference line
      var startY=groundY-o.h*scale;
      cx.setLineDash([2,3]);cx.strokeStyle=o.col+'40';cx.lineWidth=1;
      cx.beginPath();cx.moveTo(bx,startY);cx.lineTo(bx,groundY);cx.stroke();cx.setLineDash([]);
      cx.fillStyle=o.col+'80';cx.font='6px var(--mono)';cx.fillText('h='+o.h+'m',bx,startY-4);

      // Speed readout below ground
      cx.fillStyle=d?'#94a3b8':'#475569';cx.font='7px var(--mono)';
      cx.fillText('v='+o.vy.toFixed(1)+' m/s',bx,groundY+12);
      if(o.landed){cx.fillStyle=d?'#22c55e':'#16a34a';cx.font='bold 7px var(--mono)';cx.fillText('LANDED',bx,groundY+22)}
    });

    // Header
    cx.fillStyle=d?'#e2e8f0':'#1e293b';cx.font='bold 11px var(--serif)';cx.textAlign='left';
    cx.fillText(pl.n+': g = '+grav+' m/s²'+(airOn?' [AIR ON — drag depends on mass]':' [VACUUM — all fall same]'),scaleLeft+10,16);
    cx.fillStyle=d?'#94a3b8':'#64748b';cx.font='8px var(--mono)';
    cx.fillText('g = GM/R² = '+grav+' m/s²    (independent of object mass)',scaleLeft+10,H-6);
  }

  // ====== SCENE 1: PROJECTILE ======
  if(sc===1){
    var groundY=H*.85;
    var sky=cx.createLinearGradient(0,0,0,groundY);sky.addColorStop(0,d?'#0a1628':'#87ceeb');sky.addColorStop(1,d?'#1a2744':'#b0d4f1');cx.fillStyle=sky;cx.fillRect(0,0,W,groundY);
    cx.fillStyle=d?'#1e3a1e':'#8fbc8f';cx.fillRect(0,groundY,W,H-groundY);
    cx.strokeStyle=d?'#94a3b8':'#475569';cx.lineWidth=4;cx.beginPath();cx.moveTo(30,groundY);cx.lineTo(30+25*Math.cos(45*Math.PI/180),groundY-25*Math.sin(45*Math.PI/180));cx.stroke();
    if(running){var dt=0.016*speed;fireT+=dt;fires.forEach(function(f){if(f.done)return;f.t+=dt;
      if(airOn){var spd=Math.sqrt(f.vx*f.vx+f.vy*f.vy);if(spd>0){var Fd=0.5*0.47*1.225*0.01*spd;f.vx-=Fd*f.vx/spd*dt/f.m;f.vy-=Fd*f.vy/spd*dt/f.m}}
      f.vy-=grav*dt;f.x+=f.vx*dt;f.y+=f.vy*dt;f.trail.push({x:f.x,y:f.y});if(f.y<0){f.y=0;f.done=true}
    })}
    var maxR=50,maxHp=20;fires.forEach(function(f){f.trail.forEach(function(p){if(p.x>maxR)maxR=p.x;if(p.y>maxHp)maxHp=p.y})});
    var sx=W*.85/maxR,sy=groundY*.7/maxHp,s=Math.min(sx,sy),ox=30,oy=groundY;
    fires.forEach(function(f){
      if(f.trail.length>1){cx.strokeStyle=f.col;cx.lineWidth=1.5;cx.beginPath();f.trail.forEach(function(p,j){var px=ox+p.x*s,py=oy-p.y*s;j===0?cx.moveTo(px,py):cx.lineTo(px,py)});cx.stroke()}
      var bx=ox+f.x*s,by=oy-f.y*s;cx.fillStyle=f.col;cx.beginPath();cx.arc(bx,Math.min(by,oy),5,0,Math.PI*2);cx.fill();
      cx.fillStyle=f.col;cx.font='7px var(--mono)';cx.textAlign='left';cx.fillText(f.angle+'° '+f.m+'kg t='+f.t.toFixed(1)+'s',bx+8,Math.min(by,oy)-4);
      if(f.done)cx.fillText('Range: '+f.x.toFixed(1)+'m',bx+8,Math.min(by,oy)+8);
    });
    cx.fillStyle=d?'#e2e8f0':'#1e293b';cx.font='bold 11px var(--serif)';cx.textAlign='left';
    cx.fillText('Projectile on '+pl.n+(airOn?' [AIR]':''),8,16);
  }

  // ====== SCENE 2: GRAVITATIONAL FORCE ======
  if(sc===2){
    // Physics: N-body attraction
    if(gfRunning){
      var dt=0.016*speed;gfTime+=dt;
      // Reset accelerations
      gfBodies.forEach(function(b){b.ax=0;b.ay=0});
      // Compute pairwise forces
      for(var i=0;i<gfBodies.length;i++){for(var j=i+1;j<gfBodies.length;j++){
        var bi=gfBodies[i],bj=gfBodies[j];
        var dx=bj.x-bi.x,dy=bj.y-bi.y,dist=Math.max(bi.r+bj.r,Math.hypot(dx,dy));
        var F=G_EFF*bi.m*bj.m/(dist*dist);
        var nx=dx/dist,ny=dy/dist;
        bi.ax+=F/bi.m*nx;bi.ay+=F/bi.m*ny;
        bj.ax-=F/bj.m*nx;bj.ay-=F/bj.m*ny;
      }}
      gfBodies.forEach(function(b){
        b.vx+=b.ax*dt;b.vy+=b.ay*dt;b.x+=b.vx*dt;b.y+=b.vy*dt;
        // Bounce off walls
        if(b.x<b.r){b.x=b.r;b.vx*=-0.5}if(b.x>W-b.r){b.x=W-b.r;b.vx*=-0.5}
        if(b.y<b.r){b.y=b.r;b.vy*=-0.5}if(b.y>H-b.r){b.y=H-b.r;b.vy*=-0.5}
        b.trail.push({x:b.x,y:b.y});if(b.trail.length>400)b.trail.shift();
      });
    }

    // Draw trails
    gfBodies.forEach(function(b){
      if(b.trail.length>1){cx.strokeStyle=b.col+'30';cx.lineWidth=1;cx.beginPath();b.trail.forEach(function(p,j){j===0?cx.moveTo(p.x,p.y):cx.lineTo(p.x,p.y)});cx.stroke()}
    });

    // Draw force arrows between all pairs
    for(var i=0;i<gfBodies.length;i++){for(var j=i+1;j<gfBodies.length;j++){
      var bi=gfBodies[i],bj=gfBodies[j];
      var dx=bj.x-bi.x,dy=bj.y-bi.y,dist=Math.hypot(dx,dy)||1;
      var F=G_EFF*bi.m*bj.m/(dist*dist);
      var fLen=Math.min(50,F*0.3);var nx=dx/dist,ny=dy/dist;
      // Dashed line between
      cx.setLineDash([3,3]);cx.strokeStyle=d?'rgba(148,163,184,.15)':'rgba(0,0,0,.06)';cx.lineWidth=1;
      cx.beginPath();cx.moveTo(bi.x,bi.y);cx.lineTo(bj.x,bj.y);cx.stroke();cx.setLineDash([]);
      // Distance label
      cx.fillStyle=d?'#94a3b8':'#64748b';cx.font='7px var(--mono)';cx.textAlign='center';
      cx.fillText('r='+dist.toFixed(0)+'px  F='+(F).toFixed(1),(bi.x+bj.x)/2,(bi.y+bj.y)/2-6);
      // Force arrows toward each other
      drawArrow(bi.x,bi.y,bi.x+nx*fLen,bi.y+ny*fLen,'#ef4444',0.8,2.5);
      drawArrow(bj.x,bj.y,bj.x-nx*fLen,bj.y-ny*fLen,'#ef4444',0.8,2.5);
    }}

    // Draw bodies
    gfBodies.forEach(function(b,i){
      drawShape(b.x,b.y,b.r,b.shape,b.col);
      cx.fillStyle='#fff';cx.font='bold 7px var(--mono)';cx.textAlign='center';cx.fillText('m'+(i+1),b.x,b.y+3);
      // Velocity arrow
      var spd=Math.hypot(b.vx,b.vy);
      if(spd>0.5){var vLen=Math.min(40,spd*0.8);drawArrow(b.x,b.y,b.x+b.vx/spd*vLen,b.y+b.vy/spd*vLen,'#22c55e',0.6,1.5)}
    });

    cx.fillStyle=d?'#e2e8f0':'#1e293b';cx.font='bold 10px var(--serif)';cx.textAlign='left';
    cx.fillText('F = Gm₁m₂/r² — Gravitational Force'+(gfRunning?' [SIMULATING t='+gfTime.toFixed(1)+'s]':' [PAUSED — drag to position]'),8,14);
    cx.fillStyle=d?'#94a3b8':'#64748b';cx.font='8px var(--mono)';
    cx.fillText('Red arrows = gravitational force (equal & opposite). Green = velocity.',8,H-6);
  }

  // ====== SCENE 3: FIELD ======
  if(sc===3){
    // Collect all magnitudes to normalize color
    var step=Math.max(18,Math.min(28,W/22)),allMags=[];
    for(var gx=step/2;gx<W;gx+=step){for(var gy=step/2;gy<H;gy+=step){
      var fx=0,fy=0;
      fieldMasses.forEach(function(m){var ddx=m.x-gx,ddy=m.y-gy,dr=Math.hypot(ddx,ddy);if(dr<m.r+4)return;var gF=m.m/(dr*dr)*1e-6;fx+=ddx/dr*gF;fy+=ddy/dr*gF});
      var mag=Math.sqrt(fx*fx+fy*fy);allMags.push({gx:gx,gy:gy,fx:fx,fy:fy,mag:mag});
    }}
    var minMag=1e9,maxMag=0;allMags.forEach(function(a){if(a.mag>0.01){if(a.mag<minMag)minMag=a.mag;if(a.mag>maxMag)maxMag=a.mag}});
    if(maxMag<0.01)maxMag=1;if(minMag>=maxMag)minMag=maxMag*0.01;
    var logMin=Math.log(minMag),logMax=Math.log(maxMag),logRange=logMax-logMin||1;
    allMags.forEach(function(a){
      if(a.mag<0.01)return;
      var t=Math.max(0,Math.min(1,(Math.log(a.mag)-logMin)/logRange));
      var len=Math.max(5,step*0.3+t*step*0.6);
      var nx2=a.fx/a.mag,ny2=a.fy/a.mag;
      var alpha=0.4+t*0.5;
      var r2,g2,b2;
      if(t<0.33){var s=t/0.33;r2=Math.floor(20+30*s);g2=Math.floor(80+175*s);b2=Math.floor(220+35*s)}
      else if(t<0.66){var s=(t-0.33)/0.33;r2=Math.floor(50+205*s);g2=Math.floor(255-55*s);b2=Math.floor(255-255*s)}
      else{var s=(t-0.66)/0.34;r2=255;g2=Math.floor(200-200*s);b2=0}
      var col='rgba('+r2+','+g2+','+b2+','+alpha+')';
      var lw=1+t*1.8;
      drawArrow(a.gx-nx2*len*0.3,a.gy-ny2*len*0.3,a.gx+nx2*len*0.7,a.gy+ny2*len*0.7,col,alpha,lw);
    });
    fieldMasses.forEach(function(m,i){
      cx.fillStyle=m.col;cx.beginPath();cx.arc(m.x,m.y,m.r,0,Math.PI*2);cx.fill();
      cx.fillStyle='#fff';cx.font='bold 8px var(--mono)';cx.textAlign='center';cx.fillText('M'+(i+1),m.x,m.y+3);
    });
    // Color legend
    var lgX=W-120,lgY=14,lgW=100,lgH=6;
    for(var li=0;li<lgW;li++){var lt=li/lgW,lr,lg,lb;
      if(lt<0.33){var ls=lt/0.33;lr=Math.floor(20+30*ls);lg=Math.floor(80+175*ls);lb=Math.floor(220+35*ls)}
      else if(lt<0.66){var ls=(lt-0.33)/0.33;lr=Math.floor(50+205*ls);lg=Math.floor(255-55*ls);lb=Math.floor(255-255*ls)}
      else{var ls=(lt-0.66)/0.34;lr=255;lg=Math.floor(200-200*ls);lb=0}
      cx.fillStyle='rgb('+lr+','+lg+','+lb+')';cx.fillRect(lgX+li,lgY,1,lgH);
    }
    cx.fillStyle=d?'#94a3b8':'#475569';cx.font='bold 5px var(--mono)';cx.textAlign='left';cx.fillText('WEAK',lgX,lgY+lgH+7);cx.textAlign='right';cx.fillText('STRONG',lgX+lgW,lgY+lgH+7);cx.textAlign='center';cx.fillText('FIELD STRENGTH',lgX+lgW/2,lgY-2);
    cx.fillStyle=d?'#e2e8f0':'#1e293b';cx.font='bold 10px var(--serif)';cx.textAlign='left';
    cx.fillText('g = GM/r² — Click to add masses. Drag to move.',8,14);
    cx.fillStyle=d?'#94a3b8':'#64748b';cx.font='8px var(--mono)';
    cx.fillText(fieldMasses.length+' mass'+(fieldMasses.length>1?'es':'')+'. Arrow length & color ∝ field strength.',8,H-6);
  }

  // ====== SCENE 4: ESCAPE ======
  if(sc===4){
    var b=PLANETS[planet],vEsc=Math.sqrt(2*G_CONST*b.M/b.R);
    var groundY=H*.82;
    cx.fillStyle=b.col+'15';cx.beginPath();cx.arc(W*.35,groundY+W*2,W*2,0,Math.PI*2);cx.fill();
    cx.strokeStyle=b.col+'30';cx.lineWidth=2;cx.beginPath();cx.arc(W*.35,groundY+W*2,W*2,-Math.PI*.05,-Math.PI*.95,true);cx.stroke();
    if(running&&esc.launched){
      var dt2=speed;esc.t+=dt2;
      var g2=G_CONST*b.M/Math.pow(b.R+esc.y,2);
      esc.vy-=g2*dt2;esc.y+=esc.vy*dt2;
      esc.maxH=Math.max(esc.maxH,esc.y);
      if(esc.vy<0&&esc.y<=0){esc.y=0;esc.vy=0;esc.phase='fallen';esc.launched=false;running=false}
      if(esc.y>b.R*3){esc.phase='escaped';esc.launched=false;running=false}
      esc.trail.push({y:esc.y,vy:esc.vy});if(esc.trail.length>300)esc.trail.shift();
    }
    var scale2=groundY*.7/Math.max(esc.maxH+100,b.R*.3);
    var rktX=W*.35,rktY=groundY-esc.y*scale2;
    cx.fillStyle=d?'#e2e8f0':'#1e293b';cx.beginPath();cx.moveTo(rktX,rktY-10);cx.lineTo(rktX-7,rktY+8);cx.lineTo(rktX+7,rktY+8);cx.closePath();cx.fill();
    if(esc.launched&&esc.vy>0){cx.fillStyle='#f97316';cx.beginPath();cx.moveTo(rktX-5,rktY+8);cx.lineTo(rktX,rktY+18+Math.random()*8);cx.lineTo(rktX+5,rktY+8);cx.fill()}
    esc.trail.forEach(function(t2,i){var ty2=groundY-t2.y*scale2;cx.fillStyle='rgba(56,189,248,'+(i/esc.trail.length*.2)+')';cx.fillRect(rktX+12,ty2,2,1)});
    var curV=Math.abs(esc.vy),curR=b.R+esc.y;
    var KE=0.5*curV*curV,PE=G_CONST*b.M/curR,maxE2=0.5*vEsc*vEsc;
    var ebX=W*.6,ebY=H*.1,ebW=25,ebH=H*.55,base2=ebY+ebH;
    cx.fillStyle=d?'rgba(15,23,42,.4)':'rgba(255,255,255,.3)';cx.beginPath();cx.roundRect(ebX-6,ebY-14,100,ebH+26,5);cx.fill();
    cx.fillStyle=d?'#94a3b8':'#475569';cx.font='bold 7px var(--serif)';cx.textAlign='center';cx.fillText('Energy',ebX+38,ebY-4);
    var keH=Math.min(ebH,(KE/maxE2)*ebH);cx.fillStyle='#ef4444';cx.fillRect(ebX,base2-keH,ebW,keH);
    var peH=Math.min(ebH,(PE/maxE2)*ebH);cx.fillStyle='#60a5fa';cx.fillRect(ebX+ebW+6,base2-peH,ebW,peH);
    cx.fillStyle=d?'#e2e8f0':'#1e293b';cx.font='5px var(--mono)';cx.fillText('KE',ebX+ebW/2,base2+8);cx.fillText('|GPE|',ebX+ebW+6+ebW/2,base2+8);
    cx.fillStyle=d?'#e2e8f0':'#1e293b';cx.font='bold 11px var(--serif)';cx.textAlign='left';
    cx.fillText(b.n+': v_esc = '+(vEsc/1000).toFixed(1)+' km/s',8,16);
    cx.fillStyle=d?'#94a3b8':'#475569';cx.font='9px var(--mono)';
    cx.fillText('v₀ = '+(esc.v0/1000).toFixed(1)+' km/s | Height: '+(esc.y/1000).toFixed(1)+' km | Speed: '+(curV/1000).toFixed(2)+' km/s',8,32);
    var bound=esc.v0<vEsc;cx.fillStyle=bound?(d?'#f59e0b':'#d97706'):(d?'#22c55e':'#16a34a');cx.font='bold 10px var(--serif)';
    cx.fillText(esc.phase==='escaped'?'ESCAPED! (unbound)':esc.phase==='fallen'?'Fell back (bound)':bound?'Below v_esc — will fall back':'Above v_esc — will escape!',8,H-8);
  }
}

function render(){requestAnimationFrame(render);if(!W)return;paint();if((running||gfRunning)&&++frc%6===0)buildRP()}

  }else if(sc===1){
    h='<div class="cr">';PLANETS.forEach(function(b,i){h+='<div class="pill'+(i===planet?' on':'')+'" onclick="planet='+i+';buildUI()">'+b.n+'</div>'});
    h+='</div><div class="cr">'+
    '<div class="sr"><span>θ</span><input type="range" min="5" max="85" value="45" id="pjAng" oninput="$(\'pjAngV\').textContent=this.value+\'°\'"><span class="sv" id="pjAngV">45°</span></div>'+
    '<div class="sr"><span>v₀</span><input type="range" min="5" max="100" value="30" id="pjV0" oninput="$(\'pjV0V\').textContent=this.value"><span class="sv" id="pjV0V">30</span></div>'+
    '<div class="sr"><span>m</span><input type="range" min="1" max="50" value="5" id="pjM" oninput="$(\'pjMV\').textContent=this.value+\'kg\'"><span class="sv" id="pjMV">5kg</span></div>'+
    '<div class="pill'+(airOn?' on':'')+'" onclick="airOn=!airOn;buildUI()">Air '+(airOn?'ON':'OFF')+'</div>'+
    '<button class="btn btn-a" onclick="firePJ()">🔥 Fire!</button>'+
    '<button class="btn btn-o" onclick="running=!running;buildUI()">'+(running?'⏸':'▶')+'</button>'+
    '<button class="btn btn-e" onclick="resetFires();buildUI()">Erase All</button></div>';
  }else if(sc===2){
    h='<div id="gfList">';
    gfBodies.forEach(function(b,i){
      h+='<div class="obj-row"><span style="color:'+b.col+';font-weight:700">m'+(i+1)+'</span>'+
      '<div class="sr"><span>Mass</span><input type="range" min="5" max="100" value="'+b.m+'" oninput="gfBodies['+i+'].m=+this.value;gfBodies['+i+'].r=Math.max(12,Math.sqrt(this.value)*1.8);this.nextElementSibling.textContent=this.value"><span class="sv">'+b.m+'</span></div>'+
      '<select style="font-size:.6rem;padding:1px 3px;border-radius:4px;border:1px solid var(--border)" onchange="gfBodies['+i+'].shape=this.value"><option value="circle"'+(b.shape==='circle'?' selected':'')+'>●</option><option value="square"'+(b.shape==='square'?' selected':'')+'>■</option><option value="triangle"'+(b.shape==='triangle'?' selected':'')+'>▲</option></select>'+
      (gfBodies.length>1?'<span style="cursor:pointer;color:var(--err);font-weight:700" onclick="gfBodies.splice('+i+',1);buildUI()">✕</span>':'')+'</div>';
    });
    h+='</div><div class="cr">'+
    '<button class="btn btn-t" onclick="gfBodies.push(mkGF(W*.5+Math.random()*80-40,H*.3+Math.random()*60,30));buildUI()">+ Add Object</button>'+
    '<button class="btn btn-a" onclick="gfRunning=true;running=true;buildUI()">▶ Simulate</button>'+
    '<button class="btn btn-o" onclick="gfRunning=false;running=false;buildUI()">⏸ Pause</button>'+
    '<button class="btn btn-o" onclick="resetGF();buildUI()">↺ Reset</button></div>'+
    '<div style="font-size:.56rem;color:var(--text3)">Drag objects to position when paused. Press Simulate to watch gravitational attraction.</div>';
  }else if(sc===3){
    h='<div class="cr"><span style="font-size:.64rem;color:var(--text2);font-weight:700">Click canvas to add mass. Drag to reposition.</span>'+
    '<button class="btn btn-e" onclick="if(fieldMasses.length>1)fieldMasses.pop()">Remove Last</button>'+
    '<button class="btn btn-o" onclick="resetField();buildUI()">Reset</button></div>';
    fieldMasses.forEach(function(m,i){
      h+='<div class="obj-row"><span style="color:'+m.col+';font-weight:700">M'+(i+1)+'</span>'+
      '<div class="sr"><span>Mass</span><input type="range" min="1e11" max="5e12" step="1e11" value="'+m.m+'" oninput="fieldMasses['+i+'].m=+this.value;this.nextElementSibling.textContent=(this.value/1e11).toFixed(0)+\'×10¹¹\'"><span class="sv">'+(m.m/1e11).toFixed(0)+'×10¹¹</span></div>'+
      '<div class="sr"><span>Size</span><input type="range" min="8" max="36" step="1" value="'+m.r+'" oninput="fieldMasses['+i+'].r=+this.value;this.nextElementSibling.textContent=this.value+\'px\'"><span class="sv">'+m.r+'px</span></div>'+
      (fieldMasses.length>1?'<span style="cursor:pointer;color:var(--err);font-weight:700;font-size:.8rem" onclick="fieldMasses.splice('+i+',1);buildUI()">✕</span>':'')+'</div>';
    });
  }else if(sc===4){
    var vEsc=Math.sqrt(2*G_CONST*PLANETS[planet].M/PLANETS[planet].R);
    h='<div class="cr">';PLANETS.forEach(function(b,i){h+='<div class="pill'+(i===planet?' on':'')+'" onclick="planet='+i+';resetEsc();buildUI()">'+b.n+'</div>'});
    h+='</div><div class="cr">'+
    '<div class="sr"><span style="font-weight:700">v₀</span><input type="range" min="1000" max="'+(vEsc*1.5).toFixed(0)+'" step="100" value="'+esc.v0+'" oninput="esc.v0=+this.value;$(\'escV\').textContent=(esc.v0/1000).toFixed(1)+\' km/s\'"><span class="sv" id="escV">'+(esc.v0/1000).toFixed(1)+' km/s</span></div>'+
    '<button class="btn btn-a" onclick="esc.launched=true;esc.vy=esc.v0;esc.y=0;esc.trail=[];esc.maxH=0;esc.phase=\'flying\';esc.t=0;running=true">🚀 Launch</button>'+
    '<button class="btn btn-o" onclick="running=!running">'+(running?'⏸':'▶')+'</button>'+
    '<button class="btn btn-o" onclick="resetEsc()">↺</button></div>'+
    '<div class="cr" style="font-size:.6rem"><span style="color:var(--ok);font-weight:700">v_esc = '+(vEsc/1000).toFixed(1)+' km/s = √(2GM/R)</span></div>';
  }
  $('ctrl').innerHTML=h;
  buildRP();buildExp();

var IB=[
  {c:'State',q:'State Newton\'s law of universal gravitation.',f:'Every mass attracts every other mass with force F = GMm/r², proportional to the product of masses and inversely proportional to the square of distance.'},
  {c:'Calculate',q:'Find g at Earth\'s surface. G=6.67×10⁻¹¹, M=5.97×10²⁴, R=6.37×10⁶.',f:'g = GM/R² = 6.67×10⁻¹¹ × 5.97×10²⁴ / (6.37×10⁶)² = 9.81 m/s²'},
  {c:'Explain',q:'A feather and hammer dropped on the Moon land together. Explain.',f:'No air on Moon → no drag. All objects fall at g = GM/R² regardless of mass. Mass cancels: a = GM/R².'},
  {c:'Calculate',q:'Find Earth\'s escape velocity.',f:'v_esc = √(2GM/R) = √(2×6.67×10⁻¹¹×5.97×10²⁴/6.37×10⁶) = 11,180 m/s ≈ 11.2 km/s'},
  {c:'Explain',q:'Why does projectile range decrease with air resistance?',f:'Drag F = ½CρAv² opposes motion, removing KE. Range and height both decrease. Trajectory becomes asymmetric.'},
  {c:'Deduce',q:'Show g = a (field strength = acceleration).',f:'F = GMm/r² and F = ma. So ma = GMm/r² → a = GM/r² = g. Field strength IS free-fall acceleration.'}
];
function buildIB(){$('ibL').innerHTML=IB.map(function(q,i){return'<div class="ib-card"><div class="ib-cmd">'+q.c+'</div><h4>Q'+(i+1)+'</h4><p>'+q.q+'</p><textarea id="ib'+i+'"></textarea><button class="btn btn-a" style="margin-top:2px;font-size:.56rem" onclick="sF('+i+')">Show Answer</button><div class="ib-fb" id="iF'+i+'"></div></div>'}).join('');window.sF=function(i){$('iF'+i).className='ib-fb show ok';$('iF'+i).textContent=IB[i].f;addN('📝 Q'+(i+1),IB[i].q,IB[i].f)}}
var nb=[];function addN(t2,d,r){nb.push({t:t2,d:d,r:r});showN()}
function showN(){$('nbO').innerHTML=nb.length?nb.map(function(n,i){return'<div style="background:var(--surface);border:1px solid var(--border);border-radius:5px;padding:3px 5px;margin-bottom:2px;font-size:.6rem"><b style="color:var(--accent)">#'+(i+1)+' '+n.t+'</b><br>'+n.d+'<br><span style="color:var(--ok);font-weight:700">→ '+n.r+'</span></div>'}).join(''):'<p style="text-align:center;color:var(--text3);font-size:.6rem;padding:6px">Record observations here.</p>'}
showN();
window.bts=function(el,i){document.querySelectorAll('.bt').forEach(function(t2){t2.classList.remove('on')});document.querySelectorAll('.btc').forEach(function(t2){t2.classList.remove('on')});el.classList.add('on');$('b'+i).classList.add('on');if(i===1)setTimeout(function(){initGr();drawGr()},80)};

onR();resetDrops();resetGF();resetField();buildUI();buildIB();render();
window.addEventListener('resize',onR);
</script>
</body>
</html>
