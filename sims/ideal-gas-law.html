<script>
const $=id=>document.getElementById(id);
const R_GAS = 8.314;
const k_B = 1.381e-23;

// ========== SCENES ==========
const SCENES = [
  {n:'What is Pressure?',short:'Pressure'},
  {n:"Boyle's Law",short:'Boyle'},
  {n:"Charles's Law",short:'Charles'},
  {n:"Gay-Lussac's Law",short:"Gay-Lussac"},
  {n:'Ideal Gas Law',short:'PV=nRT'},
  {n:'Maxwell-Boltzmann',short:'MB Dist'},
  {n:'Thermo Processes',short:'Thermo'}
];
let scene = 0;

$('modes').innerHTML = SCENES.map((s,i)=>`<div class="mode-btn${i===0?' on':''}" onclick="setScene(${i})">${s.short}</div>`).join('');

window.setScene = i => {
  scene = i;
  document.querySelectorAll('.mode-btn').forEach((b,j)=>b.classList.toggle('on',j===i));
  initScene();
};

// ========== SIM STATE ==========
let S = {
  T: 300, n: 80, boxW: 400, boxH: 300, pistonY: 50,
  paused: false, speed: 1, graphType: 'PV',
  lockV: false, lockP: false, lockT: false,
  constP: false, constP_target: 0, adiabatic: false,
  particles: [], collisions: 0, frames: 0,
  graphData: [], thermoPath: [],
  molarMass: 0.028
};

function getVolume() { return (S.boxH - S.pistonY) * S.boxW * 0.1; } // arbitrary units -> m^3 scale
function getPressure() {
  const V = getVolume();
  if(V <= 0) return 0;
  return S.n * R_GAS * S.T / (V * 100);
}
function getAvgKE() { return 1.5 * k_B * S.T; }
function getRMSSpeed() { return Math.sqrt(3 * R_GAS * S.T / (S.molarMass * 1000)); }

// ========== PARTICLES ==========
function initParticles() {
  S.particles = [];
  const speedScale = Math.sqrt(S.T / 300) * 3;
  for(let i = 0; i < S.n; i++) {
    const angle = Math.random() * Math.PI * 2;
    const spd = (0.5 + Math.random() * 1.5) * speedScale;
    S.particles.push({
      x: S.pistonY + 10 + Math.random() * (S.boxH - S.pistonY - 20),
      y: 10 + Math.random() * (S.boxW - 20),
      vx: Math.cos(angle) * spd,
      vy: Math.sin(angle) * spd,
      r: 3
    });
  }
  S.collisions = 0; S.frames = 0;
}

function speedToColor(spd) {
  const maxSpd = Math.sqrt(S.T / 300) * 6;
  const t = Math.min(spd / maxSpd, 1);
  if(t < 0.33) return `rgb(${Math.floor(60+t*3*140)},${Math.floor(120+t*3*135)},255)`;
  if(t < 0.66) { const t2=(t-0.33)*3; return `rgb(255,${Math.floor(255-t2*180)},${Math.floor(255-t2*255)})`; }
  const t3=(t-0.66)*3; return `rgb(255,${Math.floor(75-t3*75)},0)`;
}

function stepParticles() {
  const steps = Math.max(1, Math.round(S.speed));
  for(let s = 0; s < steps; s++) {
    const top = S.pistonY + 3, bot = S.boxH - 3, left = 3, right = S.boxW - 3;
    for(const p of S.particles) {
      p.x += p.vx; p.y += p.vy;
      if(p.x < top) { p.x = top; p.vx = Math.abs(p.vx); S.collisions++; }
      if(p.x > bot) { p.x = bot; p.vx = -Math.abs(p.vx); S.collisions++; }
      if(p.y < left) { p.y = left; p.vy = Math.abs(p.vy); S.collisions++; }
      if(p.y > right) { p.y = right; p.vy = -Math.abs(p.vy); S.collisions++; }
    }
    // Inter-particle collisions (simplified)
    for(let i = 0; i < S.particles.length; i++) {
      for(let j = i+1; j < S.particles.length; j++) {
        const a = S.particles[i], b = S.particles[j];
        const dx = b.x - a.x, dy = b.y - a.y;
        const dist = Math.sqrt(dx*dx + dy*dy);
        if(dist < 6 && dist > 0) {
          const nx = dx/dist, ny = dy/dist;
          const dvx = a.vx - b.vx, dvy = a.vy - b.vy;
          const dvn = dvx*nx + dvy*ny;
          if(dvn > 0) {
            a.vx -= dvn*nx; a.vy -= dvn*ny;
            b.vx += dvn*nx; b.vy += dvn*ny;
            const overlap = 6 - dist;
            a.x -= nx*overlap/2; a.y -= ny*overlap/2;
            b.x += nx*overlap/2; b.y += ny*overlap/2;
          }
        }
      }
    }
    S.frames++;
  }
  // Thermostat: rescale speeds to match target temperature (disabled in adiabatic mode)
  if(!S.adiabatic && S.frames % 10 === 0 && S.particles.length > 0) {
    let ke = 0;
    for(const p of S.particles) ke += p.vx*p.vx + p.vy*p.vy;
    ke /= S.particles.length;
    const targetKE = S.T / 300 * 9;
    if(ke > 0) {
      const scale = Math.sqrt(targetKE / ke) * 0.1 + 0.9;
      for(const p of S.particles) { p.vx *= scale; p.vy *= scale; }
    }
  }
  // Adiabatic: measure actual temperature from particle KE
  if(S.adiabatic && S.frames % 10 === 0 && S.particles.length > 0) {
    let ke = 0;
    for(const p of S.particles) ke += p.vx*p.vx + p.vy*p.vy;
    ke /= S.particles.length;
    S.T = Math.round(ke / 9 * 300);
    S.T = Math.max(50, Math.min(1200, S.T));
    if($('slT')) $('slT').value = S.T;
    if($('vT')) $('vT').textContent = S.T;
  }
  // Constant pressure mode: auto-adjust piston to maintain target P
  if(S.constP && S.constP_target > 0 && S.frames % 5 === 0) {
    const targetV = S.n * R_GAS * S.T / (S.constP_target * 100);
    const targetPistonY = S.boxH - targetV / (S.boxW * 0.1);
    S.pistonY += (Math.max(20, Math.min(S.boxH - 40, targetPistonY)) - S.pistonY) * 0.1;
    for(const p of S.particles) { if(p.x < S.pistonY + 4) p.x = S.pistonY + 4; }
  }
}

// ========== CANVAS RENDERING ==========
const canvas = $('simCanvas');
const ctx = canvas.getContext('2d');
let cW, cH, scaleX, scaleY;

function resizeCanvas() {
  const box = $('simBox');
  const w = box.clientWidth, h = box.clientHeight || w * 9/16;
  const dpr = devicePixelRatio || 1;
  canvas.width = w * dpr; canvas.height = h * dpr;
  canvas.style.width = w + 'px'; canvas.style.height = h + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  cW = w; cH = h;
  scaleX = cW / S.boxW; scaleY = cH / S.boxH;
}
new ResizeObserver(resizeCanvas).observe($('simBox'));
resizeCanvas();

function drawSim() {
  ctx.fillStyle = '#0a1628';
  ctx.fillRect(0, 0, cW, cH);

  // Box walls
  const l = 0, r = S.boxW * scaleX, t = S.pistonY * scaleY, b = S.boxH * scaleY;
  ctx.strokeStyle = '#334155'; ctx.lineWidth = 2;
  ctx.strokeRect(l+1, t, r-2, b-t-1);

  // Piston (top wall - draggable)
  const grad = ctx.createLinearGradient(0, t-8*scaleY, 0, t+2);
  grad.addColorStop(0, '#64748b'); grad.addColorStop(1, '#475569');
  ctx.fillStyle = grad;
  ctx.fillRect(l+1, t-6*scaleY, r-2, 8*scaleY);
  // Piston grip lines
  ctx.strokeStyle = '#94a3b8'; ctx.lineWidth = 1;
  for(let i = 0; i < 3; i++) {
    const gy = t - 4*scaleY + i*2*scaleY;
    ctx.beginPath(); ctx.moveTo(cW*0.3, gy); ctx.lineTo(cW*0.7, gy); ctx.stroke();
  }
  // Piston label
  ctx.fillStyle = '#94a3b8'; ctx.font = '10px sans-serif'; ctx.textAlign = 'center';
  ctx.fillText('PISTON (drag)', cW/2, t - 8*scaleY);

  // Particles
  for(const p of S.particles) {
    const spd = Math.sqrt(p.vx*p.vx + p.vy*p.vy);
    ctx.fillStyle = speedToColor(spd);
    ctx.beginPath();
    ctx.arc(p.y * scaleX, p.x * scaleY, Math.max(2, 3*scaleX), 0, Math.PI*2);
    ctx.fill();
  }

  // Pressure gauge (right side)
  const P = getPressure();
  const gaugeX = cW - 30, gaugeH = cH * 0.6, gaugeY = cH * 0.15;
  ctx.fillStyle = 'rgba(255,255,255,.05)'; ctx.fillRect(gaugeX-8, gaugeY, 16, gaugeH);
  const pFill = Math.min(P / 500, 1);
  const pGrad = ctx.createLinearGradient(0, gaugeY+gaugeH, 0, gaugeY);
  pGrad.addColorStop(0, '#22c55e'); pGrad.addColorStop(0.5, '#eab308'); pGrad.addColorStop(1, '#ef4444');
  ctx.fillStyle = pGrad;
  ctx.fillRect(gaugeX-6, gaugeY + gaugeH*(1-pFill), 12, gaugeH*pFill);
  ctx.fillStyle = '#fff'; ctx.font = 'bold 10px sans-serif'; ctx.textAlign = 'center';
  ctx.fillText('P', gaugeX, gaugeY - 6);
  ctx.font = '9px monospace';
  ctx.fillText(P.toFixed(0), gaugeX, gaugeY + gaugeH + 14);
  ctx.fillText('kPa', gaugeX, gaugeY + gaugeH + 24);

  // Thermometer (left side)
  const thermX = 18, thermH = cH * 0.5, thermY = cH * 0.2;
  ctx.fillStyle = 'rgba(255,255,255,.05)'; ctx.fillRect(thermX-5, thermY, 10, thermH);
  const tFill = (S.T - 100) / 800;
  ctx.fillStyle = S.T > 400 ? '#ef4444' : S.T > 250 ? '#eab308' : '#3b82f6';
  ctx.fillRect(thermX-3, thermY + thermH*(1-tFill), 6, thermH*tFill);
  ctx.fillStyle = '#fff'; ctx.font = 'bold 9px sans-serif';
  ctx.fillText('T', thermX, thermY - 6);
  ctx.font = '9px monospace';
  ctx.fillText(S.T+'K', thermX, thermY + thermH + 14);

  // Collision counter
  const rate = S.frames > 0 ? (S.collisions / S.frames * 60).toFixed(0) : '0';
  ctx.fillStyle = 'rgba(255,255,255,.6)'; ctx.font = '9px monospace'; ctx.textAlign = 'left';
  ctx.fillText('Wall hits/s: ' + rate, 8, cH - 8);

  // Scene title
  ctx.fillStyle = '#fff'; ctx.font = 'bold 13px sans-serif'; ctx.textAlign = 'left';
  ctx.fillText(SCENES[scene].n, 40, 18);

  // Guide bar per scene
  const guides = [
    'Watch individual molecules hit the walls. Each hit = a tiny push. Add more molecules and watch pressure build from nothing.',
    "Drag the piston down at constant T. Same molecules, less space, more wall hits. Watch the P-V graph build a hyperbola.",
    "Increase temperature. Molecules speed up and hit the piston harder. The piston auto-rises to keep pressure constant. V-T is linear.",
    "Volume is locked (rigid container). Increase T and watch molecules hit walls harder. P rises proportionally with T.",
    "All variables unlocked. Change any one and watch the others respond. PV/nRT should stay at 1.000.",
    "150 molecules with a live speed histogram. Raise T: the distribution broadens and shifts right. Lower T: it narrows.",
    "Trace thermodynamic processes on the P-V diagram. The shaded area under the curve = work done by the gas."
  ];
  ctx.fillStyle = 'rgba(255,255,255,.55)'; ctx.font = '10px sans-serif'; ctx.textAlign = 'left';
  const guide = guides[scene] || '';
  // Word-wrap guide text
  const maxW = cW - 90, words = guide.split(' ');
  let line = '', ly = 34;
  for(const w of words) {
    const test = line + w + ' ';
    if(ctx.measureText(test).width > maxW && line) { ctx.fillText(line.trim(), 40, ly); ly += 13; line = w + ' '; }
    else line = test;
  }
  if(line) ctx.fillText(line.trim(), 40, ly);
}

// ========== PISTON DRAG ==========
let dragging = false;
canvas.addEventListener('pointerdown', e => {
  const rect = canvas.getBoundingClientRect();
  const my = (e.clientY - rect.top) / scaleY;
  if(Math.abs(my - S.pistonY) < 15) { dragging = true; canvas.setPointerCapture(e.pointerId); }
});
canvas.addEventListener('pointermove', e => {
  if(!dragging || S.lockV) return;
  const rect = canvas.getBoundingClientRect();
  const my = (e.clientY - rect.top) / scaleY;
  S.pistonY = Math.max(20, Math.min(S.boxH - 40, my));
  // Keep particles inside
  for(const p of S.particles) { if(p.x < S.pistonY + 4) p.x = S.pistonY + 4; }
});
canvas.addEventListener('pointerup', () => { dragging = false; });

  }

  if(scene === 6) {
    html += `<div class="ctrl"><span style="font-size:.6rem;font-weight:700;color:var(--text2)">Process:</span>`;
    ['Isothermal','Isobaric','Isochoric','Adiabatic'].forEach((p,i)=>{
      html += `<button class="preset-btn" onclick="setProcess(${i})">${p}</button>`;
    });
    html += `</div>`;
  }

  html += `<div class="ctrl"><button class="btn btn-p" id="pauseBtn" onclick="togglePause()">${S.paused?'Resume':'Pause'}</button><button class="btn btn-s" onclick="resetSim()">Reset</button></div>`;

  $('controls').innerHTML = html;

  // Attach listeners
  $('slT')?.addEventListener('input', ()=>{ S.T=+$('slT').value; $('vT').textContent=S.T; });
  $('slN')?.addEventListener('input', ()=>{

      const speedScale = Math.sqrt(S.T/300)*3;
      for(let i = S.particles.length; i < newN; i++) {
        const angle = Math.random()*Math.PI*2, spd = (0.5+Math.random()*1.5)*speedScale;
        S.particles.push({x:S.pistonY+20+Math.random()*(S.boxH-S.pistonY-40),y:10+Math.random()*(S.boxW-20),vx:Math.cos(angle)*spd,vy:Math.sin(angle)*spd,r:3});
      }
    } else { S.particles.length = newN; }
    S.n = newN;
  });
  $('slSpd')?.addEventListener('input', ()=>{ S.speed=+$('slSpd').value; $('vSpd').textContent=S.speed.toFixed(1); });
  $('ckLockV')?.addEventListener('change', ()=>{ S.lockV=$('ckLockV').checked; });
  $('ckLockT')?.addEventListener('change', ()=>{ S.lockT=$('ckLockT').checked; });
}

// ========== LIVE GRAPH ==========
function drawLiveGraph() {
  const c = $('liveGraph'), w2 = $('liveGraphBox');
  if(!c||!w2) return;
  const cx = c.getContext('2d');
  const dpr = devicePixelRatio||1;
  const W = w2.clientWidth, H = w2.clientHeight;
  c.width=W*dpr;c.height=H*dpr;c.style.width=W+'px';c.style.height=H+'px';
  cx.setTransform(dpr,0,0,dpr,0,0);
  cx.fillStyle='#fff';cx.fillRect(0,0,W,H);

  // Record data point every ~2 seconds (120 frames at 60fps)
  const P=getPressure(), V=getVolume();
  if(!S.paused && S.frames%120===0) {
    const last = S.graphData[S.graphData.length-1];
    const changed = !last || Math.abs(last.P-P)>0.3 || Math.abs(last.V-V)>0.2 || Math.abs(last.T-S.T)>1;
    if(changed) {
      S.graphData.push({P,V,T:S.T});
      if(S.graphData.length > 300) S.graphData.shift();
    }
  }
  if(S.graphData.length < 2) { cx.fillStyle='#bbb';cx.font='10px sans-serif';cx.textAlign='center';cx.fillText('Change T, V, or n to trace a graph',W/2,H/2); return; }

  const pad={t:14,r:8,b:22,l:32},pW=W-pad.l-pad.r,pH=H-pad.t-pad.b;
  let xs,ys,xLab,yLab;
  if(S.graphType==='PV'){xs=S.graphData.map(d=>d.V);ys=S.graphData.map(d=>d.P);xLab='V (L)';yLab='P (kPa)'}
  else if(S.graphType==='PT'){xs=S.graphData.map(d=>d.T);ys=S.graphData.map(d=>d.P);xLab='T (K)';yLab='P (kPa)'}
  else{xs=S.graphData.map(d=>d.T);ys=S.graphData.map(d=>d.V);xLab='T (K)';yLab='V (L)'}

  let xn=Math.min(...xs),xx=Math.max(...xs),yn=Math.min(...ys),yx=Math.max(...ys);
  if(xx-xn < 0.01){xn-=1;xx+=1}
  if(yx-yn < 0.01){yn=Math.max(0,yn-1);yx+=1}
  const xp=(xx-xn)*.1,yp=(yx-yn)*.1;xn-=xp;xx+=xp;yn=Math.max(0,yn-yp);yx+=yp;
  const tx=v=>pad.l+((v-xn)/(xx-xn))*pW, ty=v=>pad.t+pH-((v-yn)/(yx-yn))*pH;

  cx.strokeStyle='rgba(0,0,0,.08)';cx.lineWidth=.5;
  for(let i=0;i<=4;i++){const v=xn+(xx-xn)*i/4;cx.beginPath();cx.moveTo(tx(v),pad.t);cx.lineTo(tx(v),pad.t+pH);cx.stroke()}
  for(let i=0;i<=4;i++){const v=yn+(yx-yn)*i/4;cx.beginPath();cx.moveTo(pad.l,ty(v));cx.lineTo(pad.l+pW,ty(v));cx.stroke()}
  cx.strokeStyle='rgba(0,0,0,.2)';cx.lineWidth=1;cx.beginPath();cx.moveTo(pad.l,pad.t);cx.lineTo(pad.l,pad.t+pH);cx.lineTo(pad.l+pW,pad.t+pH);cx.stroke();

  cx.fillStyle='#888';cx.font='8px sans-serif';cx.textAlign='center';
  cx.fillText(xLab,pad.l+pW/2,H-3);
  cx.save();cx.translate(8,pad.t+pH/2);cx.rotate(-Math.PI/2);cx.fillText(yLab,0,0);cx.restore();

  cx.strokeStyle='#0C5E8A';cx.lineWidth=1.5;cx.beginPath();
  xs.forEach((x,i)=>{i===0?cx.moveTo(tx(x),ty(ys[i])):cx.lineTo(tx(x),ty(ys[i]))});cx.stroke();
  // Current point
  cx.fillStyle='#B8430B';cx.beginPath();cx.arc(tx(xs[xs.length-1]),ty(ys[ys.length-1]),4,0,Math.PI*2);cx.fill();
}

// ========== MAXWELL-BOLTZMANN ==========
function drawMBDist() {
  const c=$('mbCanvas'),w2=$('mbBox');
  if(!c||!w2)return;
  const cx=c.getContext('2d');
  const dpr=devicePixelRatio||1;
  const W=w2.clientWidth,H=w2.clientHeight;
  c.width=W*dpr;c.height=H*dpr;c.style.width=W+'px';c.style.height=H+'px';
  cx.setTransform(dpr,0,0,dpr,0,0);
  cx.fillStyle='#fff';cx.fillRect(0,0,W,H);

  // Histogram of particle speeds
  const speeds = S.particles.map(p=>Math.sqrt(p.vx*p.vx+p.vy*p.vy));
  if(!speeds.length)return;
  const maxSpd = Math.max(...speeds, 1);
  const bins = 20;
  const binW2 = maxSpd / bins;
  const counts = new Array(bins).fill(0);
  speeds.forEach(s=>{ const b=Math.min(Math.floor(s/binW2),bins-1); counts[b]++; });
  const maxCount = Math.max(...counts, 1);

  const pad={t:14,r:8,b:22,l:28},pW=W-pad.l-pad.r,pH=H-pad.t-pad.b;
  const barW=pW/bins;

  // Bars
  counts.forEach((cnt,i)=>{
    const h2=cnt/maxCount*pH;
    const t2=cnt/maxCount;
    cx.fillStyle = t2<0.3?'#3b82f6':t2<0.6?'#eab308':'#ef4444';
    cx.globalAlpha=0.7;
    cx.fillRect(pad.l+i*barW, pad.t+pH-h2, barW-1, h2);
    cx.globalAlpha=1;
  });

  cx.strokeStyle='rgba(0,0,0,.2)';cx.lineWidth=1;
  cx.beginPath();cx.moveTo(pad.l,pad.t);cx.lineTo(pad.l,pad.t+pH);cx.lineTo(pad.l+pW,pad.t+pH);cx.stroke();
  cx.fillStyle='#888';cx.font='8px sans-serif';cx.textAlign='center';
  cx.fillText('Speed',pad.l+pW/2,H-3);
  cx.save();cx.translate(8,pad.t+pH/2);cx.rotate(-Math.PI/2);cx.fillText('Count',0,0);cx.restore();
  cx.fillStyle='#0C5E8A';cx.font='bold 9px sans-serif';cx.textAlign='left';
  cx.fillText('T = '+S.T+' K',pad.l+4,pad.t+10);
}

// ========== P-V DIAGRAM (Thermo) ==========
function drawPVDiagram() {
  const c=$('pvDiagCanvas'),w2=$('pvDiagBox');
  if(!c||!w2)return;
  const cx=c.getContext('2d');
  const dpr=devicePixelRatio||1;
  const W=w2.clientWidth,H=w2.clientHeight;
  c.width=W*dpr;c.height=H*dpr;c.style.width=W+'px';c.style.height=H+'px';
  cx.setTransform(dpr,0,0,dpr,0,0);
  cx.fillStyle='#fff';cx.fillRect(0,0,W,H);

  const P=getPressure(),V=getVolume();
  if(!S.paused && S.frames%15===0) S.thermoPath.push({P,V});
  if(S.thermoPath.length<2){cx.fillStyle='#bbb';cx.font='10px sans-serif';cx.textAlign='center';cx.fillText('Change variables to trace path',W/2,H/2);return}

  const pad={t:14,r:8,b:22,l:32},pW=W-pad.l-pad.r,pH=H-pad.t-pad.b;
  const xs=S.thermoPath.map(d=>d.V),ys=S.thermoPath.map(d=>d.P);
  let xn=Math.min(...xs),xx=Math.max(...xs),yn=Math.min(...ys),yx=Math.max(...ys);
  const xp=(xx-xn)*.15||1,yp=(yx-yn)*.15||1;xn=Math.max(0,xn-xp);xx+=xp;yn=Math.max(0,yn-yp);yx+=yp;
  const tx=v=>pad.l+((v-xn)/(xx-xn))*pW, ty=v=>pad.t+pH-((v-yn)/(yx-yn))*pH;

  cx.strokeStyle='rgba(0,0,0,.08)';cx.lineWidth=.5;
  for(let i=0;i<=4;i++){let v=xn+(xx-xn)*i/4;cx.beginPath();cx.moveTo(tx(v),pad.t);cx.lineTo(tx(v),pad.t+pH);cx.stroke()}
  for(let i=0;i<=4;i++){let v=yn+(yx-yn)*i/4;cx.beginPath();cx.moveTo(pad.l,ty(v));cx.lineTo(pad.l+pW,ty(v));cx.stroke()}
  cx.strokeStyle='rgba(0,0,0,.2)';cx.lineWidth=1;cx.beginPath();cx.moveTo(pad.l,pad.t);cx.lineTo(pad.l,pad.t+pH);cx.lineTo(pad.l+pW,pad.t+pH);cx.stroke();

  // Shaded area (work done)
  cx.fillStyle='rgba(12,94,138,.08)';cx.beginPath();cx.moveTo(tx(xs[0]),ty(0));
  xs.forEach((x,i)=>cx.lineTo(tx(x),ty(ys[i])));
  cx.lineTo(tx(xs[xs.length-1]),ty(0));cx.closePath();cx.fill();

  cx.strokeStyle='#0C5E8A';cx.lineWidth=2;cx.beginPath();
  xs.forEach((x,i)=>{i===0?cx.moveTo(tx(x),ty(ys[i])):cx.lineTo(tx(x),ty(ys[i]))});cx.stroke();
  cx.fillStyle='#B8430B';cx.beginPath();cx.arc(tx(xs[xs.length-1]),ty(ys[ys.length-1]),4,0,Math.PI*2);cx.fill();

  cx.fillStyle='#888';cx.font='8px sans-serif';cx.textAlign='center';
  cx.fillText('V (L)',pad.l+pW/2,H-3);
  cx.save();cx.translate(8,pad.t+pH/2);cx.rotate(-Math.PI/2);cx.fillText('P (kPa)',0,0);cx.restore();
  cx.fillStyle='rgba(12,94,138,.3)';cx.font='8px sans-serif';cx.textAlign='right';
  cx.fillText('Shaded = Work',W-pad.r-2,pad.t+10);
}

// ========== SCENE INIT ==========
function initScene() {
  S.graphData = []; S.thermoPath = [];
  S.constP = false; S.adiabatic = false; S.lockV = false; S.lockT = false;
  if(scene===0){S.n=5;S.T=300;S.pistonY=50;}
  else if(scene===1){S.n=80;S.T=300;S.pistonY=50;}
  else if(scene===2){S.n=80;S.T=200;S.pistonY=100;S.constP=true;S.constP_target=getPressure()||100;}
  else if(scene===3){S.n=80;S.T=200;S.pistonY=50;S.lockV=true;}
  else if(scene===4){S.n=80;S.T=300;S.pistonY=80;}
  else if(scene===5){S.n=150;S.T=300;S.pistonY=50;}
  else{S.n=80;S.T=300;S.pistonY=80;}
  S.paused=false;S.collisions=0;S.frames=0;
  initParticles();
  if(scene===2) S.constP_target = getPressure();
  buildControls();
  updateSidebar();
}

// Experiment
let manD=[], expD=[];
const EIV=[{id:'T',n:'Temperature (K)'},{id:'V',n:'Volume (L)'},{id:'n',n:'Number of molecules'},{id:'P',n:'Pressure (kPa)'}];
const EDV=[{id:'P',n:'Pressure (kPa)'},{id:'V2',n:'Volume (L)'},{id:'T2',n:'Temperature (K)'},{id:'rate',n:'Collision rate (hits/s)'},{id:'KE',n:'Avg KE (zJ)'},{id:'rms',n:'RMS Speed (m/s)'},{id:'PV',n:'PV product'}];
const ECVS=[{id:'T',n:'Temperature'},{id:'V',n:'Volume'},{id:'n',n:'Molecules'},{id:'P',n:'Pressure'},{id:'mass',n:'Molar mass'}];

function getSimIV(){const iv=$('selIV')?.value||'T';return iv==='T'?S.T:iv==='V'?getVolume():iv==='P'?getPressure():S.n}
function getSimDV(){const dv=$('selDV')?.value||'P';const P2=getPressure(),V2=getVolume(),rate2=S.frames>0?S.collisions/S.frames*60:0;return dv==='P'?P2:dv==='V2'?V2:dv==='T2'?S.T:dv==='rate'?rate2:dv==='KE'?getAvgKE()*1e21:dv==='rms'?getRMSSpeed():dv==='PV'?P2*V2:P2}
function getIVN(){return EIV.find(v=>v.id===($('selIV')?.value||'T'))?.n||'IV'}
function getDVN(){return EDV.find(v=>v.id===($('selDV')?.value||'P'))?.n||'DV'}

function buildExp(){
  const iv=$('selIV')?.value||'T',cvs=ECVS.filter(c=>c.id!==iv);
  $('expC').innerHTML='<div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:5px"><div><label style="font-size:.52rem;font-weight:700;text-transform:uppercase;color:var(--text3);display:block;margin-bottom:2px">Independent Variable</label><select id="selIV" onchange="buildExp()" style="width:100%;padding:4px 6px;border-radius:5px;border:1px solid var(--border);font-size:.64rem;font-weight:600;background:var(--bg2);outline:none">'+EIV.map(v=>'<option value="'+v.id+'"'+(v.id===iv?' selected':'')+'>'+v.n+'</option>').join('')+'</select></div><div><label style="font-size:.52rem;font-weight:700;text-transform:uppercase;color:var(--text3);display:block;margin-bottom:2px">Dependent Variable</label><select id="selDV" style="width:100%;padding:4px 6px;border-radius:5px;border:1px solid var(--border);font-size:.64rem;font-weight:600;background:var(--bg2);outline:none">'+EDV.map(v=>'<option value="'+v.id+'">'+v.n+'</option>').join('')+'</select></div></div><label style="font-size:.52rem;font-weight:700;text-transform:uppercase;color:var(--text3);display:block;margin-bottom:2px">Controlled Variables</label><div style="display:flex;gap:3px;flex-wrap:wrap;margin-bottom:5px">'+cvs.map(c=>'<label style="display:flex;align-items:center;gap:2px;padding:2px 6px;border-radius:3px;background:var(--bg2);border:1px solid var(--border);font-size:.56rem;font-weight:600;color:var(--ok)"><input type="checkbox" checked disabled style="accent-color:var(--ok)"> '+c.n+'</label>').join('')+'</div><label style="font-size:.52rem;font-weight:700;text-transform:uppercase;color:var(--text3);display:block;margin-bottom:2px">Hypothesis</label><textarea style="width:100%;height:30px;border:1px solid var(--border);border-radius:4px;padding:4px 6px;font-size:.62rem;resize:vertical;background:var(--bg2);outline:none;font-family:var(--body);color:var(--text)" placeholder="If I increase the temperature, then..."></textarea><div style="margin-top:5px;background:var(--bg2);border:1px solid var(--border);border-radius:6px;padding:5px 7px"><p style="font-size:.54rem;color:var(--text3);margin-bottom:3px">Pause the simulation. Change the IV. Use Read to capture, then + Add.</p><div class="ctrl" style="align-items:flex-end;gap:3px"><div style="flex:1"><label style="font-size:.5rem;font-weight:700;text-transform:uppercase;color:var(--text3);display:block;margin-bottom:1px">IV Value</label><div style="display:flex;gap:2px"><input class="num-input" id="mIV" step="any" style="width:100%"><button class="btn btn-s" onclick="rIV()" style="font-size:.52rem;padding:2px 5px">Read</button></div></div><div style="flex:1"><label style="font-size:.5rem;font-weight:700;text-transform:uppercase;color:var(--text3);display:block;margin-bottom:1px">DV Value</label><div style="display:flex;gap:2px"><input class="num-input" id="mDV" step="any" style="width:100%"><button class="btn btn-s" onclick="rDV()" style="font-size:.52rem;padding:2px 5px">Read</button></div></div><button class="btn btn-p" onclick="addR()">+ Add</button><button class="btn btn-ok" onclick="aAdd()">Auto</button></div></div><div id="mT" style="margin-top:4px"></div><div style="display:flex;gap:3px;margin-top:3px"><button class="btn btn-ok" onclick="plotM()">Plot Graph</button><button class="btn btn-s" onclick="clrM()">Clear All</button></div><div id="mSt" style="font-size:.58rem;color:var(--text3);margin-top:2px"></div>';
}

window.rIV=()=>{if($('mIV'))$('mIV').value=getSimIV().toFixed(2)};
window.rDV=()=>{if($('mDV'))$('mDV').value=getSimDV().toFixed(2)};
window.aAdd=()=>{rIV();rDV();addR()};
window.addR=()=>{const iv=parseFloat($('mIV')?.value),dv=parseFloat($('mDV')?.value);if(isNaN(iv)||isNaN(dv))return;manD.push({iv,dv});if($('mIV'))$('mIV').value='';if($('mDV'))$('mDV').value='';if($('mSt')){$('mSt').textContent='Added #'+manD.length;$('mSt').style.color='var(--ok)'}buildMT();syncM();addN('Data','IV='+iv.toFixed(2)+', DV='+dv.toFixed(2),'#'+manD.length)};

function buildMT(){if(!manD.length){if($('mT'))$('mT').innerHTML='';return}const g={};manD.forEach((d,i)=>{const k=d.iv.toFixed(2);if(!g[k])g[k]=[];g[k].push({...d,idx:i})});const ks=Object.keys(g).map(Number).sort((a,b)=>a-b);let rows='';ks.forEach(k=>{const pts=g[k.toFixed(2)],dvs=pts.map(p=>p.dv),mn=dvs.reduce((a,b)=>a+b,0)/dvs.length,unc=dvs.length>1?((Math.max(...dvs)-Math.min(...dvs))/2).toFixed(2):'--';pts.forEach((p,j)=>{rows+='<tr><td>'+(j===0?k.toFixed(2):'')+'</td><td>'+p.dv.toFixed(2)+'</td><td><span style="cursor:pointer;color:var(--err);opacity:.5" onclick="rmPt('+p.idx+')">x</span></td></tr>'});rows+='<tr class="mean"><td>Mean</td><td class="mean">'+mn.toFixed(2)+' <span style="font-size:.55rem;color:var(--text3)">&plusmn;'+unc+'</span></td><td></td></tr>'});if($('mT'))$('mT').innerHTML='<table class="dt"><thead><tr><th>'+getIVN()+'</th><th>'+getDVN()+'</th><th></th></tr></thead><tbody>'+rows+'</tbody></table>'}
window.rmPt=i=>{manD.splice(i,1);buildMT();syncM()};
window.clrM=()=>{manD=[];expD=[];buildMT();if($('dW'))$('dW').innerHTML='<p style="font-size:.62rem;color:var(--text3);text-align:center;padding:8px">Collect data first.</p>';drawGr()};
function syncM(){if(!manD.length){expD=[];return}const g={};manD.forEach(d=>{const k=d.iv.toFixed(2);if(!g[k])g[k]=[];g[k].push(d.dv)});expD=Object.keys(g).map(Number).sort((a,b)=>a-b).map(k=>{const v=g[k.toFixed(2)],mn=v.reduce((a,b)=>a+b,0)/v.length,unc=v.length>1?(Math.max(...v)-Math.min(...v))/2:0;return{iv:k,mean:mn,unc}});buildDT();setTimeout(()=>{initGr();drawGr()},30)}
function buildDT(){if(!expD.length)return;$('dW').innerHTML='<table class="dt"><thead><tr><th>'+getIVN()+'</th><th>Mean '+getDVN()+'</th><th>Unc</th></tr></thead><tbody>'+expD.map(r=>'<tr><td>'+r.iv.toFixed(2)+'</td><td class="mean">'+r.mean.toFixed(2)+'</td><td>'+(r.unc>0?'&plusmn;'+r.unc.toFixed(2):'--')+'</td></tr>').join('')+'</tbody></table>'}
window.plotM=()=>{if(!manD.length)return;syncM();document.querySelectorAll('.bt').forEach(t=>t.classList.remove('on'));document.querySelectorAll('.btc').forEach(t=>t.classList.remove('on'));document.querySelectorAll('.bt')[1].classList.add('on');$('b1').classList.add('on');setTimeout(()=>{initGr();drawGr()},80)};

let gCv,gx2;
function initGr(){gCv=$('gC');if(!gCv)return;gx2=gCv.getContext('2d');const d=devicePixelRatio||1,r=gCv.parentElement.getBoundingClientRect(),w=r.width;if(w<10)return;gCv.width=w*d;gCv.height=200*d;gCv.style.width=w+'px';gCv.style.height='200px';gx2.setTransform(d,0,0,d,0,0)}
function drawGr(){if(!gCv||!gx2){initGr();if(!gCv)return}const w=parseInt(gCv.style.width)||500,h=200;gx2.clearRect(0,0,w,h);gx2.fillStyle='#fff';gx2.fillRect(0,0,w,h);if(!expD.length){gx2.fillStyle='#bbb';gx2.font='11px sans-serif';gx2.textAlign='center';gx2.fillText('Collect data and click Plot Graph',w/2,h/2);return}const P={t:20,r:12,b:32,l:44},pW=w-P.l-P.r,pH=h-P.t-P.b;const xs=expD.map(r=>r.iv),ys=expD.map(r=>r.mean);let xn=Math.min(...xs),xx=Math.max(...xs),yn=Math.min(...ys),yx=Math.max(...ys);const xp=(xx-xn)*.1||1,yp=(yx-yn)*.1||1;xn-=xp;xx+=xp;yn=Math.max(0,yn-yp);yx+=yp;const tx=v=>P.l+((v-xn)/(xx-xn))*pW,ty=v=>P.t+pH-((v-yn)/(yx-yn))*pH;gx2.strokeStyle='rgba(0,0,0,.06)';gx2.lineWidth=.5;for(let i=0;i<=5;i++){const v=xn+(xx-xn)*i/5;gx2.beginPath();gx2.moveTo(tx(v),P.t);gx2.lineTo(tx(v),P.t+pH);gx2.stroke()}for(let i=0;i<=5;i++){const v=yn+(yx-yn)*i/5;gx2.beginPath();gx2.moveTo(P.l,ty(v));gx2.lineTo(P.l+pW,ty(v));gx2.stroke()}gx2.strokeStyle='rgba(0,0,0,.25)';gx2.lineWidth=1.5;gx2.beginPath();gx2.moveTo(P.l,P.t);gx2.lineTo(P.l,P.t+pH);gx2.lineTo(P.l+pW,P.t+pH);gx2.stroke();gx2.fillStyle='#888';gx2.font='9px sans-serif';gx2.textAlign='center';for(let i=0;i<=5;i++){const v=xn+(xx-xn)*i/5;gx2.fillText(v.toFixed(1),tx(v),P.t+pH+12)}gx2.textAlign='right';for(let i=0;i<=5;i++){const v=yn+(yx-yn)*i/5;gx2.fillText(v.toFixed(1),P.l-4,ty(v)+3)}gx2.fillStyle='#555';gx2.font='10px sans-serif';gx2.textAlign='center';gx2.fillText(getIVN(),P.l+pW/2,h-4);gx2.save();gx2.translate(9,P.t+pH/2);gx2.rotate(-Math.PI/2);gx2.fillText(getDVN(),0,0);gx2.restore();gx2.fillStyle='#1a1a1a';gx2.font='bold 10px sans-serif';gx2.fillText(getDVN()+' vs '+getIVN(),P.l+pW/2,12);if(xs.length>=2){const n2=xs.length,sx=xs.reduce((a,b)=>a+b,0),sy=ys.reduce((a,b)=>a+b,0),sxy=xs.reduce((a,x,i)=>a+x*ys[i],0),sxx=xs.reduce((a,x)=>a+x*x,0);const m2=(n2*sxy-sx*sy)/(n2*sxx-sx*sx),b2=(sy-m2*sx)/n2;gx2.strokeStyle='rgba(12,94,138,.25)';gx2.lineWidth=1.5;gx2.setLineDash([5,4]);gx2.beginPath();gx2.moveTo(tx(xn),ty(m2*xn+b2));gx2.lineTo(tx(xx),ty(m2*xx+b2));gx2.stroke();gx2.setLineDash([]);const ssR=ys.reduce((a,y,i)=>a+(y-(m2*xs[i]+b2))**2,0),ssT=ys.reduce((a,y)=>a+(y-sy/n2)**2,0),r2=ssT===0?1:1-ssR/ssT;gx2.fillStyle='#0C5E8A';gx2.font='bold 9px monospace';gx2.textAlign='right';gx2.fillText('R2='+r2.toFixed(4),w-P.r,P.t+10)}if(xs.length>=2){gx2.strokeStyle='#0C5E8A';gx2.lineWidth=1.2;gx2.beginPath();expD.forEach((r,i)=>{i===0?gx2.moveTo(tx(xs[i]),ty(ys[i])):gx2.lineTo(tx(xs[i]),ty(ys[i]))});gx2.stroke()}gx2.fillStyle='#0C5E8A';xs.forEach((x,i)=>{gx2.beginPath();gx2.arc(tx(x),ty(ys[i]),4,0,Math.PI*2);gx2.fill()})}

// IB Questions
const IB=[
  {c:'State',q:'State the assumptions of the ideal gas model.',f:'1. Molecules are point particles with negligible volume. 2. No intermolecular forces except during collisions. 3. Collisions are perfectly elastic. 4. Random motion in all directions. 5. Duration of collisions is negligible compared to time between collisions.'},
  {c:'Explain',q:'Explain, using the kinetic model, why pressure increases when temperature increases at constant volume.',f:'Higher temperature means higher average KE of molecules. They move faster, hitting the walls more frequently and with greater momentum change per collision. Since Force = rate of momentum change, and pressure = F/A, the pressure increases.'},
  {c:'Calculate',q:'2.0 mol of ideal gas at 300 K occupies 0.050 m3. Find the pressure.',f:'PV = nRT. P = nRT/V = (2.0 x 8.314 x 300) / 0.050 = 99768 Pa = 99.8 kPa'},
  {c:'Explain',q:'A sealed aerosol can is thrown into a fire. Use the kinetic model to explain why it may explode.',f:'The fire raises T. At constant V (sealed can), molecules move faster, hit walls harder and more often. P increases (Gay-Lussac law). When P exceeds the structural limit of the can, it ruptures explosively.'},
  {c:'Explain',q:'Explain why real gases deviate from ideal behavior at high pressures and low temperatures.',f:'At high P, molecules are close together so their finite volume matters (V_real > V_ideal). At low T, molecules move slowly and intermolecular attractive forces become significant, reducing the actual pressure below the ideal value.'},
  {c:'Calculate',q:'A gas at 200 kPa and 400 K is cooled to 300 K at constant volume. Find the new pressure.',f:'P1/T1 = P2/T2 (Gay-Lussac). P2 = P1 x T2/T1 = 200 x 300/400 = 150 kPa'},
  {c:'Compare',q:'Compare the Maxwell-Boltzmann distributions of the same gas at 300 K and 600 K.',f:'At 600 K: the peak is lower (fewer molecules at the most probable speed), the distribution is broader, the peak shifts to higher speeds, the area under both curves is the same (same number of molecules).'},
  {c:'Distinguish',q:'Distinguish between isothermal and adiabatic compression on a P-V diagram.',f:'Both show P increasing as V decreases. Isothermal: PV = constant, follows a hyperbola, temperature stays fixed, heat flows out to a reservoir. Adiabatic: PV^gamma = constant, the curve is steeper than isothermal because T also rises (no heat exchange), so P increases faster for the same volume change.'},
  {c:'Deduce',q:'PV data for an unknown gas gives PV = 250 J at every measured point. Deduce the temperature if n = 0.10 mol.',f:'PV = nRT, so T = PV/(nR) = 250 / (0.10 x 8.314) = 250 / 0.8314 = 300.7 K. The gas is at approximately 301 K (28 C).'}
];

function buildIB(){$('ibL').innerHTML=IB.map((q,i)=>{const cls=q.c==='Calculate'?'c':q.c==='Explain'?'e':(q.c==='Distinguish'||q.c==='Deduce'||q.c==='Compare')?'d':'s';return '<div class="ib-card"><span class="ib-cmd ib-cmd-'+cls+'">'+q.c+'</span><h4>Q'+(i+1)+'</h4><p>'+q.q+'</p><textarea placeholder="Your answer..."></textarea><div style="display:flex;gap:3px;margin-top:3px"><button class="btn btn-p" onclick="sF('+i+')" style="font-size:.58rem">Show Answer</button></div><div class="ib-ans" id="iF'+i+'">'+q.f+'</div></div>'}).join('')}
window.sF=i=>{$('iF'+i).classList.toggle('show');if($('iF'+i).classList.contains('show'))addN('IB Q'+(i+1),IB[i].q.substring(0,50)+'...','Answered')};

// Notebook
let nb=[];
function addN(t,d,r){nb.push({t,d,r});showN()}
function showN(){$('nbO').innerHTML=nb.length?nb.map((n,i)=>'<div class="nb-c"><b>#'+(i+1)+' '+n.t+'</b><br>'+n.d+'<br><span class="nr">-> '+n.r+'</span></div>').join(''):'<p style="text-align:center;color:var(--text3);font-size:.6rem;padding:8px">Complete experiments to record.</p>'}

// ========== INIT ==========
initScene();
buildExp();
buildIB();
showN();
animate();
</script>
