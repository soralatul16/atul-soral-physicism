      var bv2=S.usSpd;for(var ci2=0;ci2<10;ci2++){var ct2=((S.time*bv2*0.002+ci2/10)%1);var px2=cW*0.1+(cW*0.8)*ct2;var py2=cH*0.38-Math.sin(ct2*Math.PI)*cH*0.16*0.5;cx.fillStyle='#B71C1C';cx.beginPath();cx.ellipse(px2,py2,5,2.5,ct2*0.3,0,Math.PI*2);cx.fill();}
      cx.fillStyle='#607D8B';cx.beginPath();cx.roundRect(cW*0.44,cH*0.04,18,42,4);cx.fill();
      cx.fillStyle='rgba(100,200,255,.08)';cx.beginPath();cx.moveTo(cW*0.52,cH*0.16);cx.lineTo(cW*0.6,cH*0.3);cx.lineTo(cW*0.44,cH*0.3);cx.closePath();cx.fill();
      cx.fillStyle='rgba(255,255,255,.4)';cx.font='bold 12px sans-serif';cx.textAlign='center';cx.fillText('Patient: Routine Vascular Scan',cW*0.5,cH*0.02+12);
      // Waveform
      var uY=cH*0.52,uH=cH*0.38,uX=cW*0.05,uW=cW*0.9;
      cx.fillStyle='rgba(0,0,0,.5)';cx.beginPath();cx.roundRect(uX-4,uY-4,uW+8,uH+8,6);cx.fill();cx.fillStyle='#0a0a12';cx.fillRect(uX,uY,uW,uH);
      cx.strokeStyle='#1a1a28';cx.lineWidth=0.5;for(var ug=0;ug<8;ug++){cx.beginPath();cx.moveTo(uX,uY+uH*ug/8);cx.lineTo(uX+uW,uY+uH*ug/8);cx.stroke();}
      var usDf=Math.round(2*5e6*bv2*0.01*Math.cos(S.usAngle*Math.PI/180)/1540);

    }
  }
  if(scene<=1){cx.fillStyle=S.audioOn?'rgba(76,175,80,.8)':'rgba(100,100,100,.6)';cx.beginPath();cx.roundRect(cW-60,6,54,20,5);cx.fill();cx.fillStyle='#fff';cx.font='bold 11px sans-serif';cx.textAlign='center';cx.fillText(S.audioOn?'🔊 ON':'🔇 OFF',cW-33,20);}
}

window.uc=function(id,v){var el=$(id);if(el)el.textContent=v;};

function buildSidebar(){var h='',mach=S.srcSpeed/S.soundSpeed;

    h+='<div class="sc"><h4>What to observe</h4><div class="sd">1. Turn sound ON<br>2. Drag the observer left/right<br>3. Watch frequency rise as ambulance approaches<br>4. Listen — pitch rises with it<br>5. Sharp drop when ambulance passes<br>6. Use 🔍 Probe to click anywhere</div></div>';
    h+='<div class="sc"><h4>🎯 Challenge</h4><div class="sd"><b>Predict:</b> If vₛ = '+S.srcSpeed+', what f\' when ambulance is far ahead?<br><br><input class="num-input" id="chAns" placeholder="f\'=?" style="width:70px" value="'+S.challengeAns+'"> Hz <button class="btn btn-p" onclick="checkCh()" style="font-size:.5rem;padding:2px 6px">Check</button>';
    if(S.challengeChecked){var correct=S.audioFreq*S.soundSpeed/(S.soundSpeed-S.srcSpeed);h+='<br><span style="color:'+(Math.abs(parseFloat(S.challengeAns)-correct)<5?'var(--ok)':'var(--err)')+'">Answer: '+correct.toFixed(1)+' Hz '+(Math.abs(parseFloat(S.challengeAns)-correct)<5?'✓ Correct!':'✗ Use f\' = f₀v/(v−vₛ)')+'</span>';}h+='</div></div>';}
  if(scene===1){h+='<div class="sc"><h4>Mach Number</h4><div class="rd"><b>M</b> = vₛ/v = '+mach.toFixed(2)+'<br>'+(mach<1?'Subsonic':mach<1.05?'Transonic — sound barrier':'Supersonic — cone θ='+Math.round(Math.asin(1/mach)*180/Math.PI)+'°')+'</div></div>';h+='<div class="sc"><h4>Formula</h4><div class="eq-box"><strong>sin θ = v/vₛ = 1/M</strong><br>Shock wave when M ≥ 1</div></div>';h+='<div class="sc"><h4>What to study</h4><div class="sd">1. Low speed — normal circles<br>2. Increase — front compresses<br>3. Mach 1 — all pile up at nose<br>4. Past Mach 1 — V cone forms<br>5. Ground: SILENCE then BOOM</div></div>';}

      h+='</div></div>';
      h+='<div class="sc"><h4>Formula</h4><div class="eq-box"><strong>Δf = 2f₀v/c</strong><br><strong>v = Δf·c/(2f₀)</strong></div></div>';

      if(S.usShow){
        h+='<br><br><span style="color:'+(Math.abs(parseFloat(S.usAns)-S.usSpd)<5?'var(--ok)':'var(--err)')+'"><b>Actual: '+S.usSpd+' cm/s</b> '+(Math.abs(parseFloat(S.usAns)-S.usSpd)<5?'✓':'✗')+'</span>';
        h+='<br>'+(S.usSpd<20?'⚠️ Low flow':'')+(S.usSpd>60?'⚠️ Elevated flow':'')+(S.usSpd>=20&&S.usSpd<=60?'✅ Normal range':'');
      }

      h+='<div class="sc"><h4>Formula</h4><div class="eq-box"><strong>Δf = 2f₀v cosθ / c</strong><br><strong>v = Δf·c/(2f₀ cosθ)</strong></div></div>';
      h+='<div class="sc"><h4>Score</h4><div class="rd">'+S.usOk+' / '+S.usTot+' correct<br>Normal: 20–60 cm/s</div></div>';
    }
  }
  $('sidebar').innerHTML=h;}

    allVars:['Redshift z','Hubble constant H₀ (70)','Speed of light c','Rest wavelength λ₀','Galaxy type','Telescope aperture','Integration time','Cosmic expansion rate']
  },
  'ultrasound':{
    iv:[{id:'udf',n:'Frequency shift Δf (Hz)'},{id:'uspd',n:'Blood velocity (cm/s)'},{id:'uth',n:'Probe angle θ (°)'}],
    dv:[{id:'uspd',n:'Blood velocity (cm/s)'},{id:'udf',n:'Frequency shift Δf (Hz)'}],
    allVars:['Blood velocity','Probe frequency f₀ (5 MHz)','Speed of sound c (1540 m/s)','Probe angle θ','Vessel diameter','Blood density','Patient position','Coupling gel']
  }
};
function getMode(){if(scene===0)return'ambulance';if(scene===1)return'shockwaves';return S.appMode;}
function getVars(){return SIM_VARS[getMode()]||SIM_VARS['ambulance'];}
function getIVN(){var vs=getVars().iv,v=$('expIV')?$('expIV').value:'';for(var i=0;i<vs.length;i++){if(vs[i].id===v)return vs[i].n;}return vs[0].n;}
function getDVN(){var vs=getVars().dv,v=$('expDV')?$('expDV').value:'';for(var i=0;i<vs.length;i++){if(vs[i].id===v)return vs[i].n;}return vs[0].n;}
function getSimIV(){
  var iv=$('expIV')?$('expIV').value:'';
  if(scene===0){if(iv==='vs')return S.srcSpeed;if(iv==='f0')return S.audioFreq;if(iv==='vsnd')return S.soundSpeed;return S.srcSpeed;}
  if(scene===1){if(iv==='vs')return S.srcSpeed;if(iv==='vsnd')return S.soundSpeed;return S.srcSpeed;}
  if(S.appMode==='radar'){var rDf=Math.round(2*10e9*S.radarSpd*343/S.soundSpeed/3e8);var rSpd=Math.round(S.radarSpd*343/S.soundSpeed*3.6);if(iv==='rdf')return rDf;if(iv==='rspd')return rSpd;return rDf;}
  if(S.appMode==='redshift'){var gz=S.galZ,gv=gz*3e5,gd=gv/70;if(iv==='rsz')return gz;if(iv==='rsv')return gv;if(iv==='rsd')return gd;return gz;}
  if(S.appMode==='ultrasound'){var uDf=Math.round(2*5e6*S.usSpd*0.01*Math.cos(S.usAngle*Math.PI/180)/1540);if(iv==='udf')return uDf;if(iv==='uspd')return S.usSpd;if(iv==='uth')return S.usAngle;return uDf;}
  return 0;
}
function getSimDV(){
  var dv=$('expDV')?$('expDV').value:'';
  if(scene===0){if(dv==='fobs')return dispF;if(dv==='fah')return S.srcSpeed<S.soundSpeed?S.audioFreq*S.soundSpeed/(S.soundSpeed-S.srcSpeed):9999;if(dv==='fbh')return S.audioFreq*S.soundSpeed/(S.soundSpeed+S.srcSpeed);if(dv==='wl')return S.soundSpeed/S.srcFreq;return dispF;}
  if(scene===1){var m=S.srcSpeed/S.soundSpeed;if(dv==='mach')return m;if(dv==='angle')return m>=1?Math.asin(1/m)*180/Math.PI:0;if(dv==='fgnd')return m>=1?0:calcF(S.srcX,S.srcSpeed,cW*0.5);return m;}
  if(S.appMode==='radar'){var rDf2=Math.round(2*10e9*S.radarSpd*343/S.soundSpeed/3e8);var rSpd2=Math.round(S.radarSpd*343/S.soundSpeed*3.6);if(dv==='rspd')return rSpd2;if(dv==='rdf')return rDf2;return rSpd2;}
  if(S.appMode==='redshift'){var gz2=S.galZ,gv2=gz2*3e5,gd2=gv2/70;if(dv==='rsv')return gv2;if(dv==='rsd')return gd2;if(dv==='rslam')return 656*(1+gz2);return gv2;}
  if(S.appMode==='ultrasound'){var uDf2=Math.round(2*5e6*S.usSpd*0.01*Math.cos(S.usAngle*Math.PI/180)/1540);if(dv==='uspd')return S.usSpd;if(dv==='udf')return uDf2;return S.usSpd;}
  return 0;
}
function fmtV(v){if(Math.abs(v)<0.01&&v!==0)return v.toExponential(3);if(Math.abs(v)>=1e6)return v.toExponential(3);return parseFloat(v.toFixed(4)).toString();}

var manD=[],expD=[],showGrid=true,showBF=false;
var PLOT_COLORS=['#0284C7','#DC2626','#059669','#D97706','#7C3AED','#DB2777'];

function buildExp(){
  var vs=getVars(),ivSel=$('expIV')?$('expIV').value:vs.iv[0].id,dvSel=$('expDV')?$('expDV').value:vs.dv[0].id;
  var ivN=getIVN(),dvN=getDVN();
  var cvItems=vs.allVars.filter(function(v){return v!==ivN&&v!==dvN;});
  var h='<div class="exp-panel">';
  h+='<div class="exp-title">Experiment Variables</div>';
  h+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:8px">';
  h+='<div class="exp-var"><label class="exp-label iv">Independent Variable (IV)</label><select class="exp-select" id="expIV" onchange="buildExp()">'+vs.iv.map(function(v){return '<option value="'+v.id+'"'+(v.id===ivSel?' selected':'')+'>'+v.n+'</option>';}).join('')+'</select></div>';
  h+='<div class="exp-var"><label class="exp-label dv">Dependent Variable (DV)</label><select class="exp-select" id="expDV" onchange="buildExp()">'+vs.dv.map(function(v){return '<option value="'+v.id+'"'+(v.id===dvSel?' selected':'')+'>'+v.n+'</option>';}).join('')+'</select></div>';
  h+='</div>';
  h+='<div class="exp-var"><label class="exp-label cv">Controlled Variables (CV)</label><div class="exp-cv-list" id="expCVs">';
  cvItems.forEach(function(v){h+='<label class="exp-cv-item"><input type="checkbox" checked> '+v+'</label>';});
  h+='</div></div>';
  var hypDir=$('hypDir')?$('hypDir').value:'increase';
  h+='<div class="exp-var"><label class="exp-label hyp">Hypothesis</label><div class="exp-hypothesis">';
  h+='"If <strong class="iv-hl">'+ivN+'</strong> is increased, then <strong class="dv-hl">'+dvN+'</strong> will ';
  h+='<select class="hyp-dir" id="hypDir"><option'+(hypDir==='increase'?' selected':'')+'>increase</option><option'+(hypDir==='decrease'?' selected':'')+'>decrease</option><option'+(hypDir==='remain constant'?' selected':'')+'>remain constant</option></select>';
  var checkedCVs=[];cvItems.forEach(function(v){checkedCVs.push(v);});
  h+=', while keeping <strong class="cv-hl">'+checkedCVs.join(', ')+'</strong> constant."';
  h+='</div></div>';
  h+='</div>';
  h+='<div class="exp-data"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px"><span style="font-family:Georgia,serif;font-size:.8rem;font-weight:700;color:var(--accent)">Data Collection</span><span style="font-size:.6rem;color:var(--text3)">Pause sim to auto-record</span></div>';
  h+='<div style="display:flex;gap:3px;align-items:end;margin-bottom:4px">';
  h+='<div style="flex:1"><label style="font-size:.62rem;font-weight:700;color:#2563eb">IV</label><div style="display:flex;gap:2px"><input class="num-input" id="mIV" step="any" style="width:100%"><button class="btn btn-s" onclick="rIV()" style="font-size:.6rem;padding:2px 4px">Read</button></div></div>';
  h+='<div style="flex:1"><label style="font-size:.62rem;font-weight:700;color:#dc2626">DV</label><div style="display:flex;gap:2px"><input class="num-input" id="mDV" step="any" style="width:100%"><button class="btn btn-s" onclick="rDV()" style="font-size:.6rem;padding:2px 4px">Read</button></div></div>';
  h+='<button class="btn btn-p" onclick="addR()" style="font-size:.6rem;padding:3px 6px">+Add</button><button class="btn btn-ok" onclick="aAdd()" style="font-size:.6rem;padding:3px 6px">Auto</button>';
  h+='</div>';
  h+='<div id="mT"></div>';
  h+='<div style="display:flex;gap:3px;margin-top:3px"><button class="btn btn-ok" onclick="plotM()">Plot</button><button class="btn btn-s" onclick="clrM()">Clear</button><button class="btn btn-s" onclick="expCSV()">Export CSV</button></div>';
  h+='</div>';
  $('expC').innerHTML=h;
}

window.rIV=function(){if($('mIV'))$('mIV').value=fmtV(getSimIV());};
window.rDV=function(){if($('mDV'))$('mDV').value=fmtV(getSimDV());};
window.aAdd=function(){rIV();rDV();addR();};
window.addR=function(){var iv=parseFloat($('mIV')?$('mIV').value:0),dv=parseFloat($('mDV')?$('mDV').value:0);if(isNaN(iv)||isNaN(dv))return;manD.push({iv:iv,dv:dv});if($('mIV'))$('mIV').value='';if($('mDV'))$('mDV').value='';buildMT();syncM();addN('Data','IV='+fmtV(iv)+', DV='+fmtV(dv),'#'+manD.length);};

function buildMT(){if(!manD.length){if($('mT'))$('mT').innerHTML='';return;}
  var g={};manD.forEach(function(d,i){var k=fmtV(d.iv);if(!g[k])g[k]=[];g[k].push({iv:d.iv,dv:d.dv,idx:i});});
  var ks=Object.keys(g).sort(function(a,b){return parseFloat(a)-parseFloat(b);});
  var rows='';ks.forEach(function(k){var pts=g[k],dvs=pts.map(function(p){return p.dv;}),mn=dvs.reduce(function(a,b){return a+b;},0)/dvs.length;
    pts.forEach(function(p,j){rows+='<tr><td>'+(j===0?fmtV(p.iv):'')+'</td><td>'+fmtV(p.dv)+'</td><td><span style="cursor:pointer;color:var(--err);opacity:.5" onclick="rmPt('+p.idx+')">x</span></td></tr>';});
    if(pts.length>1)rows+='<tr class="mean"><td></td><td class="mean">Mean: '+fmtV(mn)+'</td><td></td></tr>';
  });
  if($('mT'))$('mT').innerHTML='<table class="dt"><thead><tr><th>'+getIVN()+'</th><th>'+getDVN()+'</th><th></th></tr></thead><tbody>'+rows+'</tbody></table>';
}
window.rmPt=function(i){manD.splice(i,1);buildMT();syncM();};
window.clrM=function(){manD=[];expD=[];buildMT();if($('dW'))$('dW').innerHTML='<p style="font-size:.58rem;color:var(--text3);text-align:center;padding:6px">Collect data first.</p>';drawGr();};

function syncM(){if(!manD.length){expD=[];return;}
  var g={};manD.forEach(function(d){var k=fmtV(d.iv);if(!g[k])g[k]=[];g[k].push(d.dv);});
  expD=Object.keys(g).sort(function(a,b){return parseFloat(a)-parseFloat(b);}).map(function(k){var v=g[k],mn=v.reduce(function(a,b){return a+b;},0)/v.length;return{iv:parseFloat(k),mean:mn};});
  buildDT();setTimeout(function(){initGr();drawGr();},30);
}
function buildDT(){if(!expD.length)return;$('dW').innerHTML='<table class="dt"><thead><tr><th>'+getIVN()+'</th><th>Mean '+getDVN()+'</th></tr></thead><tbody>'+expD.map(function(r){return '<tr><td>'+fmtV(r.iv)+'</td><td class="mean">'+fmtV(r.mean)+'</td></tr>';}).join('')+'</tbody></table>';}
window.plotM=function(){if(!manD.length)return;syncM();document.querySelectorAll('.bt').forEach(function(t){t.classList.remove('on');});document.querySelectorAll('.btc').forEach(function(t){t.classList.remove('on');});document.querySelectorAll('.bt')[1].classList.add('on');$('b1').classList.add('on');setTimeout(function(){initGr();drawGr();},80);};

window.expCSV=function(){if(!manD.length)return;var csv=getIVN()+','+getDVN()+'\n';manD.forEach(function(d){csv+=fmtV(d.iv)+','+fmtV(d.dv)+'\n';});
  var blob=new Blob([csv],{type:'text/csv'});var a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='doppler_data.csv';a.click();};
window.savePlot=function(){if(!gCv)return;var a=document.createElement('a');a.href=gCv.toDataURL('image/png');a.download='doppler_plot.png';a.click();};
window.togGrid=function(){showGrid=!showGrid;drawGr();};
window.togBF=function(){showBF=!showBF;drawGr();};

var gCv,gx2;
function initGr(){gCv=$('gC');if(!gCv)return;gx2=gCv.getContext('2d');var d=devicePixelRatio||1,r=gCv.parentElement.getBoundingClientRect(),w=r.width;if(w<10)return;gCv.width=w*d;gCv.height=200*d;gCv.style.width=w+'px';gCv.style.height='200px';gx2.setTransform(d,0,0,d,0,0);}
function drawGr(){
  if(!gCv||!gx2){initGr();if(!gCv)return;}
  var w=parseInt(gCv.style.width)||500,h=200;
  gx2.clearRect(0,0,w,h);gx2.fillStyle='#fff';gx2.fillRect(0,0,w,h);
  if(!expD.length){gx2.fillStyle='#bbb';gx2.font='11px sans-serif';gx2.textAlign='center';gx2.fillText('Collect data and click Plot',w/2,h/2);return;}
  var P={t:20,r:15,b:36,l:55},pW=w-P.l-P.r,pH=h-P.t-P.b;
  var xs=expD.map(function(r2){return r2.iv;}),ys=expD.map(function(r2){return r2.mean;});
  var xn=Math.min.apply(null,xs),xx=Math.max.apply(null,xs),yn=Math.min.apply(null,ys),yx=Math.max.apply(null,ys);
  if(xx-xn<1e-9){xn-=1;xx+=1;}if(yx-yn<1e-9){yn-=1;yx+=1;}
  var xp=(xx-xn)*.1,yp=(yx-yn)*.1;xn-=xp;xx+=xp;yn-=yp;yx+=yp;
  var tx=function(v){return P.l+((v-xn)/(xx-xn))*pW;},ty=function(v){return P.t+pH-((v-yn)/(yx-yn))*pH;};
  if(showGrid){gx2.strokeStyle='rgba(0,0,0,.06)';gx2.lineWidth=.5;for(var i=0;i<=5;i++){var gxv=xn+(xx-xn)*i/5;gx2.beginPath();gx2.moveTo(tx(gxv),P.t);gx2.lineTo(tx(gxv),P.t+pH);gx2.stroke();}for(var i2=0;i2<=5;i2++){var gyv=yn+(yx-yn)*i2/5;gx2.beginPath();gx2.moveTo(P.l,ty(gyv));gx2.lineTo(P.l+pW,ty(gyv));gx2.stroke();}}
  gx2.strokeStyle='rgba(0,0,0,.25)';gx2.lineWidth=1.5;gx2.beginPath();gx2.moveTo(P.l,P.t);gx2.lineTo(P.l,P.t+pH);gx2.lineTo(P.l+pW,P.t+pH);gx2.stroke();
  gx2.fillStyle='#888';gx2.font='9px sans-serif';gx2.textAlign='center';
  for(var i3=0;i3<=5;i3++){var xv=xn+(xx-xn)*i3/5;gx2.fillText(fmtV(xv),tx(xv),P.t+pH+12);}
  gx2.textAlign='right';for(var i4=0;i4<=5;i4++){var yv=yn+(yx-yn)*i4/5;gx2.fillText(fmtV(yv),P.l-4,ty(yv)+3);}
  gx2.fillStyle='#555';gx2.font='bold 10px sans-serif';gx2.textAlign='center';gx2.fillText(getIVN(),P.l+pW/2,h-4);
  gx2.save();gx2.translate(10,P.t+pH/2);gx2.rotate(-Math.PI/2);gx2.fillText(getDVN(),0,0);gx2.restore();
  if(showBF&&xs.length>=2){var n=xs.length,sx=0,sy=0,sxy=0,sx2=0;for(var bf=0;bf<n;bf++){sx+=xs[bf];sy+=ys[bf];sxy+=xs[bf]*ys[bf];sx2+=xs[bf]*xs[bf];}
    var bfM=(n*sxy-sx*sy)/(n*sx2-sx*sx),bfB=(sy-bfM*sx)/n;
    gx2.strokeStyle='rgba(220,38,38,.4)';gx2.lineWidth=1.5;gx2.setLineDash([6,4]);gx2.beginPath();gx2.moveTo(tx(xn),ty(bfM*xn+bfB));gx2.lineTo(tx(xx),ty(bfM*xx+bfB));gx2.stroke();gx2.setLineDash([]);
    gx2.fillStyle='rgba(220,38,38,.5)';gx2.font='9px sans-serif';gx2.textAlign='right';gx2.fillText('y = '+bfM.toFixed(2)+'x + '+bfB.toFixed(2),P.l+pW,P.t+12);
  }
  if(xs.length>=2){gx2.strokeStyle='#0284C7';gx2.lineWidth=1.5;gx2.beginPath();expD.forEach(function(r2,i5){i5===0?gx2.moveTo(tx(r2.iv),ty(r2.mean)):gx2.lineTo(tx(r2.iv),ty(r2.mean));});gx2.stroke();}
  gx2.fillStyle='#0284C7';xs.forEach(function(x,i5){gx2.beginPath();gx2.arc(tx(x),ty(ys[i5]),4.5,0,Math.PI*2);gx2.fill();gx2.strokeStyle='#fff';gx2.lineWidth=1.5;gx2.stroke();});
  manD.forEach(function(d){gx2.fillStyle='rgba(2,132,199,.25)';gx2.beginPath();gx2.arc(tx(d.iv),ty(d.dv),3,0,Math.PI*2);gx2.fill();});
}

var IB=[
{c:'State',q:'State the Doppler effect.',f:'The change in observed frequency when there is relative motion between source and observer.'},
{c:'Explain',q:'Why does a siren sound higher as it approaches?',f:'Wavefronts compress ahead of the moving source → shorter λ → higher f detected.'},
{c:'Calculate',q:'f₀=400Hz, car at 30m/s toward observer, v=340m/s. Find f\'.',f:'f\'=f₀v/(v−vₛ)=400×340/310=438.7 Hz.'},
{c:'Calculate',q:'Observer at 10m/s toward siren. f₀=500Hz, v=340m/s.',f:'f\'=f₀(v+v₀)/v=500×350/340=514.7 Hz.'},
{c:'Explain',q:'What is a shock wave?',f:'When vₛ>v (M>1), wavefronts pile up into a cone. Half-angle: sinθ=1/M.'},
{c:'Calculate',q:'Jet at Mach 2.0. Find cone angle.',f:'sinθ=1/2=0.5 → θ=30°.'},
{c:'Explain',q:'How does a radar gun measure speed?',f:'Emits microwaves at f₀. Reflected wave shifted by Δf=2f₀v/c. Speed v=Δfc/(2f₀).'}
];
function buildIB(){$('ibL').innerHTML=IB.map(function(q,i){var cls=q.c==='Calculate'?'c':q.c==='Explain'?'e':'s';return '<div class="ib-card"><span class="ib-cmd ib-cmd-'+cls+'">'+q.c+'</span><h4>Q'+(i+1)+'</h4><p>'+q.q+'</p><textarea placeholder="Your answer..."></textarea><div style="display:flex;gap:3px;margin-top:3px"><button class="btn btn-p" onclick="sF('+i+')" style="font-size:.65rem">Show Answer</button></div><div class="ib-ans" id="iF'+i+'">'+q.f+'</div></div>';}).join('');}
window.sF=function(i){$('iF'+i).classList.toggle('show');if($('iF'+i).classList.contains('show'))addN('IB Q'+(i+1),IB[i].q.substring(0,50)+'...','Answered');};
var nb=[];function addN(t,d,r){nb.push({t:t,d:d,r:r});showN();}
function showN(){$('nbO').innerHTML=nb.length?nb.map(function(n,i){return '<div class="nb-c"><b>#'+(i+1)+' '+n.t+'</b><br>'+n.d+'<br><span class="nr">→ '+n.r+'</span></div>';}).join(''):'<p style="text-align:center;color:var(--text3);font-size:.56rem;padding:6px">Complete experiments to record.</p>';}

S.obsXPos=350;$('guideBar').innerHTML=SCENES[0].g;buildControls();buildSidebar();buildExp();buildIB();showN();requestAnimationFrame(animate);
</script>
