function drawTankBg(cx,tL,tR,tT,tB){cx.fillStyle='#FAFAF8';cx.beginPath();cx.moveTo(tL,tT);cx.lineTo(tL,tB-10);cx.quadraticCurveTo(tL,tB,tL+10,tB);cx.lineTo(tR-10,tB);cx.quadraticCurveTo(tR,tB,tR,tB-10);cx.lineTo(tR,tT);cx.closePath();cx.fill();}
function drawFluidFill(cx,tL,tR,tT,tB,wY,fl){var c1=h2r(fl.c),c2=h2r(fl.dc);cx.save();cx.beginPath();for(var x=tL;x<=tR;x++){var wv=Math.sin(x*.025+time*1.8)*2.2+Math.sin(x*.045+time*2.7)*1.1+Math.sin(x*.012+time*1.2)*2.8;x===tL?cx.moveTo(x,wY+wv):cx.lineTo(x,wY+wv);}cx.lineTo(tR,tB);cx.lineTo(tL,tB);cx.closePath();var gr=cx.createLinearGradient(0,wY,0,tB);gr.addColorStop(0,'rgba('+c1.r+','+c1.g+','+c1.b+','+(fl.a*.7)+')');gr.addColorStop(.3,'rgba('+((c1.r+c2.r)/2|0)+','+((c1.g+c2.g)/2|0)+','+((c1.b+c2.b)/2|0)+','+(fl.a*.8)+')');gr.addColorStop(1,'rgba('+c2.r+','+c2.g+','+c2.b+','+fl.a+')');cx.fillStyle=gr;cx.fill();cx.beginPath();for(var x2=tL;x2<=tR;x2++){var wv2=Math.sin(x2*.025+time*1.8)*2.2+Math.sin(x2*.045+time*2.7)*1.1+Math.sin(x2*.012+time*1.2)*2.8;x2===tL?cx.moveTo(x2,wY+wv2):cx.lineTo(x2,wY+wv2);}cx.strokeStyle='rgba(255,255,255,'+(fl.a*.6)+')';cx.lineWidth=2;cx.stroke();cx.globalAlpha=.04;for(var i=0;i<6;i++){cx.beginPath();cx.arc(tL+(tR-tL)*(.1+i*.15+Math.sin(time*.7+i)*.05),tB-20+Math.sin(time*1.2+i*1.5)*8,15+Math.sin(time+i)*5,0,Math.PI*2);cx.fillStyle='#fff';cx.fill();}cx.globalAlpha=1;cx.restore();}
function drawTankWalls(cx,tL,tR,tT,tB){cx.strokeStyle='rgba(180,180,190,.6)';cx.lineWidth=2.5;cx.lineCap='round';cx.beginPath();cx.moveTo(tL,tT);cx.lineTo(tL,tB-10);cx.quadraticCurveTo(tL,tB,tL+10,tB);cx.lineTo(tR-10,tB);cx.quadraticCurveTo(tR,tB,tR,tB-10);cx.lineTo(tR,tT);cx.stroke();cx.strokeStyle='rgba(255,255,255,.3)';cx.lineWidth=1.5;cx.beginPath();cx.moveTo(tL+3,tT+10);cx.lineTo(tL+3,tB-15);cx.stroke();cx.strokeStyle='rgba(160,160,170,.4)';cx.lineWidth=1;cx.font='500 9px system-ui';cx.fillStyle='rgba(120,120,130,.6)';cx.textAlign='right';for(var i=1;i<10;i++){var yy=tT+(tB-tT)*i/10;cx.beginPath();cx.moveTo(tR,yy);cx.lineTo(tR-(i%2===0?14:8),yy);cx.stroke();if(i%2===0)cx.fillText((10-i)*100+'',tR-16,yy+3);}}
function drawObj3D(cx,x,y,shape,sz,mc){var half=sz/2,rgb=h2r(mc);cx.save();cx.translate(x,y);if(shape==='cube'){var d=sz*.22;cx.beginPath();cx.moveTo(-half,-half);cx.lineTo(-half+d,-half-d);cx.lineTo(half+d,-half-d);cx.lineTo(half,-half);cx.closePath();cx.fillStyle='rgba('+(Math.min(255,rgb.r+40))+','+(Math.min(255,rgb.g+40))+','+(Math.min(255,rgb.b+40))+',.9)';cx.fill();cx.strokeStyle='rgba(0,0,0,.1)';cx.lineWidth=.5;cx.stroke();cx.beginPath();cx.moveTo(half,-half);cx.lineTo(half+d,-half-d);cx.lineTo(half+d,half-d);cx.lineTo(half,half);cx.closePath();cx.fillStyle='rgba('+(Math.max(0,rgb.r-30))+','+(Math.max(0,rgb.g-30))+','+(Math.max(0,rgb.b-30))+',.9)';cx.fill();cx.stroke();var fg=cx.createLinearGradient(-half,-half,half,half);fg.addColorStop(0,'rgba('+rgb.r+','+rgb.g+','+rgb.b+',.95)');fg.addColorStop(1,'rgba('+(Math.max(0,rgb.r-20))+','+(Math.max(0,rgb.g-20))+','+(Math.max(0,rgb.b-20))+',.95)');cx.fillStyle=fg;cx.fillRect(-half,-half,sz,sz);cx.strokeRect(-half,-half,sz,sz);cx.fillStyle='rgba(255,255,255,.15)';cx.fillRect(-half+2,-half+2,sz*.4,sz*.15);}else if(shape==='sphere'){var sg=cx.createRadialGradient(-half*.3,-half*.3,half*.1,0,0,half);sg.addColorStop(0,'rgba('+(Math.min(255,rgb.r+60))+','+(Math.min(255,rgb.g+60))+','+(Math.min(255,rgb.b+60))+',1)');sg.addColorStop(.5,mc);sg.addColorStop(1,'rgba('+(Math.max(0,rgb.r-50))+','+(Math.max(0,rgb.g-50))+','+(Math.max(0,rgb.b-50))+',1)');cx.beginPath();cx.arc(0,0,half,0,Math.PI*2);cx.fillStyle=sg;cx.fill();cx.beginPath();cx.arc(-half*.25,-half*.3,half*.18,0,Math.PI*2);cx.fillStyle='rgba(255,255,255,.35)';cx.fill();}else{var rX=half*.85,rY=half*.28,bH=sz*.75;var bg=cx.createLinearGradient(-rX,0,rX,0);bg.addColorStop(0,'rgba('+(Math.max(0,rgb.r-30))+','+(Math.max(0,rgb.g-30))+','+(Math.max(0,rgb.b-30))+',.95)');bg.addColorStop(.4,mc);bg.addColorStop(1,'rgba('+(Math.max(0,rgb.r-40))+','+(Math.max(0,rgb.g-40))+','+(Math.max(0,rgb.b-40))+',.95)');cx.fillStyle=bg;cx.beginPath();cx.moveTo(-rX,-bH/2);cx.lineTo(-rX,bH/2);cx.ellipse(0,bH/2,rX,rY,0,Math.PI,0,true);cx.lineTo(rX,-bH/2);cx.closePath();cx.fill();cx.beginPath();cx.ellipse(0,-bH/2,rX,rY,0,0,Math.PI*2);cx.fillStyle='rgba('+(Math.min(255,rgb.r+30))+','+(Math.min(255,rgb.g+30))+','+(Math.min(255,rgb.b+30))+',.95)';cx.fill();}cx.restore();}
function drawArr(cx,x1,y1,x2,y2,c,l){var dx=x2-x1,dy=y2-y1,len=Math.sqrt(dx*dx+dy*dy);if(len<3)return;var ux=dx/len,uy=dy/len,hl=Math.min(10,len*.3);cx.save();cx.strokeStyle=c;cx.fillStyle=c;cx.lineWidth=2.5;cx.lineCap='round';cx.beginPath();cx.moveTo(x1,y1);cx.lineTo(x2-ux*hl*.5,y2-uy*hl*.5);cx.stroke();var px=-uy,py=ux;cx.beginPath();cx.moveTo(x2,y2);cx.lineTo(x2-ux*hl+px*hl*.35,y2-uy*hl+py*hl*.35);cx.lineTo(x2-ux*hl-px*hl*.35,y2-uy*hl-py*hl*.35);cx.closePath();cx.fill();cx.font='600 11px system-ui';cx.textAlign='left';cx.fillText(l,x2+6,y2-2);cx.restore();}

  [{c:'State',q:'Define density and give its SI unit.',f:'Density is mass per unit volume: ρ = m/V. SI unit: kg/m³.'},{c:'Explain',q:'Why does an object float in a fluid?',f:'An object floats when its density is less than the fluid density. The buoyant force exceeds the object\'s weight, producing a net upward force until equilibrium.'},{c:'Calculate',q:'A cube of side 10 cm has mass 2.7 kg. Find its density.',f:'V = (0.10)³ = 0.001 m³ = 1000 cm³. ρ = m/V = 2.7/0.001 = 2700 kg/m³. This is aluminum.'},{c:'Calculate',q:'A 500 g wooden block floats in water with 60% submerged. Find the wood\'s density.',f:'At equilibrium: ρ_wood = submerged fraction × ρ_water = 0.60 × 1000 = 600 kg/m³.'},{c:'Explain',q:'Why does a steel ship float despite steel being denser than water?',f:'The ship\'s hull encloses air, making the average density of the ship (steel + air) less than water. The total volume displaced creates enough buoyant force to support the weight.'},{c:'Explain',q:'State Archimedes\' principle.',f:'A body immersed in a fluid experiences an upward buoyant force equal to the weight of the fluid displaced: F_b = ρ_fluid × V_displaced × g.'},{c:'Calculate',q:'An object of volume 200 cm³ and density 3000 kg/m³ is submerged in water. Find the buoyant force.',f:'V = 200 × 10⁻⁶ = 2×10⁻⁴ m³. F_b = ρ_water × V × g = 1000 × 2×10⁻⁴ × 9.81 = 1.96 N.'}],

  [{c:'Calculate',q:'An object has mass 5.4 kg and volume 2000 cm³. What is its density? Identify the material.',f:'ρ = m/V = 5.4 / (2000/10⁶) = 5.4 / 0.002 = 2700 kg/m³. This is aluminum.'},{c:'Calculate',q:'A mystery sphere has mass 800 g and volume 870 cm³. Identify it.',f:'ρ = 0.8 / (870/10⁶) = 0.8 / 0.00087 ≈ 920 kg/m³. Close to ice (917 kg/m³).'},{c:'Explain',q:'Why is density useful for identifying unknown materials?',f:'Density is an intensive property — it doesn\'t depend on the amount of material. Every pure substance has a characteristic density, making it a reliable identifier.'},{c:'Calculate',q:'Two identical-looking blocks: A has m=3.9 kg, V=500 cm³. B has m=4.48 kg, V=500 cm³. Identify both.',f:'ρ_A = 3.9/0.0005 = 7800 kg/m³ (Steel). ρ_B = 4.48/0.0005 = 8960 kg/m³ (Copper).'}],

// ====== PER-TAB VALUE READERS ======
function getCurVars(){return TAB_VARS[activeLab];}
function getCurIVN(){var vs=getCurVars(),sel=$('expIV')?$('expIV').value:vs.iv[0].id;for(var i=0;i<vs.iv.length;i++){if(vs.iv[i].id===sel)return vs.iv[i].n;}return vs.iv[0].n;}
function getCurDVN(){var vs=getCurVars(),sel=$('expDV')?$('expDV').value:vs.dv[0].id;for(var i=0;i<vs.dv.length;i++){if(vs.dv[i].id===sel)return vs.dv[i].n;}return vs.dv[0].n;}
function getCurIV(){
  var vs=getCurVars(),sel=$('expIV')?$('expIV').value:vs.iv[0].id;
  if(activeLab===0){if(sel==='mass')return T1.mass;if(sel==='vol')return T1.vol;if(sel==='fd')return FLUIDS[T1.fluid].d;}
  else if(activeLab===1){if(sel==='objd')return MATS[T2.mat].d;if(sel==='mat')return MATKEYS.indexOf(T2.mat)+1;}
  else if(activeLab===2){var m3=MATS[T3.targetMat];if(!m3)return 0;var mass3=m3.d*(T3.targetVol/1e6);if(sel==='mass')return mass3;if(sel==='vol')return T3.targetVol;}
  else if(activeLab===3){if(!T4.mat)return 0;if(sel==='mass')return T4.mass*1000;if(sel==='vol')return T4.dropped?(T4.waterFinal-T4.waterInit):0;}
  else if(activeLab===4){if(sel==='dA')return MATS[T5.matA].d;if(sel==='dB')return MATS[T5.matB].d;if(sel==='fd')return FLUIDS[T5.fluid].d;}
  return 0;
}
function getCurDV(){
  var vs=getCurVars(),sel=$('expDV')?$('expDV').value:vs.dv[0].id;
  if(activeLab===0){
    var d0=t1gD(),fd0=FLUIDS[T1.fluid].d;
    if(sel==='dens')return d0;if(sel==='sink')return d0<fd0?1:0;
    if(sel==='subf'){if(!t1obj.on)return 0;return clamp((t1obj.y+t1gSz()/2-t1wY)/t1gSz(),0,1);}
    if(sel==='fb'){var sf0=t1obj.on?clamp((t1obj.y+t1gSz()/2-t1wY)/t1gSz(),0,1):0;return fd0*(T1.vol/1e6)*sf0*9.81;}
  }else if(activeLab===1){
    var md=MATS[T2.mat].d;if(sel==='layer'){if(md<=920)return 0;if(md<=1000)return 1;if(md<=1420)return 2;if(md<=13600)return 3;return 4;}
    if(sel==='dens')return md;
  }else if(activeLab===2){
    var m3b=MATS[T3.targetMat];if(!m3b)return 0;var d3=m3b.d;
    if(sel==='dens')return d3;if(sel==='matid')return MATKEYS.indexOf(T3.targetMat)+1;
  }else if(activeLab===3){
    if(!T4.mat)return 0;var massG=T4.mass*1000,volML=T4.dropped?(T4.waterFinal-T4.waterInit):0;
    if(sel==='dens')return volML>0?massG/volML:0;if(sel==='densSI')return volML>0?(massG/volML)*1000:0;
  }else if(activeLab===4){
    var dA5=MATS[T5.matA].d,dB5=MATS[T5.matB].d,fd5=FLUIDS[T5.fluid].d;
    if(sel==='ratio')return dB5>0?dA5/dB5:0;if(sel==='sinkA')return dA5>fd5?1:0;if(sel==='sinkB')return dB5>fd5?1:0;
  }
  return 0;
}

  var hypDir=$('hypDir')?$('hypDir').value:'increase';
  h+='<div><label class="exp-label hyp">Hypothesis</label><div class="exp-hypothesis">"If <strong style="color:#2563eb">'+ivN+'</strong> is increased, then <strong style="color:#dc2626">'+dvN+'</strong> will <select style="border:1px solid var(--border);border-radius:4px;padding:1px 4px;font-size:.72rem" id="hypDir"><option'+(hypDir==='increase'?' selected':'')+'>increase</option><option'+(hypDir==='decrease'?' selected':'')+'>decrease</option><option'+(hypDir==='remain constant'?' selected':'')+'>remain constant</option></select>, while keeping <strong style="color:#059669">'+cvItems.join(', ')+'</strong> constant."</div></div></div>';

  h+='<div style="display:flex;gap:3px;align-items:end;margin-bottom:4px"><div style="flex:1"><label style="font-size:.62rem;font-weight:700;color:#2563eb">IV</label><div style="display:flex;gap:2px"><input class="num-input" id="mIV" step="any" style="width:100%"><button class="btn btn-s" onclick="rIV()" style="font-size:.6rem;padding:2px 4px">Read</button></div></div>';
  h+='<div style="flex:1"><label style="font-size:.62rem;font-weight:700;color:#dc2626">DV</label><div style="display:flex;gap:2px"><input class="num-input" id="mDV" step="any" style="width:100%"><button class="btn btn-s" onclick="rDV()" style="font-size:.6rem;padding:2px 4px">Read</button></div></div>';
  h+='<button class="btn btn-p" onclick="addR()" style="font-size:.6rem;padding:3px 6px">+Add</button><button class="btn btn-ok" onclick="aAdd()" style="font-size:.6rem;padding:3px 6px">Auto</button></div>';
  h+='<div style="display:flex;gap:4px;align-items:center;margin-bottom:4px"><span style="font-size:.6rem;font-weight:700;color:var(--text3)">± Uncertainty:</span><div style="flex:1;display:flex;align-items:center;gap:4px"><input type="range" min="0.1" max="5" step="0.1" value="'+uncert+'" oninput="uncert=+this.value;document.getElementById(\'vunc\').textContent=uncert.toFixed(1)" style="max-width:100px"><span id="vunc" style="font-family:var(--mono);font-size:.72rem;font-weight:700;color:var(--accent)">'+uncert.toFixed(1)+'</span><span style="font-size:.6rem;color:var(--text3)">%</span></div></div>';
  h+='<div id="mT"></div><div style="display:flex;gap:3px;margin-top:3px"><button class="btn btn-ok" onclick="plotM()">Plot</button><button class="btn btn-s" onclick="clrM()">Clear</button><button class="btn btn-s" onclick="expCSV()">Export CSV</button></div></div>';
  $('expC').innerHTML=h;buildMT();
}

  if(t5objB.on)drawObj3D(t5cx,t5objB.x,t5objB.y,T5.shape,45,MATS[T5.matB].c);
  if(t5objA.on){t5cx.fillStyle='#3B82F6';t5cx.font='bold 11px system-ui';t5cx.textAlign='center';t5cx.fillText('A',t5objA.x,t5objA.y-30);}
  if(t5objB.on){t5cx.fillStyle='#EF4444';t5cx.font='bold 11px system-ui';t5cx.textAlign='center';t5cx.fillText('B',t5objB.x,t5objB.y-30);}
  t5bubs.forEach(function(b){t5cx.save();t5cx.globalAlpha=b.l*.5;t5cx.beginPath();t5cx.arc(b.x,b.y,b.r,0,Math.PI*2);t5cx.fillStyle='rgba(255,255,255,.6)';t5cx.fill();t5cx.restore();});
  t5splsh.forEach(function(s){t5cx.save();t5cx.globalAlpha=s.l*.7;t5cx.beginPath();t5cx.arc(s.x,s.y,s.s,0,Math.PI*2);t5cx.fillStyle=FLUIDS[T5.fluid].c;t5cx.fill();t5cx.restore();});
  drawTankWalls(t5cx,tL,tR,tT,tB);
}
function t5updInfo(){
  var dA=MATS[T5.matA].d,dB=MATS[T5.matB].d,fd=FLUIDS[T5.fluid].d;
  $('t5dA').textContent=dA.toLocaleString();$('t5dB').textContent=dB.toLocaleString();
  var rA=dA/fd,rB=dB/fd;
  $('t5vA').textContent=rA<.98?'Floats':rA>1.02?'Sinks':'Neutral';$('t5vA').className='verdict '+(rA<.98?'v-float':rA>1.02?'v-sink':'v-hover');
  $('t5vB').textContent=rB<.98?'Floats':rB>1.02?'Sinks':'Neutral';$('t5vB').className='verdict '+(rB<.98?'v-float':rB>1.02?'v-sink':'v-hover');
  var h='<strong>'+MATS[T5.matA].n+'</strong> ('+dA.toLocaleString()+') vs <strong>'+MATS[T5.matB].n+'</strong> ('+dB.toLocaleString()+') in '+FLUIDS[T5.fluid].n+' ('+fd.toLocaleString()+')<br>';
  if(dA>dB)h+=MATS[T5.matA].n+' is '+(dA/dB).toFixed(1)+'x denser.';else if(dB>dA)h+=MATS[T5.matB].n+' is '+(dB/dA).toFixed(1)+'x denser.';else h+='Same density!';
  $('t5explain').innerHTML=h;
}

// ====== BUILD ALL TABS ======
function buildTabs(){
  var th='';LABS.forEach(function(l,i){th+='<div class="lab-tab'+(i===0?' on':'')+'" onclick="switchLab('+i+')"><div class="lab-tab-name">'+l.n+'</div><div class="lab-tab-desc">'+l.d+'</div></div>';});$('labTabs').innerHTML=th;
  var ch='';
  // Tab 0: Tank Lab
  ch+='<div class="lab-pane on" id="lab0"><div class="intro-bar"><b>Drop objects into fluids.</b> Change material, shape, mass, and volume. Observe floating, sinking, and buoyancy forces.</div><div class="main-grid"><div class="tank-sec"><div class="cv-wrap" id="t1Wrap"><canvas id="t1Cv"></canvas><div class="po" id="t1pOver"><div class="po-cw"><canvas id="t1pCv" width="180" height="180"></canvas></div><div style="margin-top:10px;font-size:.82rem;font-weight:600" id="t1pLbl">Aluminum</div><div style="font-size:.7rem;color:var(--text2);margin-top:2px" id="t1pSub">2,700 kg/m³</div></div></div>';
  ch+='<div class="tank-ctrls"><select class="ctrl-sel" id="t1MatSel" onchange="t1pickMat(this.value)">'+matOpts(T1.mat)+'</select><div class="sh-g" id="t1ShG">'+SHAPES.map(function(s){return '<button class="sh-btn'+(s.id===T1.shape?' on':'')+'" onclick="pickT1Sh(\''+s.id+'\')" title="'+s.lbl+'"><svg viewBox="0 0 26 26">'+s.ic+'</svg></button>';}).join('')+'</div><select class="ctrl-sel" onchange="T1.fluid=this.value;t1updRead()">'+fluidOpts(T1.fluid)+'</select></div>';
  ch+='<div class="tank-ctrls"><button class="act-btn drop-btn" onclick="t1drop()">Drop Object</button><button class="act-btn rst-btn" onclick="t1rst()">Reset</button><button class="tog-btn" id="t1togF" onclick="T1.showF=!T1.showF;this.classList.toggle(\'on\')">Forces</button><button class="tog-btn" id="t1togP" onclick="T1.showP=!T1.showP;this.classList.toggle(\'on\');document.getElementById(\'t1pOver\').classList.toggle(\'vis\',T1.showP);if(T1.showP)t1drawPV();">Particles</button></div></div>';
  ch+='<div class="info-panel"><div class="pc dn-hero"><div class="dn-formula"><em>ρ</em> = m ÷ V</div><div class="dn-num" id="t1dnNum">—</div><div class="dn-unit">kg/m³</div><div class="verdict" id="t1verd"></div></div>';
  ch+='<div class="pc"><div class="meas"><div class="meas-box"><div class="meas-lbl">Mass</div><div class="meas-val" id="t1mV">—</div></div><div class="meas-box"><div class="meas-lbl">Volume</div><div class="meas-val" id="t1vV">—</div></div><div class="meas-box"><div class="meas-lbl">Fluid ρ</div><div class="meas-val" id="t1fV">—</div></div></div></div>';
  ch+='<div class="pc"><div class="arch-box" id="t1archBox">Drop an object to see Archimedes\' calculation.</div></div>';
  ch+='<div class="pc" style="padding:12px 16px"><div class="sl-row"><div class="sl-hdr"><span class="sl-lbl">Mass</span><span class="sl-val" id="t1msV">2.70 kg</span></div><input type="range" id="t1msSl" min="0.05" max="30" step="0.05" value="2.7" oninput="T1.mass=+this.value;T1.custom=true;t1updRead()"></div><div class="sl-row"><div class="sl-hdr"><span class="sl-lbl">Volume</span><span class="sl-val" id="t1vsV">1000 cm³</span></div><input type="range" id="t1vsSl" min="50" max="8000" step="10" value="1000" oninput="T1.vol=+this.value;T1.custom=true;t1updRead()"></div></div></div></div></div>';

  // Tab 1: Density Column
  ch+='<div class="lab-pane" id="lab1"><div class="intro-bar"><b>Density Column.</b> Four fluids layered by density. Drop objects and watch them settle at the correct interface.</div><div class="col-grid"><div class="tank-sec"><div class="cv-wrap col-cv" id="t2Wrap"><canvas id="t2Cv"></canvas></div><div class="tank-ctrls"><select class="ctrl-sel" id="t2MatSel" onchange="T2.mat=this.value;t2buildLadder()">'+matOpts(T2.mat)+'</select><button class="act-btn drop-btn" onclick="t2drop()">Drop Object</button><button class="act-btn rst-btn" onclick="t2rst()">Reset</button></div></div><div class="info-panel"><div class="pc"><div class="exp-title">Where Will It Settle?</div><div id="t2info"><div class="arch-box">Select a material and drop it into the density column.</div></div></div><div class="pc"><div class="exp-title">Density Ladder</div><div class="density-ladder" id="t2ladder"></div></div></div></div></div>';

  // Tab 2: Mystery Material
  ch+='<div class="lab-pane" id="lab2"><div class="intro-bar"><b>Mystery Material.</b> Calculate density from the given mass and volume, then identify the material.</div><div class="mystery-center"><div class="pc" style="text-align:center;padding:20px"><div class="mystery-obj" id="t3obj">?</div><div class="mystery-given"><div class="mystery-stat"><div class="mystery-stat-lbl">Mass</div><div class="mystery-stat-val" id="t3mass">—</div></div><div class="mystery-stat"><div class="mystery-stat-lbl">Volume</div><div class="mystery-stat-val" id="t3vol">—</div></div></div>';
  ch+='<div style="text-align:left;margin-bottom:10px"><div class="arch-box" style="font-size:.78rem">ρ = m ÷ V — Calculate the density, then guess the material.</div></div>';
  ch+='<div class="mystery-input"><div class="mystery-field"><label>Your Density (kg/m³)</label><input type="number" id="t3densInput" placeholder="e.g. 2700"></div><div class="mystery-field"><label>Material Guess</label><select id="t3matGuess"><option value="">Pick one...</option>'+MATKEYS.map(function(k){return '<option value="'+k+'">'+MATS[k].n+'</option>';}).join('')+'</select></div></div>';
  ch+='<div class="mystery-feedback" id="t3fb"></div>';
  ch+='<div style="display:flex;gap:6px;justify-content:center;margin-bottom:12px"><button class="btn btn-p" onclick="t3check()" style="padding:8px 20px;font-size:.85rem">Check Answer</button><button class="btn btn-s" onclick="t3newMystery()" style="padding:8px 20px;font-size:.85rem">New Mystery</button></div>';
  ch+='<div class="score-bar">Score: <span class="s-right" id="t3score">0</span> / <span class="s-total" id="t3total">0</span></div></div></div></div>';

  // Tab 3: Measurement Lab
  ch+='<div class="lab-pane" id="lab3"><div class="intro-bar"><b>Measurement Lab.</b> Read the mass from the balance and volume from the graduated cylinder. Calculate density from your measurements.</div><div class="measure-grid"><div class="tank-sec"><div class="cv-wrap measure-cv" id="t4Wrap"><canvas id="t4Cv"></canvas></div><div class="tank-ctrls"><button class="act-btn drop-btn" id="t4dropBtn" onclick="t4dropIntoCyl()">Drop into Cylinder</button><button class="act-btn rst-btn" onclick="t4newSample()">New Sample</button></div></div>';
  ch+='<div class="info-panel"><div class="pc"><div class="exp-title">Your Measurements</div><div class="measure-steps"><div class="measure-step">Read the <strong>mass</strong> from the balance (in grams)<br><input class="num-input" id="t4userMass" style="width:100px;margin-top:4px" placeholder="g"></div><div class="measure-step">Read the <strong>initial water level</strong> (in mL)<br><input class="num-input" id="t4userV1" style="width:100px;margin-top:4px" placeholder="mL"></div><div class="measure-step">Drop the object, read the <strong>final water level</strong><br><input class="num-input" id="t4userV2" style="width:100px;margin-top:4px" placeholder="mL"></div><div class="measure-step">Calculate: Volume = V₂ − V₁, then ρ = m ÷ V</div></div><div style="margin-top:8px"><button class="btn btn-ok" onclick="t4checkMeasurement()" style="padding:6px 16px;font-size:.8rem">Check My Work</button></div><div class="measure-result" id="t4result" style="display:none"></div></div></div></div></div>';

  // Tab 4: Comparison
  ch+='<div class="lab-pane" id="lab4"><div class="intro-bar"><b>Comparison.</b> Drop two objects into the same fluid. Compare densities side by side.</div><div class="comp-grid"><div class="tank-sec"><div class="cv-wrap comp-cv" id="t5Wrap"><canvas id="t5Cv"></canvas></div><div class="tank-ctrls"><select class="ctrl-sel" onchange="T5.matA=this.value;t5updInfo()">'+MATKEYS.map(function(k){return '<option value="'+k+'"'+(k==='cork'?' selected':'')+'>A: '+MATS[k].n+'</option>';}).join('')+'</select><select class="ctrl-sel" onchange="T5.matB=this.value;t5updInfo()">'+MATKEYS.map(function(k){return '<option value="'+k+'"'+(k==='steel'?' selected':'')+'>B: '+MATS[k].n+'</option>';}).join('')+'</select><select class="ctrl-sel" onchange="T5.fluid=this.value;t5updInfo()">'+fluidOpts(T5.fluid)+'</select></div><div class="tank-ctrls"><button class="act-btn drop-btn" onclick="t5drop()">Drop Both</button><button class="act-btn rst-btn" onclick="t5rst()">Reset</button></div></div>';
  ch+='<div class="info-panel"><div class="comp-cards"><div class="comp-card" style="border-color:#3B82F6"><div class="comp-card-title" style="color:#3B82F6">Object A</div><div class="dn-num" id="t5dA">—</div><div class="dn-unit">kg/m³</div><div class="verdict" id="t5vA" style="margin-top:6px"></div></div><div class="comp-vs">vs</div><div class="comp-card" style="border-color:#EF4444"><div class="comp-card-title" style="color:#EF4444">Object B</div><div class="dn-num" id="t5dB">—</div><div class="dn-unit">kg/m³</div><div class="verdict" id="t5vB" style="margin-top:6px"></div></div></div><div class="pc" style="margin-top:10px"><div class="arch-box" id="t5explain">Drop both objects to compare.</div></div></div></div></div>';

  $('labContent').innerHTML=ch;
}

window.switchLab=function(i){
  activeLab=i;
  document.querySelectorAll('.lab-tab').forEach(function(t,j){t.classList.toggle('on',j===i);});
  document.querySelectorAll('.lab-pane').forEach(function(p,j){p.classList.toggle('on',j===i);});
  buildExp();buildIB();buildMT();
  if(tabExpD[activeLab].length){buildDT();}else{if($('dW'))$('dW').innerHTML='<p style="font-size:.58rem;color:var(--text3);text-align:center;padding:6px">Record data points first.</p>';}
  showNB();
  setTimeout(function(){if(i===0)t1rsz();if(i===1)t2rsz();if(i===3)t4rsz();if(i===4)t5rsz();setTimeout(function(){initGr();drawGr();},50);},50);
};
window.pickT1Sh=function(id){T1.shape=id;document.querySelectorAll('#t1ShG .sh-btn').forEach(function(b,i){b.classList.toggle('on',SHAPES[i].id===id);});};

// ====== MAIN LOOP ======
function mainLoop(){
  time+=0.016;
  if(activeLab===0){t1updPh();t1render();}
  else if(activeLab===1){t2updPh();t2render();}
  else if(activeLab===3){t4render();}
  else if(activeLab===4){t5updPh();t5render();}
  requestAnimationFrame(mainLoop);
}

// ====== INIT ======
buildTabs();buildSharedPanel();
t1rsz();t1updRead();buildExp();buildIB();showNB();
t2rsz();t2buildLadder();t3newMystery();t4newSample();t4rsz();t5rsz();t5updInfo();
window.addEventListener('resize',function(){t1rsz();t2rsz();t4rsz();t5rsz();});
requestAnimationFrame(mainLoop);
</script>
