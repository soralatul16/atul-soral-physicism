<script>
// roundRect polyfill
if(!CanvasRenderingContext2D.prototype.roundRect){
  CanvasRenderingContext2D.prototype.roundRect=function(x,y,w,h,r){
    if(typeof r==='number')r=[r,r,r,r];if(!Array.isArray(r))r=[0,0,0,0];
    this.moveTo(x+r[0],y);this.lineTo(x+w-r[1],y);this.arcTo(x+w,y,x+w,y+r[1],r[1]);
    this.lineTo(x+w,y+h-r[2]);this.arcTo(x+w,y+h,x+w-r[2],y+h,r[2]);
    this.lineTo(x+r[3],y+h);this.arcTo(x,y+h,x,y+h-r[3],r[3]);
    this.lineTo(x,y+r[0]);this.arcTo(x,y,x+r[0],y,r[0]);this.closePath();
  };
}
var $=function(id){return document.getElementById(id)};
var SCENES=[
  {n:'What is a Wave?',bg:'#E8EAF6',type:'string',guide:'<b>A wave transfers energy without transferring matter.</b> Watch the wavefront propagate from the hand. The red tracked particle oscillates in place — energy travels, matter does not.'},
  {n:'String Wave',bg:'#FFF3E0',type:'string',guide:'<b>A vibrating string creates transverse waves.</b> Particles move perpendicular to wave direction. Toggle Top View to see the wave from above.'},
  {n:'Spring Wave',bg:'#E0F2F1',type:'spring',guide:'<b>Push-pull a spring to create longitudinal waves.</b> Watch metallic coils compress and stretch. Darker regions = compressions (C). Lighter regions = rarefactions (R).'},
  {n:'Water Wave',bg:'#E3F2FD',type:'water',guide:'<b>Water waves are a mix of transverse and longitudinal.</b> Particles move in circular orbits. Toggle Top View to see wave crests from above.'},
  {n:'Sound Wave',bg:'#FCE4EC',type:'sound',guide:'<b>Sound is a longitudinal wave in a medium.</b> The speaker cone pumps in and out, creating pressure bands. Toggle Top View to see circular wavefronts from above.'},
  {n:'Light Wave',bg:'#F3E5F5',type:'light',guide:'<b>Light is a transverse electromagnetic wave.</b> It does not need a medium. E (blue) and B (red) fields oscillate perpendicular to each other and to propagation.'},
  {n:'IA Experiment',bg:'#FAFAF7',type:'string',guide:'<b>Design your own wave investigation.</b> Choose IV and DV, collect data, and plot graphs.'}
];
var scene=0;
$('modes').innerHTML=SCENES.map(function(s,i){return '<div class="mb'+(i===0?' on':'')+'" onclick="setScene('+i+')">'+s.n+'</div>'}).join('');

var S={freq:1.2,amp:35,speed:80,nP:45,time:0,paused:false,simSpeed:0.4,tracked:-1,showTop:false};
function getWL(){return S.speed/S.freq}
function getT(){return 1/S.freq}

var wc=$('waveCanvas'),wx=wc.getContext('2d');
var gc=$('graphCanvas'),gx=gc.getContext('2d');
var cW,cH,gW,gH;
function resize(){
  var wp=wc.parentElement,gp=gc.parentElement;
  var dpr=devicePixelRatio||1;
  cW=wp.clientWidth;cH=340;
  wc.width=cW*dpr;wc.height=cH*dpr;wc.style.width=cW+'px';wc.style.height=cH+'px';
  wx.setTransform(dpr,0,0,dpr,0,0);
  gW=gp.clientWidth;gH=180;
  gc.width=gW*dpr;gc.height=gH*dpr;gc.style.width=gW+'px';gc.style.height=gH+'px';
  gx.setTransform(dpr,0,0,dpr,0,0);
}
new ResizeObserver(resize).observe(wc.parentElement);
resize();

wc.addEventListener('click',function(e){
  var rect=wc.getBoundingClientRect();
  var mx=e.clientX-rect.left;
  var spacing=cW/S.nP;
  S.tracked=Math.round(mx/spacing);
  if(S.tracked<0)S.tracked=0;
  if(S.tracked>=S.nP)S.tracked=S.nP-1;
});

function getDisp(i,t){
  var x=i*(cW/S.nP);
  var k=2*Math.PI/getWL();
  var w=2*Math.PI*S.freq;
  var d=S.amp*Math.sin(k*x-w*t);
  if(x>1){
    var wfX=S.speed*t;
    var ramp=Math.max(15,getWL()*0.5);
    d*=Math.min(1,Math.max(0,(wfX-x)/ramp));
  }
  return d;
}
function getDispX(xPos,t){return getDisp(xPos*S.nP/cW,t);}

// ===== TOP VIEW (full canvas) =====
function drawTopView(){
  var sc=SCENES[scene],type=sc.type;
  var midY=cH/2;

  if(type==='string'){
    // Top-down view of transverse wave: rope is a horizontal line, displacement shown as color
    wx.fillStyle='#E8E0D8';wx.fillRect(0,0,cW,cH);
    // Subtle floor
    var floorG=wx.createLinearGradient(0,0,0,cH);
    floorG.addColorStop(0,'#D7CCC8');floorG.addColorStop(0.5,'#EFEBE9');floorG.addColorStop(1,'#D7CCC8');
    wx.fillStyle=floorG;wx.fillRect(0,0,cW,cH);

    // Wall on right
    wx.fillStyle='#8D6E63';wx.fillRect(cW-12,midY-40,12,80);

    // Hand on left
    wx.fillStyle='#FFCCBC';wx.beginPath();wx.arc(16,midY,10,0,Math.PI*2);wx.fill();
    wx.fillStyle='#D7CCC8';wx.font='bold 7px sans-serif';wx.textAlign='center';
    wx.fillText('HAND',16,midY+18);

    // Rope from above — straight line with colored particles
    var ropeX1=28,ropeX2=cW-16;
    wx.strokeStyle='#8D6E63';wx.lineWidth=6;
    wx.beginPath();wx.moveTo(ropeX1,midY);wx.lineTo(ropeX2,midY);wx.stroke();
    wx.strokeStyle='#A1887F';wx.lineWidth=2;
    wx.beginPath();wx.moveTo(ropeX1,midY-1);wx.lineTo(ropeX2,midY-1);wx.stroke();

    // Particles colored by vertical displacement
    var spacing=cW/S.nP;
    for(var i=0;i<S.nP;i++){
      var px=i*spacing;
      if(px<ropeX1||px>ropeX2)continue;
      var d=getDisp(i,S.time);
      var norm=d/S.amp;
      var r,g,b;
      if(norm>0){r=Math.round(200+55*norm);g=Math.round(80-40*norm);b=Math.round(80-40*norm);}
      else{r=Math.round(80+40*norm);g=Math.round(80+40*norm);b=Math.round(200-55*norm);}
      var isT=i===S.tracked;
      var rad=isT?8:4+Math.abs(norm)*3;
      wx.fillStyle='rgb('+r+','+g+','+b+')';
      wx.beginPath();wx.arc(px,midY,rad,0,Math.PI*2);wx.fill();
      if(isT){wx.strokeStyle='#fff';wx.lineWidth=2;wx.stroke();}
      // Displacement arrow (perpendicular to screen)
      if(Math.abs(norm)>0.3&&i%3===0){
        var arrowLen=norm*18;
        wx.strokeStyle='rgba(0,0,0,.25)';wx.lineWidth=1;
        wx.beginPath();wx.moveTo(px,midY);wx.lineTo(px,midY-arrowLen);wx.stroke();
        wx.fillStyle='rgba(0,0,0,.3)';wx.font='7px sans-serif';wx.textAlign='center';
        wx.fillText(norm>0?'↑':'↓',px,midY-arrowLen-(norm>0?3:-8));
      }
    }

    // Legend
    wx.fillStyle='rgba(0,0,0,.5)';wx.font='bold 11px sans-serif';wx.textAlign='left';
    wx.fillText('TOP VIEW — Looking down at the string',ropeX1,24);
    wx.font='9px sans-serif';wx.fillStyle='rgba(0,0,0,.4)';
    wx.fillText('Red = displaced upward (toward you)   Blue = displaced downward (away from you)',ropeX1,38);
    // Color bar legend
    var barX=cW/2-60,barY=cH-30,barW=120,barH=10;
    for(var lb=0;lb<barW;lb++){
      var lnorm=(lb/barW)*2-1;
      var lr,lg,lbb;
      if(lnorm>0){lr=Math.round(200+55*lnorm);lg=Math.round(80-40*lnorm);lbb=Math.round(80-40*lnorm);}
      else{lr=Math.round(80+40*lnorm);lg=Math.round(80+40*lnorm);lbb=Math.round(200-55*lnorm);}
      wx.fillStyle='rgb('+lr+','+lg+','+lbb+')';wx.fillRect(barX+lb,barY,1,barH);
    }
    wx.strokeStyle='rgba(0,0,0,.2)';wx.lineWidth=0.5;wx.strokeRect(barX,barY,barW,barH);
    wx.fillStyle='rgba(0,0,0,.4)';wx.font='7px sans-serif';wx.textAlign='center';
    wx.fillText('↓ down',barX,barY-2);wx.fillText('0',barX+barW/2,barY-2);wx.fillText('↑ up',barX+barW,barY-2);

  }else if(type==='spring'){
    // Top-down view of spring — dots moving horizontally (same view essentially)
    wx.fillStyle='#D0E8E0';wx.fillRect(0,0,cW,cH);
    wx.fillStyle='#455A64';wx.fillRect(cW-10,midY-30,10,60);
    var spStart=50,spEnd=cW-14,nCoils=S.nP,eqSp2=(spEnd-spStart)/nCoils;

    // Density shading
    for(var ci=0;ci<nCoils-1;ci++){
      var eq1=spStart+ci*eqSp2,eq2=spStart+(ci+1)*eqSp2;
      var d1=getDispX(eq1,S.time),d2=getDispX(eq2,S.time);
      var x1=eq1+d1,x2=eq2+d2;
      var gap=x2-x1;var dens=Math.max(0.05,Math.min(1,eqSp2/Math.max(gap,0.5)));
      wx.fillStyle='rgba(106,27,154,'+(dens*0.12)+')';
      wx.fillRect(Math.min(x1,x2),midY-35,Math.abs(gap)+1,70);
    }
    // Coil dots from above
    for(var ci2=0;ci2<nCoils;ci2++){
      var eq=spStart+ci2*eqSp2;
      var dd=getDispX(eq,S.time);
      var cx=eq+dd;
      var isT2=ci2===S.tracked;
      wx.fillStyle=isT2?'#C62828':'#78909C';
      wx.beginPath();wx.arc(cx,midY,isT2?7:4,0,Math.PI*2);wx.fill();
      wx.strokeStyle=isT2?'#B71C1C':'#546E7A';wx.lineWidth=1;wx.stroke();
    }
    // Labels
    wx.fillStyle='rgba(0,0,0,.5)';wx.font='bold 11px sans-serif';wx.textAlign='left';
    wx.fillText('TOP VIEW — Looking down at the spring',spStart,24);
    wx.font='9px sans-serif';wx.fillStyle='rgba(0,0,0,.4)';
    wx.fillText('Dots represent coil rings seen from above. They compress and stretch horizontally.',spStart,38);
    wx.fillText('Wave →',spStart,cH-8);wx.fillText('Particle ↔',spStart+70,cH-8);

  }else if(type==='water'){
    // Top-down view of water — color map showing wave crests/troughs
    for(var tx=0;tx<cW;tx+=2){
      var tfi=tx*S.nP/cW;
      var td=getDisp(tfi,S.time);
      var norm2=td/S.amp;
      var bright=0.5+norm2*0.35;
      var wr=Math.round(20+bright*50);
      var wg=Math.round(120+bright*80);
      var wb=Math.round(180+bright*60);
      wx.fillStyle='rgb('+wr+','+wg+','+wb+')';
      wx.fillRect(tx,0,2,cH);
    }
    // Wave crest lines (white highlights)
    for(var fi2=1;fi2<S.nP-1;fi2++){
      var fd2=getDisp(fi2,S.time);
      if(fd2>S.amp*0.7){
        var flx=fi2*(cW/S.nP);
        wx.strokeStyle='rgba(255,255,255,'+(0.2+(fd2/S.amp)*0.3)+')';wx.lineWidth=2;
        wx.beginPath();wx.moveTo(flx,0);wx.lineTo(flx,cH);wx.stroke();
      }
    }
    // Foam dots at crests
    for(var fi3=0;fi3<S.nP;fi3++){
      var fd3=getDisp(fi3,S.time);
      if(fd3>S.amp*0.5){
        var fx2=fi3*(cW/S.nP);
        for(var fy2=20;fy2<cH-20;fy2+=25){
          var foamAlpha=0.15+(fd3/S.amp)*0.25;
          wx.fillStyle='rgba(255,255,255,'+foamAlpha+')';
          wx.beginPath();wx.arc(fx2+Math.sin(fi3*3.7+fy2*0.3)*5,fy2+Math.cos(fi3*2.3+fy2*0.5)*5,1.5,0,Math.PI*2);wx.fill();
        }
      }
    }
    // Boat from above
    var boatX=cW*0.62;
    wx.fillStyle='#5D4037';
    wx.beginPath();wx.ellipse(boatX,midY,6,16,0,0,Math.PI*2);wx.fill();
    wx.strokeStyle='#4E342E';wx.lineWidth=1;wx.stroke();
    wx.fillStyle='#8D6E63';wx.beginPath();wx.ellipse(boatX,midY,3,8,0,0,Math.PI*2);wx.fill();
    // Labels
    wx.fillStyle='rgba(255,255,255,.7)';wx.font='bold 11px sans-serif';wx.textAlign='left';
    wx.fillText('TOP VIEW — Looking down at the water surface',12,22);
    wx.font='9px sans-serif';
    wx.fillText('Lighter bands = wave crests    Darker bands = wave troughs    Wave direction →',12,36);

  }else if(type==='sound'){
    // Top-down view of sound — semicircular pressure wavefronts from speaker
    wx.fillStyle='#F8E8EC';wx.fillRect(0,0,cW,cH);
    // Speaker from above
    var spkX=30;
    wx.fillStyle='#263238';wx.fillRect(4,midY-16,spkX-4,32);
    wx.fillStyle='#546E7A';wx.beginPath();wx.arc(spkX,midY,6,0,Math.PI*2);wx.fill();
    // Pressure wavefronts as concentric semicircles
    var sndWL=getWL();
    for(var ar=10;ar<cW;ar+=3){
      var aPhase=2*Math.PI*(ar/sndWL)-2*Math.PI*S.freq*S.time;
      var pNorm=Math.sin(aPhase);
      // Apply wavefront
      var wfR=S.speed*S.time;
      if(ar>wfR)continue;
      var rampEnv=Math.min(1,Math.max(0,(wfR-ar)/(sndWL*0.5)));
      pNorm*=rampEnv;
      if(pNorm>0.02){
        wx.strokeStyle='rgba(38,50,56,'+Math.min(0.2,pNorm*0.15)+')';
      }else if(pNorm<-0.02){
        wx.strokeStyle='rgba(255,200,150,'+Math.min(0.15,Math.abs(pNorm)*0.12)+')';
      }else{continue;}
      wx.lineWidth=2;wx.beginPath();wx.arc(spkX,midY,ar,Math.PI*-0.48,Math.PI*0.48);wx.stroke();
    }
    // High P / Low P labels on the front
    for(var al=1;al<8;al++){
      var alR=al*sndWL;if(alR>wfR||alR>cW-40)continue;
      var alPhase=2*Math.PI*(alR/sndWL)-2*Math.PI*S.freq*S.time;
      var alP=Math.sin(alPhase);
      if(Math.abs(alP)>0.4){
        wx.fillStyle=alP>0?'rgba(106,27,154,.35)':'rgba(0,105,92,.35)';
        wx.font='bold 9px sans-serif';wx.textAlign='center';
        wx.fillText(alP>0?'High P':'Low P',spkX+alR,midY-8);
      }
    }
    wx.fillStyle='rgba(0,0,0,.5)';wx.font='bold 11px sans-serif';wx.textAlign='left';
    wx.fillText('TOP VIEW — Sound pressure wavefronts from above',spkX+20,22);
    wx.font='9px sans-serif';wx.fillStyle='rgba(0,0,0,.4)';
    wx.fillText('Dark arcs = compression (high pressure)   Light arcs = rarefaction (low pressure)',spkX+20,36);

  }else if(type==='light'){
    // EM wave top view — E field as vertical bars, B as horizontal
    wx.fillStyle='#EDE7F6';wx.fillRect(0,0,cW,cH);
    // Source
    wx.fillStyle='#FDD835';wx.beginPath();wx.arc(20,midY,10,0,Math.PI*2);wx.fill();

    for(var ei=0;ei<200;ei++){

    wx.strokeStyle='#4CAF50';wx.lineWidth=2;
    wx.beginPath();wx.moveTo(40,midY);wx.lineTo(cW-30,midY);wx.stroke();
    wx.fillStyle='#4CAF50';wx.beginPath();wx.moveTo(cW-36,midY-5);wx.lineTo(cW-28,midY);wx.lineTo(cW-36,midY+5);wx.fill();
    wx.fillStyle='rgba(0,0,0,.5)';wx.font='bold 11px sans-serif';wx.textAlign='left';
    wx.fillText('TOP VIEW — EM wave from above',40,22);
    wx.font='9px sans-serif';wx.fillStyle='rgba(0,0,0,.4)';
    wx.fillText('Blue bars = E field oscillation amplitude (vertical, into/out of screen from this view)',40,36);
    wx.fillStyle='#4CAF50';wx.fillText('Green arrow = propagation direction →',40,cH-10);
  }
  // Top view tracked particle info
  if(S.tracked>=0&&type!=='light'){
    var trd=getDisp(S.tracked,S.time);
    wx.fillStyle='rgba(0,0,0,.6)';wx.beginPath();wx.roundRect(cW-174,cH-40,164,34,6);wx.fill();
    wx.fillStyle='#fff';wx.font='bold 9px sans-serif';wx.textAlign='left';
    wx.fillText('Particle #'+S.tracked+':  y = '+trd.toFixed(1)+' px',cW-168,cH-22);
    wx.fillStyle='rgba(255,255,255,.6)';wx.font='8px sans-serif';
    wx.fillText('Click any particle to track',cW-168,cH-10);
  }
}

// ===== SIDE VIEW (default) =====
function drawWave(){
  var sc=SCENES[scene];
  wx.fillStyle=sc.bg;wx.fillRect(0,0,cW,cH);

  if(S.showTop){drawTopView();return;}

  wx.strokeStyle='rgba(0,0,0,.04)';wx.lineWidth=0.5;
  for(var g1=0;g1<cW;g1+=40){wx.beginPath();wx.moveTo(g1,0);wx.lineTo(g1,cH);wx.stroke();}
  for(var g2=0;g2<cH;g2+=40){wx.beginPath();wx.moveTo(0,g2);wx.lineTo(cW,g2);wx.stroke();}

  var midY=cH*0.44;
  var spacing=cW/S.nP;
  var type=sc.type;

  if(type!=='water'&&type!=='light'){
    wx.strokeStyle='rgba(0,0,0,.06)';wx.lineWidth=1;wx.setLineDash([5,5]);
    wx.beginPath();wx.moveTo(0,midY);wx.lineTo(cW,midY);wx.stroke();wx.setLineDash([]);
  }

  if(type==='string'){
    // ===== STRING / ROPE =====
    var handGripX=26,ropeEnd=cW-14;
    // The hand IS the source — drives the rope
    var handD=getDisp(0,S.time);
    var handY=midY-handD;

    // Fixed wall on right
    wx.fillStyle='#5D4037';wx.fillRect(cW-14,midY-32,14,64);
    wx.strokeStyle='#4E342E';wx.lineWidth=0.6;
    for(var bk=midY-32;bk<midY+32;bk+=8){wx.beginPath();wx.moveTo(cW-14,bk);wx.lineTo(cW,bk);wx.stroke();}
    for(var bk2=midY-28;bk2<midY+32;bk2+=16){wx.beginPath();wx.moveTo(cW-7,bk2);wx.lineTo(cW-7,bk2+8);wx.stroke();}

    // Build rope path — first point matches hand position exactly

    var rPts=[];
    for(var ri=0;ri<=nSeg;ri++){
      var rx=handGripX+(ropeEnd-handGripX)*ri/nSeg;
      var rd;
      if(ri===0){
        rd=handD;
      }else{
        rd=getDisp(rx/spacing,S.time);

      var rx2=handGripX+(ropeEnd-handGripX)*Math.min(ri+1,nSeg)/nSeg;
      var rd2=(ri+1>=nSeg)?rd:getDisp(rx2/spacing,S.time);
      if(ri===0&&nSeg>1){rd2=getDisp(rx2/spacing,S.time);}
      var tdx=rx2-rx||1,tdy=-(rd2-rd);

      else wx.lineTo(p.x-p.nx*(ropeW+2),p.y-p.ny*(ropeW+2)+6);
    }
    for(var ri3=rPts.length-1;ri3>=0;ri3--){
      var p2=rPts[ri3];wx.lineTo(p2.x+p2.nx*(ropeW+2),p2.y+p2.ny*(ropeW+2)+6);
    }
    wx.closePath();wx.fill();wx.restore();

    // Rope body
    wx.beginPath();
    for(var ri4=0;ri4<rPts.length;ri4++){
      var p3=rPts[ri4];
      if(ri4===0)wx.moveTo(p3.x-p3.nx*ropeW,p3.y-p3.ny*ropeW);
      else wx.lineTo(p3.x-p3.nx*ropeW,p3.y-p3.ny*ropeW);
    }
    for(var ri5=rPts.length-1;ri5>=0;ri5--){
      var p4=rPts[ri5];wx.lineTo(p4.x+p4.nx*ropeW,p4.y+p4.ny*ropeW);
    }
    wx.closePath();
    var ropeGrad=wx.createLinearGradient(0,midY-S.amp-ropeW,0,midY+S.amp+ropeW);
    ropeGrad.addColorStop(0,'#BCAAA4');ropeGrad.addColorStop(0.2,'#A1887F');
    ropeGrad.addColorStop(0.45,'#8D6E63');ropeGrad.addColorStop(0.7,'#6D4C41');ropeGrad.addColorStop(1,'#4E342E');
    wx.fillStyle=ropeGrad;wx.fill();

    // Highlight
    wx.strokeStyle='rgba(215,204,200,.45)';wx.lineWidth=1.5;wx.beginPath();
    for(var ri6=0;ri6<rPts.length;ri6++){
      var p5=rPts[ri6];
      if(ri6===0)wx.moveTo(p5.x-p5.nx*(ropeW-1.5),p5.y-p5.ny*(ropeW-1.5));
      else wx.lineTo(p5.x-p5.nx*(ropeW-1.5),p5.y-p5.ny*(ropeW-1.5));
    }

    // Fiber lines
    wx.strokeStyle='rgba(78,52,46,.12)';wx.lineWidth=0.4;
    for(var fib=-2;fib<=2;fib+=2){wx.beginPath();for(var ri7=0;ri7<rPts.length;ri7+=2){var p6=rPts[ri7];if(ri7===0)wx.moveTo(p6.x+p6.nx*fib,p6.y+p6.ny*fib);else wx.lineTo(p6.x+p6.nx*fib,p6.y+p6.ny*fib);}wx.stroke();}

    wx.beginPath();wx.moveTo(16,handY+3);wx.lineTo(26,handY+3);wx.stroke();

      }else{
        wx.fillStyle='rgba(78,52,46,.45)';wx.beginPath();wx.arc(ppx,ppy,2,0,Math.PI*2);wx.fill();
      }
    }

    if(S.speed*S.time>wl*1.5){
      var fcX=-1;
      for(var fci=2;fci<S.nP-2;fci++){
        var da=getDisp(fci-0.5,S.time),db=getDisp(fci,S.time),dc=getDisp(fci+0.5,S.time);
        if(db>da&&db>dc&&db>S.amp*0.5&&fci*spacing>handGripX+30){fcX=fci*spacing;break;}
      }

        var annY=midY-S.amp-22;

        wx.beginPath();wx.moveTo(fcX,annY);wx.lineTo(fcX+wl,annY);wx.stroke();
        wx.beginPath();wx.moveTo(fcX+4,annY-3);wx.lineTo(fcX,annY);wx.lineTo(fcX+4,annY+3);wx.fill();
        wx.beginPath();wx.moveTo(fcX+wl-4,annY-3);wx.lineTo(fcX+wl,annY);wx.lineTo(fcX+wl-4,annY+3);wx.fill();
        wx.font='bold 9px sans-serif';wx.textAlign='center';
        wx.fillText('λ = '+wl.toFixed(0)+' px',fcX+wl/2,annY-5);
        var ampX=fcX+wl*0.55;
        wx.strokeStyle='rgba(0,105,92,.4)';wx.fillStyle='rgba(0,105,92,.55)';
        wx.beginPath();wx.moveTo(ampX,midY);wx.lineTo(ampX,midY-S.amp);wx.stroke();
        wx.beginPath();wx.moveTo(ampX-3,midY-4);wx.lineTo(ampX,midY);wx.lineTo(ampX+3,midY-4);wx.fill();
        wx.beginPath();wx.moveTo(ampX-3,midY-S.amp+4);wx.lineTo(ampX,midY-S.amp);wx.lineTo(ampX+3,midY-S.amp+4);wx.fill();
        wx.font='bold 8px sans-serif';wx.fillText('A',ampX+10,midY-S.amp/2+3);
      }
    }
    wx.fillStyle='rgba(0,0,0,.4)';wx.font='bold 10px sans-serif';wx.textAlign='left';
    wx.fillText('Wave →',handGripX+4,cH-16);wx.fillText('Particle ↕',handGripX+4,cH-4);

  }else if(type==='spring'){
    // ===== SPRING =====
    var spStartX=50,spEndX=cW-16;

    wx.fillStyle='#455A64';wx.beginPath();wx.roundRect(pistonFace-4,midY-18,10,36,3);wx.fill();
    wx.fillStyle='#546E7A';wx.beginPath();wx.roundRect(pistonFace-2,midY-14,6,28,2);wx.fill();

    var nCoils=S.nP,eqSp=(spEndX-spStartX)/nCoils,coilH=24;
    for(var ci=0;ci<nCoils-1;ci++){

      wx.fillRect(Math.min(cx1,cx2),midY-coilH-4,Math.abs(gap)+1,coilH*2+8);
    }
    for(var ci2=3;ci2<nCoils-3;ci2+=4){

      if(ddL<-S.amp*0.1){wx.fillStyle='rgba(106,27,154,.5)';wx.font='bold 10px sans-serif';wx.textAlign='center';wx.fillText('C',ceqL+cdL,midY-coilH-8);}

    }
    for(var ci3=0;ci3<nCoils;ci3++){

      var prevCX=ci3>0?(spStartX+(ci3-1)*eqSp+getDispX(spStartX+(ci3-1)*eqSp,S.time)):cx3-eqSp;
      var nextCX=ci3<nCoils-1?(spStartX+(ci3+1)*eqSp+getDispX(spStartX+(ci3+1)*eqSp,S.time)):cx3+eqSp;
      var ringW=Math.max(1.5,Math.min(5,(nextCX-prevCX)/2*0.22));

      var mGrad=wx.createLinearGradient(cx3-ringW-1,0,cx3+ringW+1,0);
      mGrad.addColorStop(0,'#546E7A');mGrad.addColorStop(0.2,'#90A4AE');mGrad.addColorStop(0.45,'#ECEFF1');
      mGrad.addColorStop(0.55,'#CFD8DC');mGrad.addColorStop(0.8,'#90A4AE');mGrad.addColorStop(1,'#546E7A');
      wx.fillStyle=isT3?'#C62828':mGrad;wx.beginPath();wx.ellipse(cx3,midY,ringW,coilH,0,0,Math.PI*2);wx.fill();
      wx.strokeStyle=isT3?'#B71C1C':'rgba(55,71,79,0.45)';wx.lineWidth=isT3?1.5:0.5;wx.stroke();
      if(isT3){wx.fillStyle='#C62828';wx.font='bold 9px sans-serif';wx.textAlign='center';wx.fillText('x = '+(cd3>0?'+':'')+cd3.toFixed(1),cx3,midY+coilH+16);}
    }
    wx.strokeStyle='rgba(120,144,156,.2)';wx.lineWidth=1;wx.beginPath();
    for(var ci4=0;ci4<nCoils;ci4++){var ceq4=spStartX+ci4*eqSp;var cx4=ceq4+getDispX(ceq4,S.time);if(ci4===0)wx.moveTo(cx4,midY);else wx.lineTo(cx4,midY);}wx.stroke();
    wx.fillStyle='rgba(0,0,0,.4)';wx.font='bold 10px sans-serif';wx.textAlign='left';
    wx.fillText('Wave →',spStartX,cH-16);wx.fillText('Particle ↔',spStartX,cH-4);

  }else if(type==='water'){
    // ===== WATER =====
    var skyG=wx.createLinearGradient(0,0,0,midY-S.amp);
    skyG.addColorStop(0,'#90CAF9');skyG.addColorStop(0.5,'#BBDEFB');skyG.addColorStop(1,'#E1F5FE');
    wx.fillStyle=skyG;wx.fillRect(0,0,cW,midY+S.amp+30);
    var waterG=wx.createLinearGradient(0,midY-S.amp,0,cH);
    waterG.addColorStop(0,'rgba(66,165,245,.85)');waterG.addColorStop(0.15,'#2196F3');
    waterG.addColorStop(0.4,'#1976D2');waterG.addColorStop(0.7,'#1565C0');waterG.addColorStop(1,'#0D47A1');
    wx.fillStyle=waterG;wx.beginPath();wx.moveTo(0,cH);
    for(var wi=0;wi<=200;wi++){wx.lineTo(wi*cW/200,midY-getDisp(wi*(S.nP-1)/200,S.time));}
    wx.lineTo(cW,cH);wx.closePath();wx.fill();
    wx.strokeStyle='rgba(255,255,255,.45)';wx.lineWidth=2.5;wx.beginPath();
    for(var wi2=0;wi2<=200;wi2++){var wd2=getDisp(wi2*(S.nP-1)/200,S.time);if(wi2===0)wx.moveTo(0,midY-wd2);else wx.lineTo(wi2*cW/200,midY-wd2);}wx.stroke();
    for(var fi=1;fi<S.nP-1;fi++){var fd=getDisp(fi,S.time);if(fd>S.amp*0.45){var foamX=fi*spacing,foamY=midY-fd;for(var fc=0;fc<Math.floor((fd/S.amp)*6);fc++){wx.fillStyle='rgba(255,255,255,'+(0.25+(fd/S.amp)*0.4)+')';wx.beginPath();wx.arc(foamX+Math.sin(fi*7.3+fc*3.1)*8,foamY+Math.cos(fi*5.7+fc*2.3)*3-2,Math.max(0.5,1+Math.sin(fi*3.3+fc*1.7)*0.8),0,Math.PI*2);wx.fill();}}}
    for(var oi=0;oi<S.nP;oi+=3){var oPhase=2*Math.PI*S.freq*S.time-2*Math.PI*oi*spacing/getWL();var orbR=S.amp*0.38;var owfX=S.speed*S.time;var oEnv=Math.min(1,Math.max(0,(owfX-oi*spacing)/Math.max(15,getWL()*0.5)));var aOrbR=orbR*oEnv;if(oEnv>0.05){wx.strokeStyle='rgba(255,255,255,.1)';wx.lineWidth=0.5;wx.beginPath();wx.arc(oi*spacing,midY,aOrbR,0,Math.PI*2);wx.stroke();}var oIsT=oi===S.tracked||oi===S.tracked-1||oi===S.tracked+1;wx.fillStyle=oIsT?'#C62828':'rgba(255,255,255,.55)';wx.beginPath();wx.arc(oi*spacing+Math.cos(oPhase)*aOrbR,midY-Math.sin(oPhase)*aOrbR,oIsT?4.5:2.5,0,Math.PI*2);wx.fill();}
    var boatX=cW*0.62,boatI2=Math.round(boatX/spacing),boatD=getDisp(boatI2,S.time);
    var boatSlope=(getDisp(boatI2+0.5,S.time)-getDisp(boatI2-0.5,S.time))*0.02,bBaseY=midY-boatD;

function drawGraph(){
  gx.fillStyle='#fff';gx.fillRect(0,0,gW,gH);
  var pad={t:16,b:28,l:48,r:14},pW2=gW-pad.l-pad.r,pH2=gH-pad.t-pad.b;
  var midY3=pad.t+pH2/2;
  gx.strokeStyle='rgba(0,0,0,.05)';gx.lineWidth=0.5;
  var xStep=getWL()>20?getWL():50;
  gx.fillStyle='#aaa';gx.font='7px sans-serif';gx.textAlign='center';
  for(var xg=0;xg<=cW;xg+=xStep){var gxp=pad.l+(xg/cW)*pW2;gx.beginPath();gx.moveTo(gxp,pad.t);gx.lineTo(gxp,pad.t+pH2);gx.stroke();gx.fillText(xg.toFixed(0),gxp,pad.t+pH2+10);}
  gx.textAlign='right';
  [-S.amp,-S.amp/2,0,S.amp/2,S.amp].forEach(function(yv){
    var gyp=midY3-yv*(pH2/2)/S.amp*0.8;
    gx.strokeStyle=yv===0?'rgba(0,0,0,.12)':'rgba(0,0,0,.04)';gx.lineWidth=yv===0?1:0.5;
    gx.beginPath();gx.moveTo(pad.l,gyp);gx.lineTo(pad.l+pW2,gyp);gx.stroke();
    gx.fillStyle='#888';gx.fillText(yv.toFixed(0),pad.l-4,gyp+3);
  });
  gx.strokeStyle='rgba(0,0,0,.2)';gx.lineWidth=1.5;gx.beginPath();gx.moveTo(pad.l,pad.t);gx.lineTo(pad.l,pad.t+pH2);gx.lineTo(pad.l+pW2,pad.t+pH2);gx.stroke();
  gx.fillStyle='#555';gx.font='9px sans-serif';gx.textAlign='center';gx.fillText('Position x (px)',pad.l+pW2/2,gH-4);
  gx.save();gx.translate(12,pad.t+pH2/2);gx.rotate(-Math.PI/2);gx.fillText('Displacement y (px)',0,0);gx.restore();
  gx.fillStyle='#1a1a1a';gx.font='bold 10px sans-serif';gx.fillText('y(x, t='+S.time.toFixed(2)+'s)',pad.l+pW2/2,10);
  gx.strokeStyle='#1565C0';gx.lineWidth=2;gx.beginPath();
  for(var i=0;i<=200;i++){var fi=i*(S.nP-1)/200;var d=getDisp(fi,S.time);var gx2=pad.l+(i/200)*pW2;var gy=midY3-d*(pH2/2)/S.amp*0.8;if(i===0)gx.moveTo(gx2,gy);else gx.lineTo(gx2,gy);}
  gx.stroke();
  if(S.tracked>=0){var td=getDisp(S.tracked,S.time);var tgx=pad.l+(S.tracked/S.nP)*pW2;var tgy=midY3-td*(pH2/2)/S.amp*0.8;gx.fillStyle='#C62828';gx.beginPath();gx.arc(tgx,tgy,5,0,Math.PI*2);gx.fill();}
}

window.addR=function(){var iv=parseFloat($('mIV')?$('mIV').value:0),dv=parseFloat($('mDV')?$('mDV').value:0);if(isNaN(iv)||isNaN(dv))return;manD.push({iv:iv,dv:dv});if($('mIV'))$('mIV').value='';if($('mDV'))$('mDV').value='';buildMT();syncM();addN('Data','IV='+iv.toFixed(2)+', DV='+dv.toFixed(2),'#'+manD.length);};
function buildMT(){if(!manD.length){if($('mT'))$('mT').innerHTML='';return;}var g={};manD.forEach(function(d,i){var k=d.iv.toFixed(2);if(!g[k])g[k]=[];g[k].push({iv:d.iv,dv:d.dv,idx:i});});var ks=Object.keys(g).map(Number).sort(function(a,b2){return a-b2;});var rows='';ks.forEach(function(k){var pts=g[k.toFixed(2)],dvs=pts.map(function(p){return p.dv;}),mn=dvs.reduce(function(a,b2){return a+b2;},0)/dvs.length;pts.forEach(function(p,j){rows+='<tr><td>'+(j===0?k.toFixed(2):'')+'</td><td>'+p.dv.toFixed(2)+'</td><td><span style="cursor:pointer;color:var(--err);opacity:.5" onclick="rmPt('+p.idx+')">x</span></td></tr>';});rows+='<tr class="mean"><td>Mean</td><td class="mean">'+mn.toFixed(2)+'</td><td></td></tr>';});if($('mT'))$('mT').innerHTML='<table class="dt"><thead><tr><th>'+getIVN()+'</th><th>'+getDVN()+'</th><th></th></tr></thead><tbody>'+rows+'</tbody></table>';}
window.rmPt=function(i){manD.splice(i,1);buildMT();syncM();};window.clrM=function(){manD=[];expD=[];buildMT();if($('dW'))$('dW').innerHTML='<p style="font-size:.6rem;color:var(--text3);text-align:center;padding:6px">Collect data first.</p>';drawGr();};
function syncM(){if(!manD.length){expD=[];return;}var g={};manD.forEach(function(d){var k=d.iv.toFixed(2);if(!g[k])g[k]=[];g[k].push(d.dv);});expD=Object.keys(g).map(Number).sort(function(a,b2){return a-b2;}).map(function(k){var v=g[k.toFixed(2)],mn=v.reduce(function(a,b2){return a+b2;},0)/v.length;return{iv:k,mean:mn};});buildDT();setTimeout(function(){initGr();drawGr();},30);}
function buildDT(){if(!expD.length)return;$('dW').innerHTML='<table class="dt"><thead><tr><th>'+getIVN()+'</th><th>Mean '+getDVN()+'</th></tr></thead><tbody>'+expD.map(function(r){return '<tr><td>'+r.iv.toFixed(2)+'</td><td class="mean">'+r.mean.toFixed(2)+'</td></tr>';}).join('')+'</tbody></table>';}
window.plotM=function(){if(!manD.length)return;syncM();document.querySelectorAll('.bt').forEach(function(t){t.classList.remove('on');});document.querySelectorAll('.btc').forEach(function(t){t.classList.remove('on');});document.querySelectorAll('.bt')[1].classList.add('on');$('b1').classList.add('on');setTimeout(function(){initGr();drawGr();},80);};
var gCv,gx2;function initGr(){gCv=$('gC');if(!gCv)return;gx2=gCv.getContext('2d');var d=devicePixelRatio||1,r=gCv.parentElement.getBoundingClientRect(),w=r.width;if(w<10)return;gCv.width=w*d;gCv.height=180*d;gCv.style.width=w+'px';gCv.style.height='180px';gx2.setTransform(d,0,0,d,0,0);}
function drawGr(){if(!gCv||!gx2){initGr();if(!gCv)return;}var w=parseInt(gCv.style.width)||500,h=180;gx2.clearRect(0,0,w,h);gx2.fillStyle='#fff';gx2.fillRect(0,0,w,h);if(!expD.length){gx2.fillStyle='#bbb';gx2.font='10px sans-serif';gx2.textAlign='center';gx2.fillText('Collect data and click Plot',w/2,h/2);return;}var P={t:18,r:10,b:30,l:44},pW3=w-P.l-P.r,pH3=h-P.t-P.b;var xs=expD.map(function(r2){return r2.iv;}),ys=expD.map(function(r2){return r2.mean;});var xn=Math.min.apply(null,xs),xx=Math.max.apply(null,xs),yn=Math.min.apply(null,ys),yx=Math.max.apply(null,ys);if(xx-xn<.01){xn-=1;xx+=1;}if(yx-yn<.01){yn=Math.max(0,yn-1);yx+=1;}var xp=(xx-xn)*.1,yp=(yx-yn)*.1;xn-=xp;xx+=xp;yn=Math.max(0,yn-yp);yx+=yp;var tx3=function(v){return P.l+((v-xn)/(xx-xn))*pW3;},ty3=function(v){return P.t+pH3-((v-yn)/(yx-yn))*pH3;};gx2.strokeStyle='rgba(0,0,0,.06)';gx2.lineWidth=.5;for(var i=0;i<=5;i++){gx2.beginPath();gx2.moveTo(tx3(xn+(xx-xn)*i/5),P.t);gx2.lineTo(tx3(xn+(xx-xn)*i/5),P.t+pH3);gx2.stroke();}for(var i2=0;i2<=5;i2++){gx2.beginPath();gx2.moveTo(P.l,ty3(yn+(yx-yn)*i2/5));gx2.lineTo(P.l+pW3,ty3(yn+(yx-yn)*i2/5));gx2.stroke();}gx2.strokeStyle='rgba(0,0,0,.2)';gx2.lineWidth=1.5;gx2.beginPath();gx2.moveTo(P.l,P.t);gx2.lineTo(P.l,P.t+pH3);gx2.lineTo(P.l+pW3,P.t+pH3);gx2.stroke();gx2.fillStyle='#888';gx2.font='8px sans-serif';gx2.textAlign='center';for(var i3=0;i3<=5;i3++){gx2.fillText((xn+(xx-xn)*i3/5).toFixed(1),tx3(xn+(xx-xn)*i3/5),P.t+pH3+11);}gx2.textAlign='right';for(var i4=0;i4<=5;i4++){gx2.fillText((yn+(yx-yn)*i4/5).toFixed(1),P.l-3,ty3(yn+(yx-yn)*i4/5)+3);}gx2.fillStyle='#555';gx2.font='9px sans-serif';gx2.textAlign='center';gx2.fillText(getIVN(),P.l+pW3/2,h-4);gx2.save();gx2.translate(8,P.t+pH3/2);gx2.rotate(-Math.PI/2);gx2.fillText(getDVN(),0,0);gx2.restore();if(xs.length>=2){gx2.strokeStyle='#6A1B9A';gx2.lineWidth=1.2;gx2.beginPath();expD.forEach(function(r2,i5){i5===0?gx2.moveTo(tx3(xs[i5]),ty3(ys[i5])):gx2.lineTo(tx3(xs[i5]),ty3(ys[i5]));});gx2.stroke();}gx2.fillStyle='#6A1B9A';xs.forEach(function(x,i5){gx2.beginPath();gx2.arc(tx3(x),ty3(ys[i5]),3.5,0,Math.PI*2);gx2.fill();});}

var IB=[
  {c:'State',q:'State the difference between transverse and longitudinal waves, giving one example of each.',f:'Transverse: particle displacement perpendicular to wave direction. Example: light, water surface, string. Longitudinal: particle displacement parallel to wave direction. Example: sound, spring compression.'},
  {c:'Explain',q:'Explain why sound cannot travel through a vacuum but light can.',f:'Sound is a mechanical wave — it needs particles to transmit compressions and rarefactions. In vacuum, there are no particles. Light is an electromagnetic wave — oscillating E and B fields that propagate without a medium.'},
  {c:'Calculate',q:'A wave has frequency 4.0 Hz and wavelength 0.50 m. Find the wave speed and period.',f:'v = fλ = 4.0 × 0.50 = 2.0 m/s. T = 1/f = 1/4.0 = 0.25 s.'},
  {c:'Explain',q:'A boat on a lake bobs up and down as waves pass. Explain why it does not move horizontally with the wave.',f:'Water waves transfer energy, not matter. Each water particle moves in a circular orbit, returning to its starting position after each cycle. The boat follows the particle motion — up at crests, down at troughs — but has no net horizontal displacement.'},
  {c:'Calculate',q:'The speed of sound in air is 343 m/s and in steel is 5100 m/s. A 440 Hz note is played. Find the wavelength in each medium.',f:'Air: λ = v/f = 343/440 = 0.780 m. Steel: λ = 5100/440 = 11.6 m. Same frequency, different wavelength because the speed is different.'},
  {c:'Explain',q:'Why does the speed of sound increase from air to water to steel?',f:'Sound speed depends on v = √(B/ρ). Steel has a much higher bulk modulus (stiffness) than water or air. Although steel is denser, the stiffness increase dominates. Particles in solids are closer and more strongly bonded, transmitting vibrations faster.'}
];
function buildIB(){$('ibL').innerHTML=IB.map(function(q,i){var cls=q.c==='Calculate'?'c':q.c==='Explain'?'e':'s';return '<div class="ib-card"><span class="ib-cmd ib-cmd-'+cls+'">'+q.c+'</span><h4>Q'+(i+1)+'</h4><p>'+q.q+'</p><textarea placeholder="Your answer..."></textarea><div style="display:flex;gap:3px;margin-top:3px"><button class="btn btn-p" onclick="sF('+i+')" style="font-size:.56rem">Show Answer</button></div><div class="ib-ans" id="iF'+i+'">'+q.f+'</div></div>';}).join('');}
window.sF=function(i){$('iF'+i).classList.toggle('show');if($('iF'+i).classList.contains('show'))addN('IB Q'+(i+1),IB[i].q.substring(0,50)+'...','Answered');};
var nb=[];function addN(t,d,r){nb.push({t:t,d:d,r:r});showN();}
function showN(){$('nbO').innerHTML=nb.length?nb.map(function(n,i){return '<div class="nb-c"><b>#'+(i+1)+' '+n.t+'</b><br>'+n.d+'<br><span class="nr">-> '+n.r+'</span></div>';}).join(''):'<p style="text-align:center;color:var(--text3);font-size:.58rem;padding:6px">Complete experiments to record.</p>';}

$('guideBar').innerHTML=SCENES[0].guide;
buildControls();buildSidebar();buildExp();buildIB();showN();
requestAnimationFrame(animate);

<script>
// Overwrite old experimental functions
window.buildExp = function() {
  if(window.ExperimentPanel) window.ExperimentPanel.init();
};
window.buildDT = function() {};
window.initGr = function() {};
window.drawGr = function() {};
window.plotM = function() { if(window.ExperimentPanel) window.ExperimentPanel.updateChart(); };


window.SIM_VARIABLES = {
  iv: typeof window.EIV !== 'undefined' ? window.EIV : [{id:'iv1', name:'Independent Var'}],
  dv: typeof window.EDV !== 'undefined' ? window.EDV : [{id:'dv1', name:'Dependent Var'}],
  cv: typeof window.ECVS !== 'undefined' ? window.ECVS : [{id:'cv1', name:'Control Var'}],

  getVar: function(id) {
    // Hidden inputs mechanism to leverage existing simulation physics
    let hDiv = document.getElementById('ep_hidden');
    if (!hDiv) {
      hDiv = document.createElement('div');
      hDiv.id = 'ep_hidden';
      hDiv.style.display = 'none';
      hDiv.innerHTML = '<select id="selIV"></select><select id="selDV"></select><input id="mIV"><input id="mDV">';
      document.body.appendChild(hDiv);
      // Populate select options from SIM_VARIABLES
      window.SIM_VARIABLES.iv.forEach(v => document.getElementById('selIV').innerHTML += `<option value="${v.id}"></option>`);
      window.SIM_VARIABLES.dv.forEach(v => document.getElementById('selDV').innerHTML += `<option value="${v.id}"></option>`);
    }
    
    // Check if it's IV or DV
    const isIV = window.SIM_VARIABLES.iv.some(x => x.id === id);
    const isDV = window.SIM_VARIABLES.dv.some(x => x.id === id);
    
    if (isIV) {
      document.getElementById('selIV').value = id;
      if (typeof window.readIV === 'function') window.readIV();
      else if (typeof window.rIV === 'function') window.rIV();
      else if (typeof window.getSimIV === 'function') document.getElementById('mIV').value = window.getSimIV();
      return parseFloat(document.getElementById('mIV').value || 0);
    }
    
    if (isDV) {
      document.getElementById('selDV').value = id;
      if (typeof window.readDV === 'function') window.readDV();
      else if (typeof window.rDV === 'function') window.rDV();
      else if (typeof window.getSimDV === 'function') document.getElementById('mDV').value = window.getSimDV();
      return parseFloat(document.getElementById('mDV').value || 0);
    }
    return 0;
  }
};
</script>
