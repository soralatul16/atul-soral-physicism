  {n:'Saturn',a:9.537,e:0.054,T:29.46,col:'#eab308',r:6,on:false},

  {n:'Neptune',a:30.07,e:0.009,T:164.8,col:'#6366f1',r:5,on:false},
  {n:"Halley's Comet",a:17.83,e:0.967,T:75.3,col:'#a855f7',r:2,on:false}
];
var scene=0,ti=0,speed=1,running=true;
var law2Planet=3,law2Days=30; // Mars selected (higher eccentricity), 30 days
var law3Sel=[0,1,2,3];
// Free Build state (Scene 3)
var GM_AU=4*Math.PI*Math.PI; // GM in AU³/yr² so T²/a³=1
var fb={r0:1.5,vFrac:1.0,x:0,y:0,vx:0,vy:0,trail:[],running:false,crashed:false,dragV:false,dragVx:0,dragVy:0};
function fbVcirc(){return Math.sqrt(GM_AU/fb.r0)}
function fbVesc(){return Math.sqrt(2*GM_AU/fb.r0)}
function fbReset(){fb.x=fb.r0;fb.y=0;var vc=fbVcirc()*fb.vFrac;fb.vx=0;fb.vy=vc;fb.trail=[];fb.crashed=false;fb.running=true;ti=0}
function fbStep(){
  if(fb.crashed)return;var dt2=0.0001;
  for(var i=0;i<20;i++){
    var r=Math.sqrt(fb.x*fb.x+fb.y*fb.y);
    if(r<0.02){fb.crashed=true;fb.running=false;return}
    var a=-GM_AU/(r*r*r);
    fb.vx+=a*fb.x*dt2*.5;fb.vy+=a*fb.y*dt2*.5;
    fb.x+=fb.vx*dt2;fb.y+=fb.vy*dt2;
    var r2=Math.sqrt(fb.x*fb.x+fb.y*fb.y);var a2=-GM_AU/(r2*r2*r2);
    fb.vx+=a2*fb.x*dt2*.5;fb.vy+=a2*fb.y*dt2*.5;
    ti+=dt2;
  }
  var spd=Math.sqrt(fb.vx*fb.vx+fb.vy*fb.vy);
  fb.trail.push({x:fb.x,y:fb.y,spd:spd});if(fb.trail.length>2000)fb.trail.shift();
}
function fbElements(){
  var r=Math.sqrt(fb.x*fb.x+fb.y*fb.y)||1,v2=fb.vx*fb.vx+fb.vy*fb.vy;
  var E=0.5*v2-GM_AU/r,L=fb.x*fb.vy-fb.y*fb.vx;
  if(E>=0)return{a:Infinity,e:999,T:Infinity,type:E>0.001?'Hyperbolic':'Parabolic (escape)',KE:0.5*v2,PE:-GM_AU/r,TE:E,r:r,v:Math.sqrt(v2),L:Math.abs(L)};
  var a=-GM_AU/(2*E),e2=1+2*E*L*L/(GM_AU*GM_AU);var e=Math.sqrt(Math.max(0,e2));
  var T=2*Math.PI*Math.sqrt(a*a*a/GM_AU);
  var type=e<0.005?'Circular':e<0.99?'Elliptical':'Near-parabolic';
  return{a:a,e:e,T:T,type:type,KE:0.5*v2,PE:-GM_AU/r,TE:E,r:r,v:Math.sqrt(v2),L:Math.abs(L)};
} // Mercury-Mars selected for 3rd law

// ===== KEPLER EQUATION SOLVER =====
function solveKepler(M,e){
  // M = mean anomaly, e = eccentricity → E = eccentric anomaly
  var E=M;for(var i=0;i<15;i++){E=E-(E-e*Math.sin(E)-M)/(1-e*Math.cos(E))}return E;
}
function planetPos(p,t){
  var M=2*Math.PI*t/p.T; // mean anomaly
  var E=solveKepler(M%(2*Math.PI),p.e);
  var cosV=(Math.cos(E)-p.e)/(1-p.e*Math.cos(E));
  var sinV=Math.sqrt(1-p.e*p.e)*Math.sin(E)/(1-p.e*Math.cos(E));
  var v=Math.atan2(sinV,cosV); // true anomaly
  var r=p.a*(1-p.e*p.e)/(1+p.e*Math.cos(v));
  return{x:r*Math.cos(v),y:r*Math.sin(v),r:r,v:v,E:E};

// Drawing helpers using exaggerated eccentricity
function drawPos(p,t){var ee=getE(p);var M=2*Math.PI*t/p.T;var E=solveKepler(M%(2*Math.PI),ee);var cosV=(Math.cos(E)-ee)/(1-ee*Math.cos(E));var sinV=Math.sqrt(Math.max(0,1-ee*ee))*Math.sin(E)/(1-ee*Math.cos(E));var v=Math.atan2(sinV,cosV);var r=p.a*(1-ee*ee)/(1+ee*Math.cos(v));return{x:r*Math.cos(v),y:r*Math.sin(v),r:r,v:v}}

// ===== PAINT =====

  var cX=W/2,cY=H/2;

  // Per-scene scaling — fill the canvas
  var maxR=1;
  if(scene===0){PLANETS.forEach(function(p){if(p.on)maxR=Math.max(maxR,p.a*(1+getE(p))*1.1)})}
  else if(scene===1){var sp=PLANETS[law2Planet];maxR=sp.a*(1+getE(sp))*1.1}

  var scale;

  else if(scene===1){var sp2=PLANETS[law2Planet];var ee2=getE(sp2);var ra=sp2.a*(1+ee2),rp=sp2.a*(1-ee2);scale=Math.min(W*.44/(ra+rp),H*.44/sp2.a/Math.sqrt(1-ee2*ee2))}

  var sg=cx.createRadialGradient(cX,cY,3,cX,cY,20);sg.addColorStop(0,'#fbbf24');sg.addColorStop(.5,'rgba(251,191,36,.15)');sg.addColorStop(1,'rgba(251,191,36,0)');
  cx.fillStyle=sg;cx.beginPath();cx.arc(cX,cY,20,0,Math.PI*2);cx.fill();
  cx.fillStyle='#fbbf24';cx.beginPath();cx.arc(cX,cY,6,0,Math.PI*2);cx.fill();

      cx.fillStyle=p.col;cx.font='bold 10px var(--body)';cx.textAlign='center';cx.fillText(p.n,px,py-p.r-7);

      // Foci (exaggerated)

        var satAngle=2*Math.PI*ti/p.sat.T;
        var sx=px+satOrb*Math.cos(satAngle),sy=py-satOrb*Math.sin(satAngle);
        cx.strokeStyle=p.sat.col+'30';cx.lineWidth=.5;cx.beginPath();cx.arc(px,py,satOrb,0,Math.PI*2);cx.stroke();
        cx.fillStyle=p.sat.col;cx.beginPath();cx.arc(sx,sy,p.sat.r,0,Math.PI*2);cx.fill();
      }
    });

    cx.strokeStyle='#ef4444';cx.lineWidth=2;cx.beginPath();cx.moveTo(fpx,fpy);cx.lineTo(fpx+fdx/fd*fLen,fpy+fdy/fd*fLen);cx.stroke();
    var fAng=Math.atan2(fdy/fd*fLen,fdx/fd*fLen);cx.fillStyle='#ef4444';cx.beginPath();cx.moveTo(fpx+fdx/fd*fLen,fpy+fdy/fd*fLen);cx.lineTo(fpx+fdx/fd*fLen-6*Math.cos(fAng-.3),fpy+fdy/fd*fLen-6*Math.sin(fAng-.3));cx.lineTo(fpx+fdx/fd*fLen-6*Math.cos(fAng+.3),fpy+fdy/fd*fLen-6*Math.sin(fAng+.3));cx.fill();
    // Velocity arrow (blue → tangent)
    var vAng2=fpos.v+Math.PI/2;var vMag=orbitalSpeed(fp,planetPos(fp,ti).r)*2.5;
    cx.strokeStyle='#38bdf8';cx.lineWidth=2;cx.beginPath();cx.moveTo(fpx,fpy);cx.lineTo(fpx+vMag*Math.cos(vAng2),fpy-vMag*Math.sin(vAng2));cx.stroke();
    var vA2=Math.atan2(-vMag*Math.sin(vAng2),vMag*Math.cos(vAng2));cx.fillStyle='#38bdf8';cx.beginPath();cx.moveTo(fpx+vMag*Math.cos(vAng2),fpy-vMag*Math.sin(vAng2));cx.lineTo(fpx+vMag*Math.cos(vAng2)-6*Math.cos(vA2-.3),fpy-vMag*Math.sin(vAng2)-6*Math.sin(vA2-.3));cx.lineTo(fpx+vMag*Math.cos(vAng2)-6*Math.cos(vA2+.3),fpy-vMag*Math.sin(vAng2)-6*Math.sin(vA2+.3));cx.fill();

    // Energy bars (bottom-right)
    var realR=planetPos(fp,ti).r,realV=orbitalSpeed(fp,realR);
    var KE=0.5*realV*realV,PE=-4*Math.PI*Math.PI/realR,TE=KE+PE;
    var maxE2=Math.max(Math.abs(KE),Math.abs(PE),1);
    var ebX=W-80,ebY=H-85,ebW=15,ebH=65,base2=ebY+ebH/2;
    cx.fillStyle=d?'rgba(10,16,28,.6)':'rgba(255,255,255,.5)';cx.beginPath();cx.roundRect(ebX-6,ebY-14,72,ebH+24,5);cx.fill();
    cx.fillStyle=d?'#94a3b8':'#475569';cx.font='bold 6px var(--serif)';cx.textAlign='center';cx.fillText('Energy ('+fp.n+')',ebX+28,ebY-4);
    var keH=Math.min(ebH/2,(KE/maxE2)*ebH/2);cx.fillStyle='#ef4444';cx.fillRect(ebX,base2-keH,ebW,keH);

    cx.strokeStyle=TE<0?'#22c55e':'#ef4444';cx.lineWidth=1.5;cx.setLineDash([2,2]);var teY2=base2-(TE/maxE2)*ebH/2;cx.beginPath();cx.moveTo(ebX-3,teY2);cx.lineTo(ebX+ebW*2+6,teY2);cx.stroke();cx.setLineDash([]);
    cx.fillStyle=d?'#e2e8f0':'#1e293b';cx.font='5px var(--mono)';cx.fillText('KE',ebX+ebW/2,ebY+ebH+6);cx.fillText('PE',ebX+ebW+3+ebW/2,ebY+ebH+6);

  }

  // === SCENE 1: 2nd Law — equal areas ===
  if(scene===1){
    var p=PLANETS[law2Planet];
    // Draw orbit (exaggerated)
    cx.strokeStyle=p.col+'50';cx.lineWidth=1.5;drawOrbit(p,cX,cY,scale);cx.stroke();
    // Draw wedges at equal time intervals (using exaggerated positions)
    var intervalYr=law2Days/365.25;
    var nWedges=Math.floor(p.T/intervalYr);if(nWedges>60)nWedges=60;

    for(var i=0;i<nWedges;i++){

    var vAngle=pos.v+Math.PI/2;cx.strokeStyle='#38bdf8';cx.lineWidth=2;cx.beginPath();cx.moveTo(px,py);cx.lineTo(px+vScale*Math.cos(vAngle),py-vScale*Math.sin(vAngle));cx.stroke();
    var vA=Math.atan2(-vScale*Math.sin(vAngle),vScale*Math.cos(vAngle));cx.fillStyle='#38bdf8';cx.beginPath();cx.moveTo(px+vScale*Math.cos(vAngle),py-vScale*Math.sin(vAngle));cx.lineTo(px+vScale*Math.cos(vAngle)-6*Math.cos(vA-.3),py-vScale*Math.sin(vAngle)-6*Math.sin(vA-.3));cx.lineTo(px+vScale*Math.cos(vAngle)-6*Math.cos(vA+.3),py-vScale*Math.sin(vAngle)-6*Math.sin(vA+.3));cx.fill();
    // Force arrow (red → toward Sun)
    var fLen2=Math.min(30,2000/(pos.r*pos.r));var fdx2=cX-px,fdy2=cY-py,fd2=Math.sqrt(fdx2*fdx2+fdy2*fdy2)||1;
    cx.strokeStyle='#ef4444';cx.lineWidth=2;cx.beginPath();cx.moveTo(px,py);cx.lineTo(px+fdx2/fd2*fLen2,py+fdy2/fd2*fLen2);cx.stroke();
    var fA2=Math.atan2(fdy2/fd2*fLen2,fdx2/fd2*fLen2);cx.fillStyle='#ef4444';cx.beginPath();cx.moveTo(px+fdx2/fd2*fLen2,py+fdy2/fd2*fLen2);cx.lineTo(px+fdx2/fd2*fLen2-5*Math.cos(fA2-.3),py+fdy2/fd2*fLen2-5*Math.sin(fA2-.3));cx.lineTo(px+fdx2/fd2*fLen2-5*Math.cos(fA2+.3),py+fdy2/fd2*fLen2-5*Math.sin(fA2+.3));cx.fill();
    // Info
    cx.fillStyle=d?'#e2e8f0':'#1e293b';cx.font='bold 10px var(--serif)';cx.textAlign='left';
    cx.fillText("2nd Law: Equal areas in equal times ("+law2Days+" days each)",8,16);
    cx.fillStyle=d?'#94a3b8':'#475569';cx.font='8px var(--mono)';
    if(areas.length>1){var avgA=areas.reduce(function(a,b){return a+b},0)/areas.length;cx.fillText('Avg area = '+avgA.toFixed(6)+' AU²  |  Max deviation: '+(((Math.max.apply(null,areas)-Math.min.apply(null,areas))/avgA)*100).toFixed(2)+'%',8,H-8)}
    cx.fillText(p.n+'  r='+pos.r.toFixed(3)+' AU  v='+spd.toFixed(2)+' AU/yr  L=const',8,30);

  // === SCENE 2: 3rd Law — T²∝a³ ===
  if(scene===2){
    law3Sel.forEach(function(idx){
      var p=PLANETS[idx];if(!p)return;

    // Star

      cx.fillStyle=d?'#94a3b8':'#475569';cx.font='8px sans-serif';cx.textAlign='left';cx.fillText('Drag arrow tip to set velocity',vax+8,vay);
    }else{
      // Running velocity arrow
      cx.strokeStyle='#38bdf8';cx.lineWidth=1.5;cx.beginPath();cx.moveTo(fpx,fpy);cx.lineTo(fpx+fb.vx*vScale2*20,fpy-fb.vy*vScale2*20);cx.stroke();
    }

    cx.fillStyle=d?'#94a3b8':'#475569';cx.font='8px var(--mono)';
    cx.fillText('r='+el.r.toFixed(3)+' AU  v='+el.v.toFixed(3)+' AU/yr  e='+(el.e<10?el.e.toFixed(3):'—'),8,30);

// Drag velocity arrow handler
cvs.addEventListener('mousedown',function(e){
  if(scene!==5||running)return;
  var r=cvs.getBoundingClientRect(),mx=(e.clientX-r.left)*(W/r.width),my=(e.clientY-r.top)*(H/r.height);
  var fbScale=H*.4/Math.max(fb.r0*2.5,3),cX2=W/2,cY2=H/2;
  var fpx=cX2+fb.x*fbScale,fpy=cY2-fb.y*fbScale;
  var vScale2=3/fbVcirc();
  var vax=fpx+fb.vx*vScale2*30,vay=fpy-fb.vy*vScale2*30;
  if(Math.abs(mx-vax)<15&&Math.abs(my-vay)<15){fb.dragV=true;e.preventDefault()}
});
cvs.addEventListener('mousemove',function(e){
  if(!fb.dragV)return;
  var r=cvs.getBoundingClientRect(),mx=(e.clientX-r.left)*(W/r.width),my=(e.clientY-r.top)*(H/r.height);
  var fbScale=H*.4/Math.max(fb.r0*2.5,3),cX2=W/2,cY2=H/2;
  var fpx=cX2+fb.x*fbScale,fpy=cY2-fb.y*fbScale;
  var vScale2=3/fbVcirc();
  fb.vx=(mx-fpx)/(vScale2*30);fb.vy=-(my-fpy)/(vScale2*30);
  fb.vFrac=Math.sqrt(fb.vx*fb.vx+fb.vy*fb.vy)/fbVcirc();
  fb.trail=[];
});
cvs.addEventListener('mouseup',function(){if(fb.dragV){fb.dragV=false;fb.running=true;fb.trail=[];fb.crashed=false;ti=0;running=true}});

    cvs2=['Central mass','Orbit orientation'].map(function(v){return'<label class="chk"><input type="checkbox" checked>'+v+'</label>'}).join('');
  }else if(scene===1){
    ivOpts='<option value="days">Time interval (days)</option><option value="pos">Position in orbit (true anomaly)</option>';
    dvOpts='<option value="area">Area swept (AU²)</option><option value="dist">Distance r (AU)</option><option value="speed">Speed v (AU/yr)</option>';
    cvs2=['Planet','Eccentricity','Semi-major axis'].map(function(v){return'<label class="chk"><input type="checkbox" checked>'+v+'</label>'}).join('');
  }else if(scene===2){
    ivOpts='<option value="a">Semi-major axis a (AU)</option><option value="planet">Planet index</option>';
    dvOpts='<option value="T">Period T (yr)</option><option value="T2">T² (yr²)</option><option value="a3">a³ (AU³)</option><option value="ratio">T²/a³</option>';
    cvs2=['Central mass (Sun)','Units (AU, yr)'].map(function(v){return'<label class="chk"><input type="checkbox" checked>'+v+'</label>'}).join('');
  }else if(scene===5){
    ivOpts='<option value="v0">Launch speed v₀ (AU/yr)</option><option value="r0">Initial radius r₀ (AU)</option>';
    dvOpts='<option value="e">Eccentricity e</option><option value="a">Semi-major axis a (AU)</option><option value="T">Period T (yr)</option><option value="ratio">T²/a³ ratio</option><option value="TE">Total Energy</option>';
    cvs2=['Central mass','Launch direction','Planet mass'].map(function(v){return'<label class="chk"><input type="checkbox" checked>'+v+'</label>'}).join('');
  }
  $('expC').innerHTML='<div style="display:flex;gap:5px;flex-wrap:wrap"><div style="flex:1;min-width:120px"><div class="exp-field"><label>Independent Variable</label><select id="selIV" onchange="updateHypo()">'+ivOpts+'</select></div><div class="exp-field"><label>Dependent Variable</label><select id="selDV" onchange="updateHypo()">'+dvOpts+'</select></div></div><div style="flex:1;min-width:120px"><div class="exp-field"><label>Controlled Variables</label><div style="display:flex;flex-wrap:wrap;gap:2px">'+cvs2+'</div></div><div class="exp-field"><label>Hypothesis</label><input type="text" id="hypoField" placeholder="If semi-major axis increases, then period will..."></div></div></div>'+
    '<div style="background:var(--surface);border-radius:6px;padding:5px 7px;border:1px solid var(--border);margin-top:3px"><div style="display:flex;gap:3px;align-items:flex-end;flex-wrap:wrap"><div style="flex:1;min-width:70px"><div class="exp-field"><label>IV</label><div style="display:flex;gap:2px"><input type="number" id="mIV" step="any" style="flex:1"><button class="btn btn-o" onclick="readIV()" style="font-size:.56rem;padding:2px 4px">↻</button></div></div></div><div style="flex:1;min-width:70px"><div class="exp-field"><label>DV</label><div style="display:flex;gap:2px"><input type="number" id="mDV" step="any" style="flex:1"><button class="btn btn-o" onclick="readDV()" style="font-size:.56rem;padding:2px 4px">↻</button></div></div></div><button class="btn btn-a" onclick="addR()" style="font-size:.6rem">+Add</button><button class="btn btn-t" onclick="autoAdd()" style="font-size:.56rem">Auto</button></div></div>'+
    '<div id="mT"></div><div style="display:flex;gap:3px;margin-top:2px"><button class="btn btn-t" onclick="plotM()" style="font-size:.6rem">Plot</button><button class="btn btn-o" onclick="clrM()" style="font-size:.6rem">Clear</button></div><div id="mSt" style="font-size:.58rem;color:var(--text3);margin-top:2px"></div>';
  setTimeout(updateHypo,10);
}
window.updateHypo=function(){var iv=$('selIV'),dv=$('selDV'),h=$('hypoField');if(iv&&dv&&h)h.placeholder='If '+iv.options[iv.selectedIndex].text+' increases, then '+dv.options[dv.selectedIndex].text+' will...'};
window.readIV=function(){var iv=$('selIV')?$('selIV').value:'a';var v=0;
  if(scene===0){var p=PLANETS.find(function(p2){return p2.on})||PLANETS[2];if(iv==='ecc')v=p.e;else if(iv==='a')v=p.a}
  else if(scene===1){if(iv==='days')v=law2Days;else if(iv==='pos'){var pos=planetPos(PLANETS[law2Planet],ti);v=pos.v*180/Math.PI}}
  else if(scene===2){if(iv==='a'){var p3=PLANETS[law3Sel[0]]||PLANETS[2];v=p3.a}else if(iv==='planet')v=law3Sel[0]}
  else if(scene===5){if(iv==='v0')v=fbVcirc()*fb.vFrac;else if(iv==='r0')v=fb.r0}
  $('mIV').value=+v.toFixed(4)};
window.readDV=function(){var dv=$('selDV')?$('selDV').value:'T';var v=0;
  if(scene===0){var p=PLANETS.find(function(p2){return p2.on})||PLANETS[2];var rr=planetPos(p,ti).r;var vv=orbitalSpeed(p,rr);if(dv==='rp')v=p.a*(1-p.e);else if(dv==='ra')v=p.a*(1+p.e);else if(dv==='T')v=p.T;else if(dv==='vmax')v=orbitalSpeed(p,p.a*(1-p.e));else if(dv==='KE')v=0.5*vv*vv;else if(dv==='PE')v=-4*Math.PI*Math.PI/rr;else if(dv==='TE')v=0.5*vv*vv-4*Math.PI*Math.PI/rr}
  else if(scene===1){var p2=PLANETS[law2Planet],pos=planetPos(p2,ti);var intYr=law2Days/365.25;if(dv==='area'){var area=0;for(var s=0;s<50;s++){var pp1=planetPos(p2,ti+intYr*s/50),pp2=planetPos(p2,ti+intYr*(s+1)/50);area+=.5*Math.abs(pp1.x*pp2.y-pp2.x*pp1.y)}v=area}else if(dv==='dist')v=pos.r;else if(dv==='speed')v=orbitalSpeed(p2,pos.r)}
  else if(scene===2){var p3=PLANETS[law3Sel[0]]||PLANETS[2];if(dv==='T')v=p3.T;else if(dv==='T2')v=p3.T*p3.T;else if(dv==='a3')v=p3.a*p3.a*p3.a;else if(dv==='ratio')v=p3.T*p3.T/(p3.a*p3.a*p3.a)}
  else if(scene===5){var el=fbElements();if(dv==='e')v=el.e<10?el.e:999;else if(dv==='a')v=el.a<9999?el.a:0;else if(dv==='T')v=el.T<9999?el.T:0;else if(dv==='ratio')v=el.a<9999?el.T*el.T/(el.a*el.a*el.a):0;else if(dv==='TE')v=el.TE}
  $('mDV').value=+v.toFixed(6)};
window.autoAdd=function(){readIV();readDV();addR()};
window.addR=function(){var iv=parseFloat($('mIV').value),dv2=parseFloat($('mDV').value);if(isNaN(iv)||isNaN(dv2)){$('mSt').textContent='Enter both.';return}manD.push({iv:iv,dv:dv2});$('mIV').value='';$('mDV').value='';$('mSt').textContent='#'+manD.length;$('mSt').style.color='var(--ok)';buildMT();syncM()};
function buildMT(){if(!manD.length){$('mT').innerHTML='';return}var g={};manD.forEach(function(d2){if(!g[d2.iv])g[d2.iv]=[];g[d2.iv].push(d2.dv)});var ks=Object.keys(g).map(Number).sort(function(a,b){return a-b});var ivN=$('selIV')?$('selIV').options[$('selIV').selectedIndex].text:'IV';var dvN=$('selDV')?$('selDV').options[$('selDV').selectedIndex].text:'DV';$('mT').innerHTML='<table class="dt"><thead><tr><th>'+ivN+'</th><th>'+dvN+'</th><th class="hl">Mean</th><th>±Unc</th><th></th></tr></thead><tbody>'+ks.map(function(k){var v=g[k],mn=v.reduce(function(a,b){return a+b},0)/v.length,u=v.length>=2?(Math.max.apply(null,v)-Math.min.apply(null,v))/2:0;return'<tr><td>'+k+'</td><td>'+v.map(function(x){return(+x.toFixed(4))+''}).join(', ')+'</td><td class="hl">'+mn.toFixed(4)+'</td><td>'+u.toFixed(4)+'</td><td><span style="cursor:pointer;color:var(--err)" onclick="rmG('+k+')">✕</span></td></tr>'}).join('')+'</tbody></table>'}
window.rmG=function(k){manD=manD.filter(function(d2){return d2.iv!==k});buildMT();syncM()};window.clrM=function(){manD=[];buildMT();expD=[];$('mSt').textContent=''};
function syncM(){if(!manD.length){expD=[];return}var g={};manD.forEach(function(d2){if(!g[d2.iv])g[d2.iv]=[];g[d2.iv].push(d2.dv)});expD=[];Object.keys(g).map(Number).sort(function(a,b){return a-b}).forEach(function(k){var v=g[k],mn=v.reduce(function(a,b){return a+b},0)/v.length,u=v.length>=2?(Math.max.apply(null,v)-Math.min.apply(null,v))/2:0;expD.push({iv:k,mean:+mn.toFixed(6),unc:+u.toFixed(6)})});buildDT();setTimeout(function(){initGr();drawGr()},30)}
window.plotM=function(){if(!manD.length)return;syncM();document.querySelectorAll('.bt').forEach(function(t2){t2.classList.remove('on')});document.querySelectorAll('.btc').forEach(function(t2){t2.classList.remove('on')});document.querySelectorAll('.bt')[1].classList.add('on');$('b1').classList.add('on');setTimeout(function(){initGr();drawGr()},80)};
function buildDT(){if(!expD.length){$('dW').innerHTML='';return}var ivN=$('selIV')?$('selIV').options[$('selIV').selectedIndex].text:'IV';var dvN=$('selDV')?$('selDV').options[$('selDV').selectedIndex].text:'DV';$('dW').innerHTML='<table class="dt"><thead><tr><th>'+ivN+'</th><th class="hl">Mean '+dvN+'</th><th>±Unc</th></tr></thead><tbody>'+expD.map(function(r){return'<tr><td>'+r.iv+'</td><td class="hl">'+r.mean+'</td><td>'+r.unc+'</td></tr>'}).join('')+'</tbody></table>'}
var gCv,gx2;function initGr(){gCv=$('gC');if(!gCv)return;gx2=gCv.getContext('2d');var d=window.devicePixelRatio||1,r=gCv.parentElement.getBoundingClientRect(),w=r.width;if(w<10)w=500;gCv.width=w*d;gCv.height=180*d;gCv.style.width=w+'px';gCv.style.height='180px';gx2.setTransform(d,0,0,d,0,0)}
function drawGr(){if(!gCv||!gx2){initGr();if(!gCv)return}var w=parseInt(gCv.style.width)||500,h=180,d=dk();gx2.clearRect(0,0,w,h);gx2.fillStyle=d?'#0f172a':'#f0f4f8';gx2.fillRect(0,0,w,h);if(!expD.length){gx2.fillStyle=d?'rgba(148,163,184,.2)':'rgba(0,0,0,.1)';gx2.font='10px sans-serif';gx2.textAlign='center';gx2.fillText('Collect data to see graph',w/2,h/2);return}var P={t:20,r:14,b:24,l:48},pW=w-P.l-P.r,pH=h-P.t-P.b;gx2.strokeStyle=d?'rgba(56,189,248,.1)':'rgba(0,0,0,.06)';gx2.lineWidth=1;gx2.beginPath();gx2.moveTo(P.l,P.t);gx2.lineTo(P.l,h-P.b);gx2.lineTo(w-P.r,h-P.b);gx2.stroke();var xs=expD.map(function(r2){return r2.iv}),ys=expD.map(function(r2){return r2.mean}),us=expD.map(function(r2){return r2.unc});var xn=Math.min.apply(null,xs),xx=Math.max.apply(null,xs),yn=Math.min.apply(null,ys.map(function(y,i){return y-us[i]}))-.001,yx=Math.max.apply(null,ys.map(function(y,i){return y+us[i]}))+.001;if(xx===xn){xn-=.1;xx+=.1}if(yx<=yn){yn-=.01;yx+=.01}function tx(v){return P.l+((v-xn)/(xx-xn))*pW}function ty(v){return P.t+pH-((v-yn)/(yx-yn))*pH}var ivN=$('selIV')?$('selIV').options[$('selIV').selectedIndex].text:'IV';var dvN=$('selDV')?$('selDV').options[$('selDV').selectedIndex].text:'DV';gx2.fillStyle=d?'#64748b':'#94a3b8';gx2.font='9px sans-serif';gx2.textAlign='center';gx2.fillText(ivN,P.l+pW/2,h-4);gx2.save();gx2.translate(10,P.t+pH/2);gx2.rotate(-Math.PI/2);gx2.fillText(dvN,0,0);gx2.restore();gx2.font='bold 9px var(--serif)';gx2.fillText(dvN+' vs '+ivN,P.l+pW/2,P.t-6);for(var i=0;i<expD.length;i++){var px=tx(xs[i]),py=ty(ys[i]),ue=us[i];if(ue>0){gx2.strokeStyle=d?'rgba(52,211,153,.3)':'rgba(14,124,107,.2)';gx2.lineWidth=1.5;gx2.beginPath();gx2.moveTo(px,ty(ys[i]-ue));gx2.lineTo(px,ty(ys[i]+ue));gx2.stroke()}gx2.fillStyle=d?'#fbbf24':'#d97706';gx2.beginPath();gx2.arc(px,py,4,0,Math.PI*2);gx2.fill();gx2.fillStyle=d?'#94a3b8':'#475569';gx2.font='7px var(--mono)';gx2.textAlign='center';gx2.fillText(ys[i].toFixed(3),px,py-7)}if(xs.length>=2){gx2.strokeStyle=d?'#fbbf24':'#d97706';gx2.lineWidth=1.5;gx2.beginPath();for(var i=0;i<expD.length;i++){i===0?gx2.moveTo(tx(xs[i]),ty(ys[i])):gx2.lineTo(tx(xs[i]),ty(ys[i]))}gx2.stroke()}}

// IB
var IB=[
  {c:'State',q:"State Kepler's three laws of planetary motion.",f:"1st: Planets orbit in ellipses with the Sun at one focus. 2nd: The radius vector sweeps equal areas in equal times. 3rd: T² ∝ a³ for all planets orbiting the same star."},
  {c:'Calculate',q:"Earth orbits at a = 1.00 AU with T = 1.00 yr. Mars has a = 1.52 AU. Find Mars's period.",f:"T²/a³ = 1 (same star). T²_Mars = a³_Mars = 1.52³ = 3.51. T_Mars = √3.51 = 1.87 yr = 683 days."},
  {c:'Explain',q:"Why does a planet move faster at periapsis than apoapsis?",f:"Angular momentum L = mvr is conserved (no torque from central force). At periapsis r is minimum → v must be maximum. At apoapsis r is maximum → v is minimum. This IS Kepler's 2nd law."},
  {c:'Explain',q:"Why is the second focus of an elliptical orbit physically unimportant?",f:"Gravity acts from the Sun at Focus 1 only. Focus 2 is a geometric property defining the ellipse shape — no mass exists there and no force originates from it."},
  {c:'Deduce',q:"Show that T²/a³ = 4π²/(GM) by equating gravitational and centripetal force for a circular orbit.",f:"GMm/r² = mv²/r → v = √(GM/r). T = 2πr/v = 2πr/√(GM/r) = 2π√(r³/GM). T² = 4π²r³/GM. So T²/r³ = 4π²/(GM) = constant."},
  {c:'Calculate',q:"Halley's Comet has a = 17.83 AU, e = 0.967. Find its periapsis and apoapsis distances.",f:"r_p = a(1−e) = 17.83(1−0.967) = 0.59 AU (inside Venus's orbit!). r_a = a(1+e) = 17.83(1+0.967) = 35.1 AU (beyond Neptune). The extreme eccentricity creates a hugely elongated orbit."}
];
function buildIB(){$('ibL').innerHTML=IB.map(function(q,i){return'<div class="ib-card"><div class="ib-cmd">'+q.c+'</div><h4>Q'+(i+1)+'</h4><p>'+q.q+'</p><textarea id="ib'+i+'"></textarea><button class="btn btn-a" style="margin-top:2px;font-size:.58rem" onclick="sF('+i+')">Show Answer</button><div class="ib-fb" id="iF'+i+'"></div></div>'}).join('');window.sF=function(i){$('iF'+i).className='ib-fb show ok';$('iF'+i).textContent=IB[i].f;addN('📝 Q'+(i+1),IB[i].q,IB[i].f)}}
var nb=[];function addN(t2,d,r){nb.push({t:t2,d:d,r:r});showN()}
function showN(){$('nbO').innerHTML=nb.length?nb.map(function(n,i){return'<div style="background:var(--surface);border:1px solid var(--border);border-radius:5px;padding:3px 5px;margin-bottom:2px;font-size:.6rem"><b style="color:var(--accent)">#'+(i+1)+' '+n.t+'</b><br>'+n.d+'<br><span style="color:var(--ok);font-weight:700">→ '+n.r+'</span></div>'}).join(''):'<p style="text-align:center;color:var(--text3);font-size:.6rem;padding:6px">Record observations here.</p>'}
showN();
window.bts=function(el,i){document.querySelectorAll('.bt').forEach(function(t2){t2.classList.remove('on')});document.querySelectorAll('.btc').forEach(function(t2){t2.classList.remove('on')});el.classList.add('on');$('b'+i).classList.add('on');if(i===1)setTimeout(function(){initGr();drawGr()},80)};

onR();buildUI();buildIB();render();
window.addEventListener('resize',onR);
</script>
