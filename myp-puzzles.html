<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Puzzle Hub | Atul Soral Physicism</title>

<style>
body{
  font-family: Arial;
  background:#0f172a;
  color:white;
  margin:0;
}

header{
  background:linear-gradient(135deg,#06b6d4,#2563eb);
  padding:40px;
  text-align:center;
}

.container{
  max-width:1100px;
  margin:auto;
  padding:20px;
}

table{
  width:100%;
  border-collapse:collapse;
  background:#1e293b;
  border-radius:10px;
  overflow:hidden;
}

th,td{
  padding:12px;
  text-align:center;
  border:1px solid #334155;
}

th{
  background:#2563eb;
}

button{
  padding:8px 12px;
  border:none;
  border-radius:6px;
  cursor:pointer;
  background:#22c55e;
  color:white;
  font-weight:bold;
}

button:hover{
  background:#16a34a;
}

.nav{
  text-align:center;
  margin-top:20px;
}

.nav button{
  background:#334155;
  margin:5px;
}
</style>
</head>

<body>

<header>
<h1>🧩 MYP Puzzle Hub</h1>
<p>Select Topic & Puzzle Type</p>
</header>

<div class="container">

<table>
<tr>
<th>Topic</th>
<th>Formula</th>
<th>Sequence</th>
<th>True/False</th>
<th>Label</th>
<th>Graph</th>
<th>Maze</th>
</tr>

<tr>
<td>Static Electricity</td>
<td><button onclick="start('Static electricity','formula',10)">Start</button></td>
<td><button onclick="start('Static electricity','sequence',10)">Start</button></td>
<td><button onclick="start('Static electricity','truefalse',10)">Start</button></td>
<td><button onclick="start('Static electricity','label',10)">Start</button></td>
<td><button onclick="start('Static electricity','graph',5)">Start</button></td>
<td><button onclick="start('Static electricity','maze',10)">Start</button></td>
</tr>

<tr>
<td>Current, Voltage, Charge</td>
<td><button onclick="start('Current Voltage Charge','formula',12)">Start</button></td>
<td><button onclick="start('Current Voltage Charge','sequence',10)">Start</button></td>
<td><button onclick="start('Current Voltage Charge','truefalse',12)">Start</button></td>
<td><button onclick="start('Current Voltage Charge','label',10)">Start</button></td>
<td><button onclick="start('Current Voltage Charge','graph',10)">Start</button></td>
<td><button onclick="start('Current Voltage Charge','maze',10)">Start</button></td>
</tr>

</table>

<div class="nav">
<button onclick="location.href='myp-dashboard.html'">🏠 Home</button>
</div>

</div>

<script>

function start(topic,type,count){

// 🔍 Debug (very useful)
console.log(topic,type,count);

// Encode properly
const url = `run-puzzle.html?topic=${encodeURIComponent(topic)}&type=${type}&count=${count}`;

// Redirect
window.location.href = url;
}

</script>

</body>
</html>
