<style>
:root {
  /* Light theme (default) */
  --bg: #f5f0e8;
  --bg-deep: #f0ebe2;
  --surface: rgba(255,255,255,0.75);
  --surface2: rgba(255,255,255,0.55);
  --white: #ffffff;
  --text: #1a1a2e;
  --text2: #555;
  --text3: #888;
  --border: rgba(0,0,0,0.06);
  --accent: #c0392b;
  --cream: var(--bg);
  --cream-2: var(--bg-deep);
  --ink: var(--text);
  --ink-2: var(--text2);
  --ink-3: var(--text2);
  --ink-4: var(--text3);
  --ink-5: var(--text3);
  --glass: var(--surface);
  --glass-border: var(--border);

  --red:#ef4444;--red-dark:#991b1b;--red-pale:#fde8e6;--red-soft:#f7c5c0;
  --teal:#4ecdc4;--teal-pale:#e0f7f5;--teal-soft:#b2ece6;
  --blue:#5b9bd5;--blue-pale:#deeaf6;
  --purple:#b39ddb;--purple-pale:#ede7f6;
  --amber:#ffd54f;--amber-pale:#fff8e1;
  --green:#81c784;--green-pale:#e8f5e9;
  --shadow-sm:0 2px 12px rgba(26,26,46,0.06);
  --shadow-md:0 8px 28px rgba(26,26,46,0.08);
  --shadow-lg:0 16px 48px rgba(26,26,46,0.1);
  --r:16px;--r-lg:24px;
  --font-display:'Palatino Linotype','Book Antiqua',Palatino,Georgia,serif;
  --font-body:'Avenir Next','Segoe UI',system-ui,-apple-system,sans-serif;
  --font-mono:'SF Mono','Cascadia Code','Consolas',monospace;
}

[data-theme="dark"] {
  --bg: #0f1119;
  --bg-deep: #141620;
  --surface: rgba(30,32,45,0.85);
  --surface2: rgba(30,32,45,0.65);
  --white: #1e2030;
  --text: #e0ddd5;
  --text2: #a0a0b0;
  --text3: #6a6a7a;
  --border: rgba(255,255,255,0.06);
  --accent: #e05040;
  --cream: #1a1c28;
}

[data-theme="dark"] body {
  background: var(--bg);
  color: var(--text);
}
[data-theme="dark"] .navbar {
  background: var(--surface);
  border-bottom-color: var(--border);
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{font-family:var(--font-body);background:var(--cream);color:var(--ink);min-height:100vh;overflow-x:hidden;font-size:15px;line-height:1.6;}

#bgCanvas{position:fixed;inset:0;z-index:0;pointer-events:none;}
.bg-image{position:fixed;inset:0;z-index:0;pointer-events:none;background:url('./exam-system/assets/myp-background-image.png') center/cover no-repeat fixed;opacity:0.1;}
.physics-grid{position:fixed;inset:0;z-index:0;pointer-events:none;opacity:0.02;
  background:linear-gradient(rgba(239,68,68,0.3) 1px,transparent 1px),linear-gradient(90deg,rgba(239,68,68,0.3) 1px,transparent 1px);
  background-size:80px 80px;mask-image:radial-gradient(ellipse 70% 60% at 50% 40%,black 10%,transparent 80%);}

/* NAVBAR */
.navbar{
  position:sticky;top:0;z-index:100;
  background:var(--glass);backdrop-filter:blur(24px) saturate(1.5);-webkit-backdrop-filter:blur(24px) saturate(1.5);
  border-bottom:1px solid var(--glass-border);
  padding:0 36px;height:64px;display:flex;align-items:center;gap:16px;
}
.nav-brand{
  font-family:var(--font-display);font-size:18px;font-weight:600;
  color:var(--ink);text-decoration:none;display:flex;align-items:center;gap:10px;
}
.nav-dot{
  width:10px;height:10px;background:var(--red);border-radius:50%;
  box-shadow:0 0 8px var(--red);animation:navPulse 2s infinite;flex-shrink:0;
}
@keyframes navPulse{0%,100%{opacity:1;box-shadow:0 0 8px var(--red)}50%{opacity:.6;box-shadow:0 0 16px var(--red)}}
.nav-brand span{color:var(--red);}
.nav-spacer{flex:1;}
.nav-links{display:flex;align-items:center;gap:6px;}
.nav-link{
  padding:8px 18px;border-radius:50px;font-size:13px;font-weight:600;
  color:var(--ink-3);text-decoration:none;transition:all .25s;cursor:pointer;
  border:none;background:none;
}
.nav-link:hover{background:var(--red-pale);color:var(--red);}

/* MAIN CONTAINER */
.main{max-width:800px;margin:0 auto;padding:24px 20px 80px;position:relative;z-index:1;text-align:center;}

/* TITLE */
h1 {
  font-family:var(--font-display);
  font-size: 28px;
  font-weight: 600;
  margin-bottom: 20px;
  color: var(--ink);
}

/* TOPIC SELECTOR */
.topic-selector {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 10px;
  margin-bottom: 30px;
}
.topic-btn {
  padding: 8px 18px;
  border-radius: 50px;
  font-size: 13px;
  font-weight: 600;
  border: 1.5px solid var(--border);
  background: var(--white);
  color: var(--text2);
  cursor: pointer;
  transition: all 0.2s;
}
.topic-btn:hover {
  border-color: var(--red-soft);
  color: var(--accent);
}
.topic-btn.active {
  background: var(--accent);
  color: white;
  border-color: var(--accent);
}

/* PROGRESS BAR */
.progress-container {
  max-width: 500px;
  margin: 0 auto 20px;
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.progress-info {
  display: flex;
  justify-content: space-between;
  font-size: 12px;
  color: var(--text2);
  font-weight: 600;
}
.progress-bar-bg {
  height: 8px;
  background: var(--surface2);
  border-radius: 4px;
  overflow: hidden;
  border: 1px solid var(--border);
}
.progress-bar-fill {
  height: 100%;
  background: var(--accent);
  width: 0%;
  transition: width 0.3s ease;
}

/* FLASHCARD DESIGN */
.flashcard-container {
  perspective: 1000px;
  width: min(90vw, 500px);
  height: 300px;
  margin: 30px auto;
  cursor: pointer;
  position: relative;
}
.flashcard {
  width: 100%;
  height: 100%;
  position: relative;
  transform-style: preserve-3d;
  transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
}
.flashcard.flipped {
  transform: rotateY(180deg);
}
.flashcard-face {
  position: absolute;
  inset: 0;
  backface-visibility: hidden;
  border-radius: 20px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 30px;
  text-align: center;
}
.flashcard-front {
  background: var(--white, white);
  border: 1.5px solid var(--border, rgba(0,0,0,0.06));
  box-shadow: 0 4px 24px rgba(0,0,0,0.06);
  color: var(--text);
}
.flashcard-front .card-topic-tag {
  position: absolute;
  top: 15px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
  background: var(--red-pale);
  color: var(--accent);
  padding: 3px 10px;
  border-radius: 50px;
}
.flashcard-front h2 {
  font-family: var(--font-display);
  font-size: 20px;
  line-height: 1.5;
}
.flashcard-front .tap-hint {
  position: absolute;
  bottom: 15px;
  font-size: 11px;
  color: var(--text3);
  letter-spacing: 0.5px;
}
.flashcard-back {
  background: linear-gradient(135deg, #c0392b, #922b21);
  color: white;
  transform: rotateY(180deg);
  box-shadow: 0 4px 24px rgba(192,57,43,0.2);
  border: 1.5px solid rgba(0,0,0,0.06);
}
.flashcard-back p {
  font-size: 15px;
  line-height: 1.6;
  white-space: pre-wrap;
}
.flashcard-back .tap-hint {
  position: absolute;
  bottom: 15px;
  font-size: 11px;
  color: rgba(255, 255, 255, 0.7);
  letter-spacing: 0.5px;
}

/* ACTIONS BAR */
.actions {
  display: flex;
  justify-content: center;
  gap: 16px;
  max-width: 500px;
  margin: 0 auto;
}
.action-btn {
  flex: 1;
  padding: 14px;
  border-radius: 50px;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  border: none;
  transition: all 0.2s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  box-shadow: var(--shadow-sm);
}
.btn-again {
  background: var(--white);
  color: #c0392b;
  border: 1.5px solid #c0392b;
}
.btn-again:hover {
  background: #fde8e6;
  transform: translateY(-2px);
}
.btn-gotit {
  background: #2e7d32;
  color: white;
}
.btn-gotit:hover {
  background: #27662a;
  transform: translateY(-2px);
}

/* KEYBOARD SHORTCUTS SUBTITLE */
.shortcuts-hint {
  margin-top: 30px;
  font-size: 12px;
  color: var(--text3);
}
.shortcuts-hint kbd {
  background: var(--white);
  border: 1px solid var(--border);
  padding: 2px 6px;
  border-radius: 4px;
  font-family: var(--font-mono);
  font-size: 10px;
  box-shadow: 0 1px 0 rgba(0,0,0,0.1);
}

/* END SCREEN */
.end-screen {
  background: var(--white);
  border: 1.5px solid var(--border);
  border-radius: var(--r-lg);
  padding: 40px;
  max-width: 500px;
  margin: 30px auto;
  box-shadow: var(--shadow-md);
}
.end-emoji {
  font-size: 64px;
  margin-bottom: 20px;
}
.end-score {
  font-family: var(--font-display);
  font-size: 24px;
  font-weight: 600;
  margin-bottom: 10px;
  color: var(--ink);
}
.end-text {
  font-size: 14px;
  color: var(--text2);
  margin-bottom: 30px;
}
.restart-btn {
  padding: 14px 30px;
  border-radius: 50px;
  font-size: 15px;
  font-weight: 600;
  background: var(--accent);
  color: white;
  border: none;
  cursor: pointer;
  transition: all 0.2s;
  box-shadow: var(--shadow-sm);
}
.restart-btn:hover {
  background: #991b1b;
  transform: translateY(-2px);
}
</style>
</head>
<body>

<canvas id="bgCanvas"></canvas>
<div class="bg-image"></div>
<div class="physics-grid"></div>

<!-- NAVBAR -->
<div class="navbar">
  <a class="nav-brand" href="myp-dashboard.html">
    <span class="nav-dot"></span>
    MYP <span>Physics</span>
  </a>
  <div class="nav-spacer"></div>
  <div class="nav-links">
    <a class="nav-link" href="myp-dashboard.html">📘 Dashboard</a>
    <a class="nav-link" href="index.html">🏠 Home</a>
    <button id="themeToggle" onclick="toggleTheme()" style="background:var(--surface);border:1.5px solid var(--border);padding:6px 12px;border-radius:50px;cursor:pointer;font-size:14px;transition:all .2s;color:var(--text2);" title="Toggle dark/light mode">🌙</button>
  
    <button id="authBtn" onclick="firebase.auth().signInWithPopup(new firebase.auth.GoogleAuthProvider())" 
      style="background:linear-gradient(135deg,#22c55e,#16a34a);color:#fff;border:none;padding:5px 14px;border-radius:7px;font-size:.75rem;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:5px">
      👤 Sign In
    </button>
</div>
</div>

<div class="main">
  <h1>🧠 Spaced Repetition Flashcards</h1>

  <!-- TOPIC SELECTOR -->
  <div class="topic-selector" id="topic-selector">
    <button class="topic-btn active" onclick="selectTopic('all', this)">All Topics</button>
    <button class="topic-btn" onclick="selectTopic('forces', this)">Forces & Motion</button>
    <button class="topic-btn" onclick="selectTopic('waves', this)">Waves</button>
    <button class="topic-btn" onclick="selectTopic('atomic', this)">Atomic Physics</button>
    <button class="topic-btn" onclick="selectTopic('electromagnetism', this)">Electromagnetism</button>
    <button class="topic-btn" onclick="selectTopic('energy', this)">Energy</button>
  </div>

  <div id="study-area">
    <!-- PROGRESS -->
    <div class="progress-container">
      <div class="progress-info">
        <span id="progress-text">Card 1 of 50</span>
        <span id="score-text">Knew: 0</span>
      </div>
      <div class="progress-bar-bg">
        <div class="progress-bar-fill" id="progress-fill"></div>
      </div>
    </div>

    <!-- FLASHCARD -->
    <div class="flashcard-container" id="flashcard-container" onclick="flipCard()">
      <div class="flashcard" id="flashcard">
        <div class="flashcard-face flashcard-front">
          <div class="card-topic-tag" id="card-topic">-</div>
          <h2 id="card-front-text">Front side question</h2>
          <div class="tap-hint">Tap to flip 🔄</div>
        </div>
        <div class="flashcard-face flashcard-back">
          <p id="card-back-text">Back side answer explanation.</p>
          <div class="tap-hint">Tap to flip 🔄</div>
        </div>
      </div>
    </div>

    <!-- ACTIONS -->
    <div class="actions">
      <button class="action-btn btn-again" onclick="studyAgain(event)">✗ Study again</button>
      <button class="action-btn btn-gotit" onclick="gotIt(event)">✓ Got it</button>
    </div>

    <!-- KEYBOARD HINTS -->
    <div class="shortcuts-hint">
      Shortcuts: <kbd>Space</kbd> Flip &bull; <kbd>←</kbd> Study again &bull; <kbd>→</kbd> Got it
    </div>
  </div>

  <!-- END SCREEN (Hidden by default) -->
  <div class="end-screen" id="end-screen" style="display:none;">
    <div class="end-emoji" id="end-emoji">🏆</div>
    <div class="end-score" id="end-score-title">Session Complete!</div>
    <div class="end-text" id="end-score-desc">You knew 0/0 cards.</div>
    <button class="restart-btn" onclick="restartSession()">Restart Session</button>
  </div>
</div>

<script>
// Data Bank (120 cards from myp-flashcards.js mapped to dashboard categories)
const FLASHCARD_BANK = [
  // Forces & Motion (forces)
  { id: 'fm1', topic: 'forces', front: "What is the formula for speed?", back: "Speed = distance / time" },
  { id: 'fm2', topic: 'forces', front: "What is the unit of force?", back: "Newton (N)" },
  { id: 'fm3', topic: 'forces', front: "What is acceleration?", back: "Rate of change of velocity" },
  { id: 'fm4', topic: 'forces', front: "What is inertia?", back: "Tendency of an object to resist change in motion" },
  { id: 'fm5', topic: 'forces', front: "What is velocity?", back: "Speed in a given direction" },
  { id: 'fm6', topic: 'forces', front: "What is deceleration?", back: "Negative acceleration" },
  { id: 'fm7', topic: 'forces', front: "State the unit of speed.", back: "Meters per second (m/s)" },
  { id: 'fm8', topic: 'forces', front: "What is uniform motion?", back: "Motion at constant speed" },
  { id: 'fm9', topic: 'forces', front: "What graph shows speed vs time?", back: "Velocity-time graph" },
  { id: 'fm10', topic: 'forces', front: "What does area under velocity-time graph represent?", back: "Displacement" },

  // Newton’s Laws (forces)
  { id: 'nl1', topic: 'forces', front: "State Newton's 1st law.", back: "An object remains at rest or in uniform motion unless acted on by a force." },
  { id: 'nl2', topic: 'forces', front: "State Newton's 2nd law.", back: "F = ma" },
  { id: 'nl3', topic: 'forces', front: "State Newton's 3rd law.", back: "Every action has an equal and opposite reaction." },
  { id: 'nl4', topic: 'forces', front: "Give an example of Newton's 1st law.", back: "A puck slides on ice until friction slows it." },
  { id: 'nl5', topic: 'forces', front: "Give an example of Newton's 3rd law.", back: "Rocket propulsion" },
  { id: 'nl6', topic: 'forces', front: "What is net force?", back: "Sum of all forces acting on an object" },
  { id: 'nl7', topic: 'forces', front: "What causes acceleration?", back: "Unbalanced force" },
  { id: 'nl8', topic: 'forces', front: "What is equilibrium?", back: "Forces are balanced" },
  { id: 'nl9', topic: 'forces', front: "Which law explains seat belts?", back: "1st law (inertia)" },
  { id: 'nl10', topic: 'forces', front: "Which law explains walking?", back: "3rd law (action-reaction)" },

  // Energy & Work (energy)
  { id: 'ew1', topic: 'energy', front: "What is the formula for work done?", back: "Work = force × distance × cos θ" },
  { id: 'ew2', topic: 'energy', front: "What is the unit of work?", back: "Joule (J)" },
  { id: 'ew3', topic: 'energy', front: "What is kinetic energy formula?", back: "KE = ½mv²" },
  { id: 'ew4', topic: 'energy', front: "What is potential energy formula?", back: "PE = mgh" },
  { id: 'ew5', topic: 'energy', front: "What is energy?", back: "Ability to do work" },
  { id: 'ew6', topic: 'energy', front: "What is the unit of energy?", back: "Joule (J)" },
  { id: 'ew7', topic: 'energy', front: "What is the law of conservation of energy?", back: "Energy cannot be created or destroyed, only transformed." },
  { id: 'ew8', topic: 'energy', front: "Give an example of energy conversion.", back: "Chemical to kinetic in muscles" },
  { id: 'ew9', topic: 'energy', front: "What is mechanical energy?", back: "Sum of kinetic and potential energy" },
  { id: 'ew10', topic: 'energy', front: "What happens to energy in friction?", back: "Converted to heat" },

  // Power & Efficiency (energy)
  { id: 'pe1', topic: 'energy', front: "What is the formula for power?", back: "Power = work done / time" },
  { id: 'pe2', topic: 'energy', front: "Unit of power?", back: "Watt (W)" },
  { id: 'pe3', topic: 'energy', front: "What is efficiency formula?", back: "Efficiency = useful output / input × 100%" },
  { id: 'pe4', topic: 'energy', front: "Example of a low-efficiency machine?", back: "Old light bulb (heat loss)" },
  { id: 'pe5', topic: 'energy', front: "What is input energy?", back: "Total energy supplied" },
  { id: 'pe6', topic: 'energy', front: "What is useful energy output?", back: "Energy in desired form" },
  { id: 'pe7', topic: 'energy', front: "High power means?", back: "Large work done in short time" },
  { id: 'pe8', topic: 'energy', front: "Example of high-power device?", back: "Electric kettle" },
  { id: 'pe9', topic: 'energy', front: "Is 100% efficiency possible?", back: "No (energy losses always occur)" },
  { id: 'pe10', topic: 'energy', front: "Power formula in circuits?", back: "Power = VI" },

  // Pressure & Density (energy)
  { id: 'pd1', topic: 'energy', front: "What is the formula for pressure?", back: "Pressure = force / area" },
  { id: 'pd2', topic: 'energy', front: "Unit of pressure?", back: "Pascal (Pa)" },
  { id: 'pd3', topic: 'energy', front: "Formula for density?", back: "Density = mass / volume" },
  { id: 'pd4', topic: 'energy', front: "Unit of density?", back: "kg/m³" },
  { id: 'pd5', topic: 'energy', front: "What happens to pressure if area decreases?", back: "Pressure increases" },
  { id: 'pd6', topic: 'energy', front: "Example of high pressure application?", back: "Knife edge" },
  { id: 'pd7', topic: 'energy', front: "Example of low pressure application?", back: "Snowshoes" },
  { id: 'pd8', topic: 'energy', front: "Why do sharp objects cut easily?", back: "Small area → higher pressure" },
  { id: 'pd9', topic: 'energy', front: "What affects fluid pressure?", back: "Depth and density" },
  { id: 'pd10', topic: 'energy', front: "What happens to density if mass constant but volume increases?", back: "Density decreases" },

  // Current & Voltage (electromagnetism)
  { id: 'cv1', topic: 'electromagnetism', front: "What is the formula for current?", back: "Current = charge / time (I = Q / t)" },
  { id: 'cv2', topic: 'electromagnetism', front: "Unit of current?", back: "Ampere (A)" },
  { id: 'cv3', topic: 'electromagnetism', front: "What is voltage?", back: "Energy per unit charge" },
  { id: 'cv4', topic: 'electromagnetism', front: "Unit of voltage?", back: "Volt (V)" },
  { id: 'cv5', topic: 'electromagnetism', front: "Formula linking voltage, current, resistance?", back: "V = IR" },
  { id: 'cv6', topic: 'electromagnetism', front: "What is charge unit?", back: "Coulomb (C)" },
  { id: 'cv7', topic: 'electromagnetism', front: "What flows in a circuit?", back: "Electrons" },
  { id: 'cv8', topic: 'electromagnetism', front: "How is voltage supplied?", back: "By a battery or power supply" },
  { id: 'cv9', topic: 'electromagnetism', front: "What does a voltmeter measure?", back: "Potential difference" },
  { id: 'cv10', topic: 'electromagnetism', front: "What does an ammeter measure?", back: "Current" },

  // Resistance & Ohm’s Law (electromagnetism)
  { id: 'ro1', topic: 'electromagnetism', front: "What is Ohm's Law?", back: "V = IR" },
  { id: 'ro2', topic: 'electromagnetism', front: "Unit of resistance?", back: "Ohm (Ω)" },
  { id: 'ro3', topic: 'electromagnetism', front: "What affects resistance of a wire?", back: "Length, thickness, material" },
  { id: 'ro4', topic: 'electromagnetism', front: "What happens to resistance if length increases?", back: "Resistance increases" },
  { id: 'ro5', topic: 'electromagnetism', front: "What happens to resistance if thickness increases?", back: "Resistance decreases" },
  { id: 'ro6', topic: 'electromagnetism', front: "What happens to current if resistance increases (V constant)?", back: "Current decreases" },
  { id: 'ro7', topic: 'electromagnetism', front: "What is a resistor?", back: "Component that limits current" },
  { id: 'ro8', topic: 'electromagnetism', front: "What happens to V if I increases in Ohm's law?", back: "V increases proportionally" },
  { id: 'ro9', topic: 'electromagnetism', front: "What is the graph of V-I for a resistor?", back: "Straight line" },
  { id: 'ro10', topic: 'electromagnetism', front: "What is a variable resistor?", back: "Resistor whose resistance can be changed" },

  // Magnetism (electromagnetism)
  { id: 'm1', topic: 'electromagnetism', front: "What are the magnetic poles?", back: "North and south" },
  { id: 'm2', topic: 'electromagnetism', front: "What happens when like poles are near?", back: "They repel" },

// Spaced Repetition State
let activeTopic = 'all';
let currentDeck = [];
let currentCardIndex = 0;
let knownCount = 0;
let progress = {
  known: [],
  review: [],
  lastSession: Date.now()
};

// Load progress from localStorage
function loadProgress() {
  const saved = localStorage.getItem('flashcard_progress');
  if (saved) {
    try {
      progress = JSON.parse(saved);
      if (!progress.known) progress.known = [];
      if (!progress.review) progress.review = [];
    } catch(e) {
      console.error("Error loading progress: ", e);
    }
  }
}

// Save progress to localStorage
function saveProgress() {
  progress.lastSession = Date.now();
  localStorage.setItem('flashcard_progress', JSON.stringify(progress));
}

// Shuffle array
function shuffle(array) {
  for (let i = array.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [array[i], array[j]] = [array[j], array[i]];
  }
  return array;
}

// Initialize session
function initSession() {
  loadProgress();
  
  // Filter by topic
  let filtered = FLASHCARD_BANK;
  if (activeTopic !== 'all') {
    filtered = FLASHCARD_BANK.filter(card => card.topic === activeTopic);
  }

  if (filtered.length === 0) {
    alert("No flashcards found for this topic.");
    return;
  }

  // Spaced Repetition weighting:
  // Cards in review list appear 3 times, others 1 time
  let weightedPool = [];
  filtered.forEach(card => {
    let count = 1;
    if (progress.review.includes(card.id)) {
      count = 3;
    }
    for (let i = 0; i < count; i++) {
      weightedPool.push({...card});
    }
  });

  // Shuffle the weighted pool
  currentDeck = shuffle(weightedPool);
  currentCardIndex = 0;
  knownCount = 0;

  // UI Reset
  document.getElementById('study-area').style.display = 'block';
  document.getElementById('end-screen').style.display = 'none';
  document.getElementById('flashcard').classList.remove('flipped');
  
  updateCard();
}

function updateCard() {
  if (currentCardIndex >= currentDeck.length) {
    showEndScreen();
    return;
  }

  const card = currentDeck[currentCardIndex];
  
  // Reset flipped state
  document.getElementById('flashcard').classList.remove('flipped');
  
  // Wait for flip transition if returning from flipped card
  setTimeout(() => {
    document.getElementById('card-topic').textContent = card.topic.replace('-', ' ');
    document.getElementById('card-front-text').textContent = card.front;
    document.getElementById('card-back-text').textContent = card.back;
  }, 150);

  // Progress Bar
  const total = currentDeck.length;
  const currentNum = currentCardIndex + 1;
  document.getElementById('progress-text').textContent = `Card ${currentNum} of ${total}`;
  document.getElementById('score-text').textContent = `Knew: ${knownCount}`;
  document.getElementById('progress-fill').style.width = `${(currentCardIndex / total) * 100}%`;
}

function flipCard() {
  document.getElementById('flashcard').classList.toggle('flipped');
}

function gotIt(event) {
  if (event) event.stopPropagation();
  if (currentCardIndex >= currentDeck.length) return;
  const card = currentDeck[currentCardIndex];
  
  // Add to known, remove from review
  if (!progress.known.includes(card.id)) {
    progress.known.push(card.id);
  }
  progress.review = progress.review.filter(id => id !== card.id);
  
  knownCount++;
  saveProgress();

  nextCard();
}

function studyAgain(event) {
  if (event) event.stopPropagation();
  if (currentCardIndex >= currentDeck.length) return;
  const card = currentDeck[currentCardIndex];
  
  // Add to review, remove from known
  if (!progress.review.includes(card.id)) {
    progress.review.push(card.id);
  }
  progress.known = progress.known.filter(id => id !== card.id);
  
  saveProgress();

  // Spaced repetition inside round: put this card back in queue
  // Insert it 3-5 positions later (or at end if deck is short)
  const remaining = currentDeck.length - currentCardIndex;
  if (remaining > 4) {
    const insertPos = currentCardIndex + 4 + Math.floor(Math.random() * 2);
    currentDeck.splice(insertPos, 0, {...card});
  } else {
    currentDeck.push({...card});
  }

  nextCard();
}

function nextCard() {
  currentCardIndex++;
  updateCard();
}

function showEndScreen() {
  document.getElementById('study-area').style.display = 'none';
  document.getElementById('end-screen').style.display = 'block';

  const total = currentDeck.length;
  document.getElementById('progress-fill').style.width = '100%';
  document.getElementById('end-score-desc').textContent = `You knew ${knownCount} out of ${total} cards in this session!`;
  
  const pct = total > 0 ? (knownCount / total) * 100 : 0;
  let emoji = "📖";
  let title = "Keep Studying!";
  if (pct >= 85) {
    emoji = "🏆";
    title = "Excellent Work!";
  } else if (pct >= 60) {
    emoji = "👏";
    title = "Great Job!";
  }
  document.getElementById('end-emoji').textContent = emoji;
  document.getElementById('end-score-title').textContent = title;
}

function restartSession() {
  initSession();
}

function selectTopic(topic, btn) {
  activeTopic = topic;
  
  // Toggle active class
  document.querySelectorAll('.topic-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  
  initSession();
}

// KEYBOARD EVENTS
document.addEventListener('keydown', e => {
  const studyArea = document.getElementById('study-area');
  if (studyArea.style.display === 'none') return;

  if (e.code === 'Space') {
    e.preventDefault();
    flipCard();
  } else if (e.code === 'ArrowRight') {
    e.preventDefault();
    gotIt();
  } else if (e.code === 'ArrowLeft') {
    e.preventDefault();
    studyAgain();
  }
});

// TOUCH SWIPE LOGIC
let touchStartX = 0;
let touchEndX = 0;
const cardContainer = document.getElementById('flashcard-container');

cardContainer.addEventListener('touchstart', e => {
  touchStartX = e.changedTouches[0].screenX;
}, {passive: true});

cardContainer.addEventListener('touchend', e => {
  touchEndX = e.changedTouches[0].screenX;
  handleSwipe();
}, {passive: true});

function handleSwipe() {
  const swipeThreshold = 60;
  if (touchEndX < touchStartX - swipeThreshold) {
    // Swipe Left -> Study again
    studyAgain();
  } else if (touchEndX > touchStartX + swipeThreshold) {
    // Swipe Right -> Got it
    gotIt();
  }
}

// Start on Load
window.onload = () => {
  initSession();
};

// Canvas Orbs
(function(){
  var canvas=document.getElementById("bgCanvas");if(!canvas)return;
  var ctx=canvas.getContext("2d");var w=0,h=0;
  function resize(){w=canvas.width=window.innerWidth;h=canvas.height=window.innerHeight;}
  resize();window.addEventListener("resize",resize);
  var orbs=[];
  var colors=[
    {r:239,g:68,b:68},
    {r:78,g:205,b:196},
    {r:179,g:157,b:219}
  ];
  for(var i=0;i<12;i++){
    orbs.push({
      x:Math.random()*window.innerWidth,y:Math.random()*window.innerHeight,
      r:Math.random()*80+60,vx:(Math.random()-.5)*.3,vy:(Math.random()-.5)*.3,
      color:colors[Math.floor(Math.random()*colors.length)],
      alpha:Math.random()*.04+.01,phase:Math.random()*Math.PI*2
    });
  }
  function draw(){
    var theme = document.documentElement.getAttribute('data-theme') || 'light';
    ctx.fillStyle = theme === 'dark' ? '#0f1119' : '#f7f3ed';
    ctx.fillRect(0,0,w,h);
    var t=Date.now()*.0003;
    for(var i=0;i<orbs.length;i++){var o=orbs[i];
      o.x+=o.vx+Math.sin(t+o.phase)*.12;o.y+=o.vy+Math.cos(t+o.phase*.7)*.08;
      if(o.x<-o.r)o.x=w+o.r;if(o.x>w+o.r)o.x=-o.r;if(o.y<-o.r)o.y=h+o.r;if(o.y>h+o.r)o.y=-o.r;
      var a=o.alpha+Math.sin(t*1.5+o.phase)*.008;
      var g=ctx.createRadialGradient(o.x,o.y,0,o.x,o.y,o.r);
      g.addColorStop(0,'rgba('+o.color.r+','+o.color.g+','+o.color.b+','+(a*2)+')');
      g.addColorStop(.5,'rgba('+o.color.r+','+o.color.g+','+o.color.b+','+a+')');
      g.addColorStop(1,'rgba('+o.color.r+','+o.color.g+','+o.color.b+',0)');
      ctx.fillStyle=g;ctx.fillRect(o.x-o.r,o.y-o.r,o.r*2,o.r*2);
    }
    requestAnimationFrame(draw);
  }
  draw();
})();

// Theme Logic
function toggleTheme() {
  var current = document.documentElement.getAttribute('data-theme');
  var next = current === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('physicism-theme', next);
  var btn = document.getElementById('themeToggle');
  if (btn) btn.textContent = next === 'dark' ? '☀️' : '🌙';
}
(function() {
  var saved = localStorage.getItem('physicism-theme');
  if (saved === 'dark') {
    document.documentElement.setAttribute('data-theme', 'dark');
    var btn = document.getElementById('themeToggle');
    if (btn) btn.textContent = '☀️';
  }
})();
</script>
