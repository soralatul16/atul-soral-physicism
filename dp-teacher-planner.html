            <div class="stat-val">${viewedCount} / 96</div>
          </div>
          <div class="stat-box">
            <div class="stat-label">Time Spent</div>
            <div class="stat-val">${timeSpentStr}</div>
          </div>
          <div class="stat-box">
            <div class="stat-label">Quizzes Taken</div>
            <div class="stat-val">${quizCount}</div>
          </div>
          <div class="stat-box">
            <div class="stat-label">Avg Quiz Score</div>
            <div class="stat-val success">${avgQuizScore}</div>
          </div>
          <div class="stat-box">
            <div class="stat-label">Exams Taken</div>
            <div class="stat-val">${attempts.length}</div>
          </div>
        </div>

        <div class="modal-dashboard-layout">
          <!-- LEFT: PROGRESS & SKILLS -->
          <div>
            <div class="modal-card">
              <h3>📊 Theme Lesson Progress</h3>
              ${renderThemeBarsHTML(lessons)}
            </div>

            <div class="modal-card">
              <h3>🎯 Assessment Objectives (AO)</h3>
              ${renderAOBarsHTML(student.aoPerformance)}
            </div>

            <div class="modal-card">
              <h3>🏆 Approaches to Learning (ATL)</h3>
              ${renderATLBadgesHTML(viewedCount, quizCount, attempts.length, student.commandTermPerformance)}
            </div>
          </div>

          <!-- RIGHT: MATRIX & CHARTS -->
          <div>
            <div class="modal-card">
              <h3>📅 Topic Mastery Matrix</h3>
              <div class="modal-matrix-container">
                <table class="modal-table">
                  <thead>
                    <tr>
                      <th>Topic</th>
                      <th>Lessons</th>
                      <th>Quiz Avg</th>
                      <th>Exams</th>
                      <th>Status</th>
                    </tr>
                  </thead>
                  <tbody>
                    ${renderMasteryMatrixHTML(lessons, quizzes, attempts)}
                  </tbody>
                </table>
              </div>
            </div>

            <div class="modal-card">
              <h3>📈 Exam Performance & Trend</h3>
              <div class="modal-chart-container">
                <canvas id="modalTrendChart"></canvas>
              </div>
            </div>
          </div>
        </div>
      `;

      modal.style.display = 'flex';

      // Draw Trend Line Chart on Canvas
      setTimeout(() => {
        const canvas = document.getElementById('modalTrendChart');
        if (canvas) {
          const ctx = canvas.getContext('2d');
          const sortedAttempts = [...attempts].sort((a, b) => (a.startedAt || 0) - (b.startedAt || 0));
          drawTrendLineChart(ctx, sortedAttempts);
        }
      }, 100);
    }

    function closeStudentModal() {
      document.getElementById('student-modal').style.display = 'none';
    }

    // MODAL DRILL DOWN GRAPHICS RENDER HELPERS
    function renderThemeBarsHTML(lessons) {
      const themesCount = { A: 0, B: 0, C: 0, D: 0, E: 0 };
      const themesTotal = { A: 0, B: 0, C: 0, D: 0, E: 0 };
      const themesColor = { A: 'var(--accent)', B: 'var(--teal)', C: 'var(--blue)', D: 'var(--purple)', E: 'var(--amber)' };

      DP_TOPICS.forEach(topic => {
        themesTotal[topic.theme] += 4; // 4 default lessons
        const cleanCode = topic.code.replace('.', '');
        for (let i = 1; i <= 4; i++) {
          const key = `${cleanCode}-lesson${i}`;
          if (lessons[key] && lessons[key].viewed) {
            themesCount[topic.theme]++;
          }
        }
      });

      return ['A', 'B', 'C', 'D', 'E'].map(theme => {
        const total = themesTotal[theme];
        const pct = total > 0 ? Math.round((themesCount[theme] / total) * 100) : 0;
        return `
          <div class="modal-progress-bar">
            <div class="modal-progress-info">
              <span>Theme ${theme}: ${THEMES[theme]}</span>
              <strong>${pct}%</strong>
            </div>
            <div class="modal-progress-bg">
              <div class="modal-progress-fill" style="width:${pct}%; background:${themesColor[theme]};"></div>
            </div>
          </div>
        `;
      }).join('');
    }

    function renderAOBarsHTML(aoPerf) {
      const perf = aoPerf || {
        AO1: { attempted: 0, correct: 0 },
        AO2: { attempted: 0, correct: 0 },
        AO3: { attempted: 0, correct: 0 }
      };

      const labels = {
        AO1: "AO1: Knowledge & Recall",
        AO2: "AO2: Application & Calculation",
        AO3: "AO3: Analysis & Evaluation"
      };

      return ['AO1', 'AO2', 'AO3'].map(ao => {
        const attempts = perf[ao]?.attempted || 0;
        const correct = perf[ao]?.correct || 0;
        const pct = attempts > 0 ? Math.round((correct / attempts) * 100) : 0;
        return `
          <div class="modal-progress-bar">
            <div class="modal-progress-info">
              <span>${labels[ao]} (${correct.toFixed(0)}/${attempts})</span>
              <strong>${pct}%</strong>
            </div>
            <div class="modal-progress-bg">
              <div class="modal-progress-fill" style="width:${pct}%; background:var(--blue);"></div>
            </div>
          </div>
        `;
      }).join('');
    }

    function renderATLBadgesHTML(viewedCount, quizCount, examCount, ctPerf) {
      const perf = ctPerf || {};
      const totalAct = viewedCount + quizCount + examCount;

      // Thinking Calculation
      let thinkingCount = viewedCount;
      let thinkingScoreTotal = 0;
      let thinkingTerms = ["Calculate", "Analyse", "Determine", "Deduce", "Predict"];
      thinkingTerms.forEach(t => {
        if (perf[t]) {
          thinkingCount += perf[t].attempted;
          thinkingScoreTotal += (perf[t].correct / perf[t].attempted);
        }
      });
      const thinkingPct = thinkingTerms.some(t => perf[t]) ? Math.round((thinkingScoreTotal / thinkingTerms.filter(t => perf[t]).length) * 100) : 0;
      let thinkingLevel = "Developing";
      if (thinkingCount >= 8 && thinkingPct >= 75) thinkingLevel = "Mastered";
      else if (thinkingCount >= 4) thinkingLevel = "Proficient";

      // Communication Calculation
      let commCount = 0;
      let commScoreTotal = 0;
      let commTerms = ["Describe", "Explain", "Discuss", "Draw", "Sketch", "Outline"];
      commTerms.forEach(t => {
        if (perf[t]) {
          commCount += perf[t].attempted;
          commScoreTotal += (perf[t].correct / perf[t].attempted);
        }
      });
      const commPct = commTerms.some(t => perf[t]) ? Math.round((commScoreTotal / commTerms.filter(t => perf[t]).length) * 100) : 0;
      let commLevel = "Developing";
      if (commCount >= 8 && commPct >= 75) commLevel = "Mastered";
      else if (commCount >= 4) commLevel = "Proficient";

      // Self-Management
      let selfLevel = "Developing";
      if (totalAct >= 15) selfLevel = "Mastered";
      else if (totalAct >= 5) selfLevel = "Proficient";

      return `
        <div style="display:flex; flex-wrap:wrap; gap:10px; font-size:11.5px;">
          <div style="background:var(--bg-deep); padding:6px 12px; border-radius:6px;">🧠 Thinking: <strong>${thinkingLevel}</strong> (${thinkingCount} items)</div>
          <div style="background:var(--bg-deep); padding:6px 12px; border-radius:6px;">💬 Communication: <strong>${commLevel}</strong> (${commCount} items)</div>
          <div style="background:var(--bg-deep); padding:6px 12px; border-radius:6px;">📅 Self-Mgmt: <strong>${selfLevel}</strong> (${totalAct} done)</div>
        </div>
      `;
    }

    function renderMasteryMatrixHTML(lessons, quizzes, attempts) {
      return DP_TOPICS.map(topic => {
        const cleanCode = topic.code.replace('.', '');
        
        let completedLessons = 0;
        for (let i = 1; i <= 4; i++) {
          if (lessons[`${cleanCode}-lesson${i}`]?.viewed) {
            completedLessons++;
          }
        }

        const qKey = `${cleanCode}-quiz-paper1a`;
        const quizScoreStr = quizzes[qKey] ? `${Math.round((quizzes[qKey].score / quizzes[qKey].total) * 100)}%` : '--';
        
        const topicAttempts = attempts.filter(att => att.topic && att.topic.toUpperCase().replace('.', '') === cleanCode);
        const examScoreStr = topicAttempts.length > 0 ? `${Math.round(topicAttempts.reduce((s, a) => s + (a.percentScore || 0), 0) / topicAttempts.length)}%` : '--';

        // Mastery Dot
        let masteryDot = "⚪";
        let scoreTotal = 0, scoreCount = 0;
        if (quizzes[qKey]) { scoreTotal += (quizzes[qKey].score / quizzes[qKey].total) * 100; scoreCount++; }
        if (topicAttempts.length > 0) { scoreTotal += topicAttempts.reduce((s, a) => s + (a.percentScore || 0), 0) / topicAttempts.length; scoreCount++; }
        const avgScore = scoreCount > 0 ? (scoreTotal / scoreCount) : null;

        if (completedLessons === 0) masteryDot = "⚪";
        else if ((avgScore !== null && avgScore < 50) || completedLessons < 2) masteryDot = "🔴";
        else if (completedLessons === 4 && avgScore !== null && avgScore >= 70) masteryDot = "🟢";
        else masteryDot = "🟡";

        return `
          <tr>
            <td><strong>${topic.code}</strong> ${topic.title}</td>
            <td>${completedLessons} / 4</td>
            <td>${quizScoreStr}</td>
            <td>${examScoreStr}</td>
            <td>${masteryDot}</td>
          </tr>
        `;
      }).join('');
    }

    // RUN AUTH CHECKS ON LOAD
    window.onload = checkAuth;
  </script>
</body>
</html>
