<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DP Physics Teacher Planner & Analytics | Atul Soral Physicism</title>
  <style>
    :root {
      --bg: #FAF7F2;
      --bg-deep: #F2EFE9;
      --surface: rgba(255, 255, 255, 0.85);
      --surface-hover: rgba(255, 255, 255, 0.98);
      --white: #ffffff;
      --text: #2C2825;
      --text2: #5A5450;
      --text3: #8A8279;
      --border: rgba(44, 40, 37, 0.08);
      --accent: #C84B31;
      --accent-light: #FDF4E1;
      --shadow-sm: 0 2px 8px rgba(44, 40, 37, 0.04);
      --shadow-md: 0 8px 24px rgba(44, 40, 37, 0.06);
      --r: 12px;
      --r-lg: 16px;
      --font-display: Georgia, 'Times New Roman', serif;
      --font-body: -apple-system, 'Segoe UI', system-ui, sans-serif;
      --font-mono: 'SF Mono', 'Cascadia Code', monospace;
      
      --red: #C84B31;
      --teal: #2D6A4F;
      --blue: #1B4965;
      --purple: #7B2D8E;
      --amber: #B07D10;
      --green: #2D6A4F;
    }

    [data-theme="dark"] {
      --bg: #0f1119;
      --bg-deep: #141620;
      --surface: rgba(30, 32, 45, 0.85);
      --surface-hover: rgba(30, 32, 45, 0.98);
      --white: #1e2030;
      --text: #e0ddd5;
      --text2: #a0a0b0;
      --text3: #6a6a7a;
      --border: rgba(255, 255, 255, 0.08);
      --accent: #e05040;
      --accent-light: #2c2520;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font-body);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      font-size: 13.5px;
      line-height: 1.5;
    }

    /* AUTH GATE STYLE */
    #auth-gate-container {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: var(--bg-deep);
      padding: 20px;
    }
    .auth-card {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: var(--r-lg);
      padding: 40px 32px;
      max-width: 400px;
      width: 100%;
      box-shadow: var(--shadow-md);
      text-align: center;
    }
    .auth-icon { font-size: 44px; margin-bottom: 16px; }
    .auth-card h2 {
      font-family: var(--font-display);
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 8px;
    }
    .auth-card p {
      font-size: 12.5px;
      color: var(--text3);
      margin-bottom: 24px;
    }
    .auth-input {
      width: 100%;
      padding: 12px 16px;
      border: 1px solid var(--border);
      border-radius: var(--r);
      font-family: var(--font-mono);
      outline: none;
      background: var(--bg-deep);
      color: var(--text);
      font-size: 14px;
      margin-bottom: 8px;
      text-align: center;
    }
    .auth-input:focus { border-color: var(--accent); }
    .auth-btn {
      width: 100%;
      padding: 12px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: var(--r);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .auth-btn:hover { opacity: 0.9; }
    .auth-error {
      color: var(--red);
      font-size: 11.5px;
      font-weight: 600;
      margin-bottom: 16px;
    }

    /* HEADER */
    header {
      background: var(--white);
      border-bottom: 1px solid var(--border);
      padding: 12px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .logo-container {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .logo-dot {
      width: 10px;
      height: 10px;
      background: var(--accent);
      border-radius: 50%;
      box-shadow: 0 0 8px var(--accent);
    }
    .logo-text {
      font-family: var(--font-display);
      font-size: 18px;
      font-weight: 700;
    }
    .logo-text span { color: var(--accent); }
    
    .nav-tabs {
      display: flex;
      gap: 4px;
    }
    .tab-btn {
      padding: 8px 16px;
      border: none;
      background: none;
      font-size: 13px;
      font-weight: 600;
      color: var(--text2);
      border-radius: 50px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .tab-btn:hover { background: var(--bg-deep); color: var(--text); }
    .tab-btn.active { background: var(--accent-light); color: var(--accent); }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .header-btn {
      padding: 6px 12px;
      border-radius: 50px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text2);
      cursor: pointer;
      font-size: 12.5px;
      font-weight: 600;
      transition: all 0.2s;
    }
    .header-btn:hover { background: var(--bg-deep); color: var(--text); }

    /* LAYOUTS */
    .layout-planner {
      flex: 1;
      display: flex;
      overflow: hidden;
    }

    /* SIDEBAR */
    .sidebar {
      width: 280px;
      background: var(--white);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      flex-shrink: 0;
    }
    .sidebar-title {
      padding: 16px 20px 8px;
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 14.5px;
      color: var(--text);
    }
    .theme-accordion {
      margin-bottom: 4px;
    }
    .theme-accordion-header {
      padding: 10px 20px;
      background: var(--bg-deep);
      font-weight: 700;
      font-size: 11.5px;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: var(--text3);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: space-between;
      user-select: none;
      transition: background 0.2s;
    }
    .theme-accordion-header:hover { background: rgba(0,0,0,0.02); }
    .theme-accordion-content {
      display: none;
    }
    .theme-accordion.open .theme-accordion-content {
      display: block;
    }
    .topic-link {
      padding: 10px 20px 10px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      transition: all 0.2s;
      border-bottom: 1px solid rgba(44,40,37,0.03);
    }
    .topic-link:hover { background: var(--bg-deep); }
    .topic-link.active { background: var(--accent-light); border-left: 3px solid var(--accent); padding-left: 29px; }
    .topic-info-side {
      display: flex;
      flex-direction: column;
      gap: 2px;
      min-width: 0;
    }
    .topic-code-side {
      font-family: var(--font-mono);
      font-size: 10.5px;
      font-weight: 700;
      color: var(--accent);
    }
    .topic-name-side {
      font-size: 12.5px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .topic-status-side {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
      margin-left: 8px;
    }

    /* EDITOR PANE */
    .editor-pane {
      flex: 1;
      padding: 24px;
      overflow-y: auto;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
    
    .editor-header {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: var(--r-lg);
      padding: 20px;
      box-shadow: var(--shadow-sm);
    }
    .editor-header-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 16px;
    }
    .topic-title-area {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .topic-code-badge {
      font-family: var(--font-mono);
      font-size: 11px;
      font-weight: 700;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }
    .topic-name-header {
      font-family: var(--font-display);
      font-size: 20px;
      font-weight: 700;
    }
    
    .stats-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
      gap: 12px;
    }
    .stat-box {
      background: var(--bg-deep);
      border-radius: var(--r);
      padding: 12px;
      text-align: center;
    }
    .stat-label {
      font-size: 10.5px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text3);
      margin-bottom: 4px;
    }
    .stat-val {
      font-size: 16px;
      font-weight: 700;
      font-family: var(--font-mono);
    }
    .stat-val.warning { color: var(--amber); }
    .stat-val.critical { color: var(--red); }
    .stat-val.success { color: var(--teal); }

    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
    }
    .toolbar-left, .toolbar-right {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .btn {
      padding: 8px 16px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--white);
      color: var(--text2);
      font-size: 12.5px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .btn:hover { background: var(--bg-deep); color: var(--text); }
    .btn-accent {
      background: var(--accent);
      color: white;
      border: none;
    }
    .btn-accent:hover { opacity: 0.9; color: white; }
    .btn-danger {
      color: var(--red);
    }
    .btn-danger:hover { background: #FDE8E6; color: var(--red); }
    
    /* LESSON CARDS */
    .lessons-list {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .lesson-card {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: var(--r);
      box-shadow: var(--shadow-sm);
      overflow: hidden;
      transition: box-shadow 0.2s;
    }
    .lesson-card:hover { box-shadow: var(--shadow-md); }
    .lesson-card.dragging { opacity: 0.4; border-style: dashed; }
    
    .lesson-header {
      padding: 14px 20px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
      cursor: pointer;
      user-select: none;
    }
    .lesson-drag-handle {
      cursor: grab;
      font-size: 16px;
      color: var(--text3);
    }
    .lesson-drag-handle:active { cursor: grabbing; }
    .lesson-chevron {
      font-size: 10px;
      color: var(--text3);
      transition: transform 0.2s;
    }
    .lesson-card.collapsed .lesson-chevron {
      transform: rotate(-90deg);
    }
    .lesson-title-input {
      font-size: 14px;
      font-weight: 700;
      flex: 1;
      border: 1px solid transparent;
      outline: none;
      padding: 2px 6px;
      border-radius: 4px;
    }
    .lesson-title-input:focus {
      background: var(--bg-deep);
      border-color: var(--border);
    }
    
    .lesson-meta-header {
      display: flex;
      align-items: center;
      gap: 16px;
      font-size: 12px;
    }
    .lesson-duration-box {
      display: flex;
      align-items: center;
      gap: 6px;
      color: var(--text2);
    }
    .lesson-duration-box input {
      width: 44px;
      padding: 2px 4px;
      border: 1px solid var(--border);
      border-radius: 4px;
      text-align: center;
      background: var(--bg-deep);
      color: var(--text);
      font-family: var(--font-mono);
      font-weight: 700;
      outline: none;
    }
    
    .lesson-body {
      padding: 20px;
      display: grid;
      grid-template-columns: 1.5fr 1fr;
      gap: 20px;
      border-top: 1px solid transparent;
    }
    .lesson-card.collapsed .lesson-body {
      display: none;
    }
    
    .lesson-col {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .lesson-field {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .field-label {
      font-size: 10.5px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text3);
    }
    .editable-box {
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 14px;
      min-height: 48px;
      font-size: 13px;
      outline: none;
      background: var(--bg-deep);
      color: var(--text);
      white-space: pre-wrap;
    }
    .editable-box:focus {
      background: var(--white);
      border-color: var(--accent);
      box-shadow: 0 0 0 2px var(--accent-light);
    }
    
    .checklist-container {
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--bg-deep);
      padding: 12px;
      max-height: 240px;
      overflow-y: auto;
    }
    .checklist-item {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      padding: 6px 0;
      border-bottom: 1px solid rgba(44,40,37,0.03);
      font-size: 12px;
    }
    .checklist-item:last-child { border-bottom: none; }
    .checklist-checkbox {
      margin-top: 3px;
      width: 14px;
      height: 14px;
      cursor: pointer;
    }
    .checklist-label {
      cursor: pointer;
      color: var(--text2);
      line-height: 1.4;
    }
    .checklist-label.checked {
      text-decoration: line-through;
      color: var(--text3);
      opacity: 0.65;
    }

    .actual-hours-input {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .actual-hours-input input {
      width: 60px;
      padding: 6px 8px;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-family: var(--font-mono);
      font-weight: 700;
      outline: none;
      background: var(--bg-deep);
      color: var(--text);
    }
    .actual-hours-input input:focus { border-color: var(--accent); background: var(--white); }

    .lesson-reorder-controls {
      display: flex;
      gap: 4px;
      margin-left: 8px;
    }
    .reorder-btn {
      width: 22px;
      height: 22px;
      border: 1px solid var(--border);
      background: var(--white);
      color: var(--text2);
      border-radius: 4px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      transition: all 0.15s;
    }
    .reorder-btn:hover { background: var(--bg-deep); color: var(--text); }

    /* OVERVIEW TAB STYLE */
    .overview-pane {
      flex: 1;
      padding: 24px;
      overflow-y: auto;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
    .overview-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
    }
    .overview-card {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 16px;
      box-shadow: var(--shadow-sm);
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      gap: 12px;
    }
    .overview-card:hover {
      box-shadow: var(--shadow-md);
      transform: translateY(-2px);
      border-color: var(--accent);
    }
    .oc-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
    }
    .oc-code {
      font-family: var(--font-mono);
      font-size: 11px;
      font-weight: 700;
      color: var(--accent);
    }
    .oc-status {
      font-size: 10px;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 12px;
      text-transform: uppercase;
    }
    .status-not-started { background: var(--bg-deep); color: var(--text3); }
    .status-in-progress { background: var(--accent-light); color: var(--amber); }
    .status-completed { background: #E8F5E8; color: var(--teal); }

    .oc-name {
      font-family: var(--font-display);
      font-size: 15px;
      font-weight: 700;
      color: var(--text);
    }
    .oc-stats {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      color: var(--text3);
      border-top: 1px solid rgba(44,40,37,0.04);
      padding-top: 10px;
    }
    .oc-stat-item {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .oc-stat-val {
      font-family: var(--font-mono);
      font-size: 12px;
      font-weight: 700;
      color: var(--text);
    }

    /* ANALYTICS TAB STYLE */
    .analytics-pane {
      flex: 1;
      display: flex;
      overflow: hidden;
    }
    .students-sidebar {
      width: 280px;
      background: var(--white);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      flex-shrink: 0;
    }
    .students-list-container {
      padding: 10px 0;
    }
    .student-item {
      padding: 12px 20px;
      cursor: pointer;
      transition: all 0.2s;
      border-bottom: 1px solid rgba(44,40,37,0.03);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .student-item:hover { background: var(--bg-deep); }
    .student-item.active { background: var(--accent-light); border-left: 3px solid var(--accent); padding-left: 17px; }
    .student-info {
      min-width: 0;
    }
    .student-name {
      font-size: 13px;
      font-weight: 700;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .student-email {
      font-size: 11px;
      color: var(--text3);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .student-pct {
      font-family: var(--font-mono);
      font-size: 12px;
      font-weight: 700;
      color: var(--accent);
    }

    .analytics-content {
      flex: 1;
      padding: 24px;
      overflow-y: auto;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
    .analytics-section-title {
      font-family: var(--font-display);
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 8px;
    }
    .ao-average-card {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: var(--r-lg);
      padding: 20px;
      box-shadow: var(--shadow-sm);
    }
    .ao-row {
      margin-bottom: 14px;
    }
    .ao-row:last-child { margin-bottom: 0; }
    .ao-info-row {
      display: flex;
      justify-content: space-between;
      font-size: 12.5px;
      font-weight: 600;
      margin-bottom: 4px;
    }
    .ao-bar-bg {
      height: 10px;
      background: var(--bg-deep);
      border-radius: 5px;
      overflow: hidden;
    }
    .ao-bar-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 5px;
      width: 0;
      transition: width 0.6s ease-out;
    }
    .ao-tip {
      margin-top: 12px;
      background: var(--bg-deep);
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 11.5px;
      color: var(--text2);
    }

    /* DRILL DOWN MODAL */
    .drilldown-modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.4);
      z-index: 1000;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 24px;
      backdrop-filter: blur(4px);
    }
    .drilldown-modal-content {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--r-lg);
      width: 100%;
      max-width: 1100px;
      height: 90vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: var(--shadow-lg);
    }
    .drilldown-modal-header {
      background: var(--white);
      border-bottom: 1px solid var(--border);
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .drilldown-modal-title {
      font-family: var(--font-display);
      font-size: 18px;
      font-weight: 700;
    }
    .drilldown-modal-body {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
    }
    .close-modal-btn {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: var(--bg-deep);
      color: var(--text);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
    }
    .close-modal-btn:hover { background: var(--border); }

    /* STUDENT DRILLDOWN SUB-STYLES */
    .modal-stats-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 12px;
      margin-bottom: 20px;
    }
    .modal-dashboard-layout {
      display: grid;
      grid-template-columns: 1fr 1.2fr;
      gap: 20px;
    }
    .modal-card {
      background: var(--white);

          try {

    // HELPER STATUS CALCULATION
    function getTopicStatus(code) {
      const state = plannerState[code];
      if (!state || !state.lessons || state.lessons.length === 0) return "not-started";
      
      let totalItems = 0;
      let completedItems = 0;
      let started = false;

      state.lessons.forEach(l => {
        // Parse checkboxes
        const parsed = parseStrategyChecklist(l.how + " " + l.engage);
        const checklistObj = l.checklist || {};
        
        parsed.forEach(item => {
          totalItems++;
          if (checklistObj[item]) completedItems++;
        });

        STANDARD_CHECKLIST_ITEMS.forEach(item => {
          totalItems++;
          if (checklistObj[item]) completedItems++;
        });

        if (l.actualHours > 0 || Object.keys(checklistObj).some(k => checklistObj[k])) {
          started = true;
        }
      });

      if (totalItems > 0 && completedItems === totalItems) return "completed";
      if (started || completedItems > 0) return "in-progress";
      return "not-started";
    }

    function parseStrategyChecklist(html) {
      const items = [];
      const temp = document.createElement('div');
      temp.innerHTML = html;
      const bolds = temp.querySelectorAll('strong, b');
      bolds.forEach(b => {
        const text = b.textContent.trim().replace(/^[:\-\s\u2014]+|[:\-\s\u2014]+$/g, '');
        if (text && text.length > 2 && !items.includes(text)) {
          items.push(text);
        }
      });
      return items;
    }

        card.draggable = true;
        
        // Drag listeners
        card.addEventListener('dragstart', (e) => handleDragStart(e, index));
        card.addEventListener('dragover', handleDragOver);
        card.addEventListener('drop', (e) => handleDrop(e, index));
        card.addEventListener('dragend', handleDragEnd);

        // Checklist elements

        const checklistObj = l.checklist || {};
        let chkTotal = 0;
        let chkDone = 0;

        let checklistHTML = '';

          chkTotal++;

    // LESSON ACTIONS
    function addLesson() {
      const state = plannerState[activeTopicCode];
      const newLesson = Object.assign({}, DEFAULT_LESSON_TEMPLATE, {
        id: "l_" + Date.now(),
        title: `Lesson ${state.lessons.length + 1}: New Block`
      });
      state.lessons.push(newLesson);
      saveTopicState(activeTopicCode);
      loadTopicEditor(activeTopicCode);
    }

    function deleteLesson(index) {
      if (confirm("Are you sure you want to delete this lesson card? This action cannot be undone.")) {
        const state = plannerState[activeTopicCode];
        state.lessons.splice(index, 1);
        saveTopicState(activeTopicCode);
        loadTopicEditor(activeTopicCode);
      }
    }

    function toggleCollapseLesson(index) {
      const state = plannerState[activeTopicCode];
      state.lessons[index].collapsed = !state.lessons[index].collapsed;
      
      const card = document.getElementById(`lesson-card-${index}`);
      if (card) {
        card.classList.toggle('collapsed');
      }
      saveTopicState(activeTopicCode);
    }

    function updateLessonField(index, field, value) {
      const state = plannerState[activeTopicCode];
      let cleanVal = value;
      if (field === 'plannedTime' || field === 'actualHours') {
        cleanVal = Number(value);
      }
      state.lessons[index][field] = cleanVal;
      saveTopicState(activeTopicCode);
      
      // Update totals in header silently
      updateHeaderTotals();
    }

    function updateTopicNotes(val) {
      const state = plannerState[activeTopicCode];
      state.notes = val;
      saveTopicState(activeTopicCode);
    }

    function updateHeaderTotals() {
      // Reload header figures without re-rendering everything
      const topic = DP_TOPICS.find(t => t.code === activeTopicCode);
      const state = plannerState[activeTopicCode];
      if (!topic || !state) return;

      let totalPlannedMinutes = 0;
      let totalActualHours = 0;
      let totalChecklistItems = 0;
      let totalCompletedItems = 0;

      state.lessons.forEach(l => {
        totalPlannedMinutes += Number(l.plannedTime || 0);
        totalActualHours += Number(l.actualHours || 0);
        const parsed = parseStrategyChecklist(l.how + " " + l.engage);
        const chk = l.checklist || {};
        parsed.forEach(item => {
          totalChecklistItems++;
          if (chk[item]) totalCompletedItems++;
        });
        STANDARD_CHECKLIST_ITEMS.forEach(item => {
          totalChecklistItems++;
          if (chk[item]) totalCompletedItems++;
        });
      });

      const totalPlannedHours = (totalPlannedMinutes / 60).toFixed(1);
      const completionRate = totalChecklistItems > 0 ? Math.round((totalCompletedItems / totalChecklistItems) * 100) : 0;
      
      // Select DOM elements and update values
      const boxes = document.querySelectorAll('.stat-val');
      if (boxes.length === 4) {
        boxes[1].textContent = `${totalPlannedHours}h`;
        boxes[2].textContent = `${totalActualHours.toFixed(1)}h`;
        boxes[3].textContent = `${completionRate}%`;
      }
    }

    // CHECKLIST ACTIONS
    function toggleChecklistItem(lessonIndex, itemText, checked) {
      const state = plannerState[activeTopicCode];
      if (!state.lessons[lessonIndex].checklist) {
        state.lessons[lessonIndex].checklist = {};
      }
      state.lessons[lessonIndex].checklist[itemText] = checked;
      saveTopicState(activeTopicCode);
      
      // Re-style labels
      updateHeaderTotals();
      
      // Update label cross style inside the card
      renderSidebar(); // refresh status dot in sidebar
    }

    function triggerChecklistReload(lessonIndex) {
      const state = plannerState[activeTopicCode];
      const lesson = state.lessons[lessonIndex];
      const parsed = parseStrategyChecklist(lesson.how + " " + lesson.engage);
      
      const container = document.getElementById(`checklist-container-${lessonIndex}`);
      if (!container) return;

      const checklistObj = lesson.checklist || {};
      let chkTotal = 0;
      let chkDone = 0;
      let checklistHTML = '';

      // 1. Parsed items
      parsed.forEach(item => {
        chkTotal++;
        const checked = !!checklistObj[item];
        if (checked) chkDone++;
        checklistHTML += `
          <div class="checklist-item">
            <input type="checkbox" class="checklist-checkbox" id="chk-${lessonIndex}-${chkTotal}" ${checked ? 'checked' : ''} onchange="toggleChecklistItem(${lessonIndex}, '${item.replace(/'/g, "\\'")}', this.checked)" />
            <label for="chk-${lessonIndex}-${chkTotal}" class="checklist-label ${checked ? 'checked' : ''}">${item}</label>
          </div>
        `;
      });

      // 2. Standard items
      STANDARD_CHECKLIST_ITEMS.forEach(item => {
        chkTotal++;
        const checked = !!checklistObj[item];
        if (checked) chkDone++;
        checklistHTML += `
          <div class="checklist-item">
            <input type="checkbox" class="checklist-checkbox" id="chk-${lessonIndex}-${chkTotal}" ${checked ? 'checked' : ''} onchange="toggleChecklistItem(${lessonIndex}, '${item.replace(/'/g, "\\'")}', this.checked)" />
            <label for="chk-${lessonIndex}-${chkTotal}" class="checklist-label ${checked ? 'checked' : ''}"><em>${item}</em></label>
          </div>
        `;
      });

      container.innerHTML = checklistHTML;
      updateHeaderTotals();
    }

    // DRAG AND DROP REORDERING
    function handleDragStart(e, index) {
      draggedCard = index;
      e.target.classList.add('dragging');
    }

    function handleDragOver(e) {
      e.preventDefault();
    }

    function handleDrop(e, index) {
      e.preventDefault();
      if (draggedCard === null || draggedCard === index) return;

      const state = plannerState[activeTopicCode];
      const item = state.lessons.splice(draggedCard, 1)[0];
      state.lessons.splice(index, 0, item);
      
      saveTopicState(activeTopicCode);
      loadTopicEditor(activeTopicCode);
    }

    function handleDragEnd(e) {
      e.target.classList.remove('dragging');
      draggedCard = null;
    }

    function moveLesson(index, direction) {
      const state = plannerState[activeTopicCode];
      const targetIndex = index + direction;
      if (targetIndex < 0 || targetIndex >= state.lessons.length) return;

      const item = state.lessons.splice(index, 1)[0];
      state.lessons.splice(targetIndex, 0, item);

      saveTopicState(activeTopicCode);
      loadTopicEditor(activeTopicCode);
    }

      downloadAnchor.setAttribute("href", dataStr);

    function importTopicState(e) {
      const fileReader = new FileReader();
      fileReader.onload = function(event) {
        try {
          const imported = JSON.parse(event.target.result);
          
          if (confirm("This will overwrite your existing planner data. Are you sure you want to proceed?")) {
            Object.keys(imported).forEach(code => {
              if (imported[code] && Array.isArray(imported[code].lessons)) {
                plannerState[code] = imported[code];
                saveTopicState(code);
              }
            });
            alert("Backup imported successfully!");
            window.location.reload();
          }
        } catch(err) {
          alert("Error parsing JSON backup file. Please make sure the file is a valid backup.");
        }
      };
      if (e.target.files[0]) {
        fileReader.readAsText(e.target.files[0]);
      }
    }

        return `

            <div class="modal-progress-info">
              <span>Theme ${theme}: ${THEMES[theme]}</span>
              <strong>${pct}%</strong>
            </div>
            <div class="modal-progress-bg">
              <div class="modal-progress-fill" style="width:${pct}%; background:${themesColor[theme]};"></div>
            </div>
          </div>
        `;
      }).join('');
    }

    function renderAOBarsHTML(aoPerf) {
      const perf = aoPerf || {
        AO1: { attempted: 0, correct: 0 },
        AO2: { attempted: 0, correct: 0 },
        AO3: { attempted: 0, correct: 0 }
      };

      const labels = {
        AO1: "AO1: Knowledge & Recall",
        AO2: "AO2: Application & Calculation",
        AO3: "AO3: Analysis & Evaluation"
      };

      return ['AO1', 'AO2', 'AO3'].map(ao => {
        const attempts = perf[ao]?.attempted || 0;
        const correct = perf[ao]?.correct || 0;
        const pct = attempts > 0 ? Math.round((correct / attempts) * 100) : 0;
        return `
          <div class="modal-progress-bar">
            <div class="modal-progress-info">
              <span>${labels[ao]} (${correct.toFixed(0)}/${attempts})</span>
              <strong>${pct}%</strong>
            </div>
            <div class="modal-progress-bg">
              <div class="modal-progress-fill" style="width:${pct}%; background:var(--blue);"></div>
            </div>
          </div>
        `;
      }).join('');
    }

    function renderATLBadgesHTML(viewedCount, quizCount, examCount, ctPerf) {
      const perf = ctPerf || {};
      const totalAct = viewedCount + quizCount + examCount;

      // Thinking Calculation
      let thinkingCount = viewedCount;
      let thinkingScoreTotal = 0;
      let thinkingTerms = ["Calculate", "Analyse", "Determine", "Deduce", "Predict"];
      thinkingTerms.forEach(t => {
        if (perf[t]) {
          thinkingCount += perf[t].attempted;
          thinkingScoreTotal += (perf[t].correct / perf[t].attempted);
        }
      });
      const thinkingPct = thinkingTerms.some(t => perf[t]) ? Math.round((thinkingScoreTotal / thinkingTerms.filter(t => perf[t]).length) * 100) : 0;
      let thinkingLevel = "Developing";
      if (thinkingCount >= 8 && thinkingPct >= 75) thinkingLevel = "Mastered";
      else if (thinkingCount >= 4) thinkingLevel = "Proficient";

      // Communication Calculation
      let commCount = 0;
      let commScoreTotal = 0;
      let commTerms = ["Describe", "Explain", "Discuss", "Draw", "Sketch", "Outline"];
      commTerms.forEach(t => {
        if (perf[t]) {
          commCount += perf[t].attempted;
          commScoreTotal += (perf[t].correct / perf[t].attempted);
        }
      });
      const commPct = commTerms.some(t => perf[t]) ? Math.round((commScoreTotal / commTerms.filter(t => perf[t]).length) * 100) : 0;
      let commLevel = "Developing";
      if (commCount >= 8 && commPct >= 75) commLevel = "Mastered";
      else if (commCount >= 4) commLevel = "Proficient";

      // Self-Management
      let selfLevel = "Developing";
      if (totalAct >= 15) selfLevel = "Mastered";
      else if (totalAct >= 5) selfLevel = "Proficient";

      return `
        <div style="display:flex; flex-wrap:wrap; gap:10px; font-size:11.5px;">
          <div style="background:var(--bg-deep); padding:6px 12px; border-radius:6px;">🧠 Thinking: <strong>${thinkingLevel}</strong> (${thinkingCount} items)</div>
          <div style="background:var(--bg-deep); padding:6px 12px; border-radius:6px;">💬 Communication: <strong>${commLevel}</strong> (${commCount} items)</div>
          <div style="background:var(--bg-deep); padding:6px 12px; border-radius:6px;">📅 Self-Mgmt: <strong>${selfLevel}</strong> (${totalAct} done)</div>
        </div>
      `;
    }

    function renderMasteryMatrixHTML(lessons, quizzes, attempts) {
      return DP_TOPICS.map(topic => {
        const cleanCode = topic.code.replace('.', '');
        
        let completedLessons = 0;
        for (let i = 1; i <= 4; i++) {
          if (lessons[`${cleanCode}-lesson${i}`]?.viewed) {
            completedLessons++;
          }
        }

        const qKey = `${cleanCode}-quiz-paper1a`;
        const quizScoreStr = quizzes[qKey] ? `${Math.round((quizzes[qKey].score / quizzes[qKey].total) * 100)}%` : '--';
        
        const topicAttempts = attempts.filter(att => att.topic && att.topic.toUpperCase().replace('.', '') === cleanCode);
        const examScoreStr = topicAttempts.length > 0 ? `${Math.round(topicAttempts.reduce((s, a) => s + (a.percentScore || 0), 0) / topicAttempts.length)}%` : '--';

        // Mastery Dot
        let masteryDot = "⚪";
        let scoreTotal = 0, scoreCount = 0;
        if (quizzes[qKey]) { scoreTotal += (quizzes[qKey].score / quizzes[qKey].total) * 100; scoreCount++; }
        if (topicAttempts.length > 0) { scoreTotal += topicAttempts.reduce((s, a) => s + (a.percentScore || 0), 0) / topicAttempts.length; scoreCount++; }
        const avgScore = scoreCount > 0 ? (scoreTotal / scoreCount) : null;

        if (completedLessons === 0) masteryDot = "⚪";
        else if ((avgScore !== null && avgScore < 50) || completedLessons < 2) masteryDot = "🔴";
        else if (completedLessons === 4 && avgScore !== null && avgScore >= 70) masteryDot = "🟢";
        else masteryDot = "🟡";

        return `
          <tr>
            <td><strong>${topic.code}</strong> ${topic.title}</td>
            <td>${completedLessons} / 4</td>
            <td>${quizScoreStr}</td>
            <td>${examScoreStr}</td>
            <td>${masteryDot}</td>
          </tr>
        `;
      }).join('');
    }

    // RUN AUTH CHECKS ON LOAD
    window.onload = checkAuth;
  </script>
</body>
</html>
