<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DP Physics Teacher Planner & Analytics | Atul Soral Physicism</title>
  <style>
    :root {
      --bg: #FAF7F2;
      --bg-deep: #F2EFE9;
      --surface: rgba(255, 255, 255, 0.85);
      --surface-hover: rgba(255, 255, 255, 0.98);
      --white: #ffffff;
      --text: #2C2825;
      --text2: #5A5450;
      --text3: #8A8279;
      --border: rgba(44, 40, 37, 0.08);
      --accent: #B8432F;
      --accent2: #2D6A4F;
      --accent3: #1B4965;
      --accent4: #7B2D8E;
      --accent5: #B07D10;
      --accent-light: #FDF4E1;
      --shadow-sm: 0 2px 8px rgba(44, 40, 37, 0.04);
      --shadow-md: 0 8px 24px rgba(44, 40, 37, 0.06);
      --r: 12px;
      --r-lg: 16px;
      --font-display: Georgia, 'Times New Roman', serif;
      --font-body: -apple-system, 'Segoe UI', system-ui, sans-serif;
      --font-mono: 'SF Mono', 'Cascadia Code', monospace;
      
      --red: #C84B31;
      --teal: #2D6A4F;
      --blue: #1B4965;
      --purple: #7B2D8E;
      --amber: #B07D10;
      --green: #2D6A4F;
    }

    [data-theme="dark"] {
      --bg: #0f1119;
      --bg-deep: #141620;
      --surface: rgba(30, 32, 45, 0.85);
      --surface-hover: rgba(30, 32, 45, 0.98);
      --white: #1e2030;
      --text: #e0ddd5;
      --text2: #a0a0b0;
      --text3: #6a6a7a;
      --border: rgba(255, 255, 255, 0.08);
      --accent: #e05040;
      --accent-light: #2c2520;
    }

    @keyframes shimmer {
      0% { left: -100%; }
      100% { left: 200%; }
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font-body);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      font-size: 13.5px;
      line-height: 1.5;
    }

    /* AUTH GATE STYLE */
    #auth-gate-container {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: var(--bg-deep);
      padding: 20px;
    }
    .auth-card {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: var(--r-lg);
      padding: 40px 32px;
      max-width: 400px;
      width: 100%;
      box-shadow: var(--shadow-md);
      text-align: center;
    }
    .auth-icon { font-size: 44px; margin-bottom: 16px; }
    .auth-card h2 {
      font-family: var(--font-display);
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 8px;
    }
    .auth-card p {
      font-size: 12.5px;
      color: var(--text3);
      margin-bottom: 24px;
    }
    .auth-input {
      width: 100%;
      padding: 12px 16px;
      border: 1px solid var(--border);
      border-radius: var(--r);
      font-family: var(--font-mono);
      outline: none;
      background: var(--bg-deep);
      color: var(--text);
      font-size: 14px;
      margin-bottom: 8px;
      text-align: center;
    }
    .auth-input:focus { border-color: var(--accent); }
    .auth-btn {
      width: 100%;
      padding: 12px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: var(--r);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .auth-btn:hover { opacity: 0.9; }
    .auth-error {
      color: var(--red);
      font-size: 11.5px;
      font-weight: 600;
      margin-bottom: 16px;
    }

    /* HEADER */
    header {
      background: var(--white);
      border-bottom: 1px solid var(--border);
      padding: 12px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .logo-container {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .logo-dot {
      width: 10px;
      height: 10px;
      background: var(--accent);
      border-radius: 50%;
      box-shadow: 0 0 8px var(--accent);
    }
    .logo-text {
      font-family: var(--font-display);
      font-size: 18px;
      font-weight: 700;
    }
    .logo-text span { color: var(--accent); }
    
    .nav-tabs {
      display: flex;
      gap: 4px;
    }
    .tab-btn {
      padding: 8px 16px;
      border: none;
      background: none;
      font-size: 13px;
      font-weight: 600;
      color: var(--text2);
      border-radius: 50px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .tab-btn:hover { background: var(--bg-deep); color: var(--text); }
    .tab-btn.active { background: var(--accent-light); color: var(--accent); }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .header-btn {
      padding: 6px 12px;
      border-radius: 50px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text2);
      cursor: pointer;
      font-size: 12.5px;
      font-weight: 600;
      transition: all 0.2s;
    }
    .header-btn:hover { background: var(--bg-deep); color: var(--text); }

    /* LAYOUTS */
    .layout-planner {
      flex: 1;
      display: flex;
      overflow: hidden;
    }

    /* SIDEBAR */
    .sidebar {
      width: 280px;
      background: var(--white);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      flex-shrink: 0;
    }
    .sidebar-title {
      padding: 16px 20px 8px;
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 14.5px;
      color: var(--text);
    }
    .theme-accordion {
      margin-bottom: 4px;
    }
    .theme-accordion-header {
      padding: 10px 20px;
      background: var(--bg-deep);
      font-weight: 700;
      font-size: 11.5px;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: var(--text3);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: space-between;
      user-select: none;
      transition: background 0.2s;
    }
    .theme-accordion-header:hover { background: rgba(0,0,0,0.02); }
    .theme-accordion-content {
      display: none;
    }
    .theme-accordion.open .theme-accordion-content {
      display: block;
    }
    .topic-link {
      padding: 10px 20px 10px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      border-bottom: 1px solid rgba(44,40,37,0.03);
      border-left: 3px solid transparent;
    }
    .topic-link:hover {
      background: var(--bg-deep);
      border-left-color: var(--teal);
      padding-left: 29px;
    }
    .topic-link.active {
      background: linear-gradient(90deg, var(--accent-light), transparent);
      border-left: 3px solid var(--accent);
      padding-left: 29px;
      font-weight: 600;
    }
    .topic-info-side {
      display: flex;
      flex-direction: column;
      gap: 2px;
      min-width: 0;
    }
    .topic-code-side {
      font-family: var(--font-mono);
      font-size: 10.5px;
      font-weight: 700;
      color: var(--accent);
    }
    .topic-name-side {
      font-size: 12.5px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .topic-status-side {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
      margin-left: 8px;
    }

    /* EDITOR PANE */
    .editor-pane {
      flex: 1;
      padding: 24px;
      overflow-y: auto;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
    
    .editor-header {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: var(--r-lg);
      padding: 20px;
      box-shadow: var(--shadow-sm);
    }
    .editor-header-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 16px;
    }
    .topic-title-area {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .topic-code-badge {
      font-family: var(--font-mono);
      font-size: 11px;
      font-weight: 700;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }
    .topic-name-header {
      font-family: var(--font-display);
      font-size: 20px;
      font-weight: 700;
    }
    
    .stats-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
      gap: 12px;
    }
    .stat-box {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 18px;
      box-shadow: var(--shadow-sm);
      display: flex;
      flex-direction: column;
      justify-content: center;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
      overflow: hidden;
    }
    .stat-box::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--accent), var(--teal), var(--blue));
      opacity: 0;
      transition: opacity 0.3s ease;
    }
    .stat-box:hover {
      box-shadow: 0 8px 28px rgba(44, 40, 37, 0.08);
      transform: translateY(-3px);
      border-color: var(--accent);
    }
    .stat-box:hover::before {
      opacity: 1;
    }
    .stat-label {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text3);
      margin-bottom: 6px;
    }
    .stat-val {
      font-size: 18px;
      font-weight: 700;
      font-family: var(--font-mono);
      color: var(--text);
      transition: color 0.3s ease;
    }
    .stat-val.warning { color: var(--amber); }
    .stat-val.critical { color: var(--red); }
    .stat-val.success { color: var(--teal); }

    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
    }
    .toolbar-left, .toolbar-right {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .btn {
      padding: 8px 16px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--white);
      color: var(--text2);
      font-size: 12.5px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .btn:hover {
      background: var(--bg-deep);
      color: var(--text);
      transform: translateY(-1px);
      box-shadow: 0 2px 8px rgba(44, 40, 37, 0.06);
    }
    .btn:active {
      transform: translateY(0);
      box-shadow: none;
    }
    .btn-accent {
      background: var(--accent);
      color: white;
      border: none;
    }
    .btn-accent:hover {
      opacity: 0.92;
      color: white;
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(200, 75, 49, 0.2);
    }
    .btn-danger {
      color: var(--red);
    }
    .btn-danger:hover { background: #FDE8E6; color: var(--red); }
    
    /* LESSON CARDS */
    .lessons-list {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .lesson-card {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: var(--r);
      box-shadow: var(--shadow-sm);
      overflow: hidden;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .lesson-card:hover {
      box-shadow: 0 8px 24px rgba(44, 40, 37, 0.07);
      transform: translateY(-2px);
      border-color: rgba(200, 75, 49, 0.15);
    }
    .lesson-card.dragging { opacity: 0.4; border-style: dashed; }
    
    .lesson-header {
      padding: 14px 20px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
      cursor: pointer;
      user-select: none;
      transition: background 0.2s ease;
    }
    .lesson-header:hover {
      background: var(--bg-deep);
    }
    .lesson-drag-handle {
      cursor: grab;
      font-size: 16px;
      color: var(--text3);
    }
    .lesson-drag-handle:active { cursor: grabbing; }
    .lesson-chevron {
      font-size: 10px;
      color: var(--text3);
      transition: transform 0.25s ease;
    }
    .lesson-card.collapsed .lesson-chevron {
      transform: rotate(-90deg);
    }
    .lesson-title-input {
      font-size: 14px;
      font-weight: 700;
      flex: 1;
      border: 1px solid transparent;
      outline: none;
      padding: 2px 6px;
      border-radius: 4px;
    }
    .lesson-title-input:focus {
      background: var(--bg-deep);
      border-color: var(--border);
    }
    
    .lesson-meta-header {
      display: flex;
      align-items: center;
      gap: 16px;
      font-size: 12px;
    }
    .lesson-duration-box {
      display: flex;
      align-items: center;
      gap: 6px;
      color: var(--text2);
    }
    .lesson-duration-box input {
      width: 44px;
      padding: 2px 4px;
      border: 1px solid var(--border);
      border-radius: 4px;
      text-align: center;
      background: var(--bg-deep);
      color: var(--text);
      font-family: var(--font-mono);
      font-weight: 700;
      outline: none;
    }
    
    .lesson-body {
      padding: 20px;
      display: grid;
      grid-template-columns: 1.5fr 1fr;
      gap: 20px;
      border-top: 1px solid transparent;
    }
    .lesson-card.collapsed .lesson-body {
      display: none;
    }
    
    .lesson-col {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .lesson-field {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .field-label {
      font-size: 10.5px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text3);
    }
    .editable-box {
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 14px;
      min-height: 48px;
      font-size: 13px;
      outline: none;
      background: var(--bg-deep);
      color: var(--text);
      white-space: pre-wrap;
      transition: all 0.25s ease;
    }
    .editable-box:focus {
      background: var(--white);
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(200, 75, 49, 0.08);
    }
    .editable-box:hover:not(:focus) {
      border-color: rgba(44, 40, 37, 0.15);
    }
    
    .checklist-container {
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--bg-deep);
      padding: 12px;
      max-height: 240px;
      overflow-y: auto;
    }
    .checklist-item {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      padding: 6px 0;
      border-bottom: 1px solid rgba(44,40,37,0.03);
      font-size: 12px;
    }
    .checklist-item:last-child { border-bottom: none; }
    .checklist-checkbox {
      margin-top: 3px;
      width: 14px;
      height: 14px;
      cursor: pointer;
      accent-color: var(--teal);
    }
    .checklist-label {
      cursor: pointer;
      color: var(--text2);
      line-height: 1.4;
      transition: all 0.25s ease;
    }
    .checklist-label.checked {
      text-decoration: line-through;
      color: var(--text3);
      opacity: 0.55;
    }

    .actual-hours-input {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .actual-hours-input input {
      width: 60px;
      padding: 6px 8px;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-family: var(--font-mono);
      font-weight: 700;
      outline: none;
      background: var(--bg-deep);
      color: var(--text);
    }
    .actual-hours-input input:focus { border-color: var(--accent); background: var(--white); }

    .lesson-reorder-controls {
      display: flex;
      gap: 4px;
      margin-left: 8px;
    }
    .reorder-btn {
      width: 22px;
      height: 22px;
      border: 1px solid var(--border);
      background: var(--white);
      color: var(--text2);
      border-radius: 4px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      transition: all 0.15s;
    }
    .reorder-btn:hover { background: var(--bg-deep); color: var(--text); }

    /* OVERVIEW TAB STYLE */
    .overview-pane {
      flex: 1;
      padding: 24px;
      overflow-y: auto;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
    .overview-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
    }
    .overview-card {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 16px;
      box-shadow: var(--shadow-sm);
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      gap: 12px;
    }
    .overview-card:hover {
      box-shadow: var(--shadow-md);
      transform: translateY(-2px);
      border-color: var(--accent);
    }
    .oc-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
    }
    .oc-code {
      font-family: var(--font-mono);
      font-size: 11px;
      font-weight: 700;
      color: var(--accent);
    }
    .oc-status {
      font-size: 10px;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 12px;
      text-transform: uppercase;
    }
    .status-not-started { background: var(--bg-deep); color: var(--text3); }
    .status-in-progress { background: var(--accent-light); color: var(--amber); }
    .status-completed { background: #E8F5E8; color: var(--teal); }

    .oc-name {
      font-family: var(--font-display);
      font-size: 15px;
      font-weight: 700;
      color: var(--text);
    }
    .oc-stats {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      color: var(--text3);
      border-top: 1px solid rgba(44,40,37,0.04);
      padding-top: 10px;
    }
    .oc-stat-item {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .oc-stat-val {
      font-family: var(--font-mono);
      font-size: 12px;
      font-weight: 700;
      color: var(--text);
    }

    /* ANALYTICS TAB STYLE */
    .analytics-pane {
      flex: 1;
      display: flex;
      overflow: hidden;
    }
    .students-sidebar {
      width: 280px;
      background: var(--white);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      flex-shrink: 0;
    }
    .students-list-container {
      padding: 10px 0;
    }
    .student-item {
      padding: 12px 20px;
      cursor: pointer;
      transition: all 0.2s;
      border-bottom: 1px solid rgba(44,40,37,0.03);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .student-item:hover { background: var(--bg-deep); }
    .student-item.active { background: var(--accent-light); border-left: 3px solid var(--accent); padding-left: 17px; }
    .student-info {
      min-width: 0;
    }
    .student-name {
      font-size: 13px;
      font-weight: 700;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .student-email {
      font-size: 11px;
      color: var(--text3);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .student-pct {
      font-family: var(--font-mono);
      font-size: 12px;
      font-weight: 700;
      color: var(--accent);
    }

    .analytics-content {
      flex: 1;
      padding: 24px;
      overflow-y: auto;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
    .analytics-section-title {
      font-family: var(--font-display);
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 8px;
    }
    .ao-average-card {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: var(--r-lg);
      padding: 20px;
      box-shadow: var(--shadow-sm);
    }
    .ao-row {
      margin-bottom: 14px;
    }
    .ao-row:last-child { margin-bottom: 0; }
    .ao-info-row {
      display: flex;
      justify-content: space-between;
      font-size: 12.5px;
      font-weight: 600;
      margin-bottom: 4px;
    }
    .ao-bar-bg {
      height: 10px;
      background: var(--bg-deep);
      border-radius: 5px;
      overflow: hidden;
    }
    .ao-bar-fill {
      height: 100%;
      background: var(--accent);

  <!-- AUTHENTICATION GATE CONTAINER -->

    function checkAuth() {
      const savedTheme = localStorage.getItem('physicism-theme') || 'light';
      document.documentElement.setAttribute('data-theme', savedTheme);

      if (sessionStorage.getItem('teacher_auth') === 'true') {
        document.getElementById('auth-gate-container').style.display = 'none';
        document.getElementById('app-container').style.display = 'block';
        initPlanner();
      } else {
        document.getElementById('auth-gate-container').style.display = 'flex';
        document.getElementById('app-container').style.display = 'none';
      }
    }

    function handleAuthSubmit(e) {
      e.preventDefault();
      const val = document.getElementById('password-input').value;
      if (val === 'atul123') {
        sessionStorage.setItem('teacher_auth', 'true');
        document.getElementById('auth-gate-container').style.display = 'none';
        document.getElementById('app-container').style.display = 'block';
        initPlanner();
      } else {
        const err = document.getElementById('auth-error');
        err.style.display = 'block';
        document.getElementById('password-input').value = '';
        document.getElementById('password-input').focus();
      }

      if (confirm("Are you sure you want to sign out of the Teacher Portal?")) {
        sessionStorage.removeItem('teacher_auth');
        window.location.reload();

      const btn = document.getElementById('themeToggleBtn');
      if (btn) btn.textContent = n === 'dark' ? '☀️ Mode' : '🌙 Mode';

      const container = document.getElementById('app-container');

    // Helper to load flat lessons list for a topic, combining base DP_PLANNER_DATA and local storage overrides
    function getLessonsForTopic(code) {
      const dataKey = code.replace('.', '');
      const baseTopic = DP_PLANNER_DATA[dataKey];
      const editsKey = `dp-planner-edits-${dataKey}`;
      const editsData = localStorage.getItem(editsKey);
      let edits = null;
      if (editsData) {
        try {
          edits = JSON.parse(editsData);
        } catch(e) {
          console.error("Error parsing edits for " + code, e);
        }
      }

      // 1. Get base subtopics
      const baseSubtopics = [];
      if (baseTopic && baseTopic.groups) {
        baseTopic.groups.forEach((g, gIdx) => {
          if (g.subtopics) {
            g.subtopics.forEach((sub, sIdx) => {
              // Map base subtopic to flat editor lesson structure
              const lesson = {
                id: sub.id || (dataKey + "_G" + gIdx + "_S" + sub.num), // unique ID
                group: g.name,
                title: sub.title,
                plannedTime: sub.minutes || 30,
                understandings: Array.isArray(sub.understandings) ? [...sub.understandings] : [],
                how: sub.teachingStrategy || "",
                engage: sub.engagementHook ? `<p><strong>${sub.engagementHook.title}</strong> — ${sub.engagementHook.content}</p>` : "",
                engagementHook: sub.engagementHook ? { ...sub.engagementHook } : { title: "", content: "" },
                nos: sub.nos ? { tags: [...(sub.nos.tags || [])], description: sub.nos.description || "" } : { tags: [], description: "" },
                atl: Array.isArray(sub.atl) ? [...sub.atl] : [],
                lp: Array.isArray(sub.learnerProfile) ? [...sub.learnerProfile] : [],
                ao: Array.isArray(sub.ao) ? [...sub.ao] : [],
                resources: sub.resources || "",
                formative: sub.formative || "",
                media: sub.media || [],
                actualHours: sub.actualHours || 0,
                notes: sub.notes || "",
                checklist: sub.checklist || {},
                collapsed: true,
                status: "planned"
              };
              baseSubtopics.push(lesson);
            });
          }
        });
      }

      // 2. If no edits exist, return base subtopics
      if (!edits) {
        if (baseSubtopics.length > 0) {
          return baseSubtopics;
        } else {
          // Return empty topic placeholder
          return [];
        }
      }

      // 3. If edits exist, reconstruct lessons array using edits.lessonsOrder
      const lessons = [];
      const lessonsOrder = edits.lessonsOrder || baseSubtopics.map(s => s.id);
      const overrides = edits.overrides || {};

      lessonsOrder.forEach(id => {
        const baseSub = baseSubtopics.find(s => s.id === id);
        const over = overrides[id];

        if (over) {
          if (baseSub) {
            lessons.push(Object.assign({}, baseSub, over));
          } else {
            lessons.push(over); // custom-added lesson
          }
        } else if (baseSub) {
          lessons.push(baseSub);
        }
      });

      return lessons;
    }

    // Save current state as overrides in dp-planner-edits-[topicCode]
    function saveTopicState(code) {
      if (plannerState[code]) {
        const dataKey = code.replace('.', '');
        const lessons = plannerState[code].lessons;
        const notes = plannerState[code].notes;
        
        const lessonsOrder = [];
        const overrides = {};
        
        const baseTopic = DP_PLANNER_DATA[dataKey];
        const baseSubtopicsMap = {};
        if (baseTopic && baseTopic.groups) {
          baseTopic.groups.forEach((g, gIdx) => {
            if (g.subtopics) {
              g.subtopics.forEach(sub => {
                baseSubtopicsMap[dataKey + "_G" + gIdx + "_S" + sub.num] = sub;
              });
            }
          });
        }

        lessons.forEach(l => {
          lessonsOrder.push(l.id);
          overrides[l.id] = l; // Save the full customized lesson as an override
        });

        const edits = {
          lessonsOrder: lessonsOrder,
          overrides: overrides,
          notes: notes
        };
        
        const key = `dp-planner-edits-${dataKey}`;
        localStorage.setItem(key, JSON.stringify(edits));
      }
    }

    // Load planner state from DP_PLANNER_DATA + localStorage overrides
    function loadPlannerState() {
      // Clean up old cache reset logic and enforce version 2025_v4
      const PLANNER_VERSION = "2025_v4";
      if (localStorage.getItem("dp_planner_version") !== PLANNER_VERSION) {
        // Clear old key formats to prevent data pollution
        DP_TOPICS.forEach(topic => {
          const oldKey = `dp-planner-${topic.code.replace('.', '')}`;
          localStorage.removeItem(oldKey);
        });
        localStorage.setItem("dp_planner_version", PLANNER_VERSION);
      }

      DP_TOPICS.forEach(topic => {
        const dataKey = topic.code.replace('.', '');
        const editsKey = `dp-planner-edits-${dataKey}`;
        const oldKey = `dp-planner-${dataKey}`;
        
        // Migrate old key format if present
        if (localStorage.getItem(oldKey) && !localStorage.getItem(editsKey)) {
          try {
            const oldData = JSON.parse(localStorage.getItem(oldKey));
            const lessons = oldData.lessons || [];
            const overrides = {};
            const lessonsOrder = [];
            lessons.forEach(l => {
              lessonsOrder.push(l.id);
              overrides[l.id] = l;
            });
            const newEdits = {
              lessonsOrder: lessonsOrder,
              overrides: overrides,
              notes: oldData.notes || ""
            };
            localStorage.setItem(editsKey, JSON.stringify(newEdits));
            localStorage.removeItem(oldKey);
          } catch(e) {}
        }

        const lessons = getLessonsForTopic(topic.code);
        const editsData = localStorage.getItem(editsKey);
        let notes = "";
        if (editsData) {
          try {
            notes = JSON.parse(editsData).notes || "";
          } catch(e) {}
        } else {
          if (topic.code === "A.2" || topic.code === "A.3") {
            notes = topic.code + " is pre-populated from the Topic Bank lessons. Use this template to build your lesson plan cards.";
          }
        }

        plannerState[topic.code] = {
          lessons: lessons,
          notes: notes
        };
      });
    }

    // HELPER STATUS CALCULATION
    function getTopicStatus(code) {
      const state = plannerState[code];
      if (!state || !state.lessons || state.lessons.length === 0) return "not-started";
      
      let totalItems = 0;
      let completedItems = 0;
      let started = false;

      state.lessons.forEach(l => {
        // Parse checkboxes
        const parsed = parseStrategyChecklist(l.how + " " + l.engage);
        const checklistObj = l.checklist || {};
        
        parsed.forEach(item => {
          totalItems++;
          if (checklistObj[item]) completedItems++;
        });

        STANDARD_CHECKLIST_ITEMS.forEach(item => {
          totalItems++;
          if (checklistObj[item]) completedItems++;
        });

        if (l.actualHours > 0 || Object.keys(checklistObj).some(k => checklistObj[k])) {
          started = true;
        }
      });

      if (totalItems > 0 && completedItems === totalItems) return "completed";
      if (started || completedItems > 0) return "in-progress";
      return "not-started";
    }

    function parseStrategyChecklist(html) {
      const items = [];
      const temp = document.createElement('div');
      temp.innerHTML = html;
      const bolds = temp.querySelectorAll('strong, b');
      bolds.forEach(b => {
        const text = b.textContent.trim().replace(/^[:\-\s\u2014]+|[:\-\s\u2014]+$/g, '');
        if (text && text.length > 2 && !items.includes(text)) {
          items.push(text);
        }
      });
      return items;
    }

    function getColorValue(colorName) {
      const ACCENT_COLORS = {
        accent: "#B8432F",
        accent2: "#2D6A4F",
        accent3: "#1B4965",
        accent4: "#7B2D8E",
        accent5: "#B07D10"
      };
      return ACCENT_COLORS[colorName] || colorName || "#B8432F";
    }

    function getGroupColor(group) {
      if (!group) return '#B8432F';
      
      const dataKey = activeTopicCode.replace('.', '');
      const baseTopic = DP_PLANNER_DATA[dataKey];
      if (baseTopic && baseTopic.groups) {
        const grp = baseTopic.groups.find(g => g.name === group);
        if (grp && grp.color) {
          return getColorValue(grp.color);
        }
      }

      const g = group.toLowerCase();
      if (g.includes("newton")) return '#B8432F'; // var(--accent) red-brown
      if (g.includes("free-body") || g.includes("fbd") || g.includes("diagram")) return '#1B4965'; // var(--accent3) navy
      if (g.includes("contact")) return '#2D6A4F'; // var(--accent2) forest green
      if (g.includes("field")) return '#B07D10'; // var(--accent5) gold
      if (g.includes("momentum") || g.includes("impulse")) return '#B8432F'; // var(--accent) red-brown
      if (g.includes("collision") || g.includes("explosion") || g.includes("circular")) return '#7B2D8E'; // var(--accent4) purple
      // A.3 groups
      if (g.includes("work") && g.includes("energy")) return '#B8432F'; // red-brown
      if (g.includes("mechanical")) return '#2D6A4F'; // forest green
      if (g.includes("power") || g.includes("efficiency") || g.includes("density")) return '#1B4965'; // navy
      return '#B8432F';
    }

    function parseEmbedUrl(url) {
      let embedUrl = url.trim();
      if (embedUrl.includes('youtube.com/watch')) {
        try {
          const u = new URL(embedUrl);
          const v = u.searchParams.get('v');
          if (v) embedUrl = `https://www.youtube.com/embed/${v}`;
        } catch(e) {}
      } else if (embedUrl.includes('youtu.be/')) {
        const parts = embedUrl.split('youtu.be/');
        if (parts[1]) {
          const id = parts[1].split('?')[0];
          embedUrl = `https://www.youtube.com/embed/${id}`;
        }
      } else if (embedUrl.includes('vimeo.com/') && !embedUrl.includes('player.vimeo.com')) {
        const parts = embedUrl.split('vimeo.com/');
        if (parts[1]) {
          const id = parts[1].split('?')[0];
          embedUrl = `https://player.vimeo.com/video/${id}`;
        }
      }
      return embedUrl;
    }

      if (confirm(`Reset this subtopic "${lesson.title}" to the original content? Your edits will be lost.`)) {
        const baseTopic = DP_PLANNER_DATA[activeTopicCode.replace('.', '')];
        let foundBase = false;
        if (baseTopic && baseTopic.groups) {
          baseTopic.groups.forEach((g, gIdx) => {
            if (g.subtopics) {
              g.subtopics.forEach(sub => {
                if ((activeTopicCode.replace('.', '') + "_G" + gIdx + "_S" + sub.num) === lesson.id) {
                  foundBase = true;
                }
              });
            }
          });
        }
        
        if (!foundBase) {
          alert("This is a custom-added lesson and cannot be reset to a default template. You can delete it using the bin button.");
          return;
        }

        const editsKey = `dp-planner-edits-${activeTopicCode.replace('.', '')}`;
        const editsData = localStorage.getItem(editsKey);
        if (editsData) {
          try {
            const edits = JSON.parse(editsData);

              delete edits.overrides[lesson.id];
              localStorage.setItem(editsKey, JSON.stringify(edits));
            }
          } catch(e) {}
        }
        
        const reloadedLessons = getLessonsForTopic(activeTopicCode);
        state.lessons = reloadedLessons;
        loadTopicEditor(activeTopicCode);

    // RENDER LESSON CARDS
    function renderLessonCards(lessons) {
      const container = document.getElementById('lessons-list');
      container.innerHTML = '';

      const dataKey = activeTopicCode.replace('.', '');
      const baseTopic = DP_PLANNER_DATA[dataKey];

      if (lessons.length === 0) {
        container.innerHTML = `
          <div style="padding: 40px 20px; text-align: center; color: var(--text3); border:1.5px dashed var(--border); border-radius:var(--r); background: var(--bg-deep); margin-bottom: 20px;">
            <p style="font-weight: 700; margin-bottom: 8px; color: var(--text2); font-size:15px;">This topic has no pre-populated content</p>
            <p style="font-size: 13px; margin-bottom: 16px;">Add content to <code>DP_PLANNER_DATA["${dataKey}"]</code> in <code>js/dp-planner-data.js</code>, or start planning manually by clicking the button below.</p>
            <button class="btn btn-accent" onclick="addLesson()">➕ Add Lesson</button>
          </div>
        `;
        return;
      }

      const groupSums = {};
      lessons.forEach(l => {
        if (l.group) {
          if (!groupSums[l.group]) {
            groupSums[l.group] = { time: 0, count: 0 };
          }
          groupSums[l.group].time += Number(l.plannedTime || 0);
          groupSums[l.group].count += 1;
        }
      });

      let lastGroup = "";

      if (collapsedGroups._initialized !== activeTopicCode) {
        collapsedGroups.clear();
        const uniqueGroups = [...new Set(lessons.map(l => l.group).filter(Boolean))];
        uniqueGroups.forEach(g => collapsedGroups.add(g));
        collapsedGroups._initialized = activeTopicCode;
        lessons.forEach(l => { l.collapsed = true; });
      }

      lessons.forEach((l, index) => {
        if (l.group && l.group !== lastGroup) {
          const groupColor = getGroupColor(l.group);
          const isGroupCollapsed = collapsedGroups.has(l.group);
          
          const groupHdr = document.createElement('div');
          groupHdr.className = `group-header ${isGroupCollapsed ? 'collapsed' : ''}`;
          groupHdr.setAttribute('data-group', l.group);
          groupHdr.onclick = () => toggleGroupCollapse(l.group);
          groupHdr.style.background = `${groupColor}10`;
          groupHdr.style.borderLeft = `4px solid ${groupColor}`;
          groupHdr.innerHTML = `
            <div class="group-header-left">
              <span class="group-chevron">▼</span>
              <span class="group-name" style="color:var(--text); font-weight:700;">${l.group}</span>
            </div>
            <div class="group-header-right">
              <span class="group-badge">${groupSums[l.group].count} subtopics</span>
              <span class="group-badge">${groupSums[l.group].time} min</span>
            </div>
          `;
          container.appendChild(groupHdr);
          lastGroup = l.group;
        }

        const isGroupHidden = l.group && collapsedGroups.has(l.group);
        const card = document.createElement('div');
        card.className = `lesson-card${l.collapsed ? ' collapsed' : ''}${isGroupHidden ? ' group-hidden' : ''}`;
        card.id = `lesson-card-${index}`;
        card.setAttribute('data-group', l.group || '');
        card.draggable = true;
        
        card.addEventListener('dragstart', (e) => handleDragStart(e, index));
        card.addEventListener('dragover', handleDragOver);
        card.addEventListener('drop', (e) => handleDrop(e, index));
        card.addEventListener('dragend', handleDragEnd);

        const parsed = parseStrategyChecklist(l.how + " " + l.engage);
        const checklistObj = l.checklist || {};
        let chkTotal = 0;
        let chkDone = 0;

        let checklistHTML = '';
        
        parsed.forEach(item => {
          chkTotal++;
          const checked = !!checklistObj[item];
          if (checked) chkDone++;
          checklistHTML += `
            <div class="checklist-item">
              <input type="checkbox" class="checklist-checkbox" id="chk-${index}-${chkTotal}" ${checked ? 'checked' : ''} onchange="toggleChecklistItem(${index}, '${item.replace(/'/g, "\\'")}', this.checked)" />
              <label for="chk-${index}-${chkTotal}" class="checklist-label ${checked ? 'checked' : ''}">${item}</label>
            </div>
          `;
        });

        STANDARD_CHECKLIST_ITEMS.forEach(item => {
          chkTotal++;
          const checked = !!checklistObj[item];
          if (checked) chkDone++;
          checklistHTML += `
            <div class="checklist-item">
              <input type="checkbox" class="checklist-checkbox" id="chk-${index}-${chkTotal}" ${checked ? 'checked' : ''} onchange="toggleChecklistItem(${index}, '${item.replace(/'/g, "\\'")}', this.checked)" />
              <label for="chk-${index}-${chkTotal}" class="checklist-label ${checked ? 'checked' : ''}"><em>${item}</em></label>
            </div>
          `;
        });

        const lessonRate = chkTotal > 0 ? Math.round((chkDone / chkTotal) * 100) : 0;
        const groupColor = getGroupColor(l.group || "");

        let status = l.status || "planned";
        if (!l.status) {
          if (chkDone === chkTotal && chkTotal > 0) status = "completed";
          else if (chkDone > 0 || l.actualHours > 0) status = "in-progress";
        }
        let dotColor = "#718096";
        if (status === "planned") dotColor = "#3182ce";
        else if (status === "in-progress") dotColor = "#dd6b20";
        else if (status === "completed") dotColor = "#38a169";
        else if (status === "skipped") dotColor = "#e53e3e";

        let hookTitle = "";
        let hookContent = "";
        if (l.engagementHook) {
          hookTitle = l.engagementHook.title || "";
          hookContent = l.engagementHook.content || "";
        } else {
          const match = (l.engage || "").match(/<strong>(.*?)<\/strong>\s*(?:&mdash;|—|-)?\s*(.*)/i);
          if (match) {
            hookTitle = match[1];
            hookContent = match[2].replace(/<\/p>$/, '').trim();
          } else {
            hookContent = l.engage || "";
          }
        }

        let aoList = [];
        if (Array.isArray(l.ao)) {

    // LESSON ACTIONS
    function addLesson() {
      const state = plannerState[activeTopicCode];
      const newLesson = Object.assign({}, DEFAULT_LESSON_TEMPLATE, {
        id: "l_" + Date.now(),
        title: `Lesson ${state.lessons.length + 1}: New Block`
      });
      state.lessons.push(newLesson);
      saveTopicState(activeTopicCode);
      loadTopicEditor(activeTopicCode);
    }

    function deleteLesson(index) {
      if (confirm("Are you sure you want to delete this lesson card? This action cannot be undone.")) {
        const state = plannerState[activeTopicCode];
        state.lessons.splice(index, 1);
        saveTopicState(activeTopicCode);
        loadTopicEditor(activeTopicCode);
      }
    }

    function toggleCollapseLesson(index) {
      const state = plannerState[activeTopicCode];
      state.lessons[index].collapsed = !state.lessons[index].collapsed;
      
      const card = document.getElementById(`lesson-card-${index}`);
      if (card) {
        card.classList.toggle('collapsed');
      }
      saveTopicState(activeTopicCode);
    }

    // GROUP-LEVEL COLLAPSE: Toggle all cards in a group
    function toggleGroupCollapse(groupName) {
      if (collapsedGroups.has(groupName)) {
        collapsedGroups.delete(groupName);
      } else {
        collapsedGroups.add(groupName);
      }
      
      // Update the group header visually
      const allGroupHeaders = document.querySelectorAll('.group-header');
      allGroupHeaders.forEach(hdr => {
        if (hdr.getAttribute('data-group') === groupName) {
          hdr.classList.toggle('collapsed', collapsedGroups.has(groupName));
        }
      });
      
      // Show/hide all cards belonging to this group
      const allCards = document.querySelectorAll('.lesson-card');
      allCards.forEach(card => {
        if (card.getAttribute('data-group') === groupName) {
          card.classList.toggle('group-hidden', collapsedGroups.has(groupName));
        }
      });
    }

    // EXPAND ALL: Open all groups and all card bodies
    function expandAllLessons() {
      const state = plannerState[activeTopicCode];
      collapsedGroups.clear();
      state.lessons.forEach(l => { l.collapsed = false; });
      saveTopicState(activeTopicCode);
      renderLessonCards(state.lessons);
    }

    // COLLAPSE ALL: Close all groups (hides cards) and collapse all card bodies
    function collapseAllLessons() {
      const state = plannerState[activeTopicCode];
      const uniqueGroups = [...new Set(state.lessons.map(l => l.group).filter(Boolean))];
      uniqueGroups.forEach(g => collapsedGroups.add(g));
      state.lessons.forEach(l => { l.collapsed = true; });
      saveTopicState(activeTopicCode);
      renderLessonCards(state.lessons);
    }

    // SEARCH/FILTER SUBTOPICS by keyword
    function filterSubtopics(query) {
      const q = query.trim().toLowerCase();
      const allCards = document.querySelectorAll('.lesson-card');
      const allGroupHeaders = document.querySelectorAll('.group-header');
      const visibleGroups = new Set();
      
      allCards.forEach(card => {
        if (!q) {
          card.classList.remove('search-hidden');
          visibleGroups.add(card.getAttribute('data-group'));
          return;
        }
        const text = card.textContent.toLowerCase();
        if (text.includes(q)) {
          card.classList.remove('search-hidden');
          card.classList.remove('group-hidden'); // show matching cards even if group is collapsed
          visibleGroups.add(card.getAttribute('data-group'));
        } else {
          card.classList.add('search-hidden');
        }
      });
      
      allGroupHeaders.forEach(hdr => {
        const grp = hdr.getAttribute('data-group');
        if (!q) {
          hdr.classList.remove('search-hidden');
        } else if (visibleGroups.has(grp)) {
          hdr.classList.remove('search-hidden');
        } else {
          hdr.classList.add('search-hidden');
        }
      });
    }

    function updateLessonField(index, field, value) {
      const state = plannerState[activeTopicCode];
      let cleanVal = value;
      if (field === 'plannedTime' || field === 'actualHours') {
        cleanVal = Number(value);
      }
      state.lessons[index][field] = cleanVal;
      saveTopicState(activeTopicCode);
      
      // Update totals in header silently
      updateHeaderTotals();
    }

    function updateTopicNotes(val) {
      const state = plannerState[activeTopicCode];
      state.notes = val;
      saveTopicState(activeTopicCode);
    }

    function updateHeaderTotals() {
      const topic = DP_TOPICS.find(t => t.code === activeTopicCode);
      const state = plannerState[activeTopicCode];
      if (!topic || !state) return;

      const dataKey = activeTopicCode.replace('.', '');
      const baseTopic = DP_PLANNER_DATA[dataKey] || {};

      const recommendedHours = baseTopic.recommendedHours || topic.hours || 0;
      const recommendedMinutes = baseTopic.recommendedMinutes || (recommendedHours * 60);

      // Count all subtopics across all groups in the topic data
      let subtopicsCount = 0;
      if (baseTopic && baseTopic.groups) {
        baseTopic.groups.forEach(g => {
          if (g.subtopics) {
            subtopicsCount += g.subtopics.length;
          }
        });
      }
      // If there are no groups in baseTopic, default to state.lessons.length
      if (subtopicsCount === 0) {
        subtopicsCount = state.lessons.length;
      }

      let totalPlannedMinutes = 0;
      let totalActualHours = 0;
      let totalChecklistItems = 0;
      let totalCompletedItems = 0;
      let totalLabsDemos = 0;

      state.lessons.forEach(l => {
        totalPlannedMinutes += Number(l.plannedTime || 0);
        totalActualHours += Number(l.actualHours || 0);
        
        let isLabOrDemo = false;
        if (l.lab || l.demo) {
          isLabOrDemo = true;
        } else {
          const text = (l.how + " " + l.engage + " " + (l.engagementHook ? (l.engagementHook.title + " " + l.engagementHook.content) : "") + " " + (l.title || "")).toLowerCase();
          const hasLab = /\blabs?\b/.test(text) || /\blaboratory\b/.test(text) || /\blab\s/.test(text);
          const hasDemo = /\bdemos?\b/.test(text) || /\bdemonstrat/.test(text);
          if (hasLab || hasDemo) {
            isLabOrDemo = true;
          }
        }
        if (isLabOrDemo) totalLabsDemos++;
        
        const parsed = parseStrategyChecklist(l.how + " " + l.engage);
        const chk = l.checklist || {};
        parsed.forEach(item => {
          totalChecklistItems++;
          if (chk[item]) totalCompletedItems++;
        });
        STANDARD_CHECKLIST_ITEMS.forEach(item => {
          totalChecklistItems++;
          if (chk[item]) totalCompletedItems++;
        });
      });

      const completionRate = totalChecklistItems > 0 ? Math.round((totalCompletedItems / totalChecklistItems) * 100) : 0;
      
      const statsContainer = document.getElementById('topic-stats-row');
      if (statsContainer) {
        statsContainer.className = "stats-row";
        statsContainer.style.display = "grid";
        statsContainer.style.gridTemplateColumns = "repeat(5, 1fr)";
        statsContainer.style.gap = "16px";
        statsContainer.style.marginBottom = "20px";
        statsContainer.innerHTML = `
          <div class="stat-box">
            <div class="stat-label">Recommended Hours</div>
            <div class="stat-val">${recommendedHours}h (${recommendedMinutes} min)</div>
          </div>
          <div class="stat-box">
            <div class="stat-label">Subtopics</div>
            <div class="stat-val">${subtopicsCount}</div>
          </div>
          <div class="stat-box">
            <div class="stat-label">Labs / Demos</div>
            <div class="stat-val">${totalLabsDemos}</div>
          </div>
          <div class="stat-box" style="grid-column: span 2;">
            <div class="stat-label">Checklist Completion</div>
            <div class="progress-bar-container" style="background:var(--bg-deep); height:10px; border-radius:5px; overflow:hidden; margin-top:8px; position:relative;">
              <div class="progress-bar-fill" style="width:${completionRate}%; background:linear-gradient(90deg, var(--accent), var(--teal), #38a169); height:100%; transition:width 0.5s cubic-bezier(0.4,0,0.2,1); border-radius:5px; position:relative; overflow:hidden;">
                <div style="position:absolute; top:0; left:-100%; width:100%; height:100%; background:linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent); animation: shimmer 2.5s ease-in-out infinite;"></div>
              </div>
            </div>
            <div style="font-size:11px; margin-top:4px; color:var(--text3); display:flex; justify-content:space-between; font-family:var(--font-mono);">
              <span>${completionRate}%</span>
              <span>${totalCompletedItems} / ${totalChecklistItems} done</span>
            </div>
          </div>
        `;
      }
    }

    // CHECKLIST ACTIONS
    function toggleChecklistItem(lessonIndex, itemText, checked) {
      const state = plannerState[activeTopicCode];
      if (!state.lessons[lessonIndex].checklist) {
        state.lessons[lessonIndex].checklist = {};
      }
      state.lessons[lessonIndex].checklist[itemText] = checked;
      saveTopicState(activeTopicCode);
      
      // Re-style labels
      updateHeaderTotals();
      
      // Update label cross style inside the card
      renderSidebar(); // refresh status dot in sidebar
    }

    function triggerChecklistReload(lessonIndex) {
      const state = plannerState[activeTopicCode];
      const lesson = state.lessons[lessonIndex];
      const parsed = parseStrategyChecklist(lesson.how + " " + lesson.engage);
      
      const container = document.getElementById(`checklist-container-${lessonIndex}`);
      if (!container) return;

      const checklistObj = lesson.checklist || {};
      let chkTotal = 0;
      let chkDone = 0;
      let checklistHTML = '';

      // 1. Parsed items
      parsed.forEach(item => {
        chkTotal++;
        const checked = !!checklistObj[item];
        if (checked) chkDone++;
        checklistHTML += `
          <div class="checklist-item">
            <input type="checkbox" class="checklist-checkbox" id="chk-${lessonIndex}-${chkTotal}" ${checked ? 'checked' : ''} onchange="toggleChecklistItem(${lessonIndex}, '${item.replace(/'/g, "\\'")}', this.checked)" />
            <label for="chk-${lessonIndex}-${chkTotal}" class="checklist-label ${checked ? 'checked' : ''}">${item}</label>
          </div>
        `;
      });

      // 2. Standard items
      STANDARD_CHECKLIST_ITEMS.forEach(item => {
        chkTotal++;
        const checked = !!checklistObj[item];
        if (checked) chkDone++;
        checklistHTML += `
          <div class="checklist-item">
            <input type="checkbox" class="checklist-checkbox" id="chk-${lessonIndex}-${chkTotal}" ${checked ? 'checked' : ''} onchange="toggleChecklistItem(${lessonIndex}, '${item.replace(/'/g, "\\'")}', this.checked)" />
            <label for="chk-${lessonIndex}-${chkTotal}" class="checklist-label ${checked ? 'checked' : ''}"><em>${item}</em></label>
          </div>
        `;
      });

      container.innerHTML = checklistHTML;
      updateHeaderTotals();
    }

    // DRAG AND DROP REORDERING
    function handleDragStart(e, index) {
      draggedCard = index;
      e.target.classList.add('dragging');
    }

    function handleDragOver(e) {
      e.preventDefault();
    }

    function handleDrop(e, index) {
      e.preventDefault();
      if (draggedCard === null || draggedCard === index) return;

      const state = plannerState[activeTopicCode];
      const item = state.lessons.splice(draggedCard, 1)[0];
      state.lessons.splice(index, 0, item);
      
      saveTopicState(activeTopicCode);
      loadTopicEditor(activeTopicCode);
    }

    function handleDragEnd(e) {
      e.target.classList.remove('dragging');
      draggedCard = null;
    }

    function moveLesson(index, direction) {
      const state = plannerState[activeTopicCode];
      const targetIndex = index + direction;
      if (targetIndex < 0 || targetIndex >= state.lessons.length) return;

      const item = state.lessons.splice(index, 1)[0];
      state.lessons.splice(targetIndex, 0, item);

      saveTopicState(activeTopicCode);
      loadTopicEditor(activeTopicCode);
    }

    // PRINT HELPER
    function triggerPrint() {
      // Expand all groups and cards before printing so everything is visible
      const state = plannerState[activeTopicCode];
      const prevCollapsedGroups = new Set(collapsedGroups);
      const prevCollapsedStates = state.lessons.map(l => l.collapsed);
      
      // Expand everything
      collapsedGroups.clear();
      state.lessons.forEach(l => { l.collapsed = false; });
      renderLessonCards(state.lessons);
      
      // Print after a brief delay to allow DOM to render
      setTimeout(() => {
        window.print();
        
        // Restore collapsed state after printing
        prevCollapsedGroups.forEach(g => collapsedGroups.add(g));
        state.lessons.forEach((l, i) => { l.collapsed = prevCollapsedStates[i]; });
        renderLessonCards(state.lessons);
      }, 200);
    }

      const downloadAnchor = document.createElement('a');
      downloadAnchor.setAttribute("href", dataStr);
      downloadAnchor.setAttribute("download", `physicism-dp-teacher-planner-backup.json`);
      document.body.appendChild(downloadAnchor);
      downloadAnchor.click();
      downloadAnchor.remove();
    }

    function importTopicState(e) {
      const fileReader = new FileReader();
      fileReader.onload = function(event) {
        try {
          const imported = JSON.parse(event.target.result);
          
          if (confirm("This will overwrite your existing planner data. Are you sure you want to proceed?")) {
            Object.keys(imported).forEach(code => {
              if (imported[code] && Array.isArray(imported[code].lessons)) {
                plannerState[code] = imported[code];
                saveTopicState(code);
              }
            });
            alert("Backup imported successfully!");
            window.location.reload();
          }
        } catch(err) {
          alert("Error parsing JSON backup file. Please make sure the file is a valid backup.");
        }
      };
      if (e.target.files[0]) {
        fileReader.readAsText(e.target.files[0]);
      }
    }

    function renderATLBadgesHTML(viewedCount, quizCount, examCount, ctPerf) {
      const perf = ctPerf || {};
      const totalAct = viewedCount + quizCount + examCount;

      // Thinking Calculation
      let thinkingCount = viewedCount;
      let thinkingScoreTotal = 0;
      let thinkingTerms = ["Calculate", "Analyse", "Determine", "Deduce", "Predict"];
      thinkingTerms.forEach(t => {
        if (perf[t]) {
          thinkingCount += perf[t].attempted;
          thinkingScoreTotal += (perf[t].correct / perf[t].attempted);
        }
      });
      const thinkingPct = thinkingTerms.some(t => perf[t]) ? Math.round((thinkingScoreTotal / thinkingTerms.filter(t => perf[t]).length) * 100) : 0;
      let thinkingLevel = "Developing";
      if (thinkingCount >= 8 && thinkingPct >= 75) thinkingLevel = "Mastered";
      else if (thinkingCount >= 4) thinkingLevel = "Proficient";

      // Communication Calculation
      let commCount = 0;
      let commScoreTotal = 0;
      let commTerms = ["Describe", "Explain", "Discuss", "Draw", "Sketch", "Outline"];
      commTerms.forEach(t => {
        if (perf[t]) {
          commCount += perf[t].attempted;
          commScoreTotal += (perf[t].correct / perf[t].attempted);
        }
      });
      const commPct = commTerms.some(t => perf[t]) ? Math.round((commScoreTotal / commTerms.filter(t => perf[t]).length) * 100) : 0;
      let commLevel = "Developing";
      if (commCount >= 8 && commPct >= 75) commLevel = "Mastered";
      else if (commCount >= 4) commLevel = "Proficient";

      // Self-Management
      let selfLevel = "Developing";
      if (totalAct >= 15) selfLevel = "Mastered";
      else if (totalAct >= 5) selfLevel = "Proficient";

      return `
        <div style="display:flex; flex-wrap:wrap; gap:10px; font-size:11.5px;">
          <div style="background:var(--bg-deep); padding:6px 12px; border-radius:6px;">🧠 Thinking: <strong>${thinkingLevel}</strong> (${thinkingCount} items)</div>
          <div style="background:var(--bg-deep); padding:6px 12px; border-radius:6px;">💬 Communication: <strong>${commLevel}</strong> (${commCount} items)</div>
          <div style="background:var(--bg-deep); padding:6px 12px; border-radius:6px;">📅 Self-Mgmt: <strong>${selfLevel}</strong> (${totalAct} done)</div>
        </div>
      `;
    }

    function renderMasteryMatrixHTML(lessons, quizzes, attempts) {
      return DP_TOPICS.map(topic => {
        const cleanCode = topic.code.replace('.', '');
        
        let completedLessons = 0;
        for (let i = 1; i <= 4; i++) {
          if (lessons[`${cleanCode}-lesson${i}`]?.viewed) {
            completedLessons++;
          }
        }

        const qKey = `${cleanCode}-quiz-paper1a`;
        const quizScoreStr = quizzes[qKey] ? `${Math.round((quizzes[qKey].score / quizzes[qKey].total) * 100)}%` : '--';
        
        const topicAttempts = attempts.filter(att => att.topic && att.topic.toUpperCase().replace('.', '') === cleanCode);
        const examScoreStr = topicAttempts.length > 0 ? `${Math.round(topicAttempts.reduce((s, a) => s + (a.percentScore || 0), 0) / topicAttempts.length)}%` : '--';

        // Mastery Dot
        let masteryDot = "⚪";
        let scoreTotal = 0, scoreCount = 0;
        if (quizzes[qKey]) { scoreTotal += (quizzes[qKey].score / quizzes[qKey].total) * 100; scoreCount++; }
        if (topicAttempts.length > 0) { scoreTotal += topicAttempts.reduce((s, a) => s + (a.percentScore || 0), 0) / topicAttempts.length; scoreCount++; }
        const avgScore = scoreCount > 0 ? (scoreTotal / scoreCount) : null;

        if (completedLessons === 0) masteryDot = "⚪";
        else if ((avgScore !== null && avgScore < 50) || completedLessons < 2) masteryDot = "🔴";
        else if (completedLessons === 4 && avgScore !== null && avgScore >= 70) masteryDot = "🟢";
        else masteryDot = "🟡";

        return `
          <tr>
            <td><strong>${topic.code}</strong> ${topic.title}</td>
            <td>${completedLessons} / 4</td>
            <td>${quizScoreStr}</td>
            <td>${examScoreStr}</td>
            <td>${masteryDot}</td>
          </tr>
        `;
      }).join('');
    }

    // RUN AUTH CHECKS ON LOAD
    window.onload = checkAuth;
  </script>
</body>
