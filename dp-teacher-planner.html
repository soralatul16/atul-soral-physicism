<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DP Physics Teacher Planner & Analytics | Atul Soral Physicism</title>
  <style>
    :root {
      --bg: #FAF7F2;
      --bg-deep: #F2EFE9;
      --surface: rgba(255, 255, 255, 0.85);
      --surface-hover: rgba(255, 255, 255, 0.98);
      --white: #ffffff;
      --text: #2C2825;
      --text2: #5A5450;
      --text3: #8A8279;
      --border: rgba(44, 40, 37, 0.08);
      --accent: #C84B31;
      --accent-light: #FDF4E1;
      --shadow-sm: 0 2px 8px rgba(44, 40, 37, 0.04);
      --shadow-md: 0 8px 24px rgba(44, 40, 37, 0.06);
      --r: 12px;
      --r-lg: 16px;
      --font-display: Georgia, 'Times New Roman', serif;
      --font-body: -apple-system, 'Segoe UI', system-ui, sans-serif;
      --font-mono: 'SF Mono', 'Cascadia Code', monospace;
      
      --red: #C84B31;
      --teal: #2D6A4F;
      --blue: #1B4965;
      --purple: #7B2D8E;
      --amber: #B07D10;
      --green: #2D6A4F;
    }

    [data-theme="dark"] {
      --bg: #0f1119;
      --bg-deep: #141620;
      --surface: rgba(30, 32, 45, 0.85);
      --surface-hover: rgba(30, 32, 45, 0.98);
      --white: #1e2030;
      --text: #e0ddd5;
      --text2: #a0a0b0;
      --text3: #6a6a7a;
      --border: rgba(255, 255, 255, 0.08);
      --accent: #e05040;
      --accent-light: #2c2520;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: var(--font-body);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      font-size: 13.5px;
      line-height: 1.5;
    }

    /* AUTH GATE STYLE */
    #auth-gate-container {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: var(--bg-deep);
      padding: 20px;
    }
    .auth-card {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: var(--r-lg);
      padding: 40px 32px;
      max-width: 400px;
      width: 100%;
      box-shadow: var(--shadow-md);
      text-align: center;
    }
    .auth-icon { font-size: 44px; margin-bottom: 16px; }
    .auth-card h2 {
      font-family: var(--font-display);
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 8px;
    }
    .auth-card p {
      font-size: 12.5px;
      color: var(--text3);
      margin-bottom: 24px;
    }
    .auth-input {
      width: 100%;
      padding: 12px 16px;
      border: 1px solid var(--border);
      border-radius: var(--r);
      font-family: var(--font-mono);
      outline: none;
      background: var(--bg-deep);
      color: var(--text);
      font-size: 14px;
      margin-bottom: 8px;
      text-align: center;
    }
    .auth-input:focus { border-color: var(--accent); }
    .auth-btn {
      width: 100%;
      padding: 12px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: var(--r);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .auth-btn:hover { opacity: 0.9; }
    .auth-error {
      color: var(--red);
      font-size: 11.5px;
      font-weight: 600;
      margin-bottom: 16px;
    }

    /* HEADER */
    header {
      background: var(--white);
      border-bottom: 1px solid var(--border);
      padding: 12px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .logo-container {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .logo-dot {
      width: 10px;
      height: 10px;
      background: var(--accent);
      border-radius: 50%;
      box-shadow: 0 0 8px var(--accent);
    }
    .logo-text {
      font-family: var(--font-display);
      font-size: 18px;
      font-weight: 700;
    }
    .logo-text span { color: var(--accent); }
    
    .nav-tabs {
      display: flex;
      gap: 4px;
    }
    .tab-btn {
      padding: 8px 16px;
      border: none;
      background: none;
      font-size: 13px;
      font-weight: 600;
      color: var(--text2);
      border-radius: 50px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .tab-btn:hover { background: var(--bg-deep); color: var(--text); }
    .tab-btn.active { background: var(--accent-light); color: var(--accent); }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .header-btn {
      padding: 6px 12px;
      border-radius: 50px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text2);
      cursor: pointer;
      font-size: 12.5px;
      font-weight: 600;
      transition: all 0.2s;
    }
    .header-btn:hover { background: var(--bg-deep); color: var(--text); }

    /* LAYOUTS */
    .layout-planner {
      flex: 1;
      display: flex;
      overflow: hidden;
    }

    /* SIDEBAR */
    .sidebar {
      width: 280px;
      background: var(--white);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      flex-shrink: 0;
    }
    .sidebar-title {
      padding: 16px 20px 8px;
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 14.5px;
      color: var(--text);
    }
    .theme-accordion {
      margin-bottom: 4px;
    }
    .theme-accordion-header {
      padding: 10px 20px;
      background: var(--bg-deep);
      font-weight: 700;
      font-size: 11.5px;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: var(--text3);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: space-between;
      user-select: none;
      transition: background 0.2s;
    }
    .theme-accordion-header:hover { background: rgba(0,0,0,0.02); }
    .theme-accordion-content {
      display: none;
    }
    .theme-accordion.open .theme-accordion-content {
      display: block;
    }
    .topic-link {
      padding: 10px 20px 10px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      transition: all 0.2s;
      border-bottom: 1px solid rgba(44,40,37,0.03);
    }
    .topic-link:hover { background: var(--bg-deep); }
    .topic-link.active { background: var(--accent-light); border-left: 3px solid var(--accent); padding-left: 29px; }
    .topic-info-side {
      display: flex;
      flex-direction: column;
      gap: 2px;
      min-width: 0;
    }
    .topic-code-side {
      font-family: var(--font-mono);
      font-size: 10.5px;
      font-weight: 700;
      color: var(--accent);
    }
    .topic-name-side {
      font-size: 12.5px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .topic-status-side {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
      margin-left: 8px;
    }

    /* EDITOR PANE */
    .editor-pane {
      flex: 1;
      padding: 24px;
      overflow-y: auto;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
    
    .editor-header {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: var(--r-lg);
      padding: 20px;
      box-shadow: var(--shadow-sm);
    }
    .editor-header-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 16px;
    }
    .topic-title-area {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .topic-code-badge {
      font-family: var(--font-mono);
      font-size: 11px;
      font-weight: 700;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }
    .topic-name-header {
      font-family: var(--font-display);
      font-size: 20px;
      font-weight: 700;
    }
    
    .stats-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
      gap: 12px;
    }
    .stat-box {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 18px;
      box-shadow: var(--shadow-sm);
      display: flex;
      flex-direction: column;
      justify-content: center;
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .stat-box:hover {
      box-shadow: var(--shadow-md);
      transform: translateY(-2px);
      border-color: var(--accent);
    }
    .stat-label {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text3);
      margin-bottom: 6px;
    }
    .stat-val {
      font-size: 18px;
      font-weight: 700;
      font-family: var(--font-mono);
      color: var(--text);
    }
    .stat-val.warning { color: var(--amber); }
    .stat-val.critical { color: var(--red); }
    .stat-val.success { color: var(--teal); }

    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
    }
    .toolbar-left, .toolbar-right {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .btn {
      padding: 8px 16px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--white);
      color: var(--text2);
      font-size: 12.5px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .btn:hover { background: var(--bg-deep); color: var(--text); }
    .btn-accent {
      background: var(--accent);
      color: white;
      border: none;
    }
    .btn-accent:hover { opacity: 0.9; color: white; }
    .btn-danger {
      color: var(--red);
    }
    .btn-danger:hover { background: #FDE8E6; color: var(--red); }
    
    /* LESSON CARDS */
    .lessons-list {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .lesson-card {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: var(--r);
      box-shadow: var(--shadow-sm);
      overflow: hidden;
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .lesson-card:hover {
      box-shadow: 0 6px 16px rgba(0,0,0,0.06);
      transform: translateY(-2px);
    }
    .lesson-card.dragging { opacity: 0.4; border-style: dashed; }
    
    .lesson-header {
      padding: 14px 20px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
      cursor: pointer;
      user-select: none;
      transition: background 0.2s ease;
    }
    .lesson-header:hover {
      background: var(--bg-deep);
    }
    .lesson-drag-handle {
      cursor: grab;
      font-size: 16px;
      color: var(--text3);
    }
    .lesson-drag-handle:active { cursor: grabbing; }
    .lesson-chevron {
      font-size: 10px;
      color: var(--text3);
      transition: transform 0.25s ease;
    }
    .lesson-card.collapsed .lesson-chevron {
      transform: rotate(-90deg);
    }
    .lesson-title-input {
      font-size: 14px;
      font-weight: 700;
      flex: 1;
      border: 1px solid transparent;
      outline: none;
      padding: 2px 6px;
      border-radius: 4px;
    }
    .lesson-title-input:focus {
      background: var(--bg-deep);
      border-color: var(--border);
    }
    
    .lesson-meta-header {
      display: flex;
      align-items: center;
      gap: 16px;
      font-size: 12px;
    }
    .lesson-duration-box {
      display: flex;
      align-items: center;
      gap: 6px;
      color: var(--text2);
    }
    .lesson-duration-box input {
      width: 44px;
      padding: 2px 4px;
      border: 1px solid var(--border);
      border-radius: 4px;
      text-align: center;
      background: var(--bg-deep);
      color: var(--text);
      font-family: var(--font-mono);
      font-weight: 700;
      outline: none;
    }
    
    .lesson-body {
      padding: 20px;
      display: grid;
      grid-template-columns: 1.5fr 1fr;
      gap: 20px;
      border-top: 1px solid transparent;
    }
    .lesson-card.collapsed .lesson-body {
      display: none;
    }
    
    .lesson-col {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .lesson-field {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .field-label {
      font-size: 10.5px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text3);
    }
    .editable-box {
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 14px;
      min-height: 48px;
      font-size: 13px;
      outline: none;
      background: var(--bg-deep);
      color: var(--text);
      white-space: pre-wrap;
    }
    .editable-box:focus {
      background: var(--white);
      border-color: var(--accent);
      box-shadow: 0 0 0 2px var(--accent-light);
    }
    
    .checklist-container {
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--bg-deep);
      padding: 12px;
      max-height: 240px;
      overflow-y: auto;
    }
    .checklist-item {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      padding: 6px 0;
      border-bottom: 1px solid rgba(44,40,37,0.03);
      font-size: 12px;
    }
    .checklist-item:last-child { border-bottom: none; }
    .checklist-checkbox {
      margin-top: 3px;
      width: 14px;
      height: 14px;
      cursor: pointer;
    }
    .checklist-label {
      cursor: pointer;
      color: var(--text2);
      line-height: 1.4;
    }
    .checklist-label.checked {
      text-decoration: line-through;
      color: var(--text3);
      opacity: 0.65;
    }

    .actual-hours-input {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .actual-hours-input input {
      width: 60px;
      padding: 6px 8px;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-family: var(--font-mono);
      font-weight: 700;
      outline: none;
      background: var(--bg-deep);
      color: var(--text);
    }
    .actual-hours-input input:focus { border-color: var(--accent); background: var(--white); }

    .lesson-reorder-controls {
      display: flex;
      gap: 4px;
      margin-left: 8px;
    }
    .reorder-btn {
      width: 22px;
      height: 22px;
      border: 1px solid var(--border);
      background: var(--white);
      color: var(--text2);
      border-radius: 4px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      transition: all 0.15s;
    }
    .reorder-btn:hover { background: var(--bg-deep); color: var(--text); }

    /* OVERVIEW TAB STYLE */
    .overview-pane {
      flex: 1;
      padding: 24px;
      overflow-y: auto;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
    .overview-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
    }
    .overview-card {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 16px;
      box-shadow: var(--shadow-sm);
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      gap: 12px;
    }
    .overview-card:hover {
      box-shadow: var(--shadow-md);
      transform: translateY(-2px);
      border-color: var(--accent);
    }
    .oc-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
    }
    .oc-code {
      font-family: var(--font-mono);
      font-size: 11px;
      font-weight: 700;
      color: var(--accent);
    }
    .oc-status {
      font-size: 10px;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 12px;
      text-transform: uppercase;
    }
    .status-not-started { background: var(--bg-deep); color: var(--text3); }
    .status-in-progress { background: var(--accent-light); color: var(--amber); }
    .status-completed { background: #E8F5E8; color: var(--teal); }

    .oc-name {
      font-family: var(--font-display);
      font-size: 15px;
      font-weight: 700;
      color: var(--text);
    }
    .oc-stats {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      color: var(--text3);
      border-top: 1px solid rgba(44,40,37,0.04);
      padding-top: 10px;
    }
    .oc-stat-item {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .oc-stat-val {
      font-family: var(--font-mono);
      font-size: 12px;
      font-weight: 700;
      color: var(--text);
    }

    /* ANALYTICS TAB STYLE */
    .analytics-pane {
      flex: 1;
      display: flex;
      overflow: hidden;
    }
    .students-sidebar {
      width: 280px;
      background: var(--white);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      flex-shrink: 0;
    }
    .students-list-container {
      padding: 10px 0;
    }
    .student-item {
      padding: 12px 20px;
      cursor: pointer;
      transition: all 0.2s;
      border-bottom: 1px solid rgba(44,40,37,0.03);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .student-item:hover { background: var(--bg-deep); }
    .student-item.active { background: var(--accent-light); border-left: 3px solid var(--accent); padding-left: 17px; }
    .student-info {
      min-width: 0;
    }
    .student-name {
      font-size: 13px;
      font-weight: 700;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .student-email {
      font-size: 11px;
      color: var(--text3);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .student-pct {
      font-family: var(--font-mono);
      font-size: 12px;
      font-weight: 700;
      color: var(--accent);
    }

    .analytics-content {
      flex: 1;
      padding: 24px;
      overflow-y: auto;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
    .analytics-section-title {
      font-family: var(--font-display);
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 8px;
    }
    .ao-average-card {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: var(--r-lg);
      padding: 20px;
      box-shadow: var(--shadow-sm);
    }
    .ao-row {
      margin-bottom: 14px;
    }
    .ao-row:last-child { margin-bottom: 0; }
    .ao-info-row {
      display: flex;
      justify-content: space-between;
      font-size: 12.5px;
      font-weight: 600;
      margin-bottom: 4px;
    }
    .ao-bar-bg {
      height: 10px;
      background: var(--bg-deep);
      border-radius: 5px;
      overflow: hidden;
    }
    .ao-bar-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 5px;
      width: 0;
      transition: width 0.6s ease-out;
    }
    .ao-tip {
      margin-top: 12px;
      background: var(--bg-deep);
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 11.5px;
      color: var(--text2);
    }

    /* DRILL DOWN MODAL */
    .drilldown-modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.4);
      z-index: 1000;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 24px;
      backdrop-filter: blur(4px);
    }
    .drilldown-modal-content {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--r-lg);
      width: 100%;
      max-width: 1100px;
      height: 90vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: var(--shadow-lg);
    }
    .drilldown-modal-header {
      background: var(--white);
      border-bottom: 1px solid var(--border);
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .drilldown-modal-title {
      font-family: var(--font-display);
      font-size: 18px;
      font-weight: 700;
    }
    .drilldown-modal-body {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
    }
    .close-modal-btn {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: var(--bg-deep);

    "plannedTime": 35,
    "understandings": "<ul><li>Represent all forces acting on a single body using a free-body diagram</li><li>Forces labelled using accepted names/symbols: F_N, F_f, F_g, T, etc.</li><li>FBDs for 1D and 2D situations only (per IB guidance)</li></ul>",
    "how": "<p><strong>Opener (5 min):</strong> Show a photo of a rock climber on a cliff face. \"What forces act on her? How is she in equilibrium?\" Students sketch rough FBDs in notebooks — no instruction yet, just intuition.</p><p><strong>Step-by-step modelling (10 min):</strong> Teach the 5-step FBD process: (1) Isolate the body, (2) Draw it as a dot, (3) Identify every contact and field force, (4) Draw force arrows FROM the dot, to scale, (5) Label each force with its accepted symbol. Model with 3 examples of increasing difficulty: object on horizontal surface → object on inclined plane → object suspended by two ropes at angles.</p><p><strong>Guided practice (15 min):</strong> Students work through 6 graded problems in pairs. Circulate actively — the most common errors at this stage are: missing forces (forgetting normal force), drawing forces ON the surface instead of on the body, and mislabelling.</p><p><strong>Peer assessment (5 min):</strong> Pairs swap their inclined plane FBD. Partners check against a rubric: Are all forces present? Are labels correct using accepted symbols? Are arrows roughly to scale?</p>",
    "engage": "<p>ROCK CLIMBER FBD — Show the photo first, let students attempt the FBD, THEN teach the method, THEN have them redo it. Comparing their before/after builds metacognitive awareness of what they've learned.</p>",
    "nos": "Models — FBDs are a model that strips away irrelevant detail to focus on the physics. Discuss: \"Why do we draw the object as a dot? When does the point-particle assumption break down?\" (Answer: when rotation matters — link to A.4.)",
    "atl": "Communication skills, Thinking skills",
    "lp": "Communicator, Thinker",
    "ao": "AO1 — Draw and label FBDs correctly; AO2 — Identify all forces on a body",

    "formative": "Peer-assessed FBD with rubric. The rubric itself is a teaching tool — students internalise what a good FBD looks like.",

    "understandings": "<ul><li>Finding resultant force by vector addition in 1D and 2D</li><li>Resolving forces into components using trigonometry</li><li>Solving equilibrium problems using simultaneous equations (per IB guidance)</li></ul>",
    "how": "<p><strong>Review (5 min):</strong> Quick recap of FBDs. Show a 2D FBD and ask: \"How do we find the net force when forces point in different directions?\"</p><p><strong>Direct instruction (15 min):</strong> Teach force resolution into components (F_x = F·cosθ, F_y = F·sinθ). Work through: (a) forces on an inclined plane — resolve weight into components parallel and perpendicular to the surface, show F_N = mg·cosθ; (b) two ropes supporting a sign at different angles — set up simultaneous equations T₁·sinα = T₂·sinβ and T₁·cosα + T₂·cosβ = mg.</p><p><strong>Guided practice (15 min):</strong> Students work through 4 problems in pairs, escalating from basic component resolution to simultaneous equation problems. Provide worked solutions for self-checking after each problem.</p><p><strong>Extension challenge (10 min):</strong> \"A 50 kg lamp hangs from two cables. Cable 1 makes 30° with the horizontal, Cable 2 makes 60°. Find the tension in each cable.\" This requires setting up and solving two simultaneous equations — a critical IB exam skill.</p>",
    "engage": "<p>HUMAN FBD — A student stands on a bathroom scale. The class draws the FBD and predicts the scale reading. Then simulate a lift: push down on the student's shoulders (scale reads more) and pull up (scale reads less). \"Are you heavier when someone pushes you? Or is the normal force just larger?\" This makes apparent weight tangible.</p>",

    "title": "Normal Force & Friction (μ_s and μ_d)",
    "plannedTime": 50,
    "understandings": "<ul><li>Normal force (F_N): component of contact force perpendicular to the surface that counteracts the body</li><li>Static friction: F_f ≤ μ_s·F_N (up to a maximum before sliding)</li><li>Dynamic friction: F_f = μ_d·F_N (constant while moving, μ_d < μ_s)</li></ul>",
    "how": "<p><strong>Opener (5 min):</strong> Push a heavy textbook on a desk. Push gently — nothing happens. Gradually increase force — still nothing. Suddenly it slides. \"What was pushing back? Why did it suddenly give way?\" Introduce the concept of static friction having a maximum.</p><p><strong>Lab (25 min):</strong> MEASURING FRICTION COEFFICIENTS — Students use a spring scale to drag wooden blocks across different surfaces (wood, sandpaper, glass, rubber mat). For each: (a) increase force gradually until the block just starts moving — record F_f at that instant (this gives μ_s·F_N), (b) drag at constant velocity — record F_f (this gives μ_d·F_N). Add masses to change F_N. Plot F_f vs F_N for each surface. Find μ from the gradient. Compare μ_s vs μ_d.</p><p><strong>Theory consolidation (10 min):</strong> Formalise the equations. Work through an inclined plane problem: \"At what angle will the block start sliding?\" Show that μ_s = tanθ_critical. This is elegant — students can verify it immediately with a book and a coin.</p><p><strong>Real-world connections (5 min):</strong> Why do car tyres have treads? (Channels water to maintain contact → friction.) Why is it harder to start pushing a fridge than to keep it moving? (μ_s > μ_d.) Why do new shoes slip? (Smooth sole → low μ.)</p><p><strong>Practice (5 min):</strong> 2 inclined plane problems with friction.</p>",
    "engage": "<p>FRICTION OLYMPICS — Three events: (1) Tug-of-war between a student in socks vs shoes on a smooth floor — who wins and why? (2) Drag race: pull identical blocks across sandpaper, wood, and oiled glass — students bet on which has highest μ before measuring. (3) The unbeatable incline: students find the exact angle where a coin just starts sliding on a tilted textbook, then calculate μ_s = tanθ. Award prizes for the most accurate measurement (± 0.01). The competitive format makes abstract coefficients unforgettable.</p>",
    "nos": "Measurements, Patterns & trends — Friction coefficients are empirical, not derived from theory. The linear relationship between F_f and F_N is a pattern discovered through data. Discuss: \"Is Coulomb's friction model a law or an approximation? When does it fail?\" (It fails at very high speeds, very smooth surfaces, or lubricated contacts.)",
    "atl": "Research skills, Self-management skills, Thinking skills",
    "lp": "Inquirer, Risk-taker",
    "ao": "AO1 — Define friction; AO2 — Apply μ in calculations; AO3 — Analyse lab data to determine μ; AO4 — Lab skills (measurement, graphing, gradient analysis)",
    "resources": "Spring scales (0–10 N), wooden blocks, surfaces (sandpaper, glass, rubber, wood), inclined plane, protractors, graph paper, calculators",
    "formative": "Lab report: F_f vs F_N graph with gradient calculation and comparison of μ_s vs μ_d. Must include uncertainties.",

    "understandings": "<ul><li>Tension: the pulling force transmitted through a string, rope, or cable</li><li>Tension is the same throughout an ideal (massless, inextensible) string</li><li>Atwood machine and connected-body problems</li></ul>",
    "how": "<p><strong>Demo (5 min):</strong> Set up an Atwood machine with two clearly different masses. Ask students to predict: \"Which mass accelerates down? What determines the acceleration?\" Let them discuss in pairs before revealing.</p><p><strong>Worked example (10 min):</strong> Apply Newton's 2nd law to EACH mass separately. For mass 1: T − m₁g = m₁a. For mass 2: m₂g − T = m₂a. Add the equations to eliminate T, solve for a. Then back-substitute to find T. Show that T is NOT equal to the weight of either mass.</p><p><strong>Extension (10 min):</strong> Connected bodies on a surface: a block on a table connected by a string over a pulley to a hanging mass. Same method — FBD for each body, Newton's 2nd law for each, solve simultaneously.</p><p><strong>Practice (5 min):</strong> One Atwood machine problem and one connected-body problem. Students solve independently then compare.</p>",
    "engage": "<p>HUMAN ATWOOD MACHINE — Two students hold ends of a rope over a smooth bar. Attach different water bottles to each end. Who gets pulled? Predict first, then test. The physical struggle makes the abstract problem real.</p>",

  {

    "title": "Elastic Restoring Force (Hooke's Law)",
    "plannedTime": 40,
    "understandings": "<ul><li>F_H = −kx, where k is the spring constant and x is the extension/compression</li><li>The negative sign indicates a restoring force (opposite to displacement)</li><li>Hooke's law is only valid within the elastic limit</li></ul>",
    "how": "<p><strong>Lab (20 min):</strong> HOOKE'S LAW INVESTIGATION — Students hang masses from a spring and measure extension for each added mass. Record in a table. Plot F (weight of masses) vs x (extension). Find k from the gradient. Discuss: Is the relationship perfectly linear? What happens if you load too much? Show a permanently deformed spring — this is the elastic limit. Key question: \"Why is there a negative sign in F_H = −kx?\" Answer: the force acts in the opposite direction to the displacement — it always pulls back toward equilibrium.</p><p><strong>Theory (10 min):</strong> Formalise Hooke's law. Distinguish between extension (positive x) and compression (negative x) — force reverses direction in both cases. Introduce spring combinations: springs in series (1/k_total = 1/k₁ + 1/k₂) and parallel (k_total = k₁ + k₂). Work through one example of each.</p><p><strong>Practice (10 min):</strong> Problem set: (a) find k from F-x data, (b) find extension under a given force, (c) springs in series and parallel, (d) elastic potential energy preview: \"If the area under the F-x graph is energy stored, what is it?\" (½kx² — this links to A.3.)</p>",
    "engage": "<p>SPRING MYSTERY — Give students 3 springs that look identical (same length, same coils) but have different k values. They must determine which is stiffest using only a ruler and a set of masses — no labels, no hints. The discovery that appearance is deceptive and only measurement reveals the truth is a direct lesson in scientific method.</p>",
    "nos": "Models have boundaries — Hooke's law is an approximation that fails beyond the elastic limit. This is a powerful example of the scope and limitations of scientific models. Discuss: \"Does any real spring obey Hooke's law perfectly?\" (No — it's always an approximation, best for small deformations.)",
    "atl": "Research skills, Thinking skills",

    "formative": "Lab report: F vs x graph with gradient = k, uncertainty bars, discussion of elastic limit. Bonus: \"Predict the extension when two of your springs are connected in series, then verify experimentally.\"",

    "id": "sub_9",
    "group": "Contact Forces",
    "title": "Viscous Drag (Stokes' Law) & Buoyancy",
    "plannedTime": 45,
    "understandings": "<ul><li>Viscous drag on a small sphere: F_d = 6πηrv (Stokes' law) where η is fluid viscosity, r is radius, v is velocity</li><li>Buoyancy: F_b = ρVg where V is the volume of fluid displaced, ρ is the fluid density</li><li>Terminal velocity: when drag + buoyancy = weight, acceleration = 0</li></ul>",
    "how": "<p><strong>Demonstration (5 min):</strong> Drop a steel ball into a tall cylinder (1 m+) of glycerol or thick honey. Students observe it accelerate, then reach a constant speed. \"The gravitational force didn't change — so what grew as the ball sped up?\"</p><p><strong>Direct instruction (15 min):</strong> Introduce Stokes' law F_d = 6πηrv — drag increases with velocity. Introduce buoyancy F_b = ρVg — depends on displaced volume, not the object's weight. Derive the terminal velocity condition: at terminal velocity, a = 0, so mg = 6πηrv_t + ρVg. Rearrange to find v_t. Numerical example: steel ball (r = 5 mm, ρ = 7800 kg/m³) in glycerol (η = 1.5 Pa·s, ρ = 1260 kg/m³).</p><p><strong>Skydiver analysis (10 min):</strong> The skydiver is the most important application. Draw the v-t graph showing three phases: (1) just after jumping — only gravity acts, acceleration = g, (2) as speed increases — drag grows, net force decreases, acceleration decreases but speed still increases, (3) terminal velocity reached — drag = weight, a = 0. Then: parachute opens — drag suddenly exceeds weight, deceleration occurs, new (lower) terminal velocity reached. Students sketch the FBD at each phase.</p><p><strong>Practice (10 min):</strong> Problem set: (a) calculate terminal velocity for a given sphere in a given fluid, (b) \"Will this object float in water? In mercury? In oil?\", (c) \"Two spheres of the same material but different radii fall through glycerol — which reaches terminal velocity first and why?\"</p><p><strong>Wrap-up (5 min):</strong> Limitations of Stokes' law: only valid for small spheres at low Reynolds numbers (laminar flow). At high speeds, drag ∝ v² instead of v.</p>",
    "engage": "<p>TWO ACTIVITIES — (1) SLOW-MOTION RACE: Drop steel, glass, and plastic balls simultaneously into glycerol columns. Students predict the finishing order using Stokes' law — both radius AND density matter. (2) SUBMARINE CHALLENGE: Give groups a film canister, plasticine, and a tub of water. They must make the canister hover neutrally buoyant (neither sinking nor floating). This requires precise balancing of F_b = ρVg and mg. The satisfaction when it hovers is genuine delight.</p>",
    "nos": "Falsification — Stokes' law makes a specific, testable prediction. If the ball doesn't reach the predicted terminal velocity, something is wrong with the assumptions (turbulent flow, wall effects, non-spherical shape). Models have defined scope.",
    "atl": "Thinking skills, Research skills",
    "lp": "Inquirer, Thinker",
    "ao": "AO1 — State Stokes' law and buoyancy equation; AO2 — Apply to calculate terminal velocity and buoyancy; AO3 — Analyse conditions for terminal velocity from FBDs",

    "formative": "Annotated FBD + v-t graph for a skydiver at all four stages (free fall, increasing drag, terminal velocity, parachute). Must label forces and state whether a > 0, a = 0, or a < 0 at each stage.",

  {
    "id": "sub_12",
    "group": "Momentum & Impulse",
    "title": "Linear Momentum (p = mv) & Conservation",
    "plannedTime": 40,
    "understandings": "<ul><li>p = mv is a vector quantity</li><li>Momentum remains constant unless the system is acted upon by a resultant external force</li><li>Conservation of momentum in isolated systems</li></ul>",
    "how": "<p><strong>Opener (5 min):</strong> Show slow-motion car crash test video. Pause at impact. \"The car had momentum before the crash. After the crash, it's stopped. Where did the momentum go?\"</p><p><strong>Concept building (10 min):</strong> Define p = mv. Emphasise it's a VECTOR — direction matters. Momentum of a system = sum of individual momenta. Conservation: if no external force acts, total momentum before = total momentum after. This works because Newton's 3rd law ensures internal forces cancel.</p><p><strong>Demo (10 min):</strong> Dynamics carts on a track. (a) Equal masses, one moving — after collision, the moving one stops and the stationary one moves (elastic). (b) Unequal masses — both move after collision. For each, calculate total p before and after. Students see conservation in action.</p><p><strong>Problem-solving (10 min):</strong> Numerical problems: (a) two carts colliding, (b) a bullet embedding in a block (find the block's velocity after), (c) a cannon firing a cannonball (find the recoil velocity). Set up conservation equation for each: m₁v₁ + m₂v₂ = m₁v₁' + m₂v₂'.</p><p><strong>Discussion (5 min):</strong> \"Is momentum always conserved?\" Discuss: yes, for an isolated system. In a car crash, is the system isolated? (No — friction from the road is an external force. But during the very short collision time, external forces are negligible compared to the collision forces, so momentum is approximately conserved.)</p>",
    "engage": "<p>CRASH TEST VIDEO — The visceral drama of a car crash grabs attention. Calculate the car's momentum before impact (m ≈ 1500 kg, v ≈ 50 km/h ≈ 14 m/s → p ≈ 21,000 kg·m/s). \"That's the momentum that had to go somewhere in 0.1 seconds.\"</p>",
    "nos": "Patterns — Conservation laws are among the deepest patterns in physics. Every conservation law is connected to a symmetry of nature (Noether's theorem, mentioned briefly). Theories — conservation of momentum was used to predict the existence of the neutrino (Pauli, 1930).",

    "id": "sub_13",
    "group": "Momentum & Impulse",
    "title": "Impulse (J = FΔt = Δp) & Safety Design",
    "plannedTime": 70,
    "understandings": "<ul><li>Impulse J = FΔt — the product of average resultant force and time of contact</li><li>Impulse equals the change in momentum: J = Δp</li><li>Same change in momentum can be achieved by large F × short Δt or small F × long Δt</li><li>Use of simultaneous equations involving conservation of momentum and energy (per IB guidance)</li></ul>",
    "how": "<p><strong>Concept building (15 min):</strong> Derive J = Δp from F = Δp/Δt. Rearrange: FΔt = Δp. This is the impulse-momentum theorem. Key insight: for the same Δp, increasing Δt DECREASES F. This one idea explains all of the following: crumple zones (car deforms over longer time → lower force on passengers), airbags (cushion → longer Δt → lower force on head), seatbelts (stretch slightly → longer Δt), bungee cords (decelerate over seconds, not milliseconds), catching a cricket ball (draw hands back to increase Δt), martial arts rolls (distribute impact over time). Work through the calculation: \"A 70 kg person moving at 10 m/s stops in 0.05 s (hitting a wall) vs 0.5 s (crumple zone). Calculate the force in each case.\" (14,000 N vs 1,400 N — a 10x reduction.)</p><p><strong>Lab (30 min):</strong> EGG DROP CHALLENGE — Each group gets: 1 raw egg, 4 sheets of newspaper, 50 cm of tape. BEFORE building: write a one-paragraph physics justification explaining how their design increases Δt to reduce the force on the egg. Use the equation J = FΔt = Δp explicitly. Then build (10 min), then drop from 2 m (5 min — film in slow motion). After: calculate the egg's momentum just before impact (estimate mass, use v = √(2gh)), calculate the impulse, estimate the average force during impact using the approximate time from the slow-mo video.</p><p><strong>Problem-solving (15 min):</strong> Conservation of momentum problems requiring simultaneous equations: (a) elastic collision with both final velocities unknown (two equations: p conservation + KE conservation), (b) ballistic pendulum (bullet in block, then block swings up — combine momentum conservation with energy conservation). These are classic IB exam problems.</p><p><strong>Debrief (10 min):</strong> Return to the car crash video. Students now explain QUANTITATIVELY how crumple zones, airbags, and seatbelts each reduce peak force. Discussion: \"Are there situations where you WANT a short impact time?\" (Yes: hammering a nail, martial arts strikes, heading a football for power.)</p>",
    "engage": "<p>EGG DROP ENGINEERING CHALLENGE — The twist of requiring a written physics justification BEFORE building forces students to think about the physics, not just build randomly. Groups whose egg survives AND whose explanation correctly uses the impulse-momentum theorem earn full marks. The tension when the egg drops, the slow-mo replay, the physics analysis afterward — this is the kind of lesson students remember for years.</p>",
    "nos": "Global impact — Car safety standards (Euro NCAP, NHTSA) are direct applications of impulse-momentum theory. Scientific knowledge informing international policy and saving lives. Science as a shared endeavour — crash test data is shared internationally.",

    "id": "sub_14",
    "group": "Collisions & Explosions",
    "title": "Elastic & Inelastic Collisions",
    "plannedTime": 55,
    "understandings": "<ul><li>Elastic collisions: both momentum and kinetic energy are conserved</li><li>Inelastic collisions: momentum is conserved, kinetic energy is NOT (some → heat, sound, deformation)</li><li>Perfectly inelastic: objects stick together — maximum KE loss</li><li>Setting up simultaneous equations from conservation of momentum AND conservation of KE</li><li>Shortcut for elastic collisions: relative speed of approach = relative speed of separation</li></ul>",

    // HELPER STATUS CALCULATION
    function getTopicStatus(code) {
      const state = plannerState[code];
      if (!state || !state.lessons || state.lessons.length === 0) return "not-started";
      
      let totalItems = 0;
      let completedItems = 0;
      let started = false;

      state.lessons.forEach(l => {
        // Parse checkboxes
        const parsed = parseStrategyChecklist(l.how + " " + l.engage);
        const checklistObj = l.checklist || {};
        
        parsed.forEach(item => {
          totalItems++;
          if (checklistObj[item]) completedItems++;
        });

        STANDARD_CHECKLIST_ITEMS.forEach(item => {
          totalItems++;
          if (checklistObj[item]) completedItems++;
        });

        if (l.actualHours > 0 || Object.keys(checklistObj).some(k => checklistObj[k])) {
          started = true;
        }
      });

      if (totalItems > 0 && completedItems === totalItems) return "completed";
      if (started || completedItems > 0) return "in-progress";
      return "not-started";
    }

    function parseStrategyChecklist(html) {
      const items = [];
      const temp = document.createElement('div');
      temp.innerHTML = html;
      const bolds = temp.querySelectorAll('strong, b');
      bolds.forEach(b => {
        const text = b.textContent.trim().replace(/^[:\-\s\u2014]+|[:\-\s\u2014]+$/g, '');
        if (text && text.length > 2 && !items.includes(text)) {
          items.push(text);
        }
      });
      return items;
    }

              <span class="topic-code-badge">${topic.code} &middot; Theme ${topic.theme} (${topic.level})</span>
              <h1 class="topic-name-header">${topic.title}</h1>

            <button class="btn" onclick="triggerPrint()">🖨️ Download PDF</button>

          <div class="toolbar-right">

            <button class="btn" onclick="document.getElementById('importFile').click()">📤 Import JSON</button>
            <input type="file" id="importFile" style="display:none;" accept=".json" onchange="importTopicState(event)" />
          </div>
        </div>

        <!-- Search and Expand controls -->
        <div class="search-filter-row" style="margin-bottom:15px; display:flex; gap:10px; align-items:center;">
          <input type="text" id="subtopic-search" placeholder="🔍 Search subtopics by keyword..." oninput="filterSubtopics(this.value)" style="flex:1; padding:8px 12px; border:1px solid var(--border); border-radius:8px; font-size:13px; outline:none; background:var(--bg-deep);" />
          <button class="btn" onclick="expandAllLessons()">↔️ Expand All</button>
          <button class="btn" onclick="collapseAllLessons()">↕️ Collapse All</button>
        </div>

        <div class="lessons-list" id="lessons-list">
          <!-- Dynamic lesson cards -->
        </div>

        <div class="lesson-field" style="margin-top: 20px;">
          <span class="field-label">General Topic Planner Reflections / Private Notes (Hidden in Print)</span>
          <textarea id="topic-notes" class="editable-box" style="width:100%; min-height:80px; font-family:var(--font-body); resize:vertical;" placeholder="Write personal reflections, warnings, or lab observations for future reference..." onblur="updateTopicNotes(this.value)">${state.notes || ""}</textarea>
        </div>

        <div id="linking-questions-container"></div>
      `;

      updateHeaderTotals();
      renderLessonCards(state.lessons);

      // Inject Linking Questions if Topic A.2
      if (code === "A.2") {
        const linkingContainer = document.getElementById('linking-questions-container');
        linkingContainer.innerHTML = `
          <div class="linking-questions-section" style="margin-top: 40px; border-top: 2px solid var(--border); padding-top: 30px;">
            <h2 style="font-family:var(--font-display); font-size:18px; font-weight:700; margin-bottom:15px; color:var(--text);">Linking Questions</h2>
            <p style="font-size:13px; color:var(--text3); margin-bottom:20px;">Use these questions to connect A.2 Forces & Momentum to other themes and topics in the syllabus.</p>
            <div class="linking-grid" style="display:grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap:16px;">
              <div class="linking-card" style="background:var(--white); border:1px solid var(--border); border-radius:8px; padding:16px; box-shadow:var(--shadow-sm);">
                <div style="font-family:var(--font-mono); font-size:11px; font-weight:700; color:var(--accent); margin-bottom:8px;">A.1 Kinematics</div>
                <div style="font-size:12.5px; line-height:1.5; color:var(--text2);">How do the equations of motion connect to Newton's 2nd law? Use kinematic graphs to derive force-time relationships.</div>
              </div>
              <div class="linking-card" style="background:var(--white); border:1px solid var(--border); border-radius:8px; padding:16px; box-shadow:var(--shadow-sm);">
                <div style="font-family:var(--font-mono); font-size:11px; font-weight:700; color:var(--accent2); margin-bottom:8px;">A.3 Work, Energy & Power</div>
                <div style="font-size:12.5px; line-height:1.5; color:var(--text2);">How does the work-energy theorem relate to F = ma? When is energy analysis more efficient than force analysis?</div>
              </div>
              <div class="linking-card" style="background:var(--white); border:1px solid var(--border); border-radius:8px; padding:16px; box-shadow:var(--shadow-sm);">
                <div style="font-family:var(--font-mono); font-size:11px; font-weight:700; color:var(--accent4); margin-bottom:8px;">A.4 Rigid Body Mechanics (HL)</div>
                <div style="font-size:12.5px; line-height:1.5; color:var(--text2);">How does torque extend the concept of force to rotational systems? How is angular momentum analogous to linear momentum?</div>
              </div>
              <div class="linking-card" style="background:var(--white); border:1px solid var(--border); border-radius:8px; padding:16px; box-shadow:var(--shadow-sm);">
                <div style="font-family:var(--font-mono); font-size:11px; font-weight:700; color:var(--accent5); margin-bottom:8px;">B.1 Thermal Energy</div>
                <div style="font-size:12.5px; line-height:1.5; color:var(--text2);">How does viscous drag connect to thermal conductivity? How does Newton's law of cooling relate to forces at the molecular level?</div>
              </div>
              <div class="linking-card" style="background:var(--white); border:1px solid var(--border); border-radius:8px; padding:16px; box-shadow:var(--shadow-sm);">
                <div style="font-family:var(--font-mono); font-size:11px; font-weight:700; color:var(--accent3); margin-bottom:8px;">B.5 Circuits</div>
                <div style="font-size:12.5px; line-height:1.5; color:var(--text2);">How is Ohm's law (V = IR) analogous to F = ma? How does electrical resistance mirror mechanical friction?</div>

              <div class="linking-card" style="background:var(--white); border:1px solid var(--border); border-radius:8px; padding:16px; box-shadow:var(--shadow-sm);">

                <div style="font-size:12.5px; line-height:1.5; color:var(--text2);">How does F_g = mg connect to Newton's law of gravitation F = GMm/r²? How does circular motion apply to planetary orbits?</div>
              </div>
              <div class="linking-card" style="background:var(--white); border:1px solid var(--border); border-radius:8px; padding:16px; box-shadow:var(--shadow-sm);">
                <div style="font-family:var(--font-mono); font-size:11px; font-weight:700; color:var(--accent4); margin-bottom:8px;">D.3 Motion in EM Fields</div>
                <div style="font-size:12.5px; line-height:1.5; color:var(--text2);">How does the magnetic force on a charged particle produce circular motion? Compare F = qvB with F = mv²/r.</div>

    function getGroupColor(group) {
      if (!group) return '#B8432F';
      const g = group.toLowerCase();
      if (g.includes("newton")) return '#B8432F'; // var(--accent) red-brown
      if (g.includes("free-body") || g.includes("fbd") || g.includes("diagram")) return '#1B4965'; // var(--accent3) navy
      if (g.includes("contact")) return '#2D6A4F'; // var(--accent2) forest green
      if (g.includes("field")) return '#B07D10'; // var(--accent5) gold
      if (g.includes("momentum") || g.includes("impulse")) return '#B8432F'; // var(--accent) red-brown
      if (g.includes("collision") || g.includes("explosion") || g.includes("circular")) return '#7B2D8E'; // var(--accent4) purple
      return '#B8432F';
    }

    // RENDER LESSON CARDS
    function renderLessonCards(lessons) {
      const container = document.getElementById('lessons-list');
      container.innerHTML = '';

      if (lessons.length === 0) {
        container.innerHTML = `<div style="padding: 40px; text-align: center; color: var(--text3); border:1.5px dashed var(--border); border-radius:var(--r);">No lessons planned. Click "Add Lesson" to start planning!</div>`;
        return;
      }

      // Calculate sums for group headers
      const groupSums = {};
      lessons.forEach(l => {
        if (l.group) {
          if (!groupSums[l.group]) {
            groupSums[l.group] = { time: 0, count: 0 };
          }
          groupSums[l.group].time += Number(l.plannedTime || 0);
          groupSums[l.group].count += 1;
        }
      });

      let lastGroup = "";

      // On first render of a topic, collapse all groups by default
      if (collapsedGroups._initialized !== activeTopicCode) {
        collapsedGroups.clear();
        const uniqueGroups = [...new Set(lessons.map(l => l.group).filter(Boolean))];
        uniqueGroups.forEach(g => collapsedGroups.add(g));
        collapsedGroups._initialized = activeTopicCode;
        // Also collapse all individual lessons by default
        lessons.forEach(l => { l.collapsed = true; });
      }

      lessons.forEach((l, index) => {
        // Render Collapsible Group Header if the group changes
        if (l.group && l.group !== lastGroup) {
          const groupColor = getGroupColor(l.group);
          const isGroupCollapsed = collapsedGroups.has(l.group);
          
          const groupHdr = document.createElement('div');
          groupHdr.className = `group-header ${isGroupCollapsed ? 'collapsed' : ''}`;
          groupHdr.setAttribute('data-group', l.group);
          groupHdr.onclick = () => toggleGroupCollapse(l.group);
          groupHdr.style.background = `${groupColor}10`;
          groupHdr.style.borderLeft = `4px solid ${groupColor}`;
          groupHdr.innerHTML = `
            <div class="group-header-left">
              <span class="group-chevron">▼</span>
              <span class="group-name" style="color:var(--text); font-weight:700;">${l.group}</span>
            </div>
            <div class="group-header-right">
              <span class="group-badge">${groupSums[l.group].count} subtopics</span>
              <span class="group-badge">${groupSums[l.group].time} min</span>
            </div>
          `;
          container.appendChild(groupHdr);
          lastGroup = l.group;
        }

        const isGroupHidden = l.group && collapsedGroups.has(l.group);
        const card = document.createElement('div');
        card.className = `lesson-card${l.collapsed ? ' collapsed' : ''}${isGroupHidden ? ' group-hidden' : ''}`;
        card.id = `lesson-card-${index}`;
        card.setAttribute('data-group', l.group || '');
        card.draggable = true;
        
        card.addEventListener('dragstart', (e) => handleDragStart(e, index));
        card.addEventListener('dragover', handleDragOver);
        card.addEventListener('drop', (e) => handleDrop(e, index));
        card.addEventListener('dragend', handleDragEnd);

        // Checklist elements
        const parsed = parseStrategyChecklist(l.how + " " + l.engage);
        const checklistObj = l.checklist || {};
        let chkTotal = 0;
        let chkDone = 0;

        let checklistHTML = '';
        
        // 1. Parsed items
        parsed.forEach(item => {
          chkTotal++;
          const checked = !!checklistObj[item];
          if (checked) chkDone++;
          checklistHTML += `
            <div class="checklist-item">
              <input type="checkbox" class="checklist-checkbox" id="chk-${index}-${chkTotal}" ${checked ? 'checked' : ''} onchange="toggleChecklistItem(${index}, '${item.replace(/'/g, "\'")}', this.checked)" />
              <label for="chk-${index}-${chkTotal}" class="checklist-label ${checked ? 'checked' : ''}">${item}</label>
            </div>
          `;
        });

        // 2. Standard items
        STANDARD_CHECKLIST_ITEMS.forEach(item => {
          chkTotal++;
          const checked = !!checklistObj[item];
          if (checked) chkDone++;
          checklistHTML += `
            <div class="checklist-item">
              <input type="checkbox" class="checklist-checkbox" id="chk-${index}-${chkTotal}" ${checked ? 'checked' : ''} onchange="toggleChecklistItem(${index}, '${item.replace(/'/g, "\'")}', this.checked)" />
              <label for="chk-${index}-${chkTotal}" class="checklist-label ${checked ? 'checked' : ''}"><em>${item}</em></label>
            </div>
          `;
        });

        const lessonRate = chkTotal > 0 ? Math.round((chkDone / chkTotal) * 100) : 0;
        const groupColor = getGroupColor(l.group || "");

        // Determine Status
        let status = l.status || "planned";
        if (!l.status) {
          if (chkDone === chkTotal && chkTotal > 0) status = "completed";
          else if (chkDone > 0 || l.actualHours > 0) status = "in-progress";
        }
        let dotColor = "#718096";
        if (status === "planned") dotColor = "#3182ce";
        else if (status === "in-progress") dotColor = "#dd6b20";
        else if (status === "completed") dotColor = "#38a169";
        else if (status === "skipped") dotColor = "#e53e3e";

        card.innerHTML = `
          <div class="lesson-header" onclick="toggleCollapseLesson(${index})">
            <span class="lesson-drag-handle" title="Drag to reorder" onclick="event.stopPropagation()">⠿</span>
            <span class="lesson-chevron">▼</span>
            
            <span class="group-color-badge" style="background:${groupColor}; width:12px; height:12px; border-radius:3px; display:inline-block; flex-shrink:0; margin-right:4px;" title="${l.group || ''}"></span>
            <span style="font-family:var(--font-mono); font-size:11px; font-weight:700; color:var(--text3); margin-right:4px; white-space:nowrap;">#${index+1}</span>
            <input type="text" class="lesson-title-input" value="${l.title}" onclick="event.stopPropagation()" onblur="updateLessonField(${index}, 'title', this.value)" placeholder="Enter Lesson Title" />
            
            <div class="lesson-meta-header" onclick="event.stopPropagation()" style="display:flex; align-items:center; gap:12px;">
              <div class="lesson-duration-box" title="Recommended Time">
                <input type="number" min="0" value="${l.plannedTime}" onblur="updateLessonField(${index}, 'plannedTime', this.value)" style="width:40px; text-align:center;" />
                <span class="field-label" style="font-size:10px;">min</span>
              </div>
              
              <div class="lesson-actual-box" title="Actual Time Spent" style="display:flex; align-items:center; gap:4px;">
                <span class="field-label" style="font-size:9px; color:var(--text3);">Actual:</span>
                <input type="number" min="0" value="${Math.round((l.actualHours || 0) * 60)}" onblur="updateLessonField(${index}, 'actualHours', this.value / 60)" style="width:44px; padding:2px; border:1px solid var(--border); border-radius:4px; text-align:center; background:var(--bg-deep); color:var(--text); font-family:var(--font-mono); font-weight:700;" />
                <span class="field-label" style="font-size:10px;">min</span>
              </div>

              <span class="oc-status status-completed" style="font-size:10px; padding: 2px 8px; border-radius:12px; font-weight:700; white-space:nowrap;">
                ${chkDone}/${chkTotal} done (${lessonRate}%)
              </span>

              <div style="display:flex; align-items:center; gap:6px;">
                <span class="status-dot" style="width:8px; height:8px; border-radius:50%; background:${dotColor}; display:inline-block;" title="Status: ${status}"></span>
                <select class="status-select" onchange="updateLessonField(${index}, 'status', this.value); renderSidebar();" style="font-size:10.5px; padding:2px; border:1px solid var(--border); border-radius:4px; outline:none; background:var(--bg-deep); color:var(--text); font-weight:600;">
                  <option value="planned" ${status === 'planned' ? 'selected' : ''}>Planned</option>
                  <option value="in-progress" ${status === 'in-progress' ? 'selected' : ''}>In Progress</option>
                  <option value="completed" ${status === 'completed' ? 'selected' : ''}>Completed</option>
                  <option value="skipped" ${status === 'skipped' ? 'selected' : ''}>Skipped</option>
                </select>
              </div>
              
              <div class="lesson-reorder-controls">
                <button class="reorder-btn" title="Move Up" onclick="moveLesson(${index}, -1)">▲</button>
                <button class="reorder-btn" title="Move Down" onclick="moveLesson(${index}, 1)">▼</button>
              </div>

              <button class="btn btn-danger" style="padding: 4px 8px; font-size:11px;" onclick="deleteLesson(${index})">🗑️</button>
            </div>
          </div>

          <div class="lesson-body lesson-body-grid">
            <!-- Row 1: Two Columns -->
            <div class="lesson-field grid-row-1-col-1">
              <span class="field-label">IB Understandings (What to teach)</span>
              <div class="editable-box" contenteditable="true" onblur="updateLessonField(${index}, 'understandings', this.innerHTML)" placeholder="List the core understandings...">${l.understandings || ""}</div>
            </div>
            
            <div class="lesson-field grid-row-1-col-2">
              <span class="field-label">Teaching Strategy (How to teach, with timing per activity)</span>
              <div class="editable-box" contenteditable="true" onblur="updateLessonField(${index}, 'how', this.innerHTML); triggerChecklistReload(${index});" placeholder="Describe the strategy and activities...">${l.how || ""}</div>
            </div>

            <!-- Row 2: Full-width Highlighted Box -->
            <div class="grid-row-2-full">
              <div class="engage-box" style="margin: 0; padding: 12px 16px;">
                <span class="field-label" style="color:var(--accent); font-weight:700; display:block; margin-bottom:8px;">Engagement / Demonstration Hook</span>
                <div class="editable-box" contenteditable="true" onblur="updateLessonField(${index}, 'engage', this.innerHTML)" style="background:transparent; border:none; padding:0; min-height:auto; font-style:italic;" placeholder="Describe a hook or demo...">${l.engage || ""}</div>
              </div>
            </div>

            <!-- Row 3: Four Columns -->
            <div class="lesson-field grid-row-3-col">
              <span class="field-label">Nature of Science (NOS)</span>
              <div class="editable-box" contenteditable="true" onblur="updateLessonField(${index}, 'nos', this.innerHTML)" placeholder="NOS connections...">${l.nos || ""}</div>
            </div>

            <div class="lesson-field grid-row-3-col">
              <span class="field-label">ATL Skills & Learner Profile</span>
              <div style="display:flex; flex-direction:column; gap:8px;">
                <div>
                  <label class="field-label" style="font-size:9px; color:var(--text3);">ATL Skills</label>
                  <div class="editable-box" contenteditable="true" onblur="updateLessonField(${index}, 'atl', this.innerHTML)" style="min-height:30px; padding:6px 10px;" placeholder="ATL skills...">${l.atl || ""}</div>
                </div>
                <div>
                  <label class="field-label" style="font-size:9px; color:var(--text3);">Learner Profile</label>
                  <div class="editable-box" contenteditable="true" onblur="updateLessonField(${index}, 'lp', this.innerHTML)" style="min-height:30px; padding:6px 10px;" placeholder="Learner profile...">${l.lp || ""}</div>
                </div>
              </div>
            </div>

            <div class="lesson-field grid-row-3-col">
              <span class="field-label">Assessment Objectives</span>
              <div class="editable-box" contenteditable="true" onblur="updateLessonField(${index}, 'ao', this.innerHTML)" placeholder="AO targets...">${l.ao || ""}</div>
            </div>

            <div class="lesson-field grid-row-3-col">
              <span class="field-label">Resources & Formative Assessment</span>
              <div style="display:flex; flex-direction:column; gap:8px;">
                <div>
                  <label class="field-label" style="font-size:9px; color:var(--text3);">Resources</label>
                  <div class="editable-box" contenteditable="true" onblur="updateLessonField(${index}, 'resources', this.innerHTML)" style="min-height:30px; padding:6px 10px;" placeholder="Resources needed...">${l.resources || ""}</div>
                </div>
                <div>
                  <label class="field-label" style="font-size:9px; color:var(--text3);">Formative</label>
                  <div class="editable-box" contenteditable="true" onblur="updateLessonField(${index}, 'formative', this.innerHTML)" style="min-height:30px; padding:6px 10px;" placeholder="Formative assessment...">${l.formative || ""}</div>
                </div>
              </div>
            </div>

            <!-- Row 4: Full-width Task Checklist -->
            <div class="lesson-field grid-row-4-full">
              <span class="field-label">Task Checklist</span>
              <div class="checklist-container" id="checklist-container-${index}" style="max-height: 200px;">
                ${checklistHTML}
              </div>
            </div>

            <!-- Row 5: Full-width Reflections Textarea -->
            <div class="lesson-field grid-row-5-full">
              <span class="field-label">Lesson Reflections / Modifications</span>
              <textarea class="editable-box" style="font-family:var(--font-body); resize:vertical; min-height:60px; width:100%;" placeholder="Record student struggles, timing adjustments, or updates for next year..." onblur="updateLessonField(${index}, 'notes', this.value)">${l.notes || ""}</textarea>
              <div class="print-only-reflection">${l.notes || ""}</div>
            </div>
          </div>
        `;
        container.appendChild(card);
      });
    }

    // LESSON ACTIONS
    function addLesson() {
      const state = plannerState[activeTopicCode];
      const newLesson = Object.assign({}, DEFAULT_LESSON_TEMPLATE, {
        id: "l_" + Date.now(),
        title: `Lesson ${state.lessons.length + 1}: New Block`
      });
      state.lessons.push(newLesson);
      saveTopicState(activeTopicCode);
      loadTopicEditor(activeTopicCode);
    }

    function deleteLesson(index) {
      if (confirm("Are you sure you want to delete this lesson card? This action cannot be undone.")) {
        const state = plannerState[activeTopicCode];
        state.lessons.splice(index, 1);
        saveTopicState(activeTopicCode);
        loadTopicEditor(activeTopicCode);
      }
    }

    function toggleCollapseLesson(index) {
      const state = plannerState[activeTopicCode];
      state.lessons[index].collapsed = !state.lessons[index].collapsed;
      
      const card = document.getElementById(`lesson-card-${index}`);
      if (card) {
        card.classList.toggle('collapsed');
      }
      saveTopicState(activeTopicCode);
    }

    // GROUP-LEVEL COLLAPSE: Toggle all cards in a group
    function toggleGroupCollapse(groupName) {
      if (collapsedGroups.has(groupName)) {
        collapsedGroups.delete(groupName);
      } else {
        collapsedGroups.add(groupName);
      }
      
      // Update the group header visually
      const allGroupHeaders = document.querySelectorAll('.group-header');
      allGroupHeaders.forEach(hdr => {
        if (hdr.getAttribute('data-group') === groupName) {
          hdr.classList.toggle('collapsed', collapsedGroups.has(groupName));
        }
      });
      
      // Show/hide all cards belonging to this group
      const allCards = document.querySelectorAll('.lesson-card');
      allCards.forEach(card => {
        if (card.getAttribute('data-group') === groupName) {
          card.classList.toggle('group-hidden', collapsedGroups.has(groupName));
        }
      });
    }

    // EXPAND ALL: Open all groups and all card bodies
    function expandAllLessons() {
      const state = plannerState[activeTopicCode];
      collapsedGroups.clear();
      state.lessons.forEach(l => { l.collapsed = false; });
      saveTopicState(activeTopicCode);
      renderLessonCards(state.lessons);
    }

    // COLLAPSE ALL: Close all groups (hides cards) and collapse all card bodies
    function collapseAllLessons() {
      const state = plannerState[activeTopicCode];
      const uniqueGroups = [...new Set(state.lessons.map(l => l.group).filter(Boolean))];
      uniqueGroups.forEach(g => collapsedGroups.add(g));
      state.lessons.forEach(l => { l.collapsed = true; });
      saveTopicState(activeTopicCode);
      renderLessonCards(state.lessons);
    }

    // SEARCH/FILTER SUBTOPICS by keyword
    function filterSubtopics(query) {
      const q = query.trim().toLowerCase();
      const allCards = document.querySelectorAll('.lesson-card');
      const allGroupHeaders = document.querySelectorAll('.group-header');
      const visibleGroups = new Set();
      
      allCards.forEach(card => {
        if (!q) {
          card.classList.remove('search-hidden');
          visibleGroups.add(card.getAttribute('data-group'));
          return;
        }
        const text = card.textContent.toLowerCase();
        if (text.includes(q)) {
          card.classList.remove('search-hidden');
          card.classList.remove('group-hidden'); // show matching cards even if group is collapsed
          visibleGroups.add(card.getAttribute('data-group'));
        } else {
          card.classList.add('search-hidden');
        }
      });
      
      allGroupHeaders.forEach(hdr => {
        const grp = hdr.getAttribute('data-group');
        if (!q) {
          hdr.classList.remove('search-hidden');
        } else if (visibleGroups.has(grp)) {
          hdr.classList.remove('search-hidden');
        } else {
          hdr.classList.add('search-hidden');
        }
      });
    }

    function toggleChecklistItem(lessonIndex, itemText, checked) {
      const state = plannerState[activeTopicCode];
      if (!state.lessons[lessonIndex].checklist) {
        state.lessons[lessonIndex].checklist = {};
      }
      state.lessons[lessonIndex].checklist[itemText] = checked;
      saveTopicState(activeTopicCode);
      
      // Re-style labels
      updateHeaderTotals();
      
      // Update label cross style inside the card
      renderSidebar(); // refresh status dot in sidebar
    }

    function triggerChecklistReload(lessonIndex) {
      const state = plannerState[activeTopicCode];
      const lesson = state.lessons[lessonIndex];
      const parsed = parseStrategyChecklist(lesson.how + " " + lesson.engage);
      
      const container = document.getElementById(`checklist-container-${lessonIndex}`);
      if (!container) return;

      const checklistObj = lesson.checklist || {};
      let chkTotal = 0;
      let chkDone = 0;
      let checklistHTML = '';

      // 1. Parsed items
      parsed.forEach(item => {
        chkTotal++;
        const checked = !!checklistObj[item];
        if (checked) chkDone++;
        checklistHTML += `
          <div class="checklist-item">
            <input type="checkbox" class="checklist-checkbox" id="chk-${lessonIndex}-${chkTotal}" ${checked ? 'checked' : ''} onchange="toggleChecklistItem(${lessonIndex}, '${item.replace(/'/g, "\\'")}', this.checked)" />
            <label for="chk-${lessonIndex}-${chkTotal}" class="checklist-label ${checked ? 'checked' : ''}">${item}</label>
          </div>
        `;
      });

      // 2. Standard items
      STANDARD_CHECKLIST_ITEMS.forEach(item => {
        chkTotal++;
        const checked = !!checklistObj[item];
        if (checked) chkDone++;
        checklistHTML += `
          <div class="checklist-item">
            <input type="checkbox" class="checklist-checkbox" id="chk-${lessonIndex}-${chkTotal}" ${checked ? 'checked' : ''} onchange="toggleChecklistItem(${lessonIndex}, '${item.replace(/'/g, "\\'")}', this.checked)" />
            <label for="chk-${lessonIndex}-${chkTotal}" class="checklist-label ${checked ? 'checked' : ''}"><em>${item}</em></label>
          </div>
        `;
      });

      container.innerHTML = checklistHTML;
      updateHeaderTotals();
    }

    // DRAG AND DROP REORDERING
    function handleDragStart(e, index) {
      draggedCard = index;
      e.target.classList.add('dragging');
    }

    function handleDragOver(e) {
      e.preventDefault();
    }

    function handleDrop(e, index) {
      e.preventDefault();
      if (draggedCard === null || draggedCard === index) return;

      const state = plannerState[activeTopicCode];
      const item = state.lessons.splice(draggedCard, 1)[0];
      state.lessons.splice(index, 0, item);
      
      saveTopicState(activeTopicCode);
      loadTopicEditor(activeTopicCode);
    }

    function handleDragEnd(e) {
      e.target.classList.remove('dragging');
      draggedCard = null;
    }

    function moveLesson(index, direction) {
      const state = plannerState[activeTopicCode];
      const targetIndex = index + direction;
      if (targetIndex < 0 || targetIndex >= state.lessons.length) return;

      const item = state.lessons.splice(index, 1)[0];
      state.lessons.splice(targetIndex, 0, item);

      saveTopicState(activeTopicCode);
      loadTopicEditor(activeTopicCode);
    }

    // PRINT HELPER
    function triggerPrint() {
      // Expand all groups and cards before printing so everything is visible
      const state = plannerState[activeTopicCode];
      const prevCollapsedGroups = new Set(collapsedGroups);
      const prevCollapsedStates = state.lessons.map(l => l.collapsed);
      
      // Expand everything
      collapsedGroups.clear();
      state.lessons.forEach(l => { l.collapsed = false; });
      renderLessonCards(state.lessons);
      
      // Print after a brief delay to allow DOM to render
      setTimeout(() => {
        window.print();
        
        // Restore collapsed state after printing
        prevCollapsedGroups.forEach(g => collapsedGroups.add(g));
        state.lessons.forEach((l, i) => { l.collapsed = prevCollapsedStates[i]; });
        renderLessonCards(state.lessons);
      }, 200);
    }

    function exportTopicState() {
      const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(plannerState));
      const downloadAnchor = document.createElement('a');
      downloadAnchor.setAttribute("href", dataStr);
      downloadAnchor.setAttribute("download", `physicism-dp-teacher-planner-backup.json`);
      document.body.appendChild(downloadAnchor);
      downloadAnchor.click();
      downloadAnchor.remove();
    }

    function importTopicState(e) {
      const fileReader = new FileReader();
      fileReader.onload = function(event) {
        try {
          const imported = JSON.parse(event.target.result);
          
          if (confirm("This will overwrite your existing planner data. Are you sure you want to proceed?")) {
            Object.keys(imported).forEach(code => {
              if (imported[code] && Array.isArray(imported[code].lessons)) {
                plannerState[code] = imported[code];
                saveTopicState(code);
              }
            });
            alert("Backup imported successfully!");
            window.location.reload();
          }
        } catch(err) {
          alert("Error parsing JSON backup file. Please make sure the file is a valid backup.");
        }
      };
      if (e.target.files[0]) {
        fileReader.readAsText(e.target.files[0]);
      }
    }
