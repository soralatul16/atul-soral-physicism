<style>
:root {
  /* Light theme (default) */
  --bg: #f5f0e8;
  --bg-deep: #f0ebe2;
  --surface: rgba(255,255,255,0.75);
  --surface2: rgba(255,255,255,0.55);
  --white: #ffffff;
  --text: #1a1a2e;
  --text2: #555;
  --text3: #888;
  --border: rgba(0,0,0,0.06);
  --accent: #c0392b;
  --cream: #f9f6f1;

  /* Theme mappings for Chapter */
  --bg-paper: var(--white);
  --text-muted: var(--text2);
  --text-light: var(--text3);
  --shadow: rgba(0, 0, 0, 0.06);

  --accent-hover: #962d22;
  --accent-pale: rgba(192, 57, 43, 0.06);
  --font-display: 'Playfair Display', Georgia, serif;
  --font-body: 'DM Sans', 'Segoe UI', system-ui, -apple-system, sans-serif;
}

[data-theme="dark"] {
  --bg: #0f1119;
  --bg-deep: #141620;
  --surface: rgba(30,32,45,0.85);
  --surface2: rgba(30,32,45,0.65);
  --white: #1e2030;
  --text: #e0ddd5;
  --text2: #a0a0b0;
  --text3: #6a6a7a;
  --border: rgba(255,255,255,0.06);
  --accent: #e05040;
  --cream: #1a1c28;
}

[data-theme="dark"] body {
  background: var(--bg);
  color: var(--text);
}
[data-theme="dark"] img {
  opacity: 0.92;
}
[data-theme="dark"] .topbar,
[data-theme="dark"] .navbar {
  background: var(--surface);
  border-bottom-color: var(--border);
}
[data-theme="dark"] input,
[data-theme="dark"] select,
[data-theme="dark"] textarea {
  background: var(--white);
  color: var(--text);
  border-color: var(--border);
}

*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  margin: 0;
  font-family: var(--font-body);
  display: flex;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow: hidden;
}

/* SIDEBAR */
.sidebar {
  width: 260px;
  background: var(--bg-paper);
  height: 100vh;
  overflow-y: auto;
  padding: 20px 16px;
  border-right: 1px solid var(--border);

.sidebar-item {
  padding: 10px 14px;

  background: transparent;

.sidebar-item:hover {

  color: var(--accent);

<script>
// Sidebar Toggle functionality for Mobile
function toggleSidebar(e) {
  e.stopPropagation();
  const sidebar = document.getElementById('sidebar');
  const hamburger = document.getElementById('hamburgerBtn');
  sidebar.classList.toggle('open');
  hamburger.classList.toggle('open');
}

// Close sidebar on body click if open on mobile
document.addEventListener('click', function(e) {
  const sidebar = document.getElementById('sidebar');
  const hamburger = document.getElementById('hamburgerBtn');
  if (window.innerWidth <= 768 && !sidebar.contains(e.target) && e.target !== hamburger && !hamburger.contains(e.target)) {
    sidebar.classList.remove('open');
    hamburger.classList.remove('open');
  }
});
</script>

<script>
const params = new URLSearchParams(window.location.search);
const topic = params.get("topic") || "waves";

const images = chapters[topic] || [];

let currentImage = "";
const sidebar = document.getElementById("sidebar");

/* TITLE */
document.getElementById("chapterTitle").innerText =
  topic.replace(/-/g," ").toUpperCase();

/* SIDEBAR */
images.forEach(img=>{
  const div = document.createElement("div");
  div.className = "sidebar-item";

  div.innerText = img
    .replace(".png","")
    .replace(/^\d+-?/,"")
    .replace(/-/g," ")
    .replace(/\b\w/g, l => l.toUpperCase());

  div.onclick = ()=> loadImage(img, div);
  sidebar.appendChild(div);
});

/* LOAD IMAGE */
function loadImage(img, element){
  document.querySelectorAll(".sidebar-item").forEach(el=>el.classList.remove("active"));
  element.classList.add("active");

  document.getElementById("viewerImg").src = "Images/" + img;

  document.getElementById("downloadBtn").onclick = ()=>{
    const link = document.createElement("a");
    link.href = "Images/" + img;
    link.download = img;
    link.click();
  };

  currentImage = img.replace(".png","");
}

/* QUIZ */
function startQuiz(){
  window.location.href = `quiz/quiz.html?topic=${topic}&image=${currentImage}`;
}

/* SEARCH */
function searchImages(){
  const input = document.getElementById("searchBox").value.toLowerCase();

  document.querySelectorAll(".sidebar-item").forEach(item=>{
    const text = item.innerText.toLowerCase();
    item.style.display = text.includes(input) ? "block" : "none";
  });
}

/* DEFAULT LOAD */
if(images.length > 0){
  loadImage(images[0], sidebar.children[0]);
}
</script>

<script>
function toggleTheme() {
  var current = document.documentElement.getAttribute('data-theme');
  var next = current === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('physicism-theme', next);
  var btn = document.getElementById('themeToggle');
  if (btn) btn.textContent = next === 'dark' ? '☀️' : '🌙';
}
// Load saved theme
(function() {
  var saved = localStorage.getItem('physicism-theme');
  if (saved === 'dark') {
    document.documentElement.setAttribute('data-theme', 'dark');
    var btn = document.getElementById('themeToggle');
    if (btn) btn.textContent = '☀️';
  }
})();
</script>

<script>
function toggleAITutor() {
  var panel = document.getElementById('ai-tutor-panel');
  var isOpen = panel.style.opacity === '1';
  panel.style.opacity = isOpen ? '0' : '1';
  panel.style.pointerEvents = isOpen ? 'none' : 'all';
  panel.style.transform = isOpen ? 'translateY(20px) scale(0.96)' : 'translateY(0) scale(1)';
  if (!isOpen) {
    setTimeout(function() { document.getElementById('ai-tutor-input').focus(); }, 300);
  }
}

function sendAITutor() {
  var input = document.getElementById('ai-tutor-input');
  var msg = input.value.trim();
  if (!msg) return;
  
  var messages = document.getElementById('ai-tutor-messages');
  
  // Add user message
  messages.innerHTML += '<div style="text-align:right;margin-bottom:8px;"><span style="background:#1a6fb5;color:white;padding:8px 14px;border-radius:12px 12px 2px 12px;display:inline-block;font-size:13px;max-width:80%;text-align:left;">' + escapeHtml(msg) + '</span></div>';
  
  input.value = '';
  messages.scrollTop = messages.scrollHeight;
  
  // Add loading indicator
  var loadingId = 'loading-' + Date.now();
  messages.innerHTML += '<div id="' + loadingId + '" style="margin-bottom:8px;"><span style="background:var(--cream,#f9f6f1);padding:8px 14px;border-radius:12px 12px 12px 2px;display:inline-block;font-size:12px;color:var(--text3,#888);">Thinking...</span></div>';
  messages.scrollTop = messages.scrollHeight;
  
  // Call AI via Cloud Function (API key stays server-side)
  if(!firebase.auth().currentUser){
    document.getElementById(loadingId).innerHTML = '<span style="background:rgba(192,57,43,0.06);padding:8px 14px;border-radius:12px;display:inline-block;font-size:12px;color:#c0392b;">Please log in to use the AI tutor.</span>';
    return;
  }
  var aiChat=firebase.functions().httpsCallable('aiChat');
  aiChat({messages:[
    {role:'system',content:'You are a friendly IB MYP Physics tutor for Grade 6-10 students. Give clear, concise answers. Use simple language. Include formulas when relevant. Keep answers under 150 words. If asked about non-physics topics, politely redirect to physics. Always encourage the student.'},
    {role:'user',content:msg}
  ],temperature:0.7,maxTokens:300}).then(function(result){
    var reply = result.data.reply;
    if (reply) {
      document.getElementById(loadingId).innerHTML = '<span style="background:var(--cream,#f9f6f1);padding:10px 14px;border-radius:12px 12px 12px 2px;display:inline-block;font-size:13px;color:var(--text,#1a1a2e);max-width:85%;line-height:1.6;text-align:left;">' + reply.replace(/\n/g, '<br>') + '</span>';
    }
    messages.scrollTop = messages.scrollHeight;
  }).catch(function(err){
    document.getElementById(loadingId).innerHTML = '<span style="background:rgba(192,57,43,0.06);padding:8px 14px;border-radius:12px;display:inline-block;font-size:12px;color:#c0392b;">Error: ' + (err.message||'AI service unavailable') + '</span>';
  });
}

function escapeHtml(text) {
  var div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

// Close on outside click
document.addEventListener('click', function(e) {
  var panel = document.getElementById('ai-tutor-panel');
  var trigger = document.getElementById('ai-tutor-trigger');
  if (panel && trigger && !panel.contains(e.target) && e.target !== trigger) {
    panel.style.opacity = '0';
    panel.style.pointerEvents = 'none';
    panel.style.transform = 'translateY(20px) scale(0.96)';
  }
});
</script>
