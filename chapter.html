<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Physics Chapter | Atul Soral Physicism</title>

<style>
body{
  margin:0;
  font-family:Arial;
  display:flex;
  background:#0f172a;
  color:white;
}

/* SIDEBAR */
.sidebar{
  width:260px;
  background:#020617;
  height:100vh;
  overflow-y:auto;
  padding:10px;
}

.sidebar-item{
  padding:10px;
  margin:5px 0;
  background:#1e293b;
  border-radius:6px;
  cursor:pointer;
}

.sidebar-item:hover{
  background:#334155;
}

.active{
  background:#22c55e !important;
}

/* MAIN */
.main{
  flex:1;
  display:flex;
  flex-direction:column;
}

/* NAV */
.nav{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:10px;
  background:#020617;
}

.nav-left{
  display:flex;
  align-items:center;
  gap:10px;
}

.nav-title{
  font-weight:bold;
  margin-left:10px;
  color:#38bdf8;
}

/* VIEWER */
.viewer{
  flex:1;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
}

.viewer img{
  max-width:900px;
  max-height:80vh;
  object-fit:contain;
  border-radius:10px;
}

/* BUTTONS */
.btn{
  margin:10px;
  padding:10px 20px;
  background:#22c55e;
  border:none;
  border-radius:6px;
  color:white;
  cursor:pointer;
}

/* SEARCH */
#searchBox{
  padding:8px;
  border-radius:6px;
  border:none;
  width:200px;
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar"></div>

<!-- MAIN -->
<div class="main">

<div class="nav">

  <div class="nav-left">
    <button onclick="location.href='index.html'">🏠 Home</button>
    <button onclick="location.href='myp-dashboard.html'">📘 MYP</button>
    <span class="nav-title" id="chapterTitle"></span>
  </div>

  <input 
    type="text"
    id="searchBox"
    placeholder="🔍 Search..."
    onkeyup="searchImages()"
  >

</div>

<div class="viewer">
  <img id="viewerImg">
  <div>
    <button class="btn" id="downloadBtn">⬇ Download</button>
    <button class="btn" onclick="startQuiz()">🧠 Start Quiz</button>
  </div>
</div>

</div>

<!-- SCRIPTS -->
<script src="js/chapters.js"></script>

<script>
const params = new URLSearchParams(window.location.search);
const topic = params.get("topic") || "waves";

const images = chapters[topic] || [];

let currentImage = "";
const sidebar = document.getElementById("sidebar");

/* SET TITLE */
document.getElementById("chapterTitle").innerText =
  topic.charAt(0).toUpperCase() + topic.slice(1);

/* BUILD SIDEBAR */
images.forEach(img=>{
  const div = document.createElement("div");
  div.className = "sidebar-item";

  // 🔥 Clean display name
  div.innerText = img
    .replace(".png","")
    .replace(/^\d+-?/,"")
    .replace(/-/g," ")
    .replace(/\b\w/g, l => l.toUpperCase());

  div.onclick = ()=> loadImage(img, div);
  sidebar.appendChild(div);
});

/* LOAD IMAGE */
function loadImage(img, element){
  document.querySelectorAll(".sidebar-item").forEach(el=>el.classList.remove("active"));
  element.classList.add("active");

  document.getElementById("viewerImg").src = "Images/" + img;

  document.getElementById("downloadBtn").onclick = ()=>{
    const link = document.createElement("a");
    link.href = "Images/" + img;
    link.download = img;
    link.click();
  };

  currentImage = img.replace(".png","");
}

/* QUIZ */
function startQuiz(){
  window.location.href = `quiz/quiz.html?topic=${topic}&image=${currentImage}`;
}

/* SEARCH */
function searchImages(){
  const input = document.getElementById("searchBox").value.toLowerCase();

  document.querySelectorAll(".sidebar-item").forEach(item=>{
    const text = item.innerText.toLowerCase();
    item.style.display = text.includes(input) ? "block" : "none";
  });
}

/* DEFAULT LOAD */
if(images.length > 0 && sidebar.children.length > 0){
  loadImage(images[0], sidebar.children[0]);
}
</script>

</body>
</html>
