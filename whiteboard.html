<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Teaching Whiteboard | Atul Soral Physicism</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#1a1a2e;overflow:hidden;font-family:system-ui,sans-serif;user-select:none}

#canvas{position:fixed;top:48px;left:0;z-index:10;cursor:crosshair;touch-action:none}
#spotCanvas{position:fixed;top:48px;left:0;z-index:12;pointer-events:none;display:none}

.toolbar{position:fixed;top:0;left:0;right:0;height:48px;display:flex;align-items:center;gap:4px;padding:0 10px;background:rgba(26,26,46,.96);backdrop-filter:blur(12px);z-index:200;border-bottom:1px solid #333;overflow-x:auto;overflow-y:hidden}
.toolbar::-webkit-scrollbar{height:0}
.tg{display:flex;gap:3px;align-items:center;padding:0 6px;flex-shrink:0}
.sep{width:1px;height:28px;background:#444;margin:0 2px;flex-shrink:0}
.tb{height:30px;min-width:30px;border:1.5px solid #444;border-radius:6px;background:#2a2a3e;color:#ccc;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:13px;padding:0 5px;transition:.15s;white-space:nowrap;flex-shrink:0}
.tb:hover{border-color:#4ecdc4;color:#4ecdc4}
.tb.on{background:#4ecdc4;color:#1a1a2e;border-color:#4ecdc4}
.tb.rec{background:#e74c3c;border-color:#e74c3c;color:#fff}
.cs{width:20px;height:20px;border-radius:50%;border:2px solid #555;cursor:pointer;transition:.15s;flex-shrink:0}
.cs.on{border-color:#fff;box-shadow:0 0 6px rgba(255,255,255,.4)}
.lbl{font-size:.6rem;color:#666;text-transform:uppercase;letter-spacing:.04em;margin-right:3px;flex-shrink:0}
.toolbar select,.toolbar input[type=color]{background:#2a2a3e;color:#ccc;border:1px solid #444;border-radius:4px;padding:2px 4px;font-size:11px;height:26px;flex-shrink:0}
.toolbar input[type=range]{width:55px;accent-color:#4ecdc4;flex-shrink:0}
.toolbar input[type=number]{width:42px;background:#2a2a3e;color:#ccc;border:1px solid #444;border-radius:4px;padding:2px;font-size:11px;height:26px;text-align:center;flex-shrink:0}

.bottom-bar{position:fixed;bottom:0;left:0;right:0;height:40px;display:flex;align-items:center;justify-content:space-between;padding:0 12px;background:rgba(26,26,46,.94);z-index:200;border-top:1px solid #333}
.pg{display:flex;gap:6px;align-items:center}
.pg button{width:26px;height:26px;border-radius:50%;border:1.5px solid #444;background:#2a2a3e;color:#ccc;cursor:pointer;font-size:.7rem;display:flex;align-items:center;justify-content:center}
.pg button:hover{border-color:#4ecdc4}
.pg span{color:#888;font-size:.7rem}
.zm{display:flex;gap:6px;align-items:center}
.zm button{width:26px;height:26px;border-radius:4px;border:1px solid #444;background:#2a2a3e;color:#ccc;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center}
.zm button:hover{border-color:#4ecdc4}
.zm span{color:#888;font-size:.7rem;min-width:40px;text-align:center}

.playback{position:fixed;bottom:40px;left:0;right:0;height:36px;display:flex;align-items:center;gap:8px;padding:0 12px;background:rgba(20,20,40,.96);z-index:200;border-top:1px solid #333}
.playback.hide{display:none}
.scrub{flex:1;height:6px;background:#333;border-radius:3px;cursor:pointer;position:relative}
.scrub-fill{height:100%;background:#4ecdc4;border-radius:3px;pointer-events:none;width:0}
.scrub .bm{position:absolute;top:-3px;width:3px;height:12px;background:#feca57;border-radius:1px;pointer-events:auto;cursor:pointer;z-index:1}
.playback .time{color:#888;font-size:.7rem;min-width:80px;flex-shrink:0}
.playback select{background:#2a2a3e;color:#ccc;border:1px solid #444;border-radius:4px;padding:1px 4px;font-size:11px;height:24px}

.minimap{position:fixed;bottom:48px;right:8px;width:160px;height:100px;background:rgba(10,10,25,.9);border:1px solid #444;border-radius:6px;z-index:150;overflow:hidden}
.minimap.hide{display:none}
.minimap canvas{width:100%;height:100%}
.mm-view{position:absolute;border:1.5px solid #4ecdc4;pointer-events:none;border-radius:1px}

.scratch{position:fixed;top:48px;right:0;bottom:40px;width:280px;background:rgba(26,26,46,.98);border-left:1px solid #333;z-index:150;display:flex;flex-direction:column}
.scratch.hide{display:none}
.scratch-head{height:32px;display:flex;align-items:center;justify-content:space-between;padding:0 10px;border-bottom:1px solid #333;color:#888;font-size:.7rem}
.scratch-head button{background:none;border:none;color:#888;cursor:pointer;font-size:14px}
.scratch canvas{flex:1;cursor:crosshair}

.laser{position:fixed;width:12px;height:12px;border-radius:50%;background:rgba(255,0,0,.8);box-shadow:0 0 20px rgba(255,0,0,.6),0 0 40px rgba(255,0,0,.3);pointer-events:none;z-index:15;display:none;transform:translate(-50%,-50%)}

.drop-zone{position:fixed;top:48px;left:0;right:0;bottom:40px;z-index:300;background:rgba(78,205,196,.15);border:3px dashed #4ecdc4;display:none;align-items:center;justify-content:center;color:#4ecdc4;font-size:1.2rem;font-weight:600;pointer-events:none}
.drop-zone.show{display:flex}

/* Inline text editor */
.te{position:fixed;z-index:250;display:none;flex-direction:column;gap:4px}
.te.show{display:flex}
.te-bar{display:flex;gap:4px;align-items:center;padding:5px 8px;background:#fff;border-radius:8px;box-shadow:0 2px 16px rgba(0,0,0,.25);flex-wrap:wrap}
.te-bar select,.te-bar input[type=number]{background:#f5f5f5;border:1px solid #ddd;border-radius:4px;padding:2px 4px;font-size:12px;height:26px;color:#333}
.te-bar input[type=color]{width:26px;height:26px;border:1px solid #ddd;border-radius:4px;padding:0;cursor:pointer}
.te-b{width:28px;height:28px;border:1px solid #ddd;border-radius:4px;background:#f5f5f5;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;color:#333}
.te-b:hover{background:#e0e0e0}
.te-b.on{background:#4ecdc4;color:#fff;border-color:#4ecdc4}
#teInput{resize:both;border:2px solid #4ecdc4;border-radius:6px;padding:8px 10px;outline:none;min-width:220px;min-height:48px;max-width:600px;max-height:400px;font-family:system-ui,sans-serif;line-height:1.4;background:rgba(255,255,255,.95);color:#333;box-shadow:0 2px 12px rgba(0,0,0,.15)}

/* Eraser cursor circle */
.eraser-cursor{position:fixed;border:2px solid rgba(255,255,255,.5);border-radius:50%;pointer-events:none;z-index:14;display:none;transform:translate(-50%,-50%)}
</style>
</head>

    <button class="tb on" id="btnPen" onclick="setTool('pen')" title="Pen (1)">&#9999;&#65039;</button>
    <button class="tb" id="btnHighlight" onclick="setTool('highlight')" title="Highlighter (2)">&#128397;&#65039;</button>
    <button class="tb" id="btnEraser" onclick="setTool('eraser')" title="Eraser (3)">&#129531;</button>
    <button class="tb" id="btnText" onclick="setTool('text')" title="Text (4)">T</button>
    <button class="tb" id="btnSticky" onclick="setTool('sticky')" title="Sticky Note (N)">&#128221;</button>

  <div class="sep"></div>
  <div class="tg">
    <span class="lbl">Shape</span>

    <button class="tb" id="btnArrow" onclick="setTool('arrow')" title="Arrow (6)">&rarr;</button>

  <div class="tg">

    <button class="tb" id="btnLaser" onclick="setTool('laser')" title="Laser (L)">&#128308;</button>

    <button class="cs" style="background:#ff6b6b" onclick="pickColor('#ff6b6b',this)"></button>
    <button class="cs" style="background:#feca57" onclick="pickColor('#feca57',this)"></button>
    <button class="cs" style="background:#48dbfb" onclick="pickColor('#48dbfb',this)"></button>
    <button class="cs" style="background:#ff9ff3" onclick="pickColor('#ff9ff3',this)"></button>
    <button class="cs" style="background:#00d2d3" onclick="pickColor('#00d2d3',this)"></button>
    <button class="cs" style="background:#2ecc71" onclick="pickColor('#2ecc71',this)"></button>
    <button class="cs" style="background:#e67e22" onclick="pickColor('#e67e22',this)"></button>
    <button class="cs" style="background:#9b59b6" onclick="pickColor('#9b59b6',this)"></button>
    <button class="cs" style="background:#1abc9c" onclick="pickColor('#1abc9c',this)"></button>

<script>
// ═══ DOM ═══
var C = document.getElementById('canvas');
var X = C.getContext('2d');
var spotC = document.getElementById('spotCanvas');
var spotX = spotC.getContext('2d');
var mmC = document.getElementById('mmCanvas');
var mmX = mmC.getContext('2d');
var scrC = document.getElementById('scratchCanvas');
var scrX = scrC.getContext('2d');
var offC = document.createElement('canvas');
var offX = offC.getContext('2d');
var eraserCur = document.getElementById('eraserCursor');

// ═══ STATE ═══
var tool = 'pen', penColor = '#ffffff', penSize = 3, fontSize = 24, bgType = 'dark';
var panX = 0, panY = 0, zoom = 1, MIN_ZOOM = 0.1, MAX_ZOOM = 10;
var isDrawing = false, currentEl = null, preDrawImg = null;
var shiftHeld = false, spaceHeld = false;
var isPanning = false, panAnchorX = 0, panAnchorY = 0, panStartX = 0, panStartY = 0;
var pages = [{ els:[], undone:[], px:0, py:0, zm:1 }], curPage = 0;
var isRec = false, recStart = 0, isPlay = false, playTime = 0, playSpeed = 1, playRAF = null, playLast = 0, bookmarks = [];
var showMinimap = false, showScratch = false;
var scrDrawing = false, scrLastX = 0, scrLastY = 0;
var teActive = false, teWorldX = 0, teWorldY = 0, teMode = 'text';
var cW = 0, cH = 0;

// ═══ HELPERS ═══
function els() { return pages[curPage].els; }
function undone() { return pages[curPage].undone; }
function isWhiteBG() { return bgType.indexOf('white') !== -1 || bgType === 'coord' || bgType === 'numline'; }
function bgColor() { return isWhiteBG() ? '#ffffff' : '#1a1a2e'; }

function s2w(sx, sy) {
  return { x: (sx - cW / 2) / zoom + panX, y: (sy - cH / 2) / zoom + panY };
}
function applyVT(c) {
  c.setTransform(zoom, 0, 0, zoom, -panX * zoom + cW / 2, -panY * zoom + cH / 2);
}
function getW(e) {
  var r = C.getBoundingClientRect();
  return s2w(e.clientX - r.left, e.clientY - r.top);
}
function snapLine(x1, y1, x2, y2) {
  var a = Math.atan2(y2 - y1, x2 - x1);
  var s = Math.round(a / (Math.PI / 12)) * (Math.PI / 12);
  var d = Math.sqrt((x2 - x1) * (x2 - x1) + (y2 - y1) * (y2 - y1));
  return { x: x1 + Math.cos(s) * d, y: y1 + Math.sin(s) * d };
}
function snapSq(x1, y1, x2, y2) {
  var dx = x2 - x1, dy = y2 - y1;
  var sz = Math.max(Math.abs(dx), Math.abs(dy));
  return { x: x1 + sz * (dx < 0 ? -1 : 1), y: y1 + sz * (dy < 0 ? -1 : 1) };
}
function recTime() { return isRec ? (Date.now() - recStart) / 1000 : undefined; }

// ═══ RESIZE — explicit pixel sizing ═══
function resize() {
  cW = window.innerWidth;
  cH = window.innerHeight - 88;
  C.width = cW; C.height = cH;
  C.style.width = cW + 'px'; C.style.height = cH + 'px';
  offC.width = cW; offC.height = cH;
  spotC.width = cW; spotC.height = cH;
  spotC.style.width = cW + 'px'; spotC.style.height = cH + 'px';
  mmC.width = 160; mmC.height = 100;
  fullRender();
}
window.addEventListener('resize', resize);

// ═══ RENDERING ═══
function fullRender(pending) {
  // 1. CSS background
  C.style.background = bgColor();
  document.body.style.background = bgColor();

  // 2. Clear canvas (transparent so CSS bg shows through)
  X.setTransform(1, 0, 0, 1, 0, 0);
  X.clearRect(0, 0, cW, cH);

  // 3. Draw grid/template in world coords
  X.save(); applyVT(X); drawBG(X); X.restore();

  // 4. Drawing layer on offscreen canvas (for eraser compositing)
  offX.setTransform(1, 0, 0, 1, 0, 0);
  offX.clearRect(0, 0, cW, cH);
  offX.save(); applyVT(offX);

  var list = els();
  if (isPlay) {
    list = list.filter(function(e) { return e.rt === undefined || e.rt <= playTime; });
  }
  for (var i = 0; i < list.length; i++) drawEl(offX, list[i]);
  if (pending) drawEl(offX, pending);
  offX.restore();

  // 5. Composite drawing layer onto main canvas
  X.setTransform(1, 0, 0, 1, 0, 0);
  X.drawImage(offC, 0, 0);

  if (showMinimap) renderMinimap();
}

function drawEl(c, el) {
  switch (el.type) {
    case 'pen':
      c.strokeStyle = el.color; c.lineCap = 'round'; c.lineJoin = 'round'; c.globalAlpha = 1;
      if (el.pts.length < 2) break;
      for (var i = 1; i < el.pts.length; i++) {
        c.lineWidth = el.size * (0.4 + el.pts[i].p * 1.2);
        c.beginPath(); c.moveTo(el.pts[i-1].x, el.pts[i-1].y); c.lineTo(el.pts[i].x, el.pts[i].y); c.stroke();
      }
      break;
    case 'highlight':
      c.strokeStyle = el.color; c.lineWidth = el.size * 4; c.lineCap = 'round'; c.lineJoin = 'round'; c.globalAlpha = 0.3;
      c.beginPath();
      for (var i = 0; i < el.pts.length; i++) { if (i === 0) c.moveTo(el.pts[i].x, el.pts[i].y); else c.lineTo(el.pts[i].x, el.pts[i].y); }
      c.stroke(); c.globalAlpha = 1;
      break;
    case 'erase':
      c.globalCompositeOperation = 'destination-out'; c.strokeStyle = '#000'; c.lineWidth = el.size * 5;
      c.lineCap = 'round'; c.lineJoin = 'round'; c.beginPath();
      for (var i = 0; i < el.pts.length; i++) { if (i === 0) c.moveTo(el.pts[i].x, el.pts[i].y); else c.lineTo(el.pts[i].x, el.pts[i].y); }
      c.stroke(); c.globalCompositeOperation = 'source-over';
      break;
    case 'line':
      c.strokeStyle = el.color; c.lineWidth = el.size; c.lineCap = 'round';
      c.beginPath(); c.moveTo(el.x1, el.y1); c.lineTo(el.x2, el.y2); c.stroke();
      break;
    case 'arrow':
      c.strokeStyle = el.color; c.lineWidth = el.size; c.lineCap = 'round';
      c.beginPath(); c.moveTo(el.x1, el.y1); c.lineTo(el.x2, el.y2); c.stroke();
      var a = Math.atan2(el.y2 - el.y1, el.x2 - el.x1), hl = 15 / zoom;
      c.fillStyle = el.color; c.beginPath(); c.moveTo(el.x2, el.y2);
      c.lineTo(el.x2 - hl * Math.cos(a - 0.5), el.y2 - hl * Math.sin(a - 0.5));
      c.lineTo(el.x2 - hl * Math.cos(a + 0.5), el.y2 - hl * Math.sin(a + 0.5));
      c.closePath(); c.fill();
      break;
    case 'rect':
      c.strokeStyle = el.color; c.lineWidth = el.size;
      c.strokeRect(el.x1, el.y1, el.x2 - el.x1, el.y2 - el.y1);
      break;
    case 'circle':
      var cx = (el.x1 + el.x2) / 2, cy = (el.y1 + el.y2) / 2;
      var rx = Math.abs(el.x2 - el.x1) / 2, ry = Math.abs(el.y2 - el.y1) / 2;
      c.strokeStyle = el.color; c.lineWidth = el.size;
      c.beginPath(); c.ellipse(cx, cy, Math.max(rx, 0.1), Math.max(ry, 0.1), 0, 0, Math.PI * 2); c.stroke();
      break;
    case 'text':
      var style = ''; if (el.italic) style += 'italic '; if (el.bold) style += 'bold ';
      c.font = style + el.fs + 'px ' + (el.ff || 'system-ui,sans-serif');
      c.fillStyle = el.color;
      var lines = el.text.split('\n');
      for (var j = 0; j < lines.length; j++) c.fillText(lines[j], el.x, el.y + j * el.fs * 1.3);
      break;
    case 'sticky':
      c.fillStyle = el.bg; c.globalAlpha = 0.92;
      c.beginPath(); roundRect(c, el.x, el.y, el.w || 160, el.h || 100, 6); c.fill();
      c.globalAlpha = 1; c.fillStyle = '#1a1a2e'; c.font = '14px system-ui,sans-serif';
      var sw = (el.w || 160), lines = wrapText(el.text, sw - 16);
      for (var j = 0; j < lines.length && j < 5; j++) c.fillText(lines[j], el.x + 8, el.y + 22 + j * 18);
      break;
    case 'image':
      if (el.img && el.img.complete) c.drawImage(el.img, el.x, el.y, el.w, el.h);

  }
}

function roundRect(c, x, y, w, h, r) {
  c.moveTo(x + r, y); c.lineTo(x + w - r, y); c.quadraticCurveTo(x + w, y, x + w, y + r);
  c.lineTo(x + w, y + h - r); c.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  c.lineTo(x + r, y + h); c.quadraticCurveTo(x, y + h, x, y + h - r);
  c.lineTo(x, y + r); c.quadraticCurveTo(x, y, x + r, y);
}

function wrapText(text, maxW) {
  var words = text.split(' '), lines = [], line = '';

    var test = line + (line ? ' ' : '') + words[i];
    if (test.length * 7.5 > maxW && line) { lines.push(line); line = words[i]; }
    else line = test;
  }
  if (line) lines.push(line);
  return lines;
}

// ═══ BACKGROUNDS ═══
function setBG(type) { bgType = type; fullRender(); }

function drawBG(c) {
  var vl = s2w(0, 0), vr = s2w(cW, cH);
  var left = vl.x, top = vl.y, right = vr.x, bottom = vr.y;
  var isW = isWhiteBG();
  var minor = isW ? 'rgba(0,0,0,.10)' : 'rgba(255,255,255,.06)';
  var major = isW ? 'rgba(0,0,0,.22)' : 'rgba(255,255,255,.14)';
  var axis  = isW ? 'rgba(0,0,0,.5)'  : 'rgba(255,255,255,.3)';

  if (bgType === 'dark' || bgType === 'white') return;

  if (bgType.indexOf('grid') !== -1) drawGridLines(c, left, top, right, bottom, 40, minor, null, false);
  else if (bgType.indexOf('graph') !== -1) drawGridLines(c, left, top, right, bottom, 20, minor, major, false);
  else if (bgType.indexOf('lined') !== -1) drawGridLines(c, left, top, right, bottom, 32, minor, null, true);
  else if (bgType.indexOf('dot') !== -1) drawDots(c, left, top, right, bottom, 30, minor);
  else if (bgType === 'coord') {
    drawGridLines(c, left, top, right, bottom, 20, minor, major, false);
    c.strokeStyle = axis; c.lineWidth = 2 / zoom;
    c.beginPath(); c.moveTo(left, 0); c.lineTo(right, 0); c.stroke();
    c.beginPath(); c.moveTo(0, top); c.lineTo(0, bottom); c.stroke();
    c.fillStyle = isW ? 'rgba(0,0,0,.5)' : 'rgba(255,255,255,.4)';
    c.font = (12 / zoom) + 'px system-ui';
    for (var x = Math.ceil(left / 100) * 100; x <= right; x += 100) { if (x !== 0) c.fillText(x, x + 2 / zoom, -4 / zoom); }
    for (var y = Math.ceil(top / 100) * 100; y <= bottom; y += 100) { if (y !== 0) c.fillText(-y, 4 / zoom, y - 2 / zoom); }
  }
  else if (bgType === 'numline') {
    c.strokeStyle = axis; c.lineWidth = 2 / zoom;
    c.beginPath(); c.moveTo(left, 0); c.lineTo(right, 0); c.stroke();
    c.fillStyle = isW ? 'rgba(0,0,0,.5)' : 'rgba(255,255,255,.4)';
    c.font = (14 / zoom) + 'px system-ui';
    for (var x = Math.ceil(left / 50) * 50; x <= right; x += 50) {
      c.beginPath(); c.moveTo(x, -8 / zoom); c.lineTo(x, 8 / zoom); c.stroke();
      c.fillText(x / 50, x - 4 / zoom, 22 / zoom);
    }
    c.lineWidth = 1 / zoom;
    for (var x = Math.ceil(left / 10) * 10; x <= right; x += 10) {
      c.beginPath(); c.moveTo(x, -4 / zoom); c.lineTo(x, 4 / zoom); c.stroke();
    }
  }
  else if (bgType === 'iso') drawIso(c, left, top, right, bottom, 40, minor);
}

function drawGridLines(c, l, t, r, b, sp, color, majorColor, hOnly) {
  c.lineWidth = 0.5 / zoom;
  if (!hOnly) {
    for (var x = Math.floor(l / sp) * sp; x <= r; x += sp) {
      c.strokeStyle = (majorColor && Math.round(x) % (sp * 5) === 0) ? majorColor : color;
      c.beginPath(); c.moveTo(x, t); c.lineTo(x, b); c.stroke();
    }
  }
  for (var y = Math.floor(t / sp) * sp; y <= b; y += sp) {
    c.strokeStyle = (majorColor && Math.round(y) % (sp * 5) === 0) ? majorColor : color;
    c.beginPath(); c.moveTo(l, y); c.lineTo(r, y); c.stroke();
  }
}

function drawDots(c, l, t, r, b, sp, color) {
  c.fillStyle = color; var dr = 1.5 / zoom;
  for (var x = Math.floor(l / sp) * sp; x <= r; x += sp)
    for (var y = Math.floor(t / sp) * sp; y <= b; y += sp) { c.beginPath(); c.arc(x, y, dr, 0, Math.PI * 2); c.fill(); }
}

function drawIso(c, l, t, r, b, sp, color) {
  c.strokeStyle = color; c.lineWidth = 0.5 / zoom;
  var h = sp * 0.866;
  for (var y = Math.floor(t / h) * h; y <= b; y += h) { c.beginPath(); c.moveTo(l, y); c.lineTo(r, y); c.stroke(); }
  for (var x = Math.floor(l / sp) * sp; x <= r; x += sp) {
    c.beginPath(); c.moveTo(x, t); c.lineTo(x + (b - t) * 0.577, b); c.stroke();
    c.beginPath(); c.moveTo(x, t); c.lineTo(x - (b - t) * 0.577, b); c.stroke();
  }
}

// ═══ TOOLS ═══

// ═══ INLINE TEXT EDITOR ═══

// ═══ POINTER EVENTS ═══
C.addEventListener('pointerdown', function(e) {
  e.preventDefault();
  C.setPointerCapture(e.pointerId);
  var w = getW(e);

  if (spaceHeld || e.button === 1) {
    isPanning = true; panAnchorX = e.clientX; panAnchorY = e.clientY; panStartX = panX; panStartY = panY;
    C.style.cursor = 'grabbing'; return;
  }
  if (tool === 'laser' || tool === 'spotlight') return;
  if (teActive) return;

  if (tool === 'text') {
    openTextEditor(e.clientX, e.clientY, w.x, w.y, 'text');
    return;
  }
  if (tool === 'sticky') {
    openTextEditor(e.clientX, e.clientY, w.x, w.y, 'sticky');
    return;
  }

  isDrawing = true;

  } else {
    preDrawImg = X.getImageData(0, 0, cW, cH);
    currentEl = { type: tool, x1: w.x, y1: w.y, x2: w.x, y2: w.y, color: penColor, size: penSize, rt: recTime() };
  }
});

C.addEventListener('pointermove', function(e) {
  var w = getW(e);

  // Eraser cursor
  if (tool === 'eraser') {
    eraserCur.style.left = e.clientX + 'px'; eraserCur.style.top = e.clientY + 'px';
    var sz = penSize * 5 * zoom;
    eraserCur.style.width = sz + 'px'; eraserCur.style.height = sz + 'px';
    eraserCur.style.borderColor = isWhiteBG() ? 'rgba(0,0,0,.4)' : 'rgba(255,255,255,.5)';
  }
  if (tool === 'laser') {
    var el = document.getElementById('laser'); el.style.left = e.clientX + 'px'; el.style.top = e.clientY + 'px'; return;
  }
  if (tool === 'spotlight') {
    var r = C.getBoundingClientRect(); var sx = e.clientX - r.left, sy = e.clientY - r.top;
    spotX.clearRect(0, 0, spotC.width, spotC.height);
    spotX.fillStyle = 'rgba(0,0,0,0.7)'; spotX.fillRect(0, 0, spotC.width, spotC.height);
    spotX.globalCompositeOperation = 'destination-out';
    spotX.beginPath(); spotX.arc(sx, sy, 100, 0, Math.PI * 2); spotX.fill();
    spotX.globalCompositeOperation = 'source-over';
    var g = spotX.createRadialGradient(sx, sy, 80, sx, sy, 120);
    g.addColorStop(0, 'rgba(0,0,0,0)'); g.addColorStop(1, 'rgba(0,0,0,0.7)');
    spotX.fillStyle = g; spotX.beginPath(); spotX.arc(sx, sy, 120, 0, Math.PI * 2); spotX.fill();

  }

    panY = panStartY - (e.clientY - panAnchorY) / zoom;
    fullRender(); return;
  }
  if (!isDrawing || !currentEl) return;

  if (currentEl.type === 'pen' || currentEl.type === 'highlight' || currentEl.type === 'erase') {
    currentEl.pts.push({ x: w.x, y: w.y, p: e.pressure || 0.5 });

    if (currentEl.type === 'erase') {
      fullRender(currentEl);
    } else {
      var pts = currentEl.pts, len = pts.length;
      if (len < 2) return;
      X.save(); applyVT(X);
      if (currentEl.type === 'highlight') {
        X.strokeStyle = currentEl.color; X.lineWidth = currentEl.size * 4;
        X.lineCap = 'round'; X.globalAlpha = 0.3;
      } else {

      X.beginPath(); X.moveTo(pts[len-2].x, pts[len-2].y); X.lineTo(pts[len-1].x, pts[len-1].y); X.stroke();

    }
  } else {
    X.putImageData(preDrawImg, 0, 0);
    var x2 = w.x, y2 = w.y;
    if (shiftHeld) {
      if (currentEl.type === 'line' || currentEl.type === 'arrow') { var s = snapLine(currentEl.x1, currentEl.y1, x2, y2); x2 = s.x; y2 = s.y; }
      else { var s = snapSq(currentEl.x1, currentEl.y1, x2, y2); x2 = s.x; y2 = s.y; }

    currentEl.x2 = x2; currentEl.y2 = y2;

C.addEventListener('pointerup', function(e) {
  if (isPanning) { isPanning = false; C.style.cursor = spaceHeld ? 'grab' : (tool === 'eraser' ? 'none' : 'crosshair'); return; }
  if (!isDrawing || !currentEl) { isDrawing = false; return; }
  isDrawing = false;

  if (currentEl.type === 'pen' || currentEl.type === 'highlight' || currentEl.type === 'erase') {
    if (currentEl.pts.length >= 2) addEl(currentEl);
  } else {
    var w = getW(e);
    if (shiftHeld) {
      if (currentEl.type === 'line' || currentEl.type === 'arrow') { var s = snapLine(currentEl.x1, currentEl.y1, w.x, w.y); currentEl.x2 = s.x; currentEl.y2 = s.y; }
      else { var s = snapSq(currentEl.x1, currentEl.y1, w.x, w.y); currentEl.x2 = s.x; currentEl.y2 = s.y; }
    } else { currentEl.x2 = w.x; currentEl.y2 = w.y; }
    addEl(currentEl);
  }
  currentEl = null; preDrawImg = null;
  fullRender();
});

C.addEventListener('pointerleave', function() {
  if (isDrawing && currentEl) {
    if (currentEl.pts && currentEl.pts.length >= 2) addEl(currentEl);
    isDrawing = false; currentEl = null; preDrawImg = null; fullRender();
  }
});

// ═══ ZOOM ═══
C.addEventListener('wheel', function(e) {
  e.preventDefault();
  var d = e.deltaY < 0 ? 0.1 : -0.1;
  var nz = Math.max(MIN_ZOOM, Math.min(MAX_ZOOM, zoom * (1 + d)));
  var r = C.getBoundingClientRect();
  var mx = e.clientX - r.left, my = e.clientY - r.top;
  var wx = (mx - cW / 2) / zoom + panX, wy = (my - cH / 2) / zoom + panY;
  zoom = nz;
  panX = wx - (mx - cW / 2) / zoom; panY = wy - (my - cH / 2) / zoom;
  fullRender(); updateZoom();
}, { passive: false });

function zoomBy(d) { zoom = Math.max(MIN_ZOOM, Math.min(MAX_ZOOM, zoom + d)); fullRender(); updateZoom(); }
function resetView() { panX = 0; panY = 0; zoom = 1; fullRender(); updateZoom(); }
function updateZoom() { document.getElementById('zoomInfo').textContent = Math.round(zoom * 100) + '%'; }

// ═══ UNDO / REDO ═══
function addEl(el) { els().push(el); pages[curPage].undone = []; }
function doUndo() { var e = els(); if (!e.length) return; pages[curPage].undone.push(e.pop()); fullRender(); }
function doRedo() { var u = undone(); if (!u.length) return; els().push(u.pop()); fullRender(); }

// ═══ CLEAR ═══
function clearPage() { if (!confirm('Clear this page?')) return; pages[curPage].els = []; pages[curPage].undone = []; fullRender(); }

// ═══ PAGES ═══
function savePg() { pages[curPage].px = panX; pages[curPage].py = panY; pages[curPage].zm = zoom; }
function loadPg() { panX = pages[curPage].px; panY = pages[curPage].py; zoom = pages[curPage].zm; fullRender(); updatePgInfo(); updateZoom(); }
function addPage() { savePg(); pages.push({ els:[], undone:[], px:0, py:0, zm:1 }); curPage = pages.length - 1; loadPg(); }
function nextPage() { if (curPage < pages.length - 1) { savePg(); curPage++; loadPg(); } }
function prevPage() { if (curPage > 0) { savePg(); curPage--; loadPg(); } }
function updatePgInfo() { document.getElementById('pageInfo').textContent = (curPage + 1) + ' / ' + pages.length; }

// ═══ RECORDING ═══
function toggleRecord() {
  if (isRec) {
    isRec = false; document.getElementById('btnRec').classList.remove('rec'); document.getElementById('btnRec').innerHTML = '&#9679; Rec';
    document.getElementById('playback').classList.remove('hide');
  } else {
    isRec = true; recStart = Date.now(); bookmarks = [];
    document.getElementById('btnRec').classList.add('rec'); document.getElementById('btnRec').innerHTML = '&#9632; Stop';
  }
}

function getMaxRT() {
  var m = 0;
  for (var p = 0; p < pages.length; p++) for (var i = 0; i < pages[p].els.length; i++) { var rt = pages[p].els[i].rt; if (rt !== undefined && rt > m) m = rt; }
  return m || 1;
}
function fmtTime(s) { return Math.floor(s / 60) + ':' + ('0' + Math.floor(s % 60)).slice(-2); }

function togglePlay() {
  if (isPlay) { isPlay = false; document.getElementById('playBtn').innerHTML = '&#9654;'; if (playRAF) cancelAnimationFrame(playRAF); }
  else { isPlay = true; playLast = 0; document.getElementById('playBtn').innerHTML = '&#9646;&#9646;'; playRAF = requestAnimationFrame(playLoop); }
}
function playLoop(ts) {
  if (!isPlay) return;
  if (!playLast) playLast = ts;
  playTime += (ts - playLast) / 1000 * playSpeed; playLast = ts;
  var dur = getMaxRT();
  if (playTime >= dur) { playTime = dur; isPlay = false; document.getElementById('playBtn').innerHTML = '&#9654;'; }
  fullRender(); updateScrubber(dur);
  if (isPlay) playRAF = requestAnimationFrame(playLoop);
}
function stopPlay() { isPlay = false; playTime = 0; document.getElementById('playBtn').innerHTML = '&#9654;'; if (playRAF) cancelAnimationFrame(playRAF); fullRender(); updateScrubber(getMaxRT()); }
function updateScrubber(dur) {
  document.getElementById('scrubFill').style.width = (dur > 0 ? playTime / dur * 100 : 0) + '%';
  document.getElementById('timeDisp').textContent = fmtTime(playTime) + ' / ' + fmtTime(dur);
}
function scrubStart(e) {
  var rect = document.getElementById('scrubber').getBoundingClientRect();
  var dur = getMaxRT();
  function set(ev) { playTime = Math.max(0, Math.min(1, (ev.clientX - rect.left) / rect.width)) * dur; fullRender(); updateScrubber(dur); }
  set(e);
  function mv(ev) { set(ev); }
  function up() { document.removeEventListener('mousemove', mv); document.removeEventListener('mouseup', up); }
  document.addEventListener('mousemove', mv); document.addEventListener('mouseup', up);
}
function addBookmark() {
  var t = isRec ? (Date.now() - recStart) / 1000 : playTime;
  bookmarks.push(t);
  var dur = getMaxRT(); var scrub = document.getElementById('scrubber');
  var mk = document.createElement('div'); mk.className = 'bm'; mk.style.left = (t / dur * 100) + '%'; mk.title = fmtTime(t);
  mk.onclick = function(ev) { ev.stopPropagation(); playTime = t; fullRender(); updateScrubber(dur); };
  scrub.appendChild(mk);
}

// ═══ IMAGE DRAG & DROP + PASTE ═══
document.addEventListener('dragover', function(e) { e.preventDefault(); });
document.addEventListener('dragenter', function(e) { if (e.dataTransfer && e.dataTransfer.types.indexOf('Files') !== -1) document.getElementById('dropZone').classList.add('show'); });
document.addEventListener('dragleave', function(e) { if (e.clientX === 0 && e.clientY === 0) document.getElementById('dropZone').classList.remove('show'); });
document.addEventListener('drop', function(e) {
  e.preventDefault(); document.getElementById('dropZone').classList.remove('show');
  for (var i = 0; i < e.dataTransfer.files.length; i++) if (e.dataTransfer.files[i].type.startsWith('image/')) loadImg(e.dataTransfer.files[i], e.clientX, e.clientY);
});

  var items = e.clipboardData && e.clipboardData.items; if (!items) return;
  for (var i = 0; i < items.length; i++) if (items[i].type.startsWith('image/')) loadImg(items[i].getAsFile(), cW / 2, cH / 2 + 48);
});
function loadImg(file, cx, cy) {
  var reader = new FileReader();
  reader.onload = function(ev) {
    var img = new Image();
    img.onload = function() {
      var r = C.getBoundingClientRect();
      var w = s2w(cx - r.left, cy - r.top);
      var iw = img.width, ih = img.height, mx = 400;
      if (iw > mx || ih > mx) { var sc = mx / Math.max(iw, ih); iw *= sc; ih *= sc; }
      addEl({ type:'image', img:img, x:w.x - iw/2, y:w.y - ih/2, w:iw, h:ih, rt:recTime() });
      fullRender();
    };
    img.src = ev.target.result;
  };

}

// ═══ MINIMAP ═══
function toggleMinimap() { showMinimap = !showMinimap; document.getElementById('minimapWrap').classList.toggle('hide', !showMinimap); document.getElementById('btnMinimap').classList.toggle('on', showMinimap); if (showMinimap) renderMinimap(); }
function renderMinimap() {
  mmX.setTransform(1,0,0,1,0,0); mmX.fillStyle = bgColor(); mmX.fillRect(0,0,160,100);
  var minX = -200, maxX = 200, minY = -150, maxY = 150, list = els();
  for (var i = 0; i < list.length; i++) {
    var el = list[i];
    if (el.pts) { for (var j = 0; j < el.pts.length; j++) { minX = Math.min(minX, el.pts[j].x); maxX = Math.max(maxX, el.pts[j].x); minY = Math.min(minY, el.pts[j].y); maxY = Math.max(maxY, el.pts[j].y); } }
    else if (el.x1 !== undefined) { minX = Math.min(minX, el.x1, el.x2); maxX = Math.max(maxX, el.x1, el.x2); minY = Math.min(minY, el.y1, el.y2); maxY = Math.max(maxY, el.y1, el.y2); }
    else if (el.x !== undefined) { minX = Math.min(minX, el.x); maxX = Math.max(maxX, el.x + (el.w||100)); minY = Math.min(minY, el.y); maxY = Math.max(maxY, el.y + (el.h||20)); }
  }
  minX -= 50; minY -= 50; maxX += 50; maxY += 50;
  var ww = maxX - minX, wh = maxY - minY, sc = Math.min(160 / ww, 100 / wh);
  mmX.save(); mmX.translate(80 - (minX + ww/2) * sc, 50 - (minY + wh/2) * sc); mmX.scale(sc, sc);
  for (var i = 0; i < list.length; i++) drawEl(mmX, list[i]);
  mmX.restore();
  var vl = s2w(0,0), vr = s2w(cW, cH);
  var vx = (vl.x - minX) * sc + (80 - ww/2 * sc), vy = (vl.y - minY) * sc + (50 - wh/2 * sc);
  var vw = (vr.x - vl.x) * sc, vh = (vr.y - vl.y) * sc;
  var view = document.getElementById('mmView');
  view.style.left = vx + 'px'; view.style.top = vy + 'px'; view.style.width = Math.max(vw, 4) + 'px'; view.style.height = Math.max(vh, 4) + 'px';
}

// ═══ SCRATCH SPACE ═══
function toggleScratch() {
  showScratch = !showScratch;
  document.getElementById('scratchPanel').classList.toggle('hide', !showScratch);
  document.getElementById('btnScratch').classList.toggle('on', showScratch);
  if (showScratch) setTimeout(function() { var r = scrC.getBoundingClientRect(); scrC.width = r.width; scrC.height = r.height; scrX.fillStyle = '#1e1e30'; scrX.fillRect(0,0,scrC.width,scrC.height); }, 50);
}
function clearScratch() { scrX.fillStyle = '#1e1e30'; scrX.fillRect(0,0,scrC.width,scrC.height); }
scrC.addEventListener('pointerdown', function(e) { scrDrawing = true; var r = scrC.getBoundingClientRect(); scrLastX = e.clientX - r.left; scrLastY = e.clientY - r.top; });
scrC.addEventListener('pointermove', function(e) {
  if (!scrDrawing) return; var r = scrC.getBoundingClientRect(); var x = e.clientX - r.left, y = e.clientY - r.top;
  scrX.strokeStyle = penColor; scrX.lineWidth = penSize; scrX.lineCap = 'round';
  scrX.beginPath(); scrX.moveTo(scrLastX, scrLastY); scrX.lineTo(x, y); scrX.stroke();
  scrLastX = x; scrLastY = y;
});
scrC.addEventListener('pointerup', function() { scrDrawing = false; });
scrC.addEventListener('pointerleave', function() { scrDrawing = false; });

// ═══ EXPORT ═══
function saveImage() {
  var tc = document.createElement('canvas'); tc.width = cW; tc.height = cH;
  var tctx = tc.getContext('2d');
  tctx.fillStyle = bgColor(); tctx.fillRect(0, 0, cW, cH);
  tctx.save(); tctx.setTransform(zoom,0,0,zoom,-panX*zoom+cW/2,-panY*zoom+cH/2); drawBG(tctx); tctx.restore();
  var ofc = document.createElement('canvas'); ofc.width = cW; ofc.height = cH; var ofctx = ofc.getContext('2d');
  ofctx.save(); ofctx.setTransform(zoom,0,0,zoom,-panX*zoom+cW/2,-panY*zoom+cH/2);
  var list = els(); for (var i = 0; i < list.length; i++) drawEl(ofctx, list[i]);
  ofctx.restore(); tctx.drawImage(ofc, 0, 0);
  var link = document.createElement('a'); link.download = 'whiteboard-' + new Date().toISOString().slice(0,10) + '.png';
  link.href = tc.toDataURL(); link.click();
}

function toggleFullscreen() { if (!document.fullscreenElement) document.documentElement.requestFullscreen(); else document.exitFullscreen(); }

// ═══ KEYBOARD ═══
document.addEventListener('keydown', function(e) {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.tagName === 'SELECT' || e.target.isContentEditable) return;
  if (e.code === 'Space' && !e.repeat) { e.preventDefault(); spaceHeld = true; C.style.cursor = 'grab'; }
  if (e.key === 'Shift') shiftHeld = true;
  if (e.key === 'Escape' && teActive) { teCancel(); return; }
  if (e.key === 'Enter' && teActive) { teConfirm(); return; }
  if (e.ctrlKey || e.metaKey) {
    if (e.key === 'z') { e.preventDefault(); doUndo(); }
    if (e.key === 'y') { e.preventDefault(); doRedo(); }
    if (e.key === 's') { e.preventDefault(); saveImage(); }
    if (e.key === '0') { e.preventDefault(); resetView(); }
    if (e.key === '=') { e.preventDefault(); zoomBy(0.2); }
    if (e.key === '-') { e.preventDefault(); zoomBy(-0.2); }
    return;
  }
  if (e.key === '1') setTool('pen'); if (e.key === '2') setTool('highlight'); if (e.key === '3') setTool('eraser');
  if (e.key === '4') setTool('text'); if (e.key === '5') setTool('line'); if (e.key === '6') setTool('arrow');
  if (e.key === '7') setTool('rect'); if (e.key === '8') setTool('circle');
  if (e.key === 'l') setTool('laser'); if (e.key === 's') setTool('spotlight'); if (e.key === 'n') setTool('sticky');
  if (e.key === 'f') toggleFullscreen(); if (e.key === 'm') toggleMinimap(); if (e.key === 'p') toggleScratch();
  if (e.key === 'r') toggleRecord(); if (e.key === 'b') addBookmark();
  if (e.key === 'ArrowRight') nextPage(); if (e.key === 'ArrowLeft') prevPage();
});
document.addEventListener('keyup', function(e) {
  if (e.code === 'Space') { spaceHeld = false; if (!isPanning) C.style.cursor = tool === 'eraser' ? 'none' : 'crosshair'; }
  if (e.key === 'Shift') shiftHeld = false;
});

// ═══ TOUCH PAN/ZOOM ═══
var touches = {};
C.addEventListener('touchstart', function(e) {
  for (var i = 0; i < e.changedTouches.length; i++) touches[e.changedTouches[i].identifier] = { x: e.changedTouches[i].clientX, y: e.changedTouches[i].clientY };
  if (Object.keys(touches).length >= 2) { isPanning = true; isDrawing = false; currentEl = null; }
}, { passive: true });
C.addEventListener('touchmove', function(e) {
  var ids = Object.keys(touches);
  if (ids.length >= 2 && e.touches.length >= 2) {
    e.preventDefault();
    var t0 = e.touches[0], t1 = e.touches[1];
    var oldD = Math.sqrt(Math.pow(touches[ids[0]].x - touches[ids[1]].x, 2) + Math.pow(touches[ids[0]].y - touches[ids[1]].y, 2));
    var newD = Math.sqrt(Math.pow(t0.clientX - t1.clientX, 2) + Math.pow(t0.clientY - t1.clientY, 2));
    zoom = Math.max(MIN_ZOOM, Math.min(MAX_ZOOM, zoom * newD / oldD));
    var om = { x: (touches[ids[0]].x + touches[ids[1]].x) / 2, y: (touches[ids[0]].y + touches[ids[1]].y) / 2 };
    var nm = { x: (t0.clientX + t1.clientX) / 2, y: (t0.clientY + t1.clientY) / 2 };
    panX -= (nm.x - om.x) / zoom; panY -= (nm.y - om.y) / zoom;
    touches[t0.identifier] = { x: t0.clientX, y: t0.clientY }; touches[t1.identifier] = { x: t1.clientX, y: t1.clientY };
    fullRender(); updateZoom();
  }
}, { passive: false });
C.addEventListener('touchend', function(e) {
  for (var i = 0; i < e.changedTouches.length; i++) delete touches[e.changedTouches[i].identifier];
  if (Object.keys(touches).length < 2) isPanning = false;
}, { passive: true });

// ═══ INIT ═══
resize();
</script>
